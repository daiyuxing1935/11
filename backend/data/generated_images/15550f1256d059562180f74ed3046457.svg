<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f2fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b7fd6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="satGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef6fc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LangChain 生态系统架构图</text>

  <!-- 轨道线（虚线圆环） -->
  <!-- 内轨道 -->
  <ellipse cx="400" cy="260" rx="160" ry="110" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="6,5" opacity="0.5"/>
  <!-- 外轨道 -->
  <ellipse cx="400" cy="260" rx="260" ry="175" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="5,6" opacity="0.3"/>

  <!-- 核心节点：LangChain Core Framework -->
  <g filter="url(#shadow)">
    <rect x="305" y="215" width="190" height="90" rx="16" fill="url(#coreGrad)" stroke="#2b7fd6" stroke-width="1.5"/>
    <!-- 六边形装饰角 -->
    <polygon points="305,231 315,215 325,215" fill="#409EFF" opacity="0.3"/>
    <polygon points="495,231 485,215 475,215" fill="#409EFF" opacity="0.3"/>
    <polygon points="305,289 315,305 325,305" fill="#409EFF" opacity="0.3"/>
    <polygon points="495,289 485,305 475,305" fill="#409EFF" opacity="0.3"/>
    <!-- 核心图标 -->
    <circle cx="340" cy="260" r="14" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.9"/>
    <polygon points="340,248 348,256 348,264 340,272 332,264 332,256" fill="#fff" opacity="0.9"/>
    <text x="365" y="256" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#ffffff">LangChain 核心框架</text>
    <text x="365" y="276" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#d4eaff">编排与集成中枢</text>
  </g>

  <!-- 卫星节点 1：LangSmith（左上） -->
  <g filter="url(#shadow)">
    <rect x="155" y="100" width="150" height="60" rx="12" fill="url(#satGrad)" stroke="#409EFF" stroke-width="1.3"/>
    <!-- 放大镜图标 -->
    <circle cx="182" cy="130" r="10" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="189" y1="137" x2="195" y2="143" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round"/>
    <text x="200" y="127" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">LangSmith</text>
    <text x="200" y="146" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#5a6a7e">调试与监控</text>
  </g>
  <!-- 连接线：核心到LangSmith -->
  <line x1="305" y1="225" x2="230" y2="160" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 卫星节点 2：LangServe（右上） -->
  <g filter="url(#shadow)">
    <rect x="495" y="100" width="150" height="60" rx="12" fill="url(#satGrad)" stroke="#409EFF" stroke-width="1.3"/>
    <!-- API端点图标 -->
    <rect x="520" y="115" width="12" height="18" rx="2" fill="none" stroke="#409EFF" stroke-width="1.6"/>
    <line x1="526" y1="117" x2="526" y2="131" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="520" y1="124" x2="532" y2="124" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="538" y1="124" x2="545" y2="124" stroke="#409EFF" stroke-width="1.8"/>
    <text x="550" y="127" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">LangServe</text>
    <text x="550" y="146" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#5a6a7e">API部署服务</text>
  </g>
  <!-- 连接线：核心到LangServe -->
  <line x1="495" y1="225" x2="570" y2="160" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 卫星节点 3：LangGraph（左下） -->
  <g filter="url(#shadow)">
    <rect x="155" y="340" width="150" height="60" rx="12" fill="url(#satGrad)" stroke="#409EFF" stroke-width="1.3"/>
    <!-- 有向图节点图标 -->
    <circle cx="182" cy="370" r="8" fill="#409EFF" opacity="0.7"/>
    <circle cx="200" cy="358" r="6" fill="none" stroke="#409EFF" stroke-width="1.6"/>
    <circle cx="200" cy="382" r="6" fill="none" stroke="#409EFF" stroke-width="1.6"/>
    <line x1="188" y1="366" x2="196" y2="360" stroke="#409EFF" stroke-width="1.3"/>
    <line x1="188" y1="374" x2="196" y2="380" stroke="#409EFF" stroke-width="1.3"/>
    <text x="215" y="367" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">LangGraph</text>
    <text x="215" y="386" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#5a6a7e">状态化工作流</text>
  </g>
  <!-- 连接线：核心到LangGraph -->
  <line x1="340" y1="305" x2="230" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 卫星节点 4：LangChain Hub（右下） -->
  <g filter="url(#shadow)">
    <rect x="495" y="340" width="150" height="60" rx="12" fill="url(#satGrad)" stroke="#409EFF" stroke-width="1.3"/>
    <!-- 社区共享图标 -->
    <circle cx="522" cy="360" r="7" fill="none" stroke="#409EFF" stroke-width="1.6"/>
    <circle cx="538" cy="360" r="7" fill="none" stroke="#409EFF" stroke-width="1.6"/>
    <circle cx="530" cy="374" r="7" fill="none" stroke="#409EFF" stroke-width="1.6"/>
    <line x1="528" y1="367" x2="530" y2="374" stroke="#409EFF" stroke-width="1.3"/>
    <line x1="532" y1="367" x2="530" y2="374" stroke="#409EFF" stroke-width="1.3"/>
    <text x="550" y="367" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">LangChain Hub</text>
    <text x="550" y="386" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#5a6a7e">社区共享仓库</text>
  </g>
  <!-- 连接线：核心到LangChain Hub -->
  <line x1="460" y1="305" x2="570" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 卫星节点 5：生态扩展（顶部） -->
  <g filter="url(#shadow)">
    <rect x="325" y="50" width="150" height="50" rx="12" fill="url(#satGrad)" stroke="#409EFF" stroke-width="1.3"/>
    <!-- 向外辐射图标 -->
    <line x1="345" y1="75" x2="355" y2="75" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="345" y1="75" x2="345" y2="65" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="345" y1="75" x2="340" y2="68" stroke="#409EFF" stroke-width="1.3"/>
    <line x1="345" y1="75" x2="350" y2="68" stroke="#409EFF" stroke-width="1.3"/>
    <text x="365" y="79" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">生态扩展</text>
  </g>
  <!-- 连接线：核心到生态扩展 -->
  <line x1="400" y1="215" x2="400" y2="100" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 底部说明 -->
  <text x="400" y="470" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#7a8a9e">LangChain 生态系统 · 以核心框架为中心，多组件协同工作</text>

  <!-- 图例 -->
  <rect x="30" y="440" width="8" height="8" rx="2" fill="#409EFF" opacity="0.6"/>
  <text x="44" y="448" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="10" fill="#7a8a9e">虚线轨道 = 组件间通信</text>
</svg>