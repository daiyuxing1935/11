<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#409EFF" stroke-width="1.5" rx="12" opacity="0.3"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 能力认知的双面视角</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- 天平底座（支点） -->
  <polygon points="400,310 385,340 415,340" fill="#1a1a2e" opacity="0.7"/>
  <rect x="370" y="340" width="60" height="8" rx="3" fill="#1a1a2e" opacity="0.5"/>

  <!-- 天平横梁 -->
  <rect x="180" y="268" width="440" height="10" rx="5" fill="#1a1a2e" opacity="0.75"/>
  <!-- 支点三角形 -->
  <polygon points="400,268 388,290 412,290" fill="#1a1a2e" opacity="0.6"/>

  <!-- 左侧托盘 - 过度信任 -->
  <ellipse cx="260" cy="310" rx="95" ry="12" fill="#1a1a2e" opacity="0.15"/>
  <ellipse cx="260" cy="308" rx="95" ry="12" fill="#1a1a2e" opacity="0.08"/>

  <!-- 左侧：过度信任标签 -->
  <rect x="210" y="280" width="100" height="26" rx="13" fill="#FF6B6B" opacity="0.85"/>
  <text x="260" y="297" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">过度信任</text>

  <!-- 左侧图标：手术机器人 -->
  <g transform="translate(200, 210)">
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#409EFF" opacity="0.12"/>
    <circle cx="0" cy="-6" r="6" fill="#409EFF" opacity="0.7"/>
    <rect x="-8" y="0" width="16" height="12" rx="3" fill="#409EFF" opacity="0.5"/>
    <line x1="-10" y1="12" x2="-14" y2="18" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="12" x2="14" y2="18" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <!-- 警告三角 -->
    <polygon points="18,-18 24,-10 12,-10" fill="#FF6B6B" opacity="0.8"/>
    <text x="18" y="-11" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">!</text>
  </g>

  <!-- 左侧图标：自动驾驶 -->
  <g transform="translate(260, 205)">
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#409EFF" opacity="0.12"/>
    <rect x="-12" y="-8" width="24" height="14" rx="5" fill="#409EFF" opacity="0.5"/>
    <circle cx="-6" cy="8" r="4" fill="#409EFF" opacity="0.4"/>
    <circle cx="6" cy="8" r="4" fill="#409EFF" opacity="0.4"/>
    <!-- 警告三角 -->
    <polygon points="18,-18 24,-10 12,-10" fill="#FF6B6B" opacity="0.8"/>
    <text x="18" y="-11" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">!</text>
  </g>

  <!-- 左侧图标：AI审判 -->
  <g transform="translate(320, 210)">
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#409EFF" opacity="0.12"/>
    <rect x="-10" y="-12" width="20" height="8" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="#409EFF" opacity="0.3"/>
    <line x1="-6" y1="2" x2="6" y2="2" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-6" y1="6" x2="6" y2="6" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <!-- 警告三角 -->
    <polygon points="18,-18 24,-10 12,-10" fill="#FF6B6B" opacity="0.8"/>
    <text x="18" y="-11" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">!</text>
  </g>

  <!-- 左侧底部标注 -->
  <text x="260" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">“什么都能做”</text>

  <!-- 右侧托盘 - 过度谨慎 -->
  <ellipse cx="540" cy="310" rx="95" ry="12" fill="#1a1a2e" opacity="0.15"/>
  <ellipse cx="540" cy="308" rx="95" ry="12" fill="#1a1a2e" opacity="0.08"/>

  <!-- 右侧：过度谨慎标签 -->
  <rect x="490" y="280" width="100" height="26" rx="13" fill="#FFB347" opacity="0.85"/>
  <text x="540" y="297" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">过度谨慎</text>

  <!-- 右侧图标：被关在笼子里的机器人 -->
  <g transform="translate(540, 210)">
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#409EFF" opacity="0.12"/>
    <!-- 笼子 -->
    <rect x="-14" y="-14" width="28" height="28" rx="3" fill="none" stroke="#FFB347" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="-6" x2="14" y2="-6" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <line x1="-14" y1="2" x2="14" y2="2" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <line x1="-14" y1="10" x2="14" y2="10" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <line x1="-6" y1="-14" x2="-6" y2="14" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <line x1="2" y1="-14" x2="2" y2="14" stroke="#FFB347" stroke-width="1" opacity="0.5"/>
    <!-- 机器人（笼内） -->
    <circle cx="0" cy="-4" r="5" fill="#409EFF" opacity="0.4"/>
    <rect x="-6" y="2" width="12" height="8" rx="2" fill="#409EFF" opacity="0.3"/>
    <!-- 锁 -->
    <circle cx="14" cy="-8" r="3" fill="#FFB347" opacity="0.7"/>
  </g>

  <!-- 右侧底部标注 -->
  <text x="540" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">“什么都不敢做”</text>

  <!-- 中心：知界标尺 -->
  <g transform="translate(400, 130)">
    <!-- 虚线边界圆 -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="5,4" opacity="0.5"/>
    <circle cx="0" cy="0" r="42" fill="#409EFF" opacity="0.06"/>

    <!-- 金色平衡点 -->
    <circle cx="0" cy="0" r="28" fill="url(#goldGrad)" opacity="0.25"/>
    <circle cx="0" cy="0" r="20" fill="url(#goldGrad)" opacity="0.35"/>
    <circle cx="0" cy="0" r="12" fill="url(#goldGrad)" opacity="0.5"/>

    <!-- 中心机器人 -->
    <circle cx="0" cy="-4" r="7" fill="#1a1a2e" opacity="0.7"/>
    <rect x="-8" y="4" width="16" height="10" rx="3" fill="#1a1a2e" opacity="0.5"/>
    <circle cx="-4" cy="-4" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="4" cy="-4" r="2" fill="#fff" opacity="0.7"/>

    <!-- 能力指示点 -->
    <circle cx="0" cy="-28" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="24" cy="-14" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="24" cy="14" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="0" cy="28" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="-24" cy="14" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="-24" cy="-14" r="3" fill="#409EFF" opacity="0.6"/>
  </g>

  <!-- 中心下方标签：知界 -->
  <rect x="340" y="180" width="120" height="30" rx="15" fill="#409EFF" opacity="0.15"/>
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">知界</text>

  <!-- 连接线：左右到中心 -->
  <line x1="340" y1="270" x2="370" y2="200" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="460" y1="270" x2="430" y2="200" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- 底部说明文字 -->
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.55">极端信任与极端谨慎都是 AI 应用的风险</text>
  <text x="400" y="412" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.55">唯有「知界」—— 明确能力边界，方能安全有效</text>

  <!-- 底部装饰线 -->
  <line x1="300" y1="430" x2="500" y2="430" stroke="#409EFF" stroke-width="1" opacity="0.2"/>

  <!-- 左下角标注 -->
  <text x="30" y="475" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.3">教育配图 · AI 能力认知</text>
</svg>