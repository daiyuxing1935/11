<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fa"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">RNN 顺序处理 vs Transformer 并行处理</text>

  <!-- ========== 左侧：RNN 顺序处理 ========== -->
  <g transform="translate(0,0)">
    <!-- 左侧面板 -->
    <rect x="30" y="60" width="340" height="400" rx="14" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.2" filter="url(#shadow)"/>

    <!-- 面板标题 -->
    <rect x="50" y="78" width="140" height="30" rx="6" fill="#409EFF" opacity="0.12"/>
    <text x="120" y="98" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#409EFF">RNN 顺序处理</text>

    <!-- 顺序处理图标：水平箭头 -->
    <g transform="translate(200, 85)">
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
      <polygon points="60,0 52,-5 52,5" fill="#409EFF"/>
      <text x="0" y="-12" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#409EFF">串行</text>
    </g>

    <!-- 节点链：从左到右 -->
    <!-- 节点 1 -->
    <circle cx="90" cy="175" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="90" y="180" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">我</text>

    <!-- 箭头 1→2 -->
    <line x1="112" y1="175" x2="148" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <defs>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
      </marker>
    </defs>

    <!-- 节点 2 -->
    <circle cx="170" cy="175" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="170" y="180" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">爱</text>

    <!-- 箭头 2→3 -->
    <line x1="192" y1="175" x2="228" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- 节点 3 -->
    <circle cx="250" cy="175" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="250" y="180" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">中</text>

    <!-- 箭头 3→4 -->
    <line x1="272" y1="175" x2="308" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- 节点 4 -->
    <circle cx="330" cy="175" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="330" y="180" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">国</text>

    <!-- 顺序依赖标注 -->
    <g transform="translate(200, 230)">
      <rect x="-80" y="-12" width="160" height="24" rx="12" fill="#409EFF" opacity="0.08"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e">顺序依赖：后词依赖前词</text>
    </g>

    <!-- 等待时间图示 -->
    <g transform="translate(80, 280)">
      <text x="0" y="0" text-anchor="start" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e">处理时间：</text>
      <!-- 时间条 -->
      <rect x="0" y="8" width="260" height="10" rx="5" fill="#e8f0fe"/>
      <rect x="0" y="8" width="260" height="10" rx="5" fill="#409EFF" opacity="0.5"/>
      <text x="130" y="34" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#409EFF">T1 → T2 → T3 → T4（依次等待）</text>
    </g>

    <!-- 缺点标注 -->
    <g transform="translate(200, 340)">
      <line x1="-100" y1="0" x2="100" y2="0" stroke="#e0e7ef" stroke-width="1"/>
      <text x="0" y="18" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">⚠ 无法并行，长序列效率低</text>
    </g>

    <!-- 底部标注 -->
    <g transform="translate(200, 390)">
      <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#409EFF" opacity="0.1"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="#409EFF">逐词处理</text>
    </g>
  </g>

  <!-- ========== 右侧：Transformer 并行处理 ========== -->
  <g transform="translate(0,0)">
    <!-- 右侧面板 -->
    <rect x="430" y="60" width="340" height="400" rx="14" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.2" filter="url(#shadow)"/>

    <!-- 面板标题 -->
    <rect x="450" y="78" width="180" height="30" rx="6" fill="#409EFF" opacity="0.12"/>
    <text x="540" y="98" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#409EFF">Transformer 并行处理</text>

    <!-- 并行处理图标：多箭头 -->
    <g transform="translate(620, 85)">
      <line x1="-60" y1="-8" x2="60" y2="-8" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-60" y1="8" x2="60" y2="8" stroke="#409EFF" stroke-width="1.5"/>
      <polygon points="60,-8 52,-13 52,-3" fill="#409EFF"/>
      <polygon points="60,0 52,-5 52,5" fill="#409EFF"/>
      <polygon points="60,8 52,3 52,13" fill="#409EFF"/>
      <text x="0" y="-18" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#409EFF">并行</text>
    </g>

    <!-- 自注意力中心枢纽 -->
    <circle cx="600" cy="220" r="45" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="600" cy="220" r="28" fill="#409EFF" opacity="0.2"/>
    <circle cx="600" cy="220" r="18" fill="#409EFF" opacity="0.35"/>
    <text x="600" y="215" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">自</text>
    <text x="600" y="230" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">注意力</text>

    <!-- 连接线：所有节点连接到中心 -->
    <!-- 节点 1（左上）→ 中心 -->
    <line x1="490" y1="155" x2="582" y2="202" stroke="#409EFF" stroke-width="1.2" opacity="0.35"/>
    <!-- 节点 2（右上）→ 中心 -->
    <line x1="710" y1="155" x2="618" y2="202" stroke="#409EFF" stroke-width="1.2" opacity="0.35"/>
    <!-- 节点 3（左下）→ 中心 -->
    <line x1="490" y1="285" x2="582" y2="238" stroke="#409EFF" stroke-width="1.2" opacity="0.35"/>
    <!-- 节点 4（右下）→ 中心 -->
    <line x1="710" y1="285" x2="618" y2="238" stroke="#409EFF" stroke-width="1.2" opacity="0.35"/>

    <!-- 节点间水平连接 -->
    <line x1="490" y1="155" x2="710" y2="155" stroke="#409EFF" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,3"/>
    <line x1="490" y1="285" x2="710" y2="285" stroke="#409EFF" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,3"/>
    <line x1="490" y1="155" x2="490" y2="285" stroke="#409EFF" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,3"/>
    <line x1="710" y1="155" x2="710" y2="285" stroke="#409EFF" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,3"/>

    <!-- 节点 1 -->
    <circle cx="490" cy="155" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="490" y="160" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">我</text>

    <!-- 节点 2 -->
    <circle cx="710" cy="155" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="710" y="160" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">爱</text>

    <!-- 节点 3 -->
    <circle cx="490" cy="285" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="490" y="290" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">中</text>

    <!-- 节点 4 -->
    <circle cx="710" cy="285" r="22" fill="#409EFF" opacity="0.9" filter="url(#glow)"/>
    <text x="710" y="290" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#ffffff" font-weight="bold">国</text>

    <!-- 同时处理标注 -->
    <g transform="translate(600, 340)">
      <rect x="-90" y="-12" width="180" height="24" rx="12" fill="#409EFF" opacity="0.08"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e">全局依赖：所有词同时交互</text>
    </g>

    <!-- 时间图示 -->
    <g transform="translate(480, 280)">
      <text x="0" y="80" text-anchor="start" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e">处理时间：</text>
      <rect x="0" y="88" width="260" height="10" rx="5" fill="#e8f0fe"/>
      <rect x="0" y="88" width="260" height="10" rx="5" fill="#409EFF" opacity="0.5"/>
      <text x="130" y="114" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#409EFF">T1（所有词同时处理）</text>
    </g>

    <!-- 优点标注 -->
    <g transform="translate(600, 390)">
      <line x1="-100" y1="0" x2="100" y2="0" stroke="#e0e7ef" stroke-width="1"/>
      <text x="0" y="18" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">✓ 并行计算，长序列效率高</text>
    </g>

    <!-- 底部标注 -->
    <g transform="translate(600, 440)">
      <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#409EFF" opacity="0.1"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="#409EFF">同时处理所有词</text>
    </g>
  </g>

  <!-- 中间分隔装饰 -->
  <line x1="385" y1="80" x2="385" y2="440" stroke="#409EFF" stroke-width="1" opacity="0.15" stroke-dasharray="6,4"/>

  <!-- 底部对比标注 -->
  <g transform="translate(400, 480)">
    <text x="0" y="0" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">顺序处理 vs 并行处理 — 自注意力机制实现全局依赖建模</text>
  </g>

</svg>