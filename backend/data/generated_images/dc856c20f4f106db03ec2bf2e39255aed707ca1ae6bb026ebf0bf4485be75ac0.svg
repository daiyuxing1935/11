<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">智能体安全公式</text>
  <line x1="280" y1="60" x2="520" y2="60" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 等号 -->
  <text x="70" y="200" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#1a1a2e">智能体安全</text>
  <text x="70" y="240" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#409EFF">=</text>

  <!-- 模块1：最小权限 -->
  <rect x="130" y="140" width="130" height="140" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.12))"/>
  <!-- 锁图标 -->
  <g transform="translate(175, 175)" fill="none" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round">
    <rect x="-12" y="-4" width="24" height="18" rx="3"/>
    <path d="M-6,-4 V-10 A6,6 0 0 1 6,-10 V-4"/>
    <circle cx="0" cy="8" r="2.5" fill="#409EFF"/>
  </g>
  <text x="195" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">最小权限</text>
  <text x="195" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a5a7a">Least Privilege</text>

  <!-- 乘号1 -->
  <text x="280" y="210" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#409EFF">×</text>

  <!-- 模块2：纵深防御 -->
  <rect x="310" y="140" width="130" height="140" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.12))"/>
  <!-- 盾牌图标 -->
  <g transform="translate(355, 175)" fill="none" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round">
    <path d="M0,-14 L10,-8 L10,4 C10,10 0,16 0,16 C0,16 -10,10 -10,4 V-8 Z"/>
    <path d="M0,-10 L6,-6 L6,2 C6,7 0,11 0,11 C0,11 -6,7 -6,2 V-6 Z" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="375" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">纵深防御</text>
  <text x="375" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a5a7a">Defense-in-Depth</text>

  <!-- 乘号2 -->
  <text x="460" y="210" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#409EFF">×</text>

  <!-- 模块3：持续监控 -->
  <rect x="490" y="140" width="130" height="140" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.12))"/>
  <!-- 眼睛/监控图标 -->
  <g transform="translate(535, 175)" fill="none" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round">
    <path d="M-14,0 C-10,-8 10,-8 14,0 C10,8 -10,8 -14,0 Z"/>
    <circle cx="0" cy="0" r="3.5" fill="#409EFF"/>
    <path d="M-8,-4 L8,4" stroke-width="1.2" opacity="0.5"/>
  </g>
  <text x="555" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">持续监控</text>
  <text x="555" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a5a7a">Continuous Monitoring</text>

  <!-- 乘号3 -->
  <text x="640" y="210" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#409EFF">×</text>

  <!-- 模块4：快速响应 -->
  <rect x="660" y="140" width="130" height="140" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.12))"/>
  <!-- 闪电图标 -->
  <g transform="translate(705, 175)" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4,-14 L-4,2 H3 L-3,14"/>
  </g>
  <text x="725" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">快速响应</text>
  <text x="725" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a5a7a">Rapid Response</text>

  <!-- 底部说明栏 -->
  <rect x="100" y="330" width="600" height="100" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" opacity="0.85" filter="drop-shadow(0 2px 8px rgba(64,158,255,0.08))"/>
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">安全原则总结</text>
  <text x="400" y="385" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#3a3a5e">智能体安全通过四个核心维度相乘实现，缺一不可</text>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a5a7a">任何一项为零，整体安全即为零</text>

  <!-- 装饰性连接线（模块间底部弧线） -->
  <path d="M260,250 Q270,280 310,250" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
  <path d="M440,250 Q450,280 490,250" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
  <path d="M620,250 Q630,280 660,250" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
</svg>