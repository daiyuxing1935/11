<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="white" rx="12"/>
  <rect x="20" y="20" width="760" height="460" fill="url(#bgGrad)" rx="10"/>

  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">自由文本 vs 结构化输出</text>

  <!-- 左侧区域：自由文本输出 -->
  <rect x="50" y="80" width="320" height="340" rx="12" fill="white" stroke="#e0e0e0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="110" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">自由文本输出</text>
  <text x="210" y="128" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">Free Text Output</text>

  <!-- 自由文本气泡 -->
  <rect x="75" y="145" width="270" height="180" rx="10" fill="#fff5f5" stroke="#ffcdd2" stroke-width="1.5"/>
  <text x="95" y="170" font-family="sans-serif" font-size="13" fill="#c62828" opacity="0.7">用户说：“我需要一份</text>
  <text x="95" y="190" font-family="sans-serif" font-size="13" fill="#c62828" opacity="0.7">关于人工智能的报告，</text>
  <text x="95" y="210" font-family="sans-serif" font-size="13" fill="#c62828" opacity="0.7">包含最新进展和未来</text>
  <text x="95" y="230" font-family="sans-serif" font-size="13" fill="#c62828" opacity="0.7">趋势分析，最好有案</text>
  <text x="95" y="250" font-family="sans-serif" font-size="13" fill="#c62828" opacity="0.7">例研究，还有...”</text>

  <!-- 红色问号 -->
  <circle cx="310" cy="160" r="18" fill="#ff5252" opacity="0.9"/>
  <text x="310" y="167" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="white">?</text>

  <!-- 困惑的人物 -->
  <g transform="translate(210, 355)">
    <circle cx="0" cy="-30" r="14" fill="#ffcdd2" stroke="#e57373" stroke-width="1.2"/>
    <path d="M-18,-10 Q0,5 18,-10" fill="none" stroke="#e57373" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-16" x2="0" y2="10" stroke="#e57373" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-14" y1="-5" x2="14" y2="-5" stroke="#e57373" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 汗水滴 -->
    <circle cx="16" cy="-38" r="3" fill="#64b5f6" opacity="0.6"/>
    <circle cx="20" cy="-32" r="2" fill="#64b5f6" opacity="0.4"/>
  </g>

  <!-- 左侧标注 -->
  <rect x="65" y="420" width="90" height="24" rx="12" fill="#ff5252" opacity="0.15"/>
  <text x="110" y="436" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c62828">难以解析</text>

  <rect x="175" y="420" width="90" height="24" rx="12" fill="#ff5252" opacity="0.15"/>
  <text x="220" y="436" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c62828">格式混乱</text>

  <!-- 转换箭头 -->
  <g filter="url(#glow)">
    <line x1="385" y1="250" x2="415" y2="250" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <polygon points="415,243 428,250 415,257" fill="#409EFF"/>
  </g>
  <text x="400" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">转换</text>

  <!-- 右侧区域：结构化输出 -->
  <rect x="430" y="80" width="320" height="340" rx="12" fill="white" stroke="#e0e0e0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="110" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">结构化输出</text>
  <text x="590" y="128" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">Structured Output</text>

  <!-- JSON 代码块 -->
  <rect x="455" y="145" width="270" height="195" rx="8" fill="#1a1a2e" stroke="#409EFF" stroke-width="1.5"/>
  <text x="470" y="170" font-family="monospace" font-size="12" fill="#a8d8ff">{</text>
  <text x="480" y="190" font-family="monospace" font-size="12" fill="#66b3ff">"title"</text>
  <text x="540" y="190" font-family="monospace" font-size="12" fill="#e0e0e0">: "AI 报告",</text>
  <text x="480" y="210" font-family="monospace" font-size="12" fill="#66b3ff">"category"</text>
  <text x="555" y="210" font-family="monospace" font-size="12" fill="#e0e0e0">: "科技",</text>
  <text x="480" y="230" font-family="monospace" font-size="12" fill="#66b3ff">"sections"</text>
  <text x="555" y="230" font-family="monospace" font-size="12" fill="#e0e0e0">: [</text>
  <text x="490" y="250" font-family="monospace" font-size="12" fill="#a8d8ff">"最新进展",</text>
  <text x="490" y="268" font-family="monospace" font-size="12" fill="#a8d8ff">"未来趋势",</text>
  <text x="490" y="286" font-family="monospace" font-size="12" fill="#a8d8ff">"案例研究"</text>
  <text x="480" y="304" font-family="monospace" font-size="12" fill="#e0e0e0">],</text>
  <text x="480" y="324" font-family="monospace" font-size="12" fill="#66b3ff">"length"</text>
  <text x="540" y="324" font-family="monospace" font-size="12" fill="#e0e0e0">: "3000字"</text>
  <text x="470" y="344" font-family="monospace" font-size="12" fill="#a8d8ff">}</text>

  <!-- 齿轮/代码图标 -->
  <g transform="translate(590, 360)">
    <circle cx="0" cy="0" r="16" fill="#409EFF" opacity="0.15"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="8" x2="8" y2="-8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 右侧标注 -->
  <rect x="445" y="420" width="90" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="490" y="436" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a5a8a">易于解析</text>

  <rect x="555" y="420" width="90" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="600" y="436" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a5a8a">直接处理</text>

  <rect x="665" y="420" width="70" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="700" y="436" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a5a8a">自动化</text>

</svg>