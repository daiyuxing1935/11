<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="pubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE3"/>
    </linearGradient>
    <linearGradient id="brokerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#1D6FD4"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#A0CFFF" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#90B8D8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">发布/订阅模式（Pub/Sub）核心角色</text>

  <!-- 顶部装饰线 -->
  <line x1="160" y1="50" x2="640" y2="50" stroke="#409EFF" stroke-width="2" opacity="0.3"/>

  <!-- ==================== 发布者（左） ==================== -->
  <!-- 发布者容器 -->
  <rect x="50" y="120" width="170" height="260" rx="14" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)" opacity="0.95"/>
  <rect x="50" y="120" width="170" height="42" rx="14" fill="url(#pubGrad)" opacity="0.9"/>
  <rect x="50" y="148" width="170" height="14" fill="url(#pubGrad)" opacity="0.9"/>

  <!-- 发布者标题 -->
  <text x="135" y="147" text-anchor="middle" font-size="16" font-weight="bold" fill="white">发布者（Publisher）</text>

  <!-- 发布者内部图标 -->
  <circle cx="135" cy="210" r="28" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="135" y="216" text-anchor="middle" font-size="22" fill="#409EFF">📤</text>

  <!-- 发布者标签 -->
  <text x="135" y="270" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">事件生产者</text>
  <text x="135" y="292" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">发送事件消息</text>

  <!-- 发布者底部标签 -->
  <rect x="75" y="330" width="120" height="30" rx="15" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="135" y="349" text-anchor="middle" font-size="12" fill="#409EFF">App / Service</text>

  <!-- ==================== 事件信封（中间偏左） ==================== -->
  <rect x="240" y="195" width="80" height="65" rx="6" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <!-- 信封折线 -->
  <polyline points="240,195 280,230 320,195" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="260" x2="320" y2="260" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
  <!-- 主题标签 -->
  <rect x="248" y="202" width="64" height="18" rx="3" fill="#409EFF" opacity="0.15"/>
  <text x="280" y="215" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="bold">主题: order</text>
  <!-- 负载 -->
  <text x="280" y="242" text-anchor="middle" font-size="10" fill="#1a1a2e" opacity="0.6">{"id": 123}</text>

  <!-- 从发布者到信封的箭头 -->
  <line x1="220" y1="230" x2="238" y2="228" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ==================== 代理/消息代理（中） ==================== -->
  <rect x="330" y="100" width="180" height="300" rx="16" fill="white" stroke="#409EFF" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="330" y="100" width="180" height="48" rx="16" fill="url(#brokerGrad)"/>
  <rect x="330" y="134" width="180" height="14" fill="url(#brokerGrad)"/>

  <text x="420" y="131" text-anchor="middle" font-size="16" font-weight="bold" fill="white">代理（Broker）</text>

  <!-- 代理内部结构 -->
  <rect x="350" y="165" width="140" height="35" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="420" y="188" text-anchor="middle" font-size="13" fill="#1a1a2e">订阅管理</text>

  <rect x="350" y="212" width="140" height="35" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="420" y="235" text-anchor="middle" font-size="13" fill="#1a1a2e">消息路由</text>

  <rect x="350" y="259" width="140" height="35" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="420" y="282" text-anchor="middle" font-size="13" fill="#1a1a2e">事件分发</text>

  <!-- 代理内部连接线 -->
  <line x1="420" y1="200" x2="420" y2="212" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="420" y1="247" x2="420" y2="259" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

  <!-- 代理底部 -->
  <rect x="360" y="320" width="120" height="28" rx="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="420" y="339" text-anchor="middle" font-size="12" fill="#409EFF">RabbitMQ / Kafka</text>

  <!-- 从信封到代理的箭头 -->
  <line x1="320" y1="228" x2="328" y2="228" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ==================== 订阅者（右） ==================== -->
  <!-- 订阅者容器 -->
  <rect x="560" y="80" width="200" height="340" rx="14" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)" opacity="0.95"/>
  <rect x="560" y="80" width="200" height="42" rx="14" fill="url(#subGrad)" opacity="0.9"/>
  <rect x="560" y="108" width="200" height="14" fill="url(#subGrad)" opacity="0.9"/>

  <text x="660" y="107" text-anchor="middle" font-size="16" font-weight="bold" fill="white">订阅者（Subscriber）</text>

  <!-- 订阅者 A -->
  <rect x="580" y="140" width="160" height="60" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="600" cy="170" r="14" fill="#409EFF" opacity="0.2"/>
  <text x="600" y="175" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">A</text>
  <text x="625" y="166" font-size="13" fill="#1a1a2e" font-weight="bold">服务 A</text>
  <text x="625" y="186" font-size="11" fill="#1a1a2e" opacity="0.6">处理订单事件</text>

  <!-- 订阅者 B -->
  <rect x="580" y="220" width="160" height="60" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="600" cy="250" r="14" fill="#409EFF" opacity="0.2"/>
  <text x="600" y="255" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">B</text>
  <text x="625" y="246" font-size="13" fill="#1a1a2e" font-weight="bold">服务 B</text>
  <text x="625" y="266" font-size="11" fill="#1a1a2e" opacity="0.6">处理通知事件</text>

  <!-- 订阅者 C -->
  <rect x="580" y="300" width="160" height="60" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="600" cy="330" r="14" fill="#409EFF" opacity="0.2"/>
  <text x="600" y="335" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">C</text>
  <text x="625" y="326" font-size="13" fill="#1a1a2e" font-weight="bold">服务 C</text>
  <text x="625" y="346" font-size="11" fill="#1a1a2e" opacity="0.6">处理日志事件</text>

  <!-- 从代理到订阅者的箭头（三条虚线） -->
  <line x1="510" y1="170" x2="578" y2="170" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <line x1="510" y1="250" x2="578" y2="250" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <line x1="510" y1="330" x2="578" y2="330" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>

  <!-- ==================== 解耦标注 ==================== -->
  <!-- 顶部解耦标注 -->
  <rect x="240" y="62" width="320" height="28" rx="14" fill="white" stroke="#FF6B6B" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="81" text-anchor="middle" font-size="13" fill="#FF6B6B" font-weight="bold">发布者不知道谁接收，订阅者不知道谁发送</text>

  <!-- 解耦断开线标注 -->
  <!-- 发布者与代理之间的断开标记 -->
  <line x1="225" y1="195" x2="225" y2="265" stroke="#90B8D8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="325" y1="195" x2="325" y2="265" stroke="#90B8D8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- 代理与订阅者之间的断开标记 -->
  <line x1="555" y1="145" x2="555" y2="355" stroke="#90B8D8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- ==================== 标注 ==================== -->
  <!-- 标注 1：发布事件 -->
  <rect x="230" y="300" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="270" y="316" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">① 发布事件</text>

  <!-- 标注 2：订阅管理 -->
  <rect x="355" y="355" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="395" y="371" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">② 管理订阅</text>

  <!-- 标注 3：路由匹配 -->
  <rect x="355" y="385" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="395" y="401" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">③ 路由匹配</text>

  <!-- 标注 4：分发事件 -->
  <rect x="490" y="355" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="530" y="371" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">④ 分发事件</text>

  <!-- 标注 5：解耦 -->
  <rect x="490" y="385" width="80" height="24" rx="12" fill="#FF6B6B" opacity="0.12"/>
  <text x="530" y="401" text-anchor="middle" font-size="12" fill="#FF6B6B" font-weight="bold">⑤ 解耦</text>

  <!-- 标注 6：异步 -->
  <rect x="230" y="330" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="270" y="346" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">⑥ 异步通信</text>

  <!-- ==================== 底部说明 ==================== -->
  <line x1="100" y1="455" x2="700" y2="455" stroke="#409EFF" stroke-width="1" opacity="0.2"/>
  <text x="400" y="478" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.5">Pub/Sub 模式：发布者与订阅者通过代理解耦，实现异步、可扩展的事件驱动架构</text>

</svg>