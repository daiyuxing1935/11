<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EAF8"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD9"/>
    </linearGradient>
    <linearGradient id="vertexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">管理者核心职责五边形图</text>

  <!-- 五边形顶点坐标 (中心 400, 240, 半径 140) -->
  <!-- 顶点: 上(400,100), 右上(533,167), 右下(483,313), 左下(317,313), 左下(267,167) -->

  <!-- 五边形连线 -->
  <polygon points="400,100 533,167 483,313 317,313 267,167" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- 内部连线到中心 -->
  <line x1="400" y1="100" x2="400" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="533" y1="167" x2="400" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="483" y1="313" x2="400" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="317" y1="313" x2="400" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="267" y1="167" x2="400" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>

  <!-- 流程箭头 (顺时针) -->
  <!-- 上 -> 右上 -->
  <line x1="440" y1="115" x2="505" y2="145" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <!-- 右上 -> 右下 -->
  <line x1="540" y1="200" x2="520" y2="280" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <!-- 右下 -> 左下 -->
  <line x1="450" y1="320" x2="350" y2="320" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <!-- 左下 -> 左上 -->
  <line x1="280" y1="280" x2="260" y2="200" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <!-- 左上 -> 上 -->
  <line x1="300" y1="145" x2="365" y2="115" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" opacity="0.6"/>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF" opacity="0.6"/>
    </marker>
  </defs>

  <!-- 中心圆形 - 管理者代理 -->
  <circle cx="400" cy="240" r="38" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <circle cx="400" cy="240" r="38" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <!-- 大脑图标 -->
  <g transform="translate(400,240)">
    <path d="M-12,-8 C-12,-14 -6,-16 -2,-14 C0,-12 2,-12 4,-14 C8,-16 14,-14 14,-8 C14,-4 12,-2 14,2 C16,6 14,12 10,14 C6,16 2,14 0,12 C-2,14 -6,16 -10,14 C-14,12 -16,6 -14,2 C-12,-2 -14,-4 -12,-8 Z" fill="#FFFFFF" opacity="0.9"/>
    <path d="M-6,-6 C-6,-8 -2,-9 0,-8 C2,-9 6,-8 6,-6 C6,-4 4,-3 0,-2 C-4,-3 -6,-4 -6,-6 Z" fill="#409EFF"/>
    <path d="M-4,2 C-4,0 -2,-1 0,0 C2,-1 4,0 4,2 C4,4 2,5 0,4 C-2,5 -4,4 -4,2 Z" fill="#409EFF"/>
    <line x1="-8" y1="6" x2="8" y2="6" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
    <line x1="-6" y1="9" x2="6" y2="9" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="400" y="295" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">管理者代理</text>

  <!-- 顶点 1: 任务分解 (上) -->
  <g transform="translate(400,100)">
    <rect x="-60" y="-28" width="120" height="56" rx="28" fill="url(#vertexGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 大任务拆分为小方块图标 -->
    <rect x="-22" y="-14" width="12" height="12" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="-6" y="-14" width="12" height="12" rx="2" fill="#409EFF" opacity="0.85"/>
    <rect x="10" y="-14" width="12" height="12" rx="2" fill="#409EFF"/>
    <rect x="-22" y="2" width="12" height="12" rx="2" fill="#409EFF" opacity="0.55"/>
    <rect x="-6" y="2" width="12" height="12" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="10" y="2" width="12" height="12" rx="2" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">任务分解</text>
  </g>

  <!-- 顶点 2: 人员匹配 (右上) -->
  <g transform="translate(533,167)">
    <rect x="-60" y="-28" width="120" height="56" rx="28" fill="url(#vertexGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 拼图块图标 -->
    <path d="M-18,-8 C-18,-14 -12,-14 -10,-10 L-6,-10 C-4,-14 2,-14 2,-8 L6,-8 C10,-8 10,-2 6,0 L6,4 C10,6 10,12 6,12 L2,12 C0,16 -6,16 -8,12 L-12,12 C-16,12 -16,6 -12,4 L-12,0 C-16,-2 -16,-8 -12,-8 Z" fill="#409EFF" opacity="0.85"/>
    <path d="M-6,-4 L-2,-4 L-2,0 L2,0 L2,4 L-2,4 L-2,8 L-6,8 L-6,4 L-10,4 L-10,0 L-6,0 Z" fill="#FFFFFF" opacity="0.7"/>
    <text x="0" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">人员匹配</text>
  </g>

  <!-- 顶点 3: 进度追踪 (右下) -->
  <g transform="translate(483,313)">
    <rect x="-60" y="-28" width="120" height="56" rx="28" fill="url(#vertexGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 仪表盘图标 -->
    <rect x="-20" y="-14" width="16" height="20" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="-20" y="-14" width="16" height="12" rx="2" fill="#409EFF" opacity="0.85"/>
    <rect x="0" y="-14" width="16" height="20" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="0" y="-14" width="16" height="8" rx="2" fill="#409EFF" opacity="0.85"/>
    <rect x="20" y="-14" width="16" height="20" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="20" y="-14" width="16" height="16" rx="2" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">进度追踪</text>
  </g>

  <!-- 顶点 4: 结果汇总 (左下) -->
  <g transform="translate(317,313)">
    <rect x="-60" y="-28" width="120" height="56" rx="28" fill="url(#vertexGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 多输入合并为单输出图标 -->
    <line x1="-20" y1="-10" x2="0" y2="0" stroke="#409EFF" stroke-width="2" opacity="0.6"/>
    <line x1="-20" y1="0" x2="0" y2="0" stroke="#409EFF" stroke-width="2" opacity="0.6"/>
    <line x1="-20" y1="10" x2="0" y2="0" stroke="#409EFF" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="18" y2="0" stroke="#409EFF" stroke-width="2.5"/>
    <polygon points="18,-5 26,0 18,5" fill="#409EFF"/>
    <circle cx="-20" cy="-10" r="3" fill="#409EFF" opacity="0.5"/>
    <circle cx="-20" cy="0" r="3" fill="#409EFF" opacity="0.7"/>
    <circle cx="-20" cy="10" r="3" fill="#409EFF" opacity="0.5"/>
    <text x="0" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">结果汇总</text>
  </g>

  <!-- 顶点 5: 异常处理 (左上) -->
  <g transform="translate(267,167)">
    <rect x="-60" y="-28" width="120" height="56" rx="28" fill="url(#vertexGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 错误盾牌图标 -->
    <path d="M-4,-16 L-16,-10 L-16,2 C-16,10 -4,16 -4,16 C-4,16 8,10 8,2 L8,-10 Z" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <path d="M-4,-16 L-16,-10 L-16,2 C-16,10 -4,16 -4,16 C-4,16 8,10 8,2 L8,-10 Z" fill="#409EFF" opacity="0.2"/>
    <line x1="-10" y1="-4" x2="2" y2="8" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="-4" x2="-10" y2="8" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">异常处理</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="470" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">五大核心职责相互关联，形成闭环管理流程</text>

  <!-- 装饰性小点 -->
  <circle cx="120" cy="80" r="4" fill="#409EFF" opacity="0.15"/>
  <circle cx="680" cy="80" r="3" fill="#409EFF" opacity="0.12"/>
  <circle cx="100" cy="420" r="5" fill="#409EFF" opacity="0.1"/>
  <circle cx="700" cy="430" r="4" fill="#409EFF" opacity="0.12"/>
  <circle cx="650" cy="60" r="3" fill="#409EFF" opacity="0.15"/>
  <circle cx="150" cy="450" r="3" fill="#409EFF" opacity="0.1"/>
</svg>