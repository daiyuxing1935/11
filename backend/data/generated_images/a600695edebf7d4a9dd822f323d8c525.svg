<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EEFA"/>
    </linearGradient>
    <linearGradient id="badgeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">角色激活 · 从AI到学术导师</text>

  <!-- ========== 左侧：普通AI机器人 ========== -->
  <g transform="translate(130, 160)">
    <!-- 机器人身体 -->
    <rect x="-35" y="30" width="70" height="80" rx="12" fill="#E0E7EF" stroke="#1a1a2e" stroke-width="2"/>
    <!-- 机器人头部 -->
    <rect x="-30" y="-10" width="60" height="50" rx="25" fill="#E0E7EF" stroke="#1a1a2e" stroke-width="2"/>
    <!-- 眼睛 -->
    <circle cx="-10" cy="12" r="5" fill="#1a1a2e"/>
    <circle cx="10" cy="12" r="5" fill="#1a1a2e"/>
    <!-- 嘴巴 -->
    <line x1="-8" y1="28" x2="8" y2="28" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
    <!-- 天线 -->
    <line x1="0" y1="-10" x2="0" y2="-25" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="0" cy="-28" r="4" fill="#409EFF"/>
    <!-- 手臂 -->
    <rect x="-50" y="40" width="15" height="40" rx="7" fill="#E0E7EF" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="35" y="40" width="15" height="40" rx="7" fill="#E0E7EF" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- 问号 -->
    <text x="0" y="-50" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#409EFF">?</text>
  </g>

  <!-- 左侧标注 -->
  <text x="130" y="310" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">通用AI</text>
  <text x="130" y="330" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">未激活状态</text>

  <!-- ========== 中间：身份徽章 ========== -->
  <g transform="translate(400, 250)">
    <!-- 发光圆环 -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#409EFF" stroke-width="3" opacity="0.3" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.5"/>
    <!-- 徽章主体 -->
    <rect x="-40" y="-40" width="80" height="80" rx="16" fill="white" stroke="#409EFF" stroke-width="2.5" filter="url(#softGlow)"/>
    <!-- 徽章内图标 -->
    <path d="M-15,-10 L15,-10 L15,10 L0,20 L-15,10 Z" fill="#409EFF" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">AI</text>
    <!-- 标签文字 -->
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">教授</text>
    <text x="0" y="72" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">Professor</text>
  </g>

  <!-- 中间标注 - 调整位置避免重叠 -->
  <text x="400" y="345" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">角色身份徽章</text>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">激活中</text>

  <!-- ========== 右侧：激活后的教授AI ========== -->
  <g transform="translate(670, 160)">
    <!-- 机器人身体 -->
    <rect x="-35" y="30" width="70" height="80" rx="12" fill="#D6E9F8" stroke="#409EFF" stroke-width="2"/>
    <!-- 机器人头部 -->
    <rect x="-30" y="-10" width="60" height="50" rx="25" fill="#D6E9F8" stroke="#409EFF" stroke-width="2"/>
    <!-- 眼睛（更智能的表情） -->
    <circle cx="-10" cy="12" r="5" fill="#1a1a2e"/>
    <circle cx="10" cy="12" r="5" fill="#1a1a2e"/>
    <circle cx="-8" cy="10" r="2" fill="white"/>
    <circle cx="12" cy="10" r="2" fill="white"/>
    <!-- 微笑嘴巴 -->
    <path d="M-8,25 Q0,32 8,25" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
    <!-- 天线 -->
    <line x1="0" y1="-10" x2="0" y2="-25" stroke="#409EFF" stroke-width="2"/>
    <circle cx="0" cy="-28" r="4" fill="#409EFF"/>
    <!-- 毕业帽 -->
    <rect x="-20" y="-38" width="40" height="8" rx="2" fill="#1a1a2e"/>
    <polygon points="-20,-30 0,-45 20,-30" fill="#1a1a2e"/>
    <circle cx="12" cy="-32" r="3" fill="#409EFF"/>
    <!-- 手臂（拿着教鞭） -->
    <rect x="-50" y="40" width="15" height="40" rx="7" fill="#D6E9F8" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="35" y="40" width="15" height="40" rx="7" fill="#D6E9F8" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 教鞭 -->
    <line x1="42" y1="45" x2="70" y2="10" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="70" cy="10" r="3" fill="#409EFF"/>
    <!-- 对话框 -->
    <rect x="45" y="-55" width="95" height="60" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="45,-5 55,-5 40,10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="45,-5 55,-5 40,10" fill="white"/>
    <text x="55" y="-38" font-family="sans-serif" font-size="11" fill="#1a1a2e">学术思维</text>
    <text x="55" y="-24" font-family="sans-serif" font-size="11" fill="#1a1a2e">批判性分析</text>
    <text x="55" y="-10" font-family="sans-serif" font-size="11" fill="#409EFF">研究方法</text>
  </g>

  <!-- 右侧标注 -->
  <text x="670" y="310" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">教授模式</text>
  <text x="670" y="330" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">已激活</text>

  <!-- ========== 底部说明文字 ========== -->
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" opacity="0.7">通过角色身份激活，AI从通用助手转变为专业学术导师</text>

  <!-- ========== 箭头连接 ========== -->
  <!-- 左到中 -->
  <line x1="210" y1="250" x2="340" y2="250" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="340,245 350,250 340,255" fill="#409EFF"/>
  <!-- 中到右 -->
  <line x1="460" y1="250" x2="590" y2="250" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="590,245 600,250 590,255" fill="#409EFF"/>

</svg>