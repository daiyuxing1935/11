<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="zoneLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EBEEF2"/>
    </linearGradient>
    <linearGradient id="zoneCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D6ECF9"/>
    </linearGradient>
    <linearGradient id="zoneRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#DCE8F5"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">工作流与智能体：统一导航隐喻</text>

  <!-- 左侧区域：工作流 = 地图导航 -->
  <rect x="30" y="58" width="230" height="260" rx="10" fill="url(#zoneLeft)" stroke="#D0D5DD" stroke-width="1.5"/>
  <rect x="30" y="58" width="230" height="36" rx="10" fill="#9CA3AF" opacity="0.3"/>
  <text x="145" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">工作流 = 地图导航</text>

  <!-- 道路 -->
  <rect x="60" y="120" width="170" height="8" rx="4" fill="#B0B8C4"/>
  <rect x="60" y="150" width="170" height="8" rx="4" fill="#B0B8C4"/>
  <rect x="60" y="180" width="170" height="8" rx="4" fill="#B0B8C4"/>
  <!-- 路标 -->
  <rect x="180" y="108" width="40" height="20" rx="3" fill="#6B7280"/>
  <text x="200" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">步骤A</text>
  <rect x="180" y="138" width="40" height="20" rx="3" fill="#6B7280"/>
  <text x="200" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">步骤B</text>
  <rect x="180" y="168" width="40" height="20" rx="3" fill="#6B7280"/>
  <text x="200" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">步骤C</text>

  <!-- 公交车 -->
  <rect x="80" y="130" width="30" height="18" rx="4" fill="#6B7280"/>
  <circle cx="88" cy="150" r="4" fill="#4B5563"/>
  <circle cx="102" cy="150" r="4" fill="#4B5563"/>
  <rect x="85" y="133" width="20" height="6" rx="2" fill="#9CA3AF"/>

  <!-- 标注 -->
  <rect x="55" y="210" width="180" height="28" rx="6" fill="#6B7280" opacity="0.15"/>
  <text x="145" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4B5563">标准化流程</text>
  <rect x="55" y="246" width="180" height="28" rx="6" fill="#6B7280" opacity="0.15"/>
  <text x="145" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4B5563">固定路线执行</text>

  <!-- 右侧区域：智能体 = 指南针导航 -->
  <rect x="540" y="58" width="230" height="260" rx="10" fill="url(#zoneRight)" stroke="#B3D4F7" stroke-width="1.5"/>
  <rect x="540" y="58" width="230" height="36" rx="10" fill="#409EFF" opacity="0.2"/>
  <text x="655" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">智能体 = 指南针导航</text>

  <!-- 开阔地形 -->
  <rect x="570" y="110" width="170" height="80" rx="6" fill="#E8F4FD" stroke="#B3D4F7" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- 目标星 -->
  <polygon points="720,100 725,112 738,112 728,120 732,133 720,125 708,133 712,120 702,112 715,112" fill="#409EFF" opacity="0.8"/>
  <text x="720" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">目标</text>

  <!-- 指南针 -->
  <circle cx="620" cy="140" r="22" fill="none" stroke="#409EFF" stroke-width="2"/>
  <circle cx="620" cy="140" r="18" fill="white" stroke="#409EFF" stroke-width="1"/>
  <polygon points="620,122 624,140 620,138 616,140" fill="#409EFF"/>
  <polygon points="620,158 616,140 620,142 624,140" fill="#409EFF" opacity="0.5"/>
  <line x1="620" y1="122" x2="620" y2="158" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="602" y1="140" x2="638" y2="140" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 人物 -->
  <circle cx="610" cy="200" r="8" fill="#409EFF"/>
  <rect x="605" y="208" width="10" height="18" rx="4" fill="#409EFF"/>
  <line x1="605" y1="215" x2="595" y2="225" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="615" y1="215" x2="625" y2="225" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="608" y1="226" x2="600" y2="238" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="612" y1="226" x2="620" y2="238" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 标注 -->
  <rect x="565" y="210" width="180" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="655" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">自主决策</text>
  <rect x="565" y="246" width="180" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="655" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">目标导向</text>

  <!-- 中间区域：混合 = 地图 + 指南针 -->
  <rect x="285" y="58" width="230" height="260" rx="10" fill="url(#zoneCenter)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="285" y="58" width="230" height="36" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">混合 = 地图 + 指南针</text>

  <!-- 主要道路 -->
  <rect x="310" y="120" width="180" height="8" rx="4" fill="#B0B8C4"/>
  <rect x="310" y="160" width="180" height="8" rx="4" fill="#B0B8C4"/>
  <!-- 交叉口 -->
  <rect x="380" y="115" width="8" height="60" rx="3" fill="#409EFF" opacity="0.4"/>

  <!-- 人物在交叉口 -->
  <circle cx="400" cy="145" r="9" fill="#409EFF"/>
  <rect x="395" y="154" width="10" height="18" rx="4" fill="#409EFF"/>
  <line x1="395" y1="161" x2="385" y2="171" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="405" y1="161" x2="415" y2="171" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="398" y1="172" x2="390" y2="184" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="402" y1="172" x2="410" y2="184" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 小指南针 -->
  <circle cx="430" cy="140" r="12" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="430,130 433,140 430,139 427,140" fill="#409EFF"/>

  <!-- 标注 -->
  <rect x="310" y="210" width="180" height="28" rx="6" fill="#409EFF" opacity="0.1"/>
  <text x="400" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">流程 + 判断</text>
  <rect x="310" y="246" width="180" height="28" rx="6" fill="#409EFF" opacity="0.1"/>
  <text x="400" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">实用黄金标准</text>

  <!-- 底部决策公式 -->
  <rect x="40" y="340" width="720" height="100" rx="12" fill="white" stroke="#D0D5DD" stroke-width="1.5"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">决策公式</text>

  <!-- 公式行 -->
  <rect x="60" y="385" width="200" height="36" rx="8" fill="#F5F7FA" stroke="#D0D5DD" stroke-width="1"/>
  <text x="160" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4B5563">有标准流程 → 工作流</text>

  <text x="275" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e">|</text>

  <rect x="290" y="385" width="220" height="36" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">按需判断 → 嵌入智能体</text>

  <text x="525" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e">|</text>

  <rect x="540" y="385" width="200" height="36" rx="8" fill="#E8F0FE" stroke="#409EFF" stroke-width="1.5"/>
  <text x="640" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">全按需 → 全智能体+护栏</text>

  <!-- 底部箭头指示 -->
  <polygon points="400,450 394,442 406,442" fill="#409EFF" opacity="0.5"/>
  <text x="400" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF">从左到右：确定性 → 灵活性递增</text>

</svg>