<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">需求分析决策流程</text>

  <!-- ========== 起始节点 ========== -->
  <rect x="310" y="50" width="180" height="40" rx="20" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="400" y="75" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">分析用户需求</text>

  <!-- 箭头：起始 → 菱形1 -->
  <line x1="400" y1="90" x2="400" y2="118" stroke="#1a1a2e" stroke-width="1.8"/>
  <polygon points="400,122 395,114 405,114" fill="#1a1a2e"/>

  <!-- ========== 菱形1：仅文本回复？ ========== -->
  <polygon points="400,122 540,165 400,208 260,165" fill="#ffffff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="160" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">仅需文本回复？</text>
  <text x="400" y="177" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">（无需外部系统操作）</text>

  <!-- 是（左分支） -->
  <text x="255" y="155" text-anchor="end" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">是</text>
  <line x1="260" y1="165" x2="170" y2="165" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="170" y1="165" x2="170" y2="240" stroke="#409EFF" stroke-width="1.8"/>
  <polygon points="170,244 165,236 175,236" fill="#409EFF"/>

  <!-- 否（右分支） -->
  <text x="545" y="155" text-anchor="start" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">否</text>
  <line x1="540" y1="165" x2="630" y2="165" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="630" y1="165" x2="630" y2="240" stroke="#409EFF" stroke-width="1.8"/>
  <polygon points="630,244 625,236 635,236" fill="#409EFF"/>

  <!-- ========== 菱形2：单轮足够？ ========== -->
  <polygon points="170,244 290,282 170,320 50,282" fill="#ffffff" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="170" y="278" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">单轮足够？</text>

  <!-- 菱形2 → 是（左侧） -->
  <text x="55" y="275" text-anchor="end" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">是</text>
  <line x1="50" y1="282" x2="50" y2="340" stroke="#409EFF" stroke-width="1.8"/>
  <polygon points="50,344 45,336 55,336" fill="#409EFF"/>

  <!-- 菱形2 → 否（下方） -->
  <text x="175" y="325" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">否</text>
  <line x1="170" y1="320" x2="170" y2="340" stroke="#409EFF" stroke-width="1.8"/>
  <polygon points="170,344 165,336 175,336" fill="#409EFF"/>

  <!-- ========== 菱形3：多步规划？ ========== -->
  <polygon points="630,244 750,282 630,320 510,282" fill="#ffffff" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="630" y="278" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">多步规划？</text>

  <!-- 菱形3 → 是（右侧） -->
  <text x="755" y="275" text-anchor="start" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">是</text>
  <line x1="750" y1="282" x2="750" y2="340" stroke="#409EFF" stroke-width="1.8"/>
  <polygon points="750,344 745,336 755,336" fill="#409EFF"/>

  <!-- 菱形3 → 否（下方） -->
  <text x="635" y="325" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">否</text>
  <line x1="630" y1="320" x2="630" y2="340" stroke="#409EFF" stroke-width="1.8"/>
  <polygon points="630,344 625,336 635,336" fill="#409EFF"/>

  <!-- ========== 结果节点 ========== -->

  <!-- 规则机器人（最简单） -->
  <rect x="10" y="350" width="80" height="40" rx="8" fill="#A8D8EA" filter="url(#shadow)"/>
  <text x="50" y="374" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">规则机器人</text>
  <text x="50" y="395" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">★☆☆ 最简单</text>

  <!-- 生成式机器人 -->
  <rect x="120" y="350" width="100" height="40" rx="8" fill="#A8D8EA" filter="url(#shadow)"/>
  <text x="170" y="374" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">生成式机器人</text>
  <text x="170" y="395" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">★★☆</text>

  <!-- 需要代理 -->
  <rect x="700" y="350" width="90" height="40" rx="8" fill="#409EFF" filter="url(#shadow)"/>
  <text x="745" y="374" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">需要代理</text>
  <text x="745" y="395" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#E0F0FF">★★★</text>

  <!-- 带工具的生成式机器人（简单代理） -->
  <rect x="570" y="350" width="120" height="40" rx="8" fill="#409EFF" filter="url(#shadow)"/>
  <text x="630" y="370" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">生成式+工具</text>
  <text x="630" y="387" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#E0F0FF">（简单代理）</text>
  <text x="630" y="402" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#E0F0FF">★★☆</text>

  <!-- ========== 总结标注 ========== -->
  <rect x="180" y="440" width="440" height="50" rx="10" fill="#1a1a2e" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="460" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">简单问题 → 聊天机器人（快速、低成本）</text>
  <text x="400" y="480" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#A8D8EA" font-weight="bold">复杂问题 → 代理（深入、高能力）</text>

  <!-- 图例 -->
  <rect x="15" y="445" width="12" height="12" rx="2" fill="#A8D8EA"/>
  <text x="32" y="456" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">聊天机器人路径</text>
  <rect x="130" y="445" width="12" height="12" rx="2" fill="#409EFF"/>
  <text x="147" y="456" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">代理路径</text>

</svg>