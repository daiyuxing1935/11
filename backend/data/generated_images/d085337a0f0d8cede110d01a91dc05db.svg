<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7fd6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI智能体的历史演进</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4a6a8a">理解智能体概念的发展脉络，有助于把握其本质</text>

  <!-- ========== LEFT PANEL: Traditional Program ========== -->
  <g transform="translate(30, 75)">
    <!-- Panel background -->
    <rect x="0" y="0" width="230" height="280" rx="12" fill="white" stroke="#409EFF" stroke-width="2"/>
    
    <!-- Panel label -->
    <rect x="0" y="0" width="230" height="36" rx="12" fill="#409EFF"/>
    <rect x="0" y="18" width="230" height="18" fill="#409EFF"/>
    <text x="115" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">传统程序</text>

    <!-- Conveyor belt machine -->
    <rect x="25" y="55" width="180" height="40" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1.5"/>
    <!-- Conveyor belt line -->
    <line x1="30" y1="75" x2="200" y2="75" stroke="#409EFF" stroke-width="2"/>
    <!-- Small circles on belt -->
    <circle cx="50" cy="75" r="4" fill="#409EFF"/>
    <circle cx="75" cy="75" r="4" fill="#409EFF"/>
    <circle cx="100" cy="75" r="4" fill="#409EFF"/>
    <circle cx="125" cy="75" r="4" fill="#409EFF"/>
    <circle cx="150" cy="75" r="4" fill="#409EFF"/>
    <circle cx="175" cy="75" r="4" fill="#409EFF"/>
    
    <!-- Gears -->
    <circle cx="45" cy="110" r="14" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="45" cy="110" r="6" fill="#409EFF"/>
    <line x1="45" y1="96" x2="45" y2="104" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="45" y1="116" x2="45" y2="124" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="31" y1="110" x2="39" y2="110" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="51" y1="110" x2="59" y2="110" stroke="#409EFF" stroke-width="1.5"/>

    <circle cx="115" cy="118" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="115" cy="118" r="4" fill="#409EFF"/>

    <circle cx="175" cy="110" r="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="175" cy="110" r="5" fill="#409EFF"/>

    <!-- Fixed path arrows -->
    <path d="M 30 140 L 200 140" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3"/>
    <polygon points="200,140 192,136 192,144" fill="#409EFF"/>
    <path d="M 30 155 L 200 155" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3"/>
    <polygon points="200,155 192,151 192,159" fill="#409EFF"/>

    <!-- Input/output indicators -->
    <rect x="30" y="170" width="75" height="28" rx="5" fill="#d9ecff" stroke="#409EFF" stroke-width="1"/>
    <text x="67" y="189" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">固定输入</text>
    <rect x="125" y="170" width="75" height="28" rx="5" fill="#d9ecff" stroke="#409EFF" stroke-width="1"/>
    <text x="162" y="189" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">固定输出</text>

    <!-- Description -->
    <text x="115" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">按预设规则执行</text>
    <text x="115" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">无法处理新情况</text>

    <!-- Label at bottom -->
    <rect x="65" y="255" width="100" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
    <text x="115" y="269" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">Tool 工具</text>
  </g>

  <!-- Arrow between panel 1 and 2 -->
  <g transform="translate(265, 215)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#409EFF" stroke-width="2"/>
    <polygon points="30,0 22,-5 22,5" fill="#409EFF"/>
  </g>

  <!-- ========== CENTER PANEL: LLM ========== -->
  <g transform="translate(295, 75)">
    <!-- Panel background -->
    <rect x="0" y="0" width="230" height="280" rx="12" fill="white" stroke="#409EFF" stroke-width="2"/>
    
    <!-- Panel label -->
    <rect x="0" y="0" width="230" height="36" rx="12" fill="#409EFF"/>
    <rect x="0" y="18" width="230" height="18" fill="#409EFF"/>
    <text x="115" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">大语言模型 (LLM)</text>

    <!-- Brain shape -->
    <path d="M 115 55 
             C 145 55, 165 65, 170 80 
             C 178 95, 175 110, 165 120 
             C 175 130, 178 145, 170 160 
             C 165 175, 145 185, 115 185 
             C 85 185, 65 175, 60 160 
             C 52 145, 55 130, 65 120 
             C 55 110, 52 95, 60 80 
             C 65 65, 85 55, 115 55 Z" 
          fill="#d9ecff" stroke="#409EFF" stroke-width="2"/>
    
    <!-- Brain fold lines -->
    <path d="M 90 80 C 100 75, 110 85, 115 75" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M 130 85 C 140 80, 145 90, 155 85" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M 80 110 C 95 105, 100 115, 115 108" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M 120 115 C 135 108, 140 120, 155 112" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M 85 145 C 100 138, 105 150, 115 142" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M 125 148 C 138 140, 145 155, 155 145" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>

    <!-- Books on shelves -->
    <rect x="35" y="70" width="12" height="16" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="50" y="72" width="10" height="14" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="63" y="68" width="14" height="18" rx="1" fill="#409EFF" opacity="0.5"/>
    
    <rect x="155" y="70" width="10" height="15" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="168" y="68" width="13" height="17" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="184" y="72" width="10" height="13" rx="1" fill="#409EFF" opacity="0.4"/>

    <!-- Shelf line -->
    <line x1="30" y1="90" x2="200" y2="90" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="170" x2="200" y2="170" stroke="#409EFF" stroke-width="1" opacity="0.3"/>

    <!-- Books on lower shelf -->
    <rect x="40" y="140" width="15" height="18" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="58" y="142" width="11" height="16" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="72" y="138" width="13" height="20" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="160" y="140" width="12" height="18" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="175" y="142" width="14" height="16" rx="1" fill="#409EFF" opacity="0.4"/>

    <!-- Knowledge rays -->
    <line x1="115" y1="55" x2="115" y2="42" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="155" y1="60" x2="170" y2="48" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="75" y1="60" x2="60" y2="48" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="170" y1="80" x2="185" y2="75" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="80" x2="45" y2="75" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>

    <!-- No hands indicator -->
    <text x="115" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">拥有海量知识</text>
    <text x="115" y="228" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">但无法执行操作</text>

    <!-- Label at bottom -->
    <rect x="65" y="255" width="100" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
    <text x="115" y="269" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">Knowledge 知识</text>
  </g>

  <!-- Arrow between panel 2 and 3 -->
  <g transform="translate(530, 215)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#409EFF" stroke-width="2"/>
    <polygon points="30,0 22,-5 22,5" fill="#409EFF"/>
  </g>

  <!-- ========== RIGHT PANEL: AI Agent ========== -->
  <g transform="translate(560, 75)">
    <!-- Panel background -->
    <rect x="0" y="0" width="230" height="280" rx="12" fill="white" stroke="#409EFF" stroke-width="2"/>
    
    <!-- Panel label -->
    <rect x="0" y="0" width="230" height="36" rx="12" fill="#409EFF"/>
    <rect x="0" y="18" width="230" height="18" fill="#409EFF"/>
    <text x="115" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">AI 智能体</text>

    <!-- Robot chef body -->
    <rect x="75" y="70" width="80" height="70" rx="10" fill="#d9ecff" stroke="#409EFF" stroke-width="2"/>
    
    <!-- Robot head -->
    <rect x="85" y="50" width="60" height="30" rx="8" fill="#d9ecff" stroke="#409EFF" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="100" cy="63" r="4" fill="#409EFF"/>
    <circle cx="130" cy="63" r="4" fill="#409EFF"/>
    <!-- Smile -->
    <path d="M 102 72 Q 115 80, 128 72" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    
    <!-- Antenna -->
    <line x1="115" y1="50" x2="115" y2="38" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="115" cy="35" r="4" fill="#409EFF"/>

    <!-- Apron -->
    <path d="M 85 100 L 85 140 L 145 140 L 145 100" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="85" y1="100" x2="145" y2="100" stroke="#409EFF" stroke-width="1.5"/>

    <!-- Arms with utensils -->
    <!-- Left arm -->
    <line x1="75" y1="90" x2="50" y2="80" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <!-- Spatula -->
    <rect x="30" y="70" width="6" height="20" rx="2" fill="#409EFF"/>
    <rect x="25" y="65" width="16" height="8" rx="3" fill="#409EFF"/>

    <!-- Right arm -->
    <line x1="155" y1="90" x2="180" y2="80" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <!-- Ladle -->
    <rect x="178" y="68" width="6" height="18" rx="2" fill="#409EFF"/>
    <circle cx="181" cy="65" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>

    <!-- Recipe book -->
    <rect x="52" y="130" width="18" height="22" rx="2" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="56" y1="137" x2="66" y2="137" stroke="#409EFF" stroke-width="1"/>
    <line x1="56" y1="142" x2="66" y2="142" stroke="#409EFF" stroke-width="1"/>
    <line x1="56" y1="147" x2="62" y2="147" stroke="#409EFF" stroke-width="1"/>

    <!-- Stove/flame -->
    <ellipse cx="115" cy="155" rx="20" ry="6" fill="#ffd700" opacity="0.4"/>
    <path d="M 105 155 Q 110 145, 115 155 Q 120 145, 125 155" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Pot -->
    <rect x="100" y="148" width="30" height="10" rx="3" fill="#409EFF" opacity="0.3" stroke="#409EFF" stroke-width="1"/>

    <!-- Ingredients -->
    <circle cx="35" cy="155" r="5" fill="#409EFF" opacity="0.4"/>
    <circle cx="48" cy="158" r="4" fill="#409EFF" opacity="0.3"/>
    <rect x="30" y="162" width="8" height="3" rx="1" fill="#409EFF" opacity="0.3"/>
    
    <circle cx="185" cy="155" r="5" fill="#409EFF" opacity="0.4"/>
    <circle cx="175" cy="160" r="4" fill="#409EFF" opacity="0.3"/>

    <!-- Description -->
    <text x="115" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">自主感知环境</text>
    <text x="115" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">规划并执行操作</text>

    <!-- Label at bottom -->
    <rect x="65" y="255" width="100" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
    <text x="115" y="269" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">Worker 工作者</text>
  </g>

  <!-- ========== BRIDGE METAPHOR at bottom ========== -->
  <g transform="translate(0, 380)">
    <!-- Bridge base -->
    <rect x="100" y="20" width="600" height="4" rx="2" fill="#409EFF" opacity="0.3"/>
    
    <!-- Three pillars -->
    <rect x="130" y="24" width="40" height="50" rx="4" fill="#409EFF" opacity="0.15"/>
    <rect x="380" y="24" width="40" height="50" rx="4" fill="#409EFF" opacity="0.15"/>
    <rect x="630" y="24" width="40" height="50" rx="4" fill="#409EFF" opacity="0.15"/>

    <!-- Labels -->
    <text x="150" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Tool</text>
    <text x="150" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">工具</text>
    
    <text x="400" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Knowledge</text>
    <text x="400" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">知识</text>
    
    <text x="650" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Worker</text>
    <text x="650" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4a6a8a">工作者</text>

    <!-- Arrows on bridge -->
    <path d="M 170 22 L 380 22" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="380,22 372,18 372,26" fill="#409EFF"/>
    <path d="M 420 22 L 630 22" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="630,22 622,18 622,26" fill="#409EFF"/>

    <!-- Evolution arrow -->
    <text x="400" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">演进方向：从被动工具 → 知识载体 → 主动工作者</text>
  </g>

  <!-- Bottom subtitle -->
  <text x="400" y="488" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8aa8c8">智能体 = 大模型 + 记忆 + 规划 + 工具使用</text>
</svg>