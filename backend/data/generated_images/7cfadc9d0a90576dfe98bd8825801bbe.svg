<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a8ee6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Token 与字符的区别</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ============ 左侧：中文示例 ============ -->
  <rect x="30" y="62" width="230" height="170" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="145" y="88" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">中文示例</text>

  <!-- 中文文本 -->
  <text x="50" y="118" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" fill="#1a1a2e">人工智能正在改变世界</text>

  <!-- 每个字符的框 -->
  <rect x="48" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="68" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="88" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="108" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="128" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="148" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="168" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="188" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="208" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="228" y="124" width="18" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>

  <text x="50" y="158" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666">10 个字符</text>

  <!-- 箭头 -->
  <line x1="145" y1="170" x2="145" y2="192" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- Token 计数器 -->
  <rect x="95" y="195" width="100" height="28" rx="14" fill="url(#tokenGrad)"/>
  <text x="145" y="214" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="white" font-weight="bold">约 15-20 tokens</text>

  <!-- 标注 1 -->
  <rect x="40" y="195" width="50" height="22" rx="4" fill="#ffd700" opacity="0.85"/>
  <text x="65" y="210" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#1a1a2e">中文分词</text>

  <!-- ============ 中间：英文示例 ============ -->
  <rect x="285" y="62" width="230" height="170" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="400" y="88" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">英文示例</text>

  <!-- 英文文本 -->
  <text x="305" y="118" font-family="'Segoe UI','Arial',sans-serif" font-size="15" fill="#1a1a2e">Artificial intelligence</text>
  <text x="305" y="140" font-family="'Segoe UI','Arial',sans-serif" font-size="15" fill="#1a1a2e">is changing</text>

  <!-- 每个单词的框 -->
  <rect x="303" y="120" width="70" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="375" y="120" width="70" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="303" y="142" width="20" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="325" y="142" width="65" height="18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>

  <text x="305" y="170" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666">4 个单词</text>

  <!-- 箭头 -->
  <line x1="400" y1="178" x2="400" y2="192" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Token 计数器 -->
  <rect x="350" y="195" width="100" height="28" rx="14" fill="url(#tokenGrad)"/>
  <text x="400" y="214" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="white" font-weight="bold">约 6-8 tokens</text>

  <!-- 标注 2 -->
  <rect x="290" y="195" width="50" height="22" rx="4" fill="#ffd700" opacity="0.85"/>
  <text x="315" y="210" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#1a1a2e">英文按词</text>

  <!-- ============ 右侧：代码示例 ============ -->
  <rect x="540" y="62" width="230" height="170" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="655" y="88" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">代码示例</text>

  <!-- 代码文本 -->
  <text x="560" y="118" font-family="'Courier New','Consolas',monospace" font-size="13" fill="#1a1a2e">def hello():</text>
  <text x="560" y="140" font-family="'Courier New','Consolas',monospace" font-size="13" fill="#1a1a2e">    print('world')</text>

  <!-- 字符计数 -->
  <text x="560" y="168" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666">25 个字符</text>

  <!-- 箭头 -->
  <line x1="655" y1="176" x2="655" y2="192" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Token 计数器 -->
  <rect x="605" y="195" width="100" height="28" rx="14" fill="url(#tokenGrad)"/>
  <text x="655" y="214" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="white" font-weight="bold">约 12 tokens</text>

  <!-- 标注 3 -->
  <rect x="550" y="195" width="50" height="22" rx="4" fill="#ffd700" opacity="0.85"/>
  <text x="575" y="210" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#1a1a2e">代码分词</text>

  <!-- ============ 底部：对比总结卡片 ============ -->
  <rect x="30" y="260" width="740" height="220" rx="12" fill="white" stroke="#e0e0e0" stroke-width="1.2"/>
  <text x="400" y="290" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Token 与字符比例对比</text>

  <!-- 表头 -->
  <rect x="60" y="305" width="180" height="32" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="150" y="326" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">语言类型</text>

  <rect x="260" y="305" width="180" height="32" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="350" y="326" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">字符数</text>

  <rect x="460" y="305" width="180" height="32" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="550" y="326" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Token 数</text>

  <rect x="660" y="305" width="90" height="32" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="705" y="326" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">比例</text>

  <!-- 第一行：中文 -->
  <rect x="60" y="345" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="150" y="368" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">中文</text>

  <rect x="260" y="345" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="350" y="368" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">10 字符</text>

  <rect x="460" y="345" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="550" y="368" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">15-20 tokens</text>

  <rect x="660" y="345" width="90" height="36" rx="4" fill="#f5faff"/>
  <text x="705" y="368" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">~1:1.7</text>

  <!-- 第二行：英文 -->
  <rect x="60" y="388" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="150" y="411" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">英文</text>

  <rect x="260" y="388" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="350" y="411" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">25 字符</text>

  <rect x="460" y="388" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="550" y="411" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">6-8 tokens</text>

  <rect x="660" y="388" width="90" height="36" rx="4" fill="#f5faff"/>
  <text x="705" y="411" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">~1:0.3</text>

  <!-- 第三行：代码 -->
  <rect x="60" y="431" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="150" y="454" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">代码</text>

  <rect x="260" y="431" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="350" y="454" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">25 字符</text>

  <rect x="460" y="431" width="180" height="36" rx="4" fill="#f5faff"/>
  <text x="550" y="454" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">12 tokens</text>

  <rect x="660" y="431" width="90" height="36" rx="4" fill="#f5faff"/>
  <text x="705" y="454" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">~1:0.5</text>

  <!-- 底部标注 -->
  <text x="400" y="485" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#999">* Token 数量因分词算法不同而有所差异</text>

</svg>