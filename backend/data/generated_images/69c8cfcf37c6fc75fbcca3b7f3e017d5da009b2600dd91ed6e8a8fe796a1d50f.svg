<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,220,240,0)"/>
      <stop offset="100%" stop-color="rgba(200,220,240,0.9)"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(200,220,240,0)"/>
      <stop offset="100%" stop-color="rgba(200,220,240,0.9)"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
    <filter id="blurLeft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blurRight">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">上下文窗口概念示意</text>

  <!-- 窗口框架 - 外框 -->
  <rect x="200" y="60" width="400" height="240" rx="16" fill="none" stroke="#409EFF" stroke-width="4" filter="url(#shadow)"/>
  <!-- 窗口框架 - 内框 -->
  <rect x="210" y="70" width="380" height="220" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- 窗口外左侧 - 模糊文本 -->
  <g filter="url(#blurLeft)" opacity="0.35">
    <rect x="60" y="100" width="120" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="75" y="125" width="105" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="55" y="150" width="130" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="70" y="175" width="110" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="60" y="200" width="125" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="80" y="225" width="100" height="14" rx="4" fill="#a0c4e8"/>
  </g>

  <!-- 窗口内 - 清晰文本 -->
  <g>
    <rect x="230" y="95" width="160" height="16" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="235" y="108" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">上下文窗口</text>

    <rect x="230" y="125" width="200" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="235" y="138" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">模型当前关注的</text>

    <rect x="230" y="155" width="180" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="235" y="168" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">文本范围区域</text>

    <rect x="230" y="185" width="220" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="235" y="198" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">超出此范围的内容</text>

    <rect x="230" y="215" width="170" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="235" y="228" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">将逐渐被遗忘</text>

    <rect x="230" y="245" width="190" height="16" rx="4" fill="#409EFF" opacity="0.08"/>
    <text x="235" y="258" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">窗口滑动更新中</text>
  </g>

  <!-- 窗口外右侧 - 模糊文本 -->
  <g filter="url(#blurRight)" opacity="0.35">
    <rect x="610" y="100" width="120" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="625" y="125" width="105" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="615" y="150" width="115" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="620" y="175" width="110" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="605" y="200" width="130" height="14" rx="4" fill="#a0c4e8"/>
    <rect x="625" y="225" width="100" height="14" rx="4" fill="#a0c4e8"/>
  </g>

  <!-- 窗口滑动箭头指示 -->
  <text x="195" y="200" text-anchor="end" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#409EFF" opacity="0.6">◀</text>
  <text x="605" y="200" text-anchor="start" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#409EFF" opacity="0.6">▶</text>

  <!-- 底部聊天界面 -->
  <rect x="100" y="320" width="600" height="150" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3" filter="url(#shadow)"/>

  <!-- 聊天头部 -->
  <rect x="100" y="320" width="600" height="32" rx="14" fill="#409EFF" opacity="0.15"/>
  <rect x="100" y="338" width="600" height="14" fill="#409EFF" opacity="0.15"/>
  <text x="400" y="342" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">对话历史</text>

  <!-- 聊天消息 - 早期（模糊缩小） -->
  <g opacity="0.3">
    <rect x="120" y="362" width="200" height="18" rx="9" fill="#E8F4FD"/>
    <text x="130" y="375" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">用户：今天天气如何？</text>
  </g>
  <g opacity="0.35">
    <rect x="330" y="362" width="200" height="18" rx="9" fill="#D0ECFA"/>
    <text x="340" y="375" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#666">模型：今天晴转多云</text>
  </g>

  <!-- 聊天消息 - 中期（半透明） -->
  <g opacity="0.55">
    <rect x="120" y="388" width="220" height="20" rx="10" fill="#E8F4FD"/>
    <text x="130" y="403" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#444">用户：明天呢？会下雨吗？</text>
  </g>
  <g opacity="0.6">
    <rect x="350" width="210" height="20" rx="10" fill="#D0ECFA" x="350" y="388"/>
    <text x="360" y="403" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#444">模型：预计明天下午有雨</text>
  </g>

  <!-- 聊天消息 - 近期（清晰） -->
  <g opacity="0.85">
    <rect x="120" y="416" width="230" height="22" rx="11" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.5"/>
    <text x="130" y="432" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">用户：那后天适合出行吗？</text>
  </g>
  <g>
    <rect x="360" y="416" width="240" height="22" rx="11" fill="#D0ECFA" stroke="#409EFF" stroke-width="0.5"/>
    <text x="370" y="432" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">模型：后天天气晴朗，适合出行</text>
  </g>

  <!-- 最新消息（高亮） -->
  <rect x="120" y="444" width="240" height="22" rx="11" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1"/>
  <text x="130" y="460" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">用户：需要带伞吗？</text>

  <!-- 窗口边界指示线（聊天区域） -->
  <line x1="300" y1="358" x2="300" y2="470" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="500" y1="358" x2="500" y2="470" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="300" y="478" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">窗口边界</text>
  <text x="500" y="478" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">窗口边界</text>

  <!-- 问题标注 -->
  <g>
    <circle cx="680" cy="80" r="22" fill="#1a1a2e" opacity="0.9"/>
    <text x="680" y="87" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" fill="white" font-weight="bold">?</text>
  </g>
  <rect x="640" y="110" width="130" height="28" rx="14" fill="#1a1a2e" opacity="0.85"/>
  <text x="705" y="129" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="white" font-weight="bold">模型记住了什么？</text>

  <!-- 底部标注 -->
  <rect x="260" y="490" width="280" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="400" y="507" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">窗口滑动时，旧内容逐渐淡出，新内容进入</text>

</svg>