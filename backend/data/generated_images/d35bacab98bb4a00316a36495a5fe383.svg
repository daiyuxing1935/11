<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">RNN 串行处理 vs Transformer 并行处理</text>

  <!-- ==================== 左侧：RNN 串行 ==================== -->
  <rect x="30" y="60" width="355" height="410" rx="14" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 左侧标题 -->
  <rect x="55" y="80" width="130" height="32" rx="16" fill="#409EFF" opacity="0.15"/>
  <text x="120" y="101" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">串行处理</text>

  <!-- 图标：串行 -->
  <g transform="translate(290, 85)">
    <line x1="0" y1="0" x2="0" y2="22" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="0" y2="22" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF"/>
    <circle cx="0" cy="11" r="4" fill="#409EFF" opacity="0.6"/>
    <circle cx="0" cy="22" r="4" fill="#409EFF" opacity="0.3"/>
    <polygon points="-5,22 5,22 0,28" fill="#409EFF"/>
  </g>

  <!-- RNN 节点链 -->
  <!-- 节点 1 -->
  <rect x="80" y="150" width="70" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="115" y="180" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₁</text>

  <!-- 箭头 1→2 -->
  <line x1="150" y1="175" x2="190" y2="175" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="190,170 200,175 190,180" fill="#409EFF"/>

  <!-- 节点 2 -->
  <rect x="200" y="150" width="70" height="50" rx="10" fill="#409EFF" opacity="0.7"/>
  <text x="235" y="180" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₂</text>

  <!-- 箭头 2→3 -->
  <line x1="270" y1="175" x2="310" y2="175" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="310,170 320,175 310,180" fill="#409EFF"/>

  <!-- 节点 3 -->
  <rect x="80" y="240" width="70" height="50" rx="10" fill="#409EFF" opacity="0.5"/>
  <text x="115" y="270" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₃</text>

  <!-- 箭头 3→4 -->
  <line x1="150" y1="265" x2="190" y2="265" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="190,260 200,265 190,270" fill="#409EFF"/>

  <!-- 节点 4 -->
  <rect x="200" y="240" width="70" height="50" rx="10" fill="#409EFF" opacity="0.3"/>
  <text x="235" y="270" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₄</text>

  <!-- 时间线标注 -->
  <text x="115" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=1</text>
  <text x="235" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=2</text>
  <text x="115" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=3</text>
  <text x="235" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=4</text>

  <!-- 串行依赖箭头（纵向） -->
  <path d="M150,200 C150,210 115,210 115,240" stroke="#409EFF" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M270,200 C270,210 235,210 235,240" stroke="#409EFF" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 标注：串行依赖 -->
  <rect x="100" y="320" width="160" height="32" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="180" y="341" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">串行依赖</text>

  <!-- 标注：逐个处理 -->
  <rect x="100" y="365" width="160" height="32" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="180" y="386" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">逐个处理</text>

  <!-- 标注：效率较低 -->
  <rect x="100" y="410" width="160" height="32" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="180" y="431" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">效率较低</text>

  <!-- ==================== 右侧：Transformer 并行 ==================== -->
  <rect x="415" y="60" width="355" height="410" rx="14" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 右侧标题 -->
  <rect x="440" y="80" width="130" height="32" rx="16" fill="#409EFF" opacity="0.15"/>
  <text x="505" y="101" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">并行处理</text>

  <!-- 图标：并行 -->
  <g transform="translate(680, 85)">
    <line x1="0" y1="0" x2="18" y2="0" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="11" x2="18" y2="11" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="18" y2="22" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF"/>
    <circle cx="0" cy="11" r="4" fill="#409EFF"/>
    <circle cx="0" cy="22" r="4" fill="#409EFF"/>
  </g>

  <!-- 自注意力中心枢纽 -->
  <circle cx="592" cy="265" r="48" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="2"/>
  <circle cx="592" cy="265" r="30" fill="#409EFF" opacity="0.2"/>
  <text x="592" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">自注意</text>
  <text x="592" y="278" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">力机制</text>

  <!-- 节点 1（左上） -->
  <rect x="460" y="140" width="70" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="495" y="170" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₁</text>

  <!-- 节点 2（右上） -->
  <rect x="650" y="140" width="70" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="685" y="170" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₂</text>

  <!-- 节点 3（左下） -->
  <rect x="460" y="340" width="70" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="495" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₃</text>

  <!-- 节点 4（右下） -->
  <rect x="650" y="340" width="70" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="685" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">词₄</text>

  <!-- 所有节点到中心的连接线 -->
  <!-- 词₁→中心 -->
  <line x1="495" y1="190" x2="565" y2="240" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <!-- 词₂→中心 -->
  <line x1="685" y1="190" x2="620" y2="240" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <!-- 词₃→中心 -->
  <line x1="495" y1="390" x2="565" y2="300" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <!-- 词₄→中心 -->
  <line x1="685" y1="390" x2="620" y2="300" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>

  <!-- 节点间的横向连接（并行） -->
  <line x1="530" y1="165" x2="650" y2="165" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.35"/>
  <line x1="530" y1="365" x2="650" y2="365" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.35"/>

  <!-- 时间线标注（所有节点同一时间） -->
  <text x="495" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=1</text>
  <text x="685" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=1</text>
  <text x="495" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=1</text>
  <text x="685" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">t=1</text>

  <!-- 同时发光效果 -->
  <circle cx="495" cy="165" r="38" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.15"/>
  <circle cx="685" cy="165" r="38" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.15"/>
  <circle cx="495" cy="365" r="38" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.15"/>
  <circle cx="685" cy="365" r="38" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.15"/>

  <!-- 标注：并行处理 -->
  <rect x="480" y="320" width="160" height="32" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="560" y="341" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">并行处理</text>

  <!-- 标注：同时计算 -->
  <rect x="480" y="365" width="160" height="32" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="560" y="386" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">同时计算</text>

  <!-- 标注：效率较高 -->
  <rect x="480" y="410" width="160" height="32" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="560" y="431" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">效率较高</text>

  <!-- 底部说明 -->
  <text x="400" y="488" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.45">串行 vs 并行 — 深度学习中的两种序列处理方式</text>
</svg>