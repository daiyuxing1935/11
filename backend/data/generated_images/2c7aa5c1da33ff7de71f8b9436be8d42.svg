  <!-- 标注：底部标签 -->
  <rect x="50" y="400" width="700" height="80" rx="10" fill="#1a1a2e" opacity="0.04"/>
  <text x="400" y="425" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">标注</text>

  <circle cx="120" cy="445" r="6" fill="#409EFF"/>
  <text x="135" y="449" font-family="sans-serif" font-size="12" fill="#1a1a2e">事实性幻觉：编造不实信息</text>

  <circle cx="320" cy="445" r="6" fill="#F5A623"/>
  <text x="335" y="449" font-family="sans-serif" font-size="12" fill="#1a1a2e">逻辑性幻觉：推理链条断裂</text>

  <circle cx="520" cy="445" r="6" fill="#9B59B6"/>
  <text x="535" y="449" font-family="sans-serif" font-size="12" fill="#1a1a2e">忠实性幻觉：偏离原始指令</text>

  <circle cx="680" cy="445" r="6" fill="#48C774"/>
  <text x="695" y="449" font-family="sans-serif" font-size="12" fill="#1a1a2e">格式性幻觉：输出格式违规</text>

  <!-- 底部装饰线 -->
  <line x1="100" y1="480" x2="700" y2="480" stroke="#1a1a2e" stroke-width="0.5" opacity="0.1"/>
