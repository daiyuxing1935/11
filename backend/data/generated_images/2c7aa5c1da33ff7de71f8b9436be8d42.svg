  <line x1="370" y1="98" x2="370" y2="118" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="98" x2="400" y2="118" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
  <line x1="430" y1="98" x2="430" y2="118" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="98" x2="400" y2="118" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>

