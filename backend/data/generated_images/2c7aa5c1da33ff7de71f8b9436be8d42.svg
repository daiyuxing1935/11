  <line x1="320" y1="118" x2="320" y2="148" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
  <line x1="480" y1="118" x2="480" y2="148" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
  <line x1="640" y1="118" x2="640" y2="148" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>

