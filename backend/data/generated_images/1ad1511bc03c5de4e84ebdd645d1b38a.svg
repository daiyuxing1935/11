<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BA3FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">四种常见多智能体架构模式</text>

  <!-- ========== 左上：路由器编排 ========== -->
  <g transform="translate(15, 50)">
    <!-- 区域背景 -->
    <rect x="0" y="0" width="380" height="210" rx="10" fill="white" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.3" filter="url(#shadow)"/>
    <text x="190" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">路由器编排</text>

    <!-- 用户输入 -->
    <rect x="10" y="40" width="70" height="32" rx="6" fill="#409EFF" opacity="0.9"/>
    <text x="45" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">输入</text>

    <!-- 箭头：输入 → 路由器 -->
    <line x1="80" y1="56" x2="115" y2="56" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
    <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/></marker></defs>

    <!-- 路由器 -->
    <rect x="115" y="38" width="80" height="36" rx="8" fill="url(#boxGrad)"/>
    <text x="155" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">路由器</text>

    <!-- 路由器下方标注 -->
    <text x="155" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">意图识别+分发</text>

    <!-- 箭头：路由器 → 三个专家 -->
    <line x1="155" y1="74" x2="155" y2="100" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="155" y1="100" x2="60" y2="100" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="155" y1="100" x2="155" y2="100" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="155" y1="100" x2="250" y2="100" stroke="#409EFF" stroke-width="1.5"/>

    <line x1="60" y1="100" x2="60" y2="120" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="155" y1="100" x2="155" y2="120" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="250" y1="100" x2="250" y2="120" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- 三个专家智能体 -->
    <rect x="25" y="120" width="70" height="32" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="60" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">专家A</text>

    <rect x="120" y="120" width="70" height="32" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="155" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">专家B</text>

    <rect x="215" y="120" width="70" height="32" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="250" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">专家C</text>

    <!-- 箭头：专家 → 聚合器 -->
    <line x1="60" y1="152" x2="60" y2="170" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="155" y1="152" x2="155" y2="170" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="250" y1="152" x2="250" y2="170" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="60" y1="170" x2="250" y2="170" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="155" y1="170" x2="155" y2="185" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- 结果聚合器 -->
    <rect x="115" y="185" width="80" height="32" rx="6" fill="url(#boxGrad2)"/>
    <text x="155" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">结果聚合</text>

    <!-- 标注 -->
    <text x="330" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">路由分发</text>
  </g>

  <!-- ========== 右上：管道 ========== -->
  <g transform="translate(405, 50)">
    <rect x="0" y="0" width="380" height="210" rx="10" fill="white" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.3" filter="url(#shadow)"/>
    <text x="190" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">管道</text>

    <!-- 输入 -->
    <rect x="10" y="85" width="60" height="36" rx="6" fill="#409EFF" opacity="0.9"/>
    <text x="40" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">输入</text>

    <!-- 箭头 -->
    <line x1="70" y1="103" x2="95" y2="103" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

    <!-- 智能体1 -->
    <rect x="95" y="83" width="60" height="40" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="125" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">智能体1</text>
    <text x="125" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">数据收集</text>

    <line x1="155" y1="103" x2="180" y2="103" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

    <!-- 智能体2 -->
    <rect x="180" y="83" width="60" height="40" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="210" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">智能体2</text>
    <text x="210" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">数据清洗</text>

    <line x1="240" y1="103" x2="265" y2="103" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

    <!-- 智能体3 -->
    <rect x="265" y="83" width="60" height="40" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="295" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">智能体3</text>
    <text x="295" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">分析</text>

    <line x1="325" y1="103" x2="345" y2="103" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

    <!-- 输出 -->
    <rect x="345" y="83" width="30" height="36" rx="6" fill="#409EFF" opacity="0.9"/>
    <text x="360" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">出</text>

    <!-- 标注 -->
    <text x="190" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">线性链式处理</text>
  </g>

  <!-- ========== 左下：协作辩论 ========== -->
  <g transform="translate(15, 275)">
    <rect x="0" y="0" width="380" height="210" rx="10" fill="white" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.3" filter="url(#shadow)"/>
    <text x="190" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">协作辩论</text>

    <!-- 输入 -->
    <rect x="10" y="55" width="60" height="36" rx="6" fill="#409EFF" opacity="0.9"/>
    <text x="40" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">输入</text>

    <!-- 扇形分发 -->
    <line x1="70" y1="73" x2="120" y2="45" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="70" y1="73" x2="120" y2="73" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="70" y1="73" x2="120" y2="101" stroke="#409EFF" stroke-width="1.5"/>

    <line x1="120" y1="45" x2="140" y2="45" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="120" y1="73" x2="140" y2="73" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="120" y1="101" x2="140" y2="101" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- 三个角度智能体 -->
    <rect x="140" y="28" width="75" height="34" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="177" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">角度1</text>

    <rect x="140" y="56" width="75" height="34" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="177" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">角度2</text>

    <rect x="140" y="84" width="75" height="34" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="177" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">角度3</text>

    <!-- 交叉连接 -->
    <line x1="180" y1="62" x2="215" y2="50" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="180" y1="90" x2="215" y2="50" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="180" y1="50" x2="215" y2="90" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

    <!-- 汇聚箭头 -->
    <line x1="215" y1="45" x2="245" y2="73" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="215" y1="73" x2="245" y2="73" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="215" y1="101" x2="245" y2="73" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="245" y1="73" x2="270" y2="73" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

    <!-- 综合决策 -->
    <rect x="270" y="55" width="85" height="36" rx="8" fill="url(#boxGrad)"/>
    <text x="312" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">综合决策</text>

    <!-- 输出 -->
    <line x1="355" y1="73" x2="370" y2="73" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
    <rect x="370" y="55" width="10" height="36" rx="4" fill="#409EFF" opacity="0.9"/>
    <text x="375" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">出</text>

    <!-- 标注 -->
    <text x="190" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">多角度辩论与综合</text>
  </g>

  <!-- ========== 右下：分层 ========== -->
  <g transform="translate(405, 275)">
    <rect x="0" y="0" width="380" height="210" rx="10" fill="white" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.3" filter="url(#shadow)"/>
    <text x="190" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">分层</text>

    <!-- 顶层控制器 -->
    <rect x="140" y="35" width="100" height="36" rx="8" fill="url(#boxGrad)"/>
    <text x="190" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">顶层控制器</text>

    <!-- 向下连线 -->
    <line x1="190" y1="71" x2="190" y2="90" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="190" y1="90" x2="70" y2="90" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="190" y1="90" x2="190" y2="90" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="190" y1="90" x2="310" y2="90" stroke="#409EFF" stroke-width="1.5"/>

    <line x1="70" y1="90" x2="70" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="190" y1="90" x2="190" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="310" y1="90" x2="310" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- 三个领域管理器 -->
    <rect x="30" y="110" width="80" height="32" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="70" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">领域管理器1</text>

    <rect x="150" y="110" width="80" height="32" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="190" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">领域管理器2</text>

    <rect x="270" y="110" width="80" height="32" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <text x="310" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">领域管理器3</text>

    <!-- 向下连线到执行智能体 -->
    <line x1="70" y1="142" x2="70" y2="160" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="70" y1="160" x2="40" y2="160" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="70" y1="160" x2="100" y2="160" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="40" y1="160" x2="40" y2="175" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="100" y1="160" x2="100" y2="175" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

    <line x1="190" y1="142" x2="190" y2="160" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="190" y1="160" x2="160" y2="160" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="190" y1="160" x2="220" y2="160" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="160" y1="160" x2="160" y2="175" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="220" y1="160" x2="220" y2="175" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

    <line x1="310" y1="142" x2="310" y2="160" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="310" y1="160" x2="280" y2="160" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="310" y1="160" x2="340" y2="160" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="280" y1="160" x2="280" y2="175" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="340" y1="160" x2="340" y2="175" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

    <!-- 六个执行智能体 -->
    <rect x="20" y="175" width="40" height="28" rx="5" fill="#D6E9FF" stroke="#409EFF" stroke-width="1"/>
    <text x="40" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">执行</text>

    <rect x="80" y="175" width="40" height="28" rx="5" fill="#D6E9FF" stroke="#409EFF" stroke-width="1"/>
    <text x="100" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">执行</text>

    <rect x="140" y="175" width="40" height="28" rx="5" fill="#D6E9FF" stroke="#409EFF" stroke-width="1"/>
    <text x="160" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">执行</text>

    <rect x="200" y="175" width="40" height="28" rx="5" fill="#D6E9FF" stroke="#409EFF" stroke-width="1"/>
    <text x="220" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">执行</text>

    <rect x="260" y="175" width="40" height="28" rx="5" fill="#D6E9FF" stroke="#409EFF" stroke-width="1"/>
    <text x="280" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">执行</text>

    <rect x="320" y="175" width="40" height="28" rx="5" fill="#D6E9FF" stroke="#409EFF" stroke-width="1"/>
    <text x="340" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">执行</text>

    <!-- 标注 -->
    <text x="190" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">树形层级管理</text>
  </g>

  <!-- 底部标注 -->
  <text x="400" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.6">多智能体架构模式 · #409EFF</text>
</svg>