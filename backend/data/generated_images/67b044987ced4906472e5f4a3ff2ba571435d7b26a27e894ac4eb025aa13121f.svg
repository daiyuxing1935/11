  <line x1="255" y1="355" x2="295" y2="355" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
  <line x1="255" y1="365" x2="290" y2="365" stroke="#1a1a2e" stroke-width="1.5" opacity="0.4"/>
