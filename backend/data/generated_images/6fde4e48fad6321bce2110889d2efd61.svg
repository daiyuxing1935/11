<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">四种文本生成采样策略对比</text>

  <!-- ==================== 左上：贪心解码 ==================== -->
  <rect x="30" y="52" width="355" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="30" y="52" width="355" height="200" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 卡片标题 -->
  <rect x="30" y="52" width="355" height="34" rx="14" fill="#409EFF"/>
  <rect x="30" y="72" width="355" height="14" fill="#409EFF"/>
  <text x="207" y="74" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">贪心解码 (Greedy)</text>

  <!-- 概率分布图 -->
  <rect x="55" y="100" width="140" height="80" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <!-- 柱状条 -->
  <rect x="62" y="155" width="12" height="25" rx="2" fill="#B0D4FF"/>
  <rect x="78" y="140" width="12" height="40" rx="2" fill="#B0D4FF"/>
  <rect x="94" y="120" width="12" height="60" rx="2" fill="#B0D4FF"/>
  <rect x="110" y="100" width="12" height="80" rx="2" fill="#409EFF"/>
  <rect x="126" y="130" width="12" height="50" rx="2" fill="#B0D4FF"/>
  <rect x="142" y="145" width="12" height="35" rx="2" fill="#B0D4FF"/>
  <rect x="158" y="150" width="12" height="30" rx="2" fill="#B0D4FF"/>
  <rect x="174" y="160" width="12" height="20" rx="2" fill="#B0D4FF"/>

  <!-- 标注箭头和文字 -->
  <line x1="116" y1="98" x2="116" y2="80" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
  <defs>
    <marker id="arrowSmall" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L5,3 L0,6" fill="#1a1a2e"/>
    </marker>
  </defs>
  <text x="116" y="76" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">最高概率</text>

  <!-- 文字说明 -->
  <text x="55" y="200" font-family="sans-serif" font-size="12" fill="#1a1a2e">选择概率最高的词</text>
  <text x="55" y="218" font-family="sans-serif" font-size="12" fill="#1a1a2e">确定性最高，可能重复</text>

  <!-- 标注 -->
  <rect x="210" y="100" width="155" height="28" rx="6" fill="#FFF3E0"/>
  <text x="287" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#E65100">⚠ 易陷入重复循环</text>

  <rect x="210" y="138" width="155" height="28" rx="6" fill="#E8F5E9"/>
  <text x="287" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2E7D32">✓ 输出最稳定</text>

  <rect x="210" y="176" width="155" height="28" rx="6" fill="#E3F2FD"/>
  <text x="287" y="194" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1565C0">常用于翻译、摘要</text>

  <!-- ==================== 右上：温度采样 ==================== -->
  <rect x="415" y="52" width="355" height="200" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="415" y="52" width="355" height="200" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <rect x="415" y="52" width="355" height="34" rx="14" fill="#409EFF"/>
  <rect x="415" y="72" width="355" height="14" fill="#409EFF"/>
  <text x="592" y="74" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">温度采样 (Temperature)</text>

  <!-- 三个小分布图 -->
  <!-- T=0.3 -->
  <rect x="430" y="98" width="105" height="65" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <rect x="434" y="148" width="6" height="15" rx="1" fill="#B0D4FF"/>
  <rect x="443" y="140" width="6" height="23" rx="1" fill="#B0D4FF"/>
