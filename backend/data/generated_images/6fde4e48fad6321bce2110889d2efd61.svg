  <text x="597" y="174" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">T=1.0</text>
  <text x="597" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">自然分布</text>

  <!-- T=1.5 -->
  <rect x="660" y="98" width="105" height="65" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <rect x="664" y="148" width="6" height="15" rx="1" fill="#B0D4FF"/>
  <rect x="673" y="140" width="6" height="23" rx="1" fill="#B0D4FF"/>
  <rect x="682" y="132" width="6" height="31" rx="1" fill="#B0D4FF"/>
  <rect x="691" y="128" width="6" height="35" rx="1" fill="#409EFF"/>
  <rect x="700" y="132" width="6" height="31" rx="1" fill="#B0D4FF"/>
  <rect x="709" y="138" width="6" height="25" rx="1" fill="#B0D4FF"/>
  <rect x="718" y="145" width="6" height="18" rx="1" fill="#B0D4FF"/>
  <rect x="727" y="148" width="6" height="15" rx="1" fill="#B0D4FF"/>
  <rect x="736" y="152" width="6" height="11" rx="1" fill="#B0D4FF"/>
  <rect x="745" y="155" width="6" height="8" rx="1" fill="#B0D4FF"/>
  <text x="712" y="174" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">T=1.5</text>
  <text x="712" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">平坦分布</text>

  <!-- 标注 -->
  <rect x="430" y="200" width="155" height="22" rx="5" fill="#E3F2FD"/>
  <text x="507" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565C0">低T：确定性高</text>

