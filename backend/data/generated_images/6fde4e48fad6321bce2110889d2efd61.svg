  <rect x="205" y="390" width="10" height="15" rx="2" fill="#E0E0E0"/>

  <!-- 截断线 -->
  <line x1="115" y1="318" x2="115" y2="405" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="115" y="316" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E65100">K=50</text>

  <!-- 累积概率阈值线 -->
  <line x1="140" y1="318" x2="140" y2="405" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="316" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2E7D32">P=0.9</text>

  <!-- 标注 -->
  <rect x="55" y="420" width="155" height="22" rx="5" fill="#FFF3E0"/>
  <text x="132" y="435" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#E65100">Top-K：固定候选数</text>

  <rect x="55" y="448" width="155" height="22" rx="5" fill="#E8F5E9"/>
