  <text x="300" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565C0">平衡质量与多样性</text>

  <rect x="230" y="358" width="140" height="28" rx="6" fill="#E3F2FD"/>
  <text x="300" y="376" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565C0">避免低概率词</text>

  <rect x="230" y="396" width="140" height="28" rx="6" fill="#E3F2FD"/>
  <text x="300" y="414" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565C0">ChatGPT 常用</text>

  <!-- ==================== 右下：束搜索 ==================== -->
  <rect x="415" y="272" width="355" height="210" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="415" y="272" width="355" height="210" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <rect x="415" y="272" width="355" height="34" rx="14" fill="#409EFF"/>
