  <text x="482" y="174" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">T=0.3</text>
  <text x="482" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">锐利分布</text>

  <!-- T=1.0 -->
  <rect x="545" y="98" width="105" height="65" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <rect x="549" y="150" width="6" height="13" rx="1" fill="#B0D4FF"/>
  <rect x="558" y="140" width="6" height="23" rx="1" fill="#B0D4FF"/>
  <rect x="567" y="128" width="6" height="35" rx="1" fill="#B0D4FF"/>
  <rect x="576" y="118" width="6" height="45" rx="1" fill="#409EFF"/>
  <rect x="585" y="125" width="6" height="38" rx="1" fill="#B0D4FF"/>
  <rect x="594" y="135" width="6" height="28" rx="1" fill="#B0D4FF"/>
  <rect x="603" y="145" width="6" height="18" rx="1" fill="#B0D4FF"/>
  <rect x="612" y="150" width="6" height="13" rx="1" fill="#B0D4FF"/>
