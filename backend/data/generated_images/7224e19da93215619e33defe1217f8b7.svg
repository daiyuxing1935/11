<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e" letter-spacing="2">不同场景，不同侧重</text>
  <text x="400" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5a5a7a" letter-spacing="1">Different Scenarios, Different Priorities</text>

  <!-- 卡片容器：四张卡片水平排列 -->
  <!-- 卡片1: 交易系统 -->
  <g transform="translate(40, 100)" filter="url(#shadow)">
    <rect width="160" height="290" rx="12" fill="url(#cardGrad)" stroke="#E0ECF5" stroke-width="1.2"/>
    <!-- 图标区域 -->
    <rect x="55" y="20" width="50" height="50" rx="25" fill="#E8F4FF"/>
    <!-- 股票图 -->
    <polyline points="68,50 78,42 88,48 98,35 105,40" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <!-- 闪电图标 -->
    <polygon points="82,52 78,60 86,60 80,70" fill="#409EFF" opacity="0.8"/>
    <!-- 标签 -->
    <text x="80" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">交易系统</text>
    <text x="80" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a7a9a">Trading System</text>
    <!-- 特性：响应性（高亮） -->
    <rect x="20" y="140" width="120" height="32" rx="16" fill="#409EFF" opacity="0.12"/>
    <circle cx="36" cy="156" r="6" fill="#409EFF" filter="url(#glow)"/>
    <text x="48" y="161" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">响应性</text>
    <!-- 其他特性 -->
    <text x="80" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">主动性</text>
    <text x="80" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">社交能力</text>
    <text x="80" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">自主性</text>
    <!-- 标注 -->
    <rect x="30" y="262" width="100" height="18" rx="9" fill="#1a1a2e" opacity="0.08"/>
    <text x="80" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">实时响应优先</text>
  </g>

  <!-- 卡片2: 个人助理 -->
  <g transform="translate(220, 100)" filter="url(#shadow)">
    <rect width="160" height="290" rx="12" fill="url(#cardGrad)" stroke="#E0ECF5" stroke-width="1.2"/>
    <!-- 图标区域 -->
    <rect x="55" y="20" width="50" height="50" rx="25" fill="#E8F4FF"/>
    <!-- 日历 -->
    <rect x="62" y="28" width="36" height="34" rx="4" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="62" y1="38" x2="98" y2="38" stroke="#409EFF" stroke-width="1.5"/>
    <text x="80" y="52" text-anchor="middle" font-family="Arial" font-size="10" fill="#409EFF" font-weight="bold">15</text>
    <!-- 前箭头 -->
    <polygon points="100,45 108,45 104,40" fill="#409EFF" opacity="0.7"/>
    <polygon points="100,45 108,45 104,50" fill="#409EFF" opacity="0.7"/>
    <!-- 标签 -->
    <text x="80" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">个人助理</text>
    <text x="80" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a7a9a">Personal Assistant</text>
    <!-- 特性：主动性（高亮） -->
    <rect x="20" y="140" width="120" height="32" rx="16" fill="#409EFF" opacity="0.12"/>
    <circle cx="36" cy="156" r="6" fill="#409EFF" filter="url(#glow)"/>
    <text x="48" y="161" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">主动性</text>
    <!-- 其他特性 -->
    <text x="80" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">响应性</text>
    <text x="80" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">社交能力</text>
    <text x="80" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">自主性</text>
    <!-- 标注 -->
    <rect x="30" y="262" width="100" height="18" rx="9" fill="#1a1a2e" opacity="0.08"/>
    <text x="80" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">主动建议优先</text>
  </g>

  <!-- 卡片3: 客服系统 -->
  <g transform="translate(400, 100)" filter="url(#shadow)">
    <rect width="160" height="290" rx="12" fill="url(#cardGrad)" stroke="#E0ECF5" stroke-width="1.2"/>
    <!-- 图标区域 -->
    <rect x="55" y="20" width="50" height="50" rx="25" fill="#E8F4FF"/>
    <!-- 耳机 -->
    <circle cx="80" cy="42" r="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <path d="M68,42 Q68,55 72,58" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M92,42 Q92,55 88,58" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <!-- 两人图标 -->
    <circle cx="74" cy="62" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="86" cy="62" r="4" fill="#409EFF" opacity="0.5"/>
    <!-- 标签 -->
    <text x="80" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">客服系统</text>
    <text x="80" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a7a9a">Customer Service</text>
    <!-- 特性：社交能力（高亮） -->
    <rect x="20" y="140" width="120" height="32" rx="16" fill="#409EFF" opacity="0.12"/>
    <circle cx="36" cy="156" r="6" fill="#409EFF" filter="url(#glow)"/>
    <text x="48" y="161" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">社交能力</text>
    <!-- 其他特性 -->
    <text x="80" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">响应性</text>
    <text x="80" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">主动性</text>
    <text x="80" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">自主性</text>
    <!-- 标注 -->
    <rect x="30" y="262" width="100" height="18" rx="9" fill="#1a1a2e" opacity="0.08"/>
    <text x="80" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">人机交互优先</text>
  </g>

  <!-- 卡片4: 研究系统 -->
  <g transform="translate(580, 100)" filter="url(#shadow)">
    <rect width="160" height="290" rx="12" fill="url(#cardGrad)" stroke="#E0ECF5" stroke-width="1.2"/>
    <!-- 图标区域 -->
    <rect x="55" y="20" width="50" height="50" rx="25" fill="#E8F4FF"/>
    <!-- 放大镜 -->
    <circle cx="78" cy="38" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="85" y1="45" x2="92" y2="52" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 大脑 -->
    <path d="M70,55 Q72,50 76,52 Q80,48 84,52 Q88,50 90,55 Q88,60 84,62 Q80,65 76,62 Q72,60 70,55Z" fill="#409EFF" opacity="0.4"/>
    <path d="M74,56 Q76,54 80,56 Q84,54 86,56" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 标签 -->
    <text x="80" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">研究系统</text>
    <text x="80" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a7a9a">Research System</text>
    <!-- 特性：自主性（高亮） -->
    <rect x="20" y="140" width="120" height="32" rx="16" fill="#409EFF" opacity="0.12"/>
    <circle cx="36" cy="156" r="6" fill="#409EFF" filter="url(#glow)"/>
    <text x="48" y="161" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">自主性</text>
    <!-- 其他特性 -->
    <text x="80" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">响应性</text>
    <text x="80" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">主动性</text>
    <text x="80" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">社交能力</text>
    <!-- 标注 -->
    <rect x="30" y="262" width="100" height="18" rx="9" fill="#1a1a2e" opacity="0.08"/>
    <text x="80" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">自主探索优先</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a7a9a">每个场景根据核心需求突出一个首要特性，兼顾其他能力</text>

  <!-- 装饰性底部线条 -->
  <line x1="200" y1="465" x2="600" y2="465" stroke="#409EFF" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <circle cx="400" cy="465" r="3" fill="#409EFF" opacity="0.3"/>
</svg>