<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">三种投票机制对比</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ============ 第一行：多数投票 ============ -->
  <g transform="translate(30, 70)">
    <!-- 卡片背景 -->
    <rect x="0" y="0" width="740" height="118" rx="12" fill="url(#card1)" stroke="#D6E9F8" stroke-width="1.2"/>
    <!-- 标题栏 -->
    <rect x="0" y="0" width="740" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
    <rect x="0" y="20" width="740" height="12" fill="#409EFF" opacity="0.12"/>
    <circle cx="18" cy="16" r="7" fill="#409EFF" opacity="0.5"/>
    <text x="35" y="21" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">多数投票</text>

    <!-- 三张选票 -->
    <!-- 选票A1 -->
    <rect x="60" y="48" width="70" height="50" rx="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="65" y="53" width="60" height="8" rx="2" fill="#409EFF" opacity="0.3"/>
    <text x="95" y="75" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#409EFF">A</text>
    <text x="95" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">✓ 当选</text>

    <!-- 选票A2 -->
    <rect x="155" y="48" width="70" height="50" rx="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="160" y="53" width="60" height="8" rx="2" fill="#409EFF" opacity="0.3"/>
    <text x="190" y="75" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#409EFF">A</text>

    <!-- 选票B -->
    <rect x="250" y="48" width="70" height="50" rx="4" fill="#FFFFFF" stroke="#B0C4DE" stroke-width="1.5"/>
    <rect x="255" y="53" width="60" height="8" rx="2" fill="#B0C4DE" opacity="0.3"/>
    <text x="285" y="75" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#B0C4DE">B</text>

    <!-- 结果箭头 -->
    <text x="345" y="78" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#409EFF">→</text>

    <!-- 获胜框 -->
    <rect x="370" y="50" width="80" height="46" rx="8" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
    <text x="410" y="72" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">A 胜</text>
    <text x="410" y="88" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.8">2 : 1</text>

    <!-- 优缺点标注 -->
    <text x="490" y="62" font-family="sans-serif" font-size="12" fill="#1a1a2e">✅ 简单快速</text>
    <text x="490" y="82" font-family="sans-serif" font-size="12" fill="#1a1a2e">⚠️ 忽略少数</text>
    <text x="490" y="102" font-family="sans-serif" font-size="12" fill="#1a1a2e">❌ 可能无绝对多数</text>
  </g>

  <!-- ============ 第二行：加权投票 ============ -->
  <g transform="translate(30, 208)">
    <rect x="0" y="0" width="740" height="118" rx="12" fill="url(#card2)" stroke="#D6E9F8" stroke-width="1.2"/>
    <rect x="0" y="0" width="740" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
    <rect x="0" y="20" width="740" height="12" fill="#409EFF" opacity="0.12"/>
    <circle cx="18" cy="16" r="7" fill="#409EFF" opacity="0.5"/>
    <text x="35" y="21" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">加权投票</text>

    <!-- 三个投票者 -->
    <!-- 高级分析师 2.0 -->
    <rect x="50" y="48" width="100" height="54" rx="8" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="75" cy="65" r="12" fill="#409EFF" opacity="0.2"/>
    <text x="75" y="69" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">👤</text>
    <text x="100" y="62" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">高级分析师</text>
    <text x="100" y="78" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">权重 2.0</text>
    <rect x="50" y="92" width="100" height="4" rx="2" fill="#409EFF" opacity="0.4"/>

    <!-- 初级分析师 1.0 -->
    <rect x="175" y="48" width="100" height="54" rx="8" fill="#FFFFFF" stroke="#B0C4DE" stroke-width="1.5"/>
    <circle cx="200" cy="65" r="12" fill="#B0C4DE" opacity="0.2"/>
    <text x="200" y="69" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B0C4DE">👤</text>
    <text x="225" y="62" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">初级分析师</text>
    <text x="225" y="78" font-family="sans-serif" font-size="13" fill="#B0C4DE" font-weight="bold">权重 1.0</text>
    <rect x="175" y="92" width="100" height="4" rx="2" fill="#B0C4DE" opacity="0.4"/>

    <!-- 实习生 0.5 -->
    <rect x="300" y="48" width="100" height="54" rx="8" fill="#FFFFFF" stroke="#D3D3D3" stroke-width="1.5"/>
    <circle cx="325" cy="65" r="12" fill="#D3D3D3" opacity="0.2"/>
    <text x="325" y="69" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#D3D3D3">👤</text>
    <text x="350" y="62" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">实习生</text>
    <text x="350" y="78" font-family="sans-serif" font-size="13" fill="#D3D3D3" font-weight="bold">权重 0.5</text>
    <rect x="300" y="92" width="100" height="4" rx="2" fill="#D3D3D3" opacity="0.4"/>

    <!-- 天平图标 -->
    <text x="425" y="80" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#409EFF">⚖️</text>

    <!-- 加权统计 -->
    <rect x="460" y="48" width="110" height="54" rx="8" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.2"/>
    <text x="515" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">加权合计</text>
    <text x="515" y="88" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#409EFF">3.5</text>

    <!-- 优缺点标注 -->
    <text x="600" y="62" font-family="sans-serif" font-size="12" fill="#1a1a2e">✅ 体现专业度</text>
    <text x="600" y="82" font-family="sans-serif" font-size="12" fill="#1a1a2e">⚠️ 权重需公正</text>
    <text x="600" y="102" font-family="sans-serif" font-size="12" fill="#1a1a2e">❌ 复杂化</text>
  </g>

  <!-- ============ 第三行：排序投票 ============ -->
  <g transform="translate(30, 346)">
    <rect x="0" y="0" width="740" height="118" rx="12" fill="url(#card3)" stroke="#D6E9F8" stroke-width="1.2"/>
    <rect x="0" y="0" width="740" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
    <rect x="0" y="20" width="740" height="12" fill="#409EFF" opacity="0.12"/>
    <circle cx="18" cy="16" r="7" fill="#409EFF" opacity="0.5"/>
    <text x="35" y="21" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">排序投票</text>

    <!-- 排名表格 -->
    <rect x="50" y="44" width="280" height="62" rx="6" fill="#FFFFFF" stroke="#D6E9F8" stroke-width="1.2"/>

    <!-- 表头 -->
    <rect x="50" y="44" width="280" height="20" rx="6" fill="#409EFF" opacity="0.15"/>
    <text x="80" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">候选人</text>
    <text x="155" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">投票者1</text>
    <text x="205" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">投票者2</text>
    <text x="255" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">投票者3</text>
    <text x="310" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">总分</text>

    <!-- 行1：选项A -->
    <text x="70" y="78" font-family="sans-serif" font-size="12" fill="#1a1a2e">A</text>
    <text x="155" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">1</text>
    <text x="205" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">2</text>
    <text x="255" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">1</text>
    <text x="310" y="78" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">4</text>

    <!-- 行2：选项B -->
    <text x="70" y="96" font-family="sans-serif" font-size="12" fill="#1a1a2e">B</text>
    <text x="155" y="96" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B0C4DE">2</text>
    <text x="205" y="96" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B0C4DE">1</text>
    <text x="255" y="96" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B0C4DE">3</text>
    <text x="310" y="96" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#B0C4DE">6</text>

    <!-- 结果箭头 -->
    <text x="360" y="80" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#409EFF">→</text>

    <!-- 获胜者 -->
    <rect x="390" y="48" width="90" height="54" rx="8" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
    <text x="435" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">A 当选</text>
    <text x="435" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.8">总分最低胜</text>

    <!-- 优缺点标注 -->
    <text x="520" y="62" font-family="sans-serif" font-size="12" fill="#1a1a2e">✅ 反映偏好深度</text>
    <text x="520" y="82" font-family="sans-serif" font-size="12" fill="#1a1a2e">⚠️ 计算复杂</text>
    <text x="520" y="102" font-family="sans-serif" font-size="12" fill="#1a1a2e">❌ 投票者需理解规则</text>
  </g>

</svg>