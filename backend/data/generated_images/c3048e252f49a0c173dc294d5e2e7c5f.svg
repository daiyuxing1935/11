<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9ECFF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">订阅生命周期流程</text>

  <!-- ==================== 步骤 1：订阅 ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="220" height="130" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="30" y="60" width="220" height="32" rx="12" fill="url(#blueGrad)"/>
    <rect x="30" y="80" width="220" height="12" fill="url(#blueGrad)"/>
    <text x="140" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="white">步骤 1：订阅</text>

    <text x="48" y="112" font-size="13" fill="#1a1a2e">代理 → 代理</text>
    <text x="48" y="132" font-size="12" fill="#666">主题模式：sensor/temp</text>
    <text x="48" y="150" font-size="12" fill="#666">回调函数：handle_data</text>
    <text x="48" y="168" font-size="12" fill="#666">过滤函数：temp &gt; 30</text>
  </g>

  <!-- 标注 1 -->
  <rect x="80" y="195" width="80" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
  <text x="120" y="211" text-anchor="middle" font-size="13" fill="white" font-weight="bold">订阅请求</text>

  <!-- 箭头 1→2 -->
  <line x1="255" y1="125" x2="300" y2="125" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ==================== 步骤 2：事件发布 ==================== -->
  <g filter="url(#shadow)">
    <rect x="305" y="60" width="220" height="130" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="305" y="60" width="220" height="32" rx="12" fill="url(#blueGrad)"/>
    <rect x="305" y="80" width="220" height="12" fill="url(#blueGrad)"/>
    <text x="415" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="white">步骤 2：事件发布</text>

    <text x="323" y="112" font-size="13" fill="#1a1a2e">发布者 → 事件</text>
    <text x="323" y="132" font-size="12" fill="#666">主题：sensor/temp</text>
    <text x="323" y="150" font-size="12" fill="#666">负载：{temp: 35}</text>
    <text x="323" y="168" font-size="12" fill="#666">ID: evt-001 | 时间戳: T1</text>
  </g>

  <!-- 标注 2 -->
  <rect x="370" y="195" width="90" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
  <text x="415" y="211" text-anchor="middle" font-size="13" fill="white" font-weight="bold">发布事件</text>

  <!-- 箭头 2→3 -->
  <line x1="530" y1="125" x2="575" y2="125" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ==================== 步骤 3：代理匹配 ==================== -->
  <g filter="url(#shadow)">
    <rect x="580" y="60" width="195" height="130" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="580" y="60" width="195" height="32" rx="12" fill="url(#blueGrad)"/>
    <rect x="580" y="80" width="195" height="12" fill="url(#blueGrad)"/>
    <text x="677" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="white">步骤 3：匹配</text>

    <text x="598" y="112" font-size="13" fill="#1a1a2e">代理匹配逻辑</text>
    <text x="598" y="135" font-size="12" fill="#666">✓ 主题模式匹配</text>
    <text x="598" y="155" font-size="12" fill="#666">✓ 内容过滤</text>
    <text x="598" y="175" font-size="12" fill="#666">→ 找到匹配订阅</text>
  </g>

  <!-- 标注 3 -->
  <rect x="640" y="195" width="80" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
  <text x="680" y="211" text-anchor="middle" font-size="13" fill="white" font-weight="bold">匹配检查</text>

  <!-- ==================== 步骤 4：事件投递 ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="260" width="220" height="130" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="30" y="260" width="220" height="32" rx="12" fill="url(#blueGrad)"/>
    <rect x="30" y="280" width="220" height="12" fill="url(#blueGrad)"/>
    <text x="140" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="white">步骤 4：投递</text>

    <text x="48" y="312" font-size="13" fill="#1a1a2e">代理 → 订阅者</text>
    <text x="48" y="335" font-size="12" fill="#666">事件队列接收</text>
    <text x="48" y="355" font-size="12" fill="#666">回调执行：handle_data</text>
    <text x="48" y="375" font-size="12" fill="#666">correlation_id: c-001</text>
  </g>

  <!-- 标注 4 -->
  <rect x="70" y="395" width="90" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
  <text x="115" y="411" text-anchor="middle" font-size="13" fill="white" font-weight="bold">事件投递</text>

  <!-- 箭头 3→4（跨行） -->
  <path d="M 580 125 L 560 125 L 560 325 L 255 325" stroke="#409EFF" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>

  <!-- ==================== 步骤 5：取消订阅 ==================== -->
  <g filter="url(#shadow)">
    <rect x="305" y="260" width="220" height="130" rx="12" fill="white" stroke="#E6A23C" stroke-width="1.5"/>
    <rect x="305" y="260" width="220" height="32" rx="12" fill="#E6A23C"/>
    <rect x="305" y="280" width="220" height="12" fill="#E6A23C"/>
    <text x="415" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="white">步骤 5：取消订阅</text>

    <text x="323" y="312" font-size="13" fill="#1a1a2e">代理 → 代理</text>
    <text x="323" y="335" font-size="12" fill="#666">取消订阅请求</text>
    <text x="323" y="355" font-size="12" fill="#666">移除回调函数</text>
    <text x="323" y="375" font-size="12" fill="#666">清理过滤条件</text>
  </g>

  <!-- 标注 5 -->
  <rect x="370" y="395" width="90" height="22" rx="11" fill="#E6A23C" opacity="0.9"/>
  <text x="415" y="411" text-anchor="middle" font-size="13" fill="white" font-weight="bold">取消订阅</text>

  <!-- 箭头 4→5 -->
  <line x1="255" y1="325" x2="300" y2="325" stroke="#E6A23C" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E6A23C"/>
    </marker>
  </defs>

  <!-- ==================== 底部信息 ==================== -->
  <rect x="580" y="260" width="195" height="130" rx="12" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.7"/>
  <text x="677" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#409EFF">生命周期总结</text>
  <text x="598" y="315" font-size="12" fill="#666">订阅 → 发布 → 匹配</text>
  <text x="598" y="338" font-size="12" fill="#666">→ 投递 → 取消订阅</text>
  <text x="598" y="365" font-size="12" fill="#409EFF">完整闭环管理</text>

  <!-- 标注 6 -->
  <rect x="630" y="395" width="90" height="22" rx="11" fill="#409EFF" opacity="0.7"/>
  <text x="675" y="411" text-anchor="middle" font-size="13" fill="white" font-weight="bold">完整闭环</text>

  <!-- 装饰性连接线（底部） -->
  <line x1="530" y1="325" x2="575" y2="325" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <text x="400" y="460" text-anchor="middle" font-size="12" fill="#999">主色 #409EFF · 扁平化 2D 设计 · 订阅生命周期流程</text>

  <!-- 装饰圆点 -->
  <circle cx="30" cy="60" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="800" cy="60" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="30" cy="390" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="800" cy="390" r="3" fill="#409EFF" opacity="0.3"/>
</svg>