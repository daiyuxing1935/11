<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2d7fd3"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">三种推理模式对比</text>

  <!-- 列：CoT（左） -->
  <rect x="40" y="60" width="220" height="60" rx="6" fill="#e0e0e0"/>
  <text x="150" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">CoT</text>

  <!-- CoT 思维链 -->
  <circle cx="100" cy="165" r="18" fill="#409EFF" opacity="0.7"/>
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">思考1</text>
  <line x1="118" y1="165" x2="142" y2="165" stroke="#409EFF" stroke-width="2"/>
  <circle cx="160" cy="165" r="18" fill="#409EFF" opacity="0.7"/>
  <text x="160" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">思考2</text>
  <line x1="178" y1="165" x2="202" y2="165" stroke="#409EFF" stroke-width="2"/>
  <circle cx="220" cy="165" r="18" fill="#409EFF" opacity="0.7"/>
  <text x="220" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">思考3</text>

  <!-- CoT 箭头 -->
  <polygon points="238,165 230,160 230,170" fill="#409EFF"/>

  <!-- CoT 标注 -->
  <text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">线性推理链</text>

  <!-- 列：Tool-Use（中） -->
  <rect x="290" y="60" width="220" height="60" rx="6" fill="#e0e0e0"/>
  <text x="400" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">Tool-Use</text>

  <!-- Tool-Use 工具调用 -->
  <rect x="310" y="145" width="40" height="40" rx="4" fill="#409EFF" opacity="0.6"/>
  <text x="330" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">工具A</text>
  <rect x="380" y="145" width="40" height="40" rx="4" fill="#409EFF" opacity="0.6"/>
  <text x="400" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">工具B</text>
  <rect x="450" y="145" width="40" height="40" rx="4" fill="#409EFF" opacity="0.6"/>
  <text x="470" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">工具C</text>

  <!-- 工具调用标注 -->
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">独立工具调用</text>

  <!-- 列：ReAct（右，高亮） -->
  <rect x="540" y="60" width="220" height="60" rx="6" fill="#409EFF" stroke="#409EFF" stroke-width="2"/>
  <text x="650" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">ReAct</text>

  <!-- ReAct 循环模式 -->
  <circle cx="580" cy="165" r="16" fill="#409EFF" opacity="0.8"/>
  <text x="580" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">思考</text>
  <line x1="596" y1="158" x2="614" y2="148" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="618" y="140" width="32" height="32" rx="4" fill="#409EFF" opacity="0.5"/>
  <text x="634" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">工具</text>
  <line x1="650" y1="158" x2="668" y2="165" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="686" cy="165" r="16" fill="#409EFF" opacity="0.8"/>
  <text x="686" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">思考</text>
  <line x1="686" y1="181" x2="634" y2="188" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="618" y="180" width="32" height="32" rx="4" fill="#409EFF" opacity="0.5"/>
  <text x="634" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">工具</text>
  <line x1="618" y1="196" x2="580" y2="181" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ReAct 标注 -->
  <text x="650" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">思考+工具交替循环</text>

  <!-- 对比表格 -->
  <rect x="40" y="260" width="720" height="220" rx="8" fill="#fff" stroke="#d0d0d0" stroke-width="1"/>

  <!-- 表头 -->
  <rect x="40" y="260" width="200" height="40" rx="8" fill="#1a1a2e"/>
  <rect x="40" y="280" width="200" height="20" fill="#1a1a2e"/>
  <text x="140" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">对比维度</text>

  <rect x="240" y="260" width="160" height="40" fill="#e0e0e0"/>
  <text x="320" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">CoT</text>

  <rect x="400" y="260" width="160" height="40" fill="#e0e0e0"/>
  <text x="480" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Tool-Use</text>

  <rect x="560" y="260" width="200" height="40" fill="#409EFF"/>
  <text x="660" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">ReAct</text>

  <!-- 行1：推理 -->
  <line x1="40" y1="300" x2="760" y2="300" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="40" y="300" width="200" height="50" fill="#f5f8fa"/>
  <text x="140" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">推理能力</text>

  <rect x="240" y="300" width="160" height="50" fill="#fff"/>
  <text x="320" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">中等</text>

  <rect x="400" y="300" width="160" height="50" fill="#fff"/>
  <text x="480" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">低</text>

  <rect x="560" y="300" width="200" height="50" fill="#f0f7ff"/>
  <text x="660" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF">✓ 高</text>

  <!-- 行2：准确性 -->
  <line x1="40" y1="350" x2="760" y2="350" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="40" y="350" width="200" height="50" fill="#f5f8fa"/>
  <text x="140" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">准确性</text>

  <rect x="240" y="350" width="160" height="50" fill="#fff"/>
  <text x="320" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">中等</text>

  <rect x="400" y="350" width="160" height="50" fill="#fff"/>
  <text x="480" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">中等</text>

  <rect x="560" y="350" width="200" height="50" fill="#f0f7ff"/>
  <text x="660" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF">✓ 高</text>

  <!-- 行3：可解释性 -->
  <line x1="40" y1="400" x2="760" y2="400" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="40" y="400" width="200" height="50" fill="#f5f8fa"/>
  <text x="140" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">可解释性</text>

  <rect x="240" y="400" width="160" height="50" fill="#fff"/>
  <text x="320" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">高</text>

  <rect x="400" y="400" width="160" height="50" fill="#fff"/>
  <text x="480" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">低</text>

  <rect x="560" y="400" width="200" height="50" fill="#f0f7ff"/>
  <text x="660" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF">✓ 高</text>

  <!-- 底部标注 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">ReAct 模式在三个维度上均表现最优</text>
</svg>