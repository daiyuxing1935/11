<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="108" height="108">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLight" x="-2" y="-2" width="108" height="108">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">A2A（Agent-to-Agent）协议概念图</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" stroke-opacity="0.4"/>

  <!-- ==================== 左侧：Agent Card ==================== -->
  <text x="30" y="80" font-size="14" font-weight="700" fill="#1a1a2e">Agent 卡片</text>

  <!-- JSON 卡片 -->
  <rect x="30" y="92" width="220" height="370" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="92" width="220" height="32" rx="10" fill="#409EFF"/>
  <rect x="30" y="112" width="220" height="10" fill="#409EFF"/>
  <text x="140" y="113" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">agent-card.json</text>

  <!-- 字段 -->
  <text x="44" y="146" font-size="12" font-weight="600" fill="#409EFF">name</text>
  <text x="44" y="162" font-size="12" fill="#1a1a2e">"AI助手"</text>

  <text x="44" y="186" font-size="12" font-weight="600" fill="#409EFF">description</text>
  <text x="44" y="202" font-size="12" fill="#1a1a2e">"多模态AI代理"</text>

  <text x="44" y="226" font-size="12" font-weight="600" fill="#409EFF">URL</text>
  <text x="44" y="242" font-size="12" fill="#409EFF">https://agent.ai</text>

  <text x="44" y="266" font-size="12" font-weight="600" fill="#409EFF">capabilities</text>
  <text x="44" y="282" font-size="12" fill="#1a1a2e">streaming: true</text>
  <text x="44" y="298" font-size="12" fill="#1a1a2e">tools: [搜索, 绘图, 代码]</text>

  <text x="44" y="322" font-size="12" font-weight="600" fill="#409EFF">skills</text>
  <text x="44" y="338" font-size="12" fill="#1a1a2e">id: "skill-01"</text>
  <text x="44" y="354" font-size="12" fill="#1a1a2e">name: "文本生成"</text>
  <text x="44" y="370" font-size="12" fill="#1a1a2e">desc: "高质量文本"</text>

  <text x="44" y="394" font-size="12" font-weight="600" fill="#409EFF">endpoints</text>
  <text x="44" y="410" font-size="12" fill="#1a1a2e">task: /v1/task</text>
  <text x="44" y="426" font-size="12" fill="#1a1a2e">status: /v1/status</text>
  <text x="44" y="442" font-size="12" fill="#1a1a2e">cancel: /v1/cancel</text>

  <!-- 标注 1 -->
  <line x1="255" y1="130" x2="280" y2="130" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="280" cy="130" r="3" fill="#409EFF"/>
  <rect x="286" y="118" width="62" height="24" rx="12" fill="#409EFF" opacity="0.9"/>
  <text x="317" y="134" text-anchor="middle" font-size="11" fill="#FFFFFF">身份标识</text>

  <!-- 标注 2 -->
  <line x1="255" y1="280" x2="280" y2="280" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="280" cy="280" r="3" fill="#409EFF"/>
  <rect x="286" y="268" width="62" height="24" rx="12" fill="#409EFF" opacity="0.9"/>
  <text x="317" y="284" text-anchor="middle" font-size="11" fill="#FFFFFF">能力声明</text>

  <!-- ==================== 中间：Task Lifecycle ==================== -->
  <text x="400" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">任务生命周期</text>

  <!-- 状态节点 -->
  <!-- Created -->
  <rect x="340" y="108" width="120" height="36" rx="18" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="400" y="131" text-anchor="middle" font-size="13" font-weight="600" fill="#409EFF">已创建</text>

  <!-- 箭头 1 -->
  <line x1="400" y1="144" x2="400" y2="168" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- Processing -->
  <rect x="340" y="170" width="120" height="36" rx="18" fill="#409EFF" filter="url(#shadowLight)"/>
  <text x="400" y="193" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">处理中</text>

  <!-- 分支箭头 -->
  <line x1="400" y1="206" x2="400" y2="230" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="340" y2="230" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="460" y2="230" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="340" y1="230" x2="340" y2="248" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="230" x2="400" y2="248" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="460" y1="230" x2="460" y2="248" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Completed -->
  <rect x="280" y="250" width="120" height="36" rx="18" fill="#E8F4FD" stroke="#67C23A" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="340" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#67C23A">已完成</text>

  <!-- Failed -->
  <rect x="340" y="250" width="120" height="36" rx="18" fill="#E8F4FD" stroke="#F56C6C" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="400" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#F56C6C">已失败</text>

  <!-- Cancelled -->
  <rect x="400" y="250" width="120" height="36" rx="18" fill="#E8F4FD" stroke="#909399" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="460" y="273" text-anchor="middle" font-size="13" font-weight="600" fill="#909399">已取消</text>

  <!-- 标注 3 -->
  <line x1="465" y1="125" x2="500" y2="125" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="500" cy="125" r="3" fill="#409EFF"/>
  <rect x="506" y="113" width="62" height="24" rx="12" fill="#409EFF" opacity="0.9"/>
  <text x="537" y="129" text-anchor="middle" font-size="11" fill="#FFFFFF">初始状态</text>

  <!-- 标注 4 -->
  <line x1="465" y1="188" x2="500" y2="188" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="500" cy="188" r="3" fill="#409EFF"/>
  <rect x="506" y="176" width="62" height="24" rx="12" fill="#409EFF" opacity="0.9"/>
  <text x="537" y="192" text-anchor="middle" font-size="11" fill="#FFFFFF">执行中</text>

  <!-- ==================== 右侧：三大优势 ==================== -->
  <text x="650" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">三大优势</text>

  <!-- 优势 1：互操作性 -->
  <rect x="560" y="108" width="180" height="100" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" filter="url(#shadowLight)"/>
  <!-- 图标：两个方块连接 -->
  <rect x="580" y="122" width="28" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
  <rect x="590" y="130" width="16" height="12" rx="3" fill="#409EFF"/>
  <rect x="610" y="130" width="16" height="12" rx="3" fill="#409EFF"/>
  <line x1="606" y1="136" x2="610" y2="136" stroke="#409EFF" stroke-width="1.5"/>
  <text x="640" y="140" font-size="12" font-weight="600" fill="#1a1a2e">互操作性</text>
  <text x="640" y="158" font-size="11" fill="#606266">不同供应商代理</text>
  <text x="640" y="174" font-size="11" fill="#606266">无缝连接协作</text>

  <!-- 优势 2：发现 -->
  <rect x="560" y="220" width="180" height="100" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" filter="url(#shadowLight)"/>
  <!-- 图标：放大镜 -->
  <circle cx="598" cy="240" r="12" fill="#409EFF" opacity="0.15"/>
  <circle cx="598" cy="240" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="604" y1="246" x2="612" y2="254" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="640" y="252" font-size="12" font-weight="600" fill="#1a1a2e">发现机制</text>
  <text x="640" y="270" font-size="11" fill="#606266">搜索发现</text>
  <text x="640" y="286" font-size="11" fill="#606266">合适的Agent卡片</text>

  <!-- 优势 3：标准化 -->
  <rect x="560" y="332" width="180" height="100" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" filter="url(#shadowLight)"/>
  <!-- 图标：徽章 -->
  <rect x="580" y="346" width="28" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
  <text x="594" y="365" text-anchor="middle" font-size="14" fill="#409EFF">★</text>
  <text x="640" y="364" font-size="12" font-weight="600" fill="#1a1a2e">标准化</text>
  <text x="640" y="382" font-size="11" fill="#606266">统一协议规范</text>
  <text x="640" y="398" font-size="11" fill="#606266">降低集成成本</text>

  <!-- 标注 5 -->
  <line x1="745" y1="155" x2="770" y2="155" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="770" cy="155" r="3" fill="#409EFF"/>
  <rect x="740" y="143" width="50" height="24" rx="12" fill="#409EFF" opacity="0.9"/>
  <text x="765" y="159" text-anchor="middle" font-size="11" fill="#FFFFFF">跨平台</text>

  <!-- 标注 6 -->
  <line x1="745" y1="270" x2="770" y2="270" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="770" cy="270" r="3" fill="#409EFF"/>
  <rect x="740" y="258" width="50" height="24" rx="12" fill="#409EFF" opacity="0.9"/>
  <text x="765" y="274" text-anchor="middle" font-size="11" fill="#FFFFFF">可搜索</text>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-size="12" fill="#909399">A2A 协议通过标准化 Agent 卡片实现智能体的发现、互操作与任务编排</text>
</svg>