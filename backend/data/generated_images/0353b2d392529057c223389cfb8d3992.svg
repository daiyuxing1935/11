<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EAF8"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">大语言模型 ICL 局限性分析</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 5张卡片容器 - 居中对称排列 -->
  <!-- 卡片间距计算：800-140*5=100，100/4=25，每边留白30 -->
  <!-- 卡片1：x=30 -->
  <!-- 卡片2：x=30+140+25=195 -->
  <!-- 卡片3：x=195+140+25=360 -->
  <!-- 卡片4：x=360+140+25=525 -->
  <!-- 卡片5：x=525+140+25=690 -->

  <!-- ===== 卡片1：上下文窗口硬上限 ===== -->
  <g transform="translate(30, 65)">
    <rect width="140" height="200" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <!-- 警告图标 -->
    <circle cx="70" cy="30" r="16" fill="#FFF3E0" stroke="#FFA726" stroke-width="1.5"/>
    <text x="70" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFA726">⚠</text>
    <!-- 问题标签 -->
    <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">上下文窗口</text>
    <text x="70" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">硬上限</text>
    <!-- 溢出容器图标 -->
    <rect x="35" y="95" width="70" height="40" rx="4" fill="#E3F2FD" stroke="#409EFF" stroke-width="1"/>
    <rect x="40" y="100" width="25" height="20" rx="2" fill="#409EFF" opacity="0.3"/>
    <rect x="68" y="105" width="25" height="15" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="50" y="118" width="30" height="8" rx="2" fill="#409EFF" opacity="0.2"/>
    <!-- 溢出箭头 -->
    <path d="M95 115 L105 110 L105 120 Z" fill="#FFA726"/>
    <!-- 解决方案图标 -->
    <g transform="translate(55, 148)">
      <rect x="0" y="0" width="30" height="22" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
      <text x="15" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#66BB6A">压缩</text>
    </g>
    <!-- 标注 -->
    <rect x="8" y="180" width="124" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">截断与压缩</text>
  </g>

  <!-- ===== 卡片2：示例偏差 ===== -->
  <g transform="translate(195, 65)">
    <rect width="140" height="200" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <!-- 警告图标 -->
    <circle cx="70" cy="30" r="16" fill="#FFF3E0" stroke="#FFA726" stroke-width="1.5"/>
    <text x="70" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFA726">⚠</text>
    <!-- 问题标签 -->
    <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">示例偏差</text>
    <!-- 偏态分布图 -->
    <g transform="translate(35, 80)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
      <!-- 偏态曲线 -->
      <path d="M10 35 Q15 20 25 18 Q35 16 40 22 Q45 28 50 30 Q55 32 60 33" fill="none" stroke="#FFA726" stroke-width="1.5"/>
      <path d="M10 35 Q15 20 25 18 Q35 16 40 22 Q45 28 50 30 Q55 32 60 33 L60 35 Z" fill="#FFA726" opacity="0.15"/>
      <!-- 均值线 -->
      <line x1="25" y1="5" x2="25" y2="35" stroke="#FFA726" stroke-width="0.8" stroke-dasharray="2,2"/>
    </g>
    <!-- 解决方案图标 -->
    <g transform="translate(50, 148)">
      <rect x="0" y="0" width="40" height="22" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
      <text x="20" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#66BB6A">检测</text>
    </g>
    <!-- 标注 -->
    <rect x="8" y="180" width="124" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">偏差检测面板</text>
  </g>

  <!-- ===== 卡片3：计算成本 ===== -->
  <g transform="translate(360, 65)">
    <rect width="140" height="200" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <!-- 警告图标 -->
    <circle cx="70" cy="30" r="16" fill="#FFF3E0" stroke="#FFA726" stroke-width="1.5"/>
    <text x="70" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFA726">⚠</text>
    <!-- 问题标签 -->
    <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">计算成本</text>
    <!-- Token计数器 -->
    <g transform="translate(35, 80)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
      <text x="10" y="15" font-family="Arial, sans-serif" font-size="7" fill="#1a1a2e">Token</text>
      <text x="10" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFA726">1,284</text>
      <!-- 上升箭头 -->
      <path d="M55 30 L60 18 L65 30" fill="none" stroke="#FFA726" stroke-width="1.5"/>
      <path d="M60 18 L60 30" fill="none" stroke="#FFA726" stroke-width="1"/>
    </g>
    <!-- 解决方案图标 - 分层/缓存/共享 -->
    <g transform="translate(38, 148)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>
      <text x="9" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">层</text>
      <rect x="22" y="0" width="18" height="18" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>
      <text x="31" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">缓</text>
      <rect x="44" y="0" width="18" height="18" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>
      <text x="53" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">共</text>
    </g>
    <!-- 标注 -->
    <rect x="8" y="180" width="124" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">成本优化策略</text>
  </g>

  <!-- ===== 卡片4：小模型衰减 ===== -->
  <g transform="translate(525, 65)">
    <rect width="140" height="200" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <!-- 警告图标 -->
    <circle cx="70" cy="30" r="16" fill="#FFF3E0" stroke="#FFA726" stroke-width="1.5"/>
    <text x="70" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFA726">⚠</text>
    <!-- 问题标签 -->
    <text x="70" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">小模型衰减</text>
    <!-- 模型大小 vs ICL效果图 -->
    <g transform="translate(35, 78)">
      <rect x="0" y="0" width="70" height="40" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
      <!-- 坐标轴 -->
      <line x1="8" y1="35" x2="65" y2="35" stroke="#1a1a2e" stroke-width="0.5"/>
      <line x1="8" y1="5" x2="8" y2="35" stroke="#1a1a2e" stroke-width="0.5"/>
      <!-- 效果曲线 - 在7B处陡降 -->
      <path d="M12 10 Q20 8 30 9 Q40 10 45 15 Q50 25 55 32 Q60 34 63 35" fill="none" stroke="#FFA726" stroke-width="1.5"/>
      <!-- 7B标记线 -->
      <line x1="40" y1="5" x2="40" y2="35" stroke="#FFA726" stroke-width="0.8" stroke-dasharray="2,2"/>
      <text x="40" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FFA726">7B</text>
    </g>
    <!-- 解决方案图标 -->
    <g transform="translate(45, 148)">
      <rect x="0" y="0" width="50" height="22" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">微调/零样本</text>
    </g>
    <!-- 标注 -->
    <rect x="8" y="180" width="124" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">微调或零样本</text>
  </g>

  <!-- ===== 卡片5：黑盒本质 ===== -->
  <g transform="translate(690, 65)">
    <rect width="140" height="200" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <!-- 警告图标 -->
    <circle cx="70" cy="30" r="16" fill="#FFF3E0" stroke="#FFA726" stroke-width="1.5"/>
    <text x="70" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFA726">⚠</text>
    <!-- 问题标签 -->
    <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">黑盒本质</text>
    <!-- 黑盒图标 -->
    <g transform="translate(40, 85)">
      <rect x="0" y="0" width="60" height="40" rx="4" fill="#1a1a2e" stroke="#409EFF" stroke-width="1"/>
      <text x="30" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">?</text>
    </g>
    <!-- 解决方案图标 - 监控/阈值/人工 -->
    <g transform="translate(38, 148)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>
      <text x="9" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">监</text>
      <rect x="22" y="0" width="18" height="18" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>
      <text x="31" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">阈</text>
      <rect x="44" y="0" width="18" height="18" rx="3" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>
      <text x="53" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#66BB6A">人</text>
    </g>
    <!-- 标注 -->
    <rect x="8" y="180" width="124" height="16" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">监控与人工审核</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(400, 290)">
    <rect x="-180" y="0" width="360" height="28" rx="14" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" opacity="0.8"/>
    <text x="0" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">💡 每项局限性均配有对应的优化解决方案</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(400, 335)">
    <rect x="-120" y="0" width="240" height="22" rx="6" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="-80" cy="11" r="5" fill="#FFA726"/>
    <text x="-68" y="15" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">局限性</text>
    <circle cx="10" cy="11" r="5" fill="#66BB6A"/>
    <text x="22" y="15" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">解决方案</text>
    <circle cx="100" cy="11" r="5" fill="#409EFF"/>
    <text x="112" y="15" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">分析维度</text>
  </g>

  <!-- 装饰性底部渐变条 -->
  <rect x="0" y="480" width="800" height="20" rx="0" fill="#409EFF" opacity="0.08"/>
</svg>