<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="pillarGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6ab2ff"/>
    </linearGradient>
    <linearGradient id="pillarGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5caaff"/>
    </linearGradient>
    <linearGradient id="pillarGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#78bbff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="white" rx="12"/>
  <rect x="15" y="15" width="770" height="470" fill="url(#bgGrad)" rx="10"/>

  <!-- 顶部横幅 -->
  <rect x="200" y="30" width="400" height="48" rx="24" fill="#409EFF" filter="url(#shadow)"/>
  <text x="400" y="61" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" letter-spacing="2">核心三要点 / Three Core Takeaways</text>

  <!-- 底座 -->
  <rect x="80" y="390" width="640" height="14" rx="7" fill="#409EFF" opacity="0.3"/>
  <rect x="100" y="390" width="600" height="10" rx="5" fill="#409EFF" opacity="0.5"/>

  <!-- ===== 左侧柱：零样本CoT ===== -->
  <g filter="url(#shadowLight)">
    <!-- 柱体 -->
    <rect x="105" y="170" width="140" height="220" rx="12" fill="url(#pillarGrad1)"/>
    <!-- 柱顶圆角装饰 -->
    <rect x="105" y="170" width="140" height="20" rx="10" fill="#409EFF" opacity="0.8"/>
  </g>

  <!-- 图标：魔法棒 -->
  <g transform="translate(175, 195)">
    <rect x="-18" y="-18" width="36" height="36" rx="10" fill="white" opacity="0.95"/>
    <!-- 魔法棒杆 -->
    <line x1="-8" y1="12" x2="8" y2="-8" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 星星 -->
    <polygon points="8,-12 10,-6 16,-6 11,-2 13,4 8,0 3,4 5,-2 0,-6 6,-6" fill="#FFD700" opacity="0.9"/>
    <!-- 魔法光点 -->
    <circle cx="-4" cy="-10" r="1.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="-10" cy="-4" r="1" fill="#FFD700" opacity="0.5"/>
  </g>

  <!-- 左侧标题 -->
  <text x="175" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">零样本CoT</text>
  <text x="175" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.9">Zero-Shot CoT</text>

  <!-- 左侧标注 -->
  <rect x="110" y="310" width="130" height="28" rx="14" fill="white" opacity="0.9"/>
  <text x="175" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">默认选择</text>

  <rect x="110" y="345" width="130" height="28" rx="14" fill="white" opacity="0.9"/>
  <text x="175" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">一句话</text>

  <!-- ===== 中间柱：少样本CoT ===== -->
  <g filter="url(#shadowLight)">
    <rect x="330" y="130" width="140" height="260" rx="12" fill="url(#pillarGrad2)"/>
    <rect x="330" y="130" width="140" height="20" rx="10" fill="#409EFF" opacity="0.8"/>
  </g>

  <!-- 图标：示例卡片 -->
  <g transform="translate(400, 155)">
    <rect x="-18" y="-18" width="36" height="36" rx="10" fill="white" opacity="0.95"/>
    <!-- 重叠卡片 -->
    <rect x="-10" y="-8" width="16" height="20" rx="3" fill="#409EFF" opacity="0.3"/>
    <rect x="-4" y="-12" width="16" height="20" rx="3" fill="#409EFF" opacity="0.5"/>
    <rect x="2" y="-16" width="16" height="20" rx="3" fill="#409EFF" opacity="0.8"/>
    <!-- 卡片上的线条 -->
    <line x1="6" y1="-10" x2="14" y2="-10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="14" y2="-6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-2" x2="12" y2="-2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 中间标题 -->
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">少样本CoT</text>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.9">Few-Shot CoT</text>

  <!-- 中间标注 -->
  <rect x="335" y="270" width="130" height="28" rx="14" fill="white" opacity="0.9"/>
  <text x="400" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">精确控制</text>

  <rect x="335" y="305" width="130" height="28" rx="14" fill="white" opacity="0.9"/>
  <text x="400" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">推理示例</text>

  <!-- ===== 右侧柱：自一致性 ===== -->
  <g filter="url(#shadowLight)">
    <rect x="555" y="100" width="140" height="290" rx="12" fill="url(#pillarGrad3)"/>
    <rect x="555" y="100" width="140" height="20" rx="10" fill="#409EFF" opacity="0.8"/>
  </g>

  <!-- 图标：重叠对勾 -->
  <g transform="translate(625, 125)">
    <rect x="-18" y="-18" width="36" height="36" rx="10" fill="white" opacity="0.95"/>
    <!-- 对勾1 -->
    <polyline points="-10,-2 -4,6 10,-8" stroke="#409EFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 对勾2（重叠） -->
    <polyline points="-6,-6 0,2 14,-12" stroke="#409EFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
    <!-- 对勾3 -->
    <polyline points="-14,2 -8,10 6,-4" stroke="#409EFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  </g>

  <!-- 右侧标题 -->
  <text x="625" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">自一致性</text>
  <text x="625" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.9">Self-Consistency</text>

  <!-- 右侧标注 -->
  <rect x="560" y="240" width="130" height="28" rx="14" fill="white" opacity="0.9"/>
  <text x="625" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">杀手锏</text>

  <rect x="560" y="275" width="130" height="28" rx="14" fill="white" opacity="0.9"/>
  <text x="625" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">多次采样投票</text>

  <!-- ===== 底部标签 ===== -->
  <g transform="translate(175, 420)">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">基础推理策略</text>
  </g>

  <g transform="translate(400, 420)">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">示例引导推理</text>
  </g>

  <g transform="translate(625, 420)">
    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">投票提升稳定</text>
  </g>

  <!-- 装饰性连接线 -->
  <line x1="245" y1="380" x2="330" y2="360" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="470" y1="350" x2="555" y2="330" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- 底部装饰元素 -->
  <circle cx="60" cy="460" r="4" fill="#409EFF" opacity="0.2"/>
  <circle cx="740" cy="460" r="4" fill="#409EFF" opacity="0.2"/>
  <circle cx="400" cy="470" r="3" fill="#409EFF" opacity="0.15"/>

</svg>