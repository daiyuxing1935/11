<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="bar7B" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67c23a"/>
      <stop offset="100%" stop-color="#85ce61"/>
    </linearGradient>
    <linearGradient id="bar13B" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67c23a"/>
      <stop offset="60%" stop-color="#e6a23c"/>
      <stop offset="100%" stop-color="#e6a23c"/>
    </linearGradient>
    <linearGradient id="bar70B" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e6a23c"/>
      <stop offset="40%" stop-color="#f56c6c"/>
      <stop offset="100%" stop-color="#f56c6c"/>
    </linearGradient>
    <linearGradient id="bar175B" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f56c6c"/>
      <stop offset="25%" stop-color="#f56c6c"/>
      <stop offset="100%" stop-color="#c03636"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">不同模型规模的内存需求对比</text>

  <!-- 柱状图区域 -->
  <g transform="translate(0, 0)">
    <!-- Y轴标签 -->
    <text x="60" y="80" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">LLaMA-2-7B</text>
    <text x="60" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">LLaMA-2-13B</text>
    <text x="60" y="180" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">LLaMA-2-70B</text>
    <text x="60" y="230" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">GPT-3-175B</text>

    <!-- 柱状条 -->
    <!-- 7B: 28GB - 绿色 -->
    <rect x="75" y="65" width="140" height="24" rx="4" fill="url(#bar7B)"/>
    <text x="220" y="82" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">28GB</text>

    <!-- 13B: 52GB - 黄绿 -->
    <rect x="75" y="115" width="260" height="24" rx="4" fill="url(#bar13B)"/>
    <text x="340" y="132" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">52GB</text>

    <!-- 70B: 280GB - 橙红 -->
    <rect x="75" y="165" width="350" height="24" rx="4" fill="url(#bar70B)"/>
    <text x="430" y="182" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">280GB</text>

    <!-- 175B: 700GB - 红 -->
    <rect x="75" y="215" width="420" height="24" rx="4" fill="url(#bar175B)"/>
    <text x="500" y="232" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">700GB</text>

    <!-- 虚线 - 24GB限制 -->
    <line x1="75" y1="55" x2="75" y2="250" stroke="#f56c6c" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="65" y="55" width="20" height="195" fill="none" stroke="#f56c6c" stroke-width="1" stroke-dasharray="6,4" rx="2"/>
    <text x="75" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#f56c6c" font-weight="bold">单消费级GPU上限(24GB)</text>
  </g>

  <!-- 分隔线 -->
  <line x1="40" y1="295" x2="760" y2="295" stroke="#d0d7e0" stroke-width="1"/>

  <!-- 照片压缩类比 -->
  <text x="400" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a1a2e">照片压缩类比：精度 vs 大小</text>

  <!-- RAW -->
  <g transform="translate(50, 345)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#f56c6c" opacity="0.85"/>
    <text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">RAW (FP32)</text>
    <text x="75" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">50MB</text>
    <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f56c6c">⚡ 高精度</text>
  </g>

  <!-- PNG -->
  <g transform="translate(230, 345)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#e6a23c" opacity="0.85"/>
    <text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">PNG (FP16)</text>
    <text x="75" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">15MB</text>
    <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e6a23c">⚡ 较高精度</text>
  </g>

  <!-- JPEG-HQ -->
  <g transform="translate(410, 345)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#67c23a" opacity="0.85"/>
    <text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">JPEG-HQ (INT8)</text>
    <text x="75" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">5MB</text>
    <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#67c23a">✓ 均衡</text>
  </g>

  <!-- JPEG-LQ -->
  <g transform="translate(590, 345)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">JPEG-LQ (INT4)</text>
    <text x="75" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">2MB</text>
    <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">✓ 极致压缩</text>
  </g>

  <!-- 箭头连接 -->
  <g transform="translate(200, 375)">
    <text font-family="Arial, sans-serif" font-size="18" fill="#1a1a2e" opacity="0.4">→</text>
  </g>
  <g transform="translate(380, 375)">
    <text font-family="Arial, sans-serif" font-size="18" fill="#1a1a2e" opacity="0.4">→</text>
  </g>
  <g transform="translate(560, 375)">
    <text font-family="Arial, sans-serif" font-size="18" fill="#1a1a2e" opacity="0.4">→</text>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(0, 460)">
    <rect x="40" y="0" width="12" height="12" rx="2" fill="#67c23a"/>
    <text x="58" y="11" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">可管理</text>
    <rect x="140" y="0" width="12" height="12" rx="2" fill="#e6a23c"/>
    <text x="158" y="11" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">较大</text>
    <rect x="220" y="0" width="12" height="12" rx="2" fill="#f56c6c"/>
    <text x="238" y="11" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">过大</text>
    <rect x="310" y="0" width="12" height="12" rx="2" fill="#409EFF"/>
    <text x="328" y="11" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">最优区域</text>
  </g>
</svg>