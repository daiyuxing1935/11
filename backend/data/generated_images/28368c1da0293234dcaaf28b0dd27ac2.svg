<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E8F0"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12" flood-color="#409EFF"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">合作博弈 vs 非合作博弈</text>

  <!-- 分割线 -->
  <line x1="400" y1="52" x2="400" y2="470" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 左侧：合作博弈 -->
  <!-- 卡片背景 -->
  <rect x="25" y="60" width="355" height="410" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 左侧标题 -->
  <text x="202" y="90" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">合作博弈</text>

  <!-- 联盟圈 -->
  <circle cx="202" cy="195" r="80" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
  <circle cx="202" cy="195" r="75" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>

  <!-- Shapley值分配饼图 -->
  <!-- 份额1: 35% -->
  <path d="M202,195 L202,130 A65,65 0 0,1 248,155 Z" fill="#409EFF" opacity="0.85"/>
  <!-- 份额2: 25% -->
  <path d="M202,195 L248,155 A65,65 0 0,1 260,220 Z" fill="#6BB5FF" opacity="0.75"/>
  <!-- 份额3: 20% -->
  <path d="M202,195 L260,220 A65,65 0 0,1 220,255 Z" fill="#A0CFFF" opacity="0.7"/>
  <!-- 份额4: 20% -->
  <path d="M202,195 L220,255 A65,65 0 0,1 145,240 Z" fill="#C0DFFF" opacity="0.65"/>
  <!-- 份额5: 0% 剩余 -->
  <path d="M202,195 L145,240 A65,65 0 0,1 202,130 Z" fill="#D0E8FF" opacity="0.5"/>

  <!-- 饼图中心点 -->
  <circle cx="202" cy="195" r="6" fill="#1a1a2e"/>

  <!-- 代理人节点（联盟圈上的点） -->
  <circle cx="202" cy="115" r="12" fill="#409EFF" stroke="white" stroke-width="2"/>
  <text x="202" y="119" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">A</text>

  <circle cx="262" cy="148" r="12" fill="#6BB5FF" stroke="white" stroke-width="2"/>
  <text x="262" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">B</text>

  <circle cx="275" cy="225" r="12" fill="#409EFF" stroke="white" stroke-width="2"/>
  <text x="275" y="229" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">C</text>

  <circle cx="230" cy="268" r="12" fill="#6BB5FF" stroke="white" stroke-width="2"/>
  <text x="230" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">D</text>

  <circle cx="150" cy="255" r="12" fill="#409EFF" stroke="white" stroke-width="2"/>
  <text x="150" y="259" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">E</text>

  <circle cx="135" cy="175" r="12" fill="#6BB5FF" stroke="white" stroke-width="2"/>
  <text x="135" y="179" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">F</text>

  <!-- 指向公平份额的箭头 -->
  <!-- A → 35% -->
  <line x1="202" y1="127" x2="202" y2="145" stroke="#1a1a2e" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <polygon points="202,143 198,135 206,135" fill="#1a1a2e" opacity="0.7"/>

  <!-- B → 25% -->
  <line x1="262" y1="160" x2="252" y2="170" stroke="#1a1a2e" stroke-width="1.2" opacity="0.7"/>
  <polygon points="254,168 260,162 248,164" fill="#1a1a2e" opacity="0.7"/>

  <!-- C → 20% -->
  <line x1="270" y1="237" x2="258" y2="240" stroke="#1a1a2e" stroke-width="1.2" opacity="0.7"/>
  <polygon points="260,238 268,234 264,246" fill="#1a1a2e" opacity="0.7"/>

  <!-- 标注：公平分配 -->
  <rect x="80" y="300" width="110" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="135" y="317" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">公平分配</text>

  <rect x="210" y="300" width="110" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="265" y="317" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">Shapley值</text>

  <!-- 约束协议标注 -->
  <rect x="100" y="350" width="180" height="30" rx="15" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
  <text x="190" y="369" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">有约束协议</text>

  <!-- 联盟收益标注 -->
  <rect x="120" y="400" width="140" height="26" rx="13" fill="#1a1a2e" opacity="0.06"/>
  <text x="190" y="417" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">联盟总收益最大化</text>

  <!-- 右侧：非合作博弈 -->
  <rect x="420" y="60" width="355" height="410" rx="12" fill="white" stroke="#B0C4DE" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="597" y="90" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">非合作博弈</text>

  <!-- 博弈矩阵桌 -->
  <rect x="470" y="130" width="255" height="180" rx="6" fill="url(#rightGrad)" stroke="#B0C4DE" stroke-width="1.2"/>

  <!-- 矩阵行标签 -->
  <text x="500" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">策略 X</text>
  <text x="500" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">策略 Y</text>
  <text x="500" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">策略 Z</text>

  <!-- 矩阵列标签 -->
  <text x="555" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">策略A</text>
  <text x="615" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">策略B</text>
  <text x="675" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">策略C</text>

  <!-- 矩阵网格线 -->
  <line x1="530" y1="155" x2="530" y2="290" stroke="#B0C4DE" stroke-width="1"/>
  <line x1="595" y1="155" x2="595" y2="290" stroke="#B0C4DE" stroke-width="1"/>
  <line x1="660" y1="155" x2="660" y2="290" stroke="#B0C4DE" stroke-width="1"/>
  <line x1="470" y1="185" x2="725" y2="185" stroke="#B0C4DE" stroke-width="1"/>
  <line x1="470" y1="230" x2="725" y2="230" stroke="#B0C4DE" stroke-width="1"/>
  <line x1="470" y1="275" x2="725" y2="275" stroke="#B0C4DE" stroke-width="1"/>

  <!-- 矩阵中的收益值 -->
  <text x="562" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(3,2)</text>
  <text x="625" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(1,4)</text>
  <text x="690" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(2,1)</text>

  <text x="562" y="223" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(2,3)</text>
  <text x="625" y="223" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(4,1)</text>
  <text x="690" y="223" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(1,3)</text>

  <text x="562" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(1,2)</text>
  <text x="625" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(3,3)</text>
  <text x="690" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">(2,4)</text>

  <!-- 独立代理人 -->
  <!-- 代理人1 -->
  <circle cx="490" cy="340" r="14" fill="#409EFF" stroke="white" stroke-width="2.5"/>
  <text x="490" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">P1</text>

  <!-- 代理人2 -->
  <circle cx="560" cy="340" r="14" fill="#6BB5FF" stroke="white" stroke-width="2.5"/>
  <text x="560" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">P2</text>

  <!-- 代理人3 -->
  <circle cx="630" cy="340" r="14" fill="#409EFF" stroke="white" stroke-width="2.5"/>
  <text x="630" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">P3</text>

  <!-- 代理人4 -->
  <circle cx="700" cy="340" r="14" fill="#6BB5FF" stroke="white" stroke-width="2.5"/>
  <text x="700" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">P4</text>

  <!-- 从代理人指向矩阵的箭头 -->
  <line x1="490" y1="326" x2="490" y2="295" stroke="#1a1a2e" stroke-width="1" opacity="0.4" marker-end="url(#arrowSmall)"/>
  <polygon points="490,298 486,304 494,304" fill="#1a1a2e" opacity="0.4"/>

  <line x1="560" y1="326" x2="560" y2="295" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <polygon points="560,298 556,304 564,304" fill="#1a1a2e" opacity="0.4"/>

  <line x1="630" y1="326" x2="630" y2="295" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <polygon points="630,298 626,304 634,304" fill="#1a1a2e" opacity="0.4"/>

  <line x1="700" y1="326" x2="700" y2="295" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <polygon points="700,298 696,304 704,304" fill="#1a1a2e" opacity="0.4"/>

  <!-- 标注：独立决策 -->
  <rect x="470" y="375" width="120" height="26" rx="13" fill="#B0C4DE" opacity="0.25"/>
  <text x="530" y="392" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">独立决策</text>

  <rect x="610" y="375" width="120" height="26" rx="13" fill="#B0C4DE" opacity="0.25"/>
  <text x="670" y="392" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">个人收益最大化</text>

  <!-- 无协议标注 -->
  <rect x="500" y="420" width="180" height="30" rx="15" fill="#E8E0E0" stroke="#C0A0A0" stroke-width="1"/>
  <text x="590" y="439" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#8B6B6B">无约束协议</text>

  <!-- 中间分隔标注 -->
  <!-- 顶部标注 -->
  <rect x="340" y="130" width="120" height="28" rx="14" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
  <text x="400" y="149" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">有协议</text>

  <rect x="340" y="420" width="120" height="28" rx="14" fill="#B0C4DE" opacity="0.25" stroke="#B0C4DE" stroke-width="1"/>
  <text x="400" y="439" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6B7B8B">无协议</text>

  <!-- 中间箭头 -->
  <line x1="400" y1="165" x2="400" y2="200" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  <polygon points="400,198 395,205 405,205" fill="#409EFF" opacity="0.5"/>

  <line x1="400" y1="410" x2="400" y2="375" stroke="#B0C4DE" stroke-width="1.5" opacity="0.5"/>
  <polygon points="400,377 395,370 405,370" fill="#B0C4DE" opacity="0.5"/>

</svg>