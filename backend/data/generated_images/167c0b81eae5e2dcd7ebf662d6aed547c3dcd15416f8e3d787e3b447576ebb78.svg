<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE0"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- AI Agent 外框 -->
  <rect x="40" y="30" width="720" height="440" rx="20" ry="20" fill="none" stroke="#409EFF" stroke-width="3" stroke-dasharray="0" filter="url(#shadow)"/>
  <rect x="40" y="30" width="720" height="440" rx="20" ry="20" fill="white" fill-opacity="0.3"/>

  <!-- AI Agent 标签 -->
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI Agent</text>

  <!-- LLM (Brain) 模块 - 左上 -->
  <rect x="75" y="85" width="240" height="160" rx="14" ry="14" fill="url(#llmGrad)" filter="url(#glow)" opacity="0.95"/>
  <rect x="75" y="85" width="240" height="160" rx="14" ry="14" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- LLM 内部发光效果 -->
  <rect x="85" y="95" width="220" height="140" rx="10" ry="10" fill="white" fill-opacity="0.1"/>

  <text x="195" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">LLM（大脑）</text>

  <!-- LLM 图标：文本理解 -->
  <g transform="translate(100, 135)">
    <rect x="0" y="0" width="50" height="36" rx="6" fill="white" fill-opacity="0.2"/>
    <text x="25" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">文本</text>
    <text x="25" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">理解</text>
  </g>

  <!-- LLM 图标：知识推理 -->
  <g transform="translate(170, 135)">
    <rect x="0" y="0" width="50" height="36" rx="6" fill="white" fill-opacity="0.2"/>
    <text x="25" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">知识</text>
    <text x="25" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">推理</text>
  </g>

  <!-- LLM 图标：内容生成 -->
  <g transform="translate(240, 135)">
    <rect x="0" y="0" width="50" height="36" rx="6" fill="white" fill-opacity="0.2"/>
    <text x="25" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">内容</text>
    <text x="25" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">生成</text>
  </g>

  <!-- Planner 模块 - 右上 -->
  <rect x="470" y="85" width="240" height="140" rx="14" ry="14" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">规划器</text>

  <!-- 路线图树图标 -->
  <g transform="translate(530, 135)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#409EFF" stroke-width="2"/>
    <line x1="0" y1="10" x2="30" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="25" x2="25" y2="25" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="40" x2="28" y2="40" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF"/>
    <circle cx="30" cy="10" r="3" fill="#409EFF" fill-opacity="0.6"/>
    <circle cx="25" cy="25" r="3" fill="#409EFF" fill-opacity="0.6"/>
    <circle cx="28" cy="40" r="3" fill="#409EFF" fill-opacity="0.6"/>
  </g>
  <text x="590" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">任务分解</text>
  <text x="590" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">路径规划</text>

  <!-- Toolbox 模块 - 左下 -->
  <rect x="75" y="295" width="240" height="140" rx="14" ry="14" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="195" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">工具箱</text>

  <!-- 扳手图标 -->
  <g transform="translate(120, 345)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="16" y1="16" x2="28" y2="28" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="155" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">工具调用</text>

  <!-- API 齿轮图标 -->
  <g transform="translate(200, 345)">
    <circle cx="12" cy="12" r="6" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="12" cy="12" r="2" fill="#409EFF"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#409EFF" stroke-width="1.5"/>
  </g>
  <text x="235" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">API 集成</text>

  <!-- Memory System 模块 - 右下 -->
  <rect x="470" y="295" width="240" height="140" rx="14" ry="14" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">记忆系统</text>

  <!-- 堆叠芯片图标 -->
  <g transform="translate(510, 340)">
    <rect x="0" y="20" width="40" height="12" rx="2" fill="#409EFF" fill-opacity="0.3" stroke="#409EFF" stroke-width="1"/>
    <rect x="3" y="10" width="34" height="12" rx="2" fill="#409EFF" fill-opacity="0.5" stroke="#409EFF" stroke-width="1"/>
    <rect x="6" y="0" width="28" height="12" rx="2" fill="#409EFF" fill-opacity="0.7" stroke="#409EFF" stroke-width="1"/>
  </g>
  <text x="590" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" fill-opacity="0.7">短期 / 长期 / 工作</text>
  <text x="590" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" fill-opacity="0.7">记忆存储与检索</text>

  <!-- Execution Engine 模块 - 底部中央 -->
  <rect x="280" y="385" width="240" height="55" rx="14" ry="14" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">执行引擎</text>

  <!-- 循环箭头图标 -->
  <g transform="translate(340, 400)">
    <path d="M 0 10 A 10 10 0 1 1 20 10" fill="none" stroke="#409EFF" stroke-width="2"/>
    <polygon points="20,5 22,12 16,10" fill="#409EFF"/>
    <path d="M 20 10 A 10 10 0 1 1 0 10" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="3,3"/>
    <polygon points="0,15 -2,8 4,10" fill="#409EFF"/>
  </g>
  <text x="470" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" fill-opacity="0.7">循环执行</text>

  <!-- 连接线：LLM 到 Planner -->
  <line x1="315" y1="150" x2="470" y2="150" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="465,145 475,150 465,155" fill="#409EFF" opacity="0.6"/>

  <!-- 连接线：LLM 到 Toolbox -->
  <line x1="195" y1="245" x2="195" y2="295" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="190,290 195,300 200,290" fill="#409EFF" opacity="0.6"/>

  <!-- 连接线：Planner 到 Execution Engine -->
  <line x1="590" y1="225" x2="590" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="590" y1="260" x2="400" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="400" y1="260" x2="400" y2="385" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="395,380 400,390 405,380" fill="#409EFF" opacity="0.6"/>

  <!-- 连接线：Toolbox 到 Execution Engine -->
  <line x1="195" y1="435" x2="280" y2="420" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="275,415 285,418 278,424" fill="#409EFF" opacity="0.6"/>

  <!-- 连接线：Memory System 到 Execution Engine -->
  <line x1="470" y1="365" x2="400" y2="385" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="405,380 395,385 403,390" fill="#409EFF" opacity="0.6"/>

  <!-- 连接线：Memory System 到 LLM -->
  <line x1="470" y1="340" x2="315" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- 人物剪影 - 右侧指向 LLM -->
  <g transform="translate(680, 180)">
    <!-- 头部 -->
    <circle cx="0" cy="-30" r="12" fill="#1a1a2e"/>
    <!-- 身体 -->
    <line x1="0" y1="-18" x2="0" y2="20" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
    <!-- 手臂指向 -->
    <line x1="0" y1="-5" x2="-55" y2="-25" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="0" y1="20" x2="-10" y2="45" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="10" y2="45" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 对话框 -->
  <rect x="615" y="130" width="130" height="36" rx="10" ry="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="615,148 605,155 615,155" fill="white" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="615,149 607,155 615,155" fill="white"/>
  <text x="680" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-style="italic">这只是其中一部分</text>

  <!-- 装饰性科技圆点 -->
  <circle cx="50" cy="50" r="2" fill="#409EFF" opacity="0.3"/>
  <circle cx="750" cy="50" r="2" fill="#409EFF" opacity="0.3"/>
  <circle cx="50" cy="450" r="2" fill="#409EFF" opacity="0.3"/>
  <circle cx="750" cy="450" r="2" fill="#409EFF" opacity="0.3"/>
</svg>