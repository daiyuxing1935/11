<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">投资决策冲突解决案例</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== 三位分析师 ===== -->
  <!-- 技术分析师 -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <rect x="0" y="0" width="200" height="32" rx="12" fill="#409EFF" opacity="0.1"/>
    <text x="100" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">📊 技术分析师</text>
    <!-- 图表图标 -->
    <g transform="translate(40, 55)">
      <rect x="0" y="8" width="28" height="20" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <polyline points="4,24 8,18 14,22 20,12 24,16" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="28" x2="28" y2="28" stroke="#409EFF" stroke-width="1"/>
    </g>
    <text x="120" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#409EFF">BUY</text>
    <text x="120" y="90" text-anchor="middle" font-size="13" fill="#666">买入信号</text>
    <rect x="140" y="55" width="50" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
    <text x="165" y="70" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="bold">权重 1.0</text>
  </g>

  <!-- 基本面分析师 -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <rect x="0" y="0" width="200" height="32" rx="12" fill="#409EFF" opacity="0.1"/>
    <text x="100" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">📋 基本面分析师</text>
    <!-- 表格图标 -->
    <g transform="translate(40, 52)">
      <rect x="0" y="0" width="28" height="24" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="0" y1="8" x2="28" y2="8" stroke="#409EFF" stroke-width="1"/>
      <line x1="0" y1="16" x2="28" y2="16" stroke="#409EFF" stroke-width="1"/>
      <line x1="14" y1="0" x2="14" y2="24" stroke="#409EFF" stroke-width="1"/>
    </g>
    <text x="120" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#E6A23C">HOLD</text>
    <text x="120" y="90" text-anchor="middle" font-size="13" fill="#666">持有观望</text>
    <rect x="140" y="55" width="50" height="22" rx="11" fill="#E6A23C" opacity="0.15"/>
    <text x="165" y="70" text-anchor="middle" font-size="11" fill="#E6A23C" font-weight="bold">权重 1.5</text>
  </g>

  <!-- 新闻情绪分析师 -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <rect x="0" y="0" width="200" height="32" rx="12" fill="#409EFF" opacity="0.1"/>
    <text x="100" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">📰 新闻情绪分析师</text>
    <!-- 报纸图标 -->
    <g transform="translate(40, 52)">
      <rect x="0" y="0" width="28" height="24" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="4" y1="6" x2="24" y2="6" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="4" y1="11" x2="24" y2="11" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="4" y1="16" x2="18" y2="16" stroke="#409EFF" stroke-width="1.2"/>
    </g>
    <text x="120" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="#F56C6C">SELL</text>
    <text x="120" y="90" text-anchor="middle" font-size="13" fill="#666">卖出信号</text>
    <rect x="140" y="55" width="50" height="22" rx="11" fill="#F56C6C" opacity="0.15"/>
    <text x="165" y="70" text-anchor="middle" font-size="11" fill="#F56C6C" font-weight="bold">权重 0.8</text>
  </g>

  <!-- 分歧箭头 -->
  <g transform="translate(260, 145)">
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">观点冲突</text>
    <line x1="-15" y1="6" x2="15" y2="6" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  </g>
  <g transform="translate(500, 145)">
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">观点冲突</text>
    <line x1="-15" y1="6" x2="15" y2="6" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ===== 步骤流程 ===== -->
  <!-- 连接箭头 1 -->
  <g transform="translate(400, 210)">
    <line x1="0" y1="0" x2="0" y2="20" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="0,24 -5,18 5,18" fill="#409EFF"/>
  </g>

  <!-- 步骤1：收集详细分析 -->
  <g transform="translate(30, 240)">
    <rect x="0" y="0" width="740" height="44" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 1px 4px rgba(64,158,255,0.1))"/>
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#409EFF"/>
    <text x="22" y="28" text-anchor="middle" font-size="18" fill="#FFF" font-weight="bold">1</text>
    <text x="56" y="28" font-size="15" font-weight="bold" fill="#1a1a2e">收集详细分析</text>
    <!-- 三张分析卡片 -->
    <rect x="220" y="8" width="60" height="28" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="250" y="27" text-anchor="middle" font-size="12" fill="#409EFF">技术图表</text>
    <rect x="295" y="8" width="60" height="28" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="325" y="27" text-anchor="middle" font-size="12" fill="#409EFF">财务数据</text>
    <rect x="370" y="8" width="60" height="28" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="400" y="27" text-anchor="middle" font-size="12" fill="#409EFF">新闻情绪</text>
  </g>

  <!-- 连接箭头 2 -->
  <g transform="translate(400, 290)">
    <line x1="0" y1="0" x2="0" y2="16" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="0,20 -5,14 5,14" fill="#409EFF"/>
  </g>

  <!-- 步骤2：加权投票 -->
  <g transform="translate(30, 316)">
    <rect x="0" y="0" width="740" height="44" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 1px 4px rgba(64,158,255,0.1))"/>
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#409EFF"/>
    <text x="22" y="28" text-anchor="middle" font-size="18" fill="#FFF" font-weight="bold">2</text>
    <text x="56" y="28" font-size="15" font-weight="bold" fill="#1a1a2e">加权投票</text>
    <text x="200" y="27" font-size="13" fill="#666">技术 1.0</text>
    <text x="300" y="27" font-size="13" fill="#666">基本面 1.5</text>
    <text x="400" y="27" font-size="13" fill="#666">新闻 0.8</text>
    <rect x="480" y="8" width="80" height="28" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="520" y="27" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">共识值 0.52</text>
  </g>

  <!-- 连接箭头 3 -->
  <g transform="translate(400, 366)">
    <line x1="0" y1="0" x2="0" y2="16" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="0,20 -5,14 5,14" fill="#409EFF"/>
  </g>

  <!-- 步骤3：高分歧时辩论 -->
  <g transform="translate(30, 392)">
    <rect x="0" y="0" width="740" height="44" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 1px 4px rgba(64,158,255,0.1))"/>
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#409EFF"/>
    <text x="22" y="28" text-anchor="middle" font-size="18" fill="#FFF" font-weight="bold">3</text>
    <text x="56" y="28" font-size="15" font-weight="bold" fill="#1a1a2e">高分歧时辩论</text>
    <text x="240" y="27" font-size="13" fill="#666">共识 &lt; 0.6 →</text>
    <rect x="340" y="8" width="100" height="28" rx="6" fill="#F56C6C" opacity="0.1"/>
    <text x="390" y="27" text-anchor="middle" font-size="13" fill="#F56C6C" font-weight="bold">触发辩论机制</text>
  </g>

  <!-- 连接箭头 4 -->
  <g transform="translate(400, 442)">
    <line x1="0" y1="0" x2="0" y2="16" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="0,20 -5,14 5,14" fill="#409EFF"/>
  </g>

  <!-- 步骤4：人工复核 -->
  <g transform="translate(30, 468)">
    <rect x="0" y="0" width="740" height="44" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 1px 4px rgba(64,158,255,0.1))"/>
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#409EFF"/>
    <text x="22" y="28" text-anchor="middle" font-size="18" fill="#FFF" font-weight="bold">4</text>
    <text x="56" y="28" font-size="15" font-weight="bold" fill="#1a1a2e">人工复核</text>
    <text x="240" y="27" font-size="13" fill="#666">仍不确定 →</text>
    <rect x="340" y="8" width="120" height="28" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="400" y="27" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">分析师提交报告</text>
  </g>

  <!-- 标注 -->
  <g transform="translate(400, 170)">
    <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">决策冲突案例</text>
  </g>

</svg>