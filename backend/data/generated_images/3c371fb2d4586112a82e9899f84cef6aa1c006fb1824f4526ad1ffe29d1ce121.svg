<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ecff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF" />
    </marker>
    <marker id="arrowBlueSmall" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF" />
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8" />

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">错误处理流程示意图</text>

  <!-- ==================== 节点 1：重试（左上） ==================== -->
  <rect x="50" y="70" width="200" height="70" rx="14" ry="14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="2" />
  <text x="150" y="100" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">重试</text>
  <text x="150" y="122" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">指数退避</text>

  <!-- 重试循环箭头（从节点右侧出发，绕回节点左侧） -->
  <path d="M 250 105 C 290 105, 290 45, 250 45 C 210 45, 170 45, 150 45 C 130 45, 90 45, 50 70" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlueSmall)" />
  <!-- 退避时间标注 -->
  <text x="270" y="55" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">1s→2s→4s</text>

  <!-- ==================== 节点 2：熔断器（右上） ==================== -->
  <rect x="520" y="70" width="200" height="70" rx="14" ry="14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="2" />
  <text x="620" y="100" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">熔断器</text>
  <!-- 开关图标 -->
  <circle cx="570" cy="118" r="8" fill="none" stroke="#1a1a2e" stroke-width="1.5" />
  <circle cx="670" cy="118" r="8" fill="none" stroke="#1a1a2e" stroke-width="1.5" />
  <line x1="578" y1="118" x2="662" y2="118" stroke="#1a1a2e" stroke-width="1.5" />
  <line x1="570" y1="110" x2="570" y2="102" stroke="#1a1a2e" stroke-width="1.5" />
  <line x1="670" y1="110" x2="670" y2="102" stroke="#1a1a2e" stroke-width="1.5" />
  <text x="620" y="140" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#1a1a2e">连续失败检测</text>

  <!-- 从节点1到节点2的箭头 -->
  <line x1="250" y1="105" x2="520" y2="105" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)" />

  <!-- ==================== 节点 3：降级（左下） ==================== -->
  <rect x="50" y="260" width="200" height="70" rx="14" ry="14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="2" />
  <text x="150" y="290" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">降级</text>
  <text x="150" y="312" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">备用方案</text>

  <!-- 从节点1到节点3的箭头（分支） -->
  <path d="M 150 140 L 150 260" fill="none" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)" />
  <!-- 分支标注 -->
  <text x="165" y="200" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">失败分支</text>

  <!-- ==================== 节点 4：优雅失败（右下） ==================== -->
  <rect x="520" y="260" width="200" height="70" rx="14" ry="14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="2" />
  <text x="620" y="290" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">优雅失败</text>
  <!-- 消息气泡 -->
  <rect x="560" y="300" width="120" height="22" rx="11" ry="11" fill="#e8f4ff" stroke="#409EFF" stroke-width="1" />
  <text x="620" y="315" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#1a1a2e">请稍后重试</text>

  <!-- 从节点2到节点4的箭头 -->
  <path d="M 620 140 L 620 260" fill="none" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)" />

  <!-- ==================== 连接线标注 ==================== -->
  <!-- 从节点2到节点4的标注 -->
  <text x="635" y="200" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">触发熔断</text>

  <!-- 从节点3到节点4的箭头（水平连接） -->
  <line x1="250" y1="295" x2="520" y2="295" stroke="#409EFF" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)" />
  <text x="385" y="288" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">降级失败</text>

  <!-- ==================== 图例 ==================== -->
  <rect x="50" y="400" width="700" height="80" rx="10" ry="10" fill="white" fill-opacity="0.7" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5" />
  <text x="70" y="425" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">图例：</text>

  <!-- 图例项1 -->
  <line x1="70" y1="448" x2="110" y2="448" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlueSmall)" />
  <text x="118" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">流程方向</text>

  <!-- 图例项2 -->
  <line x1="230" y1="448" x2="270" y2="448" stroke="#409EFF" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlueSmall)" />
  <text x="278" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">降级路径</text>

  <!-- 图例项3 -->
  <line x1="390" y1="448" x2="430" y2="448" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" />
  <text x="438" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">重试循环</text>

  <!-- 图例项4 -->
  <rect x="540" y="438" width="20" height="16" rx="6" ry="6" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5" />
  <text x="568" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">策略节点</text>

</svg>