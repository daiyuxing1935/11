<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f3ff"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8fe0"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5aabf5"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="lowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2d7fd0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI 项目决策金字塔</text>

  <!-- ===== 第1层：必要性检查（最宽） ===== -->
  <rect x="80" y="50" width="640" height="70" rx="10" fill="url(#topGrad)" opacity="0.95"/>
  <text x="100" y="80" font-family="sans-serif" font-size="15" font-weight="bold" fill="#ffffff">第1层：必要性检查</text>
  <text x="100" y="102" font-family="sans-serif" font-size="14" fill="#e6f0ff">你真的需要 AI 吗？</text>

  <!-- 规则引擎图标（替代方案） -->
  <rect x="580" y="62" width="120" height="46" rx="6" fill="#ffffff" opacity="0.9"/>
  <text x="640" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">⚙ 规则引擎</text>
  <text x="640" y="97" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">传统方案替代</text>

  <!-- 箭头1 -->
  <polygon points="400,125 390,115 410,115" fill="#409EFF"/>
  <line x1="400" y1="120" x2="400" y2="140" stroke="#409EFF" stroke-width="2"/>

  <!-- ===== 第2层：可行性检查 ===== -->
  <rect x="120" y="140" width="560" height="90" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2"/>
  <text x="140" y="165" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">第2层：可行性检查</text>

  <!-- 四个复选框 -->
  <g transform="translate(140, 180)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#409EFF"/>
    <text x="22" y="14" font-family="sans-serif" font-size="13" fill="#1a1a2e">任务清晰度</text>
    <text x="95" y="14" font-family="sans-serif" font-size="12" fill="#409EFF">✓</text>

    <rect x="120" y="0" width="18" height="18" rx="3" fill="#409EFF"/>
    <text x="142" y="14" font-family="sans-serif" font-size="13" fill="#1a1a2e">数据可用性</text>
    <text x="215" y="14" font-family="sans-serif" font-size="12" fill="#409EFF">✓</text>

    <rect x="240" y="0" width="18" height="18" rx="3" fill="#e74c3c"/>
    <text x="262" y="14" font-family="sans-serif" font-size="13" fill="#1a1a2e">验证可行性</text>
    <text x="335" y="14" font-family="sans-serif" font-size="12" fill="#e74c3c">✗</text>

    <rect x="360" y="0" width="18" height="18" rx="3" fill="#409EFF"/>
    <text x="382" y="14" font-family="sans-serif" font-size="13" fill="#1a1a2e">容错能力</text>
    <text x="455" y="14" font-family="sans-serif" font-size="12" fill="#409EFF">✓</text>
  </g>

  <!-- 箭头2 -->
  <polygon points="400,235 390,225 410,225" fill="#409EFF"/>
  <line x1="400" y1="230" x2="400" y2="250" stroke="#409EFF" stroke-width="2"/>

  <!-- ===== 第3层：风险评估 ===== -->
  <rect x="140" y="250" width="520" height="90" rx="10" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <text x="160" y="275" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">第3层：风险评估</text>

  <!-- 四个风险仪表 -->
  <g transform="translate(160, 290)">
    <!-- 幻觉 -->
    <rect x="0" y="0" width="110" height="36" rx="5" fill="#fff5e6" stroke="#e67e22" stroke-width="1"/>
    <text x="55" y="15" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">幻觉</text>
    <rect x="10" y="20" width="12" height="8" rx="2" fill="#e67e22"/>
    <rect x="26" y="20" width="12" height="8" rx="2" fill="#e67e22"/>
    <rect x="42" y="20" width="12" height="8" rx="2" fill="#e67e22" opacity="0.4"/>
    <rect x="58" y="20" width="12" height="8" rx="2" fill="#ddd"/>
    <rect x="74" y="20" width="12" height="8" rx="2" fill="#ddd"/>

    <!-- 偏见 -->
    <rect x="125" y="0" width="110" height="36" rx="5" fill="#fff5e6" stroke="#e67e22" stroke-width="1"/>
    <text x="180" y="15" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">偏见</text>
    <rect x="135" y="20" width="12" height="8" rx="2" fill="#e67e22"/>
    <rect x="151" y="20" width="12" height="8" rx="2" fill="#e67e22"/>
    <rect x="167" y="20" width="12" height="8" rx="2" fill="#e67e22" opacity="0.4"/>
    <rect x="183" y="20" width="12" height="8" rx="2" fill="#ddd"/>
    <rect x="199" y="20" width="12" height="8" rx="2" fill="#ddd"/>

    <!-- 安全 -->
    <rect x="250" y="0" width="110" height="36" rx="5" fill="#e8f4e8" stroke="#409EFF" stroke-width="1"/>
    <text x="305" y="15" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">安全</text>
    <rect x="260" y="20" width="12" height="8" rx="2" fill="#409EFF"/>
    <rect x="276" y="20" width="12" height="8" rx="2" fill="#409EFF"/>
    <rect x="292" y="20" width="12" height="8" rx="2" fill="#409EFF" opacity="0.4"/>
    <rect x="308" y="20" width="12" height="8" rx="2" fill="#ddd"/>
    <rect x="324" y="20" width="12" height="8" rx="2" fill="#ddd"/>

    <!-- 合规 -->
    <rect x="375" y="0" width="110" height="36" rx="5" fill="#fff5e6" stroke="#e67e22" stroke-width="1"/>
    <text x="430" y="15" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">合规</text>
    <rect x="385" y="20" width="12" height="8" rx="2" fill="#e67e22"/>
    <rect x="401" y="20" width="12" height="8" rx="2" fill="#e67e22"/>
    <rect x="417" y="20" width="12" height="8" rx="2" fill="#e67e22" opacity="0.4"/>
    <rect x="433" y="20" width="12" height="8" rx="2" fill="#ddd"/>
    <rect x="449" y="20" width="12" height="8" rx="2" fill="#ddd"/>
  </g>

  <!-- 箭头3 -->
  <polygon points="400,345 390,335 410,335" fill="#409EFF"/>
  <line x1="400" y1="340" x2="400" y2="360" stroke="#409EFF" stroke-width="2"/>

  <!-- ===== 第4层：成本收益分析（最窄） ===== -->
  <rect x="180" y="360" width="440" height="110" rx="10" fill="url(#lowGrad)" opacity="0.95"/>
  <text x="200" y="385" font-family="sans-serif" font-size="15" font-weight="bold" fill="#ffffff">第4层：成本收益分析</text>

  <!-- 天平图标 -->
  <g transform="translate(400, 430)">
    <!-- 天平横梁 -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#ffffff" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#ffffff" stroke-width="2"/>

    <!-- 左侧：成本 -->
    <line x1="-100" y1="0" x2="-100" y2="15" stroke="#ffffff" stroke-width="2"/>
    <rect x="-130" y="15" width="60" height="35" rx="4" fill="#ffffff" opacity="0.9"/>
    <text x="-100" y="30" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">总成本</text>
    <text x="-100" y="43" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">开发+API+维护</text>

    <!-- 右侧：收益 -->
    <line x1="100" y1="0" x2="100" y2="15" stroke="#ffffff" stroke-width="2"/>
    <rect x="70" y="15" width="60" height="35" rx="4" fill="#ffffff" opacity="0.9"/>
    <text x="100" y="30" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">总收益</text>
    <text x="100" y="43" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">效率+质量+UX</text>
  </g>

  <!-- ROI 标签 -->
  <rect x="330" y="445" width="140" height="22" rx="11" fill="#ffffff" opacity="0.9"/>
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">ROI &gt; 50% ✓</text>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">逐层决策，确保 AI 项目可行、可控、有价值</text>

</svg>