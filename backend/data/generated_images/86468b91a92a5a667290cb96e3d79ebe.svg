<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d7e0"/>
      <stop offset="100%" stop-color="#b8c0cc"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7cd0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 分隔线 -->
  <line x1="400" y1="50" x2="400" y2="470" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="40" text-anchor="middle" font-size="13" fill="#8899aa" font-family="sans-serif">对比</text>

  <!-- ========== 左侧：传统程序 ========== -->
  
  <!-- 左侧大背景框 -->
  <rect x="30" y="60" width="340" height="400" rx="12" fill="#e8ecf2" opacity="0.5"/>
  
  <!-- 左侧标题 -->
  <rect x="80" y="75" width="240" height="40" rx="6" fill="#7a8a9a"/>
  <text x="200" y="101" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="sans-serif">传统程序：固定流程</text>

  <!-- 输入：模板邮件 -->
  <rect x="100" y="140" width="200" height="44" rx="6" fill="url(#leftGrad)" stroke="#a0aab8" stroke-width="1.5"/>
  <text x="200" y="167" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold" font-family="sans-serif">1000封模板邮件</text>

  <!-- 箭头1 -->
  <polygon points="200,190 190,190 200,208 210,190" fill="#a0aab8"/>

  <!-- 判断框：if/else -->
  <rect x="120" y="215" width="160" height="50" rx="4" fill="#b8c4d0" stroke="#8899aa" stroke-width="1.5"/>
  <text x="200" y="235" text-anchor="middle" font-size="14" fill="#3a4a5a" font-weight="bold" font-family="sans-serif">if/else 判断</text>
  <text x="200" y="253" text-anchor="middle" font-size="13" fill="#4a5a6a" font-family="sans-serif">固定分支逻辑</text>

  <!-- 箭头2 -->
  <polygon points="200,271 190,271 200,289 210,271" fill="#a0aab8"/>

  <!-- 处理框：机械分拣 -->
  <rect x="100" y="296" width="200" height="44" rx="6" fill="url(#leftGrad)" stroke="#a0aab8" stroke-width="1.5"/>
  <text x="200" y="316" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold" font-family="sans-serif">机械式分拣处理</text>
  <text x="200" y="333" text-anchor="middle" font-size="12" fill="#e8ecf2" font-family="sans-serif">统一规则执行</text>

  <!-- 箭头3 -->
  <polygon points="200,346 190,346 200,364 210,346" fill="#a0aab8"/>

  <!-- 输出：相同结果 -->
  <rect x="110" y="371" width="180" height="44" rx="6" fill="#7a8a9a" stroke="#6a7a8a" stroke-width="1.5"/>
  <text x="200" y="398" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold" font-family="sans-serif">千篇一律的结果</text>

  <!-- 左侧标注标签 -->
  <rect x="35" y="140" width="60" height="22" rx="4" fill="#6a7a8a"/>
  <text x="65" y="155" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">输入</text>
  
  <rect x="35" y="215" width="60" height="22" rx="4" fill="#6a7a8a"/>
  <text x="65" y="230" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">逻辑</text>
  
  <rect x="35" y="371" width="60" height="22" rx="4" fill="#6a7a8a"/>
  <text x="65" y="386" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">输出</text>

  <!-- ========== 右侧：AI智能体 ========== -->
  
  <!-- 右侧大背景框 -->
  <rect x="430" y="60" width="340" height="400" rx="12" fill="#e8f4ff" opacity="0.5"/>
  
  <!-- 右侧标题 -->
  <rect x="480" y="75" width="240" height="40" rx="6" fill="#409EFF"/>
  <text x="600" y="101" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="sans-serif">AI智能体：个性化处理</text>

  <!-- 输入：客户资料 -->
  <rect x="500" y="135" width="200" height="44" rx="6" fill="#409EFF" stroke="#2b7cd0" stroke-width="1.5"/>
  <text x="600" y="155" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold" font-family="sans-serif">客户个人档案</text>
  <text x="600" y="172" text-anchor="middle" font-size="12" fill="#d0e8ff" font-family="sans-serif">每位客户独一无二</text>

  <!-- 箭头4 -->
  <polygon points="600,185 590,185 600,203 610,185" fill="#409EFF"/>

  <!-- AI机器人 -->
  <g transform="translate(560, 215)">
    <!-- 机器人身体 -->
    <rect x="0" y="20" width="80" height="65" rx="8" fill="#409EFF" stroke="#2b7cd0" stroke-width="2"/>
    <!-- 机器人头 -->
    <rect x="15" y="0" width="50" height="24" rx="10" fill="#409EFF" stroke="#2b7cd0" stroke-width="2"/>
    <!-- 眼睛 -->
    <circle cx="32" cy="12" r="4" fill="#ffffff"/>
    <circle cx="48" cy="12" r="4" fill="#ffffff"/>
    <!-- 天线 -->
    <line x1="40" y1="0" x2="40" y2="-10" stroke="#409EFF" stroke-width="2"/>
    <circle cx="40" cy="-12" r="4" fill="#66b1ff"/>
    <!-- 手臂 -->
    <rect x="-12" y="30" width="12" height="6" rx="3" fill="#409EFF"/>
    <rect x="80" y="30" width="12" height="6" rx="3" fill="#409EFF"/>
    <!-- 桌子 -->
    <rect x="-20" y="85" width="120" height="8" rx="2" fill="#c0d4e8"/>
    <rect x="-15" y="93" width="8" height="30" fill="#b0c4d8"/>
    <rect x="107" y="93" width="8" height="30" fill="#b0c4d8"/>
  </g>

  <!-- 思考气泡：个性化逻辑 -->
  <g transform="translate(470, 160)">
    <ellipse cx="100" cy="20" rx="70" ry="28" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
    <ellipse cx="80" cy="0" rx="20" ry="10" fill="#ffffff" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <ellipse cx="70" cy="-8" rx="10" ry="6" fill="#ffffff" stroke="#409EFF" stroke-width="0.8" opacity="0.85"/>
    <text x="100" y="14" text-anchor="middle" font-size="12" fill="#1a1a2e" font-family="sans-serif">分析客户需求</text>
    <text x="100" y="30" text-anchor="middle" font-size="12" fill="#1a1a2e" font-family="sans-serif">定制个性内容</text>
  </g>

  <!-- 箭头5 -->
  <polygon points="600,308 590,308 600,326 610,308" fill="#409EFF"/>

  <!-- 输出：个性化信件 -->
  <rect x="490" y="333" width="220" height="44" rx="6" fill="#409EFF" stroke="#2b7cd0" stroke-width="1.5"/>
  <text x="600" y="353" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold" font-family="sans-serif">个性化定制信件</text>
  <text x="600" y="370" text-anchor="middle" font-size="12" fill="#d0e8ff" font-family="sans-serif">每封内容各不相同</text>

  <!-- 信件图标 -->
  <g transform="translate(460, 340)">
    <rect x="0" y="5" width="24" height="18" rx="3" fill="#66b1ff"/>
    <polygon points="0,5 12,16 24,5" fill="#409EFF"/>
  </g>

  <!-- 右侧标注标签 -->
  <rect x="435" y="135" width="60" height="22" rx="4" fill="#409EFF"/>
  <text x="465" y="150" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">输入</text>
  
  <rect x="435" y="240" width="60" height="22" rx="4" fill="#409EFF"/>
  <text x="465" y="255" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">处理</text>
  
  <rect x="435" y="333" width="60" height="22" rx="4" fill="#409EFF"/>
  <text x="465" y="348" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">输出</text>

  <!-- 底部对比标注 -->
  <rect x="130" y="445" width="200" height="30" rx="6" fill="#6a7a8a" opacity="0.8"/>
  <text x="230" y="465" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">固定流程 · 无差异化</text>

  <rect x="530" y="445" width="200" height="30" rx="6" fill="#409EFF" opacity="0.8"/>
  <text x="630" y="465" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">智能分析 · 千人千面</text>

</svg>