<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d7e0"/>
      <stop offset="100%" stop-color="#b8c0cc"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7cd0"/>
    </linearGradient>
    <linearGradient id="envelopeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e5ed"/>
      <stop offset="100%" stop-color="#c8d0db"/>
    </linearGradient>
    <linearGradient id="robotBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3078c7"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 分隔线 -->
  <line x1="400" y1="30" x2="400" y2="470" stroke="#c0d0e0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8899aa">对比</text>

  <!-- ==================== 左侧：传统程序 ==================== -->

  <!-- 左侧标题 -->
  <rect x="60" y="35" width="280" height="38" rx="6" fill="#1a1a2e" opacity="0.9"/>
  <text x="200" y="60" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">传统程序：固定流程</text>

  <!-- 输入框 -->
  <rect x="100" y="95" width="200" height="44" rx="6" fill="url(#leftGrad)" stroke="#9aa8b8" stroke-width="1.5"/>
  <text x="200" y="122" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">输入：1000封模板邮件</text>

  <!-- 箭头 1 -->
  <polygon points="200,139 195,149 205,149" fill="#9aa8b8"/>
  <line x1="200" y1="139" x2="200" y2="149" stroke="#9aa8b8" stroke-width="2"/>

  <!-- 判断菱形：条件判断 -->
  <polygon points="200,155 260,185 200,215 140,185" fill="#e8edf3" stroke="#9aa8b8" stroke-width="1.5"/>
  <text x="200" y="189" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">条件判断</text>
  <text x="200" y="203" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#667788">固定规则</text>

  <!-- 箭头 2 -->
  <polygon points="200,215 195,225 205,225" fill="#9aa8b8"/>
  <line x1="200" y1="215" x2="200" y2="225" stroke="#9aa8b8" stroke-width="2"/>

  <!-- 处理框 -->
  <rect x="100" y="230" width="200" height="44" rx="6" fill="url(#leftGrad)" stroke="#9aa8b8" stroke-width="1.5"/>
  <text x="200" y="257" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">统一替换变量</text>

  <!-- 箭头 3 -->
  <polygon points="200,274 195,284 205,284" fill="#9aa8b8"/>
  <line x1="200" y1="274" x2="200" y2="284" stroke="#9aa8b8" stroke-width="2"/>

  <!-- 输出：相同邮件 -->
  <rect x="100" y="290" width="200" height="44" rx="6" fill="url(#leftGrad)" stroke="#9aa8b8" stroke-width="1.5"/>
  <text x="200" y="317" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">输出：千篇一律</text>

  <!-- 信封堆叠 -->
  <rect x="130" y="350" width="50" height="35" rx="3" fill="url(#envelopeGrad)" stroke="#b0b8c4" stroke-width="1"/>
  <rect x="145" y="358" width="50" height="35" rx="3" fill="url(#envelopeGrad)" stroke="#b0b8c4" stroke-width="1"/>
  <rect x="160" y="366" width="50" height="35" rx="3" fill="url(#envelopeGrad)" stroke="#b0b8c4" stroke-width="1"/>
  <text x="185" y="388" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#667788">×1000</text>

  <!-- 左侧标注 -->
  <rect x="55" y="145" width="28" height="20" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="69" y="159" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">1</text>
  <text x="87" y="148" font-family="sans-serif" font-size="11" fill="#667788">固定分支</text>

  <rect x="55" y="245" width="28" height="20" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="69" y="259" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">2</text>
  <text x="87" y="248" font-family="sans-serif" font-size="11" fill="#667788">无个性化</text>

  <!-- ==================== 右侧：AI Agent ==================== -->

  <!-- 右侧标题 -->
  <rect x="460" y="35" width="280" height="38" rx="6" fill="#1a1a2e" opacity="0.9"/>
  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">AI Agent：智能个性化</text>

  <!-- 输入框 -->
  <rect x="500" y="95" width="200" height="44" rx="6" fill="#e0f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="600" y="122" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">输入：1000份客户资料</text>

  <!-- 箭头 -->
  <polygon points="600,139 595,149 605,149" fill="#409EFF"/>
  <line x1="600" y1="139" x2="600" y2="149" stroke="#409EFF" stroke-width="2"/>

  <!-- AI Agent 机器人 -->
  <!-- 机器人身体 -->
  <rect x="545" y="155" width="110" height="80" rx="12" fill="url(#robotBodyGrad)" stroke="#2b7cd0" stroke-width="1.5"/>
  <!-- 机器人头部 -->
  <rect x="555" y="140" width="90" height="30" rx="10" fill="#409EFF" stroke="#2b7cd0" stroke-width="1.5"/>
  <!-- 眼睛 -->
  <circle cx="575" cy="155" r="5" fill="#ffffff"/>
  <circle cx="625" cy="155" r="5" fill="#ffffff"/>
  <circle cx="575" cy="155" r="2.5" fill="#1a1a2e"/>
  <circle cx="625" cy="155" r="2.5" fill="#1a1a2e"/>
  <!-- 天线 -->
  <line x1="600" y1="140" x2="600" y2="128" stroke="#409EFF" stroke-width="2"/>
  <circle cx="600" cy="125" r="4" fill="#409EFF"/>
  <!-- 手臂 -->
  <rect x="530" y="170" width="20" height="8" rx="4" fill="#3078c7"/>
  <rect x="650" y="170" width="20" height="8" rx="4" fill="#3078c7"/>
  <!-- 机器人内部文字 -->
  <text x="600" y="195" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="bold">AI 代理</text>
  <text x="600" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c0e0ff">个性化引擎</text>

  <!-- 桌子 -->
  <rect x="510" y="235" width="180" height="8" rx="2" fill="#c0d0e0"/>
  <rect x="520" y="243" width="6" height="20" fill="#b0c0d0"/>
  <rect x="674" y="243" width="6" height="20" fill="#b0c0d0"/>

  <!-- 屏幕 -->
  <rect x="680" y="155" width="70" height="50" rx="4" fill="#1a1a2e" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="685" y="160" width="60" height="40" rx="2" fill="#0a0a1e"/>
  <text x="715" y="178" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">客户资料</text>
  <text x="715" y="190" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#66ccff">姓名 年龄 偏好</text>
  <rect x="710" y="195" width="20" height="3" rx="1" fill="#409EFF"/>

  <!-- 箭头：从屏幕到机器人 -->
  <polygon points="680,175 672,175 676,170" fill="#409EFF"/>
  <line x1="680" y1="175" x2="660" y2="175" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- 输出 -->
  <rect x="500" y="270" width="200" height="44" rx="6" fill="#e0f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="600" y="297" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">输出：1000封定制信件</text>

  <!-- 箭头 -->
  <polygon points="600,314 595,324 605,324" fill="#409EFF"/>
  <line x1="600" y1="314" x2="600" y2="324" stroke="#409EFF" stroke-width="2"/>

  <!-- 个性化信件 -->
  <rect x="530" y="330" width="55" height="40" rx="3" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="557" y="348" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a1a2e">亲爱的</text>
  <text x="557" y="358" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#409EFF">张三</text>
  <text x="557" y="365" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#667788">...</text>

  <rect x="595" y="335" width="55" height="40" rx="3" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="622" y="353" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a1a2e">亲爱的</text>
  <text x="622" y="363" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#409EFF">李四</text>

  <rect x="660" y="340" width="55" height="40" rx="3" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="687" y="358" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a1a2e">亲爱的</text>
  <text x="687" y="368" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#409EFF">王五</text>

  <!-- 思维气泡 -->
  <ellipse cx="530" cy="155" rx="55" ry="28" fill="#ffffff" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="530" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">分析偏好</text>
  <text x="530" y="164" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">定制内容</text>
  <circle cx="555" cy="178" r="4" fill="#ffffff" stroke="#409EFF" stroke-width="1"/>
  <circle cx="560" cy="185" r="2.5" fill="#ffffff" stroke="#409EFF" stroke-width="1"/>

  <!-- 右侧标注 -->
  <rect x="455" y="145" width="28" height="20" rx="4" fill="#409EFF"/>
  <text x="469" y="159" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">1</text>
  <text x="487" y="148" font-family="sans-serif" font-size="11" fill="#409EFF">读取资料</text>

  <rect x="455" y="195" width="28" height="20" rx="4" fill="#409EFF"/>
  <text x="469" y="209" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">2</text>
  <text x="487" y="198" font-family="sans-serif" font-size="11" fill="#409EFF">智能推理</text>

  <rect x="455" y="285" width="28" height="20" rx="4" fill="#409EFF"/>
  <text x="469" y="299" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">3</text>
  <text x="487" y="288" font-family="sans-serif" font-size="11" fill="#409EFF">千人千面</text>

  <!-- 底部对比文字 -->
  <rect x="80" y="420" width="240" height="36" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="200" y="443" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#667788">机械重复 · 无差异</text>

  <rect x="480" y="420" width="240" height="36" rx="8" fill="#409EFF" opacity="0.1"/>
  <text x="600" y="443" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">因材施教 · 个性化</text>

</svg>