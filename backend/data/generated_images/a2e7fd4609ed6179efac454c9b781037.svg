<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7be0"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">博弈论设计原理 · 五边形雷达图</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.4"/>

  <!-- 中心：多智能体系统枢纽图标 -->
  <g transform="translate(400, 250)">
    <!-- 中心六边形 -->
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19" fill="url(#centerGrad)" stroke="#2b7be0" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 中心图标：三个连接节点 -->
    <circle cx="-10" cy="-6" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle cx="10" cy="-6" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
    <line x1="-6" y1="-3" x2="6" y2="-3" stroke="#fff" stroke-width="1"/>
    <line x1="-5" y1="-1" x2="0" y2="7" stroke="#fff" stroke-width="1"/>
    <line x1="5" y1="-1" x2="0" y2="7" stroke="#fff" stroke-width="1"/>
    <!-- 中心标签 -->
    <text x="0" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">多智能体系统</text>
  </g>

  <!-- 五边形连接线（雷达图骨架） -->
  <g stroke="#409EFF" stroke-width="1.2" opacity="0.25" fill="none">
    <!-- 从中心到各顶点 -->
    <line x1="400" y1="250" x2="400" y2="115"/>
    <line x1="400" y1="250" x2="570" y2="175"/>
    <line x1="400" y1="250" x2="530" y2="370"/>
    <line x1="400" y1="250" x2="270" y2="370"/>
    <line x1="400" y1="250" x2="230" y2="175"/>
    <!-- 五边形外框 -->
    <polygon points="400,115 570,175 530,370 270,370 230,175" stroke-dasharray="4,3"/>
  </g>

  <!-- 节点1：机制设计（顶部） -->
  <g transform="translate(400, 115)">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 齿轮图标 -->
    <circle cx="0" cy="-4" r="10" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="0" cy="-4" r="4" fill="#409EFF"/>
    <line x1="0" y1="-14" x2="0" y2="-10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="2" x2="0" y2="6" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-10" y1="-4" x2="-6" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="6" y1="-4" x2="10" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">机制设计</text>
  </g>

  <!-- 节点2：激励相容（右上） -->
  <g transform="translate(570, 175)">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 天平图标 -->
    <line x1="0" y1="-14" x2="0" y2="8" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="-8" cy="-6" r="3" fill="#409EFF"/>
    <circle cx="8" cy="-6" r="3" fill="#409EFF"/>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">激励相容</text>
  </g>

  <!-- 节点3：策略证明（右下） -->
  <g transform="translate(530, 370)">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 盾牌图标 -->
    <path d="M0,-14 L-10,-8 L-10,2 Q-10,10 0,14 Q10,10 10,2 L10,-8 Z" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-4" y1="-2" x2="0" y2="4" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="4" x2="6" y2="-6" stroke="#409EFF" stroke-width="1.5"/>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">策略证明</text>
  </g>

  <!-- 节点4：鲁棒性（左下） -->
  <g transform="translate(270, 370)">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 循环箭头图标 -->
    <path d="M-6,-10 A12,12 0 1,1 -6,10" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="-6,-10 -2,-6 -10,-6" fill="#409EFF"/>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">鲁棒性</text>
  </g>

  <!-- 节点5：公平性（左上） -->
  <g transform="translate(230, 175)">
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 握手图标 -->
    <path d="M-8,2 Q-8,-6 -2,-8 Q2,-10 6,-6 Q10,-2 8,4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M8,2 Q8,-6 2,-8 Q-2,-10 -6,-6 Q-10,-2 -8,4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="-3" cy="-4" r="2" fill="#409EFF"/>
    <circle cx="3" cy="-4" r="2" fill="#409EFF"/>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">公平性</text>
  </g>

  <!-- 标注说明 -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#666">
    <text x="400" y="470" text-anchor="middle">
      <tspan fill="#409EFF" font-weight="bold">●</tspan> 五个核心原理围绕多智能体系统中心节点呈五边形分布
    </text>
  </g>

  <!-- 装饰性角标 -->
  <rect x="15" y="15" width="30" height="2" rx="1" fill="#409EFF" opacity="0.3"/>
  <rect x="15" y="20" width="20" height="2" rx="1" fill="#409EFF" opacity="0.2"/>
  <rect x="755" y="15" width="30" height="2" rx="1" fill="#409EFF" opacity="0.3"/>
  <rect x="755" y="20" width="20" height="2" rx="1" fill="#409EFF" opacity="0.2"/>
  <rect x="15" y="483" width="30" height="2" rx="1" fill="#409EFF" opacity="0.3"/>
  <rect x="15" y="478" width="20" height="2" rx="1" fill="#409EFF" opacity="0.2"/>
  <rect x="755" y="483" width="30" height="2" rx="1" fill="#409EFF" opacity="0.3"/>
  <rect x="755" y="478" width="20" height="2" rx="1" fill="#409EFF" opacity="0.2"/>
</svg>