<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE3"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.02)"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">大语言模型的“阿喀琉斯之踵”与 RAG 解决方案</text>

  <!-- ============ 左侧：LLM 主体 ============ -->
  <g transform="translate(160, 200)">
    <!-- 阴影 -->
    <ellipse cx="0" cy="155" rx="85" ry="12" fill="url(#shadowGrad)"/>

    <!-- 机器人身体 -->
    <rect x="-60" y="-30" width="120" height="140" rx="20" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="-60" y="-30" width="120" height="140" rx="20" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

    <!-- 机器人头部 -->
    <rect x="-45" y="-80" width="90" height="60" rx="15" fill="url(#blueGrad)"/>
    <rect x="-45" y="-80" width="90" height="60" rx="15" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

    <!-- 眼睛 -->
    <circle cx="-18" cy="-55" r="8" fill="white"/>
    <circle cx="18" cy="-55" r="8" fill="white"/>
    <circle cx="-16" cy="-55" r="4" fill="#1a1a2e"/>
    <circle cx="20" cy="-55" r="4" fill="#1a1a2e"/>

    <!-- 嘴巴 -->
    <rect x="-12" y="-38" width="24" height="4" rx="2" fill="white" opacity="0.8"/>

    <!-- 天线 -->
    <rect x="-3" y="-95" width="6" height="18" rx="3" fill="#409EFF"/>
    <circle cx="0" cy="-98" r="6" fill="#FF6B6B" opacity="0.8"/>

    <!-- 手臂 -->
    <rect x="-85" y="-10" width="22" height="8" rx="4" fill="#409EFF" opacity="0.7"/>
    <rect x="63" y="-10" width="22" height="8" rx="4" fill="#409EFF" opacity="0.7"/>

    <!-- 腿部 -->
    <rect x="-35" y="110" width="25" height="35" rx="6" fill="#409EFF" opacity="0.7"/>
    <rect x="10" y="110" width="25" height="35" rx="6" fill="#409EFF" opacity="0.7"/>

    <!-- 身体上的电路装饰 -->
    <line x1="-30" y1="10" x2="30" y2="10" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="25" x2="30" y2="25" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="40" x2="30" y2="40" stroke="white" stroke-width="1.5" opacity="0.3"/>

    <!-- 三个脆弱点标记 -->
    <!-- 1. 知识截止 -->
    <circle cx="-35" cy="-20" r="18" fill="none" stroke="#FF6B6B" stroke-width="2.5" stroke-dasharray="4,3"/>
    <circle cx="-35" cy="-20" r="5" fill="#FF6B6B"/>
    <text x="-35" y="-16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">!</text>

    <!-- 2. 幻觉 -->
    <circle cx="35" cy="20" r="18" fill="none" stroke="#FF6B6B" stroke-width="2.5" stroke-dasharray="4,3"/>
    <circle cx="35" cy="20" r="5" fill="#FF6B6B"/>
    <text x="35" y="24" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">!</text>

    <!-- 3. 隐私数据盲区 -->
    <circle cx="0" cy="85" r="18" fill="none" stroke="#FF6B6B" stroke-width="2.5" stroke-dasharray="4,3"/>
    <circle cx="0" cy="85" r="5" fill="#FF6B6B"/>
    <text x="0" y="89" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">!</text>
  </g>

  <!-- 左侧标签：知识截止 -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="white" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="65" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">知识截止</text>
    <line x1="130" y1="18" x2="160" y2="18" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="65" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">冻结于 2023 年</text>
  </g>

  <!-- 左侧标签：幻觉 -->
  <g transform="translate(30, 250)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="white" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="65" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">幻觉</text>
    <line x1="130" y1="18" x2="155" y2="18" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="65" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">虚假信息</text>
  </g>

  <!-- 左侧标签：隐私数据盲区 -->
  <g transform="translate(55, 340)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="white" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="65" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">隐私数据盲区</text>
    <line x1="130" y1="18" x2="155" y2="18" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="65" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">无法访问</text>
  </g>

  <!-- ============ 中间：箭头过渡 ============ -->
  <g transform="translate(340, 250)">
    <text x="30" y="-10" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">RAG</text>
    <text x="30" y="10" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">↓</text>
    <!-- 大箭头 -->
    <polygon points="0,-20 60,0 0,20" fill="#409EFF" opacity="0.3"/>
    <polygon points="5,-15 50,0 5,15" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- ============ 右侧：RAG 解决方案 ============ -->
  <g transform="translate(480, 200)">
    <!-- 阴影 -->
    <ellipse cx="0" cy="155" rx="85" ry="12" fill="url(#shadowGrad)"/>

    <!-- 机器人身体 - 更自信的姿态 -->
    <rect x="-60" y="-30" width="120" height="140" rx="20" fill="#409EFF" opacity="0.9"/>
    <rect x="-60" y="-30" width="120" height="140" rx="20" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

    <!-- 机器人头部 -->
    <rect x="-45" y="-80" width="90" height="60" rx="15" fill="#409EFF"/>
    <rect x="-45" y="-80" width="90" height="60" rx="15" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

    <!-- 眼睛 - 自信表情 -->
    <circle cx="-18" cy="-55" r="8" fill="white"/>
    <circle cx="18" cy="-55" r="8" fill="white"/>
    <circle cx="-16" cy="-55" r="4" fill="#1a1a2e"/>
    <circle cx="20" cy="-55" r="4" fill="#1a1a2e"/>

    <!-- 微笑嘴巴 -->
    <path d="M-10,-36 Q0,-28 10,-36" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- 天线 -->
    <rect x="-3" y="-95" width="6" height="18" rx="3" fill="#409EFF"/>
    <circle cx="0" cy="-98" r="6" fill="#67C23A" opacity="0.8"/>

    <!-- 手臂 - 举起自信 -->
    <rect x="-85" y="-15" width="22" height="8" rx="4" fill="#409EFF" opacity="0.7" transform="rotate(-15,-74,-11)"/>
    <rect x="63" y="-15" width="22" height="8" rx="4" fill="#409EFF" opacity="0.7" transform="rotate(15,74,-11)"/>

    <!-- 腿部 -->
    <rect x="-35" y="110" width="25" height="35" rx="6" fill="#409EFF" opacity="0.7"/>
    <rect x="10" y="110" width="25" height="35" rx="6" fill="#409EFF" opacity="0.7"/>

    <!-- 身体上的电路装饰 -->
    <line x1="-30" y1="10" x2="30" y2="10" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="25" x2="30" y2="25" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="40" x2="30" y2="40" stroke="white" stroke-width="1.5" opacity="0.3"/>

    <!-- 参考图书馆背包 -->
    <rect x="-75" y="-10" width="18" height="50" rx="5" fill="#2B7BE3"/>
    <rect x="57" y="-10" width="18" height="50" rx="5" fill="#2B7BE3"/>
    <rect x="-65" y="10" width="130" height="55" rx="8" fill="#2B7BE3" stroke="#1a1a2e" stroke-width="1.2" opacity="0.8"/>
    <rect x="-55" y="18" width="110" height="38" rx="5" fill="white" opacity="0.9"/>

    <!-- 背包里的书 -->
    <rect x="-45" y="23" width="12" height="16" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="-28" y="23" width="12" height="16" rx="2" fill="#67C23A" opacity="0.7"/>
    <rect x="-11" y="23" width="12" height="16" rx="2" fill="#E6A23C" opacity="0.7"/>
    <rect x="6" y="23" width="12" height="16" rx="2" fill="#F56C6C" opacity="0.7"/>
    <rect x="23" y="23" width="12" height="16" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="40" y="23" width="12" height="16" rx="2" fill="#67C23A" opacity="0.5"/>

    <!-- 背包标签 -->
    <text x="0" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e" font-weight="bold">参考库</text>
  </g>

  <!-- 右侧标签：开放考试 -->
  <g transform="translate(580, 120)">
    <rect x="0" y="0" width="150" height="36" rx="8" fill="white" stroke="#67C23A" stroke-width="1.5"/>
    <text x="75" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">开卷考试</text>
    <line x1="-20" y1="18" x2="0" y2="18" stroke="#67C23A" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="75" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">自信作答</text>
  </g>

  <!-- 右侧标签：参考库 -->
  <g transform="translate(610, 260)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <text x="65" y="23" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">参考库</text>
    <line x1="-20" y1="18" x2="0" y2="18" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="65" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">实时检索</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(400, 470)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">RAG 技术为 LLM 装备“参考图书馆”，将闭卷考试转变为开卷考试，有效弥补三大缺陷</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="200" y1="455" x2="600" y2="455" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
</svg>