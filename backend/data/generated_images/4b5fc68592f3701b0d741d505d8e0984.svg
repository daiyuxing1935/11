<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE3"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">大语言模型（LLM）的七个基础局限</text>

  <!-- 连接线：中心到各节点 -->
  <!-- 中心坐标：(400, 250) -->
  <!-- 节点半径：32 -->
  <!-- 节点坐标（半径距离约130-145） -->

  <!-- 上：无真正理解 (400, 105) -->
  <line x1="400" y1="218" x2="400" y2="137" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 右上：上下文窗口限制 (515, 145) -->
  <line x1="420" y1="232" x2="503" y2="165" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 右：计算依赖 (545, 260) -->
  <line x1="432" y1="250" x2="513" y2="260" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 右下：黑盒性质 (515, 375) -->
  <line x1="420" y1="268" x2="503" y2="345" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 下：输入脆弱性 (400, 405) -->
  <line x1="400" y1="282" x2="400" y2="373" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 左下：对齐不完整 (285, 375) -->
  <line x1="380" y1="268" x2="297" y2="345" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 左：未知能力边界 (255, 260) -->
  <line x1="368" y1="250" x2="287" y2="260" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <!-- 左上：省略，只留6个标注 -->

  <!-- 中心：LLM 大脑图标 -->
  <circle cx="400" cy="250" r="38" fill="url(#centerGrad)" stroke="#2B7BE3" stroke-width="2"/>
  <!-- 大脑简化图形 -->
  <g transform="translate(400, 250)" fill="none" stroke="#FFFFFF" stroke-width="1.8">
    <ellipse cx="0" cy="-6" rx="16" ry="12"/>
    <path d="M-12,-4 Q-14,2 -10,8" stroke-width="1.5"/>
    <path d="M12,-4 Q14,2 10,8" stroke-width="1.5"/>
    <path d="M-6,4 Q0,10 6,4" stroke-width="1.5"/>
    <path d="M-14,-8 Q-8,-14 0,-12 Q8,-14 14,-8" stroke-width="1.5"/>
    <circle cx="-7" cy="-4" r="2" fill="#FFFFFF"/>
    <circle cx="7" cy="-4" r="2" fill="#FFFFFF"/>
  </g>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">LLM</text>

  <!-- 节点 1：无真正理解（上） -->
  <circle cx="400" cy="105" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(400, 105)">
    <!-- 空心头 -->
    <circle cx="0" cy="-4" r="10" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="-7" y="4" width="14" height="8" rx="2" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="-3" y1="-4" x2="3" y2="-4" stroke="#1a1a2e" stroke-width="1"/>
  </g>
  <text x="400" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">无真正理解</text>

  <!-- 节点 2：上下文窗口限制（右上） -->
  <circle cx="515" cy="145" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(515, 145)">
    <!-- 括号帽 -->
    <path d="M-8,-10 L-8,10" stroke="#1a1a2e" stroke-width="2" fill="none"/>
    <path d="M8,-10 L8,10" stroke="#1a1a2e" stroke-width="2" fill="none"/>
    <path d="M-4,-6 L4,-6" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#1a1a2e" font-weight="bold">...</text>
  </g>
  <text x="515" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">上下文窗口</text>

  <!-- 节点 3：计算依赖（右） -->
  <circle cx="545" cy="260" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(545, 260)">
    <!-- 服务器机架 -->
    <rect x="-10" y="-12" width="20" height="24" rx="2" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="-8" y1="-6" x2="8" y2="-6" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="-8" y1="6" x2="8" y2="6" stroke="#1a1a2e" stroke-width="1"/>
    <circle cx="0" cy="-6" r="1.5" fill="#409EFF"/>
    <circle cx="0" cy="0" r="1.5" fill="#409EFF"/>
    <circle cx="0" cy="6" r="1.5" fill="#409EFF"/>
  </g>
  <text x="545" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">计算依赖</text>

  <!-- 节点 4：黑盒性质（右下） -->
  <circle cx="515" cy="375" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(515, 375)">
    <!-- 问号盒子 -->
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="16" fill="#1a1a2e" font-weight="bold">?</text>
  </g>
  <text x="515" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">黑盒性质</text>

  <!-- 节点 5：输入脆弱性（下） -->
  <circle cx="400" cy="405" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(400, 405)">
    <!-- 裂纹表面 -->
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M-6,-8 L-2,-2 L-6,4" stroke="#1a1a2e" stroke-width="1.2" fill="none"/>
    <path d="M2,-6 L6,0 L2,6" stroke="#1a1a2e" stroke-width="1.2" fill="none"/>
    <line x1="-2" y1="-2" x2="2" y2="-6" stroke="#1a1a2e" stroke-width="0.8"/>
  </g>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">输入脆弱性</text>

  <!-- 节点 6：对齐不完整（左下） -->
  <circle cx="285" cy="375" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(285, 375)">
    <!-- 破碎盾牌 -->
    <path d="M0,-12 L-10,-6 L-10,2 Q-10,8 0,12 Q10,8 10,2 L10,-6 Z" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="-4" y1="-4" x2="4" y2="6" stroke="#1a1a2e" stroke-width="1.2"/>
    <line x1="2" y1="-2" x2="-2" y2="4" stroke="#1a1a2e" stroke-width="1.2"/>
  </g>
  <text x="285" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">对齐不完整</text>

  <!-- 节点 7：未知能力边界（左） -->
  <circle cx="255" cy="260" r="32" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <g transform="translate(255, 260)">
    <!-- 雾状边缘 -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#1a1a2e" stroke-width="0.8" opacity="0.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.6">?</text>
  </g>
  <text x="255" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">能力边界未知</text>

  <!-- 左上角额外标注（无节点，仅文字） -->
  <text x="130" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.5">（共七项局限）</text>

</svg>