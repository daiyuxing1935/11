<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef5fc"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#b0c8e0" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI 智能体架构对比</text>

  <!-- ============ 左侧：单独 LLM ============ -->
  <!-- 单独 LLM 区域外框 -->
  <rect x="40" y="65" width="240" height="400" rx="14" fill="none" stroke="#d0dbe8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="160" y="92" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#8899aa">单独 LLM</text>

  <!-- 单独 LLM 大脑图标 -->
  <g transform="translate(160, 200)">
    <!-- 大脑主体 -->
    <ellipse cx="0" cy="0" rx="48" ry="38" fill="url(#brainGrad)" filter="url(#shadow)"/>
    <!-- 大脑沟回 -->
    <path d="M-25,-10 Q-15,-25 0,-15 Q15,-25 25,-10" fill="none" stroke="#b0d4ff" stroke-width="1.8" opacity="0.7"/>
    <path d="M-30,0 Q-15,-8 0,2 Q15,-8 30,0" fill="none" stroke="#b0d4ff" stroke-width="1.8" opacity="0.7"/>
    <path d="M-20,12 Q-8,0 8,12 Q20,0 25,12" fill="none" stroke="#b0d4ff" stroke-width="1.8" opacity="0.7"/>
    <!-- 中心亮点 -->
    <circle cx="0" cy="-5" r="6" fill="#80bfff" opacity="0.5"/>
    <!-- 标签 -->
    <text x="0" y="65" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">LLM</text>
  </g>

  <!-- 语音气泡输出 -->
  <g transform="translate(160, 300)">
    <rect x="-55" y="-18" width="110" height="36" rx="10" fill="#e8f0fe" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="-8,18 0,30 8,18" fill="#e8f0fe" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="-8,18 0,30 8,18" fill="#e8f0fe"/>
    <text x="0" y="5" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">文字输出</text>
  </g>

  <!-- 限制说明 -->
  <g transform="translate(160, 380)">
    <rect x="-60" y="-12" width="120" height="24" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#e65100">功能单一，无扩展能力</text>
  </g>

  <!-- ============ 右侧：AI Agent ============ -->
  <!-- AI Agent 外框 -->
  <rect x="320" y="55" width="450" height="420" rx="16" fill="#ffffff" stroke="#409EFF" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="545" y="88" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI 智能体 (AI Agent)</text>

  <!-- 中心：LLM 大脑（发光） -->
  <g transform="translate(545, 240)">
    <!-- 发光光晕 -->
    <circle cx="0" cy="0" r="55" fill="#409EFF" opacity="0.10" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="42" fill="#409EFF" opacity="0.08"/>
    <!-- 大脑主体 -->
    <ellipse cx="0" cy="0" rx="36" ry="30" fill="url(#brainGrad)" filter="url(#shadow)"/>
    <!-- 大脑沟回 -->
    <path d="M-18,-8 Q-10,-20 0,-10 Q10,-20 18,-8" fill="none" stroke="#b0d4ff" stroke-width="1.8" opacity="0.7"/>
    <path d="M-22,2 Q-10,-5 0,4 Q10,-5 22,2" fill="none" stroke="#b0d4ff" stroke-width="1.8" opacity="0.7"/>
    <path d="M-14,12 Q-6,0 6,12 Q14,0 18,12" fill="none" stroke="#b0d4ff" stroke-width="1.8" opacity="0.7"/>
    <!-- 中心亮点 -->
    <circle cx="0" cy="-4" r="5" fill="#cce5ff" opacity="0.6"/>
    <!-- 标签 -->
    <text x="0" y="50" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">LLM 核心</text>
  </g>

  <!-- 连接线（从中心到四个模块） -->
  <!-- 中心坐标: 545, 240 -->
  <!-- 到工具 (445, 155) -->
  <line x1="520" y1="218" x2="460" y2="170" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <!-- 到记忆 (645, 155) -->
  <line x1="570" y1="218" x2="630" y2="170" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <!-- 到规划 (445, 325) -->
  <line x1="520" y1="262" x2="460" y2="310" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <!-- 到感知 (645, 325) -->
  <line x1="570" y1="262" x2="630" y2="310" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>

  <!-- 模块1：工具 -->
  <g transform="translate(420, 140)">
    <rect x="-50" y="-35" width="100" height="70" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 扳手图标 -->
    <g transform="translate(0, -8)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="6" y1="6" x2="14" y2="14" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="18" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">工具</text>
  </g>

  <!-- 模块2：记忆 -->
  <g transform="translate(670, 140)">
    <rect x="-50" y="-35" width="100" height="70" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 芯片/记忆图标 -->
    <g transform="translate(0, -8)">
      <rect x="-10" y="-8" width="20" height="16" rx="2" fill="none" stroke="#409EFF" stroke-width="1.8"/>
      <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="0" y="18" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">记忆</text>
  </g>

  <!-- 模块3：规划 -->
  <g transform="translate(420, 340)">
    <rect x="-50" y="-35" width="100" height="70" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 路线图/规划图标 -->
    <g transform="translate(0, -8)">
      <circle cx="-7" cy="-4" r="3" fill="#409EFF"/>
      <circle cx="0" cy="4" r="3" fill="#409EFF"/>
      <circle cx="7" cy="-4" r="3" fill="#409EFF"/>
      <line x1="-4" y1="-1" x2="-3" y2="1" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="3" y1="1" x2="4" y2="-1" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="0" y="18" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">规划</text>
  </g>

  <!-- 模块4：感知 -->
  <g transform="translate(670, 340)">
    <rect x="-50" y="-35" width="100" height="70" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadow)"/>
    <!-- 眼睛/传感器图标 -->
    <g transform="translate(0, -8)">
      <ellipse cx="0" cy="0" rx="10" ry="7" fill="none" stroke="#409EFF" stroke-width="1.8"/>
      <circle cx="0" cy="0" r="3" fill="#409EFF"/>
      <!-- 传感器弧线 -->
      <path d="M-14,-2 Q-18,-8 -12,-10" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
      <path d="M14,-2 Q18,-8 12,-10" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    </g>
    <text x="0" y="18" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">感知</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(545, 445)">
    <rect x="-130" y="-14" width="260" height="28" rx="8" fill="#e8f4fd" stroke="#409EFF" stroke-width="1" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">模块协同工作，扩展 LLM 能力边界</text>
  </g>

  <!-- 箭头指示 -->
  <g transform="translate(290, 240)">
    <polygon points="0,0 18,-8 18,8" fill="#409EFF" opacity="0.6"/>
    <line x1="-15" y1="0" x2="18" y2="0" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
  </g>

</svg>