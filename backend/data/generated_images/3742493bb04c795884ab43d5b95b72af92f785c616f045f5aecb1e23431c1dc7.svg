<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ecff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">仲裁者/调解者模式</text>

  <!-- 仲裁者卡片 -->
  <rect x="290" y="60" width="220" height="380" rx="14" fill="#409EFF" opacity="0.12"/>
  <rect x="295" y="65" width="210" height="370" rx="12" fill="#ffffff" stroke="#409EFF" stroke-width="2"/>

  <!-- 仲裁者头像 -->
  <circle cx="400" cy="105" r="28" fill="#409EFF" opacity="0.15"/>
  <circle cx="400" cy="105" r="24" fill="#409EFF" opacity="0.25"/>
  <!-- 法槌图标 -->
  <rect x="393" y="90" width="14" height="6" rx="2" fill="#409EFF"/>
  <rect x="398" y="96" width="4" height="14" rx="1" fill="#409EFF"/>
  <rect x="393" y="110" width="14" height="3" rx="1" fill="#409EFF"/>

  <text x="400" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">仲裁者</text>

  <!-- 职责列表 -->
  <g transform="translate(310, 165)">
    <!-- 1. 听取各方意见 -->
    <rect x="0" y="0" width="180" height="32" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="12" y="21" font-size="13" fill="#1a1a2e">👂 听取各方意见</text>

    <!-- 2. 识别分歧点 -->
    <rect x="0" y="42" width="180" height="32" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="12" y="63" font-size="13" fill="#1a1a2e">🔍 识别分歧点</text>

    <!-- 3. 评估论证质量 -->
    <rect x="0" y="84" width="180" height="32" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="12" y="105" font-size="13" fill="#1a1a2e">🔎 评估论证质量</text>

    <!-- 4. 做出裁决 -->
    <rect x="0" y="126" width="180" height="32" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="12" y="147" font-size="13" fill="#1a1a2e">⚖️ 做出裁决</text>

    <!-- 5. 记录决定 -->
    <rect x="0" y="168" width="180" height="32" rx="6" fill="#409EFF" opacity="0.08"/>
    <text x="12" y="189" font-size="13" fill="#1a1a2e">📋 记录决定</text>
  </g>

  <!-- 提示模板卡片 -->
  <rect x="300" y="370" width="200" height="55" rx="8" fill="#1a1a2e" opacity="0.06"/>
  <rect x="302" y="372" width="196" height="51" rx="7" fill="#ffffff" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="bold">提示模板</text>
  <text x="400" y="410" text-anchor="middle" font-size="10" fill="#5a5a7a">“听取双方 → 分析分歧 → 裁决”</text>

  <!-- 左侧争议方 A -->
  <rect x="30" y="120" width="200" height="260" rx="12" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="120" width="200" height="40" rx="12" fill="#409EFF" opacity="0.1"/>
  <rect x="30" y="148" width="200" height="12" fill="#409EFF" opacity="0.1"/>
  <circle cx="130" cy="140" r="16" fill="#409EFF" opacity="0.2"/>
  <text x="130" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#409EFF">A</text>
  <text x="130" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">争议方 A</text>

  <!-- 观点气泡 -->
  <rect x="50" y="195" width="160" height="50" rx="10" fill="#409EFF" opacity="0.06"/>
  <text x="130" y="218" text-anchor="middle" font-size="12" fill="#1a1a2e">“我方立场正确”</text>
  <text x="130" y="236" text-anchor="middle" font-size="11" fill="#5a5a7a">置信度: 85%</text>

  <!-- 证据条 -->
  <rect x="50" y="260" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="50" y="260" width="130" height="8" rx="4" fill="#409EFF" opacity="0.6"/>
  <text x="130" y="285" text-anchor="middle" font-size="11" fill="#5a5a7a">论证强度</text>

  <rect x="50" y="300" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="50" y="300" width="100" height="8" rx="4" fill="#409EFF" opacity="0.4"/>
  <text x="130" y="325" text-anchor="middle" font-size="11" fill="#5a5a7a">证据支持</text>

  <rect x="50" y="340" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="50" y="340" width="115" height="8" rx="4" fill="#409EFF" opacity="0.5"/>
  <text x="130" y="365" text-anchor="middle" font-size="11" fill="#5a5a7a">逻辑连贯性</text>

  <!-- 右侧争议方 B -->
  <rect x="570" y="120" width="200" height="260" rx="12" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
  <rect x="570" y="120" width="200" height="40" rx="12" fill="#409EFF" opacity="0.1"/>
  <rect x="570" y="148" width="200" height="12" fill="#409EFF" opacity="0.1"/>
  <circle cx="670" cy="140" r="16" fill="#409EFF" opacity="0.2"/>
  <text x="670" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#409EFF">B</text>
  <text x="670" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">争议方 B</text>

  <!-- 观点气泡 -->
  <rect x="590" y="195" width="160" height="50" rx="10" fill="#409EFF" opacity="0.06"/>
  <text x="670" y="218" text-anchor="middle" font-size="12" fill="#1a1a2e">“我方理由充分”</text>
  <text x="670" y="236" text-anchor="middle" font-size="11" fill="#5a5a7a">置信度: 78%</text>

  <!-- 证据条 -->
  <rect x="590" y="260" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="590" y="260" width="110" height="8" rx="4" fill="#409EFF" opacity="0.5"/>
  <text x="670" y="285" text-anchor="middle" font-size="11" fill="#5a5a7a">论证强度</text>

  <rect x="590" y="300" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="590" y="300" width="125" height="8" rx="4" fill="#409EFF" opacity="0.55"/>
  <text x="670" y="325" text-anchor="middle" font-size="11" fill="#5a5a7a">证据支持</text>

  <rect x="590" y="340" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="590" y="340" width="95" height="8" rx="4" fill="#409EFF" opacity="0.4"/>
  <text x="670" y="365" text-anchor="middle" font-size="11" fill="#5a5a7a">逻辑连贯性</text>

  <!-- 连接箭头：A → 仲裁者 -->
  <line x1="230" y1="200" x2="290" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="288,195 298,200 288,205" fill="#409EFF" opacity="0.5"/>

  <!-- 连接箭头：B → 仲裁者 -->
  <line x1="570" y1="200" x2="510" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="512,195 502,200 512,205" fill="#409EFF" opacity="0.5"/>

  <!-- 仲裁者输出箭头 -->
  <line x1="400" y1="435" x2="400" y2="465" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  <polygon points="395,463 400,473 405,463" fill="#409EFF" opacity="0.5"/>
  <rect x="340" y="470" width="120" height="22" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="400" y="485" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="bold">裁决输出</text>

  <!-- 图例 -->
  <rect x="30" y="440" width="12" height="12" rx="2" fill="#409EFF" opacity="0.3"/>
  <text x="48" y="451" font-size="10" fill="#5a5a7a">争议方</text>
  <rect x="100" y="440" width="12" height="12" rx="2" fill="#409EFF" opacity="0.6"/>
  <text x="118" y="451" font-size="10" fill="#5a5a7a">论证强度</text>
  <rect x="175" y="440" width="12" height="12" rx="2" fill="#1a1a2e" opacity="0.1"/>
  <text x="193" y="451" font-size="10" fill="#5a5a7a">模板</text>
</svg>