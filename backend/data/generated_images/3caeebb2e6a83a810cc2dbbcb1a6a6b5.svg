<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8ee6"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ab7ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LoRA 低秩适配原理</text>

  <!-- ===== 左侧：原始权重矩阵 W（冻结） ===== -->
  <g transform="translate(60, 80)">
    <!-- 大矩阵块 -->
    <rect x="0" y="0" width="160" height="180" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="0" y="0" width="160" height="180" rx="6" fill="none" stroke="#3a8ee6" stroke-width="2"/>

    <!-- 锁图标 -->
    <g transform="translate(70, 70)">
      <rect x="0" y="8" width="20" height="16" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
      <path d="M4,8 V5 A6,6 0 0,1 16,5 V8" fill="none" stroke="#fff" stroke-width="2"/>
    </g>

    <!-- 标签 -->
    <text x="80" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">W</text>
    <text x="80" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d4e8ff">原始参数</text>
    <text x="80" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d4e8ff">冻结</text>
  </g>

  <!-- 标注 1 -->
  <g transform="translate(60, 80)">
    <rect x="0" y="-28" width="80" height="22" rx="4" fill="#1a1a2e"/>
    <text x="40" y="-13" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">预训练权重</text>
  </g>

  <!-- ===== 右侧：低秩矩阵 A 和 B ===== -->
  <g transform="translate(560, 80)">
    <!-- 矩阵 B -->
    <rect x="0" y="0" width="50" height="180" rx="4" fill="url(#lightBlueGrad)" opacity="0.85"/>
    <rect x="0" y="0" width="50" height="180" rx="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="25" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">B</text>
    <text x="25" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4e8ff">d×r</text>

    <!-- 矩阵 A -->
    <rect x="70" y="0" width="180" height="50" rx="4" fill="url(#lightBlueGrad)" opacity="0.85"/>
    <rect x="70" y="0" width="180" height="50" rx="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="160" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">A</text>
    <text x="160" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4e8ff">r×d</text>

    <!-- 齿轮/火花图标 -->
    <g transform="translate(130, 80)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#FFD700" stroke-width="2"/>
      <circle cx="10" cy="10" r="3" fill="#FFD700"/>
      <line x1="10" y1="0" x2="10" y2="3" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="10" y1="17" x2="10" y2="20" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="3" y2="10" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="17" y1="10" x2="20" y2="10" stroke="#FFD700" stroke-width="1.5"/>
    </g>

    <!-- 标注 2 -->
    <rect x="55" y="-28" width="70" height="22" rx="4" fill="#1a1a2e"/>
    <text x="90" y="-13" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">可训练参数</text>
  </g>

  <!-- ===== 中间：加号和等号 ===== -->
  <g transform="translate(240, 170)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#1a1a2e" font-weight="bold">+</text>
  </g>
  <g transform="translate(340, 170)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#1a1a2e" font-weight="bold">=</text>
  </g>

  <!-- ===== 右侧结果矩阵 ===== -->
  <g transform="translate(380, 80)">
    <rect x="0" y="0" width="160" height="180" rx="6" fill="url(#blueGrad)" opacity="0.6"/>
    <rect x="0" y="0" width="160" height="180" rx="6" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">W_new</text>
  </g>

  <!-- ===== 公式 ===== -->
  <g transform="translate(400, 300)">
    <rect x="-180" y="-22" width="360" height="44" rx="6" fill="#fff" opacity="0.85"/>
    <rect x="-180" y="-22" width="360" height="44" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a2e" font-weight="bold">
      W<tspan font-size="12" dy="-4">new</tspan> = W + B × A
    </text>
  </g>

  <!-- 标注 3 -->
  <g transform="translate(400, 345)">
    <rect x="-85" y="-14" width="170" height="24" rx="4" fill="#1a1a2e"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">仅更新 A、B，W 冻结</text>
  </g>

  <!-- ===== 底部：参数量对比条 ===== -->
  <g transform="translate(80, 400)">
    <!-- 标签 -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">全参数微调</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">LoRA</text>

    <!-- 全参数条 -->
    <rect x="140" y="-12" width="480" height="20" rx="4" fill="#e0e6ed"/>
    <rect x="140" y="-12" width="480" height="20" rx="4" fill="url(#blueGrad)" opacity="0.8"/>
    <text x="380" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">100% 参数</text>

    <!-- LoRA 条 -->
    <rect x="140" y="28" width="480" height="20" rx="4" fill="#e0e6ed"/>
    <rect x="140" y="28" width="8" height="20" rx="4" fill="url(#lightBlueGrad)"/>
    <text x="155" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">0.1%-1%</text>

    <!-- 标注 4 -->
    <g transform="translate(620, 10)">
      <rect x="-60" y="-14" width="120" height="24" rx="4" fill="#1a1a2e"/>
      <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">参数量对比</text>
    </g>
  </g>

  <!-- 标注 5 -->
  <g transform="translate(50, 270)">
    <rect x="0" y="-14" width="90" height="24" rx="4" fill="#1a1a2e"/>
    <text x="45" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">权重冻结</text>
  </g>

  <!-- 标注 6 -->
  <g transform="translate(560, 270)">
    <rect x="-45" y="-14" width="90" height="24" rx="4" fill="#1a1a2e"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">低秩分解</text>
  </g>

</svg>