<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">仲裁者/调解者模式</text>

  <!-- 仲裁者卡片 -->
  <rect x="275" y="60" width="250" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5" filter="drop-shadow(0 3px 8px rgba(64,158,255,0.2))"/>
  <rect x="275" y="60" width="250" height="44" rx="14" fill="#409EFF"/>
  <rect x="275" y="90" width="250" height="14" fill="#409EFF"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">仲裁者</text>

  <!-- 仲裁者图标：法槌 -->
  <rect x="370" y="112" width="60" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="385" y="118" width="30" height="6" rx="3" fill="#409EFF"/>
  <rect x="393" y="124" width="14" height="14" rx="2" fill="#409EFF"/>
  <rect x="398" y="138" width="4" height="8" fill="#409EFF"/>

  <!-- 五项职责 -->
  <!-- 1. 听取各方意见 -->
  <rect x="295" y="162" width="210" height="32" rx="6" fill="#F0F8FF" stroke="#B3D8F0" stroke-width="1"/>
  <circle cx="312" cy="178" r="10" fill="#409EFF" opacity="0.15"/>
  <path d="M307 175 Q312 170 317 175" stroke="#409EFF" stroke-width="1.5" fill="none"/>
  <path d="M307 179 Q312 174 317 179" stroke="#409EFF" stroke-width="1.5" fill="none"/>
  <text x="332" y="183" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">听取各方意见</text>

  <!-- 2. 识别分歧点 -->
  <rect x="295" y="200" width="210" height="32" rx="6" fill="#F0F8FF" stroke="#B3D8F0" stroke-width="1"/>
  <circle cx="312" cy="216" r="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="309" cy="214" r="3" fill="#409EFF"/>
  <circle cx="315" cy="214" r="3" fill="#409EFF"/>
  <line x1="309" y1="218" x2="315" y2="218" stroke="#409EFF" stroke-width="1.2"/>
  <text x="332" y="221" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">识别分歧点</text>

  <!-- 3. 评估论证质量 -->
  <rect x="295" y="238" width="210" height="32" rx="6" fill="#F0F8FF" stroke="#B3D8F0" stroke-width="1"/>
  <circle cx="312" cy="254" r="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="312" cy="254" r="5" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="316" y1="250" x2="320" y2="246" stroke="#409EFF" stroke-width="1.5"/>
  <text x="332" y="259" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">评估论证质量</text>

  <!-- 4. 做出裁决 -->
  <rect x="295" y="276" width="210" height="32" rx="6" fill="#F0F8FF" stroke="#B3D8F0" stroke-width="1"/>
  <circle cx="312" cy="292" r="10" fill="#409EFF" opacity="0.15"/>
  <rect x="307" y="288" width="10" height="8" rx="1" fill="#409EFF"/>
  <line x1="307" y1="296" x2="317" y2="296" stroke="#409EFF" stroke-width="1.2"/>
  <text x="332" y="297" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">做出裁决</text>

  <!-- 5. 记录决定 -->
  <rect x="295" y="314" width="210" height="32" rx="6" fill="#F0F8FF" stroke="#B3D8F0" stroke-width="1"/>
  <circle cx="312" cy="330" r="10" fill="#409EFF" opacity="0.15"/>
  <rect x="307" y="326" width="10" height="8" rx="1" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="309" y1="329" x2="315" y2="329" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="309" y1="332" x2="315" y2="332" stroke="#409EFF" stroke-width="0.8"/>
  <text x="332" y="335" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">记录决定</text>

  <!-- 提示模板卡片 -->
  <rect x="275" y="365" width="250" height="30" rx="6" fill="#E8F4FD" stroke="#B3D8F0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">提示模板: [听取] → [分析] → [裁决] → [记录]</text>

  <!-- 左侧争议方A -->
  <rect x="40" y="100" width="200" height="200" rx="12" fill="url(#cardGrad)" stroke="#E6A23C" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(230,162,60,0.2))"/>
  <rect x="40" y="100" width="200" height="38" rx="12" fill="#E6A23C"/>
  <rect x="40" y="126" width="200" height="12" fill="#E6A23C"/>
  <text x="140" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">争议方 A</text>

  <!-- 观点气泡 -->
  <rect x="58" y="150" width="164" height="50" rx="8" fill="#FFF7E6" stroke="#F0D8A8" stroke-width="1"/>
  <text x="140" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">“我方主张合同条款</text>
  <text x="140" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">应当严格执行。”</text>

  <!-- 置信度 -->
  <rect x="58" y="212" width="164" height="24" rx="6" fill="#FFF0D0"/>
  <text x="70" y="229" font-family="Arial, sans-serif" font-size="11" fill="#B8860B">置信度:</text>
  <rect x="120" y="218" width="60" height="14" rx="3" fill="#E6A23C" opacity="0.3"/>
  <rect x="120" y="218" width="45" height="14" rx="3" fill="#E6A23C"/>
  <text x="150" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF">75%</text>

  <!-- 连接线 A → 仲裁者 -->
  <line x1="240" y1="200" x2="275" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="275,195 285,200 275,205" fill="#409EFF" opacity="0.5"/>

  <!-- 右侧争议方B -->
  <rect x="560" y="100" width="200" height="200" rx="12" fill="url(#cardGrad)" stroke="#67C23A" stroke-width="2" filter="drop-shadow(0 2px 6px rgba(103,194,58,0.2))"/>
  <rect x="560" y="100" width="200" height="38" rx="12" fill="#67C23A"/>
  <rect x="560" y="126" width="200" height="12" fill="#67C23A"/>
  <text x="660" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">争议方 B</text>

  <!-- 观点气泡 -->
  <rect x="578" y="150" width="164" height="50" rx="8" fill="#E8F8E8" stroke="#A8D8A8" stroke-width="1"/>
  <text x="660" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">“合同存在歧义，</text>
  <text x="660" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">应重新协商条款。”</text>

  <!-- 置信度 -->
  <rect x="578" y="212" width="164" height="24" rx="6" fill="#E0F0E0"/>
  <text x="590" y="229" font-family="Arial, sans-serif" font-size="11" fill="#2E7D32">置信度:</text>
  <rect x="640" y="218" width="60" height="14" rx="3" fill="#67C23A" opacity="0.3"/>
  <rect x="640" y="218" width="50" height="14" rx="3" fill="#67C23A"/>
  <text x="670" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF">82%</text>

  <!-- 连接线 B → 仲裁者 -->
  <line x1="560" y1="200" x2="525" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="525,195 515,200 525,205" fill="#409EFF" opacity="0.5"/>

  <!-- 标注 -->
  <!-- 标注1：听取 -->
  <rect x="80" y="320" width="90" height="22" rx="4" fill="#409EFF" opacity="0.12"/>
  <text x="125" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">① 听取陈述</text>

  <!-- 标注2：分析 -->
  <rect x="340" y="410" width="90" height="22" rx="4" fill="#409EFF" opacity="0.12"/>
  <text x="385" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">② 分析论证</text>

  <!-- 标注3：裁决 -->
  <rect x="620" y="320" width="90" height="22" rx="4" fill="#409EFF" opacity="0.12"/>
  <text x="665" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">③ 做出裁决</text>

  <!-- 标注4：记录 -->
  <rect x="340" y="445" width="90" height="22" rx="4" fill="#409EFF" opacity="0.12"/>
  <text x="385" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">④ 记录归档</text>

  <!-- 标注5：调解 -->
  <rect x="80" y="355" width="90" height="22" rx="4" fill="#E6A23C" opacity="0.12"/>
  <text x="125" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E6A23C">⑤ 双方沟通</text>

  <!-- 标注6：平衡 -->
  <rect x="620" y="355" width="90" height="22" rx="4" fill="#67C23A" opacity="0.12"/>
  <text x="665" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#67C23A">⑥ 利益平衡</text>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888" opacity="0.7">仲裁者居中听取双方意见，分析分歧，评估论证质量后做出公正裁决</text>
</svg>