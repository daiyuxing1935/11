<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5aabff"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d9ef0"/>
      <stop offset="100%" stop-color="#6bb5ff"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ba8f0"/>
      <stop offset="100%" stop-color="#7cc0ff"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69b2f0"/>
      <stop offset="100%" stop-color="#8dcbff"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#77bcf0"/>
      <stop offset="100%" stop-color="#9ed6ff"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LangChain 五层能力金字塔</text>

  <!-- 第1层：Chain（最宽） -->
  <g filter="url(#shadow)">
    <rect x="120" y="400" width="560" height="44" rx="6" fill="url(#layer1)"/>
    <text x="400" y="427" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">Chain（链）— 做什么</text>
  </g>
  <text x="700" y="427" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">基础层 · 最宽</text>

  <!-- 第2层：Retriever -->
  <g filter="url(#shadow)">
    <rect x="170" y="336" width="460" height="44" rx="6" fill="url(#layer2)"/>
    <text x="400" y="363" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">Retriever（检索器）— 基于什么信息</text>
  </g>

  <!-- 第3层：Memory -->
  <g filter="url(#shadow)">
    <rect x="220" y="272" width="360" height="44" rx="6" fill="url(#layer3)"/>
    <text x="400" y="299" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">Memory（记忆）— 记住什么</text>
  </g>

  <!-- 第4层：Tool -->
  <g filter="url(#shadow)">
    <rect x="270" y="208" width="260" height="44" rx="6" fill="url(#layer4)"/>
    <text x="400" y="235" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">Tool（工具）— 能做什么</text>
  </g>

  <!-- 第5层：Agent（最窄） -->
  <g filter="url(#shadow)">
    <rect x="320" y="144" width="160" height="44" rx="6" fill="url(#layer5)"/>
    <text x="400" y="171" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">Agent（智能体）— 如何决策</text>
  </g>

  <!-- 向上箭头（抽象程度增加） -->
  <g stroke="#1a1a2e" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- 左侧箭头 -->
    <line x1="100" y1="422" x2="100" y2="155"/>
    <polygon points="100,148 94,158 106,158" fill="#1a1a2e" stroke="none"/>
    <!-- 右侧箭头 -->
    <line x1="700" y1="422" x2="700" y2="155"/>
    <polygon points="700,148 694,158 706,158" fill="#1a1a2e" stroke="none"/>
  </g>

  <!-- 左侧标注：抽象程度增加 -->
  <text x="88" y="300" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.6" transform="rotate(-90,88,300)">抽象程度增加 →</text>

  <!-- 右侧标注：自主性增加 -->
  <text x="712" y="300" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.6" transform="rotate(90,712,300)">自主性增加 →</text>

  <!-- 层间连接点（小圆点） -->
  <circle cx="400" cy="396" r="4" fill="#409EFF" opacity="0.5"/>
  <circle cx="400" cy="332" r="4" fill="#409EFF" opacity="0.5"/>
  <circle cx="400" cy="268" r="4" fill="#409EFF" opacity="0.5"/>
  <circle cx="400" cy="204" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 底部说明 -->
  <text x="400" y="478" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">自下而上：基础能力 → 高级智能 · 宽度代表能力范围</text>
</svg>