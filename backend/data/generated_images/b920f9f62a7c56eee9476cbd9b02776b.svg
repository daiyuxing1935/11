<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EEFA"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="500" fill="none" rx="12" stroke="#409EFF" stroke-width="1" stroke-opacity="0.15"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">ReAct 核心循环</text>

  <!-- 从 Observation 到 Thought 的反馈箭头（循环） -->
  <path d="M 620 280 Q 700 280 700 200 Q 700 120 620 120" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowFeedback)"/>
  <defs>
    <marker id="arrowFeedback" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#409EFF"/>
    </marker>
  </defs>
  <text x="690" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" transform="rotate(90,690,200)">循环</text>

  <!-- Thought 框 -->
  <g filter="url(#shadow)">
    <rect x="60" y="155" width="170" height="110" rx="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 灯泡图标 -->
    <circle cx="145" cy="195" r="16" fill="none" stroke="#409EFF" stroke-width="2"/>
    <path d="M 135 195 Q 135 180 145 178 Q 155 180 155 195" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="139" y1="200" x2="151" y2="200" stroke="#409EFF" stroke-width="2"/>
    <line x1="141" y1="204" x2="149" y2="204" stroke="#409EFF" stroke-width="2"/>
    <line x1="143" y1="208" x2="147" y2="208" stroke="#409EFF" stroke-width="2"/>
    <text x="145" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">思考</text>
  </g>

  <!-- 箭头 1：Thought → Action -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#409EFF"/>
    </marker>
  </defs>
  <line x1="230" y1="210" x2="290" y2="210" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowRight)"/>

  <!-- Action 框 -->
  <g filter="url(#shadow)">
    <rect x="300" y="155" width="170" height="110" rx="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 播放按钮图标 -->
    <polygon points="138,186 138,214 160,200" fill="none" stroke="#409EFF" stroke-width="2" stroke-linejoin="round"/>
    <text x="145" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">行动</text>
  </g>

  <!-- 箭头 2：Action → Observation -->
  <line x1="470" y1="210" x2="530" y2="210" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowRight)"/>

  <!-- Observation 框 -->
  <g filter="url(#shadow)">
    <rect x="540" y="155" width="170" height="110" rx="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 文档+对勾图标 -->
    <rect x="133" y="182" width="24" height="28" rx="3" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="138" y1="190" x2="152" y2="190" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="138" y1="196" x2="152" y2="196" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="138" y1="202" x2="148" y2="202" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M 148 200 L 153 205 L 160 196" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="145" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">观察</text>
  </g>

  <!-- 标注 1：思考 -->
  <rect x="75" y="290" width="140" height="32" rx="8" fill="#409EFF" fill-opacity="0.12"/>
  <text x="145" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">分析问题</text>

  <!-- 标注 2：行动 -->
  <rect x="310" y="290" width="150" height="32" rx="8" fill="#409EFF" fill-opacity="0.12"/>
  <text x="385" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">执行动作</text>

  <!-- 标注 3：观察 -->
  <rect x="550" y="290" width="150" height="32" rx="8" fill="#409EFF" fill-opacity="0.12"/>
  <text x="625" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">收集反馈</text>

  <!-- 标注 4：循环说明 -->
  <rect x="310" y="360" width="180" height="32" rx="8" fill="#409EFF" fill-opacity="0.12"/>
  <text x="400" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">持续迭代</text>

  <!-- 标注 5：ReAct 提示 -->
  <rect x="75" y="360" width="180" height="32" rx="8" fill="#409EFF" fill-opacity="0.12"/>
  <text x="165" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">推理+行动</text>

  <!-- 标注 6：底部说明 -->
  <rect x="550" y="360" width="180" height="32" rx="8" fill="#409EFF" fill-opacity="0.12"/>
  <text x="640" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">优化决策</text>

  <!-- 底部装饰线 -->
  <line x1="200" y1="430" x2="600" y2="430" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" fill-opacity="0.5">思考 → 行动 → 观察 → 循环</text>
</svg>