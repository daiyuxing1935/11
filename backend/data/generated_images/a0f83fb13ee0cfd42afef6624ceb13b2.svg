<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="rnnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6bb5ff"/>
    </linearGradient>
    <linearGradient id="transGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7ac0ff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" letter-spacing="1">核心架构对比：RNN 顺序处理 vs Transformer 并行处理</text>

  <!-- Left Panel: RNN Sequential -->
  <rect x="30" y="55" width="350" height="420" rx="16" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="55" width="350" height="50" rx="16" fill="#409EFF" opacity="0.08"/>
  <text x="205" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">RNN 顺序处理</text>

  <!-- RNN chain - 5 nodes in sequence -->
  <g>
    <!-- Node 1 -->
    <rect x="80" y="140" width="60" height="50" rx="12" fill="url(#rnnGrad)" opacity="0.9"/>
    <text x="110" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">x₁</text>

    <!-- Arrow 1→2 -->
    <line x1="140" y1="165" x2="175" y2="165" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <polygon points="175,158 188,165 175,172" fill="#409EFF"/>

    <!-- Node 2 -->
    <rect x="190" y="140" width="60" height="50" rx="12" fill="url(#rnnGrad)" opacity="0.9"/>
    <text x="220" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">x₂</text>

    <!-- Arrow 2→3 -->
    <line x1="250" y1="165" x2="285" y2="165" stroke="#409EFF" stroke-width="2.5"/>
    <polygon points="285,158 298,165 285,172" fill="#409EFF"/>

    <!-- Node 3 -->
    <rect x="300" y="140" width="60" height="50" rx="12" fill="url(#rnnGrad)" opacity="0.9"/>
    <text x="330" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">x₃</text>

    <!-- Arrow 3→4 -->
    <line x1="360" y1="165" x2="395" y2="165" stroke="#409EFF" stroke-width="2.5"/>
    <polygon points="395,158 408,165 395,172" fill="#409EFF"/>

    <!-- Node 4 -->
    <rect x="410" y="140" width="60" height="50" rx="12" fill="url(#rnnGrad)" opacity="0.9"/>
    <text x="440" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">x₄</text>

    <!-- Arrow 4→5 -->
    <line x1="470" y1="165" x2="505" y2="165" stroke="#409EFF" stroke-width="2.5"/>
    <polygon points="505,158 518,165 505,172" fill="#409EFF"/>

    <!-- Node 5 -->
    <rect x="520" y="140" width="60" height="50" rx="12" fill="url(#rnnGrad)" opacity="0.9"/>
    <text x="550" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">x₅</text>

    <!-- Serial dependency label -->
    <path d="M 80 230 L 580 230" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <text x="330" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">串行依赖：每一步依赖前一步输出</text>

    <!-- Sequential icon -->
    <g transform="translate(140, 280)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="10" y1="8" x2="10" y2="32" stroke="#409EFF" stroke-width="2"/>
      <line x1="10" y1="20" x2="40" y2="20" stroke="#409EFF" stroke-width="2"/>
      <polygon points="35,14 42,20 35,26" fill="#409EFF"/>
      <text x="25" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">顺序</text>
    </g>

    <!-- Time step arrows below -->
    <text x="110" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">t₁</text>
    <text x="220" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">t₂</text>
    <text x="330" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">t₃</text>
    <text x="440" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">t₄</text>
    <text x="550" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">t₅</text>

    <!-- Processing time indicator -->
    <rect x="100" y="390" width="440" height="6" rx="3" fill="#e8f2fb"/>
    <rect x="100" y="390" width="440" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
    <text x="330" y="418" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">处理时间 = 5 个时间步</text>
  </g>

  <!-- Right Panel: Transformer Parallel -->
  <rect x="420" y="55" width="350" height="420" rx="16" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="420" y="55" width="350" height="50" rx="16" fill="#409EFF" opacity="0.08"/>
  <text x="595" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">Transformer 并行处理</text>

  <!-- Transformer nodes arranged in a circle around self-attention -->
  <g>
    <!-- Self-Attention Hub -->
    <circle cx="595" cy="210" r="45" fill="url(#transGrad)" opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <circle cx="595" cy="210" r="30" fill="url(#transGrad)" opacity="0.3" filter="url(#glow)"/>
    <text x="595" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#1a1a2e">Self-</text>
    <text x="595" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#1a1a2e">Attention</text>

    <!-- Node 1 - top left -->
    <rect x="490" y="120" width="60" height="44" rx="10" fill="url(#transGrad)" opacity="0.85"/>
    <text x="520" y="147" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">x₁</text>
    <line x1="520" y1="164" x2="575" y2="195" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- Node 2 - top right -->
    <rect x="640" y="120" width="60" height="44" rx="10" fill="url(#transGrad)" opacity="0.85"/>
    <text x="670" y="147" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">x₂</text>
    <line x1="640" y1="164" x2="615" y2="195" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- Node 3 - left -->
    <rect x="465" y="210" width="60" height="44" rx="10" fill="url(#transGrad)" opacity="0.85"/>
    <text x="495" y="237" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">x₃</text>
    <line x1="525" y1="232" x2="565" y2="225" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- Node 4 - right -->
    <rect x="665" y="210" width="60" height="44" rx="10" fill="url(#transGrad)" opacity="0.85"/>
    <text x="695" y="237" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">x₄</text>
    <line x1="665" y1="232" x2="625" y2="225" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- Node 5 - bottom -->
    <rect x="565" y="285" width="60" height="44" rx="10" fill="url(#transGrad)" opacity="0.85"/>
    <text x="595" y="312" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white">x₅</text>
    <line x1="595" y1="285" x2="595" y2="255" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- All connected lines from hub to nodes -->
    <line x1="575" y1="195" x2="520" y2="164" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="615" y1="195" x2="670" y2="164" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="565" y1="225" x2="525" y2="232" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="625" y1="225" x2="665" y2="232" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="595" y1="255" x2="595" y2="285" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

    <!-- Parallel label -->
    <text x="595" y="355" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">并行连接：所有节点同时交互</text>

    <!-- Parallel icon -->
    <g transform="translate(570, 370)">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="10" y1="8" x2="10" y2="32" stroke="#409EFF" stroke-width="2"/>
      <line x1="25" y1="8" x2="25" y2="32" stroke="#409EFF" stroke-width="2"/>
      <line x1="40" y1="8" x2="40" y2="32" stroke="#409EFF" stroke-width="2"/>
      <text x="25" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">并行</text>
    </g>

    <!-- Same timeline indicator -->
    <rect x="480" y="430" width="230" height="6" rx="3" fill="#e8f2fb"/>
    <rect x="480" y="430" width="230" height="6" rx="3" fill="#409EFF" opacity="0.5"/>
    <text x="595" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">处理时间 = 1 个时间步（并行）</text>
  </g>

  <!-- Divider line between panels -->
  <line x1="395" y1="60" x2="395" y2="470" stroke="#409EFF" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Bottom note -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">Transformer 通过自注意力机制实现并行计算，大幅提升训练效率</text>
</svg>