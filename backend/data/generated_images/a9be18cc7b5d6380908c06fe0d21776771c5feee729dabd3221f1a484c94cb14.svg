    <circle cx="78" cy="152" r="4" fill="#409EFF" opacity="0.15"/>
    <circle cx="145" cy="150" r="5" fill="#409EFF" opacity="0.2"/>
    <circle cx="158" cy="152" r="4" fill="#409EFF" opacity="0.15"/>

