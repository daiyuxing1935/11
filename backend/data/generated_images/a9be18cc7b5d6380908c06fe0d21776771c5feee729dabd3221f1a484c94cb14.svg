  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI 代理：从工具到知识再到行动者</text>

  <!-- 分隔线 -->
  <line x1="60" y1="52" x2="740" y2="52" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

