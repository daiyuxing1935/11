    <rect x="88" y="97" width="8" height="17" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="98" y="102" width="8" height="12" rx="1" fill="#409EFF" opacity="0.35"/>
    <rect x="108" y="98" width="8" height="16" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="118" y="101" width="8" height="13" rx="1" fill="#409EFF" opacity="0.35"/>
