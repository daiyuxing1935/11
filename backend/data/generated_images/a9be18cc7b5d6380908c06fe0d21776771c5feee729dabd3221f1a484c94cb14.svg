    <line x1="158" y1="100" x2="170" y2="100" stroke="#409EFF" stroke-width="0.5" opacity="0.4"/>
    <line x1="158" y1="104" x2="170" y2="104" stroke="#409EFF" stroke-width="0.5" opacity="0.4"/>
    <line x1="158" y1="108" x2="168" y2="108" stroke="#409EFF" stroke-width="0.5" opacity="0.4"/>

