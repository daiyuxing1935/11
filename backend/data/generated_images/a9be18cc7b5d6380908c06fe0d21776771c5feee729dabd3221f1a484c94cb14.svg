    <line x1="55" y1="70" x2="55" y2="90" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="80" x2="65" y2="80" stroke="#409EFF" stroke-width="1" opacity="0.5"/>

    <circle cx="110" cy="80" r="10" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="110" cy="80" r="4" fill="#409EFF" opacity="0.5"/>
