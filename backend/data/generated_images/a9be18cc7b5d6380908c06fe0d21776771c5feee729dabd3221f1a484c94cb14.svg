    <rect x="70" y="100" width="16" height="12" rx="2" fill="#409EFF" opacity="0.4"/>
    <rect x="100" y="100" width="16" height="12" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="130" y="100" width="16" height="12" rx="2" fill="#409EFF" opacity="0.4"/>
