    <rect x="108" y="120" width="8" height="16" rx="1" fill="#409EFF" opacity="0.35"/>
    <rect x="118" y="123" width="8" height="13" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="128" y="118" width="8" height="18" rx="1" fill="#409EFF" opacity="0.35"/>
