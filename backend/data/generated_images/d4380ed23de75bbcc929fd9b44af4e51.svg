<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 中心枢纽：多智能体系统 -->
  <g filter="url(#shadow)">
    <circle cx="400" cy="250" r="52" fill="url(#hubGrad)" opacity="0.95"/>
    <circle cx="400" cy="250" r="52" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <text x="400" y="242" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">多智能体</text>
    <text x="400" y="262" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">系统</text>
  </g>

  <!-- 连接线 -->
  <g stroke="#409EFF" stroke-width="1.8" fill="none" opacity="0.5">
    <!-- 左上：纳什均衡 -->
    <path d="M 358 218 Q 280 140 210 105" stroke-dasharray="6,3"/>
    <!-- 右上：囚徒困境 -->
    <path d="M 442 218 Q 520 140 590 105"/>
    <!-- 左中：合作博弈 -->
    <path d="M 348 250 Q 260 250 190 250" stroke-dasharray="6,3"/>
    <!-- 右中：重复博弈 -->
    <path d="M 452 250 Q 540 250 610 250"/>
    <!-- 左下：机制设计 -->
    <path d="M 358 282 Q 280 360 210 395"/>
  </g>

  <!-- 箭头标记 -->
  <g fill="#409EFF" opacity="0.6">
    <!-- 左上箭头 -->
    <polygon points="215,108 225,112 218,118"/>
    <!-- 右上箭头 -->
    <polygon points="585,108 575,112 582,118"/>
    <!-- 左中箭头 -->
    <polygon points="195,250 205,245 205,255"/>
    <!-- 右中箭头 -->
    <polygon points="605,250 595,245 595,255"/>
    <!-- 左下箭头 -->
    <polygon points="215,392 225,388 218,382"/>
  </g>

  <!-- 节点1：纳什均衡 - 左上 -->
  <g filter="url(#shadow)">
    <rect x="110" y="55" width="160" height="100" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="190" y="80" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="15" font-weight="bold">纳什均衡</text>
    <!-- 天平图标 -->
    <line x1="145" y1="120" x2="235" y2="120" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="190" y1="100" x2="190" y2="120" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="190" cy="97" r="5" fill="#409EFF"/>
    <line x1="145" y1="120" x2="135" y2="135" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="235" y1="120" x2="245" y2="135" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="135" cy="138" r="4" fill="#409EFF" opacity="0.7"/>
    <circle cx="245" cy="138" r="4" fill="#409EFF" opacity="0.7"/>
    <text x="190" y="148" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="11">均衡策略</text>
  </g>

  <!-- 节点2：囚徒困境 - 右上 -->
  <g filter="url(#shadow)">
    <rect x="530" y="55" width="160" height="100" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="610" y="78" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="15" font-weight="bold">囚徒困境</text>
    <!-- 2x2 矩阵 -->
    <line x1="555" y1="95" x2="665" y2="95" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="555" y1="115" x2="665" y2="115" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="555" y1="135" x2="665" y2="135" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="610" y1="95" x2="610" y2="135" stroke="#409EFF" stroke-width="1.2"/>
    <text x="582" y="108" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="10">-1,-1</text>
    <text x="637" y="108" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="10">-5,0</text>
    <text x="582" y="128" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="10">0,-5</text>
    <text x="637" y="128" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="10">-3,-3</text>
    <text x="610" y="148" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="11">非合作博弈</text>
  </g>

  <!-- 节点3：合作博弈 - 左中 -->
  <g filter="url(#shadow)">
    <rect x="90" y="200" width="160" height="100" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="170" y="225" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="15" font-weight="bold">合作博弈</text>
    <!-- 齿轮图标 -->
    <circle cx="150" cy="260" r="14" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="150" cy="260" r="4" fill="#409EFF"/>
    <line x1="136" y1="260" x2="164" y2="260" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="150" y1="246" x2="150" y2="274" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="140" y1="250" x2="160" y2="270" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="140" y1="270" x2="160" y2="250" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="195" cy="260" r="14" fill="none" stroke="#409EFF" stroke-width="2.5" opacity="0.6"/>
    <circle cx="195" cy="260" r="4" fill="#409EFF" opacity="0.6"/>
    <text x="170" y="293" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="11">联合收益</text>
  </g>

  <!-- 节点4：重复博弈 - 右中 -->
  <g filter="url(#shadow)">
    <rect x="550" y="200" width="160" height="100" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="630" y="225" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="15" font-weight="bold">重复博弈</text>
    <!-- 循环箭头 -->
    <circle cx="630" cy="260" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <polygon points="630,242 625,250 635,250" fill="#409EFF"/>
    <polygon points="630,278 625,270 635,270" fill="#409EFF"/>
    <text x="630" y="293" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="11">长期策略</text>
  </g>

  <!-- 节点5：机制设计 - 左下 -->
  <g filter="url(#shadow)">
    <rect x="110" y="345" width="160" height="100" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="190" y="370" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="15" font-weight="bold">机制设计</text>
    <!-- 蓝图图标 -->
    <rect x="135" y="385" width="50" height="35" rx="3" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="140" y1="392" x2="180" y2="392" stroke="#409EFF" stroke-width="1"/>
    <line x1="140" y1="398" x2="180" y2="398" stroke="#409EFF" stroke-width="1"/>
    <line x1="140" y1="404" x2="180" y2="404" stroke="#409EFF" stroke-width="1"/>
    <line x1="140" y1="410" x2="170" y2="410" stroke="#409EFF" stroke-width="1"/>
    <rect x="195" y="385" width="35" height="35" rx="3" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="200" y1="392" x2="225" y2="392" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="200" y1="398" x2="225" y2="398" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="200" y1="404" x2="220" y2="404" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <text x="190" y="438" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="11">规则设计</text>
  </g>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="18" font-weight="bold" letter-spacing="2">博弈论核心概念 · 多智能体系统</text>
  <line x1="280" y1="38" x2="520" y2="38" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

  <!-- 装饰性角标 -->
  <rect x="10" y="10" width="20" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="10" y="10" width="3" height="20" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="770" y="10" width="20" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="787" y="10" width="3" height="20" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="10" y="487" width="20" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="10" y="470" width="3" height="20" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="770" y="487" width="20" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <rect x="787" y="470" width="3" height="20" rx="1.5" fill="#409EFF" opacity="0.3"/>
</svg>