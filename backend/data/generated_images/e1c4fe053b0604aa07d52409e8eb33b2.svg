<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFB"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFE"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">示例增强学习策略</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666" font-style="italic">通过结构化示例提升模型推理能力</text>

  <!-- 卡片1：示例排序策略 -->
  <g transform="translate(40, 90)">
    <rect width="350" height="170" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 图标：排序箭头 -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="#EBF3FF"/>
      <!-- 从上到下的箭头 -->
      <line x1="25" y1="8" x2="25" y2="42" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="25,42 19,32 31,32" fill="#409EFF"/>
      <line x1="10" y1="18" x2="40" y2="18" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="30" x2="40" y2="30" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <!-- 位置标注 -->
      <circle cx="10" cy="18" r="3" fill="#409EFF"/>
      <circle cx="10" cy="30" r="3" fill="#409EFF"/>
      <circle cx="40" cy="18" r="3" fill="#409EFF"/>
      <circle cx="40" cy="30" r="3" fill="#409EFF"/>
    </g>
    <text x="82" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">示例排序策略</text>
    <text x="82" y="56" font-family="Arial, sans-serif" font-size="12" fill="#888">Example Ordering</text>
    <text x="20" y="82" font-family="Arial, sans-serif" font-size="13" fill="#444">按首-中-尾位置重要性排列示例，</text>
    <text x="20" y="102" font-family="Arial, sans-serif" font-size="13" fill="#444">优先展示高价值样例。</text>
    <!-- 标注：首中尾 -->
    <g transform="translate(20, 118)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
      <text x="30" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">首中尾排序</text>
    </g>
    <g transform="translate(90, 118)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
      <text x="30" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">位置加权</text>
    </g>
  </g>

  <!-- 卡片2：动态示例选择 -->
  <g transform="translate(410, 90)">
    <rect width="350" height="170" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 图标：网络节点 -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="#EBF3FF"/>
      <!-- 输入节点 -->
      <circle cx="10" cy="25" r="6" fill="#409EFF"/>
      <text x="10" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">入</text>
      <!-- 连接线 -->
      <line x1="16" y1="25" x2="28" y2="15" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="16" y1="25" x2="28" y2="35" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="16" y1="25" x2="28" y2="25" stroke="#409EFF" stroke-width="1.5"/>
      <!-- 匹配节点 -->
      <circle cx="32" cy="15" r="5" fill="#409EFF" opacity="0.6"/>
      <circle cx="32" cy="25" r="5" fill="#409EFF" opacity="0.9"/>
      <circle cx="32" cy="35" r="5" fill="#409EFF" opacity="0.4"/>
      <!-- 高亮匹配 -->
      <circle cx="32" cy="25" r="7" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,2"/>
    </g>
    <text x="82" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">动态示例选择</text>
    <text x="82" y="56" font-family="Arial, sans-serif" font-size="12" fill="#888">Dynamic Selection</text>
    <text x="20" y="82" font-family="Arial, sans-serif" font-size="13" fill="#444">输入查询动态匹配最近邻示例，</text>
    <text x="20" y="102" font-family="Arial, sans-serif" font-size="13" fill="#444">自适应选择最相关样本。</text>
    <g transform="translate(20, 118)">
      <rect x="0" y="0" width="70" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
      <text x="35" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">最近邻匹配</text>
    </g>
    <g transform="translate(100, 118)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
      <text x="30" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">动态检索</text>
    </g>
  </g>

  <!-- 卡片3：否定示例 -->
  <g transform="translate(40, 290)">
    <rect width="350" height="170" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 图标：左右对比 -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="#EBF3FF"/>
      <!-- 左：错误示例 X -->
      <rect x="3" y="8" width="18" height="34" rx="4" fill="#FFE8E8"/>
      <line x1="7" y1="12" x2="17" y2="38" stroke="#FF4D4D" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="17" y1="12" x2="7" y2="38" stroke="#FF4D4D" stroke-width="2.5" stroke-linecap="round"/>
      <text x="12" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF4D4D">✗</text>
      <!-- 右：正确示例 ✓ -->
      <rect x="29" y="8" width="18" height="34" rx="4" fill="#E8FFE8"/>
      <polyline points="32,25 36,30 44,18" stroke="#52C41A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="38" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#52C41A">✓</text>
      <!-- 分隔线 -->
      <line x1="25" y1="8" x2="25" y2="42" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
    <text x="82" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">否定示例</text>
    <text x="82" y="56" font-family="Arial, sans-serif" font-size="12" fill="#888">Negative Examples</text>
    <text x="20" y="82" font-family="Arial, sans-serif" font-size="13" fill="#444">同时展示正确与错误示例，</text>
    <text x="20" y="102" font-family="Arial, sans-serif" font-size="13" fill="#444">通过对比强化学习效果。</text>
    <g transform="translate(20, 118)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#FF4D4D" opacity="0.12"/>
      <text x="30" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FF4D4D" font-weight="bold">错误示例</text>
    </g>
    <g transform="translate(88, 118)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#52C41A" opacity="0.12"/>
      <text x="30" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#52C41A" font-weight="bold">正确示例</text>
    </g>
  </g>

  <!-- 卡片4：解释增强 -->
  <g transform="translate(410, 290)">
    <rect width="350" height="170" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 图标：推理链 -->
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="50" height="50" rx="10" fill="#EBF3FF"/>
      <!-- 步骤1 -->
      <rect x="2" y="5" width="14" height="14" rx="3" fill="#409EFF" opacity="0.7"/>
      <text x="9" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">1</text>
      <!-- 步骤2 -->
      <rect x="18" y="5" width="14" height="14" rx="3" fill="#409EFF" opacity="0.85"/>
      <text x="25" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">2</text>
      <!-- 步骤3 -->
      <rect x="34" y="5" width="14" height="14" rx="3" fill="#409EFF"/>
      <text x="41" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">3</text>
      <!-- 箭头连接 -->
      <polygon points="17,12 20,10 20,14" fill="#409EFF" opacity="0.5"/>
      <polygon points="33,12 36,10 36,14" fill="#409EFF" opacity="0.5"/>
      <!-- 思考气泡 -->
      <g transform="translate(2, 24)">
        <ellipse cx="7" cy="6" rx="9" ry="5" fill="#409EFF" opacity="0.12"/>
        <text x="7" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#409EFF">思考</text>
      </g>
      <g transform="translate(18, 24)">
        <ellipse cx="7" cy="6" rx="9" ry="5" fill="#409EFF" opacity="0.12"/>
        <text x="7" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#409EFF">推理</text>
      </g>
      <g transform="translate(34, 24)">
        <ellipse cx="7" cy="6" rx="9" ry="5" fill="#409EFF" opacity="0.12"/>
        <text x="7" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#409EFF">结论</text>
      </g>
    </g>
    <text x="82" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">解释增强</text>
    <text x="82" y="56" font-family="Arial, sans-serif" font-size="12" fill="#888">Explanation Enhancement</text>
    <text x="20" y="82" font-family="Arial, sans-serif" font-size="13" fill="#444">示例中嵌入逐步推理过程，</text>
    <text x="20" y="102" font-family="Arial, sans-serif" font-size="13" fill="#444">每个步骤附带思考解释。</text>
    <g transform="translate(20, 118)">
      <rect x="0" y="0" width="70" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
      <text x="35" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">推理链解释</text>
    </g>
    <g transform="translate(100, 118)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
      <text x="30" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">步骤标注</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#999">四种示例增强策略 · 提升模型学习效率与泛化能力</text>
</svg>