<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="62" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#1a1a2e" letter-spacing="2">Transformer 核心要点</text>

  <!-- 标题下装饰线 -->
  <rect x="300" y="78" width="200" height="3" rx="1.5" fill="#409EFF" opacity="0.6"/>

  <!-- 2x2 网格布局 - 四个知识卡片 -->
  <!-- 卡片 1: 自注意力机制 -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="310" height="150" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="60" y="120" width="310" height="44" rx="14" fill="url(#cardGrad)"/>
    <rect x="60" y="150" width="310" height="14" fill="url(#cardGrad)"/>
    <!-- 图标：心形 + 连接线 -->
    <g transform="translate(215, 142)">
      <path d="M0,-8 C-4,-14 -14,-14 -14,-6 C-14,0 0,10 0,10 C0,10 14,0 14,-6 C14,-14 4,-14 0,-8Z" fill="white" stroke="none" transform="scale(0.9)"/>
    </g>
    <text x="215" y="166" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" fill="white">自注意力机制</text>
    <!-- 连接线示意 -->
    <g transform="translate(140, 200)">
      <circle cx="0" cy="0" r="4" fill="#409EFF" opacity="0.5"/>
      <line x1="0" y1="0" x2="30" y2="10" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="-30" y2="10" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="15" y2="-15" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="-15" y2="-15" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
      <circle cx="30" cy="10" r="3" fill="#409EFF" opacity="0.3"/>
      <circle cx="-30" cy="10" r="3" fill="#409EFF" opacity="0.3"/>
      <circle cx="15" cy="-15" r="3" fill="#409EFF" opacity="0.3"/>
      <circle cx="-15" cy="-15" r="3" fill="#409EFF" opacity="0.3"/>
    </g>
    <text x="215" y="240" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.85">捕捉序列全局依赖关系</text>
    <text x="215" y="260" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#666" opacity="0.7">Transformer 的核心创新</text>
  </g>

  <!-- 卡片 2: 模块化设计 -->
  <g filter="url(#shadow)">
    <rect x="430" y="120" width="310" height="150" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="430" y="120" width="310" height="44" rx="14" fill="url(#cardGrad)"/>
    <rect x="430" y="150" width="310" height="14" fill="url(#cardGrad)"/>
    <!-- 图标：三个拼图块 -->
    <g transform="translate(585, 140)">
      <rect x="-18" y="-10" width="18" height="20" rx="3" fill="white" opacity="0.9"/>
      <rect x="-6" y="-10" width="18" height="20" rx="3" fill="white" opacity="0.7"/>
      <rect x="6" y="-10" width="18" height="20" rx="3" fill="white" opacity="0.5"/>
      <!-- 拼图凸起 -->
      <circle cx="-9" cy="-10" r="3" fill="white"/>
      <circle cx="3" cy="-10" r="3" fill="white" opacity="0.7"/>
      <circle cx="15" cy="-10" r="3" fill="white" opacity="0.5"/>
    </g>
    <text x="585" y="166" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" fill="white">模块化设计</text>
    <text x="585" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.85">编码器-解码器灵活组合</text>
    <text x="585" y="230" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#666" opacity="0.7">衍生 GPT / BERT / T5 等</text>
    <text x="585" y="252" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#409EFF" opacity="0.8">统一架构框架</text>
  </g>

  <!-- 卡片 3: 残差连接 -->
  <g filter="url(#shadow)">
    <rect x="60" y="310" width="310" height="150" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="60" y="310" width="310" height="44" rx="14" fill="url(#cardGrad)"/>
    <rect x="60" y="340" width="310" height="14" fill="url(#cardGrad)"/>
    <!-- 图标：高速公路绕行 -->
    <g transform="translate(215, 330)">
      <rect x="-16" y="-8" width="32" height="16" rx="4" fill="none" stroke="white" stroke-width="2"/>
      <path d="M-16,-8 L-24,-16 L-24,0 Z" fill="white" opacity="0.7"/>
      <path d="M16,-8 L24,-16 L24,0 Z" fill="white" opacity="0.7"/>
      <line x1="-24" y1="-8" x2="24" y2="-8" stroke="white" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
    </g>
    <text x="215" y="356" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" fill="white">残差连接</text>
    <text x="215" y="400" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.85">缓解梯度消失问题</text>
    <text x="215" y="420" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#666" opacity="0.7">支持训练深层网络</text>
    <text x="215" y="442" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#409EFF" opacity="0.8">信息高速公路</text>
  </g>

  <!-- 卡片 4: 复杂度优化 -->
  <g filter="url(#shadow)">
    <rect x="430" y="310" width="310" height="150" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="430" y="310" width="310" height="44" rx="14" fill="url(#cardGrad)"/>
    <rect x="430" y="340" width="310" height="14" fill="url(#cardGrad)"/>
    <!-- 图标：图表 + 向下箭头 -->
    <g transform="translate(585, 330)">
      <polyline points="-18,6 -8,-4 0,2 8,-8 18,2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <polyline points="8,-8 12,-12 18,-8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="-8" x2="18" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M-18,6 L18,6" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <!-- 向下优化箭头 -->
      <path d="M-4,6 L-4,14 L-8,14 L0,20 L8,14 L4,14 L4,6 Z" fill="white" opacity="0.8" transform="translate(22,-2) scale(0.6)"/>
    </g>
    <text x="585" y="356" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" fill="white">复杂度优化</text>
    <text x="585" y="400" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.85">O(n²) 计算复杂度</text>
    <text x="585" y="420" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#666" opacity="0.7">驱动稀疏注意力研究</text>
    <text x="585" y="442" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#409EFF" opacity="0.8">高效推理与部署</text>
  </g>

  <!-- 底部标注 - 最多6个，每个3-6字 -->
  <g transform="translate(0, 480)">
    <rect x="160" y="0" width="60" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="190" y="14" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#409EFF" font-weight="500">并行计算</text>

    <rect x="245" y="0" width="60" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="275" y="14" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#409EFF" font-weight="500">位置编码</text>

    <rect x="330" y="0" width="60" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="360" y="14" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#409EFF" font-weight="500">多头注意力</text>

    <rect x="415" y="0" width="60" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="445" y="14" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#409EFF" font-weight="500">层归一化</text>

    <rect x="500" y="0" width="60" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="530" y="14" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#409EFF" font-weight="500">掩码机制</text>

    <rect x="585" y="0" width="60" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="615" y="14" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#409EFF" font-weight="500">预训练范式</text>
  </g>
</svg>