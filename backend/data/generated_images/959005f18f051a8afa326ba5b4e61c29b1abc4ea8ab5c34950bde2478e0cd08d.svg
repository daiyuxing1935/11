<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Transformer 完整架构</text>

  <!-- ==================== 编码器（左侧） ==================== -->

  <!-- 编码器标签 -->
  <text x="195" y="62" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">编码器（N 层）</text>

  <!-- 编码器第1层 -->
  <!-- 多头自注意力 -->
  <rect x="70" y="80" width="250" height="60" rx="12" fill="url(#blockGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="195" y="116" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">多头自注意力</text>

  <!-- 残差连接 + LayerNorm（左侧） -->
  <line x1="70" y1="110" x2="40" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="40" y1="110" x2="40" y2="170" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="40" y1="170" x2="70" y2="170" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="10" y="158" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="40" y="172" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 前馈神经网络 -->
  <rect x="70" y="190" width="250" height="60" rx="12" fill="url(#blockGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="195" y="226" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">前馈神经网络</text>

  <!-- 残差连接 + LayerNorm（右侧） -->
  <line x1="320" y1="110" x2="350" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="350" y1="110" x2="350" y2="190" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="350" y1="190" x2="320" y2="190" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="320" y="178" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="350" y="192" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 编码器第2层（重复） -->
  <rect x="70" y="280" width="250" height="60" rx="12" fill="url(#blockGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="195" y="316" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">多头自注意力</text>

  <line x1="70" y1="310" x2="40" y2="310" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="40" y1="310" x2="40" y2="370" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="40" y1="370" x2="70" y2="370" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="10" y="358" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="40" y="372" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <rect x="70" y="390" width="250" height="60" rx="12" fill="url(#blockGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="195" y="426" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">前馈神经网络</text>

  <line x1="320" y1="310" x2="350" y2="310" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="350" y1="310" x2="350" y2="390" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="350" y1="390" x2="320" y2="390" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="320" y="378" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="350" y="392" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 编码器 N 层省略号 -->
  <text x="195" y="268" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#1a1a2e">⋮</text>

  <!-- 输入嵌入 -->
  <rect x="110" y="460" width="170" height="30" rx="6" fill="#1a1a2e" opacity="0.8"/>
  <text x="195" y="480" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff">输入嵌入</text>

  <!-- 输入箭头 -->
  <line x1="195" y1="490" x2="195" y2="460" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="195" y1="250" x2="195" y2="280" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- ==================== 解码器（右侧） ==================== -->

  <!-- 解码器标签 -->
  <text x="605" y="62" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">解码器（N 层）</text>

  <!-- 解码器第1层 -->
  <!-- 掩码多头自注意力 -->
  <rect x="480" y="80" width="250" height="60" rx="12" fill="url(#decoderGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="605" y="110" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">掩码自注意力</text>

  <!-- 残差连接 + LayerNorm -->
  <line x1="480" y1="110" x2="450" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="450" y1="110" x2="450" y2="170" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="450" y1="170" x2="480" y2="170" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="420" y="158" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="450" y="172" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 交叉注意力 -->
  <rect x="480" y="190" width="250" height="60" rx="12" fill="url(#decoderGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="605" y="220" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">交叉注意力</text>

  <!-- 从编码器来的箭头 -->
  <line x1="320" y1="220" x2="480" y2="220" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowDark)"/>
  <text x="400" y="212" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e">编码器输出</text>

  <!-- 残差连接 + LayerNorm -->
  <line x1="730" y1="110" x2="760" y2="110" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="760" y1="110" x2="760" y2="190" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="760" y1="190" x2="730" y2="190" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="730" y="178" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="760" y="192" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 前馈神经网络 -->
  <rect x="480" y="280" width="250" height="60" rx="12" fill="url(#decoderGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="605" y="316" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">前馈神经网络</text>

  <!-- 残差连接 + LayerNorm -->
  <line x1="730" y1="220" x2="760" y2="220" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="760" y1="220" x2="760" y2="280" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="760" y1="280" x2="730" y2="280" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="730" y="268" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="760" y="282" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 解码器第2层（重复） -->
  <rect x="480" y="370" width="250" height="60" rx="12" fill="url(#decoderGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="605" y="400" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">掩码自注意力</text>

  <line x1="480" y1="400" x2="450" y2="400" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="450" y1="400" x2="450" y2="460" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="450" y1="460" x2="480" y2="460" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="420" y="448" width="60" height="20" rx="4" fill="#1a1a2e"/>
  <text x="450" y="462" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#ffffff">层归一化</text>

  <!-- 解码器 N 层省略号 -->
  <text x="605" y="358" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#1a1a2e">⋮</text>

  <!-- 输出嵌入 -->
  <rect x="520" y="460" width="170" height="30" rx="6" fill="#1a1a2e" opacity="0.8"/>
  <text x="605" y="480" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff">输出嵌入</text>

  <!-- 输出箭头 -->
  <line x1="605" y1="490" x2="605" y2="460" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <line x1="605" y1="340" x2="605" y2="370" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- 输出 -->
  <rect x="540" y="30" width="130" height="24" rx="6" fill="#1a1a2e" opacity="0.8"/>
  <text x="605" y="47" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff">输出序列</text>
  <line x1="605" y1="54" x2="605" y2="80" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- ==================== 标注 ==================== -->

  <!-- 标注1：编码器 -->
  <rect x="10" y="70" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="19" y="83" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">1</text>
  <text x="34" y="83" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">编码器堆叠</text>

  <!-- 标注2：解码器 -->
  <rect x="420" y="70" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="429" y="83" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">2</text>
  <text x="444" y="83" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">解码器堆叠</text>

  <!-- 标注3：自注意力 -->
  <rect x="10" y="98" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="19" y="111" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">3</text>
  <text x="34" y="111" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">自注意力机制</text>

  <!-- 标注4：交叉注意力 -->
  <rect x="420" y="98" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="429" y="111" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">4</text>
  <text x="444" y="111" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">交叉注意力</text>

  <!-- 标注5：残差连接 -->
  <rect x="10" y="126" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="19" y="139" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">5</text>
  <text x="34" y="139" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">残差连接</text>

  <!-- 标注6：层归一化 -->
  <rect x="420" y="126" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="429" y="139" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">6</text>
  <text x="444" y="139" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">层归一化</text>

  <!-- 标注7：前馈网络 -->
  <rect x="10" y="154" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="19" y="167" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">7</text>
  <text x="34" y="167" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">前馈网络</text>

  <!-- 标注8：N层 -->
  <rect x="420" y="154" width="18" height="18" rx="4" fill="#409EFF"/>
  <text x="429" y="167" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">8</text>
  <text x="444" y="167" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">N 层堆叠</text>

</svg>