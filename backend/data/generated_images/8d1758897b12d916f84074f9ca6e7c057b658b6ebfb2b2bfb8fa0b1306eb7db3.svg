<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sphereGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab7ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#409EFF;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">三维能力评估框架</text>

  <!-- 坐标系 - 等距透视布局 -->
  <!-- 中心点 (原点) -->
  <!-- X轴 (右下方向) - 推理能力 -->
  <line x1="180" y1="380" x2="620" y2="440" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- X轴箭头 -->
  <polygon points="620,440 605,432 608,445" fill="#1a1a2e"/>

  <!-- Y轴 (左上方向) - 工具准确度 -->
  <line x1="180" y1="380" x2="100" y2="120" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Y轴箭头 -->
  <polygon points="100,120 108,136 95,133" fill="#1a1a2e"/>

  <!-- Z轴 (左下方向) - 任务完成率 -->
  <line x1="180" y1="380" x2="60" y2="430" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Z轴箭头 -->
  <polygon points="60,430 75,422 68,437" fill="#1a1a2e"/>

  <!-- X轴刻度 -->
  <line x1="290" y1="395" x2="290" y2="403" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="410" x2="400" y2="418" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="510" y1="425" x2="510" y2="433" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Y轴刻度 -->
  <line x1="160" y1="300" x2="168" y2="300" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="140" y1="220" x2="148" y2="220" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="120" y1="140" x2="128" y2="140" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Z轴刻度 -->
  <line x1="140" y1="400" x2="140" y2="408" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="100" y1="415" x2="100" y2="423" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 轴标签 -->
  <!-- X轴标签 - 推理能力 -->
  <rect x="620" y="442" width="96" height="28" rx="14" fill="#1a1a2e" opacity="0.9"/>
  <text x="668" y="461" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">推理能力</text>

  <!-- Y轴标签 - 工具准确度 -->
  <rect x="52" y="88" width="96" height="28" rx="14" fill="#1a1a2e" opacity="0.9"/>
  <text x="100" y="107" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">工具准确度</text>

  <!-- Z轴标签 - 任务完成率 -->
  <rect x="12" y="430" width="96" height="28" rx="14" fill="#1a1a2e" opacity="0.9"/>
  <text x="60" y="449" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff">任务完成率</text>

  <!-- 数据点球体 (位于正象限，高分数) -->
  <!-- 位置: X轴约70%, Y轴约65%, Z轴约60% -->
  <circle cx="420" cy="260" r="22" fill="url(#sphereGrad)" filter="url(#shadow)" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 球体高光 -->
  <ellipse cx="413" cy="252" rx="8" ry="5" fill="white" opacity="0.4"/>

  <!-- 从球体到各轴的投影虚线 -->
  <line x1="420" y1="260" x2="420" y2="420" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="420" y1="260" x2="510" y2="425" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="420" y1="260" x2="160" y2="300" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- 数据点标注 -->
  <rect x="450" y="240" width="80" height="26" rx="13" fill="#409EFF" opacity="0.9"/>
  <text x="490" y="258" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">综合高分</text>

  <!-- 原点标签 -->
  <text x="170" y="395" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">O</text>

  <!-- 图例 - 评估维度说明 -->
  <rect x="580" y="60" width="190" height="100" rx="8" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
  <text x="675" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">评估维度</text>
  <line x1="600" y1="100" x2="620" y2="100" stroke="#1a1a2e" stroke-width="2.5"/>
  <text x="630" y="104" font-family="sans-serif" font-size="12" fill="#1a1a2e">推理能力</text>
  <line x1="600" y1="120" x2="620" y2="120" stroke="#1a1a2e" stroke-width="2.5"/>
  <text x="630" y="124" font-family="sans-serif" font-size="12" fill="#1a1a2e">工具准确度</text>
  <line x1="600" y1="140" x2="620" y2="140" stroke="#1a1a2e" stroke-width="2.5"/>
  <text x="630" y="144" font-family="sans-serif" font-size="12" fill="#1a1a2e">任务完成率</text>

  <!-- 底部说明 -->
  <text x="400" y="485" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">三维能力评估框架 · 综合评分可视化</text>
</svg>