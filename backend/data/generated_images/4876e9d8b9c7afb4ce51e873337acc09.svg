<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">微调工作流</text>
  <line x1="310" y1="48" x2="490" y2="48" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ========== 步骤1：明确目标 ========== -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="340" height="130" rx="14" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2"/>
  </g>
  <!-- 步骤编号 -->
  <circle cx="60" cy="90" r="12" fill="#409EFF"/>
  <text x="60" y="95" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">1</text>
  <text x="78" y="95" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">明确目标</text>

  <!-- 靶心图标 -->
  <circle cx="110" cy="155" r="28" fill="none" stroke="#409EFF" stroke-width="2.5"/>
  <circle cx="110" cy="155" r="18" fill="none" stroke="#409EFF" stroke-width="2"/>
  <circle cx="110" cy="155" r="8" fill="#409EFF" opacity="0.7"/>
  <line x1="110" y1="127" x2="110" y2="120" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="110" y1="183" x2="110" y2="190" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="82" y1="155" x2="75" y2="155" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="138" y1="155" x2="145" y2="155" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 复选框列表 -->
  <g transform="translate(155, 138)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <polyline points="2,6 5,9 10,3" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="11" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">确定应用场景</text>

    <rect x="0" y="24" width="12" height="12" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <polyline points="2,30 5,33 10,27" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="35" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">设定性能指标</text>
  </g>

  <!-- 箭头 1→2 -->
  <path d="M380,135 L410,135" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ========== 步骤2：数据准备 ========== -->
  <g filter="url(#shadow)">
    <rect x="420" y="70" width="340" height="130" rx="14" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2"/>
  </g>
  <circle cx="440" cy="90" r="12" fill="#409EFF"/>
  <text x="440" y="95" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">2</text>
  <text x="458" y="95" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">数据准备</text>

  <!-- 数据库图标 -->
  <g transform="translate(80, 125)">
    <ellipse cx="30" cy="15" rx="28" ry="10" fill="none" stroke="#409EFF" stroke-width="2"/>
    <path d="M2,15 L2,45 C2,50 14,55 30,55 C46,55 58,50 58,45 L58,15" fill="none" stroke="#409EFF" stroke-width="2"/>
    <path d="M2,30 C2,35 14,40 30,40 C46,40 58,35 58,30" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,3"/>
  </g>

  <!-- 格式一致性勾选 -->
  <g transform="translate(155, 135)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <polyline points="2,6 5,9 10,3" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="11" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">格式统一</text>

    <rect x="0" y="24" width="12" height="12" rx="2" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <polyline points="2,30 5,33 10,27" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="35" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">质量筛选</text>
  </g>

  <!-- 标注：最关键也最耗时 -->
  <rect x="470" y="165" width="130" height="24" rx="12" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="535" y="181" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#E65100">⚠ 最关键也最耗时</text>

  <!-- 箭头 2→3 -->
  <path d="M300,200 L300,230" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)" transform="translate(100,0)"/>

  <!-- ========== 步骤3：选择方法 ========== -->
  <g filter="url(#shadow)">
    <rect x="40" y="250" width="340" height="170" rx="14" fill="url(#cardGrad2)" stroke="#409EFF" stroke-width="1.2"/>
  </g>
  <circle cx="60" cy="270" r="12" fill="#409EFF"/>
  <text x="60" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">3</text>
  <text x="78" y="275" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">选择方法</text>

  <!-- LoRA 卡片 -->
  <g transform="translate(55, 295)">
    <rect x="0" y="0" width="95" height="105" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.2"/>
    <circle cx="47" cy="25" r="14" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <circle cx="47" cy="25" r="6" fill="#409EFF" opacity="0.5"/>
    <path d="M47,11 L47,5" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
    <text x="47" y="58" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">LoRA</text>
    <text x="47" y="78" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#666">小数据量</text>
    <text x="47" y="96" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF">★ 推荐</text>
  </g>

  <!-- 全量微调卡片 -->
  <g transform="translate(163, 295)">
    <rect x="0" y="0" width="95" height="105" rx="10" fill="#F0F8FF" stroke="#B0D4F1" stroke-width="1.2"/>
    <circle cx="47" cy="25" r="16" fill="none" stroke="#7CB8E8" stroke-width="1.8"/>
    <circle cx="47" cy="25" r="8" fill="#7CB8E8" opacity="0.4"/>
    <path d="M47,9 L47,3" stroke="#7CB8E8" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M47,41 L47,47" stroke="#7CB8E8" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M31,25 L25,25" stroke="#7CB8E8" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M63,25 L69,25" stroke="#7CB8E8" stroke-width="1.8" stroke-linecap="round"/>
    <text x="47" y="58" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">全量微调</text>
    <text x="47" y="78" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#666">大数据量</text>
    <text x="47" y="96" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#999">资源要求高</text>
  </g>

  <!-- QLoRA 卡片 -->
  <g transform="translate(271, 295)">
    <rect x="0" y="0" width="95" height="105" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.2"/>
    <rect x="33" y="12" width="28" height="26" rx="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="47" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">Q</text>
    <circle cx="47" cy="25" r="14" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="47" y="58" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">QLoRA</text>
    <text x="47" y="78" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#666">压缩适配</text>
    <text x="47" y="96" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF">高效</text>
  </g>

  <!-- 箭头 3→4 -->
  <path d="M380,335 L410,335" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- ========== 步骤4：评估与迭代 ========== -->
  <g filter="url(#shadow)">
    <rect x="420" y="250" width="340" height="170" rx="14" fill="url(#cardGrad2)" stroke="#409EFF" stroke-width="1.2"/>
  </g>
  <circle cx="440" cy="270" r="12" fill="#409EFF"/>
  <text x="440" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">4</text>
  <text x="458" y="275" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">评估与迭代</text>

  <!-- 循环图标 -->
  <g transform="translate(90, 300)">
    <path d="M15,30 A18,18 0 1,1 45,30" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="45,30 38,23" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="45,30 38,37" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M45,30 A18,18 0 1,1 15,30" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,4"/>
    <polyline points="15,30 22,37" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 上升趋势图 -->
  <g transform="translate(155, 295)">
    <rect x="0" y="20" width="100" height="60" rx="4" fill="#F5FAFF" stroke="#409EFF" stroke-width="1"/>
    <!-- 网格线 -->
    <line x1="10" y1="70" x2="90" y2="70" stroke="#E0EEF8" stroke-width="0.5"/>
    <line x1="10" y1="55" x2="90" y2="55" stroke="#E0EEF8" stroke-width="0.5"/>
    <line x1="10" y1="40" x2="90" y2="40" stroke="#E0EEF8" stroke-width="0.5"/>
    <!-- 折线 -->
    <polyline points="15,65 35,50 55,52 75,35 90,28" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 上升箭头 -->
    <polyline points="85,32 90,28 82,26" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 数据点 -->
    <circle cx="15" cy="65" r="3" fill="#409EFF"/>
    <circle cx="35" cy="50" r="3" fill="#409EFF"/>
    <circle cx="55" cy="52" r="3" fill="#409EFF"/>
    <circle cx="75" cy="35" r="3" fill="#409EFF"/>
    <circle cx="90" cy="28" r="3" fill="#409EFF"/>
  </g>

  <!-- 评估指标 -->
  <g transform="translate(270, 300)">
    <text x="0" y="15" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">• 准确率</text>
    <text x="0" y="38" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">• 召回率</text>
    <text x="0" y="61" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#1a1a2e">• 人工评估</text>
  </g>

  <!-- 反馈箭头 4→2（循环） -->
  <path d="M590,250 Q590,200 590,200 Q590,160 590,200" stroke="#409EFF" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
  <text x="600" y="225" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#409EFF" font-style="italic">反馈迭代</text>

  <!-- 底部装饰线 -->
  <line x1="200" y1="460" x2="600" y2="460" stroke="#409EFF" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <circle cx="400" cy="460" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 底部标注 -->
  <text x="400" y="485" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#999">微调工作流 · 教育配图</text>
</svg>