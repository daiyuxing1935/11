<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0ECFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">投资决策冲突解决案例</text>

  <!-- ===== 三位分析师 ===== -->
  <!-- 技术分析师 -->
  <rect x="40" y="55" width="220" height="100" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="55" y="65" width="36" height="36" rx="6" fill="#409EFF" opacity="0.15"/>
  <!-- 图表图标 -->
  <polyline points="62,90 72,78 82,85 92,70" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="95" x2="95" y2="95" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="55" y1="95" x2="55" y2="65" stroke="#409EFF" stroke-width="1.5"/>
  <text x="105" y="78" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">技术分析师</text>
  <text x="105" y="98" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">推荐：买入</text>

  <!-- 基本面分析师 -->
  <rect x="290" y="55" width="220" height="100" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="305" y="65" width="36" height="36" rx="6" fill="#409EFF" opacity="0.15"/>
  <!-- 表格图标 -->
  <line x1="312" y1="72" x2="342" y2="72" stroke="#409EFF" stroke-width="2"/>
  <line x1="312" y1="80" x2="342" y2="80" stroke="#409EFF" stroke-width="2"/>
  <line x1="312" y1="88" x2="342" y2="88" stroke="#409EFF" stroke-width="2"/>
  <line x1="312" y1="72" x2="312" y2="96" stroke="#409EFF" stroke-width="2"/>
  <line x1="322" y1="72" x2="322" y2="96" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="332" y1="72" x2="332" y2="96" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="342" y1="72" x2="342" y2="96" stroke="#409EFF" stroke-width="1.5"/>
  <text x="355" y="78" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">基本面分析师</text>
  <text x="355" y="98" font-family="Arial, sans-serif" font-size="13" fill="#E6A23C" font-weight="bold">推荐：持有</text>

  <!-- 新闻情绪分析师 -->
  <rect x="540" y="55" width="220" height="100" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="555" y="65" width="36" height="36" rx="6" fill="#409EFF" opacity="0.15"/>
  <!-- 报纸图标 -->
  <rect x="560" y="68" width="26" height="24" rx="2" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="563" y1="75" x2="583" y2="75" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="563" y1="80" x2="583" y2="80" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="563" y1="85" x2="578" y2="85" stroke="#409EFF" stroke-width="1.5"/>
  <text x="605" y="78" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">新闻情绪分析师</text>
  <text x="605" y="98" font-family="Arial, sans-serif" font-size="13" fill="#F56C6C" font-weight="bold">推荐：卖出</text>

  <!-- 箭头：分析师 → 步骤1 -->
  <line x1="150" y1="155" x2="150" y2="185" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="155" x2="400" y2="185" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="650" y1="155" x2="650" y2="185" stroke="#409EFF" stroke-width="1.5"/>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ===== 步骤1：收集详细分析 ===== -->
  <rect x="40" y="190" width="720" height="55" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="60" y="212" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">步骤1</text>
  <text x="60" y="232" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">收集详细分析</text>

  <!-- 三个分析卡片 -->
  <rect x="200" y="198" width="140" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="270" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">技术分析卡</text>

  <rect x="360" y="198" width="140" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="430" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">基本面分析卡</text>

  <rect x="520" y="198" width="140" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="590" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">新闻情绪分析卡</text>

  <!-- 箭头：步骤1 → 步骤2 -->
  <line x1="400" y1="245" x2="400" y2="275" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== 步骤2：加权投票 ===== -->
  <rect x="40" y="280" width="720" height="55" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="60" y="302" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">步骤2</text>
  <text x="60" y="322" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">加权投票</text>

  <rect x="200" y="288" width="140" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="270" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">技术 1.0</text>

  <rect x="360" y="288" width="140" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="430" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">基本面 1.5</text>

  <rect x="520" y="288" width="140" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="590" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">新闻 0.8</text>

  <!-- 箭头：步骤2 → 步骤3 -->
  <line x1="400" y1="335" x2="400" y2="365" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== 步骤3：分歧辩论 ===== -->
  <rect x="40" y="370" width="720" height="55" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="60" y="392" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">步骤3</text>
  <text x="60" y="412" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">分歧辩论</text>

  <!-- 两个辩论分析师 -->
  <rect x="250" y="378" width="100" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="300" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">分析师A</text>

  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e">↔</text>

  <rect x="430" y="378" width="100" height="38" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="480" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">分析师B</text>

  <text x="580" y="402" font-family="Arial, sans-serif" font-size="12" fill="#F56C6C">共识 &lt; 0.6时触发</text>

  <!-- 箭头：步骤3 → 步骤4 -->
  <line x1="400" y1="425" x2="400" y2="448" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== 步骤4：人工审核 ===== -->
  <rect x="200" y="453" width="400" height="38" rx="8" fill="#1a1a2e" opacity="0.1"/>
  <text x="220" y="475" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">步骤4</text>
  <text x="280" y="475" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">人工审核（仍不确定时）</text>

  <!-- 人工操作员图标 -->
  <circle cx="540" cy="472" r="12" fill="#409EFF" opacity="0.2"/>
  <circle cx="540" cy="468" r="4" fill="#409EFF"/>
  <ellipse cx="540" cy="478" rx="6" ry="3" fill="#409EFF"/>

</svg>