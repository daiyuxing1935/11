<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">对等专家小组架构图</text>

  <!-- 用户输入模块 -->
  <rect x="320" y="50" width="160" height="38" rx="19" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="400" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">用户输入</text>

  <!-- 从用户输入到协调器的箭头 -->
  <line x1="400" y1="88" x2="400" y2="118" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 协调器模块 -->
  <rect x="300" y="120" width="200" height="40" rx="20" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">协调器 / 主持人</text>

  <!-- 从协调器到专家的箭头 -->
  <line x1="340" y1="160" x2="200" y2="200" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="160" x2="400" y2="200" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="460" y1="160" x2="600" y2="200" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 专家A -->
  <rect x="100" y="205" width="180" height="50" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">专家 A（技术）</text>
  <text x="190" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">技术架构 / 实现</text>

  <!-- 专家B -->
  <rect x="310" y="205" width="180" height="50" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">专家 B（业务）</text>
  <text x="400" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">市场 / 运营</text>

  <!-- 专家C -->
  <rect x="520" y="205" width="180" height="50" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="610" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">专家 C（法务）</text>
  <text x="610" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">合规 / 风险</text>

  <!-- 专家之间的全连接线 -->
  <line x1="280" y1="230" x2="310" y2="230" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="490" y1="230" x2="520" y2="230" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="280" y1="240" x2="520" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 从专家到投票/综合的箭头 -->
  <line x1="190" y1="255" x2="300" y2="310" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="255" x2="400" y2="310" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="610" y1="255" x2="500" y2="310" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 投票/综合模块 -->
  <rect x="300" y="315" width="200" height="40" rx="20" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">投票 / 综合</text>

  <!-- 从投票到最终决定的箭头 -->
  <line x1="400" y1="355" x2="400" y2="385" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 最终决定模块 -->
  <rect x="310" y="388" width="180" height="38" rx="19" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">最终决定</text>

  <!-- 标注1 -->
  <rect x="15" y="130" width="110" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
  <text x="70" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">任务分配</text>

  <!-- 标注2 -->
  <rect x="15" y="170" width="110" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
  <text x="70" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">平等参与</text>

  <!-- 标注3 -->
  <rect x="670" y="130" width="110" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
  <text x="725" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">专业互补</text>

  <!-- 标注4 -->
  <rect x="670" y="170" width="110" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
  <text x="725" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">集体决策</text>

  <!-- 标注5 -->
  <rect x="15" y="340" width="110" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
  <text x="70" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">共识达成</text>

  <!-- 对比框 -->
  <rect x="30" y="440" width="340" height="48" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
  <text x="45" y="460" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">对等模式：</text>
  <text x="45" y="478" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">全员平等，集体决策</text>

  <rect x="430" y="440" width="340" height="48" rx="8" fill="#fff" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
  <text x="445" y="460" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">经理-员工模式：</text>
  <text x="445" y="478" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">层级分明，经理决策</text>

</svg>