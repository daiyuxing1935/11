<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#D0EBFF"/>
    </linearGradient>
    <linearGradient id="userInputGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="facilitatorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="expertGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7DC0FF"/>
    </linearGradient>
    <linearGradient id="votingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E8BFF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">对等专家小组架构（Peer-to-Peer）</text>

  <!-- ===== 用户输入 ===== -->
  <rect x="300" y="50" width="200" height="44" rx="10" fill="url(#userInputGrad)" filter="url(#shadow)"/>
  <text x="400" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">用户输入</text>

  <!-- 箭头：用户输入 → 协调人 -->
  <line x1="400" y1="94" x2="400" y2="130" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ===== 协调人 ===== -->
  <rect x="280" y="132" width="240" height="44" rx="10" fill="url(#facilitatorGrad)" filter="url(#shadow)"/>
  <text x="400" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">协调人 / 主持人</text>

  <!-- 标注1 -->
  <rect x="530" y="138" width="72" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="566" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">组织讨论</text>

  <!-- 箭头：协调人 → 专家（三条线） -->
  <line x1="320" y1="176" x2="160" y2="220" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="176" x2="400" y2="220" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="480" y1="176" x2="640" y2="220" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== 三位专家（等高，无层级） ===== -->
  <!-- 专家 A - 技术 -->
  <rect x="60" y="222" width="200" height="50" rx="10" fill="url(#expertGrad)" filter="url(#shadow)"/>
  <text x="160" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">专家 A · 技术</text>
  <text x="160" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F4FF">技术可行性评估</text>

  <!-- 专家 B - 业务 -->
  <rect x="300" y="222" width="200" height="50" rx="10" fill="url(#expertGrad)" filter="url(#shadow)"/>
  <text x="400" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">专家 B · 业务</text>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F4FF">商业模式与市场</text>

  <!-- 专家 C - 法律 -->
  <rect x="540" y="222" width="200" height="50" rx="10" fill="url(#expertGrad)" filter="url(#shadow)"/>
  <text x="640" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">专家 C · 法律</text>
  <text x="640" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F4FF">合规与风险审查</text>

  <!-- 标注2 - 对等连接 -->
  <rect x="250" y="195" width="72" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="286" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">对等协作</text>

  <!-- ===== 专家之间的全网格连接线 ===== -->
  <!-- A ↔ B -->
  <line x1="260" y1="247" x2="300" y2="247" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- B ↔ C -->
  <line x1="500" y1="247" x2="540" y2="247" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- A ↔ C（跨过 B 上方） -->
  <line x1="260" y1="235" x2="540" y2="235" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- 箭头：专家 → 投票/综合 -->
  <line x1="160" y1="272" x2="300" y2="320" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="272" x2="400" y2="320" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="272" x2="500" y2="320" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== 投票/综合 ===== -->
  <rect x="280" y="322" width="240" height="44" rx="10" fill="url(#votingGrad)" filter="url(#shadow)"/>
  <text x="400" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">投票 / 综合</text>

  <!-- 标注3 -->
  <rect x="530" y="328" width="72" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="566" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">汇总意见</text>

  <!-- 箭头：投票 → 最终决策 -->
  <line x1="400" y1="366" x2="400" y2="400" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== 最终决策 ===== -->
  <rect x="300" y="402" width="200" height="44" rx="10" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="400" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">最终决策</text>

  <!-- 标注4 -->
  <rect x="510" y="408" width="72" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="546" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">共识达成</text>

  <!-- ===== 对比插框 ===== -->
  <rect x="30" y="455" width="740" height="38" rx="8" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 对等模式 -->
  <circle cx="60" cy="474" r="8" fill="#409EFF" opacity="0.2"/>
  <circle cx="60" cy="474" r="4" fill="#409EFF"/>
  <text x="75" y="479" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">
    <tspan font-weight="bold">对等模式：</tspan>所有专家平等，集体决策
  </text>

  <!-- 分隔线 -->
  <line x1="400" y1="458" x2="400" y2="490" stroke="#409EFF" stroke-width="1" opacity="0.4"/>

  <!-- 经理-员工模式 -->
  <circle cx="430" cy="474" r="8" fill="#1a1a2e" opacity="0.15"/>
  <circle cx="430" cy="474" r="4" fill="#1a1a2e"/>
  <text x="445" y="479" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">
    <tspan font-weight="bold">经理-员工模式：</tspan>明确层级，经理决策
  </text>

  <!-- 标注5 -->
  <rect x="260" y="460" width="60" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="290" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">对比</text>

</svg>