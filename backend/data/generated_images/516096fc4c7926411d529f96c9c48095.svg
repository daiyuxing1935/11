<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">示例数量与性能增益关系图</text>
  <text x="400" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5a5a7a">Number of Examples vs. Performance Gain</text>

  <!-- 图表区域 -->
  <g transform="translate(100, 80)">
    <!-- Y轴标签 -->
    <text x="-8" y="18" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">高</text>
    <text x="-8" y="260" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">低</text>

    <!-- Y轴箭头 -->
    <line x1="0" y1="0" x2="0" y2="270" stroke="#1a1a2e" stroke-width="1.5"/>
    <polygon points="-6,4 0,-4 6,4" fill="#1a1a2e"/>

    <!-- X轴 -->
    <line x1="0" y1="270" x2="600" y2="270" stroke="#1a1a2e" stroke-width="1.5"/>
    <polygon points="594,264 604,270 594,276" fill="#1a1a2e"/>

    <!-- X轴标签 -->
    <text x="0" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">0</text>
    <text x="100" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">1</text>
    <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">2</text>
    <text x="300" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">3</text>
    <text x="400" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">4</text>
    <text x="500" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">5</text>
    <text x="580" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">6+</text>

    <!-- X轴标题 -->
    <text x="300" y="325" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">示例数量 / Number of Examples</text>

    <!-- Y轴标题（旋转） -->
    <text x="-50" y="135" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold" transform="rotate(-90, -50, 135)">性能增益 / Performance Gain</text>

    <!-- 网格线（浅色） -->
    <line x1="0" y1="54" x2="600" y2="54" stroke="#e0e5f0" stroke-width="0.5"/>
    <line x1="0" y1="108" x2="600" y2="108" stroke="#e0e5f0" stroke-width="0.5"/>
    <line x1="0" y1="162" x2="600" y2="162" stroke="#e0e5f0" stroke-width="0.5"/>
    <line x1="0" y1="216" x2="600" y2="216" stroke="#e0e5f0" stroke-width="0.5"/>

    <!-- 最佳区间 / Optimal Range 高亮带 (x=3 到 x=5) -->
    <rect x="250" y="30" width="200" height="240" fill="url(#bandGrad)" rx="8" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>
    <text x="350" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">最佳区间</text>
    <text x="350" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">Optimal Range</text>

    <!-- 曲线区域 -->
    <path d="M 0,260 
             C 30,260 60,220 100,140 
             C 130,90 160,70 200,55 
             C 240,42 270,38 300,36 
             C 350,34 400,35 450,38 
             C 500,42 530,50 560,65
             L 600,65" 
          fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

    <!-- 曲线下渐变填充 -->
    <path d="M 0,260 
             C 30,260 60,220 100,140 
             C 130,90 160,70 200,55 
             C 240,42 270,38 300,36 
             C 350,34 400,35 450,38 
             C 500,42 530,50 560,65
             L 600,65
             L 600,270 L 0,270 Z" 
          fill="url(#bandGrad)" opacity="0.4"/>

    <!-- 数据点 -->
    <circle cx="0" cy="260" r="5" fill="#1a1a2e" stroke="white" stroke-width="2"/>
    <circle cx="100" cy="140" r="5" fill="#409EFF" stroke="white" stroke-width="2"/>
    <circle cx="200" cy="55" r="5" fill="#409EFF" stroke="white" stroke-width="2"/>
    <circle cx="300" cy="36" r="6" fill="#409EFF" stroke="white" stroke-width="2.5"/>
    <circle cx="400" cy="35" r="6" fill="#409EFF" stroke="white" stroke-width="2.5"/>
    <circle cx="500" cy="38" r="6" fill="#409EFF" stroke="white" stroke-width="2.5"/>
    <circle cx="580" cy="65" r="5" fill="#e06c6c" stroke="white" stroke-width="2"/>

    <!-- 标注：边际收益递减 -->
    <g transform="translate(560, 80)">
      <rect x="-10" y="-15" width="90" height="36" rx="6" fill="#fff5f5" stroke="#e06c6c" stroke-width="1"/>
      <text x="35" y="2" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e06c6c" font-weight="bold">边际收益递减</text>
      <text x="35" y="16" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e06c6c">Diminishing Returns</text>
      <line x1="35" y1="-18" x2="35" y2="-28" stroke="#e06c6c" stroke-width="1.5"/>
      <polygon points="30,-28 35,-34 40,-28" fill="#e06c6c"/>
    </g>

    <!-- 标注：快速上升 -->
    <g transform="translate(100, 100)">
      <rect x="-5" y="-12" width="80" height="28" rx="6" fill="#e8f4e8" stroke="#67c23a" stroke-width="1"/>
      <text x="35" y="4" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#67c23a" font-weight="bold">快速上升</text>
      <text x="35" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#67c23a">Rapid Gain</text>
    </g>

    <!-- 标注：趋于平稳 -->
    <g transform="translate(380, 10)">
      <rect x="-5" y="-5" width="80" height="24" rx="6" fill="#e8f0fe" stroke="#409EFF" stroke-width="1"/>
      <text x="35" y="12" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" font-weight="bold">趋于平稳</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(400, 440)">
    <rect x="-180" y="-12" width="360" height="36" rx="8" fill="#f5f7fa" stroke="#e0e5f0" stroke-width="1"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5a5a7a">💡 提供 3–5 个示例可获得最佳学习效果，超过后收益递减</text>
  </g>

  <!-- 装饰元素 -->
  <g transform="translate(30, 440)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#409EFF" opacity="0.3"/>
    <rect x="4" y="4" width="8" height="8" rx="2" fill="#409EFF"/>
  </g>
  <text x="52" y="13" font-family="sans-serif" font-size="12" fill="#5a5a7a">数据点</text>

  <g transform="translate(140, 440)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#409EFF" opacity="0.12"/>
    <rect x="0" y="0" width="16" height="16" rx="3" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <text x="162" y="13" font-family="sans-serif" font-size="12" fill="#5a5a7a">最佳区间</text>

  <g transform="translate(280, 440)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="#fff5f5" stroke="#e06c6c" stroke-width="1"/>
  </g>
  <text x="302" y="13" font-family="sans-serif" font-size="12" fill="#5a5a7a">收益递减</text>
</svg>