<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#D0EAFF"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2D7FE0"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0B8C4"/>
      <stop offset="100%" stop-color="#8E96A2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">LoRA 让大模型微调人人可用</text>

  <!-- ===== 左侧：全量微调（灰色弱化） ===== -->
  <g opacity="0.55">
    <!-- 服务器机柜 -->
    <rect x="55" y="80" width="130" height="200" rx="8" fill="url(#serverGrad)" stroke="#7A8290" stroke-width="2" filter="url(#shadow)"/>
    <!-- 服务器横线 -->
    <rect x="70" y="100" width="100" height="8" rx="3" fill="#6A7280"/>
    <rect x="70" y="120" width="100" height="8" rx="3" fill="#6A7280"/>
    <rect x="70" y="140" width="100" height="8" rx="3" fill="#6A7280"/>
    <!-- GPU 卡 -->
    <rect x="75" y="170" width="40" height="55" rx="4" fill="#5A6270"/>
    <rect x="125" y="170" width="40" height="55" rx="4" fill="#5A6270"/>
    <rect x="75" y="235" width="40" height="30" rx="4" fill="#5A6270"/>
    <rect x="125" y="235" width="40" height="30" rx="4" fill="#5A6270"/>
    <!-- 指示灯 -->
    <circle cx="85" cy="180" r="3" fill="#4A5560"/>
    <circle cx="135" cy="180" r="3" fill="#4A5560"/>
    <!-- 价格标签 -->
    <rect x="65" y="300" width="110" height="30" rx="15" fill="#E0E4EA" stroke="#8E96A2" stroke-width="1.5"/>
    <text x="120" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6A7280">$500K+</text>
  </g>

  <!-- 左侧标注 -->
  <text x="120" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8E96A2">全量微调</text>
  <text x="120" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#A0A8B4">成本高·门槛高</text>

  <!-- ===== 中间箭头 ===== -->
  <g>
    <!-- 箭头线 -->
    <line x1="200" y1="190" x2="310" y2="190" stroke="#1a1a2e" stroke-width="2.5" stroke-dasharray="8,4"/>
    <!-- 箭头头 -->
    <polygon points="310,183 325,190 310,197" fill="#1a1a2e"/>
    <!-- 箭头上的文字 -->
    <text x="255" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">转向</text>
  </g>

  <!-- ===== 右侧：LoRA 微调（高亮 #409EFF） ===== -->

  <!-- 大脑 / LLM 模型 -->
  <g filter="url(#shadow)">
    <!-- 大脑主体 -->
    <ellipse cx="530" cy="170" rx="75" ry="60" fill="url(#brainGrad)" opacity="0.15"/>
    <ellipse cx="530" cy="170" rx="65" ry="50" fill="url(#brainGrad)" opacity="0.25"/>
    <!-- 大脑褶皱 -->
    <path d="M490,155 Q510,140 530,155 Q550,170 570,155" stroke="#409EFF" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M485,175 Q510,160 530,175 Q550,190 575,175" stroke="#409EFF" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M495,195 Q515,185 530,195 Q545,205 565,195" stroke="#409EFF" stroke-width="2.5" fill="none" opacity="0.6"/>
    <!-- 大脑中间分割 -->
    <line x1="530" y1="120" x2="530" y2="220" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <!-- 神经元点 -->
    <circle cx="505" cy="150" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="555" cy="160" r="3" fill="#409EFF" opacity="0.4"/>
    <circle cx="515" cy="200" r="3.5" fill="#409EFF" opacity="0.4"/>
    <circle cx="550" cy="195" r="3" fill="#409EFF" opacity="0.4"/>
  </g>

  <!-- 大脑标注 -->
  <text x="530" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">大语言模型</text>
  <text x="530" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">（LLM）</text>

  <!-- LoRA 适配器（发光的蓝色拼图块） -->
  <g filter="url(#glow)">
    <!-- 拼图块主体 -->
    <rect x="610" y="155" width="40" height="40" rx="6" fill="#409EFF"/>
    <!-- 拼图凸起（右） -->
    <circle cx="650" cy="175" r="10" fill="#409EFF"/>
    <!-- 拼图凸起（下） -->
    <circle cx="630" cy="195" r="10" fill="#409EFF"/>
    <!-- 拼图凹槽（左） -->
    <rect x="606" y="168" width="8" height="14" rx="4" fill="url(#bgGrad)"/>
    <!-- 拼图块上的 L 字母 -->
    <text x="630" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">L</text>
  </g>

  <!-- 连接线：适配器 → 大脑 -->
  <line x1="610" y1="175" x2="595" y2="175" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="597" cy="175" r="3" fill="#409EFF"/>

  <!-- 笔记本电脑 -->
  <g filter="url(#shadow)">
    <!-- 屏幕 -->
    <rect x="640" y="260" width="120" height="85" rx="6" fill="#1a1a2e"/>
    <rect x="646" y="266" width="108" height="73" rx="3" fill="#2A2A4E"/>
    <!-- 屏幕内容 - 代码行 -->
    <rect x="654" y="278" width="60" height="4" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="654" y="290" width="80" height="4" rx="2" fill="#4A9EFF" opacity="0.5"/>
    <rect x="654" y="302" width="45" height="4" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="654" y="314" width="70" height="4" rx="2" fill="#4A9EFF" opacity="0.4"/>
    <rect x="654" y="326" width="55" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
    <!-- 键盘底座 -->
    <rect x="635" y="345" width="130" height="12" rx="3" fill="#D0D5DD"/>
    <rect x="640" y="348" width="120" height="6" rx="2" fill="#E8ECF0"/>
  </g>

  <!-- 笔记本电脑标注 -->
  <text x="700" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">普通笔记本</text>
  <text x="700" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">即可运行</text>

  <!-- ===== 右侧标注 ===== -->

  <!-- 标注 1：LoRA 适配器说明 -->
  <text x="700" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">LoRA 适配器</text>

  <!-- 标注 2：轻量高效 -->
  <rect x="480" y="410" width="130" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
  <text x="545" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">轻量高效</text>

  <!-- 标注 3：低成本 -->
  <rect x="620" y="410" width="100" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
  <text x="670" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">低成本</text>

  <!-- 标注 4：人人可用 -->
  <rect x="540" y="445" width="120" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
  <text x="600" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">人人可用</text>

  <!-- ===== 底部装饰线 ===== -->
  <line x1="100" y1="485" x2="700" y2="485" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>

</svg>