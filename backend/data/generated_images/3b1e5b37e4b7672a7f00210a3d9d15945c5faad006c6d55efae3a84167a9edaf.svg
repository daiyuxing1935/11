<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0eaff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b7ed9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d44;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">辩论解决流程 — 结构化辩论</text>

  <!-- ===== 第一轮：开场陈述 ===== -->
  <rect x="30" y="52" width="460" height="28" rx="14" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="260" y="71" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">第一轮：开场陈述</text>

  <!-- 代理人 A（左） -->
  <rect x="40" y="92" width="100" height="36" rx="18" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="90" y="114" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">代理人 A</text>

  <rect x="40" y="136" width="100" height="28" rx="6" fill="#409EFF" opacity="0.2"/>
  <rect x="40" y="136" width="100" height="28" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="90" y="154" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">论点卡片 1</text>

  <rect x="40" y="172" width="100" height="28" rx="6" fill="#409EFF" opacity="0.2"/>
  <rect x="40" y="172" width="100" height="28" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="90" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">论点卡片 2</text>

  <!-- 代理人 B（右） -->
  <rect x="390" y="92" width="100" height="36" rx="18" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="440" y="114" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">代理人 B</text>

  <rect x="390" y="136" width="100" height="28" rx="6" fill="#409EFF" opacity="0.2"/>
  <rect x="390" y="136" width="100" height="28" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="440" y="154" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">论点卡片 1</text>

  <rect x="390" y="172" width="100" height="28" rx="6" fill="#409EFF" opacity="0.2"/>
  <rect x="390" y="172" width="100" height="28" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="440" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">论点卡片 2</text>

  <!-- 中间箭头 -->
  <line x1="145" y1="110" x2="385" y2="110" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="380,106 390,110 380,114" fill="#409EFF"/>
  <polygon points="150,106 140,110 150,114" fill="#409EFF"/>

  <!-- ===== 第二轮：反驳 ===== -->
  <rect x="30" y="218" width="460" height="28" rx="14" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="260" y="237" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">第二轮：反驳</text>

  <!-- 代理人 A 反驳 -->
  <rect x="40" y="258" width="100" height="36" rx="18" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="90" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">代理人 A</text>

  <!-- 批判箭头 A→B -->
  <line x1="140" y1="276" x2="380" y2="276" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ff6b6b"/>
    </marker>
  </defs>
  <text x="260" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff6b6b">批判</text>

  <!-- 代理人 B 反驳 -->
  <rect x="390" y="258" width="100" height="36" rx="18" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="440" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">代理人 B</text>

  <!-- 批判箭头 B→A -->
  <line x1="390" y1="300" x2="150" y2="300" stroke="#ff6b6b" stroke-width="2"/>
  <polygon points="155,296 145,300 155,304" fill="#ff6b6b"/>
  <text x="270" y="306" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff6b6b">批判</text>

  <!-- ===== 第三轮：总结陈词 ===== -->
  <rect x="30" y="330" width="460" height="28" rx="14" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="260" y="349" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">第三轮：总结陈词</text>

  <rect x="40" y="370" width="210" height="36" rx="18" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="145" y="392" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">代理人 A 总结</text>

  <rect x="280" y="370" width="210" height="36" rx="18" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="385" y="392" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">代理人 B 总结</text>

  <!-- 总结内容框 -->
  <rect x="40" y="414" width="210" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="145" y="432" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">最终论点摘要</text>

  <rect x="280" y="414" width="210" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="385" y="432" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">最终论点摘要</text>

  <!-- ===== 裁判（底部） ===== -->
  <rect x="130" y="456" width="260" height="34" rx="17" fill="url(#darkGrad)" filter="url(#shadow)"/>
  <text x="260" y="477" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">⚖ 裁判 — 最终裁决</text>

  <!-- 连接到裁判的线条 -->
  <line x1="145" y1="442" x2="200" y2="456" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="385" y1="442" x2="320" y2="456" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== 右侧收益列表 ===== -->
  <rect x="520" y="52" width="250" height="440" rx="12" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="52" width="250" height="36" rx="12" fill="#409EFF"/>
  <rect x="520" y="74" width="250" height="14" fill="#409EFF"/>
  <text x="645" y="75" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">辩论收益</text>

  <!-- 收益项 1 -->
  <circle cx="560" cy="130" r="16" fill="#409EFF" opacity="0.15"/>
  <text x="560" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">✓</text>
  <text x="590" y="135" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">深度探究</text>
  <text x="590" y="155" font-family="sans-serif" font-size="11" fill="#666">多角度分析问题</text>

  <!-- 收益项 2 -->
  <circle cx="560" cy="220" r="16" fill="#409EFF" opacity="0.15"/>
  <text x="560" y="225" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">✓</text>
  <text x="590" y="225" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">弱点暴露</text>
  <text x="590" y="245" font-family="sans-serif" font-size="11" fill="#666">发现论证薄弱环节</text>

  <!-- 收益项 3 -->
  <circle cx="560" cy="310" r="16" fill="#409EFF" opacity="0.15"/>
  <text x="560" y="315" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">✓</text>
  <text x="590" y="315" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">增强自信</text>
  <text x="590" y="335" font-family="sans-serif" font-size="11" fill="#666">提升辩论表达能力</text>

  <!-- 装饰性连接线 -->
  <line x1="560" y1="146" x2="560" y2="204" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="560" y1="236" x2="560" y2="294" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- 底部装饰 -->
  <rect x="540" y="420" width="210" height="1" fill="#409EFF" opacity="0.3"/>
  <text x="645" y="440" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">结构化辩论框架</text>

  <!-- 轮次之间的连接箭头 -->
  <line x1="260" y1="80" x2="260" y2="218" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="256,213 260,223 264,213" fill="#409EFF" opacity="0.5"/>

  <line x1="260" y1="246" x2="260" y2="330" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="256,325 260,335 264,325" fill="#409EFF" opacity="0.5"/>

</svg>