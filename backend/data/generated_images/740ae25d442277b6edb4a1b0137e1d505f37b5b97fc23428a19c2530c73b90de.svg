<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="fogGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 决策方式对比：传统规则 vs 大语言模型</text>

  <!-- ===== 左侧：传统 if-else 决策树 ===== -->
  <rect x="40" y="60" width="340" height="420" rx="12" fill="url(#boxGrad1)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="210" y="88" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">传统 if-else 决策</text>

  <!-- 决策节点 -->
  <rect x="155" y="110" width="110" height="40" rx="20" fill="#409EFF" opacity="0.9"/>
  <text x="210" y="136" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">输入条件</text>

  <!-- 分支线 -->
  <line x1="210" y1="150" x2="210" y2="170" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="210" y1="170" x2="100" y2="210" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="210" y1="170" x2="320" y2="210" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 分支节点 -->
  <rect x="50" y="210" width="100" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="100" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">条件 A</text>

  <rect x="270" y="210" width="100" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="320" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">条件 B</text>

  <!-- 更多分支 -->
  <line x1="100" y1="246" x2="100" y2="270" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="100" y1="270" x2="60" y2="300" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="100" y1="270" x2="140" y2="300" stroke="#1a1a2e" stroke-width="1.2"/>

  <line x1="320" y1="246" x2="320" y2="270" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="320" y1="270" x2="280" y2="300" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="320" y1="270" x2="360" y2="300" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 叶子节点 -->
  <rect x="20" y="300" width="80" height="32" rx="4" fill="#F0F0F0" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">固定输出 1</text>

  <rect x="100" y="300" width="80" height="32" rx="4" fill="#F0F0F0" stroke="#ccc" stroke-width="1"/>
  <text x="140" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">固定输出 2</text>

  <rect x="240" y="300" width="80" height="32" rx="4" fill="#F0F0F0" stroke="#ccc" stroke-width="1"/>
  <text x="280" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">固定输出 3</text>

  <rect x="320" y="300" width="80" height="32" rx="4" fill="#F0F0F0" stroke="#ccc" stroke-width="1"/>
  <text x="360" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">固定输出 4</text>

  <!-- 限制标注 -->
  <text x="210" y="375" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#E6A23C">✗ 分支数量固定</text>
  <text x="210" y="398" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#E6A23C">✗ 无法处理未知情况</text>
  <text x="210" y="421" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#E6A23C">✗ 规则僵化</text>

  <!-- ===== 右侧：LLM 灵活决策 ===== -->
  <rect x="420" y="60" width="340" height="420" rx="12" fill="url(#boxGrad2)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="590" y="88" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LLM 大语言模型决策</text>

  <!-- AI 智能体 -->
  <circle cx="590" cy="140" r="28" fill="#409EFF" opacity="0.12"/>
  <rect x="568" y="118" width="44" height="44" rx="22" fill="#409EFF"/>
  <text x="590" y="146" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#fff" font-weight="bold">AI</text>

  <!-- 问号 -->
  <text x="590" y="185" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#409EFF" font-weight="bold">?</text>

  <!-- 路径发散 -->
  <line x1="590" y1="195" x2="590" y2="210" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 多条路径 -->
  <line x1="590" y1="210" x2="480" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="210" x2="530" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="210" x2="590" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="210" x2="650" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="210" x2="700" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 工具图标 -->
  <!-- 搜索 -->
  <rect x="450" y="260" width="60" height="36" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="480" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">🔍 搜索</text>

  <!-- 计算 -->
  <rect x="500" y="260" width="60" height="36" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="530" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">📊 计算</text>

  <!-- 阅读 -->
  <rect x="560" y="260" width="60" height="36" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="590" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">📖 阅读</text>

  <!-- 推理 -->
  <rect x="620" y="260" width="60" height="36" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="650" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">🧠 推理</text>

  <!-- 回答 -->
  <rect x="670" y="260" width="60" height="36" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="700" y="283" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">💬 回答</text>

  <!-- 路径上的雾/云 -->
  <ellipse cx="480" cy="248" rx="20" ry="8" fill="#409EFF" opacity="0.08"/>
  <ellipse cx="530" cy="245" rx="18" ry="7" fill="#409EFF" opacity="0.06"/>
  <ellipse cx="590" cy="242" rx="22" ry="8" fill="#409EFF" opacity="0.07"/>
  <ellipse cx="650" cy="245" rx="18" ry="7" fill="#409EFF" opacity="0.06"/>
  <ellipse cx="700" cy="248" rx="20" ry="8" fill="#409EFF" opacity="0.08"/>

  <!-- 不确定性标注 -->
  <text x="590" y="320" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#909399" font-style="italic">不确定性 / 模糊</text>

  <!-- 动态路径继续发散 -->
  <line x1="480" y1="296" x2="465" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="480" y1="296" x2="495" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="530" y1="296" x2="515" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="530" y1="296" x2="545" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="590" y1="296" x2="575" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="590" y1="296" x2="605" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="650" y1="296" x2="635" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="650" y1="296" x2="665" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="700" y1="296" x2="685" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="700" y1="296" x2="715" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- 灵活输出 -->
  <rect x="435" y="340" width="60" height="28" rx="14" fill="#409EFF" opacity="0.08"/>
  <text x="465" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">灵活输出</text>

  <rect x="495" y="340" width="60" height="28" rx="14" fill="#409EFF" opacity="0.08"/>
  <text x="525" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">灵活输出</text>

  <rect x="555" y="340" width="60" height="28" rx="14" fill="#409EFF" opacity="0.08"/>
  <text x="585" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">灵活输出</text>

  <rect x="615" y="340" width="60" height="28" rx="14" fill="#409EFF" opacity="0.08"/>
  <text x="645" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">灵活输出</text>

  <rect x="675" y="340" width="60" height="28" rx="14" fill="#409EFF" opacity="0.08"/>
  <text x="705" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">灵活输出</text>

  <!-- 优势标注 -->
  <text x="590" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#67C23A">✓ 动态分支</text>
  <text x="590" y="418" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#67C23A">✓ 适应未知情况</text>
  <text x="590" y="441" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#67C23A">✓ 灵活推理</text>

  <!-- 底部装饰线 -->
  <line x1="40" y1="475" x2="760" y2="475" stroke="#409EFF" stroke-width="0.5" opacity="0.2"/>
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#909399">扁平化 2D 矢量插图 · 教育用途 · 科技蓝 #409EFF</text>
</svg>