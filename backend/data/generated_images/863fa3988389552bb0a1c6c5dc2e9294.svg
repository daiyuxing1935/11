<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 智能体核心能力循环</text>

  <!-- 连接四个象限的循环箭头 -->
  <!-- 顶部到右侧（感知→推理） -->
  <path d="M 500 120 Q 590 120 590 160 Q 590 200 560 220" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#arrowTop)"/>
  <!-- 右侧到底部（推理→规划） -->
  <path d="M 620 300 Q 620 390 580 400 Q 540 410 510 400" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#arrowRight)"/>
  <!-- 底部到左侧（规划→行动） -->
  <path d="M 300 400 Q 260 410 220 400 Q 180 390 180 340 Q 180 290 210 270" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#arrowBottom)"/>
  <!-- 左侧到顶部（行动→感知） -->
  <path d="M 180 220 Q 150 200 150 160 Q 150 120 210 110 Q 270 100 310 110" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#arrowLeft)"/>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowTop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowBottom" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowLeft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 象限 1：感知（左上） -->
  <g filter="url(#shadow)">
    <rect x="100" y="80" width="220" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 眼睛图标 -->
    <g transform="translate(160, 115)">
      <ellipse cx="0" cy="0" rx="22" ry="14" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="7" fill="#409EFF"/>
      <!-- 进入的波浪/信号 -->
      <path d="M -45 -5 Q -38 -15 -30 -5 Q -22 5 -15 -5" stroke="#409EFF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M -35 8 Q -28 -2 -20 8 Q -12 18 -5 8" stroke="#409EFF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M -50 2 Q -43 -8 -35 2 Q -27 12 -20 2" stroke="#409EFF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </g>
    <text x="210" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">感知</text>
    <text x="210" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Perception</text>
    <text x="210" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">信息接收与理解</text>
  </g>

  <!-- 象限 2：推理（右上） -->
  <g filter="url(#shadow)">
    <rect x="480" y="80" width="220" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 大脑图标 -->
    <g transform="translate(540, 115)">
      <ellipse cx="0" cy="-5" rx="20" ry="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <ellipse cx="-8" cy="2" rx="10" ry="8" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <ellipse cx="8" cy="2" rx="10" ry="8" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <path d="M -12 -10 Q 0 -18 12 -10" stroke="#409EFF" stroke-width="2" fill="none"/>
      <!-- 思维气泡 -->
      <circle cx="28" cy="-18" r="5" fill="#409EFF" opacity="0.3"/>
      <circle cx="36" cy="-26" r="7" fill="#409EFF" opacity="0.2"/>
      <text x="34" y="-23" text-anchor="middle" font-size="10" fill="#1a1a2e">∀</text>
      <circle cx="-28" cy="-18" r="5" fill="#409EFF" opacity="0.3"/>
      <circle cx="-36" cy="-26" r="7" fill="#409EFF" opacity="0.2"/>
      <text x="-38" y="-23" text-anchor="middle" font-size="10" fill="#1a1a2e">∃</text>
    </g>
    <text x="590" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">推理</text>
    <text x="590" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Reasoning</text>
    <text x="590" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">逻辑分析与决策</text>
  </g>

  <!-- 象限 3：规划（右下） -->
  <g filter="url(#shadow)">
    <rect x="480" y="260" width="220" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 路线图/树图标 -->
    <g transform="translate(540, 300)">
      <!-- 目标（顶部） -->
      <circle cx="0" cy="-20" r="8" fill="#409EFF"/>
      <text x="0" y="-17" text-anchor="middle" font-size="9" fill="white">目</text>
      <!-- 分支 -->
      <path d="M 0 -12 L -18 8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 0 -12 L 18 8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 0 -12 L 0 8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <!-- 子步骤 -->
      <circle cx="-18" cy="12" r="6" fill="none" stroke="#409EFF" stroke-width="1.8"/>
      <circle cx="18" cy="12" r="6" fill="none" stroke="#409EFF" stroke-width="1.8"/>
      <circle cx="0" cy="12" r="6" fill="none" stroke="#409EFF" stroke-width="1.8"/>
      <text x="-18" y="15" text-anchor="middle" font-size="7" fill="#409EFF">1</text>
      <text x="18" y="15" text-anchor="middle" font-size="7" fill="#409EFF">2</text>
      <text x="0" y="15" text-anchor="middle" font-size="7" fill="#409EFF">3</text>
      <!-- 更多子步骤 -->
      <path d="M -18 18 L -28 30" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 18 18 L 28 30" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="-28" cy="34" r="4" fill="#409EFF" opacity="0.4"/>
      <circle cx="28" cy="34" r="4" fill="#409EFF" opacity="0.4"/>
    </g>
    <text x="590" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">规划</text>
    <text x="590" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Planning</text>
    <text x="590" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">目标分解与路径</text>
  </g>

  <!-- 象限 4：行动（左下） -->
  <g filter="url(#shadow)">
    <rect x="100" y="260" width="220" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 齿轮/手图标 -->
    <g transform="translate(160, 300)">
      <!-- 齿轮 -->
      <circle cx="0" cy="0" r="14" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="7" fill="#409EFF"/>
      <!-- 齿轮齿 -->
      <rect x="-3" y="-19" width="6" height="10" rx="2" fill="#409EFF"/>
      <rect x="-3" y="9" width="6" height="10" rx="2" fill="#409EFF"/>
      <rect x="-19" y="-3" width="10" height="6" rx="2" fill="#409EFF"/>
      <rect x="9" y="-3" width="10" height="6" rx="2" fill="#409EFF"/>
      <rect x="11" y="-15" width="6" height="10" rx="2" fill="#409EFF" transform="rotate(45 14 -10)"/>
      <rect x="-17" y="-15" width="6" height="10" rx="2" fill="#409EFF" transform="rotate(-45 -14 -10)"/>
      <rect x="11" y="5" width="6" height="10" rx="2" fill="#409EFF" transform="rotate(-45 14 10)"/>
      <rect x="-17" y="5" width="6" height="10" rx="2" fill="#409EFF" transform="rotate(45 -14 10)"/>
      <!-- 向外辐射的工具 -->
      <path d="M 30 -18 L 42 -28" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 35 -5 L 50 -5" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 30 10 L 42 20" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M -30 -18 L -42 -28" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M -35 -5 L -50 -5" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M -30 10 L -42 20" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
      <!-- 工具图标 -->
      <rect x="40" y="-32" width="6" height="6" rx="1" fill="#409EFF" opacity="0.5"/>
      <circle cx="50" cy="-5" r="3" fill="#409EFF" opacity="0.5"/>
      <rect x="40" y="18" width="6" height="6" rx="1" fill="#409EFF" opacity="0.5"/>
    </g>
    <text x="210" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">行动</text>
    <text x="210" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Action</text>
    <text x="210" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">执行与工具调用</text>
  </g>

  <!-- 中心装饰：循环箭头 -->
  <g transform="translate(400, 250)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="4 6" opacity="0.3"/>
    <circle cx="0" cy="0" r="18" fill="#409EFF" opacity="0.08"/>
    <path d="M -8 -8 L 0 0 L -8 8" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    <path d="M 8 -8 L 0 0 L 8 8" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- 象限之间的标签 -->
  <text x="395" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">→</text>
  <text x="395" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">←</text>
  <text x="463" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">↓</text>
  <text x="337" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">↑</text>

  <!-- 底部说明 -->
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#999">四种核心能力形成持续循环，驱动智能体自主运行</text>
</svg>