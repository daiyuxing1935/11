<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f2fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b8ee0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#c0d8f0" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 智能体核心能力循环</text>

  <!-- 循环箭头 - 外圈弧形连接线 -->
  <!-- 顶部连接（感知→推理） -->
  <path d="M 495 145 Q 560 95 560 145" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowTop)"/>
  <!-- 右侧连接（推理→规划） -->
  <path d="M 655 250 Q 705 315 655 315" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowRight)"/>
  <!-- 底部连接（规划→行动） -->
  <path d="M 495 355 Q 560 405 560 355" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowBottom)"/>
  <!-- 左侧连接（行动→感知） -->
  <path d="M 145 315 Q 95 250 145 250" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowLeft)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowTop" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowBottom" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 中央圆环 -->
  <circle cx="400" cy="250" r="38" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="250" r="28" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.2"/>
  <text x="400" y="246" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF" opacity="0.6">循环</text>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF" opacity="0.6">迭代</text>

  <!-- ===== 象限1：感知（左上） ===== -->
  <g filter="url(#shadow)">
    <rect x="105" y="95" width="200" height="155" rx="14" fill="white" stroke="#409EFF" stroke-width="2"/>
  </g>
  <!-- 图标：眼睛 -->
  <g transform="translate(155, 125)">
    <ellipse cx="50" cy="25" rx="28" ry="18" fill="none" stroke="url(#iconGrad)" stroke-width="2.8"/>
    <circle cx="50" cy="25" r="8" fill="#409EFF" opacity="0.6"/>
    <circle cx="50" cy="25" r="4" fill="#409EFF"/>
    <!-- 信号波纹 -->
    <path d="M 10 10 Q 5 25 10 40" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 5 5 Q -2 25 5 45" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M 90 10 Q 95 25 90 40" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 95 5 Q 102 25 95 45" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>
  <!-- 标签 -->
  <rect x="145" y="195" width="120" height="40" rx="8" fill="#1a1a2e"/>
  <text x="205" y="221" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="white">感知能力</text>

  <!-- ===== 象限2：推理（右上） ===== -->
  <g filter="url(#shadow)">
    <rect x="495" y="95" width="200" height="155" rx="14" fill="white" stroke="#409EFF" stroke-width="2"/>
  </g>
  <!-- 图标：大脑/思维 -->
  <g transform="translate(545, 115)">
    <ellipse cx="50" cy="30" rx="30" ry="22" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <ellipse cx="50" cy="30" rx="18" ry="14" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <circle cx="38" cy="25" r="5" fill="#409EFF" opacity="0.3"/>
    <circle cx="62" cy="25" r="5" fill="#409EFF" opacity="0.3"/>
    <circle cx="50" cy="38" r="4" fill="#409EFF" opacity="0.2"/>
    <!-- 思维气泡 -->
    <circle cx="85" cy="12" r="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <circle cx="92" cy="5" r="4" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
    <text x="82" y="15" font-family="Arial" font-size="9" fill="#409EFF" opacity="0.6">∧</text>
    <circle cx="18" cy="10" r="6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <text x="15" y="13" font-family="Arial" font-size="8" fill="#409EFF" opacity="0.5">∨</text>
  </g>
  <!-- 标签 -->
  <rect x="535" y="195" width="120" height="40" rx="8" fill="#1a1a2e"/>
  <text x="595" y="221" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="white">推理能力</text>

  <!-- ===== 象限3：规划（右下） ===== -->
  <g filter="url(#shadow)">
    <rect x="495" y="250" width="200" height="155" rx="14" fill="white" stroke="#409EFF" stroke-width="2"/>
  </g>
  <!-- 图标：路线图/树 -->
  <g transform="translate(545, 275)">
    <!-- 目标节点 -->
    <circle cx="50" cy="10" r="10" fill="#409EFF" opacity="0.2"/>
    <circle cx="50" cy="10" r="5" fill="#409EFF"/>
    <!-- 分支 -->
    <line x1="50" y1="20" x2="30" y2="45" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="50" y1="20" x2="70" y2="45" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="50" y1="20" x2="50" y2="48" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 子步骤 -->
    <circle cx="30" cy="50" r="6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <circle cx="70" cy="50" r="6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <circle cx="50" cy="54" r="6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="56" x2="22" y2="70" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
    <line x1="70" y1="56" x2="78" y2="70" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- 标签 -->
  <rect x="535" y="350" width="120" height="40" rx="8" fill="#1a1a2e"/>
  <text x="595" y="376" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="white">规划能力</text>

  <!-- ===== 象限4：行动（左下） ===== -->
  <g filter="url(#shadow)">
    <rect x="105" y="250" width="200" height="155" rx="14" fill="white" stroke="#409EFF" stroke-width="2"/>
  </g>
  <!-- 图标：齿轮/手 -->
  <g transform="translate(155, 272)">
    <!-- 齿轮 -->
    <circle cx="50" cy="28" r="18" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <circle cx="50" cy="28" r="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <!-- 齿轮齿 -->
    <rect x="47" y="6" width="6" height="8" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="47" y="42" width="6" height="8" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="28" y="25" width="8" height="6" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="64" y="25" width="8" height="6" rx="2" fill="#409EFF" opacity="0.5"/>
    <!-- 向外辐射的工具图标 -->
    <line x1="30" y1="10" x2="15" y2="0" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="70" y1="10" x2="85" y2="0" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="28" x2="0" y2="28" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="85" y1="28" x2="100" y2="28" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- 标签 -->
  <rect x="145" y="350" width="120" height="40" rx="8" fill="#1a1a2e"/>
  <text x="205" y="376" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="white">行动能力</text>

  <!-- 四角连接标签 -->
  <text x="490" y="88" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#409EFF" opacity="0.7">输入</text>
  <text x="702" y="250" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#409EFF" opacity="0.7">分析</text>
  <text x="490" y="412" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#409EFF" opacity="0.7">执行</text>
  <text x="98" y="250" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#409EFF" opacity="0.7">反馈</text>

  <!-- 底部说明 -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">四象限循环：感知 → 推理 → 规划 → 行动 → 感知</text>
</svg>