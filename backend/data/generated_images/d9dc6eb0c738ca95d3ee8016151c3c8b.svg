<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EAF7"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6AB7FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">管理者-工作者 协作模式</text>

  <!-- ==================== 面板 1：层级模式 ==================== -->
  <rect x="20" y="50" width="245" height="195" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="20" y="50" width="245" height="28" rx="10" fill="#409EFF"/>
  <rect x="20" y="68" width="245" height="10" fill="#409EFF"/>
  <text x="142" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">层级模式</text>

  <!-- 层级 1：顶级管理者 -->
  <rect x="80" y="88" width="125" height="28" rx="14" fill="url(#blueGrad)"/>
  <text x="142" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">顶级管理者</text>

  <!-- 连线：顶级 → 子管理者 -->
  <line x1="142" y1="116" x2="142" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="142" y1="130" x2="52" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="142" y1="130" x2="142" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="142" y1="130" x2="232" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="52" y1="130" x2="52" y2="140" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="142" y1="130" x2="142" y2="140" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="232" y1="130" x2="232" y2="140" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 层级 2：子管理者 A/B/C -->
  <rect x="20" y="140" width="65" height="26" rx="13" fill="url(#lightBlueGrad)"/>
  <text x="52" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">管理者A</text>

  <rect x="110" y="140" width="65" height="26" rx="13" fill="url(#lightBlueGrad)"/>
  <text x="142" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">管理者B</text>

  <rect x="200" y="140" width="65" height="26" rx="13" fill="url(#lightBlueGrad)"/>
  <text x="232" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">管理者C</text>

  <!-- 连线：子管理者 → 工作者 -->
  <line x1="52" y1="166" x2="52" y2="178" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="142" y1="166" x2="142" y2="178" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="232" y1="166" x2="232" y2="178" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 层级 3：工作者 -->
  <rect x="20" y="178" width="65" height="26" rx="13" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="52" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">工作者</text>

  <rect x="110" y="178" width="65" height="26" rx="13" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="142" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">工作者</text>

  <rect x="200" y="178" width="65" height="26" rx="13" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="232" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">工作者</text>

  <!-- 标注 -->
  <text x="142" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-style="italic">三级树形结构</text>

  <!-- ==================== 面板 2：审核模式 ==================== -->
  <rect x="277" y="50" width="245" height="195" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="277" y="50" width="245" height="28" rx="10" fill="#409EFF"/>
  <rect x="277" y="68" width="245" height="10" fill="#409EFF"/>
  <text x="399" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">审核模式</text>

  <!-- 管理者 -->
  <rect x="355" y="88" width="90" height="28" rx="14" fill="url(#blueGrad)"/>
  <text x="400" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">管理者</text>

  <!-- 连线：管理者 → 工作者 -->
  <line x1="400" y1="116" x2="400" y2="136" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 工作者 -->
  <rect x="355" y="136" width="90" height="28" rx="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">工作者</text>

  <!-- 连线：工作者 → 审核者 -->
  <line x1="400" y1="164" x2="400" y2="178" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 审核者 -->
  <rect x="345" y="178" width="110" height="28" rx="14" fill="url(#lightBlueGrad)"/>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">审核者</text>

  <!-- 审核标记：通过 ✓ / 拒绝 ✗ -->
  <circle cx="470" cy="192" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="470" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">✓</text>

  <circle cx="330" cy="192" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="330" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">✗</text>

  <!-- 回路箭头：退回工作者 -->
  <path d="M330 192 L310 192 L310 150 L355 150" fill="none" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="300" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">退回</text>

  <!-- 回路箭头：通过 → 管理者 -->
  <path d="M470 192 L490 192 L490 102 L445 102" fill="none" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="500" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">通过</text>

  <!-- 标注 -->
  <text x="399" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-style="italic">审核通过/退回</text>

  <!-- ==================== 面板 3：轮值模式 ==================== -->
  <rect x="534" y="50" width="245" height="195" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="534" y="50" width="245" height="28" rx="10" fill="#409EFF"/>
  <rect x="534" y="68" width="245" height="10" fill="#409EFF"/>
  <text x="656" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">轮值模式</text>

  <!-- 圆形布局 -->
  <!-- 中心圆 -->
  <circle cx="656" cy="148" r="18" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="656" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">轮值</text>

  <!-- 节点 1：战略分析师（顶部） -->
  <rect x="606" y="88" width="100" height="26" rx="13" fill="url(#blueGrad)"/>
  <text x="656" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">战略分析师</text>

  <!-- 节点 2：技术负责人（右下） -->
  <rect x="676" y="160" width="100" height="26" rx="13" fill="url(#lightBlueGrad)"/>
  <text x="726" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">技术负责人</text>

  <!-- 节点 3：编辑（左下） -->
  <rect x="536" y="160" width="100" height="26" rx="13" fill="url(#lightBlueGrad)"/>
  <text x="586" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">编辑</text>

  <!-- 旋转箭头 1→2 -->
  <path d="M700 108 Q740 130 730 160" fill="none" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="740" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">转</text>

  <!-- 旋转箭头 2→3 -->
  <path d="M680 180 Q656 190 636 180" fill="none" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="656" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">转</text>

  <!-- 旋转箭头 3→1 -->
  <path d="M590 155 Q570 130 600 108" fill="none" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="570" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">转</text>

  <!-- 标注 -->
  <text x="656" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-style="italic">角色轮换</text>

  <!-- ==================== 底部说明 ==================== -->
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">三种常见的管理者-工作者协作模式</text>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#409EFF"/>
    </marker>
  </defs>

</svg>