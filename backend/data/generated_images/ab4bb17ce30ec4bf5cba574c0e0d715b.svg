<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">思维树应用场景</text>

  <!-- 2x2 网格卡片 -->
  <!-- 卡片 1：数学与逻辑（左上） -->
  <g>
    <rect x="40" y="70" width="340" height="180" rx="16" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 小树图 -->
    <g transform="translate(290, 90)" stroke="#409EFF" stroke-width="1.8" fill="none">
      <line x1="0" y1="0" x2="-12" y2="20"/>
      <line x1="0" y1="0" x2="12" y2="20"/>
      <line x1="-12" y1="20" x2="-20" y2="40"/>
      <line x1="-12" y1="20" x2="-4" y2="40"/>
      <line x1="12" y1="20" x2="4" y2="40"/>
      <line x1="12" y1="20" x2="20" y2="40"/>
      <circle cx="0" cy="0" r="4" fill="#409EFF"/>
      <circle cx="-12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="-20" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="-4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="20" cy="40" r="2.5" fill="#409EFF"/>
    </g>
    <!-- 图标：根号+对勾 -->
    <g transform="translate(70, 110)">
      <text font-family="sans-serif" font-size="48" fill="#409EFF" font-weight="bold">√</text>
      <line x1="18" y1="10" x2="18" y2="28" stroke="#409EFF" stroke-width="3.5"/>
      <polyline points="18,28 26,38 38,22" fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="130" y="145" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1a1a2e">数学与逻辑</text>
    <text x="130" y="170" font-family="sans-serif" font-size="13" fill="#555">分步推理与验证</text>
  </g>

  <!-- 卡片 2：创意写作（右上） -->
  <g>
    <rect x="420" y="70" width="340" height="180" rx="16" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 小树图 -->
    <g transform="translate(670, 90)" stroke="#409EFF" stroke-width="1.8" fill="none">
      <line x1="0" y1="0" x2="-12" y2="20"/>
      <line x1="0" y1="0" x2="12" y2="20"/>
      <line x1="-12" y1="20" x2="-20" y2="40"/>
      <line x1="-12" y1="20" x2="-4" y2="40"/>
      <line x1="12" y1="20" x2="4" y2="40"/>
      <line x1="12" y1="20" x2="20" y2="40"/>
      <circle cx="0" cy="0" r="4" fill="#409EFF"/>
      <circle cx="-12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="-20" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="-4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="20" cy="40" r="2.5" fill="#409EFF"/>
    </g>
    <!-- 图标：灯泡+故事书 -->
    <g transform="translate(450, 105)">
      <!-- 灯泡 -->
      <circle cx="20" cy="18" r="16" fill="#FFD700" opacity="0.3" stroke="#409EFF" stroke-width="2"/>
      <circle cx="20" cy="18" r="10" fill="#FFD700" opacity="0.5" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="20" y1="28" x2="20" y2="36" stroke="#409EFF" stroke-width="2"/>
      <line x1="14" y1="34" x2="26" y2="34" stroke="#409EFF" stroke-width="2"/>
      <!-- 故事书 -->
      <rect x="38" y="8" width="22" height="28" rx="2" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="49" y1="8" x2="49" y2="36" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="42" y1="16" x2="47" y2="16" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="42" y1="22" x2="47" y2="22" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="51" y1="16" x2="56" y2="16" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="51" y1="22" x2="56" y2="22" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="520" y="145" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1a1a2e">创意写作</text>
    <text x="520" y="170" font-family="sans-serif" font-size="13" fill="#555">多分支叙事生成</text>
  </g>

  <!-- 卡片 3：战略规划（左下） -->
  <g>
    <rect x="40" y="280" width="340" height="180" rx="16" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 小树图 -->
    <g transform="translate(290, 300)" stroke="#409EFF" stroke-width="1.8" fill="none">
      <line x1="0" y1="0" x2="-12" y2="20"/>
      <line x1="0" y1="0" x2="12" y2="20"/>
      <line x1="-12" y1="20" x2="-20" y2="40"/>
      <line x1="-12" y1="20" x2="-4" y2="40"/>
      <line x1="12" y1="20" x2="4" y2="40"/>
      <line x1="12" y1="20" x2="20" y2="40"/>
      <circle cx="0" cy="0" r="4" fill="#409EFF"/>
      <circle cx="-12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="-20" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="-4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="20" cy="40" r="2.5" fill="#409EFF"/>
    </g>
    <!-- 图标：地图钉+日历 -->
    <g transform="translate(65, 315)">
      <!-- 地图钉 -->
      <circle cx="22" cy="22" r="16" fill="none" stroke="#409EFF" stroke-width="2"/>
      <circle cx="22" cy="22" r="6" fill="#409EFF"/>
      <line x1="22" y1="38" x2="22" y2="52" stroke="#409EFF" stroke-width="2.5"/>
      <polygon points="14,52 30,52 22,60" fill="#409EFF"/>
      <!-- 日历 -->
      <rect x="44" y="6" width="28" height="30" rx="3" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="44" y1="16" x2="72" y2="16" stroke="#409EFF" stroke-width="2"/>
      <line x1="50" y1="2" x2="50" y2="10" stroke="#409EFF" stroke-width="2"/>
      <line x1="66" y1="2" x2="66" y2="10" stroke="#409EFF" stroke-width="2"/>
      <text x="52" y="32" font-family="sans-serif" font-size="10" fill="#409EFF" font-weight="bold">17</text>
    </g>
    <text x="130" y="355" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1a1a2e">战略规划</text>
    <text x="130" y="380" font-family="sans-serif" font-size="13" fill="#555">多方案决策树</text>
  </g>

  <!-- 卡片 4：代码调试（右下） -->
  <g>
    <rect x="420" y="280" width="340" height="180" rx="16" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 小树图 -->
    <g transform="translate(670, 300)" stroke="#409EFF" stroke-width="1.8" fill="none">
      <line x1="0" y1="0" x2="-12" y2="20"/>
      <line x1="0" y1="0" x2="12" y2="20"/>
      <line x1="-12" y1="20" x2="-20" y2="40"/>
      <line x1="-12" y1="20" x2="-4" y2="40"/>
      <line x1="12" y1="20" x2="4" y2="40"/>
      <line x1="12" y1="20" x2="20" y2="40"/>
      <circle cx="0" cy="0" r="4" fill="#409EFF"/>
      <circle cx="-12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="12" cy="20" r="3" fill="#409EFF"/>
      <circle cx="-20" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="-4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="4" cy="40" r="2.5" fill="#409EFF"/>
      <circle cx="20" cy="40" r="2.5" fill="#409EFF"/>
    </g>
    <!-- 图标：bug + 放大镜 -->
    <g transform="translate(450, 312)">
      <!-- bug -->
      <ellipse cx="20" cy="22" rx="12" ry="10" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="8" y1="16" x2="2" y2="10" stroke="#409EFF" stroke-width="2"/>
      <line x1="32" y1="16" x2="38" y2="10" stroke="#409EFF" stroke-width="2"/>
      <line x1="8" y1="28" x2="2" y2="34" stroke="#409EFF" stroke-width="2"/>
      <line x1="32" y1="28" x2="38" y2="34" stroke="#409EFF" stroke-width="2"/>
      <circle cx="16" cy="20" r="2" fill="#409EFF"/>
      <circle cx="24" cy="20" r="2" fill="#409EFF"/>
      <!-- 放大镜 -->
      <circle cx="52" cy="18" r="12" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <line x1="60" y1="28" x2="70" y2="38" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="520" y="355" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1a1a2e">代码调试</text>
    <text x="520" y="380" font-family="sans-serif" font-size="13" fill="#555">错误路径回溯</text>
  </g>

  <!-- 底部标注 -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">思维树 · 多路径探索框架</text>
</svg>