<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7EC1FF"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#90CCFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">示范教学 · Teaching by Example</text>

  <!-- ===== 左侧：教师 ===== -->
  <!-- 教师身体 -->
  <rect x="95" y="140" width="100" height="130" rx="20" fill="#409EFF" opacity="0.12"/>
  <!-- 教师头部 -->
  <circle cx="145" cy="110" r="32" fill="#409EFF" opacity="0.2"/>
  <circle cx="145" cy="110" r="28" fill="#409EFF" opacity="0.35"/>
  <!-- 教师眼镜 -->
  <rect x="128" y="103" width="14" height="10" rx="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="148" y="103" width="14" height="10" rx="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="142" y1="108" x2="148" y2="108" stroke="#1a1a2e" stroke-width="1.2"/>
  <!-- 教师微笑 -->
  <path d="M135 120 Q145 128 155 120" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 教师身体轮廓 -->
  <rect x="115" y="145" width="60" height="80" rx="12" fill="#409EFF" opacity="0.15"/>
  <rect x="115" y="145" width="60" height="80" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 教师手臂 - 举着卡片 -->
  <line x1="155" y1="170" x2="200" y2="150" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="135" y1="170" x2="175" y2="155" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 教师标签 -->
  <rect x="110" y="240" width="70" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="145" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">教师</text>

  <!-- ===== 示例卡片（教师手中） ===== -->
  <!-- 卡片1 -->
  <g filter="url(#shadow)">
    <rect x="195" y="100" width="72" height="52" rx="8" fill="white" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="195" y="100" width="72" height="16" rx="8" fill="#409EFF" opacity="0.15"/>
    <text x="207" y="113" font-family="monospace" font-size="11" fill="#1a1a2e" font-weight="bold">输入 A</text>
    <text x="207" y="132" font-family="monospace" font-size="11" fill="#409EFF" font-weight="bold">→ 输出 1</text>
  </g>

  <!-- 卡片2 -->
  <g filter="url(#shadow)">
    <rect x="205" y="140" width="72" height="52" rx="8" fill="white" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="205" y="140" width="72" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
    <text x="217" y="153" font-family="monospace" font-size="11" fill="#1a1a2e" font-weight="bold">输入 B</text>
    <text x="217" y="172" font-family="monospace" font-size="11" fill="#409EFF" font-weight="bold">→ 输出 2</text>
  </g>

  <!-- 卡片3 -->
  <g filter="url(#shadow)">
    <rect x="195" y="180" width="72" height="52" rx="8" fill="white" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="195" y="180" width="72" height="16" rx="8" fill="#409EFF" opacity="0.10"/>
    <text x="207" y="193" font-family="monospace" font-size="11" fill="#1a1a2e" font-weight="bold">输入 C</text>
    <text x="207" y="212" font-family="monospace" font-size="11" fill="#409EFF" font-weight="bold">→ 输出 3</text>
  </g>

  <!-- 卡片标注 -->
  <text x="231" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">示例</text>

  <!-- ===== 中间：箭头和标注 ===== -->
  <!-- 虚线箭头 -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>
  <line x1="280" y1="220" x2="440" y2="220" stroke="#409EFF" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowBlue)" opacity="0.7"/>

  <!-- 箭头标签背景 -->
  <rect x="310" y="230" width="100" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="360" y="247" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">模仿学习</text>
  <text x="360" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">Learning by Example</text>

  <!-- ===== 右侧：AI机器人 ===== -->
  <!-- 机器人身体 -->
  <rect x="510" y="145" width="100" height="120" rx="20" fill="#409EFF" opacity="0.08"/>
  <!-- 机器人头部 -->
  <rect x="525" y="85" width="70" height="55" rx="12" fill="#409EFF" opacity="0.15"/>
  <rect x="525" y="85" width="70" height="55" rx="12" fill="none" stroke="#409EFF" stroke-width="1.8"/>
  <!-- 机器人眼睛 -->
  <circle cx="548" cy="108" r="6" fill="#409EFF" opacity="0.5"/>
  <circle cx="572" cy="108" r="6" fill="#409EFF" opacity="0.5"/>
  <circle cx="548" cy="108" r="3" fill="#409EFF"/>
  <circle cx="572" cy="108" r="3" fill="#409EFF"/>
  <!-- 机器人天线 -->
  <line x1="560" y1="85" x2="560" y2="68" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="560" cy="64" r="5" fill="#409EFF" opacity="0.4"/>
  <circle cx="560" cy="64" r="3" fill="#409EFF" opacity="0.6"/>

  <!-- 灯泡图标 -->
  <g transform="translate(560, 42)">
    <path d="M-10,2 Q-10,-8 0,-12 Q10,-8 10,2 Q10,8 5,12 L-5,12 Q-10,8 -10,2 Z" fill="#FFD700" opacity="0.9"/>
    <rect x="-3" y="13" width="6" height="3" rx="1" fill="#FFD700" opacity="0.7"/>
    <rect x="-2" y="17" width="4" height="2" rx="1" fill="#FFD700" opacity="0.5"/>
    <!-- 光芒 -->
    <line x1="0" y1="-18" x2="0" y2="-22" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <line x1="-12" y1="-8" x2="-16" y2="-10" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="-8" x2="16" y2="-10" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- 灯泡标注 -->
  <text x="560" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">理解</text>

  <!-- 机器人身体细节 -->
  <rect x="535" y="150" width="50" height="60" rx="10" fill="#409EFF" opacity="0.1"/>
  <rect x="535" y="150" width="50" height="60" rx="10" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <!-- 机器人胸前屏幕 -->
  <rect x="542" y="158" width="36" height="20" rx="4" fill="#409EFF" opacity="0.2"/>
  <text x="560" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a1a2e">✓ 已学习</text>
  <!-- 机器人手臂 -->
  <line x1="510" y1="175" x2="490" y2="195" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="610" y1="175" x2="625" y2="195" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 机器人标签 -->
  <rect x="525" y="240" width="70" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="560" y="255" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">AI 机器人</text>

  <!-- ===== 底部装饰 ===== -->
  <!-- 底部地面线 -->
  <line x1="80" y1="380" x2="720" y2="380" stroke="#409EFF" stroke-width="1" opacity="0.15"/>

  <!-- 底部标注 - 学习成果 -->
  <g transform="translate(400, 410)">
    <rect x="-80" y="-12" width="160" height="24" rx="12" fill="#409EFF" opacity="0.08"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">观察 → 理解 → 应用</text>
  </g>

  <!-- 装饰点 -->
  <circle cx="120" cy="400" r="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="680" cy="400" r="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="400" cy="450" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="360" cy="445" r="2" fill="#409EFF" opacity="0.1"/>
  <circle cx="440" cy="445" r="2" fill="#409EFF" opacity="0.1"/>

</svg>