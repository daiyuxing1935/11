<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">松耦合四大优势</text>

  <!-- ===== 左上：即插即用 ===== -->
  <rect x="30" y="56" width="355" height="190" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="56" width="355" height="36" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">即插即用</text>

  <!-- 系统主体 -->
  <rect x="160" y="110" width="100" height="60" rx="8" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="210" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">现有系统</text>
  <text x="210" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Agent 集群</text>

  <!-- 插入箭头 -->
  <line x1="145" y1="130" x2="160" y2="130" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="260" y1="150" x2="275" y2="150" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Logger Agent 插入 -->
  <rect x="70" y="108" width="70" height="28" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="105" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Logger</text>

  <!-- Monitor Agent 插入 -->
  <rect x="280" y="138" width="70" height="28" rx="6" fill="#409EFF" opacity="0.7"/>
  <text x="315" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Monitor</text>

  <!-- 零侵入图标 -->
  <circle cx="210" cy="180" r="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="200" y1="180" x2="220" y2="180" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="210" y1="170" x2="210" y2="190" stroke="#409EFF" stroke-width="1.5"/>
  <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">零侵入</text>

  <!-- 标注 1 -->
  <rect x="55" y="222" width="80" height="18" rx="9" fill="#409EFF" opacity="0.12"/>
  <text x="95" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">无需修改</text>

  <!-- ===== 右上：动态重配 ===== -->
  <rect x="415" y="56" width="355" height="190" rx="12" fill="url(#cardGrad2)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="415" y="56" width="355" height="36" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="433" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">动态重配</text>

  <!-- 主题路由 -->
  <rect x="470" y="110" width="120" height="50" rx="8" fill="#409EFF" opacity="0.1" stroke="#409EFF" stroke-width="1"/>
  <text x="530" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">主题路由</text>
  <text x="530" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">task.*.low</text>

  <!-- 取消订阅 -->
  <rect x="440" y="170" width="80" height="24" rx="6" fill="#E74C3C" opacity="0.8"/>
  <text x="480" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">取消订阅</text>
  <line x1="480" y1="160" x2="480" y2="170" stroke="#E74C3C" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- 新订阅 -->
  <rect x="540" y="170" width="80" height="24" rx="6" fill="#67C23A" opacity="0.8"/>
  <text x="580" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">新订阅</text>
  <line x1="580" y1="160" x2="580" y2="170" stroke="#67C23A" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- 开关 -->
  <rect x="660" y="115" width="30" height="16" rx="8" fill="#409EFF"/>
  <circle cx="675" cy="123" r="6" fill="#fff"/>
  <rect x="660" y="145" width="30" height="16" rx="8" fill="#E74C3C"/>
  <circle cx="670" cy="153" r="6" fill="#fff"/>

  <text x="690" y="120" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">开</text>
  <text x="690" y="150" font-family="Arial, sans-serif" font-size="9" fill="#E74C3C">关</text>

  <!-- 标注 2 -->
  <rect x="460" y="222" width="90" height="18" rx="9" fill="#409EFF" opacity="0.12"/>
  <text x="505" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">运行时切换</text>

  <!-- ===== 左下：自然广播 ===== -->
  <rect x="30" y="266" width="355" height="190" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="266" width="355" height="36" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="48" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">自然广播</text>

  <!-- 发布者 -->
  <circle cx="120" cy="340" r="22" fill="#409EFF" opacity="0.9"/>
  <text x="120" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">发布</text>
  <text x="120" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">事件</text>

  <!-- 扇形广播 -->
  <line x1="140" y1="335" x2="210" y2="310" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="340" x2="210" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="345" x2="210" y2="370" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="348" x2="210" y2="390" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>

  <!-- 4个订阅者 -->
  <rect x="215" y="296" width="70" height="24" rx="6" fill="#409EFF" opacity="0.7"/>
  <text x="250" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">分析</text>

  <rect x="215" y="328" width="70" height="24" rx="6" fill="#409EFF" opacity="0.55"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">日志</text>

  <rect x="215" y="358" width="70" height="24" rx="6" fill="#409EFF" opacity="0.4"/>
  <text x="250" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">写入</text>

  <rect x="215" y="388" width="70" height="24" rx="6" fill="#409EFF" opacity="0.25"/>
  <text x="250" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">通知</text>

  <!-- 标注 3 -->
  <rect x="310" y="310" width="65" height="18" rx="9" fill="#409EFF" opacity="0.12"/>
  <text x="342" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">自动分发</text>

  <!-- ===== 右下：弹性容错 ===== -->
  <rect x="415" y="266" width="355" height="190" rx="12" fill="url(#cardGrad2)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="415" y="266" width="355" height="36" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="433" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">弹性容错</text>

  <!-- 发布者 -->
  <rect x="450" y="310" width="80" height="40" rx="8" fill="#409EFF" opacity="0.9"/>
  <text x="490" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">发布者</text>

  <!-- 连接线 -->
  <line x1="530" y1="320" x2="580" y2="320" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="530" y1="340" x2="580" y2="340" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- 订阅者（在线） -->
  <rect x="585" y="305" width="70" height="28" rx="6" fill="#67C23A" opacity="0.8"/>
  <text x="620" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">订阅者 A</text>

  <!-- 订阅者（离线 - 红X） -->
  <rect x="585" y="345" width="70" height="28" rx="6" fill="#E74C3C" opacity="0.5"/>
  <text x="620" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">订阅者 B</text>
  <line x1="595" y1="350" x2="645" y2="368" stroke="#E74C3C" stroke-width="2.5"/>
  <line x1="645" y1="350" x2="595" y2="368" stroke="#E74C3C" stroke-width="2.5"/>

  <!-- 回放图标 -->
  <rect x="670" y="380" width="80" height="24" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="710" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">⏪ 历史回放</text>

  <!-- 标注 4 -->
  <rect x="460" y="430" width="85" height="18" rx="9" fill="#409EFF" opacity="0.12"/>
  <text x="502" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">故障恢复</text>

  <!-- 标注 5 -->
  <rect x="555" y="430" width="90" height="18" rx="9" fill="#409EFF" opacity="0.12"/>
  <text x="600" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">不影响发布者</text>

</svg>