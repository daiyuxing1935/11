<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">7B 模型参数分布</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== 中心饼图 ===== -->
  <g transform="translate(280, 260)">
    <!-- 前馈网络层 61.4% (221°) -->
    <path d="M0,0 L0,-120 A120,120 0 0,1 113.5,-38.5 Z" fill="#409EFF" stroke="#fff" stroke-width="2"/>
    <!-- 注意力层 30.0% (108°) -->
    <path d="M0,0 L113.5,-38.5 A120,120 0 0,1 37.1,114.1 Z" fill="#6cb4ff" stroke="#fff" stroke-width="2"/>
    <!-- 词嵌入层 5.7% (20.5°) -->
    <path d="M0,0 L37.1,114.1 A120,120 0 0,1 -4.2,119.9 Z" fill="#a8d4ff" stroke="#fff" stroke-width="2"/>
    <!-- 其他 2.9% (10.5°) -->
    <path d="M0,0 L-4.2,119.9 A120,120 0 0,1 -0.7,-120 Z" fill="#d0e8ff" stroke="#fff" stroke-width="2"/>

    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="35" fill="#fff" stroke="#e0ecf5" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">7B</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">参数</text>
  </g>

  <!-- ===== 图例（饼图右侧） ===== -->
  <g transform="translate(430, 210)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#409EFF"/>
    <text x="20" y="12" font-family="sans-serif" font-size="13" fill="#1a1a2e">前馈网络层 61.4%</text>

    <rect x="0" y="26" width="14" height="14" rx="3" fill="#6cb4ff"/>
    <text x="20" y="38" font-family="sans-serif" font-size="13" fill="#1a1a2e">注意力层 30.0%</text>

    <rect x="0" y="52" width="14" height="14" rx="3" fill="#a8d4ff"/>
    <text x="20" y="64" font-family="sans-serif" font-size="13" fill="#1a1a2e">词嵌入层 5.7%</text>

    <rect x="0" y="78" width="14" height="14" rx="3" fill="#d0e8ff"/>
    <text x="20" y="90" font-family="sans-serif" font-size="13" fill="#1a1a2e">其他 2.9%</text>
  </g>

  <!-- ===== 标注卡片 ===== -->

  <!-- 卡片1: 注意力层（左上） -->
  <g transform="translate(50, 75)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="100" rx="10" fill="#fff" stroke="#e0ecf5" stroke-width="1"/>
    <!-- Q-K-V-O 矩阵图标 -->
    <g transform="translate(12, 12)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#409EFF" opacity="0.7"/>
      <rect x="12" y="0" width="10" height="10" rx="2" fill="#6cb4ff" opacity="0.7"/>
      <rect x="0" y="12" width="10" height="10" rx="2" fill="#6cb4ff" opacity="0.7"/>
      <rect x="12" y="12" width="10" height="10" rx="2" fill="#409EFF" opacity="0.7"/>
      <text x="5" y="29" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a1a2e">Q K V O</text>
    </g>
    <text x="50" y="22" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">注意力层</text>
    <text x="50" y="40" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">2.1B 参数</text>
    <text x="12" y="60" font-family="sans-serif" font-size="11" fill="#555">计算查询、键、值</text>
    <text x="12" y="76" font-family="sans-serif" font-size="11" fill="#555">与输出的注意力权重</text>
    <text x="12" y="92" font-family="sans-serif" font-size="11" fill="#555">捕捉长距离依赖关系</text>
  </g>

  <!-- 连接线1: 卡片1 → 饼图 -->
  <line x1="225" y1="125" x2="260" y2="210" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 卡片2: 前馈网络层（右上） -->
  <g transform="translate(530, 75)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="100" rx="10" fill="#fff" stroke="#e0ecf5" stroke-width="1"/>
    <!-- 层状神经网络节点图标 -->
    <g transform="translate(12, 12)">
      <circle cx="6" cy="4" r="3" fill="#409EFF"/>
      <circle cx="14" cy="4" r="3" fill="#409EFF"/>
      <circle cx="6" cy="14" r="3" fill="#6cb4ff"/>
      <circle cx="14" cy="14" r="3" fill="#6cb4ff"/>
      <line x1="6" y1="7" x2="6" y2="11" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="14" y1="7" x2="14" y2="11" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="6" y1="4" x2="14" y2="4" stroke="#409EFF" stroke-width="0.5"/>
      <line x1="6" y1="14" x2="14" y2="14" stroke="#409EFF" stroke-width="0.5"/>
    </g>
    <text x="50" y="22" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">前馈网络层</text>
    <text x="50" y="40" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">4.3B 参数</text>
    <text x="12" y="60" font-family="sans-serif" font-size="11" fill="#555">两层全连接网络</text>
    <text x="12" y="76" font-family="sans-serif" font-size="11" fill="#555">GELU 激活函数</text>
    <text x="12" y="92" font-family="sans-serif" font-size="11" fill="#555">特征变换与映射</text>
  </g>

  <!-- 连接线2: 卡片2 → 饼图 -->
  <line x1="530" y1="125" x2="370" y2="210" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 卡片3: 词嵌入层（左下） -->
  <g transform="translate(50, 320)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="95" rx="10" fill="#fff" stroke="#e0ecf5" stroke-width="1"/>
    <!-- 文本→向量图标 -->
    <g transform="translate(12, 12)">
      <text x="0" y="8" font-family="sans-serif" font-size="8" fill="#1a1a2e" font-weight="bold">文本</text>
      <line x1="22" y1="6" x2="32" y2="6" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="34" y="0" width="16" height="12" rx="2" fill="#a8d4ff"/>
      <text x="42" y="9" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a1a2e">向量</text>
    </g>
    <text x="50" y="22" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">词嵌入层</text>
    <text x="50" y="40" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">0.4B 参数</text>
    <text x="12" y="58" font-family="sans-serif" font-size="11" fill="#555">将词符映射为</text>
    <text x="12" y="74" font-family="sans-serif" font-size="11" fill="#555">高维向量表示</text>
    <text x="12" y="88" font-family="sans-serif" font-size="11" fill="#555">词汇量 32K</text>
  </g>

  <!-- 连接线3: 卡片3 → 饼图 -->
  <line x1="225" y1="370" x2="260" y2="310" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 卡片4: 其他（右下） -->
  <g transform="translate(530, 320)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="95" rx="10" fill="#fff" stroke="#e0ecf5" stroke-width="1"/>
    <!-- 平衡天平图标 -->
    <g transform="translate(12, 10)">
      <line x1="10" y1="0" x2="10" y2="14" stroke="#1a1a2e" stroke-width="1.2"/>
      <line x1="0" y1="14" x2="20" y2="14" stroke="#1a1a2e" stroke-width="1.2"/>
      <circle cx="10" cy="0" r="3" fill="none" stroke="#1a1a2e" stroke-width="0.8"/>
      <rect x="1" y="15" width="7" height="5" rx="1" fill="#d0e8ff"/>
      <rect x="12" y="15" width="7" height="5" rx="1" fill="#d0e8ff"/>
    </g>
    <text x="50" y="22" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">其他</text>
    <text x="50" y="40" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">0.2B 参数</text>
    <text x="12" y="58" font-family="sans-serif" font-size="11" fill="#555">层归一化</text>
    <text x="12" y="74" font-family="sans-serif" font-size="11" fill="#555">偏置项</text>
    <text x="12" y="88" font-family="sans-serif" font-size="11" fill="#555">输出层</text>
  </g>

  <!-- 连接线4: 卡片4 → 饼图 -->
  <line x1="530" y1="370" x2="370" y2="310" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">基于 LLaMA 架构的 7B 参数大语言模型内部参数分布</text>

</svg>