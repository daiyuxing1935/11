<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60B0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D4E"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5CB8FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e" letter-spacing="2">可扩展性设计原则</text>
  <line x1="280" y1="44" x2="520" y2="44" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- 左侧：水平扩展 -->
  <!-- ============================================================ -->

  <!-- 区域标题 -->
  <rect x="30" y="62" width="220" height="32" rx="16" fill="#409EFF" opacity="0.12"/>
  <text x="140" y="83" text-anchor="middle" font-size="15" font-weight="bold" fill="#409EFF">水平扩展</text>

  <!-- 负载均衡器 -->
  <rect x="55" y="108" width="170" height="40" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="140" y="133" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">负载均衡器</text>

  <!-- 从负载均衡器向下的箭头 -->
  <line x1="140" y1="148" x2="140" y2="172" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 水平扩展的三个代理实例 -->
  <!-- 实例 1 -->
  <rect x="40" y="178" width="56" height="56" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadowLight)"/>
  <rect x="48" y="186" width="40" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
  <rect x="48" y="198" width="40" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
  <rect x="48" y="208" width="28" height="4" rx="2" fill="#409EFF" opacity="0.4"/>
  <circle cx="68" cy="224" r="4" fill="#409EFF" opacity="0.6"/>
  <text x="68" y="248" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.7">Agent</text>

  <!-- 实例 2 -->
  <rect x="112" y="178" width="56" height="56" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadowLight)"/>
  <rect x="120" y="186" width="40" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
  <rect x="120" y="198" width="40" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
  <rect x="120" y="208" width="28" height="4" rx="2" fill="#409EFF" opacity="0.4"/>
  <circle cx="140" cy="224" r="4" fill="#409EFF" opacity="0.6"/>
  <text x="140" y="248" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.7">Agent</text>

  <!-- 实例 3 -->
  <rect x="184" y="178" width="56" height="56" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadowLight)"/>
  <rect x="192" y="186" width="40" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
  <rect x="192" y="198" width="40" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
  <rect x="192" y="208" width="28" height="4" rx="2" fill="#409EFF" opacity="0.4"/>
  <circle cx="212" cy="224" r="4" fill="#409EFF" opacity="0.6"/>
  <text x="212" y="248" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.7">Agent</text>

  <!-- 负载分配箭头 -->
  <path d="M100 148 Q100 162 90 172" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrowBlueSmall)"/>
  <path d="M140 148 L140 172" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlueSmall)"/>
  <path d="M180 148 Q180 162 190 172" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrowBlueSmall)"/>
  <defs>
    <marker id="arrowBlueSmall" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#409EFF" opacity="0.6"/>
    </marker>
  </defs>

  <!-- 扩展指示 1→3→5 -->
  <text x="140" y="278" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.6">1 → 3 → 5 实例</text>
  <line x1="60" y1="285" x2="220" y2="285" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- 新增实例提示 -->
  <rect x="55" y="296" width="170" height="26" rx="13" fill="#409EFF" opacity="0.08"/>
  <text x="140" y="314" text-anchor="middle" font-size="12" fill="#409EFF">按需增加实例数量</text>

  <!-- ============================================================ -->
  <!-- 中间：无状态设计 -->
  <!-- ============================================================ -->

  <!-- 区域标题 -->
  <rect x="290" y="62" width="220" height="32" rx="16" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="83" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">无状态设计</text>

  <!-- 中间代理实例 -->
  <rect x="355" y="120" width="90" height="80" rx="12" fill="#fff" stroke="#409EFF" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="367" y="132" width="66" height="8" rx="4" fill="#409EFF" opacity="0.25"/>
  <rect x="367" y="146" width="66" height="5" rx="2.5" fill="#409EFF" opacity="0.45"/>
  <rect x="367" y="157" width="50" height="5" rx="2.5" fill="#409EFF" opacity="0.35"/>
  <rect x="367" y="168" width="40" height="5" rx="2.5" fill="#409EFF" opacity="0.25"/>
  <circle cx="400" cy="186" r="5" fill="#409EFF" opacity="0.5"/>
  <text x="400" y="214" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="bold">无状态 Agent</text>

  <!-- 状态存储到数据库的箭头 -->
  <path d="M445 160 Q470 160 480 175 Q490 190 480 205 Q470 215 455 210" stroke="#409EFF" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <path d="M355 160 Q330 160 320 175 Q310 190 320 205 Q330 215 345 210" stroke="#409EFF" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- 外部状态存储（数据库） -->
  <ellipse cx="400" cy="235" rx="50" ry="12" fill="url(#dbGrad)" opacity="0.3"/>
  <rect x="350" y="235" width="100" height="30" rx="4" fill="url(#dbGrad)" opacity="0.15" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <ellipse cx="400" cy="265" rx="50" ry="12" fill="url(#dbGrad)" opacity="0.3"/>
  <text x="400" y="252" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">Redis / 数据库</text>

  <!-- 说明文字 -->
  <text x="400" y="295" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.55">状态外置，任意实例可处理请求</text>

  <!-- ============================================================ -->
  <!-- 右侧：垂直扩展 -->
  <!-- ============================================================ -->

  <!-- 区域标题 -->
  <rect x="550" y="62" width="220" height="32" rx="16" fill="#1a1a2e" opacity="0.08"/>
  <text x="660" y="83" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">垂直扩展</text>

  <!-- 小实例（升级前） -->
  <rect x="605" y="120" width="50" height="50" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.5" opacity="0.5" filter="url(#shadowLight)"/>
  <rect x="613" y="130" width="34" height="5" rx="2.5" fill="#409EFF" opacity="0.2"/>
  <rect x="613" y="140" width="34" height="4" rx="2" fill="#409EFF" opacity="0.35"/>
  <rect x="613" y="149" width="22" height="4" rx="2" fill="#409EFF" opacity="0.25"/>
  <text x="630" y="184" text-anchor="middle" font-size="10" fill="#1a1a2e" opacity="0.4">2 vCPU</text>

  <!-- 升级箭头 -->
  <line x1="630" y1="194" x2="630" y2="218" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="660" y="210" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="bold">升级</text>

  <!-- 大实例（升级后） -->
  <rect x="590" y="224" width="80" height="80" rx="12" fill="#fff" stroke="#409EFF" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="602" y="238" width="56" height="8" rx="4" fill="#409EFF" opacity="0.3"/>
  <rect x="602" y="252" width="56" height="6" rx="3" fill="#409EFF" opacity="0.5"/>
  <rect x="602" y="264" width="44" height="6" rx="3" fill="#409EFF" opacity="0.4"/>
  <rect x="602" y="276" width="36" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
  <rect x="602" y="288" width="28" height="6" rx="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="630" cy="296" r="5" fill="#409EFF" opacity="0.5"/>
  <text x="630" y="320" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="bold">增强 Agent</text>

  <!-- 规格标签 -->
  <rect x="685" y="240" width="70" height="22" rx="11" fill="#409EFF" opacity="0.1"/>
  <text x="720" y="255" text-anchor="middle" font-size="11" fill="#409EFF">8 vCPU</text>
  <rect x="685" y="268" width="70" height="22" rx="11" fill="#409EFF" opacity="0.1"/>
  <text x="720" y="283" text-anchor="middle" font-size="11" fill="#409EFF">32 GB RAM</text>

  <!-- ============================================================ -->
  <!-- 底部：负载均衡路由 -->
  <!-- ============================================================ -->

  <rect x="30" y="350" width="740" height="130" rx="10" fill="#fff" stroke="#409EFF" stroke-width="1.5" opacity="0.5" filter="url(#shadowLight)"/>
  <text x="400" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">负载均衡路由策略</text>

  <!-- 路由节点 -->
  <rect x="60" y="395" width="120" height="36" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="120" y="418" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">负载均衡器</text>

  <!-- 三个目标实例 -->
  <rect x="260" y="393" width="80" height="40" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.8"/>
  <text x="300" y="418" text-anchor="middle" font-size="12" fill="#1a1a2e">实例 A</text>
  <text x="300" y="408" text-anchor="middle" font-size="10" fill="#409EFF" opacity="0.6">负载 30%</text>

  <rect x="370" y="393" width="80" height="40" rx="8" fill="#fff" stroke="#409EFF" stroke-width="2.5"/>
  <text x="410" y="418" text-anchor="middle" font-size="12" fill="#1a1a2e">实例 B</text>
  <text x="410" y="408" text-anchor="middle" font-size="10" fill="#409EFF" opacity="0.6">负载 15%</text>

  <rect x="480" y="393" width="80" height="40" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.8"/>
  <text x="520" y="418" text-anchor="middle" font-size="12" fill="#1a1a2e">实例 C</text>
  <text x="520" y="408" text-anchor="middle" font-size="10" fill="#409EFF" opacity="0.6">负载 45%</text>

  <!-- 路由箭头 -->
  <line x1="180" y1="413" x2="255" y2="413" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="180" y1="413" x2="365" y2="413" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="180" y1="413" x2="475" y2="413" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 路由选择标注 -->
  <rect x="230" y="440" width="180" height="26" rx="13" fill="#409EFF" opacity="0.08"/>
  <text x="320" y="458" text-anchor="middle" font-size="12" fill="#409EFF">路由到负载最低的实例</text>

  <!-- 选中实例 B 的高亮 -->
  <text x="410" y="448" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="bold">← 选中</text>

</svg>