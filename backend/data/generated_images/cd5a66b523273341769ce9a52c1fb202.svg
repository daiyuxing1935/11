<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">设计思维画布 — 智能体决策框架</text>

  <!-- ========== 卡片1：自主性 ========== -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="70" width="350" height="170" rx="10" ry="10" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 复选框 -->
    <rect x="58" y="88" width="18" height="18" rx="3" fill="#1a1a2e"/>
    <polyline points="62,97 66,101 74,91" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 标题 -->
    <text x="88" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">自主性</text>
    <!-- 问题 -->
    <text x="58" y="132" font-family="Arial, sans-serif" font-size="14" fill="#333">哪些决策自主执行？</text>
    <text x="58" y="152" font-family="Arial, sans-serif" font-size="14" fill="#333">哪些需要人工确认？</text>
    <!-- 图标：机器人 vs 禁止手 -->
    <g transform="translate(290, 110)">
      <!-- 机器人头部 -->
      <rect x="0" y="0" width="28" height="22" rx="4" fill="#409EFF" opacity="0.8"/>
      <rect x="4" y="4" width="8" height="5" rx="2" fill="white"/>
      <rect x="16" y="4" width="8" height="5" rx="2" fill="white"/>
      <rect x="10" y="14" width="8" height="3" rx="1.5" fill="white"/>
      <!-- 天线 -->
      <line x1="14" y1="-4" x2="14" y2="0" stroke="#409EFF" stroke-width="2"/>
      <circle cx="14" cy="-6" r="3" fill="#409EFF"/>
    </g>
    <text x="282" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">vs</text>
    <g transform="translate(305, 110)">
      <!-- 禁止手 -->
      <circle cx="14" cy="11" r="14" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <line x1="4" y1="4" x2="24" y2="18" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="8" y="6" width="4" height="10" rx="1" fill="#e74c3c" opacity="0.6"/>
      <rect x="14" y="3" width="4" height="12" rx="1" fill="#e74c3c" opacity="0.6"/>
    </g>
    <!-- 标注 -->
    <rect x="58" y="168" width="80" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
    <text x="98" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">自主决策</text>
  </g>

  <!-- ========== 卡片2：反应性 ========== -->
  <g filter="url(#cardShadow)">
    <rect x="410" y="70" width="350" height="170" rx="10" ry="10" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 复选框 -->
    <rect x="428" y="88" width="18" height="18" rx="3" fill="#1a1a2e"/>
    <polyline points="432,97 436,101 444,91" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 标题 -->
    <text x="458" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">反应性</text>
    <!-- 问题 -->
    <text x="428" y="132" font-family="Arial, sans-serif" font-size="14" fill="#333">用户中途改变主意时，</text>
    <text x="428" y="152" font-family="Arial, sans-serif" font-size="14" fill="#333">智能体应如何回应？</text>
    <!-- 图标：分支箭头 -->
    <g transform="translate(660, 105)">
      <!-- 主干 -->
      <line x1="20" y1="0" x2="20" y2="45" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <!-- 分支1 -->
      <line x1="20" y1="20" x2="45" y2="35" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <polygon points="45,38 40,31 48,33" fill="#409EFF"/>
      <!-- 分支2 -->
      <line x1="20" y1="30" x2="45" y2="20" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <polygon points="45,17 40,24 48,22" fill="#409EFF"/>
      <!-- 起点圆 -->
      <circle cx="20" cy="0" r="5" fill="#409EFF"/>
      <!-- 问号 -->
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">?</text>
    </g>
    <!-- 标注 -->
    <rect x="428" y="168" width="80" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
    <text x="468" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">动态响应</text>
  </g>

  <!-- ========== 卡片3：主动性 ========== -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="270" width="350" height="170" rx="10" ry="10" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 复选框 -->
    <rect x="58" y="288" width="18" height="18" rx="3" fill="#1a1a2e"/>
    <polyline points="62,297 66,301 74,291" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 标题 -->
    <text x="88" y="304" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">主动性</text>
    <!-- 问题 -->
    <text x="58" y="332" font-family="Arial, sans-serif" font-size="14" fill="#333">它应主动做什么？</text>
    <text x="58" y="352" font-family="Arial, sans-serif" font-size="14" fill="#333">何时做？做多少？</text>
    <!-- 图标：时钟 + 刻度 -->
    <g transform="translate(290, 295)">
      <!-- 时钟 -->
      <circle cx="20" cy="20" r="18" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="20" y1="20" x2="20" y2="8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="30" y2="20" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="2.5" fill="#1a1a2e"/>
      <!-- 刻度条 -->
      <rect x="48" y="8" width="3" height="24" rx="1.5" fill="#409EFF" opacity="0.6"/>
      <rect x="54" y="14" width="3" height="18" rx="1.5" fill="#409EFF" opacity="0.8"/>
      <rect x="60" y="20" width="3" height="12" rx="1.5" fill="#409EFF"/>
      <text x="57" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">主动级</text>
    </g>
    <!-- 标注 -->
    <rect x="58" y="368" width="80" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
    <text x="98" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">主动预判</text>
  </g>

  <!-- ========== 卡片4：社交能力 ========== -->
  <g filter="url(#cardShadow)">
    <rect x="410" y="270" width="350" height="170" rx="10" ry="10" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 复选框 -->
    <rect x="428" y="288" width="18" height="18" rx="3" fill="#1a1a2e"/>
    <polyline points="432,297 436,301 444,291" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 标题 -->
    <text x="458" y="304" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">社交能力</text>
    <!-- 问题 -->
    <text x="428" y="332" font-family="Arial, sans-serif" font-size="14" fill="#333">它与谁交互？</text>
    <text x="428" y="352" font-family="Arial, sans-serif" font-size="14" fill="#333">单独工作还是团队协作？</text>
    <!-- 图标：单独机器人 vs 团队机器人 -->
    <g transform="translate(660, 295)">
      <!-- 单独机器人 -->
      <rect x="0" y="5" width="18" height="14" rx="3" fill="#409EFF" opacity="0.5"/>
      <rect x="3" y="8" width="5" height="3" rx="1.5" fill="white"/>
      <rect x="10" y="8" width="5" height="3" rx="1.5" fill="white"/>
      <rect x="6" y="14" width="5" height="2" rx="1" fill="white"/>
      <line x1="9" y1="3" x2="9" y2="5" stroke="#409EFF" stroke-width="1.5"/>
      <circle cx="9" cy="1.5" r="2" fill="#409EFF"/>
      <text x="9" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">独行</text>
      <!-- vs -->
      <text x="40" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">vs</text>
      <!-- 团队机器人 -->
      <rect x="52" y="0" width="14" height="11" rx="2.5" fill="#409EFF" opacity="0.7"/>
      <rect x="54" y="3" width="4" height="2.5" rx="1" fill="white"/>
      <rect x="59" y="3" width="4" height="2.5" rx="1" fill="white"/>
      <rect x="56" y="8" width="4" height="1.5" rx="0.7" fill="white"/>
      <line x1="59" y1="-1" x2="59" y2="0" stroke="#409EFF" stroke-width="1.2"/>
      <circle cx="59" cy="-2" r="1.5" fill="#409EFF"/>

      <rect x="68" y="4" width="14" height="11" rx="2.5" fill="#409EFF" opacity="0.9"/>
      <rect x="70" y="7" width="4" height="2.5" rx="1" fill="white"/>
      <rect x="75" y="7" width="4" height="2.5" rx="1" fill="white"/>
      <rect x="72" y="12" width="4" height="1.5" rx="0.7" fill="white"/>
      <line x1="75" y1="3" x2="75" y2="4" stroke="#409EFF" stroke-width="1.2"/>
      <circle cx="75" cy="2" r="1.5" fill="#409EFF"/>

      <rect x="60" y="16" width="14" height="11" rx="2.5" fill="#409EFF" opacity="0.6"/>
      <rect x="62" y="19" width="4" height="2.5" rx="1" fill="white"/>
      <rect x="67" y="19" width="4" height="2.5" rx="1" fill="white"/>
      <rect x="64" y="24" width="4" height="1.5" rx="0.7" fill="white"/>
      <line x1="67" y1="15" x2="67" y2="16" stroke="#409EFF" stroke-width="1.2"/>
      <circle cx="67" cy="14" r="1.5" fill="#409EFF"/>

      <text x="73" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">团队</text>
    </g>
    <!-- 标注 -->
    <rect x="428" y="368" width="80" height="26" rx="13" fill="#409EFF" opacity="0.15"/>
    <text x="468" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">协作交互</text>
  </g>

  <!-- 底部说明 -->
  <rect x="250" y="460" width="300" height="28" rx="14" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">选择对应维度，勾选框中确认设计方向</text>
</svg>