<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="queueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">黑板模式 vs 消息队列模式</text>

  <!-- ===== 左侧：黑板 ===== -->
  <g filter="url(#shadow)">
    <rect x="50" y="55" width="310" height="195" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 黑板标题栏 -->
    <rect x="50" y="55" width="310" height="32" rx="10" fill="#409EFF"/>
    <rect x="50" y="75" width="310" height="12" fill="#409EFF"/>
    <text x="205" y="76" text-anchor="middle" font-size="15" font-weight="bold" fill="white">黑板模式（黑板）</text>

    <!-- 黑板面板 -->
    <rect x="72" y="100" width="266" height="90" rx="4" fill="#1a1a2e" opacity="0.9"/>
    <!-- 黑板上的条目 -->
    <text x="85" y="122" font-size="12" fill="#A8D8FF">■ 任务A：图像识别 ✓</text>
    <text x="85" y="142" font-size="12" fill="#A8D8FF">■ 任务B：数据清洗 ✓</text>
    <text x="85" y="162" font-size="12" fill="#A8D8FF">■ 任务C：模型训练 ✓</text>
    <text x="85" y="182" font-size="12" fill="#A8D8FF">■ 任务D：结果验证 ✓</text>

    <!-- 拉取箭头 -->
    <line x1="205" y1="195" x2="205" y2="215" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="215" y="225" font-size="13" fill="#409EFF">拉取任务（Pull）</text>
  </g>

  <!-- 左侧标注 -->
  <text x="55" y="270" font-size="13" fill="#1a1a2e">• 共享黑板，持久条目</text>
  <text x="55" y="290" font-size="13" fill="#1a1a2e">• 所有代理可见</text>
  <text x="55" y="310" font-size="13" fill="#1a1a2e">• 知识库积累</text>

  <!-- ===== 右侧：消息队列 ===== -->
  <g filter="url(#shadow)">
    <rect x="440" y="55" width="310" height="195" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 队列标题栏 -->
    <rect x="440" y="55" width="310" height="32" rx="10" fill="#409EFF"/>
    <rect x="440" y="75" width="310" height="12" fill="#409EFF"/>
    <text x="595" y="76" text-anchor="middle" font-size="15" font-weight="bold" fill="white">消息队列模式（队列）</text>

    <!-- 队列管道 -->
    <rect x="462" y="105" width="266" height="55" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 队列中的消息 -->
    <rect x="475" y="115" width="50" height="35" rx="4" fill="#409EFF" opacity="0.8"/>
    <text x="500" y="138" text-anchor="middle" font-size="11" fill="white">Msg A</text>
    <rect x="535" y="115" width="50" height="35" rx="4" fill="#409EFF" opacity="0.6"/>
    <text x="560" y="138" text-anchor="middle" font-size="11" fill="white">Msg B</text>
    <rect x="595" y="115" width="50" height="35" rx="4" fill="#409EFF" opacity="0.4"/>
    <text x="620" y="138" text-anchor="middle" font-size="11" fill="white">Msg C</text>

    <!-- 推送箭头 -->
    <line x1="595" y1="165" x2="595" y2="215" stroke="#409EFF" stroke-width="2"/>
    <polygon points="590,210 595,222 600,210" fill="#409EFF"/>
    <text x="605" y="225" font-size="13" fill="#409EFF">推送消息（Push）</text>

    <!-- 消费者 -->
    <rect x="545" y="230" width="100" height="20" rx="4" fill="#1a1a2e" opacity="0.8"/>
    <text x="595" y="244" text-anchor="middle" font-size="12" fill="white">消费者</text>
  </g>

  <!-- 右侧标注 -->
  <text x="445" y="270" font-size="13" fill="#1a1a2e">• 点对点消息流</text>
  <text x="445" y="290" font-size="13" fill="#1a1a2e">• 消息被消费后移除</text>
  <text x="445" y="310" font-size="13" fill="#1a1a2e">• 精准负载均衡</text>

  <!-- ===== 决策树 ===== -->
  <g>
    <!-- 决策树标题 -->
    <text x="400" y="355" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">决策树：如何选择？</text>

    <!-- 根节点 -->
    <rect x="310" y="370" width="180" height="28" rx="14" fill="#1a1a2e"/>
    <text x="400" y="389" text-anchor="middle" font-size="13" fill="white">任务特性分析</text>

    <!-- 分支1：知识价值 -->
    <line x1="400" y1="398" x2="400" y2="415" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="400" y1="415" x2="200" y2="415" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="200" y1="415" x2="200" y2="430" stroke="#1a1a2e" stroke-width="1.5"/>

    <rect x="100" y="430" width="200" height="28" rx="14" fill="#409EFF"/>
    <text x="200" y="449" text-anchor="middle" font-size="13" fill="white">有知识价值？→ 黑板模式</text>

    <!-- 分支2：负载均衡 -->
    <line x1="400" y1="415" x2="600" y2="415" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="600" y1="415" x2="600" y2="430" stroke="#1a1a2e" stroke-width="1.5"/>

    <rect x="500" y="430" width="200" height="28" rx="14" fill="#409EFF"/>
    <text x="600" y="449" text-anchor="middle" font-size="13" fill="white">需精准负载均衡？→ 消息队列</text>

    <!-- 分支3：消息顺序 -->
    <line x1="600" y1="458" x2="600" y2="470" stroke="#1a1a2e" stroke-width="1.5"/>

    <rect x="500" y="470" width="200" height="28" rx="14" fill="#409EFF"/>
    <text x="600" y="489" text-anchor="middle" font-size="13" fill="white">需保证消息顺序？→ 消息队列</text>
  </g>

</svg>