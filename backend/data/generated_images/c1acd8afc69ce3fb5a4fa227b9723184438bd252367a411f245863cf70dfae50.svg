<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSmall" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 主卡片 -->
  <rect x="30" y="25" width="740" height="450" rx="12" ry="12" fill="white" filter="url(#shadow)"/>

  <!-- 卡片顶部标题栏 -->
  <rect x="30" y="25" width="740" height="48" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="30" y="61" width="740" height="12" fill="url(#headerGrad)"/>

  <!-- 信封图标 -->
  <rect x="52" y="36" width="24" height="18" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <polyline points="52,38 64,50 76,38" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="86" y="53" font-size="16" font-weight="bold" fill="white">标准智能体消息结构</text>

  <!-- 消息ID行 -->
  <rect x="52" y="88" width="160" height="32" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="62" y="108" font-size="12" fill="#666">📋 message_id</text>
  <text x="142" y="108" font-size="13" fill="#1a1a2e" font-weight="bold">MSG-2024-0821-0037</text>

  <!-- 时间戳 -->
  <rect x="230" y="88" width="180" height="32" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="240" y="108" font-size="12" fill="#666">⏱ timestamp</text>
  <text x="320" y="108" font-size="13" fill="#1a1a2e" font-weight="bold">2024-08-21 14:30:00</text>

  <!-- 消息类型 -->
  <rect x="428" y="88" width="200" height="32" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="438" y="108" font-size="12" fill="#666">📌 message_type</text>
  <text x="530" y="108" font-size="13" fill="#409EFF" font-weight="bold">task_assignment</text>

  <!-- 分隔线 -->
  <line x1="52" y1="135" x2="748" y2="135" stroke="#E0E6ED" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 发送者区块 -->
  <rect x="52" y="148" width="330" height="100" rx="8" fill="#F8FAFC" stroke="#D0D8E3" stroke-width="1"/>
  <rect x="52" y="148" width="330" height="28" rx="8" fill="#E8F0FE"/>
  <rect x="52" y="168" width="330" height="8" fill="#E8F0FE"/>
  <text x="66" y="167" font-size="13" fill="#409EFF" font-weight="bold">📤 发送者 (sender)</text>

  <text x="66" y="196" font-size="12" fill="#888">agent_id</text>
  <text x="140" y="196" font-size="13" fill="#1a1a2e">agent-ops-07</text>

  <text x="240" y="196" font-size="12" fill="#888">agent_role</text>
  <text x="314" y="196" font-size="13" fill="#1a1a2e">coordinator</text>

  <text x="66" y="222" font-size="12" fill="#888">agent_type</text>
  <text x="140" y="222" font-size="13" fill="#1a1a2e">task_manager</text>

  <!-- 接收者区块 -->
  <rect x="410" y="148" width="330" height="100" rx="8" fill="#F8FAFC" stroke="#D0D8E3" stroke-width="1"/>
  <rect x="410" y="148" width="330" height="28" rx="8" fill="#E8F0FE"/>
  <rect x="410" y="168" width="330" height="8" fill="#E8F0FE"/>
  <text x="424" y="167" font-size="13" fill="#409EFF" font-weight="bold">📥 接收者 (receiver)</text>

  <text x="424" y="196" font-size="12" fill="#888">agent_id</text>
  <text x="498" y="196" font-size="13" fill="#1a1a2e">agent-exec-12</text>

  <text x="598" y="196" font-size="12" fill="#888">agent_role</text>
  <text x="672" y="196" font-size="13" fill="#1a1a2e">executor</text>

  <text x="424" y="222" font-size="12" fill="#888">agent_type</text>
  <text x="498" y="222" font-size="13" fill="#1a1a2e">worker</text>

  <!-- 分隔线 -->
  <line x1="52" y1="262" x2="748" y2="262" stroke="#E0E6ED" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 内容区块 -->
  <rect x="52" y="275" width="440" height="100" rx="8" fill="#F8FAFC" stroke="#D0D8E3" stroke-width="1"/>
  <rect x="52" y="275" width="440" height="28" rx="8" fill="#E8F0FE"/>
  <rect x="52" y="295" width="440" height="8" fill="#E8F0FE"/>
  <text x="66" y="294" font-size="13" fill="#409EFF" font-weight="bold">📄 内容 (content) — 任务详情</text>

  <text x="66" y="320" font-size="12" fill="#888">instruction</text>
  <text x="155" y="320" font-size="13" fill="#1a1a2e">生成月度运营报告并发送至审批</text>

  <text x="66" y="344" font-size="12" fill="#888">data_reference</text>
  <text x="175" y="344" font-size="13" fill="#1a1a2e">dataset/ops/2024-08</text>

  <text x="340" y="344" font-size="12" fill="#888">format</text>
  <text x="385" y="344" font-size="13" fill="#1a1a2e">PDF</text>

  <text x="66" y="365" font-size="12" fill="#888">deadline</text>
  <text x="130" y="365" font-size="13" fill="#E74C3C" font-weight="bold">2024-08-22 18:00</text>

  <!-- 元数据区块 -->
  <rect x="520" y="275" width="220" height="100" rx="8" fill="#F8FAFC" stroke="#D0D8E3" stroke-width="1"/>
  <rect x="520" y="275" width="220" height="28" rx="8" fill="#E8F0FE"/>
  <rect x="520" y="295" width="220" height="8" fill="#E8F0FE"/>
  <text x="534" y="294" font-size="13" fill="#409EFF" font-weight="bold">⚙ 元数据 (metadata)</text>

  <text x="534" y="320" font-size="12" fill="#888">priority</text>
  <rect x="600" y="307" width="50" height="18" rx="4" fill="#FEF0F0" stroke="#F56C6C" stroke-width="1"/>
  <text x="608" y="320" font-size="11" fill="#F56C6C" font-weight="bold">高</text>

  <text x="534" y="344" font-size="12" fill="#888">requires_response</text>
  <rect x="650" y="331" width="36" height="18" rx="9" fill="#409EFF"/>
  <circle cx="668" cy="340" r="7" fill="white"/>

  <text x="534" y="365" font-size="12" fill="#888">retry_count</text>
  <text x="620" y="365" font-size="13" fill="#1a1a2e" font-weight="bold">0</text>

  <!-- 底部标注 -->
  <rect x="52" y="395" width="696" height="36" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="66" y="418" font-size="12" fill="#666">💡 标准消息信封格式 · 所有字段遵循 JSON Schema 规范 · 版本 2.1.0</text>

  <!-- 标注箭头和说明 -->
  <!-- 标注1: 消息ID -->
  <line x1="52" y1="104" x2="22" y2="104" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="22" y1="104" x2="22" y2="78" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="22" cy="78" r="3" fill="#409EFF"/>
  <text x="10" y="72" font-size="11" fill="#409EFF" text-anchor="middle">唯一标识</text>

  <!-- 标注2: 时间戳 -->
  <line x1="320" y1="88" x2="320" y2="72" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="320" cy="72" r="3" fill="#409EFF"/>
  <text x="320" y="66" font-size="11" fill="#409EFF" text-anchor="middle">UTC时间</text>

  <!-- 标注3: 消息类型 -->
  <line x1="530" y1="88" x2="530" y2="72" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="530" cy="72" r="3" fill="#409EFF"/>
  <text x="530" y="66" font-size="11" fill="#409EFF" text-anchor="middle">类型枚举</text>

  <!-- 标注4: 发送者 -->
  <line x1="217" y1="148" x2="217" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="217" cy="130" r="3" fill="#409EFF"/>
  <text x="217" y="124" font-size="11" fill="#409EFF" text-anchor="middle">来源代理</text>

  <!-- 标注5: 接收者 -->
  <line x1="575" y1="148" x2="575" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="575" cy="130" r="3" fill="#409EFF"/>
  <text x="575" y="124" font-size="11" fill="#409EFF" text-anchor="middle">目标代理</text>

  <!-- 标注6: 内容 -->
  <line x1="272" y1="275" x2="272" y2="256" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="272" cy="256" r="3" fill="#409EFF"/>
  <text x="272" y="250" font-size="11" fill="#409EFF" text-anchor="middle">任务载荷</text>

  <!-- 标注7: 元数据 -->
  <line x1="630" y1="275" x2="630" y2="256" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="630" cy="256" r="3" fill="#409EFF"/>
  <text x="630" y="250" font-size="11" fill="#409EFF" text-anchor="middle">控制参数</text>

  <!-- 标注8: 优先级 -->
  <line x1="625" y1="316" x2="700" y2="316" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="700" y1="316" x2="700" y2="440" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="700" cy="440" r="3" fill="#409EFF"/>
  <text x="700" y="455" font-size="11" fill="#409EFF" text-anchor="middle">优先级标记</text>
</svg>