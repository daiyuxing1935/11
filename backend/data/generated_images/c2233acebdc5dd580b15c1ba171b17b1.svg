<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="dfGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#66B1FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">JADE 目录促进者（DF）概念图</text>

  <!-- ====== 中央 DF 图标 ====== -->
  <g transform="translate(400, 195)" filter="url(#shadow)">
    <!-- 黄页书本图标 -->
    <rect x="-48" y="-38" width="96" height="76" rx="6" fill="#FFD54F" stroke="#F9A825" stroke-width="1.5"/>
    <rect x="-40" y="-30" width="80" height="60" rx="3" fill="#FFF8E1"/>
    <!-- 书页线条 -->
    <line x1="-30" y1="-18" x2="30" y2="-18" stroke="#BDBDBD" stroke-width="1.2"/>
    <line x1="-30" y1="-8" x2="30" y2="-8" stroke="#BDBDBD" stroke-width="1.2"/>
    <line x1="-30" y1="2" x2="30" y2="2" stroke="#BDBDBD" stroke-width="1.2"/>
    <line x1="-30" y1="12" x2="20" y2="12" stroke="#BDBDBD" stroke-width="1.2"/>
    <!-- DF 标签 -->
    <text x="0" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">DF</text>
    <!-- 小环装饰 -->
    <circle cx="0" cy="-38" r="4" fill="#409EFF" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- ====== 左侧：三个 Agent ====== -->
  <!-- Agent 1 -->
  <g transform="translate(140, 100)" filter="url(#shadow)">
    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="-44" cy="0" r="12" fill="#409EFF"/>
    <text x="-44" y="5" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">A1</text>
    <text x="-24" y="-4" font-size="12" fill="#1a1a2e" font-weight="bold">data-analysis</text>
    <text x="-24" y="12" font-size="11" fill="#666">分析引擎</text>
  </g>

  <!-- Agent 2 -->
  <g transform="translate(140, 195)" filter="url(#shadow)">
    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="-44" cy="0" r="12" fill="#409EFF"/>
    <text x="-44" y="5" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">A2</text>
    <text x="-24" y="-4" font-size="12" fill="#1a1a2e" font-weight="bold">web-search</text>
    <text x="-24" y="12" font-size="11" fill="#666">搜索代理</text>
  </g>

  <!-- Agent 3 -->
  <g transform="translate(140, 290)" filter="url(#shadow)">
    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="-44" cy="0" r="12" fill="#409EFF"/>
    <text x="-44" y="5" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">A3</text>
    <text x="-24" y="-4" font-size="12" fill="#1a1a2e" font-weight="bold">translation</text>
    <text x="-24" y="12" font-size="11" fill="#666">翻译服务</text>
  </g>

  <!-- ====== 注册箭头（Agent → DF） ====== -->
  <!-- A1 → DF -->
  <line x1="200" y1="110" x2="348" y2="180" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <!-- A2 → DF -->
  <line x1="200" y1="195" x2="348" y2="195" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <!-- A3 → DF -->
  <line x1="200" y1="280" x2="348" y2="210" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>

  <!-- 注册标注 -->
  <text x="270" y="140" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">注册</text>
  <text x="270" y="230" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">注册</text>

  <!-- ====== 右侧：查询 Agent ====== -->
  <g transform="translate(620, 195)" filter="url(#shadow)">
    <rect x="-55" y="-22" width="110" height="44" rx="8" fill="#fff" stroke="#E6A23C" stroke-width="1.5"/>
    <circle cx="-40" cy="0" r="12" fill="#E6A23C"/>
    <text x="-40" y="5" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">A4</text>
    <text x="-20" y="-4" font-size="12" fill="#1a1a2e" font-weight="bold">查询代理</text>
    <text x="-20" y="12" font-size="11" fill="#666">需要分析</text>
  </g>

  <!-- 查询箭头（A4 → DF） -->
  <line x1="565" y1="185" x2="452" y2="185" stroke="#E6A23C" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <!-- 返回箭头（DF → A4） -->
  <line x1="452" y1="205" x2="565" y2="205" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- 查询标注 -->
  <text x="510" y="175" text-anchor="end" font-size="11" fill="#E6A23C">"查找 data-analysis 服务"</text>
  <text x="510" y="218" text-anchor="start" font-size="11" fill="#67C23A">返回匹配 Agent 列表</text>

  <!-- ====== 生命周期图（底部） ====== -->
  <g transform="translate(400, 410)">
    <!-- 三个节点 -->
    <rect x="-160" y="-18" width="100" height="36" rx="6" fill="#409EFF" filter="url(#shadow)"/>
    <text x="-110" y="5" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Setup</text>

    <rect x="-30" y="-18" width="140" height="36" rx="6" fill="#409EFF" filter="url(#shadow)"/>
    <text x="40" y="5" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Add Behaviours</text>

    <rect x="140" y="-18" width="100" height="36" rx="6" fill="#409EFF" filter="url(#shadow)"/>
    <text x="190" y="5" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Execute Loop</text>

    <!-- 箭头 -->
    <line x1="-60" y1="0" x2="-30" y2="0" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>
    <line x1="110" y1="0" x2="140" y2="0" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>
    <!-- 返回箭头 -->
    <path d="M240,0 Q260,0 260,20 Q260,40 240,40 L190,40" stroke="#1a1a2e" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowDark)"/>
    <text x="260" y="52" text-anchor="middle" font-size="11" fill="#666">循环</text>

    <!-- 子标签 -->
    <text x="40" y="-28" text-anchor="middle" font-size="11" fill="#666">TaskSeeking, TaskProcessing</text>
  </g>

  <!-- ====== 取消注册标注 ====== -->
  <g transform="translate(400, 320)">
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#F56C6C" font-weight="bold">取消注册</text>
    <line x1="-60" y1="6" x2="60" y2="6" stroke="#F56C6C" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ====== 箭头标记 ====== -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E6A23C"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67C23A"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- ====== 关键概念标注 ====== -->
  <g transform="translate(400, 355)">
    <text x="-120" y="0" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">注册</text>
    <text x="0" y="0" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">搜索</text>
    <text x="120" y="0" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">取消注册</text>
  </g>

</svg>