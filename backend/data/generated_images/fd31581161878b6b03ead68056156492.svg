<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#D0E8FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 博弈桌 -->
  <rect x="280" y="195" width="240" height="110" rx="8" fill="url(#tableGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>

  <!-- 收益矩阵 -->
  <rect x="310" y="215" width="180" height="70" rx="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 矩阵分隔线 -->
  <line x1="400" y1="215" x2="400" y2="285" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="310" y1="250" x2="490" y2="250" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 矩阵数值 -->
  <text x="355" y="238" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">(3,3)</text>
  <text x="445" y="238" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">(1,4)</text>
  <text x="355" y="273" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">(4,1)</text>
  <text x="445" y="273" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">(2,2)</text>

  <!-- 矩阵标题 -->
  <text x="400" y="208" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">收益矩阵</text>

  <!-- AI 主体 1（左） -->
  <g transform="translate(120, 200)">
    <!-- 头部 -->
    <rect x="-25" y="-30" width="50" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-12" r="4" fill="#FFFFFF"/>
    <circle cx="8" cy="-12" r="4" fill="#FFFFFF"/>
    <circle cx="-7" cy="-12" r="2" fill="#1a1a2e"/>
    <circle cx="9" cy="-12" r="2" fill="#1a1a2e"/>
    <!-- 天线 -->
    <line x1="0" y1="-30" x2="0" y2="-45" stroke="#409EFF" stroke-width="2"/>
    <circle cx="0" cy="-48" r="4" fill="#409EFF"/>
    <!-- 身体 -->
    <rect x="-20" y="20" width="40" height="35" rx="6" fill="#409EFF" opacity="0.7"/>
    <!-- 标签 -->
    <text x="0" y="75" text-anchor="middle" font-size="15" fill="#1a1a2e" font-weight="bold">智能体 A</text>
  </g>

  <!-- AI 主体 2（右） -->
  <g transform="translate(680, 200)">
    <!-- 头部 -->
    <rect x="-25" y="-30" width="50" height="50" rx="10" fill="#409EFF" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-12" r="4" fill="#FFFFFF"/>
    <circle cx="8" cy="-12" r="4" fill="#FFFFFF"/>
    <circle cx="-7" cy="-12" r="2" fill="#1a1a2e"/>
    <circle cx="9" cy="-12" r="2" fill="#1a1a2e"/>
    <!-- 天线 -->
    <line x1="0" y1="-30" x2="0" y2="-45" stroke="#409EFF" stroke-width="2"/>
    <circle cx="0" cy="-48" r="4" fill="#409EFF"/>
    <!-- 身体 -->
    <rect x="-20" y="20" width="40" height="35" rx="6" fill="#409EFF" opacity="0.7"/>
    <!-- 标签 -->
    <text x="0" y="75" text-anchor="middle" font-size="15" fill="#1a1a2e" font-weight="bold">智能体 B</text>
  </g>

  <!-- 策略树 - 智能体 A（左） -->
  <!-- 树干 -->
  <line x1="170" y1="170" x2="170" y2="100" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- 分支节点 -->
  <circle cx="170" cy="100" r="5" fill="#409EFF"/>
  <!-- 左分支 -->
  <line x1="170" y1="100" x2="130" y2="55" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="130" cy="55" r="4" fill="#409EFF"/>
  <text x="130" y="45" text-anchor="middle" font-size="14" fill="#1a1a2e">合作</text>
  <!-- 右分支 -->
  <line x1="170" y1="100" x2="210" y2="55" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="210" cy="55" r="4" fill="#409EFF"/>
  <text x="210" y="45" text-anchor="middle" font-size="14" fill="#1a1a2e">背叛</text>

  <!-- 策略树 - 智能体 B（右） -->
  <line x1="630" y1="170" x2="630" y2="100" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="630" cy="100" r="5" fill="#409EFF"/>
  <line x1="630" y1="100" x2="590" y2="55" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="590" cy="55" r="4" fill="#409EFF"/>
  <text x="590" y="45" text-anchor="middle" font-size="14" fill="#1a1a2e">合作</text>
  <line x1="630" y1="100" x2="670" y2="55" stroke="#409EFF" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="670" cy="55" r="4" fill="#409EFF"/>
  <text x="670" y="45" text-anchor="middle" font-size="14" fill="#1a1a2e">背叛</text>

  <!-- 决策点之间的连线 -->
  <line x1="130" y1="55" x2="590" y2="55" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="130" y1="55" x2="670" y2="55" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="210" y1="55" x2="590" y2="55" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="210" y1="55" x2="670" y2="55" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 标注 1：策略树 -->
  <g transform="translate(100, 10)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle" font-size="14" fill="#409EFF" font-weight="bold">策略树</text>
  </g>

  <!-- 标注 2：决策节点 -->
  <g transform="translate(250, 85)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle" font-size="14" fill="#409EFF" font-weight="bold">决策节点</text>
  </g>

  <!-- 标注 3：收益矩阵 -->
  <g transform="translate(310, 310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle" font-size="14" fill="#409EFF" font-weight="bold">收益矩阵</text>
  </g>

  <!-- 标注 4：博弈均衡 -->
  <g transform="translate(520, 310)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle" font-size="14" fill="#409EFF" font-weight="bold">博弈均衡</text>
  </g>

  <!-- 标注 5：策略连线 -->
  <g transform="translate(350, 30)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle" font-size="14" fill="#409EFF" font-weight="bold">策略连线</text>
  </g>

  <!-- 标题 -->
  <text x="400" y="470" text-anchor="middle" font-size="18" fill="#1a1a2e" font-weight="bold">博弈论：智能体策略交互</text>

  <!-- 图例 -->
  <rect x="580" y="430" width="10" height="10" rx="2" fill="#409EFF" opacity="0.5"/>
  <text x="596" y="440" font-size="12" fill="#1a1a2e">决策点</text>
  <line x1="640" y1="435" x2="660" y2="435" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="666" y="440" font-size="12" fill="#1a1a2e">连线</text>

</svg>