<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFCFF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题区域 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">标准化智能体消息结构 · JSON 信封</text>
  <line x1="160" y1="50" x2="640" y2="50" stroke="#409EFF" stroke-width="2" stroke-opacity="0.3"/>

  <!-- 主卡片 -->
  <rect x="30" y="65" width="740" height="410" rx="14" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#409EFF" stroke-width="1" stroke-opacity="0.15"/>

  <!-- ====== 消息 ID 行 ====== -->
  <rect x="55" y="85" width="130" height="30" rx="15" fill="#409EFF" filter="url(#badgeShadow)"/>
  <text x="120" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">📋 message_id</text>
  <text x="200" y="105" font-size="14" fill="#1a1a2e" font-weight="500">msg_7a9f2e4b_c8d1</text>

  <!-- 时间戳 -->
  <rect x="55" y="130" width="130" height="30" rx="15" fill="#409EFF" filter="url(#badgeShadow)"/>
  <text x="120" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">🕐 timestamp</text>
  <text x="200" y="150" font-size="14" fill="#1a1a2e" font-weight="500">2025-01-15T09:42:18.362Z</text>

  <!-- ====== 发送方 / 接收方 双栏 ====== -->
  <!-- 发送方 -->
  <rect x="55" y="178" width="340" height="110" rx="10" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="75" y="200" font-size="15" font-weight="700" fill="#409EFF">📤 sender</text>

  <text x="75" y="224" font-size="13" fill="#5A6A7E">agent_id</text>
  <text x="170" y="224" font-size="13" fill="#1a1a2e" font-weight="500">agent_alpha_07</text>

  <text x="75" y="248" font-size="13" fill="#5A6A7E">agent_role</text>
  <text x="170" y="248" font-size="13" fill="#1a1a2e" font-weight="500">coordinator</text>

  <text x="75" y="272" font-size="13" fill="#5A6A7E">agent_type</text>
  <text x="170" y="272" font-size="13" fill="#1a1a2e" font-weight="500">task_planner</text>

  <!-- 接收方 -->
  <rect x="405" y="178" width="340" height="110" rx="10" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="425" y="200" font-size="15" font-weight="700" fill="#409EFF">📥 receiver</text>

  <text x="425" y="224" font-size="13" fill="#5A6A7E">agent_id</text>
  <text x="520" y="224" font-size="13" fill="#1a1a2e" font-weight="500">agent_beta_12</text>

  <text x="425" y="248" font-size="13" fill="#5A6A7E">agent_role</text>
  <text x="520" y="248" font-size="13" fill="#1a1a2e" font-weight="500">executor</text>

  <text x="425" y="272" font-size="13" fill="#5A6A7E">agent_type</text>
  <text x="520" y="272" font-size="13" fill="#1a1a2e" font-weight="500">worker</text>

  <!-- ====== message_type 下拉框 ====== -->
  <rect x="55" y="305" width="130" height="30" rx="15" fill="#409EFF" filter="url(#badgeShadow)"/>
  <text x="120" y="325" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">📌 message_type</text>

  <rect x="200" y="305" width="260" height="30" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="215" y="325" font-size="13" fill="#1a1a2e" font-weight="500">task_assignment</text>
  <polygon points="440,315 448,325 432,325" fill="#409EFF"/>
  <!-- 下拉选项 -->
  <rect x="200" y="338" width="260" height="130" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="215" y="358" font-size="12" fill="#1a1a2e">task_assignment</text>
  <line x1="215" y1="365" x2="445" y2="365" stroke="#E8F4FD" stroke-width="1"/>
  <text x="215" y="380" font-size="12" fill="#5A6A7E">status_update</text>
  <line x1="215" y1="387" x2="445" y2="387" stroke="#E8F4FD" stroke-width="1"/>
  <text x="215" y="402" font-size="12" fill="#5A6A7E">query</text>
  <line x1="215" y1="409" x2="445" y2="409" stroke="#E8F4FD" stroke-width="1"/>
  <text x="215" y="424" font-size="12" fill="#5A6A7E">response</text>
  <line x1="215" y1="431" x2="445" y2="431" stroke="#E8F4FD" stroke-width="1"/>
  <text x="215" y="446" font-size="12" fill="#5A6A7E">broadcast / error / heartbeat</text>

  <!-- ====== content 内容块 ====== -->
  <rect x="55" y="305" width="0" height="0" fill="none"/>
  <rect x="480" y="305" width="265" height="110" rx="10" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="500" y="327" font-size="15" font-weight="700" fill="#409EFF">📄 content</text>

  <text x="500" y="350" font-size="12" fill="#5A6A7E">instruction</text>
  <text x="590" y="350" font-size="12" fill="#1a1a2e" font-weight="500">处理数据批次 #42</text>

  <text x="500" y="372" font-size="12" fill="#5A6A7E">data_reference</text>
  <text x="590" y="372" font-size="12" fill="#1a1a2e" font-weight="500">s3://data/batch_42</text>

  <text x="500" y="394" font-size="12" fill="#5A6A7E">format</text>
  <text x="590" y="394" font-size="12" fill="#1a1a2e" font-weight="500">JSON · 压缩</text>

  <text x="500" y="416" font-size="12" fill="#5A6A7E">deadline</text>
  <text x="590" y="416" font-size="12" fill="#1a1a2e" font-weight="500">2025-01-15T10:00:00Z</text>

  <!-- ====== metadata 元数据 ====== -->
  <rect x="55" y="430" width="690" height="30" rx="8" fill="#EDF5FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="75" y="450" font-size="13" font-weight="600" fill="#409EFF">⚙ metadata</text>

  <!-- priority 标志 -->
  <rect x="170" y="435" width="70" height="20" rx="4" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="205" y="449" text-anchor="middle" font-size="11" fill="#E65100" font-weight="600">⭐ priority</text>

  <!-- requires_response 开关 -->
  <rect x="260" y="435" width="50" height="20" rx="10" fill="#409EFF"/>
  <circle cx="301" cy="445" r="7" fill="#FFFFFF"/>
  <text x="320" y="449" font-size="11" fill="#1a1a2e" font-weight="500">需响应</text>

  <!-- retry_count 计数器 -->
  <rect x="400" y="435" width="80" height="20" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="440" y="449" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="600">🔄 重试: 2</text>

  <!-- 标注 1 -->
  <line x1="200" y1="105" x2="200" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="160" y="56" width="80" height="18" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="200" y="69" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">唯一标识</text>

  <!-- 标注 2 -->
  <line x1="200" y1="150" x2="260" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="230" y="56" width="80" height="18" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="270" y="69" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">时间戳</text>

  <!-- 标注 3 -->
  <line x1="225" y1="200" x2="310" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="280" y="56" width="80" height="18" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="320" y="69" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">发送方信息</text>

  <!-- 标注 4 -->
  <line x1="575" y1="200" x2="600" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="540" y="56" width="80" height="18" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="580" y="69" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">接收方信息</text>

  <!-- 标注 5 -->
  <line x1="330" y1="325" x2="370" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="340" y="56" width="80" height="18" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="380" y="69" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">消息类型</text>

  <!-- 标注 6 -->
  <line x1="612" y1="360" x2="660" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="620" y="56" width="80" height="18" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="660" y="69" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">任务内容</text>

</svg>