<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  <rect x="20" y="20" width="760" height="460" fill="white" rx="12" filter="url(#shadow)"/>

  <!-- 标题 -->
  <text x="400" y="52" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">智能体选择决策流程</text>

  <!-- ===== 决策流程图 ===== -->

  <!-- 根节点：问题框 -->
  <rect x="275" y="72" width="250" height="40" rx="20" fill="#409EFF" opacity="0.9"/>
  <text x="400" y="97" text-anchor="middle" font-size="14" fill="white" font-weight="bold">任务属于单域还是跨域？</text>

  <!-- 连线：根节点到两个分支 -->
  <line x1="350" y1="112" x2="200" y2="172" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="4,3"/>
  <line x1="450" y1="112" x2="600" y2="172" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="4,3"/>

  <!-- 左分支：单域 -->
  <rect x="100" y="172" width="200" height="38" rx="19" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
  <text x="200" y="196" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">单域 → 单智能体</text>

  <!-- 右分支：跨域 -->
  <rect x="500" y="172" width="200" height="38" rx="19" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
  <text x="600" y="196" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">跨域 → 继续判断</text>

  <!-- 连线：跨域到三个子问题 -->
  <line x1="600" y1="210" x2="600" y2="240" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="600" y1="240" x2="200" y2="280" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="600" y1="240" x2="400" y2="280" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="600" y1="240" x2="600" y2="280" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 子问题1 -->
  <rect x="90" y="280" width="220" height="36" rx="18" fill="#409EFF" opacity="0.1" stroke="#409EFF" stroke-width="1.2"/>
  <text x="200" y="303" text-anchor="middle" font-size="13" fill="#1a1a2e">严格顺序依赖？</text>
  <rect x="90" y="320" width="220" height="32" rx="16" fill="#409EFF" opacity="0.2"/>
  <text x="200" y="341" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">→ 顺序流水线</text>

  <!-- 子问题2 -->
  <rect x="310" y="280" width="180" height="36" rx="18" fill="#409EFF" opacity="0.1" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="303" text-anchor="middle" font-size="13" fill="#1a1a2e">需多视角验证？</text>
  <rect x="310" y="320" width="180" height="32" rx="16" fill="#409EFF" opacity="0.2"/>
  <text x="400" y="341" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">→ 辩论/投票</text>

  <!-- 子问题3 -->
  <rect x="510" y="280" width="200" height="36" rx="18" fill="#409EFF" opacity="0.1" stroke="#409EFF" stroke-width="1.2"/>
  <text x="610" y="303" text-anchor="middle" font-size="13" fill="#1a1a2e">错误成本高？</text>
  <rect x="510" y="320" width="200" height="32" rx="16" fill="#409EFF" opacity="0.2"/>
  <text x="610" y="341" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">→ 交叉验证</text>

  <!-- ===== 表格 ===== -->
  <text x="400" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">典型场景推荐</text>

  <!-- 表头 -->
  <rect x="60" y="398" width="160" height="28" rx="4" fill="#409EFF" opacity="0.85"/>
  <text x="140" y="417" text-anchor="middle" font-size="13" fill="white" font-weight="bold">场景</text>

  <rect x="220" y="398" width="200" height="28" rx="4" fill="#409EFF" opacity="0.85"/>
  <text x="320" y="417" text-anchor="middle" font-size="13" fill="white" font-weight="bold">特征</text>

  <rect x="420" y="398" width="160" height="28" rx="4" fill="#409EFF" opacity="0.85"/>
  <text x="500" y="417" text-anchor="middle" font-size="13" fill="white" font-weight="bold">推荐方案</text>

  <rect x="580" y="398" width="160" height="28" rx="4" fill="#409EFF" opacity="0.85"/>
  <text x="660" y="417" text-anchor="middle" font-size="13" fill="white" font-weight="bold">智能体数量</text>

  <!-- 行1 -->
  <rect x="60" y="426" width="160" height="26" rx="2" fill="#F5F9FF"/>
  <text x="140" y="444" text-anchor="middle" font-size="12" fill="#1a1a2e">文档分类</text>
  <rect x="220" y="426" width="200" height="26" rx="2" fill="#F5F9FF"/>
  <text x="320" y="444" text-anchor="middle" font-size="12" fill="#1a1a2e">单域、无依赖</text>
  <rect x="420" y="426" width="160" height="26" rx="2" fill="#F5F9FF"/>
  <text x="500" y="444" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">单智能体</text>
  <rect x="580" y="426" width="160" height="26" rx="2" fill="#F5F9FF"/>
  <text x="660" y="444" text-anchor="middle" font-size="12" fill="#1a1a2e">1</text>

  <!-- 行2 -->
  <rect x="60" y="452" width="160" height="26" rx="2" fill="white"/>
  <text x="140" y="470" text-anchor="middle" font-size="12" fill="#1a1a2e">多轮谈判</text>
  <rect x="220" y="452" width="200" height="26" rx="2" fill="white"/>
  <text x="320" y="470" text-anchor="middle" font-size="12" fill="#1a1a2e">跨域、需多视角</text>
  <rect x="420" y="452" width="160" height="26" rx="2" fill="white"/>
  <text x="500" y="470" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">辩论/投票</text>
  <rect x="580" y="452" width="160" height="26" rx="2" fill="white"/>
  <text x="660" y="470" text-anchor="middle" font-size="12" fill="#1a1a2e">3-5</text>

</svg>