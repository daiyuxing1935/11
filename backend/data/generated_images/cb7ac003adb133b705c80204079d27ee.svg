<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FD4"/>
    </linearGradient>
    <linearGradient id="queueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12" flood-color="#409EFF"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">黑板模式 vs 消息队列模式</text>

  <!-- ========== 左侧：黑板 ========== -->
  <g transform="translate(50, 55)">
    <!-- 黑板外框 -->
    <rect x="0" y="0" width="310" height="195" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 标题栏 -->
    <rect x="0" y="0" width="310" height="32" rx="8" fill="url(#boardGrad)"/>
    <rect x="0" y="16" width="310" height="16" fill="url(#boardGrad)"/>
    <text x="155" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="white">黑板模式</text>

    <!-- 黑板内容 - 持久条目 -->
    <rect x="18" y="44" width="274" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
    <text x="28" y="59" font-size="12" fill="#1a1a2e">📝 任务A：数据清洗完成</text>

    <rect x="18" y="72" width="274" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
    <text x="28" y="87" font-size="12" fill="#1a1a2e">📝 任务B：模型训练结果</text>

    <rect x="18" y="100" width="274" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
    <text x="28" y="115" font-size="12" fill="#1a1a2e">📝 任务C：报表生成</text>

    <rect x="18" y="128" width="274" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
    <text x="28" y="143" font-size="12" fill="#1a1a2e">📝 任务D：异常检测</text>

    <!-- 累积标注 -->
    <rect x="100" y="160" width="110" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
    <text x="155" y="174" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">知识库积累</text>

    <!-- 拉取箭头 - 左侧 -->
    <g transform="translate(260, 50)">
      <path d="M10,10 L-8,10 L-2,4 M-2,16 L-8,10" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
      <text x="18" y="14" font-size="11" fill="#409EFF">拉取</text>
    </g>
    <g transform="translate(260, 78)">
      <path d="M10,10 L-8,10 L-2,4 M-2,16 L-8,10" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
      <text x="18" y="14" font-size="11" fill="#409EFF">拉取</text>
    </g>
    <g transform="translate(260, 106)">
      <path d="M10,10 L-8,10 L-2,4 M-2,16 L-8,10" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
      <text x="18" y="14" font-size="11" fill="#409EFF">拉取</text>
    </g>

    <!-- 标注 -->
    <text x="155" y="194" text-anchor="middle" font-size="11" fill="#666">Pull 模型 · 持久可见</text>
  </g>

  <!-- ========== 右侧：消息队列 ========== -->
  <g transform="translate(440, 55)">
    <rect x="0" y="0" width="310" height="195" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="310" height="32" rx="8" fill="url(#queueGrad)"/>
    <rect x="0" y="16" width="310" height="16" fill="url(#queueGrad)"/>
    <text x="155" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="white">消息队列模式</text>

    <!-- 队列管道 -->
    <rect x="30" y="55" width="250" height="40" rx="20" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 管道内的消息 -->
    <circle cx="70" cy="75" r="12" fill="#409EFF" opacity="0.8"/>
    <text x="70" y="79" text-anchor="middle" font-size="9" fill="white">M1</text>
    <circle cx="120" cy="75" r="12" fill="#409EFF" opacity="0.6"/>
    <text x="120" y="79" text-anchor="middle" font-size="9" fill="white">M2</text>
    <circle cx="170" cy="75" r="12" fill="#409EFF" opacity="0.4"/>
    <text x="170" y="79" text-anchor="middle" font-size="9" fill="white">M3</text>

    <!-- 箭头指示流动方向 -->
    <path d="M250,75 L270,75" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <defs>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#409EFF"/>
      </marker>
    </defs>

    <!-- 消费者 -->
    <rect x="30" y="115" width="60" height="28" rx="14" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="60" y="133" text-anchor="middle" font-size="11" fill="#409EFF">消费者A</text>
    <rect x="110" y="115" width="60" height="28" rx="14" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="140" y="133" text-anchor="middle" font-size="11" fill="#409EFF">消费者B</text>
    <rect x="190" y="115" width="60" height="28" rx="14" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="220" y="133" text-anchor="middle" font-size="11" fill="#409EFF">消费者C</text>

    <!-- 推送箭头 -->
    <g transform="translate(60, 103)">
      <path d="M0,0 L0,-12 L-5,-6 M5,-6 L0,-12" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <g transform="translate(140, 103)">
      <path d="M0,0 L0,-12 L-5,-6 M5,-6 L0,-12" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <g transform="translate(220, 103)">
      <path d="M0,0 L0,-12 L-5,-6 M5,-6 L0,-12" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- 消费移除标注 -->
    <rect x="100" y="155" width="110" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
    <text x="155" y="169" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">消费后移除</text>

    <text x="155" y="194" text-anchor="middle" font-size="11" fill="#666">Push 模型 · 点对点传递</text>
  </g>

  <!-- ========== 决策树 ========== -->
  <g transform="translate(50, 275)">
    <text x="350" y="0" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">决策树：如何选择？</text>

    <!-- 根节点 -->
    <rect x="290" y="14" width="120" height="32" rx="16" fill="#409EFF"/>
    <text x="350" y="35" text-anchor="middle" font-size="13" font-weight="bold" fill="white">任务特性分析</text>

    <!-- 分支线 -->
    <line x1="350" y1="46" x2="350" y2="60" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="350" y1="60" x2="120" y2="60" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="350" y1="60" x2="580" y2="60" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="120" y1="60" x2="120" y2="74" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="580" y1="60" x2="580" y2="74" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 条件节点 -->
    <rect x="30" y="74" width="180" height="32" rx="16" fill="white" stroke="#409EFF" stroke-width="1.2"/>
    <text x="120" y="95" text-anchor="middle" font-size="12" fill="#1a1a2e">任务有知识价值？</text>

    <rect x="490" y="74" width="180" height="32" rx="16" fill="white" stroke="#409EFF" stroke-width="1.2"/>
    <text x="580" y="95" text-anchor="middle" font-size="12" fill="#1a1a2e">需要精确负载均衡？</text>

    <!-- 条件分支线 -->
    <line x1="120" y1="106" x2="120" y2="118" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="580" y1="106" x2="580" y2="118" stroke="#409EFF" stroke-width="1.2"/>

    <!-- 是/否标签 -->
    <text x="95" y="115" text-anchor="end" font-size="11" fill="#409EFF" font-weight="bold">是</text>
    <text x="145" y="115" text-anchor="start" font-size="11" fill="#999">否→MQ</text>
    <text x="555" y="115" text-anchor="end" font-size="11" fill="#409EFF" font-weight="bold">是</text>
    <text x="605" y="115" text-anchor="start" font-size="11" fill="#999">否→黑板</text>

    <!-- 结果节点 -->
    <rect x="45" y="118" width="150" height="30" rx="15" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="120" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#409EFF">✅ 黑板模式</text>

    <rect x="505" y="118" width="150" height="30" rx="15" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="580" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#409EFF">✅ 消息队列</text>

    <!-- 额外条件：消息顺序 -->
    <line x1="580" y1="148" x2="580" y2="162" stroke="#409EFF" stroke-width="1.2"/>
    <rect x="490" y="162" width="180" height="32" rx="16" fill="white" stroke="#409EFF" stroke-width="1.2"/>
    <text x="580" y="183" text-anchor="middle" font-size="12" fill="#1a1a2e">需要保证消息顺序？</text>

    <line x1="580" y1="194" x2="580" y2="206" stroke="#409EFF" stroke-width="1.2"/>
    <text x="555" y="203" text-anchor="end" font-size="11" fill="#409EFF" font-weight="bold">是</text>
    <text x="605" y="203" text-anchor="start" font-size="11" fill="#999">否→黑板</text>

    <rect x="505" y="206" width="150" height="30" rx="15" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="580" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#409EFF">✅ 消息队列</text>
  </g>

  <!-- 底部标注 -->
  <text x="400" y="490" text-anchor="middle" font-size="11" fill="#999">教育配图 · 架构模式对比 · 扁平化设计</text>
</svg>