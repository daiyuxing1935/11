<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="lightbulbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9e0"/>
      <stop offset="100%" stop-color="#fff3c4"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 人物站立区域 - 地面线 -->
  <line x1="60" y1="420" x2="220" y2="420" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- 人物 -->
  <g transform="translate(140, 260)">
    <!-- 身体 -->
    <rect x="-20" y="30" width="40" height="55" rx="10" fill="#409EFF" opacity="0.85"/>
    <!-- 头部 -->
    <circle cx="0" cy="10" r="22" fill="#409EFF" opacity="0.85"/>
    <!-- 脸部 - 眼睛 -->
    <circle cx="-7" cy="6" r="3" fill="#ffffff"/>
    <circle cx="7" cy="6" r="3" fill="#ffffff"/>
    <!-- 微笑 -->
    <path d="M-6,14 Q0,20 6,14" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <!-- 手臂 - 指向思维气泡 -->
    <path d="M20,45 Q55,35 80,20" fill="none" stroke="#409EFF" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <path d="M-20,45 Q-30,55 -35,65" fill="none" stroke="#409EFF" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <!-- 腿 -->
    <rect x="-18" y="82" width="14" height="30" rx="5" fill="#409EFF" opacity="0.7"/>
    <rect x="4" y="82" width="14" height="30" rx="5" fill="#409EFF" opacity="0.7"/>
  </g>

  <!-- 大思维气泡 -->
  <g filter="url(#softShadow)">
    <ellipse cx="420" cy="180" rx="175" ry="110" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
    <!-- 气泡连接点 -->
    <circle cx="260" cy="290" r="6" fill="#409EFF" opacity="0.5"/>
    <circle cx="275" cy="275" r="4" fill="#409EFF" opacity="0.3"/>
  </g>

  <!-- 大问号（初始复杂问题） -->
  <g transform="translate(420, 150)">
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#409EFF" opacity="0.9">?</text>
  </g>

  <!-- 四个连接的小气泡 - 从左到右排列 -->
  <!-- 连接线 -->
  <line x1="310" y1="200" x2="355" y2="200" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="395" y1="200" x2="440" y2="200" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="480" y1="200" x2="525" y2="200" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- 气泡1：拆分第一步 -->
  <g filter="url(#softShadow)">
    <circle cx="332" cy="200" r="28" fill="#ffffff" stroke="#409EFF" stroke-width="2"/>
    <text x="332" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">拆分</text>
    <text x="332" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">问题</text>
  </g>

  <!-- 气泡2：分解步骤 -->
  <g filter="url(#softShadow)">
    <circle cx="417" cy="200" r="28" fill="#ffffff" stroke="#409EFF" stroke-width="2"/>
    <text x="417" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">分解</text>
    <text x="417" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">步骤</text>
  </g>

  <!-- 气泡3：逐个解决 -->
  <g filter="url(#softShadow)">
    <circle cx="502" cy="200" r="28" fill="#ffffff" stroke="#409EFF" stroke-width="2"/>
    <text x="502" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">逐个</text>
    <text x="502" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">解决</text>
  </g>

  <!-- 气泡4：得出答案 -->
  <g filter="url(#softShadow)">
    <circle cx="587" cy="200" r="28" fill="#fff9e0" stroke="#409EFF" stroke-width="2"/>
    <text x="587" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">得出</text>
    <text x="587" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">答案</text>
  </g>

  <!-- 拼图碎片图标 - 气泡1下方 -->
  <g transform="translate(332, 248)" opacity="0.7">
    <rect x="-10" y="-8" width="8" height="8" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="0" y="-8" width="8" height="8" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="-10" y="0" width="8" height="8" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#409EFF" opacity="0.3"/>
  </g>

  <!-- 拼图碎片图标 - 气泡2下方 -->
  <g transform="translate(417, 248)" opacity="0.7">
    <rect x="-8" y="-6" width="6" height="6" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="-1" y="-6" width="6" height="6" rx="1" fill="#409EFF" opacity="0.3"/>
    <rect x="-8" y="1" width="6" height="6" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="-1" y="1" width="6" height="6" rx="1" fill="#409EFF" opacity="0.2"/>
  </g>

  <!-- 拼图碎片图标 - 气泡3下方 -->
  <g transform="translate(502, 248)" opacity="0.7">
    <rect x="-6" y="-5" width="5" height="5" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="0" y="-5" width="5" height="5" rx="1" fill="#409EFF" opacity="0.2"/>
    <rect x="-6" y="1" width="5" height="5" rx="1" fill="#409EFF" opacity="0.3"/>
    <rect x="0" y="1" width="5" height="5" rx="1" fill="#409EFF" opacity="0.2"/>
  </g>

  <!-- 灯泡（最终答案） -->
  <g transform="translate(660, 170)" filter="url(#softShadow)">
    <!-- 灯泡外发光 -->
    <ellipse cx="0" cy="-15" rx="30" ry="30" fill="#fff9e0" opacity="0.3"/>
    <!-- 灯泡主体 -->
    <path d="M-18,-10 Q-20,-30 -10,-38 Q0,-44 10,-38 Q20,-30 18,-10 Q18,0 12,8 Q8,14 8,20 L-8,20 Q-8,14 -12,8 Q-18,0 -18,-10Z" fill="#fff3c4" stroke="#409EFF" stroke-width="2"/>
    <!-- 灯泡底座 -->
    <rect x="-6" y="20" width="12" height="5" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="-4" y="25" width="8" height="3" rx="1" fill="#409EFF" opacity="0.4"/>
    <!-- 灯泡内光效 -->
    <path d="M-6,-20 Q0,-30 6,-20" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-10" r="4" fill="#ffd700" opacity="0.4"/>
    <!-- 对勾 -->
    <path d="M-8,-5 L-2,2 L8,-10" fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 标注文字 -->
  <!-- 标注1：人物 -->
  <g transform="translate(140, 380)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">思考者</text>
  </g>

  <!-- 标注2：复杂问题 -->
  <g transform="translate(420, 100)">
    <rect x="-48" y="-10" width="96" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">复杂问题</text>
  </g>

  <!-- 标注3：逐步分解 -->
  <g transform="translate(440, 260)">
    <rect x="-48" y="-10" width="96" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">逐步分解</text>
  </g>

  <!-- 标注4：最终答案 -->
  <g transform="translate(660, 130)">
    <rect x="-40" y="-10" width="80" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">最终答案</text>
  </g>

  <!-- 标题 -->
  <g transform="translate(400, 460)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a2e" font-weight="bold" letter-spacing="2">分步思考 · 化繁为简</text>
  </g>

  <!-- 装饰性小点 -->
  <circle cx="50" cy="60" r="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="750" cy="80" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="30" cy="450" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="770" cy="440" r="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="680" cy="60" r="2" fill="#409EFF" opacity="0.12"/>
  <circle cx="100" cy="100" r="2" fill="#409EFF" opacity="0.1"/>

</svg>