<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">三种通信模式对比</text>

  <!-- ===== 左侧面板：消息队列 ===== -->
  <rect x="20" y="55" width="240" height="420" rx="12" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="20" y="55" width="240" height="36" rx="12" fill="#409EFF"/>
  <rect x="20" y="75" width="240" height="16" fill="#409EFF"/>
  <text x="140" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">消息队列</text>

  <!-- 发送者 -->
  <rect x="50" y="115" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="50" y="115" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="80" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">发送者</text>

  <!-- 队列盒子 -->
  <rect x="85" y="195" width="110" height="50" rx="8" fill="#409EFF" opacity="0.1"/>
  <rect x="85" y="195" width="110" height="50" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">消息队列</text>
  <text x="140" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">缓冲 / 解耦</text>

  <!-- 接收者 -->
  <rect x="50" y="285" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="50" y="285" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="80" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">接收者</text>

  <!-- 异步箭头：发送→队列 -->
  <line x1="80" y1="155" x2="80" y2="195" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <polygon points="80,193 76,185 84,185" fill="#409EFF"/>
  <text x="95" y="178" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">发送</text>

  <!-- 异步箭头：队列→接收 -->
  <line x1="80" y1="245" x2="80" y2="285" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="80,283 76,275 84,275" fill="#409EFF"/>
  <text x="95" y="268" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">接收</text>

  <!-- 解耦标注 -->
  <rect x="155" y="130" width="80" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="195" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">异步解耦</text>

  <!-- ===== 中间面板：共享上下文 ===== -->
  <rect x="280" y="55" width="240" height="420" rx="12" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="280" y="55" width="240" height="36" rx="12" fill="#409EFF"/>
  <rect x="280" y="75" width="240" height="16" fill="#409EFF"/>
  <text x="400" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">共享上下文</text>

  <!-- 中央数据库 -->
  <rect x="350" y="170" width="100" height="80" rx="10" fill="#409EFF" opacity="0.1"/>
  <rect x="350" y="170" width="100" height="80" rx="10" fill="none" stroke="#409EFF" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF">共享数据</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">/ 上下文</text>
  <circle cx="400" cy="240" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 代理A - 左侧 -->
  <rect x="295" y="105" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="295" y="105" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="325" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理A</text>

  <!-- 代理B - 右侧 -->
  <rect x="445" y="105" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="445" y="105" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="475" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理B</text>

  <!-- 代理C - 左下 -->
  <rect x="295" y="290" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="295" y="290" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="325" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理C</text>

  <!-- 代理D - 右下 -->
  <rect x="445" y="290" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="445" y="290" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="475" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理D</text>

  <!-- 读写箭头 -->
  <!-- A→数据 -->
  <line x1="325" y1="145" x2="360" y2="170" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="358,168 350,166 356,174" fill="#409EFF"/>
  <text x="330" y="162" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">写</text>

  <!-- 数据→B -->
  <line x1="440" y1="170" x2="475" y2="145" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="473,147 465,152 473,155" fill="#409EFF"/>
  <text x="458" y="162" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">读</text>

  <!-- C→数据 -->
  <line x1="325" y1="290" x2="360" y2="250" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="358,252 350,254 356,260" fill="#409EFF"/>
  <text x="330" y="268" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">写</text>

  <!-- 数据→D -->
  <line x1="440" y1="250" x2="475" y2="290" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="473,288 465,283 473,280" fill="#409EFF"/>
  <text x="458" y="268" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">读</text>

  <!-- 透明标注 -->
  <rect x="350" y="365" width="100" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">信息透明</text>

  <!-- ===== 右侧面板：结构化对话 ===== -->
  <rect x="540" y="55" width="240" height="420" rx="12" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="540" y="55" width="240" height="36" rx="12" fill="#409EFF"/>
  <rect x="540" y="75" width="240" height="16" fill="#409EFF"/>
  <text x="660" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">结构化对话</text>

  <!-- 代理1 - 左侧 -->
  <rect x="555" y="120" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="555" y="120" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="585" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理1</text>

  <!-- 代理2 - 右侧 -->
  <rect x="705" y="120" width="60" height="40" rx="8" fill="#409EFF" opacity="0.15"/>
  <rect x="705" y="120" width="60" height="40" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="735" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理2</text>

  <!-- 对话气泡1 -->
  <rect x="555" y="185" width="100" height="70" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="570" y="205" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" font-weight="bold">{</text>
  <text x="570" y="220" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">  "type": "query",</text>
  <text x="570" y="235" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">  "action": "get"</text>
  <text x="570" y="250" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" font-weight="bold">}</text>
  <polygon points="555,255 545,265 565,260" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 对话气泡2 -->
  <rect x="665" y="280" width="100" height="70" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="680" y="300" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" font-weight="bold">{</text>
  <text x="680" y="315" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">  "status": "ok",</text>
  <text x="680" y="330" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">  "data": [...]</text>
  <text x="680" y="345" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" font-weight="bold">}</text>
  <polygon points="665,350 655,340 665,345" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 交互箭头 -->
  <line x1="615" y1="140" x2="705" y2="140" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="703,137 695,132 695,142" fill="#409EFF"/>
  <polygon points="617,137 625,132 625,142" fill="#409EFF"/>

  <!-- 对话标注 -->
  <rect x="610" y="370" width="100" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="660" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">丰富交互</text>

  <!-- 底部说明 -->
  <text x="140" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">发送者与接收者通过队列</text>
  <text x="140" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">异步通信，实现解耦</text>

  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">多个代理共享同一数据</text>
  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">源，信息完全透明</text>

  <text x="660" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">代理之间通过格式化</text>
  <text x="660" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">JSON消息进行交互</text>
</svg>