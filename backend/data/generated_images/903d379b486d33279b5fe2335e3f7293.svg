<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="tier1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="tier2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="tier3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">三层决策流程：任务分配策略</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#5a5a7a">优先级排序 → 能力过滤 → 负载选择</text>

  <!-- ========== 层级 1：优先级 ========== -->
  <rect x="30" y="90" width="740" height="110" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="90" width="740" height="36" rx="10" fill="url(#tier1Grad)"/>
  <rect x="30" y="116" width="740" height="10" fill="url(#tier1Grad)"/>

  <text x="50" y="114" font-size="16" font-weight="bold" fill="white">第 1 层：优先级排序</text>

  <!-- P0 紧急 红色 -->
  <rect x="60" y="140" width="130" height="44" rx="8" fill="#F56C6C" opacity="0.9"/>
  <text x="125" y="167" text-anchor="middle" font-size="15" font-weight="bold" fill="white">P0 紧急</text>

  <!-- P1 重要 橙色 -->
  <rect x="210" y="140" width="130" height="44" rx="8" fill="#E6A23C" opacity="0.9"/>
  <text x="275" y="167" text-anchor="middle" font-size="15" font-weight="bold" fill="white">P1 重要</text>

  <!-- P2 正常 蓝色 -->
  <rect x="360" y="140" width="130" height="44" rx="8" fill="#409EFF" opacity="0.85"/>
  <text x="425" y="167" text-anchor="middle" font-size="15" font-weight="bold" fill="white">P2 正常</text>

  <!-- P3 低 灰色 -->
  <rect x="510" y="140" width="130" height="44" rx="8" fill="#C0C4CC" opacity="0.85"/>
  <text x="575" y="167" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a5a7a">P3 低</text>

  <!-- 排序箭头 -->
  <text x="665" y="168" font-size="22" fill="#1a1a2e" font-weight="bold">→</text>

  <!-- 标注 1 -->
  <rect x="690" y="138" width="68" height="48" rx="6" fill="#F56C6C" opacity="0.15" stroke="#F56C6C" stroke-width="1"/>
  <text x="724" y="161" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">优先</text>
  <text x="724" y="178" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">最高</text>

  <!-- 层级 1→2 连接箭头 -->
  <path d="M400,200 L400,220" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ========== 层级 2：能力 ========== -->
  <rect x="30" y="225" width="740" height="110" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="225" width="740" height="36" rx="10" fill="url(#tier2Grad)"/>
  <rect x="30" y="251" width="740" height="10" fill="url(#tier2Grad)"/>

  <text x="50" y="249" font-size="16" font-weight="bold" fill="white">第 2 层：能力匹配</text>

  <!-- 任务技能标签 -->
  <rect x="60" y="272" width="110" height="48" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="115" y="294" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">任务需求</text>
  <text x="115" y="312" text-anchor="middle" font-size="13" fill="#409EFF">Python · SQL</text>

  <!-- 拼图匹配图标 -->
  <rect x="190" y="278" width="60" height="36" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="220" y="302" text-anchor="middle" font-size="20" fill="#409EFF">🧩</text>

  <!-- 代理能力标签 -->
  <rect x="270" y="272" width="110" height="48" rx="8" fill="#E8F4FD" stroke="#67C23A" stroke-width="1.5"/>
  <text x="325" y="294" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">代理能力</text>
  <text x="325" y="312" text-anchor="middle" font-size="13" fill="#67C23A">Python · SQL</text>

  <!-- 匹配成功指示 -->
  <rect x="400" y="278" width="80" height="36" rx="18" fill="#67C23A" opacity="0.15" stroke="#67C23A" stroke-width="1.5"/>
  <text x="440" y="302" text-anchor="middle" font-size="14" fill="#67C23A" font-weight="bold">✓ 匹配</text>

  <!-- 标注 2 -->
  <rect x="510" y="272" width="80" height="48" rx="6" fill="#67C23A" opacity="0.12" stroke="#67C23A" stroke-width="1"/>
  <text x="550" y="296" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">最佳</text>
  <text x="550" y="312" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">匹配</text>

  <!-- 更多代理 -->
  <rect x="620" y="272" width="60" height="48" rx="8" fill="#E8F4FD" stroke="#C0C4CC" stroke-width="1"/>
  <text x="650" y="296" text-anchor="middle" font-size="12" fill="#5a5a7a">代理 B</text>
  <text x="650" y="312" text-anchor="middle" font-size="11" fill="#C0C4CC">Java</text>

  <rect x="695" y="272" width="60" height="48" rx="8" fill="#E8F4FD" stroke="#C0C4CC" stroke-width="1"/>
  <text x="725" y="296" text-anchor="middle" font-size="12" fill="#5a5a7a">代理 C</text>
  <text x="725" y="312" text-anchor="middle" font-size="11" fill="#C0C4CC">Go</text>

  <!-- 层级 2→3 连接箭头 -->
  <path d="M400,335 L400,355" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- ========== 层级 3：负载 ========== -->
  <rect x="30" y="360" width="740" height="110" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="360" width="740" height="36" rx="10" fill="url(#tier3Grad)"/>
  <rect x="30" y="386" width="740" height="10" fill="url(#tier3Grad)"/>

  <text x="50" y="394" font-size="16" font-weight="bold" fill="white">第 3 层：负载选择</text>

  <!-- 代理 A 负载高 -->
  <rect x="60" y="408" width="180" height="48" rx="8" fill="#FEF0F0" stroke="#F56C6C" stroke-width="1.5"/>
  <text x="100" y="432" font-size="14" fill="#1a1a2e" font-weight="bold">代理 A</text>
  <rect x="150" y="420" width="80" height="10" rx="5" fill="#F56C6C" opacity="0.3"/>
  <rect x="150" y="420" width="72" height="10" rx="5" fill="#F56C6C"/>
  <text x="235" y="432" font-size="12" fill="#F56C6C">90%</text>

  <!-- 代理 B 负载中 -->
  <rect x="260" y="408" width="180" height="48" rx="8" fill="#FDF6EC" stroke="#E6A23C" stroke-width="1.5"/>
  <text x="300" y="432" font-size="14" fill="#1a1a2e" font-weight="bold">代理 B</text>
  <rect x="350" y="420" width="80" height="10" rx="5" fill="#E6A23C" opacity="0.3"/>
  <rect x="350" y="420" width="48" height="10" rx="5" fill="#E6A23C"/>
  <text x="435" y="432" font-size="12" fill="#E6A23C">60%</text>

  <!-- 代理 C 负载低 → 选中 -->
  <rect x="460" y="408" width="180" height="48" rx="8" fill="#F0F9EB" stroke="#67C23A" stroke-width="2.5"/>
  <text x="500" y="432" font-size="14" fill="#1a1a2e" font-weight="bold">代理 C</text>
  <rect x="550" y="420" width="80" height="10" rx="5" fill="#67C23A" opacity="0.3"/>
  <rect x="550" y="420" width="20" height="10" rx="5" fill="#67C23A"/>
  <text x="635" y="432" font-size="12" fill="#67C23A">25%</text>

  <!-- 选中指示 -->
  <rect x="660" y="408" width="95" height="48" rx="8" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.5"/>
  <text x="707" y="432" text-anchor="middle" font-size="14" fill="#409EFF" font-weight="bold">← 选中</text>
  <text x="707" y="448" text-anchor="middle" font-size="11" fill="#1a1a2e">负载最低</text>

  <!-- 标注 3 -->
  <rect x="690" y="90" width="68" height="28" rx="14" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1"/>
  <text x="724" y="109" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">标注 1</text>

  <rect x="690" y="225" width="68" height="28" rx="14" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1"/>
  <text x="724" y="244" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">标注 2</text>

  <rect x="690" y="360" width="68" height="28" rx="14" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1"/>
  <text x="724" y="379" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">标注 3</text>

  <!-- 底部混合策略说明 -->
  <rect x="200" y="478" width="400" height="18" rx="9" fill="#1a1a2e" opacity="0.06"/>
  <text x="400" y="492" text-anchor="middle" font-size="13" fill="#1a1a2e">混合策略：优先级排序 → 能力过滤 → 负载选择</text>
</svg>