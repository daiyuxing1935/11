<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="tier1Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5aaeff"/>
    </linearGradient>
    <linearGradient id="tier2Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5aaeff"/>
    </linearGradient>
    <linearGradient id="tier3Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5aaeff"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">混合策略任务分配流程</text>
  <line x1="240" y1="50" x2="560" y2="50" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ====== 第一层：基于优先级 ====== -->
  <rect x="50" y="72" width="700" height="90" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="50" y="72" width="700" height="32" rx="12" fill="url(#tier1Grad)"/>
  <rect x="50" y="92" width="700" height="12" fill="url(#tier1Grad)"/>

  <text x="70" y="93" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">第一层：基于优先级</text>

  <!-- 优先级标签 -->
  <rect x="90" y="115" width="110" height="32" rx="6" fill="#e53935"/>
  <text x="145" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">P0 紧急</text>

  <rect x="230" y="115" width="110" height="32" rx="6" fill="#fb8c00"/>
  <text x="285" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">P1 重要</text>

  <rect x="370" y="115" width="110" height="32" rx="6" fill="#409EFF"/>
  <text x="425" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">P2 一般</text>

  <rect x="510" y="115" width="110" height="32" rx="6" fill="#9e9e9e"/>
  <text x="565" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">P3 低优</text>

  <!-- 箭头1 -->
  <polygon points="400,168 390,158 410,158" fill="#1a1a2e"/>
  <line x1="400" y1="162" x2="400" y2="178" stroke="#1a1a2e" stroke-width="2"/>
  <text x="420" y="175" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">优先级排序</text>

  <!-- ====== 第二层：基于能力 ====== -->
  <rect x="50" y="188" width="700" height="90" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="50" y="188" width="700" height="32" rx="12" fill="url(#tier2Grad)"/>
  <rect x="50" y="208" width="700" height="12" fill="url(#tier2Grad)"/>

  <text x="70" y="209" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">第二层：基于能力</text>

  <!-- 任务技能标签 -->
  <rect x="80" y="228" width="100" height="36" rx="8" fill="#e3f2fd" stroke="#409EFF" stroke-width="1.5"/>
  <text x="130" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">技能: Python</text>

  <rect x="210" y="228" width="100" height="36" rx="8" fill="#e3f2fd" stroke="#409EFF" stroke-width="1.5"/>
  <text x="260" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">技能: 设计</text>

  <!-- 拼图匹配图标 -->
  <rect x="340" y="233" width="30" height="26" rx="4" fill="#409EFF"/>
  <rect x="355" y="233" width="30" height="26" rx="4" fill="#5aaeff"/>
  <text x="362" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">🔗</text>

  <!-- 智能体能力标签 -->
  <rect x="420" y="228" width="100" height="36" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="470" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">能力: Python</text>

  <rect x="550" y="228" width="100" height="36" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">能力: 设计</text>

  <!-- 最佳匹配标记 -->
  <rect x="670" y="232" width="60" height="28" rx="14" fill="#43a047"/>
  <text x="700" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">最佳匹配</text>

  <!-- 箭头2 -->
  <polygon points="400,284 390,274 410,274" fill="#1a1a2e"/>
  <line x1="400" y1="278" x2="400" y2="294" stroke="#1a1a2e" stroke-width="2"/>
  <text x="420" y="291" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">能力过滤</text>

  <!-- ====== 第三层：基于负载 ====== -->
  <rect x="50" y="304" width="700" height="90" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="50" y="304" width="700" height="32" rx="12" fill="url(#tier3Grad)"/>
  <rect x="50" y="324" width="700" height="12" fill="url(#tier3Grad)"/>

  <text x="70" y="325" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">第三层：基于负载</text>

  <!-- 智能体A -->
  <rect x="100" y="345" width="140" height="36" rx="8" fill="#f3f8ff" stroke="#409EFF" stroke-width="1"/>
  <text x="170" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">智能体 A</text>
  <rect x="110" y="365" width="120" height="10" rx="5" fill="#e0e0e0"/>
  <rect x="110" y="365" width="72" height="10" rx="5" fill="#409EFF"/>
  <text x="235" y="374" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">60%</text>

  <!-- 智能体B -->
  <rect x="290" y="345" width="140" height="36" rx="8" fill="#f3f8ff" stroke="#409EFF" stroke-width="1"/>
  <text x="360" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">智能体 B</text>
  <rect x="300" y="365" width="120" height="10" rx="5" fill="#e0e0e0"/>
  <rect x="300" y="365" width="24" height="10" rx="5" fill="#43a047"/>
  <text x="425" y="374" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">20%</text>

  <!-- 智能体C -->
  <rect x="480" y="345" width="140" height="36" rx="8" fill="#f3f8ff" stroke="#409EFF" stroke-width="1"/>
  <text x="550" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">智能体 C</text>
  <rect x="490" y="365" width="120" height="10" rx="5" fill="#e0e0e0"/>
  <rect x="490" y="365" width="96" height="10" rx="5" fill="#ff9800"/>
  <text x="615" y="374" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">80%</text>

  <!-- 选择标记 -->
  <rect x="650" y="348" width="80" height="28" rx="14" fill="#43a047"/>
  <text x="690" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">选择最轻负载</text>

  <!-- 底部流程总结 -->
  <rect x="180" y="420" width="440" height="50" rx="25" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">优先级排序 → 能力过滤 → 负载选择</text>
  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#90caf9">混合策略流程</text>

  <!-- 装饰元素 -->
  <circle cx="760" cy="445" r="8" fill="#409EFF" opacity="0.3"/>
  <circle cx="40" cy="445" r="8" fill="#409EFF" opacity="0.3"/>
  <circle cx="40" cy="55" r="5" fill="#409EFF" opacity="0.2"/>
  <circle cx="760" cy="55" r="5" fill="#409EFF" opacity="0.2"/>
</svg>