<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="cardRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">自动评估 vs 人工评估</text>

  <!-- ===== 左侧：自动评估 ===== -->
  <rect x="30" y="58" width="355" height="410" rx="14" fill="url(#cardLeft)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="30" y="58" width="355" height="36" rx="14" fill="#409EFF" fill-opacity="0.12"/>
  <text x="207" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">自动评估指标</text>

  <!-- ROUGE 行 -->
  <rect x="52" y="108" width="310" height="52" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="72" y="132" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">ROUGE</text>
  <text x="72" y="150" font-family="Arial, sans-serif" font-size="12" fill="#666">基于 n-gram 重叠</text>
  <!-- 红色 X -->
  <line x1="330" y1="118" x2="346" y2="134" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="346" y1="118" x2="330" y2="134" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BLEU 行 -->
  <rect x="52" y="170" width="310" height="52" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="72" y="194" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">BLEU</text>
  <text x="72" y="212" font-family="Arial, sans-serif" font-size="12" fill="#666">基于精确匹配</text>
  <line x1="330" y1="180" x2="346" y2="196" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="346" y1="180" x2="330" y2="196" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 缺失标注 -->
  <text x="207" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">缺失能力</text>

  <rect x="72" y="270" width="90" height="30" rx="6" fill="#FFF0F0" stroke="#E74C3C" stroke-width="1" stroke-opacity="0.4"/>
  <text x="117" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C0392B">流畅性</text>

  <rect x="172" y="270" width="90" height="30" rx="6" fill="#FFF0F0" stroke="#E74C3C" stroke-width="1" stroke-opacity="0.4"/>
  <text x="217" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C0392B">逻辑性</text>

  <rect x="272" y="270" width="90" height="30" rx="6" fill="#FFF0F0" stroke="#E74C3C" stroke-width="1" stroke-opacity="0.4"/>
  <text x="317" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C0392B">安全性</text>

  <!-- 左侧底部说明 -->
  <rect x="72" y="320" width="290" height="48" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1" stroke-opacity="0.4"/>
  <text x="217" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#B8860B">自动指标仅关注文本重叠</text>
  <text x="217" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#B8860B">无法评估语义质量</text>

  <!-- 左侧标注 -->
  <rect x="72" y="382" width="290" height="34" rx="6" fill="#409EFF" fill-opacity="0.08"/>
  <text x="217" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">标注：指标单一</text>

  <!-- ===== 右侧：人工评估 ===== -->
  <rect x="415" y="58" width="355" height="410" rx="14" fill="url(#cardRight)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="415" y="58" width="355" height="36" rx="14" fill="#409EFF" fill-opacity="0.12"/>
  <text x="592" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">人工评估</text>

  <!-- 人物图标 -->
  <circle cx="592" cy="130" r="18" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="592" cy="124" r="7" fill="#409EFF" fill-opacity="0.4"/>
  <ellipse cx="592" cy="142" rx="12" ry="8" fill="#409EFF" fill-opacity="0.2"/>
  <text x="592" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">评估员</text>

  <!-- 评分维度 -->
  <text x="592" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">1-5 星评分</text>

  <!-- 有用性 -->
  <rect x="440" y="206" width="305" height="36" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="458" y="230" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">有用性</text>
  <text x="540" y="230" font-family="Arial, sans-serif" font-size="12" fill="#666">回答是否实用</text>
  <!-- 星星 -->
  <text x="670" y="230" font-family="Arial, sans-serif" font-size="13" fill="#FFC107">★★★★★</text>

  <!-- 真实性 -->
  <rect x="440" y="250" width="305" height="36" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="458" y="274" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">真实性</text>
  <text x="540" y="274" font-family="Arial, sans-serif" font-size="12" fill="#666">信息是否准确</text>
  <text x="670" y="274" font-family="Arial, sans-serif" font-size="13" fill="#FFC107">★★★★☆</text>

  <!-- 无害性 -->
  <rect x="440" y="294" width="305" height="36" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="458" y="318" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">无害性</text>
  <text x="540" y="318" font-family="Arial, sans-serif" font-size="12" fill="#666">内容是否安全</text>
  <text x="670" y="318" font-family="Arial, sans-serif" font-size="13" fill="#FFC107">★★★★★</text>

  <!-- 流畅性 -->
  <rect x="440" y="338" width="305" height="36" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="458" y="362" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">流畅性</text>
  <text x="540" y="362" font-family="Arial, sans-serif" font-size="12" fill="#666">表达是否自然</text>
  <text x="670" y="362" font-family="Arial, sans-serif" font-size="13" fill="#FFC107">★★★★☆</text>

  <!-- 挑战框 -->
  <rect x="440" y="388" width="305" height="56" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1" stroke-opacity="0.4"/>
  <text x="592" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#E65100">挑战</text>
  <text x="460" y="428" font-family="Arial, sans-serif" font-size="11" fill="#BF360C">● 成本高</text>
  <text x="555" y="428" font-family="Arial, sans-serif" font-size="11" fill="#BF360C">● 一致性</text>
  <text x="650" y="428" font-family="Arial, sans-serif" font-size="11" fill="#BF360C">● 规模漂移</text>

  <!-- 右侧标注 -->
  <rect x="440" y="452" width="305" height="14" rx="4" fill="#409EFF" fill-opacity="0.08"/>
  <text x="592" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">标注：维度全面</text>

  <!-- 中间分隔线 -->
  <line x1="395" y1="70" x2="395" y2="460" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" stroke-opacity="0.2"/>

</svg>