<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#EAEAEA"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#D6EEFB"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">AI 幻觉：未验证 vs 有依据</text>

  <!-- 分割线 -->
  <line x1="400" y1="55" x2="400" y2="470" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 左侧区域 - 未验证 -->
  <rect x="30" y="60" width="340" height="410" fill="url(#leftGrad)" rx="10" opacity="0.5"/>
  <rect x="30" y="60" width="340" height="40" rx="10" fill="#D0D0D0"/>
  <rect x="30" y="80" width="340" height="20" fill="#D0D0D0"/>
  <text x="200" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#888888">❌ 未验证</text>

  <!-- 左侧机器人 -->
  <g transform="translate(200, 170)">
    <!-- 机器人身体 -->
    <rect x="-40" y="-10" width="80" height="70" rx="12" fill="#B0B0B0"/>
    <!-- 机器人头部 -->
    <rect x="-30" y="-50" width="60" height="45" rx="20" fill="#C0C0C0"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-32" r="6" fill="#666"/>
    <circle cx="12" cy="-32" r="6" fill="#666"/>
    <!-- 眼睛高光 -->
    <circle cx="-10" cy="-34" r="2" fill="#999"/>
    <circle cx="14" cy="-34" r="2" fill="#999"/>
    <!-- 天线 -->
    <line x1="0" y1="-50" x2="0" y2="-65" stroke="#999" stroke-width="3"/>
    <circle cx="0" cy="-68" r="5" fill="#999"/>
    <!-- 手臂 -->
    <rect x="-55" y="5" width="15" height="8" rx="4" fill="#B0B0B0"/>
    <rect x="40" y="5" width="15" height="8" rx="4" fill="#B0B0B0"/>
  </g>

  <!-- 左侧对话框 - 自信但错误 -->
  <g transform="translate(200, 270)">
    <rect x="-95" y="-30" width="190" height="60" rx="12" fill="white" stroke="#CCCCCC" stroke-width="1.5"/>
    <polygon points="-20,30 -10,45 0,30" fill="white" stroke="#CCCCCC" stroke-width="1.5"/>
    <line x1="-20" y1="30" x2="0" y2="30" stroke="white" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">珠穆朗玛峰</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">高 8848 米</text>
    <!-- 红色问号覆盖 -->
    <circle cx="70" cy="-20" r="16" fill="#FF6B6B" opacity="0.85"/>
    <text x="70" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">?</text>
  </g>

  <!-- 左侧标注 -->
  <g transform="translate(50, 360)">
    <circle cx="6" cy="6" r="6" fill="#FF6B6B"/>
    <text x="18" y="11" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">自信错误答案</text>
  </g>
  <g transform="translate(50, 395)">
    <circle cx="6" cy="6" r="6" fill="#FF6B6B"/>
    <text x="18" y="11" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">无事实核查</text>
  </g>
  <g transform="translate(50, 430)">
    <circle cx="6" cy="6" r="6" fill="#FF6B6B"/>
    <text x="18" y="11" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">误导用户</text>
  </g>

  <!-- 右侧区域 - 有依据 -->
  <rect x="430" y="60" width="340" height="410" fill="url(#rightGrad)" rx="10" opacity="0.5"/>
  <rect x="430" y="60" width="340" height="40" rx="10" fill="#409EFF"/>
  <rect x="430" y="80" width="340" height="20" fill="#409EFF"/>
  <text x="600" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">✅ 有依据（Grounding）</text>

  <!-- 右侧机器人 -->
  <g transform="translate(600, 170)">
    <!-- 机器人身体 -->
    <rect x="-40" y="-10" width="80" height="70" rx="12" fill="#409EFF"/>
    <!-- 机器人头部 -->
    <rect x="-30" y="-50" width="60" height="45" rx="20" fill="#5BA8FF"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-32" r="6" fill="white"/>
    <circle cx="12" cy="-32" r="6" fill="white"/>
    <!-- 眼睛高光 -->
    <circle cx="-10" cy="-34" r="2" fill="#B3D9FF"/>
    <circle cx="14" cy="-34" r="2" fill="#B3D9FF"/>
    <!-- 天线 -->
    <line x1="0" y1="-50" x2="0" y2="-65" stroke="#409EFF" stroke-width="3"/>
    <circle cx="0" cy="-68" r="5" fill="#409EFF"/>
    <!-- 手臂 -->
    <rect x="-55" y="5" width="15" height="8" rx="4" fill="#409EFF"/>
    <rect x="40" y="5" width="15" height="8" rx="4" fill="#409EFF"/>
  </g>

  <!-- 右侧思考气泡 -->
  <g transform="translate(600, 270)">
    <rect x="-95" y="-30" width="190" height="60" rx="12" fill="white" stroke="#409EFF" stroke-width="2"/>
    <polygon points="-20,30 -10,45 0,30" fill="white" stroke="#409EFF" stroke-width="2"/>
    <line x1="-20" y1="30" x2="0" y2="30" stroke="white" stroke-width="2"/>
    <!-- 问号 -->
    <text x="-30" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#409EFF">?</text>
    <!-- 放大镜 -->
    <g transform="translate(25, -5)">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#409EFF" stroke-width="3"/>
      <line x1="9" y1="9" x2="18" y2="18" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">搜索外部来源</text>
  </g>

  <!-- 右侧标注 -->
  <g transform="translate(460, 360)">
    <circle cx="6" cy="6" r="6" fill="#409EFF"/>
    <text x="18" y="11" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">验证信息</text>
  </g>
  <g transform="translate(460, 395)">
    <circle cx="6" cy="6" r="6" fill="#409EFF"/>
    <text x="18" y="11" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">引用可靠来源</text>
  </g>
  <g transform="translate(460, 430)">
    <circle cx="6" cy="6" r="6" fill="#409EFF"/>
    <text x="18" y="11" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">准确可信答案</text>
  </g>

  <!-- 底部提示 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#999">提示：AI 幻觉指模型生成看似合理但实际错误的内容</text>

</svg>