<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8ee6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 分界线 -->
  <line x1="400" y1="60" x2="400" y2="420" stroke="#c0d9f0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ========== 左侧：被动/反应型 ========== -->

  <!-- 标题框 -->
  <rect x="80" y="30" width="240" height="44" rx="8" fill="#e0e6ed" stroke="#b0b8c4" stroke-width="1.5"/>
  <text x="200" y="57" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#666">反应型机器人</text>

  <!-- 机器人主体 -->
  <rect x="140" y="100" width="120" height="120" rx="18" fill="#d5dce4" stroke="#b0b8c4" stroke-width="2"/>
  <!-- 头部 -->
  <rect x="165" y="110" width="70" height="50" rx="10" fill="#e8edf2" stroke="#b0b8c4" stroke-width="1.5"/>
  <!-- 眼睛 -->
  <circle cx="185" cy="132" r="6" fill="#999"/>
  <circle cx="215" cy="132" r="6" fill="#999"/>
  <!-- 天线 -->
  <line x1="200" y1="110" x2="200" y2="92" stroke="#b0b8c4" stroke-width="2.5"/>
  <circle cx="200" cy="88" r="6" fill="#b0b8c4"/>
  <!-- 身体 -->
  <rect x="170" y="168" width="60" height="42" rx="6" fill="#e0e6ed" stroke="#b0b8c4" stroke-width="1.5"/>
  <!-- 手臂 -->
  <rect x="140" y="175" width="24" height="10" rx="4" fill="#d0d8e0" stroke="#b0b8c4" stroke-width="1"/>
  <rect x="246" y="175" width="24" height="10" rx="4" fill="#d0d8e0" stroke="#b0b8c4" stroke-width="1"/>

  <!-- 桌子 -->
  <rect x="110" y="225" width="180" height="8" rx="2" fill="#c0c8d0"/>
  <rect x="120" y="233" width="8" height="40" fill="#c0c8d0"/>
  <rect x="272" y="233" width="8" height="40" fill="#c0c8d0"/>

  <!-- 铃铛/通知图标 -->
  <g transform="translate(175, 250)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#e8edf2" stroke="#b0b8c4" stroke-width="1.5"/>
    <text x="25" y="20" text-anchor="middle" font-size="16" fill="#999">🔔</text>
    <text x="25" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">等待指令</text>
  </g>

  <!-- 被动标签 -->
  <rect x="100" y="320" width="200" height="42" rx="8" fill="#e8edf2" stroke="#c0c8d0" stroke-width="1.5"/>
  <text x="200" y="347" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#888">被动：等待指令</text>

  <!-- 状态指示 -->
  <rect x="130" y="378" width="140" height="32" rx="6" fill="#f0f0f0" stroke="#d0d8e0" stroke-width="1"/>
  <text x="200" y="399" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#999">⏸ 空闲中</text>


  <!-- ========== 右侧：主动/前瞻型 ========== -->

  <!-- 标题框 -->
  <rect x="480" y="30" width="240" height="44" rx="8" fill="#409EFF" stroke="#3a8ee6" stroke-width="1.5"/>
  <text x="600" y="57" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff">前瞻型机器人</text>

  <!-- 机器人主体 -->
  <rect x="540" y="100" width="120" height="120" rx="18" fill="#e8f4ff" stroke="#409EFF" stroke-width="2"/>
  <!-- 头部 -->
  <rect x="565" y="110" width="70" height="50" rx="10" fill="#f0f8ff" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 眼睛（亮起） -->
  <circle cx="585" cy="132" r="6" fill="#409EFF"/>
  <circle cx="615" cy="132" r="6" fill="#409EFF"/>
  <!-- 天线 -->
  <line x1="600" y1="110" x2="600" y2="88" stroke="#409EFF" stroke-width="2.5"/>
  <circle cx="600" cy="84" r="7" fill="#409EFF"/>
  <!-- 身体 -->
  <rect x="570" y="168" width="60" height="42" rx="6" fill="#e8f4ff" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 手臂 -->
  <rect x="540" y="175" width="24" height="10" rx="4" fill="#d0e8ff" stroke="#409EFF" stroke-width="1"/>
  <rect x="646" y="175" width="24" height="10" rx="4" fill="#d0e8ff" stroke="#409EFF" stroke-width="1"/>

  <!-- 桌子 -->
  <rect x="510" y="225" width="180" height="8" rx="2" fill="#c0d8f0"/>
  <rect x="520" y="233" width="8" height="40" fill="#c0d8f0"/>
  <rect x="672" y="233" width="8" height="40" fill="#c0d8f0"/>

  <!-- 主动工作元素 -->

  <!-- 日历 -->
  <g transform="translate(500, 248)">
    <rect x="0" y="0" width="46" height="46" rx="6" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="0" y="0" width="46" height="14" rx="6" fill="#409EFF"/>
    <text x="23" y="11" text-anchor="middle" font-size="10" fill="#fff">15日</text>
    <circle cx="12" cy="28" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="23" cy="28" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="34" cy="28" r="4" fill="#409EFF" opacity="0.7"/>
    <circle cx="12" cy="38" r="4" fill="#409EFF" opacity="0.3"/>
    <circle cx="34" cy="38" r="4" fill="#409EFF" opacity="0.8"/>
    <text x="23" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">标记日期</text>
  </g>

  <!-- 报告 -->
  <g transform="translate(562, 248)">
    <rect x="0" y="0" width="46" height="46" rx="6" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="8" y="6" width="30" height="4" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="8" y="14" width="30" height="4" rx="2" fill="#409EFF" opacity="0.4"/>
    <rect x="8" y="22" width="22" height="4" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="8" y="30" width="30" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
    <text x="23" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">准备报告</text>
  </g>

  <!-- 放大镜 -->
  <g transform="translate(624, 248)">
    <rect x="0" y="0" width="46" height="46" rx="6" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="10" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="28" y1="28" x2="36" y2="36" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="23" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">发现机会</text>
  </g>

  <!-- 主动标签 -->
  <rect x="500" y="320" width="200" height="42" rx="8" fill="#e8f4ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="600" y="347" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">主动：预判并行动</text>

  <!-- 状态指示 -->
  <rect x="530" y="378" width="140" height="32" rx="6" fill="#e8f4ff" stroke="#409EFF" stroke-width="1"/>
  <text x="600" y="399" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">▶ 工作中</text>


  <!-- ========== 底部时间轴 ========== -->

  <g transform="translate(80, 440)">
    <!-- 箭头 -->
    <line x1="0" y1="0" x2="640" y2="0" stroke="#1a1a2e" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
      </marker>
    </defs>

    <!-- 时间点 -->
    <!-- 第1天 -->
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">第1天</text>

    <!-- 第15天 -->
    <line x1="213" y1="-6" x2="213" y2="6" stroke="#409EFF" stroke-width="2"/>
    <text x="213" y="20" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">第15天</text>

    <!-- 第20天 -->
    <line x1="426" y1="-6" x2="426" y2="6" stroke="#409EFF" stroke-width="2"/>
    <text x="426" y="20" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">第20天</text>

    <!-- 第28天 -->
    <line x1="640" y1="-6" x2="640" y2="6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="640" y="20" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">第28天</text>

    <!-- 主动区域高亮 -->
    <rect x="200" y="-14" width="240" height="28" rx="4" fill="#409EFF" opacity="0.12"/>

    <!-- 标签 -->
    <text x="540" y="-10" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">提前完成</text>
  </g>

</svg>