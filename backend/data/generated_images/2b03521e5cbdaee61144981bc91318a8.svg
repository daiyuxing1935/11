<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3890E0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 顶部标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AutoGen 多智能体架构</text>

  <!-- 智能体节点 -->
  <!-- AssistantAgent -->
  <rect x="100" y="72" width="180" height="70" rx="14" fill="url(#agentGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="190" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">AssistantAgent</text>
  <text x="190" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D6E9FF">助手智能体</text>

  <!-- UserProxyAgent -->
  <rect x="310" y="72" width="180" height="70" rx="14" fill="url(#agentGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="400" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">UserProxyAgent</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D6E9FF">用户代理智能体</text>

  <!-- GroupChatManager -->
  <rect x="520" y="72" width="180" height="70" rx="14" fill="url(#agentGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="610" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">GroupChatManager</text>
  <text x="610" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D6E9FF">群聊管理智能体</text>

  <!-- 双向箭头：AssistantAgent ↔ UserProxyAgent -->
  <line x1="280" y1="107" x2="310" y2="107" stroke="#409EFF" stroke-width="2.5" marker-start="url(#arrowLeft)" marker-end="url(#arrowRight)"/>
  <polygon points="280,107 288,102 288,112" fill="#409EFF"/>
  <polygon points="310,107 302,102 302,112" fill="#409EFF"/>

  <!-- 双向箭头：UserProxyAgent ↔ GroupChatManager -->
  <line x1="490" y1="107" x2="520" y2="107" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="490,107 498,102 498,112" fill="#409EFF"/>
  <polygon points="520,107 512,102 512,112" fill="#409EFF"/>

  <!-- 标注：消息流 -->
  <text x="295" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">消息</text>
  <text x="505" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">消息</text>

  <!-- 分隔线 -->
  <line x1="60" y1="172" x2="740" y2="172" stroke="#B0D4F0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 下方流程标题 -->
  <text x="400" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">对话驱动编程范式</text>

  <!-- 流程步骤 -->
  <!-- 步骤1: Message Send -->
  <rect x="60" y="225" width="140" height="48" rx="24" fill="url(#pillGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="130" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">发送消息</text>

  <!-- 箭头 1→2 -->
  <line x1="200" y1="249" x2="245" y2="249" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="245,249 237,244 237,254" fill="#409EFF"/>

  <!-- 步骤2: Receive -->
  <rect x="250" y="225" width="140" height="48" rx="24" fill="url(#pillGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="320" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">接收消息</text>

  <!-- 箭头 2→3 -->
  <line x1="390" y1="249" x2="435" y2="249" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="435,249 427,244 427,254" fill="#409EFF"/>

  <!-- 步骤3: Generate Reply -->
  <rect x="440" y="225" width="150" height="48" rx="24" fill="url(#pillGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="515" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">生成回复</text>

  <!-- 箭头 3→4 -->
  <line x1="590" y1="249" x2="625" y2="249" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="625,249 617,244 617,254" fill="#409EFF"/>

  <!-- 步骤4: Send -->
  <rect x="630" y="225" width="120" height="48" rx="24" fill="url(#pillGrad)" stroke="#2E7DCC" stroke-width="1.5"/>
  <text x="690" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">发送回复</text>

  <!-- 循环箭头（从步骤4回到步骤1） -->
  <path d="M 690 273 Q 690 310 400 310 Q 110 310 130 273" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="130,273 138,268 138,278" fill="#409EFF"/>
  <text x="400" y="328" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#409EFF" font-style="italic">循环对话</text>

  <!-- 图标：对话气泡（步骤1上方） -->
  <g transform="translate(100, 205)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="16,14 22,20 16,20" fill="#409EFF" opacity="0.4"/>
  </g>

  <!-- 图标：齿轮（步骤3上方） -->
  <g transform="translate(500, 205)">
    <circle cx="10" cy="10" r="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="2.5" fill="#409EFF"/>
    <line x1="10" y1="2" x2="10" y2="4" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="10" y1="16" x2="10" y2="18" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="2" y1="10" x2="4" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="16" y1="10" x2="18" y2="10" stroke="#409EFF" stroke-width="1.5"/>
  </g>

  <!-- 底部标注区域 -->
  <rect x="60" y="360" width="680" height="110" rx="10" fill="#FFFFFF" fill-opacity="0.6" stroke="#B0D4F0" stroke-width="1"/>

  <!-- 标注1 -->
  <circle cx="100" cy="395" r="10" fill="#409EFF"/>
  <text x="100" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="120" y="400" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">多智能体协作</text>

  <!-- 标注2 -->
  <circle cx="100" cy="435" r="10" fill="#409EFF"/>
  <text x="100" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="120" y="440" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">双向消息传递</text>

  <!-- 标注3 -->
  <circle cx="320" cy="395" r="10" fill="#409EFF"/>
  <text x="320" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="340" y="400" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">对话驱动</text>

  <!-- 标注4 -->
  <circle cx="320" cy="435" r="10" fill="#409EFF"/>
  <text x="320" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="340" y="440" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">自动回复生成</text>

  <!-- 标注5 -->
  <circle cx="560" cy="395" r="10" fill="#409EFF"/>
  <text x="560" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="580" y="400" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">群聊管理</text>

  <!-- 标注6 -->
  <circle cx="560" cy="435" r="10" fill="#409EFF"/>
  <text x="560" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="580" y="440" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">循环迭代</text>

</svg>