<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f8ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="white"/>
  <rect width="800" height="500" fill="url(#bgGrad)" opacity="0.6"/>

  <!-- 蓝图网格背景 -->
  <g opacity="0.08">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#409EFF" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="500" fill="url(#grid)"/>
  </g>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">智能体架构分层示意图</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- 建筑主体外框 -->
  <rect x="220" y="65" width="360" height="380" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>

  <!-- 第四层：感知层（顶部） -->
  <rect x="235" y="75" width="330" height="80" rx="4" fill="url(#floorGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">感知层</text>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Perception Layer</text>

  <!-- 感知层图标：眼睛、耳朵、传感器 -->
  <g transform="translate(280, 130)">
    <circle cx="0" cy="0" r="10" fill="#409EFF" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="6" ry="4" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <circle cx="0" cy="-1" r="2" fill="#409EFF"/>
  </g>
  <g transform="translate(340, 130)">
    <circle cx="0" cy="0" r="10" fill="#409EFF" opacity="0.15"/>
    <path d="M-5,-4 Q0,-8 5,-4 Q6,0 5,4 Q0,8 -5,4 Q-6,0 -5,-4Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#409EFF"/>
  </g>
  <g transform="translate(400, 130)">
    <circle cx="0" cy="0" r="10" fill="#409EFF" opacity="0.15"/>
    <path d="M-5,-5 L5,-5 L5,5 L-5,5Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <path d="M-3,-3 L3,-3 L3,3 L-3,3Z" fill="none" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#409EFF" stroke-width="0.8"/>
  </g>
  <g transform="translate(460, 130)">
    <circle cx="0" cy="0" r="10" fill="#409EFF" opacity="0.15"/>
    <path d="M-4,-4 L4,-4 L4,4 L-4,4Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#409EFF"/>
    <path d="M-6,0 L-4,0 M4,0 L6,0 M0,-6 L0,-4 M0,4 L0,6" stroke="#409EFF" stroke-width="0.8"/>
  </g>

  <!-- 输入箭头（从外部指向感知层） -->
  <g fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6">
    <line x1="130" y1="95" x2="225" y2="100"/>
    <polygon points="225,100 215,93 215,107" fill="#409EFF" opacity="0.5"/>
    <line x1="130" y1="115" x2="225" y2="115"/>
    <polygon points="225,115 215,108 215,122" fill="#409EFF" opacity="0.5"/>
    <line x1="130" y1="135" x2="225" y2="130"/>
    <polygon points="225,130 215,123 215,137" fill="#409EFF" opacity="0.5"/>
  </g>
  <text x="145" y="118" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">输入</text>

  <!-- 层间分隔线 -->
  <line x1="235" y1="155" x2="565" y2="155" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>

  <!-- 第三层：推理层（核心，高亮） -->
  <rect x="235" y="160" width="330" height="80" rx="4" fill="#e6f0ff" stroke="#409EFF" stroke-width="2"/>
  <rect x="235" y="160" width="330" height="80" rx="4" fill="#409EFF" opacity="0.06"/>
  <text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">推理层</text>
  <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Reasoning Layer</text>

  <!-- 核心标记 -->
  <rect x="530" y="168" width="28" height="16" rx="8" fill="#409EFF" opacity="0.2"/>
  <text x="544" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">核心</text>

  <!-- 推理层图标：大脑、决策树 -->
  <g transform="translate(300, 215)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.12"/>
    <path d="M-6,-4 Q-8,0 -6,4 Q-3,8 0,6 Q3,8 6,4 Q8,0 6,-4 Q3,-8 0,-6 Q-3,-8 -6,-4Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <path d="M-3,-2 Q0,-4 3,-2 Q4,0 3,2 Q0,4 -3,2 Q-4,0 -3,-2Z" fill="none" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="-2" y1="0" x2="2" y2="0" stroke="#409EFF" stroke-width="0.8"/>
  </g>
  <g transform="translate(370, 215)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.12"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#409EFF" stroke-width="1"/>
    <line x1="-4" y1="1" x2="4" y2="1" stroke="#409EFF" stroke-width="1"/>
    <line x1="-3" y1="5" x2="3" y2="5" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="0" cy="-7" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="-5" cy="-3" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="5" cy="-3" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="-4" cy="1" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="4" cy="1" r="2" fill="#409EFF" opacity="0.5"/>
  </g>
  <g transform="translate(440, 215)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.12"/>
    <path d="M-5,-5 L5,-5 L0,5Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <circle cx="0" cy="-3" r="1.5" fill="#409EFF" opacity="0.5"/>
    <circle cx="-3" cy="2" r="1.5" fill="#409EFF" opacity="0.5"/>
    <circle cx="3" cy="2" r="1.5" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 层间分隔线 -->
  <line x1="235" y1="240" x2="565" y2="240" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>

  <!-- 第二层：记忆层 -->
  <rect x="235" y="245" width="330" height="80" rx="4" fill="url(#floorGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">记忆层</text>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Memory Layer</text>

  <!-- 记忆层图标：数据库、归档 -->
  <g transform="translate(290, 300)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.1"/>
    <ellipse cx="0" cy="-4" rx="8" ry="3" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <ellipse cx="0" cy="4" rx="8" ry="3" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-8" y1="-4" x2="-8" y2="4" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="8" y1="-4" x2="8" y2="4" stroke="#409EFF" stroke-width="0.8"/>
  </g>
  <g transform="translate(360, 300)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.1"/>
    <rect x="-7" y="-5" width="14" height="10" rx="1" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-5" y1="-2" x2="5" y2="-2" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="-5" y1="1" x2="5" y2="1" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="-3" y="-8" width="6" height="4" rx="1" fill="none" stroke="#409EFF" stroke-width="0.8"/>
  </g>
  <g transform="translate(430, 300)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.1"/>
    <rect x="-6" y="-6" width="12" height="12" rx="1" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-4" y1="-3" x2="4" y2="-3" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="-4" y1="3" x2="4" y2="3" stroke="#409EFF" stroke-width="0.8"/>
  </g>
  <g transform="translate(490, 300)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.1"/>
    <path d="M-5,-4 L5,-4 L5,4 L-5,4Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <path d="M-3,-2 L3,-2 L3,2 L-3,2Z" fill="none" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="1.5" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 层间分隔线 -->
  <line x1="235" y1="325" x2="565" y2="325" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>

  <!-- 第一层：执行层（底部） -->
  <rect x="235" y="330" width="330" height="80" rx="4" fill="url(#floorGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">执行层</text>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">Execution Layer</text>

  <!-- 执行层图标：齿轮、工具 -->
  <g transform="translate(290, 388)">
    <circle cx="0" cy="0" r="12" fill="#1a1a2e" opacity="0.08"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#1a1a2e" opacity="0.4"/>
    <line x1="0" y1="-6" x2="0" y2="-8" stroke="#1a1a2e" stroke-width="1.2"/>
    <line x1="0" y1="6" x2="0" y2="8" stroke="#1a1a2e" stroke-width="1.2"/>
    <line x1="-6" y1="0" x2="-8" y2="0" stroke="#1a1a2e" stroke-width="1.2"/>
    <line x1="6" y1="0" x2="8" y2="0" stroke="#1a1a2e" stroke-width="1.2"/>
  </g>
  <g transform="translate(350, 388)">
    <circle cx="0" cy="0" r="12" fill="#1a1a2e" opacity="0.08"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#1a1a2e" opacity="0.4"/>
    <path d="M-6,-6 L-2,-2 M6,6 L2,2 M-6,6 L-2,2 M6,-6 L2,-2" stroke="#1a1a2e" stroke-width="0.8"/>
  </g>
  <g transform="translate(410, 388)">
    <circle cx="0" cy="0" r="12" fill="#1a1a2e" opacity="0.08"/>
    <rect x="-5" y="-6" width="10" height="12" rx="1" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
    <line x1="-3" y1="-3" x2="3" y2="-3" stroke="#1a1a2e" stroke-width="0.8"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#1a1a2e" stroke-width="0.8"/>
    <line x1="-3" y1="3" x2="3" y2="3" stroke="#1a1a2e" stroke-width="0.8"/>
  </g>
  <g transform="translate(470, 388)">
    <circle cx="0" cy="0" r="12" fill="#1a1a2e" opacity="0.08"/>
    <path d="M-5,-4 L5,-4 L5,4 L-5,4Z" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
    <path d="M-3,-2 L3,-2 L3,2 L-3,2Z" fill="none" stroke="#1a1a2e" stroke-width="0.8"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#1a1a2e" stroke-width="0.8"/>
  </g>

  <!-- 电梯井（层间通信） -->
  <rect x="555" y="80" width="6" height="325" rx="3" fill="#409EFF" opacity="0.08"/>
  <rect x="556" y="80" width="4" height="325" rx="2" fill="#409EFF" opacity="0.06"/>
  <!-- 电梯轿厢 -->
  <rect x="554" y="155" width="8" height="10" rx="2" fill="#409EFF" opacity="0.25"/>
  <rect x="554" y="240" width="8" height="10" rx="2" fill="#409EFF" opacity="0.25"/>
  <rect x="554" y="325" width="8" height="10" rx="2" fill="#409EFF" opacity="0.25"/>

  <!-- 通信箭头（电梯井旁） -->
  <g fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3">
    <line x1="570" y1="130" x2="570" y2="190"/>
    <polygon points="570,190 566,182 574,182" fill="#409EFF" opacity="0.3"/>
    <line x1="570" y1="215" x2="570" y2="275"/>
    <polygon points="570,275 566,267 574,267" fill="#409EFF" opacity="0.3"/>
    <line x1="570" y1="300" x2="570" y2="360"/>
    <polygon points="570,360 566,352 574,352" fill="#409EFF" opacity="0.3"/>
  </g>

  <!-- 标注 -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">
    <!-- 标注1：感知输入 -->
    <line x1="130" y1="140" x2="100" y2="170" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="130" cy="140" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="70" y="178" text-anchor="middle" font-size="13" fill="#1a1a2e">外部输入</text>

    <!-- 标注2：核心推理 -->
    <line x1="580" y1="200" x2="620" y2="200" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="580" cy="200" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="640" y="196" text-anchor="middle" font-size="13" fill="#1a1a2e">核心推理</text>
    <text x="640" y="212" text-anchor="middle" font-size="11" fill="#666">决策生成</text>

    <!-- 标注3：记忆存储 -->
    <line x1="580" y1="285" x2="620" y2="285" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="580" cy="285" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="640" y="281" text-anchor="middle" font-size="13" fill="#1a1a2e">记忆存储</text>
    <text x="640" y="297" text-anchor="middle" font-size="11" fill="#666">经验回放</text>

    <!-- 标注4：执行输出 -->
    <line x1="580" y1="370" x2="620" y2="370" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="580" cy="370" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="640" y="366" text-anchor="middle" font-size="13" fill="#1a1a2e">动作执行</text>
    <text x="640" y="382" text-anchor="middle" font-size="11" fill="#666">环境交互</text>

    <!-- 标注5：层间通信 -->
    <line x1="570" y1="160" x2="620" y2="140" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="570" cy="160" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="640" y="136" text-anchor="middle" font-size="13" fill="#1a1a2e">层间通信</text>
    <text x="640" y="152" text-anchor="middle" font-size="11" fill="#666">接口调用</text>

    <!-- 标注6：建筑隐喻 -->
    <line x1="220" y1="420" x2="160" y2="445" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="220" cy="420" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="140" y="455" text-anchor="middle" font-size="13" fill="#1a1a2e">建筑隐喻</text>
    <text x="140" y="471" text-anchor="middle" font-size="11" fill="#666">分层架构</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#999">智能体架构 · 从感知到执行的完整链路</text>

  <!-- 装饰性角落标记 -->
  <g stroke="#409EFF" stroke-width="0.8" opacity="0.15" fill="none">
    <path d="M10,10 L40,10 M10,10 L10,40"/>
    <path d="M790,10 L760,10 M790,10 L790,40"/>
    <path d="M10,490 L40,490 M10,490 L10,460"/>
    <path d="M790,490 L760,490 M790,490 L790,460"/>
  </g>
</svg>