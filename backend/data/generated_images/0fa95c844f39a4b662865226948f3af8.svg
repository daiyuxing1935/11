<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0B8C4"/>
      <stop offset="100%" stop-color="#C8D0DC"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 左侧：聊天机器人区域（灰色） -->
  <rect x="30" y="30" width="340" height="440" fill="rgba(176,184,196,0.08)" rx="12"/>
  <!-- 左侧标签 -->
  <rect x="100" y="40" width="200" height="32" rx="16" fill="#1a1a2e"/>
  <text x="200" y="61" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">🤖 ChatBot = 只说不做</text>

  <!-- 聊天机器人头部 -->
  <g transform="translate(200, 140)">
    <!-- 机器人头 -->
    <rect x="-45" y="-50" width="90" height="75" rx="20" fill="url(#grayGrad)"/>
    <!-- 眼睛 -->
    <circle cx="-18" cy="-25" r="8" fill="#1a1a2e"/>
    <circle cx="18" cy="-25" r="8" fill="#1a1a2e"/>
    <circle cx="-16" cy="-23" r="3" fill="white"/>
    <circle cx="20" cy="-23" r="3" fill="white"/>
    <!-- 大嘴巴（说话中） -->
    <ellipse cx="0" cy="5" rx="22" ry="12" fill="#1a1a2e"/>
    <ellipse cx="0" cy="3" rx="16" ry="7" fill="#E83E3E"/>
    <!-- 天线 -->
    <rect x="-4" y="-62" width="8" height="14" rx="4" fill="#9098A4"/>
    <circle cx="0" cy="-66" r="6" fill="#E83E3E"/>
    <!-- 说话气泡 -->
    <g transform="translate(55, -40)">
      <path d="M0,0 Q-8,-10 5,-15 L30,-15 Q40,-15 40,-5 L40,10 Q40,20 30,20 L10,20 L0,30 L3,18 Q-5,18 -5,10 L-5,0 Q-5,-8 0,0Z" fill="white" stroke="#B0B8C4" stroke-width="1.5"/>
      <text x="18" y="5" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="sans-serif">你好！</text>
    </g>
    <g transform="translate(-75, -50)">
      <path d="M0,0 Q8,-10 -5,-15 L-30,-15 Q-40,-15 -40,-5 L-40,10 Q-40,20 -30,20 L-10,20 L0,30 L-3,18 Q5,18 5,10 L5,0 Q5,-8 0,0Z" fill="white" stroke="#B0B8C4" stroke-width="1.5"/>
      <text x="-18" y="5" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="sans-serif">我能帮你吗？</text>
    </g>
  </g>

  <!-- 玻璃墙 -->
  <rect x="80" y="100" width="240" height="180" rx="8" fill="url(#glassGrad)" stroke="rgba(176,184,196,0.5)" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="80" y1="280" x2="320" y2="280" stroke="rgba(176,184,196,0.6)" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 玻璃反光 -->
  <line x1="90" y1="110" x2="110" y2="100" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>

  <!-- 左侧标注：嘴巴 -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#1a1a2e"/>
    <text x="60" y="19" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="sans-serif">👄 只会说话</text>
  </g>
  <line x1="190" y1="310" x2="200" y2="230" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 左侧标注：无法行动 -->
  <g transform="translate(130, 360)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#9098A4"/>
    <text x="60" y="19" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif">🚫 无法行动</text>
  </g>
  <line x1="190" y1="360" x2="200" y2="280" stroke="#9098A4" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 中间：转换公式 -->
  <g transform="translate(370, 240)">
    <text x="0" y="0" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">ChatBot</text>
    <text x="0" y="20" text-anchor="middle" fill="#409EFF" font-size="16" font-family="sans-serif">+</text>
    <text x="0" y="40" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">工具 + 规划</text>
    <text x="0" y="58" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">+ 记忆 + 执行</text>
    <text x="0" y="80" text-anchor="middle" fill="#409EFF" font-size="18" font-weight="bold" font-family="sans-serif">=</text>
    <text x="0" y="102" text-anchor="middle" fill="#409EFF" font-size="16" font-weight="bold" font-family="sans-serif">Agent</text>
  </g>

  <!-- 右侧：Agent 区域（蓝色） -->
  <rect x="430" y="30" width="340" height="440" fill="rgba(64,158,255,0.06)" rx="12"/>
  <!-- 右侧标签 -->
  <rect x="500" y="40" width="200" height="32" rx="16" fill="#409EFF"/>
  <text x="600" y="61" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">🛠️ Agent = 动手实干</text>

  <!-- Agent 机器人（破墙而出） -->
  <g transform="translate(600, 160)">
    <!-- 机器人头 -->
    <rect x="-40" y="-55" width="80" height="70" rx="18" fill="url(#blueGrad)"/>
    <!-- 眼睛（更智能） -->
    <rect x="-20" y="-30" width="14" height="10" rx="3" fill="#1a1a2e"/>
    <rect x="6" y="-30" width="14" height="10" rx="3" fill="#1a1a2e"/>
    <circle cx="-13" cy="-25" r="3" fill="#6BB5FF"/>
    <circle cx="13" cy="-25" r="3" fill="#6BB5FF"/>
    <!-- 微笑 -->
    <path d="M-12,0 Q0,12 12,0" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 天线 -->
    <rect x="-3" y="-67" width="6" height="14" rx="3" fill="#1a1a2e"/>
    <circle cx="0" cy="-70" r="5" fill="#FFD700"/>

    <!-- 身体 -->
    <rect x="-30" y="15" width="60" height="50" rx="10" fill="#409EFF"/>

    <!-- 左臂 - 拿扳手 -->
    <g transform="translate(-40, 25)">
      <rect x="-35" y="-5" width="35" height="10" rx="5" fill="#409EFF"/>
      <!-- 扳手 -->
      <rect x="-50" y="-8" width="18" height="16" rx="3" fill="#FFD700"/>
      <circle cx="-41" cy="0" r="4" fill="#1a1a2e"/>
    </g>

    <!-- 右臂 - 点击鼠标 -->
    <g transform="translate(40, 30)">
      <rect x="0" y="-5" width="35" height="10" rx="5" fill="#409EFF"/>
      <!-- 鼠标 -->
      <rect x="30" y="-12" width="20" height="24" rx="10" fill="#1a1a2e"/>
      <line x1="40" y1="0" x2="40" y2="8" stroke="#409EFF" stroke-width="2"/>
      <circle cx="40" cy="-2" r="3" fill="#409EFF"/>
    </g>

    <!-- 破墙碎片 -->
    <polygon points="-55,-60 -45,-70 -50,-55" fill="rgba(176,184,196,0.4)"/>
    <polygon points="55,-60 65,-50 58,-45" fill="rgba(176,184,196,0.3)"/>
    <polygon points="-60,10 -70,5 -62,20" fill="rgba(176,184,196,0.35)"/>
    <polygon points="60,30 72,25 65,40" fill="rgba(176,184,196,0.3)"/>
  </g>

  <!-- 破墙效果 -->
  <g transform="translate(560, 100)">
    <line x1="0" y1="0" x2="0" y2="180" stroke="#B0B8C4" stroke-width="3" stroke-dasharray="8,4"/>
    <line x1="-10" y1="20" x2="-20" y2="10" stroke="#B0B8C4" stroke-width="2"/>
    <line x1="-10" y1="160" x2="-20" y2="170" stroke="#B0B8C4" stroke-width="2"/>
    <!-- 断裂效果 -->
    <path d="M-3,40 L5,45 L-2,55 L6,60" fill="none" stroke="#B0B8C4" stroke-width="2"/>
    <path d="M-3,120 L5,125 L-2,135 L6,140" fill="none" stroke="#B0B8C4" stroke-width="2"/>
  </g>

  <!-- 右侧标注：动手能力 -->
  <g transform="translate(540, 310)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#409EFF"/>
    <text x="65" y="19" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="sans-serif">🔧 动手实干</text>
  </g>
  <line x1="605" y1="310" x2="600" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 右侧标注：破墙而出 -->
  <g transform="translate(540, 360)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#1a1a2e"/>
    <text x="65" y="19" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="sans-serif">💥 破墙而出</text>
  </g>
  <line x1="605" y1="360" x2="570" y2="280" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 底部：漏斗图 -->
  <g transform="translate(400, 430)">
    <!-- 漏斗上半部（宽） -->
    <path d="M-120,0 L120,0 L80,-30 L-80,-30 Z" fill="rgba(176,184,196,0.25)" stroke="#B0B8C4" stroke-width="1.5"/>
    <!-- 漏斗下半部（窄） -->
    <path d="M-80,-30 L80,-30 L40,-65 L-40,-65 Z" fill="rgba(64,158,255,0.2)" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 上半部文字 -->
    <text x="0" y="-10" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="sans-serif">简单问题 → ChatBot（快速、便宜）</text>

    <!-- 下半部文字 -->
    <text x="0" y="-45" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="sans-serif">复杂任务 → Agent（深入、强大）</text>

    <!-- 漏斗底部箭头 -->
    <polygon points="-8,-65 8,-65 0,-72" fill="#409EFF"/>
  </g>

  <!-- 底部协作说明 -->
  <g transform="translate(400, 475)">
    <text x="0" y="0" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">两者协作，打造完整产品体验</text>
  </g>

  <!-- 分割线 -->
  <line x1="370" y1="50" x2="370" y2="460" stroke="#B0B8C4" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

</svg>