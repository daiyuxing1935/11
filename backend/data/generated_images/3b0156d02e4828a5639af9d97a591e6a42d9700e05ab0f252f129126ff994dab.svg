<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60B0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="agentAGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE8"/>
    </linearGradient>
    <linearGradient id="agentBGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA3E6"/>
      <stop offset="100%" stop-color="#3A8BD9"/>
    </linearGradient>
    <linearGradient id="agentCGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BB8F0"/>
      <stop offset="100%" stop-color="#5A9EE0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 分割线 -->
  <line x1="400" y1="60" x2="400" y2="470" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>

  <!-- ==================== 左侧：单智能体 ==================== -->
  <!-- 标题 -->
  <text x="200" y="48" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">单智能体模式</text>

  <!-- 标签：简单架构，低成本 -->
  <rect x="95" y="62" width="210" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
  <text x="200" y="81" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#409EFF" font-weight="bold">简单架构 · 低成本</text>

  <!-- 机器人主体 -->
  <g filter="url(#shadow)">
    <!-- 机器人身体 -->
    <rect x="155" y="120" width="90" height="100" rx="14" fill="url(#blueGrad)"/>
    <!-- 机器人头部 -->
    <rect x="165" y="100" width="70" height="40" rx="10" fill="url(#blueGrad)"/>
    <!-- 天线 -->
    <line x1="200" y1="85" x2="200" y2="100" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="82" r="5" fill="#409EFF"/>
    <!-- 眼睛 -->
    <circle cx="182" cy="118" r="5" fill="white"/>
    <circle cx="218" cy="118" r="5" fill="white"/>
    <circle cx="182" cy="118" r="2.5" fill="#1a1a2e"/>
    <circle cx="218" cy="118" r="2.5" fill="#1a1a2e"/>
    <!-- 嘴巴 -->
    <rect x="185" y="130" width="30" height="4" rx="2" fill="white" opacity="0.8"/>
    <!-- 手臂 -->
    <rect x="140" y="135" width="15" height="8" rx="4" fill="#60B0FF"/>
    <rect x="245" y="135" width="15" height="8" rx="4" fill="#60B0FF"/>
    <!-- 腿 -->
    <rect x="170" y="220" width="12" height="20" rx="4" fill="#60B0FF"/>
    <rect x="218" y="220" width="12" height="20" rx="4" fill="#60B0FF"/>
  </g>

  <!-- 汗水（表示过载） -->
  <g opacity="0.7">
    <path d="M235 100 Q240 90 238 82 Q236 90 235 100Z" fill="#FFD700"/>
    <path d="M250 108 Q256 96 254 87 Q252 96 250 108Z" fill="#FFD700"/>
    <path d="M242 115 Q248 104 246 96 Q244 104 242 115Z" fill="#FFD700" opacity="0.5"/>
  </g>

  <!-- 线性流程箭头 -->
  <g>
    <!-- 理解 → 推理 -->
    <text x="200" y="270" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">理解</text>
    <line x1="200" y1="278" x2="200" y2="298" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <polygon points="196,295 200,305 204,295" fill="#409EFF"/>

    <text x="200" y="325" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">推理</text>
    <line x1="200" y1="333" x2="200" y2="353" stroke="#409EFF" stroke-width="2"/>
    <polygon points="196,350 200,360 204,350" fill="#409EFF"/>

    <text x="200" y="380" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">调用工具</text>
    <line x1="200" y1="388" x2="200" y2="408" stroke="#409EFF" stroke-width="2"/>
    <polygon points="196,405 200,415 204,405" fill="#409EFF"/>

    <text x="200" y="435" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">生成结果</text>
  </g>

  <!-- 过载标注 -->
  <text x="260" y="155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#E6A23C" font-style="italic">⚡ 负载过重</text>

  <!-- ==================== 右侧：多智能体 ==================== -->
  <!-- 标题 -->
  <text x="600" y="48" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">多智能体模式</text>

  <!-- 标签：专业化，并行，交叉验证 -->
  <rect x="495" y="62" width="210" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
  <text x="600" y="81" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#409EFF" font-weight="bold">专业化 · 并行 · 交叉验证</text>

  <!-- 编排器（Orchestrator） -->
  <g filter="url(#shadow)">
    <rect x="545" y="108" width="110" height="44" rx="10" fill="url(#darkGrad)"/>
    <text x="600" y="128" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="white" font-weight="bold">🧠 编排器</text>
    <text x="600" y="144" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" fill="#A0C4FF">任务分配与调度</text>
  </g>

  <!-- 编排器到三个智能体的连线 -->
  <line x1="555" y1="152" x2="470" y2="210" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
  <line x1="600" y1="152" x2="600" y2="210" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
  <line x1="645" y1="152" x2="730" y2="210" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>

  <!-- 智能体A -->
  <g filter="url(#shadow)">
    <rect x="415" y="210" width="110" height="70" rx="10" fill="url(#agentAGrad)"/>
    <text x="470" y="238" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="white" font-weight="bold">智能体 A</text>
    <text x="470" y="258" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="white" opacity="0.9">数据检索</text>
  </g>

  <!-- 智能体B -->
  <g filter="url(#shadow)">
    <rect x="545" y="210" width="110" height="70" rx="10" fill="url(#agentBGrad)"/>
    <text x="600" y="238" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="white" font-weight="bold">智能体 B</text>
    <text x="600" y="258" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="white" opacity="0.9">逻辑推理</text>
  </g>

  <!-- 智能体C -->
  <g filter="url(#shadow)">
    <rect x="675" y="210" width="110" height="70" rx="10" fill="url(#agentCGrad)"/>
    <text x="730" y="238" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="white" font-weight="bold">智能体 C</text>
    <text x="730" y="258" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="white" opacity="0.9">工具调用</text>
  </g>

  <!-- 并行标注 -->
  <text x="600" y="200" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF" font-weight="bold">并行执行 →</text>

  <!-- 汇聚箭头 -->
  <line x1="470" y1="280" x2="470" y2="330" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <line x1="600" y1="280" x2="600" y2="330" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <line x1="730" y1="280" x2="730" y2="330" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>

  <!-- 汇聚横线 -->
  <line x1="470" y1="330" x2="730" y2="330" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <line x1="600" y1="330" x2="600" y2="355" stroke="#409EFF" stroke-width="2"/>
  <polygon points="596,352 600,362 604,352" fill="#409EFF"/>

  <!-- 聚合器 -->
  <g filter="url(#shadow)">
    <rect x="545" y="362" width="110" height="44" rx="10" fill="url(#darkGrad)"/>
    <text x="600" y="382" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="white" font-weight="bold">📊 聚合器</text>
    <text x="600" y="398" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" fill="#A0C4FF">结果汇总与验证</text>
  </g>

  <!-- 交叉验证标注 -->
  <text x="750" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#67C23A" font-weight="bold">✓ 交叉验证</text>

  <!-- 底部对比标注 -->
  <rect x="50" y="465" width="140" height="24" rx="12" fill="#409EFF" opacity="0.08"/>
  <text x="120" y="482" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF">串行处理，单点故障</text>

  <rect x="610" y="465" width="140" height="24" rx="12" fill="#409EFF" opacity="0.08"/>
  <text x="680" y="482" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#409EFF">容错性强，协同高效</text>

</svg>