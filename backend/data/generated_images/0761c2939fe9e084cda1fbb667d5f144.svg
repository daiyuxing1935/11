<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">智能客服平台 · 生产多智能体系统架构</text>

  <!-- ====== 顶层：用户入口层 ====== -->
  <rect x="30" y="50" width="740" height="90" rx="10" fill="url(#layerGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="50" width="740" height="24" rx="10" fill="#409EFF"/>
  <rect x="30" y="62" width="740" height="12" fill="#409EFF"/>
  <text x="400" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">用户入口层</text>

  <!-- 用户入口节点 -->
  <rect x="60" y="85" width="100" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="110" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">Web</text>

  <rect x="190" y="85" width="100" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="240" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">App</text>

  <rect x="320" y="85" width="100" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="370" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">API</text>

  <!-- 箭头 -->
  <line x1="420" y1="103" x2="470" y2="103" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- API网关 -->
  <rect x="480" y="80" width="260" height="46" rx="8" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">API 网关</text>
  <text x="610" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">认证 · 限流 · 路由</text>

  <!-- ====== 连接箭头：顶层→中层 ====== -->
  <line x1="400" y1="140" x2="400" y2="175" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="396,172 400,180 404,172" fill="#409EFF"/>

  <!-- ====== 中层：会话管理与智能体集群 ====== -->
  <rect x="30" y="185" width="740" height="175" rx="10" fill="url(#layerGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="185" width="740" height="24" rx="10" fill="#409EFF"/>
  <rect x="30" y="197" width="740" height="12" fill="#409EFF"/>
  <text x="400" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">智能体服务层</text>

  <!-- 会话管理 -->
  <rect x="55" y="220" width="160" height="40" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="135" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">会话管理服务</text>

  <!-- 连接到智能体集群 -->
  <line x1="215" y1="240" x2="270" y2="240" stroke="#409EFF" stroke-width="1.2"/>
  <polygon points="267,236 275,240 267,244" fill="#409EFF"/>

  <!-- 路由智能体 x3 -->
  <rect x="280" y="218" width="140" height="44" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="350" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#409EFF">路由智能体</text>
  <text x="350" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">× 3 实例</text>

  <!-- 业务智能体 x10 -->
  <rect x="440" y="218" width="140" height="44" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="510" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#409EFF">业务智能体</text>
  <text x="510" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">× 10 实例</text>

  <!-- 监控智能体 x2 -->
  <rect x="600" y="218" width="140" height="44" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="670" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#409EFF">监控智能体</text>
  <text x="670" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">× 2 实例</text>

  <!-- 独立可扩展标注 -->
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-style="italic">← 各集群独立水平扩展 →</text>

  <!-- 智能体间通信 -->
  <rect x="55" y="305" width="685" height="38" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="397" y="329" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">智能体间通信总线（gRPC / 事件驱动）</text>

  <!-- ====== 连接箭头：中层→底层 ====== -->
  <line x1="400" y1="360" x2="400" y2="395" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="396,392 400,400 404,392" fill="#409EFF"/>

  <!-- ====== 底层：消息队列与存储 ====== -->
  <rect x="30" y="405" width="740" height="80" rx="10" fill="url(#layerGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="405" width="740" height="24" rx="10" fill="#409EFF"/>
  <rect x="30" y="417" width="740" height="12" fill="#409EFF"/>
  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">消息队列与存储层</text>

  <!-- 消息队列 -->
  <rect x="55" y="440" width="150" height="30" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="130" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">RabbitMQ</text>

  <!-- 箭头到存储 -->
  <line x1="205" y1="455" x2="250" y2="455" stroke="#409EFF" stroke-width="1.2"/>
  <polygon points="247,451 255,455 247,459" fill="#409EFF"/>

  <!-- Redis -->
  <rect x="260" y="440" width="130" height="30" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="325" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">Redis 缓存</text>

  <!-- PostgreSQL -->
  <rect x="410" y="440" width="140" height="30" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="480" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">PostgreSQL 持久化</text>

  <!-- 向量数据库 -->
  <rect x="570" y="440" width="170" height="30" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="655" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">向量数据库 知识库</text>

  <!-- ====== 标注 ====== -->
  <!-- 标注1：用户入口 -->
  <line x1="60" y1="50" x2="60" y2="38" stroke="#409EFF" stroke-width="0.8"/>
  <circle cx="60" cy="36" r="10" fill="#409EFF"/>
  <text x="60" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">1</text>
  <text x="76" y="40" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">多渠道接入</text>

  <!-- 标注2：API网关 -->
  <line x1="480" y1="80" x2="480" y2="38" stroke="#409EFF" stroke-width="0.8"/>
  <circle cx="480" cy="36" r="10" fill="#409EFF"/>
  <text x="480" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">2</text>
  <text x="496" y="40" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">统一网关</text>

  <!-- 标注3：会话管理 -->
  <line x1="55" y1="220" x2="30" y2="170" stroke="#409EFF" stroke-width="0.8"/>
  <circle cx="30" cy="168" r="10" fill="#409EFF"/>
  <text x="30" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">3</text>
  <text x="46" y="172" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">会话管理</text>

  <!-- 标注4：智能体集群 -->
  <line x1="600" y1="218" x2="740" y2="170" stroke="#409EFF" stroke-width="0.8"/>
  <circle cx="740" cy="168" r="10" fill="#409EFF"/>
  <text x="740" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">4</text>
  <text x="724" y="172" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">智能体集群</text>

  <!-- 标注5：消息队列 -->
  <line x1="55" y1="440" x2="30" y2="470" stroke="#409EFF" stroke-width="0.8"/>
  <circle cx="30" cy="472" r="10" fill="#409EFF"/>
  <text x="30" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">5</text>
  <text x="46" y="476" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">消息队列</text>

  <!-- 标注6：存储服务 -->
  <line x1="570" y1="440" x2="740" y2="470" stroke="#409EFF" stroke-width="0.8"/>
  <circle cx="740" cy="472" r="10" fill="#409EFF"/>
  <text x="740" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">6</text>
  <text x="724" y="476" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">存储服务</text>

</svg>