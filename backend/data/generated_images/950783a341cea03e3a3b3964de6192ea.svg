<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="layerGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8fe0"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5aabff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- ===== 第一层：感知层 ===== -->
  <rect x="200" y="28" width="400" height="80" rx="12" fill="url(#layerGrad1)" filter="url(#shadow)"/>
  <text x="400" y="58" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="bold">感知层</text>

  <!-- 感知图标：文本、图像、语音、API -->
  <g transform="translate(240, 72)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="rgba(255,255,255,0.25)"/>
    <text x="13" y="18" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">T</text>
  </g>
  <g transform="translate(290, 72)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="rgba(255,255,255,0.25)"/>
    <text x="13" y="18" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🖼</text>
  </g>
  <g transform="translate(340, 72)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="rgba(255,255,255,0.25)"/>
    <text x="13" y="18" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🎤</text>
  </g>
  <g transform="translate(390, 72)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="rgba(255,255,255,0.25)"/>
    <text x="13" y="18" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">API</text>
  </g>

  <!-- 流入箭头 -->
  <g transform="translate(460, 72)">
    <text x="0" y="14" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="13">→ 输入</text>
  </g>

  <!-- 向下箭头（连接第一层到第二层） -->
  <polygon points="400,108 394,118 406,118" fill="#409EFF"/>
  <line x1="400" y1="108" x2="400" y2="118" stroke="#409EFF" stroke-width="2"/>

  <!-- ===== 第二层：推理层 ===== -->
  <rect x="250" y="130" width="300" height="80" rx="12" fill="url(#layerGrad2)" filter="url(#shadow)"/>
  <text x="400" y="160" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="bold">推理层</text>

  <!-- LLM 大脑图标 -->
  <g transform="translate(370, 180)">
    <ellipse cx="30" cy="18" rx="28" ry="16" fill="rgba(255,255,255,0.2)"/>
    <path d="M18,16 Q30,6 42,16 Q44,22 40,26 Q30,32 20,26 Q16,22 18,16Z" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <circle cx="26" cy="18" r="2.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="34" cy="18" r="2.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="30" cy="24" r="2" fill="#ffffff" opacity="0.4"/>
    <text x="30" y="42" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="11">LLM</text>
  </g>

  <!-- 向下箭头 -->
  <polygon points="400,210 394,220 406,220" fill="#409EFF"/>
  <line x1="400" y1="210" x2="400" y2="220" stroke="#409EFF" stroke-width="2"/>

  <!-- ===== 第三层：功能模块层 ===== -->
  <!-- 规划模块 -->
  <rect x="95" y="235" width="180" height="100" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadowLight)"/>
  <text x="185" y="262" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="15" font-weight="bold">规划模块</text>
  <!-- 路线树图标 -->
  <g transform="translate(155, 285)">
    <line x1="30" y1="0" x2="10" y2="20" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="30" y1="0" x2="30" y2="20" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="30" y1="0" x2="50" y2="20" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="30" cy="0" r="4" fill="#409EFF"/>
    <circle cx="10" cy="20" r="3" fill="#409EFF" opacity="0.7"/>
    <circle cx="30" cy="20" r="3" fill="#409EFF" opacity="0.7"/>
    <circle cx="50" cy="20" r="3" fill="#409EFF" opacity="0.7"/>
    <text x="30" y="34" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="11">任务分解</text>
  </g>

  <!-- 记忆模块 -->
  <rect x="310" y="235" width="180" height="100" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadowLight)"/>
  <text x="400" y="262" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="15" font-weight="bold">记忆模块</text>
  <!-- 堆叠数据库图标 -->
  <g transform="translate(370, 285)">
    <rect x="0" y="0" width="28" height="18" rx="3" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1"/>
    <rect x="3" y="3" width="22" height="12" rx="2" fill="#409EFF" opacity="0.3"/>
    <rect x="5" y="8" width="18" height="8" rx="2" fill="#409EFF" opacity="0.4"/>
    <text x="14" y="32" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="11">短期/长期</text>
  </g>

  <!-- 工具模块 -->
  <rect x="525" y="235" width="180" height="100" rx="10" fill="url(#moduleGrad)" stroke="#409EFF" stroke-width="1.8" filter="url(#shadowLight)"/>
  <text x="615" y="262" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="15" font-weight="bold">工具模块</text>
  <!-- 扳手+API齿轮图标 -->
  <g transform="translate(585, 285)">
    <circle cx="20" cy="10" r="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="20" cy="10" r="3" fill="#409EFF" opacity="0.4"/>
    <line x1="26" y1="16" x2="32" y2="22" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <text x="20" y="34" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="11">API 调用</text>
  </g>

  <!-- 向下箭头 -->
  <polygon points="400,335 394,345 406,345" fill="#409EFF"/>
  <line x1="400" y1="335" x2="400" y2="345" stroke="#409EFF" stroke-width="2"/>

  <!-- ===== 第四层：行动层 ===== -->
  <rect x="200" y="358" width="400" height="70" rx="12" fill="url(#layerGrad1)" filter="url(#shadow)"/>
  <text x="400" y="388" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="bold">行动层</text>

  <!-- 输出箭头 -->
  <g transform="translate(280, 400)">
    <text x="0" y="14" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="13">输出 →</text>
  </g>
  <g transform="translate(460, 400)">
    <text x="0" y="14" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="13">反馈 →</text>
  </g>

  <!-- ===== 反馈回路箭头 ===== -->
  <path d="M600,395 Q680,395 680,300 Q680,170 600,100" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="600,100 608,108 592,108" fill="#409EFF" opacity="0.6"/>
  <text x="690" y="250" text-anchor="middle" fill="#409EFF" font-family="Arial, sans-serif" font-size="13" transform="rotate(90,690,250)" opacity="0.7">反馈循环</text>

  <!-- ===== 层标签（左侧标注） ===== -->
  <text x="170" y="68" text-anchor="end" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" opacity="0.6">层 1</text>
  <text x="220" y="172" text-anchor="end" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" opacity="0.6">层 2</text>
  <text x="220" y="290" text-anchor="end" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" opacity="0.6">层 3</text>
  <text x="170" y="395" text-anchor="end" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" opacity="0.6">层 4</text>

  <!-- 标题 -->
  <text x="400" y="478" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="16" font-weight="bold" opacity="0.8">AI 智能体系统架构</text>
</svg>