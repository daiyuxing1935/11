<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FE0"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#D0E8FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 顶部标题 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">辩论框架结构化流程</text>
  <line x1="280" y1="40" x2="520" y2="40" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ===== 裁判（顶部） ===== -->
  <g transform="translate(400, 72)" filter="url(#shadow)">
    <!-- 裁判身体 -->
    <rect x="-28" y="-12" width="56" height="24" rx="12" fill="url(#blueGrad)"/>
    <circle cx="0" cy="-20" r="10" fill="#409EFF"/>
    <!-- 眼镜 -->
    <circle cx="-5" cy="-20" r="4" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
    <circle cx="5" cy="-20" r="4" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
    <line x1="-1" y1="-20" x2="1" y2="-20" stroke="#1a1a2e" stroke-width="1"/>
    <!-- 记事本 -->
    <rect x="30" y="-16" width="18" height="22" rx="2" fill="white" stroke="#409EFF" stroke-width="1"/>
    <line x1="34" y1="-10" x2="44" y2="-10" stroke="#1a1a2e" stroke-width="0.8"/>
    <line x1="34" y1="-6" x2="44" y2="-6" stroke="#1a1a2e" stroke-width="0.8"/>
    <line x1="34" y1="-2" x2="42" y2="-2" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- 笔 -->
    <line x1="48" y1="-16" x2="50" y2="6" stroke="#1a1a2e" stroke-width="1.2"/>
  </g>
  <text x="400" y="106" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">裁判</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#666">记录与评估</text>

  <!-- 从裁判向下的虚线 -->
  <line x1="400" y1="120" x2="400" y2="140" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== 辩论者 A（左侧） ===== -->
  <g transform="translate(200, 160)" filter="url(#shadow)">
    <!-- 身体 -->
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="#409EFF"/>
    <!-- 头 -->
    <circle cx="0" cy="-28" r="12" fill="#409EFF"/>
    <!-- 眼睛 -->
    <circle cx="-4" cy="-30" r="2.5" fill="white"/>
    <circle cx="4" cy="-30" r="2.5" fill="white"/>
    <circle cx="-4" cy="-30" r="1.2" fill="#1a1a2e"/>
    <circle cx="4" cy="-30" r="1.2" fill="#1a1a2e"/>
    <!-- 嘴巴 -->
    <path d="M-4,-24 Q0,-21 4,-24" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  </g>
  <text x="200" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">辩手 A</text>
  <text x="200" y="222" text-anchor="middle" font-size="11" fill="#666">正方</text>

  <!-- ===== 辩论者 B（右侧） ===== -->
  <g transform="translate(600, 160)" filter="url(#shadow)">
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="#409EFF"/>
    <circle cx="0" cy="-28" r="12" fill="#409EFF"/>
    <circle cx="-4" cy="-30" r="2.5" fill="white"/>
    <circle cx="4" cy="-30" r="2.5" fill="white"/>
    <circle cx="-4" cy="-30" r="1.2" fill="#1a1a2e"/>
    <circle cx="4" cy="-30" r="1.2" fill="#1a1a2e"/>
    <path d="M-4,-24 Q0,-21 4,-24" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  </g>
  <text x="600" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">辩手 B</text>
  <text x="600" y="222" text-anchor="middle" font-size="11" fill="#666">反方</text>

  <!-- ===== 第1轮：开场陈述 ===== -->
  <g transform="translate(130, 248)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#409EFF">第1轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">开场陈述</text>
    <!-- 指向辩手A的线 -->
    <line x1="60" y1="0" x2="60" y2="-20" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <g transform="translate(550, 248)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#409EFF">第1轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">开场陈述</text>
    <line x1="60" y1="0" x2="60" y2="-20" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- ===== 第2轮：同行批评 ===== -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#E6A23C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#E6A23C">第2轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">同行批评</text>
    <!-- 批评箭头 -->
    <polygon points="120,19 145,14 135,19 145,24" fill="#E6A23C" opacity="0.7"/>
    <line x1="120" y1="19" x2="145" y2="19" stroke="#E6A23C" stroke-width="1.5"/>
  </g>

  <g transform="translate(550, 310)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#E6A23C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#E6A23C">第2轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">同行批评</text>
    <polygon points="0,19 -25,14 -15,19 -25,24" fill="#E6A23C" opacity="0.7"/>
    <line x1="0" y1="19" x2="-25" y2="19" stroke="#E6A23C" stroke-width="1.5"/>
  </g>

  <!-- ===== 第3轮：反驳 ===== -->
  <g transform="translate(130, 372)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#67C23A" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#67C23A">第3轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">反驳</text>
    <!-- 盾牌 -->
    <path d="M120,10 L130,5 L140,10 L140,22 L130,28 L120,22 Z" fill="#67C23A" opacity="0.3" stroke="#67C23A" stroke-width="1"/>
  </g>

  <g transform="translate(550, 372)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#67C23A" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#67C23A">第3轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">反驳</text>
    <path d="M0,10 L-10,5 L-20,10 L-20,22 L-10,28 L0,22 Z" fill="#67C23A" opacity="0.3" stroke="#67C23A" stroke-width="1"/>
  </g>

  <!-- ===== 最终轮：总结陈词 ===== -->
  <g transform="translate(340, 430)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#409EFF">最终轮</text>
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#1a1a2e">总结陈词</text>
    <!-- 文档图标 -->
    <rect x="122" y="8" width="14" height="18" rx="2" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="126" y1="14" x2="132" y2="14" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="126" y1="18" x2="132" y2="18" stroke="#409EFF" stroke-width="0.8"/>
  </g>

  <!-- ===== 右侧质量指标 ===== -->
  <g transform="translate(710, 140)">
    <rect x="-5" y="-8" width="85" height="22" rx="4" fill="#E0F0FF" stroke="#409EFF" stroke-width="0.8"/>
    <text x="37" y="8" text-anchor="middle" font-size="10" fill="#1a1a2e">更少幻觉</text>
    <polygon points="80,2 88,-2 88,6" fill="#409EFF"/>
  </g>
  <g transform="translate(710, 185)">
    <rect x="-5" y="-8" width="85" height="22" rx="4" fill="#E0F0FF" stroke="#409EFF" stroke-width="0.8"/>
    <text x="37" y="8" text-anchor="middle" font-size="10" fill="#1a1a2e">发现盲点</text>
    <polygon points="80,2 88,-2 88,6" fill="#409EFF"/>
  </g>
  <g transform="translate(710, 230)">
    <rect x="-5" y="-8" width="85" height="22" rx="4" fill="#E0F0FF" stroke="#409EFF" stroke-width="0.8"/>
    <text x="37" y="8" text-anchor="middle" font-size="10" fill="#1a1a2e">深度推理</text>
    <polygon points="80,2 88,-2 88,6" fill="#409EFF"/>
  </g>
  <g transform="translate(710, 275)">
    <rect x="-5" y="-8" width="85" height="22" rx="4" fill="#E0F0FF" stroke="#409EFF" stroke-width="0.8"/>
    <text x="37" y="8" text-anchor="middle" font-size="10" fill="#1a1a2e">减少偏见</text>
    <polygon points="80,2 88,-2 88,6" fill="#409EFF"/>
  </g>

  <!-- 右侧趋势箭头 -->
  <g transform="translate(720, 310)">
    <line x1="0" y1="20" x2="10" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="20" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="20" y1="15" x2="30" y2="5" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="30" y1="5" x2="40" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="40" y1="10" x2="50" y2="0" stroke="#409EFF" stroke-width="2"/>
    <polygon points="50,0 46,6 54,6" fill="#409EFF"/>
  </g>
  <text x="735" y="340" text-anchor="middle" font-size="9" fill="#409EFF">质量提升趋势</text>

  <!-- ===== 中心连接线 ===== -->
  <!-- 辩手A到辩手B的虚线 -->
  <line x1="230" y1="160" x2="570" y2="160" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 轮次之间的垂直连接 -->
  <line x1="190" y1="286" x2="190" y2="310" stroke="#ccc" stroke-width="0.8"/>
  <line x1="190" y1="348" x2="190" y2="372" stroke="#ccc" stroke-width="0.8"/>
  <line x1="610" y1="286" x2="610" y2="310" stroke="#ccc" stroke-width="0.8"/>
  <line x1="610" y1="348" x2="610" y2="372" stroke="#ccc" stroke-width="0.8"/>

  <!-- 底部汇总连接 -->
  <line x1="250" y1="410" x2="400" y2="430" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="550" y1="410" x2="400" y2="430" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ===== 底部标注 ===== -->
  <g transform="translate(30, 470)">
    <rect x="0" y="0" width="16" height="10" rx="2" fill="#409EFF"/>
    <text x="22" y="9" font-size="10" fill="#666">辩论流程</text>
  </g>
  <g transform="translate(140, 470)">
    <rect x="0" y="0" width="16" height="10" rx="2" fill="#E6A23C"/>
    <text x="22" y="9" font-size="10" fill="#666">批评反馈</text>
  </g>
  <g transform="translate(260, 470)">
    <rect x="0" y="0" width="16" height="10" rx="2" fill="#67C23A"/>
    <text x="22" y="9" font-size="10" fill="#666">反驳防御</text>
  </g>
  <g transform="translate(380, 470)">
    <rect x="0" y="0" width="16" height="10" rx="2" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="22" y="9" font-size="10" fill="#666">总结输出</text>
  </g>
</svg>