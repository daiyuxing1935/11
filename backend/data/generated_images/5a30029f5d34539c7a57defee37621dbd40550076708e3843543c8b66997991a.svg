<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">通信协议的四大作用</text>

  <!-- ========== 左上：标准化交换 ========== -->
  <g transform="translate(30, 60)">
    <rect width="360" height="195" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 标题栏 -->
    <rect x="0" y="0" width="360" height="36" rx="12" fill="#409EFF" opacity="0.1"/>
    <rect x="0" y="18" width="360" height="18" fill="#409EFF" opacity="0.1"/>
    <circle cx="18" cy="18" r="6" fill="#409EFF" opacity="0.6"/>
    <text x="36" y="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">标准化交换</text>

    <!-- 圆形智能体 -->
    <circle cx="80" cy="90" r="28" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <circle cx="80" cy="90" r="10" fill="#409EFF" opacity="0.5"/>
    <text x="80" y="135" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#1a1a2e">智能体A</text>

    <!-- 连接线 -->
    <line x1="108" y1="90" x2="155" y2="90" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="155,86 163,90 155,94" fill="#409EFF"/>

    <!-- JSON 信封 -->
    <rect x="163" y="72" width="60" height="36" rx="4" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.5"/>
    <text x="193" y="90" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="10" fill="#409EFF">{...}</text>
    <text x="193" y="104" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="9" fill="#1a1a2e" opacity="0.6">JSON</text>

    <!-- 连接线 -->
    <line x1="223" y1="90" x2="260" y2="90" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="260,86 268,90 260,94" fill="#409EFF"/>

    <!-- 方形智能体 -->
    <rect x="268" y="66" width="48" height="48" rx="6" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="2"/>
    <rect x="282" y="80" width="20" height="20" rx="3" fill="#409EFF" opacity="0.4"/>
    <text x="292" y="128" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#1a1a2e">智能体B</text>

    <!-- 桥梁标注 -->
    <rect x="130" y="148" width="100" height="22" rx="11" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1"/>
    <text x="180" y="163" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#409EFF">通用语言桥梁</text>

    <!-- 标注 -->
    <text x="180" y="185" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#666">统一数据格式，消除异构</text>
  </g>

  <!-- ========== 右上：可靠性保证 ========== -->
  <g transform="translate(410, 60)">
    <rect width="360" height="195" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="360" height="36" rx="12" fill="#409EFF" opacity="0.1"/>
    <rect x="0" y="18" width="360" height="18" fill="#409EFF" opacity="0.1"/>
    <circle cx="18" cy="18" r="6" fill="#409EFF" opacity="0.6"/>
    <text x="36" y="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">可靠性保证</text>

    <!-- 发送方 -->
    <rect x="40" y="65" width="55" height="40" rx="8" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.5"/>
    <text x="67" y="90" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#1a1a2e">发送方</text>

    <!-- 消息框 -->
    <rect x="115" y="70" width="65" height="30" rx="6" fill="#409EFF" opacity="0.08" stroke="#409EFF" stroke-width="1.2"/>
    <text x="147" y="89" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="10" fill="#1a1a2e">消息</text>

    <!-- 重试箭头 -->
    <path d="M125 110 Q147 130 170 110" fill="none" stroke="#E6A23C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="170,106 174,114 166,114" fill="#E6A23C"/>
    <text x="147" y="140" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="10" fill="#E6A23C">重试</text>

    <!-- 接收方 -->
    <rect x="240" y="65" width="55" height="40" rx="8" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.5"/>
    <text x="267" y="90" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#1a1a2e">接收方</text>

    <!-- ACK 勾 -->
    <rect x="200" y="62" width="28" height="28" rx="14" fill="#67C23A" opacity="0.2"/>
    <path d="M208 76 L213 81 L221 71" fill="none" stroke="#67C23A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 超时时钟 -->
    <circle cx="310" cy="85" r="16" fill="none" stroke="#F56C6C" stroke-width="1.5"/>
    <line x1="310" y1="85" x2="310" y2="75" stroke="#F56C6C" stroke-width="1.5"/>
    <line x1="310" y1="85" x2="318" y2="85" stroke="#F56C6C" stroke-width="1.5"/>
    <text x="310" y="115" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="10" fill="#F56C6C">超时</text>

    <!-- 标注 -->
    <text x="180" y="180" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#666">ACK确认 + 超时重传机制</text>
  </g>

  <!-- ========== 左下：可扩展性 ========== -->
  <g transform="translate(30, 275)">
    <rect width="360" height="195" rx="12" fill="url(#cardGrad2)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="360" height="36" rx="12" fill="#409EFF" opacity="0.1"/>
    <rect x="0" y="18" width="360" height="18" fill="#409EFF" opacity="0.1"/>
    <circle cx="18" cy="18" r="6" fill="#409EFF" opacity="0.6"/>
    <text x="36" y="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">可扩展性</text>

    <!-- 中心节点 -->
    <circle cx="120" cy="105" r="22" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <text x="120" y="110" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="10" fill="#409EFF">中心</text>

    <!-- 现有节点 -->
    <circle cx="55" cy="65" r="14" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="68" y1="72" x2="105" y2="92" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>

    <circle cx="55" cy="145" r="14" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="68" y1="138" x2="105" y2="115" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>

    <circle cx="185" cy="65" r="14" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="172" y1="72" x2="138" y2="92" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- 新接入节点（带高亮） -->
    <circle cx="185" cy="145" r="16" fill="#67C23A" opacity="0.15" stroke="#67C23A" stroke-width="2"/>
    <text x="185" y="149" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="9" fill="#67C23A">新</text>
    <line x1="172" y1="138" x2="138" y2="115" stroke="#67C23A" stroke-width="1.5" stroke-dasharray="3,2"/>

    <!-- 兼容接口图标 -->
    <rect x="240" y="70" width="50" height="30" rx="6" fill="#409EFF" opacity="0.08" stroke="#409EFF" stroke-width="1.2"/>
    <text x="265" y="89" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="9" fill="#1a1a2e">接口</text>
    <rect x="300" y="70" width="50" height="30" rx="6" fill="#67C23A" opacity="0.08" stroke="#67C23A" stroke-width="1.2"/>
    <text x="325" y="89" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="9" fill="#67C23A">新接口</text>
    <path d="M290 85 L300 85" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 标注 -->
    <text x="180" y="185" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#666">新节点接入不影响现有系统</text>
  </g>

  <!-- ========== 右下：调试与监控 ========== -->
  <g transform="translate(410, 275)">
    <rect width="360" height="195" rx="12" fill="url(#cardGrad2)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="360" height="36" rx="12" fill="#409EFF" opacity="0.1"/>
    <rect x="0" y="18" width="360" height="18" fill="#409EFF" opacity="0.1"/>
    <circle cx="18" cy="18" r="6" fill="#409EFF" opacity="0.6"/>
    <text x="36" y="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">调试与监控</text>

    <!-- 仪表盘面板 -->
    <rect x="40" y="55" width="280" height="120" rx="8" fill="#1a1a2e" opacity="0.06" stroke="#409EFF" stroke-width="1"/>
    <rect x="40" y="55" width="280" height="24" rx="8" fill="#409EFF" opacity="0.1"/>
    <rect x="40" y="71" width="280" height="8" fill="#409EFF" opacity="0.05"/>
    <text x="60" y="71" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="10" fill="#1a1a2e" opacity="0.7">消息流追踪</text>

    <!-- 时间戳行1 -->
    <rect x="55" y="88" width="250" height="18" rx="4" fill="#fff" opacity="0.7"/>
    <text x="62" y="101" font-family="Courier New, monospace" font-size="9" fill="#1a1a2e">10:23:45 节点A → 节点B</text>
    <rect x="260" y="89" width="35" height="16" rx="3" fill="#67C23A" opacity="0.2"/>
    <text x="277" y="101" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="8" fill="#67C23A">成功</text>

    <!-- 时间戳行2 -->
    <rect x="55" y="110" width="250" height="18" rx="4" fill="#fff" opacity="0.7"/>
    <text x="62" y="123" font-family="Courier New, monospace" font-size="9" fill="#1a1a2e">10:23:47 节点B → 节点C</text>
    <rect x="260" y="111" width="35" height="16" rx="3" fill="#67C23A" opacity="0.2"/>
    <text x="277" y="123" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="8" fill="#67C23A">成功</text>

    <!-- 时间戳行3 -->
    <rect x="55" y="132" width="250" height="18" rx="4" fill="#fff" opacity="0.7"/>
    <text x="62" y="145" font-family="Courier New, monospace" font-size="9" fill="#1a1a2e">10:23:50 节点C → 节点D</text>
    <rect x="260" y="133" width="35" height="16" rx="3" fill="#F56C6C" opacity="0.2"/>
    <text x="277" y="145" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="8" fill="#F56C6C">失败</text>

    <!-- 标注 -->
    <text x="180" y="185" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#666">可视化追踪消息流向与状态</text>
  </g>

</svg>