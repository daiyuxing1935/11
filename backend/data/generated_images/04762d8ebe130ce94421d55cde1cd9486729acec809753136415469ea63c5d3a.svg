<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2ff"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">AI 智能体核心能力循环</text>

  <!-- 连接四个象限的环形箭头 -->
  <!-- 顶部弧线（从左到右） -->
  <path d="M 400 105 Q 530 105 560 160" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.5"/>
  <polygon points="558,155 565,163 553,162" fill="#409EFF" opacity="0.6"/>

  <!-- 右侧弧线（从上到下） -->
  <path d="M 590 260 Q 590 350 540 370" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.5"/>
  <polygon points="545,366 537,373 538,361" fill="#409EFF" opacity="0.6"/>

  <!-- 底部弧线（从右到左） -->
  <path d="M 400 415 Q 270 415 240 360" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.5"/>
  <polygon points="244,363 237,355 249,356" fill="#409EFF" opacity="0.6"/>

  <!-- 左侧弧线（从下到上） -->
  <path d="M 210 260 Q 210 170 260 150" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.5"/>
  <polygon points="255,154 263,147 262,159" fill="#409EFF" opacity="0.6"/>

  <!-- 中心连接线交叉 -->
  <line x1="400" y1="105" x2="400" y2="415" stroke="#409EFF" stroke-width="1" opacity="0.15"/>
  <line x1="210" y1="260" x2="590" y2="260" stroke="#409EFF" stroke-width="1" opacity="0.15"/>

  <!-- ===== 左上：感知（Perception）===== -->
  <g filter="url(#shadow)">
    <rect x="195" y="80" width="180" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  </g>
  <!-- 眼睛图标 -->
  <g transform="translate(285,145)">
    <!-- 眼白 -->
    <ellipse cx="0" cy="0" rx="28" ry="20" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 虹膜 -->
    <circle cx="0" cy="0" r="10" fill="#409EFF" opacity="0.7"/>
    <!-- 瞳孔 -->
    <circle cx="0" cy="0" r="5" fill="#1a1a2e"/>
    <!-- 进入的信号波纹 -->
    <path d="M -45 -8 Q -38 -14 -30 -8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M -50 -2 Q -40 -10 -28 -2" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <path d="M -42 6 Q -35 0 -28 6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
    <!-- 信号箭头 -->
    <polygon points="-30,-10 -26,-6 -34,-6" fill="#409EFF" opacity="0.5"/>
    <polygon points="-28,-4 -24,0 -32,0" fill="#409EFF" opacity="0.4"/>
  </g>
  <text x="285" y="220" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">感知</text>

  <!-- ===== 右上：推理（Reasoning）===== -->
  <g filter="url(#shadow)">
    <rect x="425" y="80" width="180" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  </g>
  <!-- 大脑图标 -->
  <g transform="translate(515,145)">
    <!-- 大脑轮廓 -->
    <path d="M -20 -15 C -30 -15 -35 -5 -32 5 C -35 12 -28 20 -18 18 C -12 25 0 25 8 20 C 18 22 28 15 25 5 C 30 -5 25 -15 15 -15 C 10 -22 -5 -22 -10 -18 Z" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 大脑沟回 -->
    <path d="M -15 -5 Q -8 -12 0 -5" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <path d="M 5 -8 Q 12 -14 18 -6" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <path d="M -10 5 Q -3 0 5 5" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <!-- 思维气泡 -->
    <circle cx="22" cy="-18" r="6" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="30" cy="-26" r="4" fill="white" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <!-- 逻辑符号 -->
    <text x="0" y="3" text-anchor="middle" font-family="'Times New Roman',serif" font-size="11" fill="#409EFF" opacity="0.7">∀</text>
    <text x="14" y="-8" text-anchor="middle" font-family="'Times New Roman',serif" font-size="9" fill="#409EFF" opacity="0.5">∧</text>
  </g>
  <text x="515" y="220" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">推理</text>

  <!-- ===== 右下：规划（Planning）===== -->
  <g filter="url(#shadow)">
    <rect x="425" y="270" width="180" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  </g>
  <!-- 路线图/树图标 -->
  <g transform="translate(515,335)">
    <!-- 目标节点 -->
    <rect x="-8" y="-30" width="16" height="16" rx="3" fill="#409EFF" opacity="0.8"/>
    <text x="0" y="-19" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="7" fill="white">目标</text>
    <!-- 分支线 -->
    <line x1="0" y1="-14" x2="0" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="-18" y2="8" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="18" y2="8" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 子步骤节点 -->
    <rect x="-24" y="6" width="12" height="10" rx="2" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
    <rect x="12" y="6" width="12" height="10" rx="2" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
    <rect x="-6" y="8" width="12" height="10" rx="2" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
    <!-- 更多分支 -->
    <line x1="-18" y1="16" x2="-24" y2="24" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
    <line x1="18" y1="16" x2="24" y2="24" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  </g>
  <text x="515" y="410" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">规划</text>

  <!-- ===== 左下：行动（Action）===== -->
  <g filter="url(#shadow)">
    <rect x="195" y="270" width="180" height="170" rx="16" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  </g>
  <!-- 齿轮/手图标 -->
  <g transform="translate(285,335)">
    <!-- 齿轮外圈 -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 齿轮齿 -->
    <rect x="-4" y="-28" width="8" height="6" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="-4" y="22" width="8" height="6" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="-28" y="-4" width="6" height="8" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="22" y="-4" width="6" height="8" rx="1" fill="#409EFF" opacity="0.7"/>
    <!-- 斜齿 -->
    <rect x="14" y="-22" width="8" height="6" rx="1" fill="#409EFF" opacity="0.5" transform="rotate(45,18,-19)"/>
    <rect x="-22" y="16" width="8" height="6" rx="1" fill="#409EFF" opacity="0.5" transform="rotate(45,-18,19)"/>
    <rect x="16" y="16" width="8" height="6" rx="1" fill="#409EFF" opacity="0.5" transform="rotate(-45,20,19)"/>
    <rect x="-24" y="-22" width="8" height="6" rx="1" fill="#409EFF" opacity="0.5" transform="rotate(-45,-20,-19)"/>
    <!-- 中心孔 -->
    <circle cx="0" cy="0" r="8" fill="#409EFF" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#1a1a2e" opacity="0.4"/>
    <!-- 向外辐射的工具 -->
    <line x1="22" y1="0" x2="34" y2="0" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="0" x2="-34" y2="0" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="22" x2="0" y2="34" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-22" x2="0" y2="-34" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <!-- 工具小图标 -->
    <circle cx="36" cy="0" r="3" fill="#409EFF" opacity="0.4"/>
    <circle cx="-36" cy="0" r="3" fill="#409EFF" opacity="0.4"/>
    <circle cx="0" cy="36" r="3" fill="#409EFF" opacity="0.4"/>
    <circle cx="0" cy="-36" r="3" fill="#409EFF" opacity="0.4"/>
  </g>
  <text x="285" y="410" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">行动</text>

  <!-- 中心循环箭头 -->
  <g transform="translate(400,260)">
    <!-- 循环箭头图标 -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
    <path d="M 0 -18 A 18 18 0 1 1 -12.7 -12.7" fill="none" stroke="#409EFF" stroke-width="2.5" opacity="0.6"/>
    <polygon points="-16,-10 -10,-16 -9,-8" fill="#409EFF" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="9" fill="#409EFF" opacity="0.7">循环</text>
  </g>

  <!-- 能力标注 -->
  <!-- 感知标注 -->
  <text x="195" y="72" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#409EFF" opacity="0.8">● 信息接收</text>

  <!-- 推理标注 -->
  <text x="425" y="72" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#409EFF" opacity="0.8">● 逻辑分析</text>

  <!-- 规划标注 -->
  <text x="425" y="262" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#409EFF" opacity="0.8">● 目标分解</text>

  <!-- 行动标注 -->
  <text x="195" y="262" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#409EFF" opacity="0.8">● 工具执行</text>

  <!-- 底部说明 -->
  <text x="400" y="475" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#1a1a2e" opacity="0.6">感知 → 推理 → 规划 → 行动 → 感知（持续循环）</text>

</svg>