<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3388DD"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="subBoxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">智能体（Agent）分类</text>

  <!-- 顶部中心节点 -->
  <rect x="340" y="65" width="120" height="36" rx="18" fill="url(#boxGrad1)" stroke="#2E7DC4" stroke-width="1.5"/>
  <text x="400" y="89" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">智能体</text>

  <!-- 连接线：中心到三个分支 -->
  <line x1="400" y1="101" x2="400" y2="125" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="125" x2="160" y2="125" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="125" x2="640" y2="125" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="160" y1="125" x2="160" y2="145" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="125" x2="400" y2="145" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="640" y1="125" x2="640" y2="145" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- ===== 左侧：反应式智能体 ===== -->
  <rect x="85" y="145" width="150" height="38" rx="8" fill="url(#boxGrad1)" stroke="#2E7DC4" stroke-width="1.5"/>
  <text x="160" y="170" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">反应式智能体</text>

  <!-- 子分支连接线 -->
  <line x1="160" y1="183" x2="160" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="100" y1="210" x2="220" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="100" y1="210" x2="100" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="220" y1="210" x2="220" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 子节点 -->
  <rect x="50" y="230" width="100" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="100" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">简单反射</text>

  <rect x="170" y="230" width="100" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="220" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">基于模型反射</text>

  <!-- ===== 中间：慎思式智能体 ===== -->
  <rect x="310" y="145" width="180" height="38" rx="8" fill="url(#boxGrad2)" stroke="#2E7DC4" stroke-width="1.5"/>
  <text x="400" y="170" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">慎思式智能体</text>

  <!-- 子分支连接线 -->
  <line x1="400" y1="183" x2="400" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="310" y1="210" x2="490" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="310" y1="210" x2="310" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="400" y1="210" x2="400" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="490" y1="210" x2="490" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 子节点 -->
  <rect x="268" y="230" width="84" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="310" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">基于目标</text>

  <rect x="358" y="230" width="84" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">基于效用</text>

  <rect x="448" y="230" width="84" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="490" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">BDI模型</text>

  <!-- ===== 右侧：混合式智能体 ===== -->
  <rect x="565" y="145" width="150" height="38" rx="8" fill="url(#boxGrad2)" stroke="#2E7DC4" stroke-width="1.5"/>
  <text x="640" y="170" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">混合式智能体</text>

  <!-- 子分支连接线 -->
  <line x1="640" y1="183" x2="640" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="580" y1="210" x2="700" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="580" y1="210" x2="580" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="700" y1="210" x2="700" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 子节点 -->
  <rect x="530" y="230" width="100" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="580" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">水平分层</text>

  <rect x="650" y="230" width="100" height="34" rx="6" fill="url(#subBoxGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="700" y="252" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">垂直分层</text>

  <!-- 底部注释 -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666">图：智能体的三种主要分类及其子类型</text>

  <!-- 装饰性底部线条 -->
  <line x1="200" y1="340" x2="600" y2="340" stroke="#409EFF" stroke-width="1" opacity="0.3"/>

  <!-- 图例 -->
  <rect x="280" y="360" width="14" height="14" rx="3" fill="#409EFF"/>
  <text x="300" y="372" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">主类别节点</text>
  <rect x="420" y="360" width="14" height="14" rx="3" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
  <text x="440" y="372" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">子类别节点</text>
</svg>