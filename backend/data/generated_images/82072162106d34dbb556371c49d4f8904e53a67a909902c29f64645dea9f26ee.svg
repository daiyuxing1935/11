<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">智能体主要分类</text>

  <!-- 顶部中心节点 -->
  <rect x="335" y="62" width="130" height="40" rx="20" fill="url(#mainGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">智能体</text>

  <!-- 连接线：中心到三大分支 -->
  <line x1="400" y1="102" x2="400" y2="120" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="120" x2="140" y2="120" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="120" x2="400" y2="120" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="120" x2="660" y2="120" stroke="#1a1a2e" stroke-width="1.5"/>

  <line x1="140" y1="120" x2="140" y2="140" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="400" y1="120" x2="400" y2="140" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="660" y1="120" x2="660" y2="140" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 第一层：三大类别 -->
  <!-- 反应式智能体 -->
  <rect x="65" y="140" width="150" height="42" rx="10" fill="url(#mainGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="140" y="167" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">反应式智能体</text>

  <!-- 深思式智能体 -->
  <rect x="325" y="140" width="150" height="42" rx="10" fill="url(#mainGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="400" y="167" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">深思式智能体</text>

  <!-- 混合式智能体 -->
  <rect x="585" y="140" width="150" height="42" rx="10" fill="url(#mainGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="660" y="167" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">混合式智能体</text>

  <!-- 连接线：第一层到子分支 -->
  <!-- 反应式 -->
  <line x1="140" y1="182" x2="140" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="90" y1="210" x2="190" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="90" y1="210" x2="90" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="190" y1="210" x2="190" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 深思式 -->
  <line x1="400" y1="182" x2="400" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="330" y1="210" x2="470" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="330" y1="210" x2="330" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="400" y1="210" x2="400" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="470" y1="210" x2="470" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 混合式 -->
  <line x1="660" y1="182" x2="660" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="610" y1="210" x2="710" y2="210" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="610" y1="210" x2="610" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>
  <line x1="710" y1="210" x2="710" y2="230" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 第二层：子分支 -->
  <!-- 反应式子分支 -->
  <rect x="40" y="230" width="100" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="90" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">简单反射</text>

  <rect x="140" y="230" width="100" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="190" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">基于模型反射</text>

  <!-- 深思式子分支 -->
  <rect x="275" y="230" width="110" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="330" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">基于目标</text>

  <rect x="345" y="230" width="110" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">基于效用</text>

  <rect x="415" y="230" width="110" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="470" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">BDI模型</text>

  <!-- 混合式子分支 -->
  <rect x="555" y="230" width="110" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="610" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">水平分层</text>

  <rect x="655" y="230" width="110" height="36" rx="8" fill="url(#subGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="710" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">垂直分层</text>

  <!-- 底部说明区域 -->
  <rect x="200" y="310" width="400" height="36" rx="18" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="333" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">智能体根据内部结构和决策机制分为三大类</text>

  <!-- 装饰性标注 -->
  <line x1="90" y1="266" x2="90" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="190" y1="266" x2="190" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="330" y1="266" x2="330" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="400" y1="266" x2="400" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="470" y1="266" x2="470" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="610" y1="266" x2="610" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="710" y1="266" x2="710" y2="290" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- 底部装饰点 -->
  <circle cx="90" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="190" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="330" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="400" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="470" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="610" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="710" cy="293" r="3" fill="#409EFF" opacity="0.3"/>
</svg>