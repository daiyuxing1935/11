<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="52" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e">最佳实践指南</text>
  <line x1="300" y1="64" x2="500" y2="64" stroke="#409EFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- 第1行第1列：提供示例 -->
  <g transform="translate(95, 110)">
    <rect x="-10" y="-10" width="220" height="150" rx="20" ry="20" fill="url(#badgeGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 文档图标 -->
    <rect x="80" y="20" width="40" height="50" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="90" y1="35" x2="110" y2="35" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="90" y1="42" x2="110" y2="42" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="90" y1="49" x2="105" y2="49" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="88" y1="20" x2="88" y2="30" stroke="#409EFF" stroke-width="2"/>
    <line x1="88" y1="30" x2="80" y2="30" stroke="#409EFF" stroke-width="2"/>
    <!-- 文字 -->
    <text x="100" y="100" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">提供示例</text>
    <text x="100" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Provide Examples</text>
  </g>

  <!-- 第1行第2列：使用占位符 -->
  <g transform="translate(340, 110)">
    <rect x="-10" y="-10" width="220" height="150" rx="20" ry="20" fill="url(#badgeGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 占位符图标：方括号加美元符号 -->
    <text x="82" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#409EFF" text-anchor="middle">[ $ ]</text>
    <!-- 文字 -->
    <text x="100" y="100" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">使用占位符</text>
    <text x="100" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Use Placeholders</text>
  </g>

  <!-- 第1行第3列：分步处理 -->
  <g transform="translate(585, 110)">
    <rect x="-10" y="-10" width="220" height="150" rx="20" ry="20" fill="url(#badgeGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 阶梯状方块 -->
    <rect x="75" y="50" width="18" height="18" rx="3" fill="#409EFF" opacity="0.7"/>
    <rect x="97" y="38" width="18" height="30" rx="3" fill="#409EFF" opacity="0.8"/>
    <rect x="119" y="26" width="18" height="42" rx="3" fill="#409EFF"/>
    <!-- 箭头 -->
    <polygon points="93,59 97,55 97,63" fill="#409EFF" opacity="0.7"/>
    <polygon points="115,47 119,43 119,51" fill="#409EFF" opacity="0.8"/>
    <!-- 文字 -->
    <text x="100" y="100" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">分步处理</text>
    <text x="100" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Step-by-Step</text>
  </g>

  <!-- 第2行第1列：后验证 -->
  <g transform="translate(95, 290)">
    <rect x="-10" y="-10" width="220" height="150" rx="20" ry="20" fill="url(#badgeGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 盾牌+勾选 -->
    <path d="M100,25 L120,35 L120,60 C120,75 100,85 100,85 C100,85 80,75 80,60 L80,35 Z" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <polyline points="90,55 97,65 110,48" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 文字 -->
    <text x="100" y="110" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">后验证</text>
    <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Post-Validation</text>
  </g>

  <!-- 第2行第2列：结合系统提示 -->
  <g transform="translate(340, 290)">
    <rect x="-10" y="-10" width="220" height="150" rx="20" ry="20" fill="url(#badgeGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 齿轮图标 -->
    <circle cx="100" cy="45" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="100" cy="45" r="7" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="100" y1="25" x2="100" y2="20" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="65" x2="100" y2="70" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="45" x2="75" y2="45" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="120" y1="45" x2="125" y2="45" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="86" y1="31" x2="82" y2="27" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="114" y1="59" x2="118" y2="63" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="114" y1="31" x2="118" y2="27" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="86" y1="59" x2="82" y2="63" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 文字 -->
    <text x="100" y="110" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">结合系统提示</text>
    <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">System Prompt</text>
  </g>

  <!-- 第2行第3列：关注模型版本 -->
  <g transform="translate(585, 290)">
    <rect x="-10" y="-10" width="220" height="150" rx="20" ry="20" fill="url(#badgeGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 版本标签图标 -->
    <rect x="75" y="30" width="50" height="28" rx="6" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <text x="100" y="49" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">v2.0</text>
    <line x1="85" y1="58" x2="85" y2="68" stroke="#409EFF" stroke-width="2"/>
    <line x1="115" y1="58" x2="115" y2="68" stroke="#409EFF" stroke-width="2"/>
    <line x1="85" y1="68" x2="115" y2="68" stroke="#409EFF" stroke-width="2"/>
    <!-- 文字 -->
    <text x="100" y="110" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">关注模型版本</text>
    <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Model Version</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="200" y1="470" x2="600" y2="470" stroke="#409EFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>