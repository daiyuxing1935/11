<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="pillarGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
    <linearGradient id="pillarGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e">人工智能：从工具到伙伴</text>

  <!-- 左侧支柱：记忆 -->
  <rect x="80" y="80" width="180" height="340" rx="12" fill="url(#pillarGrad1)" opacity="0.08"/>
  <rect x="80" y="80" width="180" height="340" rx="12" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

  <!-- 记忆标题 -->
  <text x="170" y="118" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">记忆</text>

  <!-- 记忆层级图标 -->
  <!-- 感觉记忆层 -->
  <rect x="105" y="145" width="130" height="50" rx="8" fill="#409EFF" opacity="0.2"/>
  <rect x="105" y="145" width="130" height="50" rx="8" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <text x="170" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">感觉记忆</text>

  <!-- 向上箭头 -->
  <polygon points="170,200 162,210 168,210 168,230 172,230 172,210 178,210" fill="#409EFF" opacity="0.6"/>

  <!-- 短时记忆层 -->
  <rect x="105" y="238" width="130" height="50" rx="8" fill="#409EFF" opacity="0.35"/>
  <rect x="105" y="238" width="130" height="50" rx="8" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <text x="170" y="268" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">短时记忆</text>

  <!-- 向上箭头 -->
  <polygon points="170,293 162,303 168,303 168,323 172,323 172,303 178,303" fill="#409EFF" opacity="0.6"/>

  <!-- 长时记忆层 -->
  <rect x="105" y="331" width="130" height="50" rx="8" fill="#409EFF" opacity="0.5"/>
  <rect x="105" y="331" width="130" height="50" rx="8" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <text x="170" y="361" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">长时记忆</text>

  <!-- 数据积累标注 -->
  <text x="170" y="405" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" opacity="0.7">数据积累 ↑</text>

  <!-- 右侧支柱：学习 -->
  <rect x="540" y="80" width="180" height="340" rx="12" fill="url(#pillarGrad2)" opacity="0.08"/>
  <rect x="540" y="80" width="180" height="340" rx="12" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

  <!-- 学习标题 -->
  <text x="630" y="118" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">学习</text>

  <!-- 学习曲线 -->
  <!-- 坐标轴 -->
  <line x1="565" y1="370" x2="700" y2="370" stroke="#1a1a2e" stroke-width="1.2" opacity="0.3"/>
  <line x1="565" y1="150" x2="565" y2="370" stroke="#1a1a2e" stroke-width="1.2" opacity="0.3"/>

  <!-- 曲线路径 -->
  <path d="M565,365 Q580,360 590,340 Q600,310 610,290 Q620,260 635,240 Q650,215 665,195 Q680,175 695,160" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 火花节点（改进迭代） -->
  <circle cx="590" cy="340" r="4" fill="#409EFF" opacity="0.8"/>
  <text x="586" y="332" text-anchor="end" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.6">迭代1</text>

  <circle cx="620" cy="290" r="4" fill="#409EFF" opacity="0.8"/>
  <text x="616" y="282" text-anchor="end" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.6">迭代2</text>

  <circle cx="650" cy="240" r="4" fill="#409EFF" opacity="0.8"/>
  <text x="646" y="232" text-anchor="end" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.6">迭代3</text>

  <circle cx="680" cy="190" r="4" fill="#409EFF" opacity="0.8"/>
  <text x="676" y="182" text-anchor="end" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.6">迭代4</text>

  <circle cx="700" cy="160" r="5" fill="#409EFF" opacity="1"/>
  <text x="696" y="152" text-anchor="end" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.8">迭代5</text>

  <!-- 性能提升标注 -->
  <text x="630" y="405" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" opacity="0.7">性能提升 ↗</text>

  <!-- 中央机器人 -->
  <!-- 机器人身体 -->
  <rect x="330" y="160" width="140" height="180" rx="20" fill="url(#robotGrad)" opacity="0.15"/>
  <rect x="330" y="160" width="140" height="180" rx="20" fill="none" stroke="#409EFF" stroke-width="2"/>

  <!-- 机器人头部 -->
  <rect x="350" y="175" width="100" height="65" rx="12" fill="#409EFF" opacity="0.25"/>
  <rect x="350" y="175" width="100" height="65" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 机器人眼睛 -->
  <circle cx="380" cy="205" r="8" fill="#409EFF" opacity="0.7"/>
  <circle cx="420" cy="205" r="8" fill="#409EFF" opacity="0.7"/>
  <circle cx="380" cy="205" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="420" cy="205" r="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- 机器人天线 -->
  <line x1="400" y1="175" x2="400" y2="155" stroke="#409EFF" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="152" r="5" fill="#409EFF" opacity="0.6"/>

  <!-- 机器人身体 -->
  <rect x="360" y="250" width="80" height="75" rx="10" fill="#409EFF" opacity="0.2"/>
  <rect x="360" y="250" width="80" height="75" rx="10" fill="none" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 机器人身体细节 -->
  <rect x="375" y="265" width="50" height="8" rx="4" fill="#409EFF" opacity="0.3"/>
  <rect x="375" y="280" width="50" height="8" rx="4" fill="#409EFF" opacity="0.3"/>
  <rect x="375" y="295" width="50" height="8" rx="4" fill="#409EFF" opacity="0.3"/>

  <!-- 机器人手臂 - 连接到左侧支柱 -->
  <line x1="330" y1="260" x2="260" y2="260" stroke="#409EFF" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="330" y1="280" x2="260" y2="280" stroke="#409EFF" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- 机器人手臂 - 连接到右侧支柱 -->
  <line x1="470" y1="260" x2="540" y2="260" stroke="#409EFF" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="470" y1="280" x2="540" y2="280" stroke="#409EFF" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- 连接标注 -->
  <text x="295" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.5">数据</text>
  <text x="505" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.5">反馈</text>

  <!-- 机器人底部标注 -->
  <text x="400" y="355" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">AI 智能体</text>

  <!-- 底部副标题 -->
  <rect x="250" y="430" width="300" height="40" rx="20" fill="#409EFF" opacity="0.1"/>
  <rect x="250" y="430" width="300" height="40" rx="20" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="455" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">从工具到伙伴</text>

</svg>