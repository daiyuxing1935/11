<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7bd4"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">死锁处理策略</text>

  <!-- 中心：死锁警告图标 -->
  <g transform="translate(400, 230)">
    <!-- 圆形背景 -->
    <circle cx="0" cy="0" r="58" fill="url(#centerGrad)" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

    <!-- 左箭头（向右推） -->
    <g transform="translate(-18, 0)">
      <polygon points="0,-10 0,10 -16,10 -16,14 -28,0 -16,-14 -16,-10" fill="white" opacity="0.9"/>
    </g>
    <!-- 右箭头（向左推） -->
    <g transform="translate(18, 0)">
      <polygon points="0,-10 0,10 16,10 16,14 28,0 16,-14 16,-10" fill="white" opacity="0.9"/>
    </g>
    <!-- 中间碰撞线 -->
    <line x1="-2" y1="-14" x2="-2" y2="14" stroke="white" stroke-width="2.5" opacity="0.7"/>

    <!-- 下方标签 -->
    <text x="0" y="80" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">死锁</text>
  </g>

  <!-- 连接线（从中心到四个策略） -->
  <g stroke="#b0d0f0" stroke-width="1.8" fill="none" opacity="0.6">
    <!-- 上 -->
    <line x1="400" y1="170" x2="400" y2="108"/>
    <!-- 右 -->
    <line x1="460" y1="240" x2="590" y2="240"/>
    <!-- 下 -->
    <line x1="400" y1="292" x2="400" y2="360"/>
    <!-- 左 -->
    <line x1="340" y1="240" x2="210" y2="240"/>
  </g>

  <!-- 策略1：人工干预（上方） -->
  <g transform="translate(400, 78)">
    <rect x="-120" y="-42" width="240" height="84" rx="10" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 手的图标 -->
    <g transform="translate(-72, 0)">
      <rect x="-6" y="-12" width="12" height="24" rx="3" fill="#409EFF" opacity="0.8"/>
      <rect x="-10" y="-6" width="20" height="4" rx="2" fill="#409EFF" opacity="0.8"/>
      <rect x="-10" y="2" width="20" height="4" rx="2" fill="#409EFF" opacity="0.8"/>
      <rect x="-14" y="-10" width="8" height="4" rx="2" fill="#409EFF" opacity="0.8"/>
      <rect x="-14" y="6" width="8" height="4" rx="2" fill="#409EFF" opacity="0.8"/>
    </g>
    <text x="18" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">人工干预</text>
    <text x="18" y="16" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">手动打破死锁</text>
    <rect x="85" y="-34" width="28" height="16" rx="4" fill="#67c23a"/>
    <text x="99" y="-22" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">推荐</text>
  </g>

  <!-- 策略2：安全默认（右侧） -->
  <g transform="translate(620, 240)">
    <rect x="-120" y="-42" width="240" height="84" rx="10" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 盾牌图标 -->
    <g transform="translate(-72, 0)">
      <path d="M-12,-14 L12,-14 L12,-2 Q12,10 0,16 Q-12,10 -12,-2 Z" fill="#409EFF" opacity="0.8"/>
      <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">✓</text>
    </g>
    <text x="18" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">安全默认</text>
    <text x="18" y="16" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">保守选项优先</text>
  </g>

  <!-- 策略3：打断与重构（下方） -->
  <g transform="translate(400, 390)">
    <rect x="-140" y="-42" width="280" height="84" rx="10" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 分裂图标 -->
    <g transform="translate(-88, 0)">
      <rect x="-12" y="-8" width="10" height="16" rx="2" fill="#409EFF" opacity="0.8"/>
      <rect x="2" y="-8" width="10" height="16" rx="2" fill="#409EFF" opacity="0.6"/>
      <rect x="14" y="-8" width="10" height="16" rx="2" fill="#409EFF" opacity="0.4"/>
      <line x1="-2" y1="-14" x2="22" y2="-14" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
      <line x1="-2" y1="14" x2="22" y2="14" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    </g>
    <text x="18" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">打断与重构</text>
    <text x="18" y="16" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">分解为可解决子问题</text>
  </g>

  <!-- 策略4：外部验证（左侧） -->
  <g transform="translate(180, 240)">
    <rect x="-120" y="-42" width="240" height="84" rx="10" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <!-- 数据库/API图标 -->
    <g transform="translate(-72, 0)">
      <ellipse cx="0" cy="-8" rx="14" ry="6" fill="#409EFF" opacity="0.8"/>
      <rect x="-14" y="-8" width="28" height="16" rx="3" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.8"/>
      <ellipse cx="0" cy="8" rx="14" ry="6" fill="#409EFF" opacity="0.5"/>
      <line x1="-14" y1="-2" x2="-14" y2="8" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
      <line x1="14" y1="-2" x2="14" y2="8" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    </g>
    <text x="18" y="-4" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">外部验证</text>
    <text x="18" y="16" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">客观事实解决争议</text>
  </g>

  <!-- 检测条件区域（底部） -->
  <g transform="translate(400, 470)">
    <rect x="-380" y="-20" width="760" height="40" rx="8" fill="white" stroke="#d0e4f5" stroke-width="1.2" filter="url(#shadow)"/>
    <text x="-355" y="2" text-anchor="start" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">检测条件：</text>

    <!-- 条件1 -->
    <g transform="translate(-220, 0)">
      <circle cx="-8" cy="0" r="4" fill="#409EFF" opacity="0.7"/>
      <text x="0" y="4" text-anchor="start" font-family="sans-serif" font-size="12" fill="#555">超最大轮次</text>
    </g>

    <!-- 条件2 -->
    <g transform="translate(-60, 0)">
      <circle cx="-8" cy="0" r="4" fill="#409EFF" opacity="0.7"/>
      <text x="0" y="4" text-anchor="start" font-family="sans-serif" font-size="12" fill="#555">连续相同投票</text>
    </g>

    <!-- 条件3 -->
    <g transform="translate(100, 0)">
      <circle cx="-8" cy="0" r="4" fill="#409EFF" opacity="0.7"/>
      <text x="0" y="4" text-anchor="start" font-family="sans-serif" font-size="12" fill="#555">共识低于阈值</text>
    </g>

    <!-- 条件4 -->
    <g transform="translate(250, 0)">
      <circle cx="-8" cy="0" r="4" fill="#409EFF" opacity="0.7"/>
      <text x="0" y="4" text-anchor="start" font-family="sans-serif" font-size="12" fill="#555">时间预算耗尽</text>
    </g>
  </g>

</svg>