<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4FAFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">死锁处理策略图解</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-opacity="0.4"/>

  <!-- ===== 中心：死锁警告图标 ===== -->
  <g transform="translate(400, 220)">
    <!-- 圆形背景 -->
    <circle cx="0" cy="0" r="52" fill="url(#centerGrad)" opacity="0.12"/>
    <circle cx="0" cy="0" r="44" fill="#FFFFFF" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 两个箭头互推 -->
    <!-- 左箭头 -->
    <g>
      <line x1="-28" y1="0" x2="0" y2="0" stroke="#409EFF" stroke-width="4" stroke-linecap="round"/>
      <polygon points="-6,-8 -18,0 -6,8" fill="#409EFF"/>
      <line x1="-18" y1="-14" x2="-18" y2="14" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- 右箭头 -->
    <g>
      <line x1="28" y1="0" x2="0" y2="0" stroke="#E74C3C" stroke-width="4" stroke-linecap="round"/>
      <polygon points="6,-8 18,0 6,8" fill="#E74C3C"/>
      <line x1="18" y1="-14" x2="18" y2="14" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- 中间 X -->
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 标签 -->
    <text x="0" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">死锁</text>
  </g>

  <!-- ===== 策略1：人工干预（推荐）— 左上 ===== -->
  <g transform="translate(140, 130)" filter="url(#shadow)">
    <rect x="-68" y="-30" width="136" height="60" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 手图标 -->
    <g transform="translate(-40, 0)">
      <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#409EFF" opacity="0.15"/>
      <path d="M-3,2 L-3,-4 Q-3,-7 0,-7 Q3,-7 3,-4 L3,2 L5,0 L5,5 Q5,8 2,8 L-2,8 Q-5,8 -5,5 L-5,2 Z" fill="#409EFF" stroke="#409EFF" stroke-width="0.5"/>
    </g>
    <text x="10" y="-4" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">人工干预</text>
    <text x="10" y="14" text-anchor="middle" font-size="11" fill="#666">推荐方案</text>
    <!-- 推荐标记 -->
    <rect x="48" y="-22" width="16" height="16" rx="8" fill="#67C23A"/>
    <text x="56" y="-11" text-anchor="middle" font-size="11" fill="#FFF" font-weight="700">✓</text>
  </g>

  <!-- ===== 策略2：安全默认 — 右上 ===== -->
  <g transform="translate(660, 130)" filter="url(#shadow)">
    <rect x="-68" y="-30" width="136" height="60" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 盾牌图标 -->
    <g transform="translate(-40, 0)">
      <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#409EFF" opacity="0.15"/>
      <path d="M0,-6 L-6,-3 L-6,2 Q-6,6 0,8 Q6,6 6,2 L6,-3 Z" fill="#409EFF" stroke="#409EFF" stroke-width="0.5"/>
      <line x1="-2" y1="0" x2="1" y2="3" stroke="#FFF" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="3" x2="4" y2="-2" stroke="#FFF" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="10" y="-4" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">安全默认</text>
    <text x="10" y="14" text-anchor="middle" font-size="11" fill="#666">保守选项</text>
  </g>

  <!-- ===== 策略3：分解重构 — 左下 ===== -->
  <g transform="translate(140, 370)" filter="url(#shadow)">
    <rect x="-72" y="-30" width="144" height="60" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 分解图标 -->
    <g transform="translate(-44, 0)">
      <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#409EFF" opacity="0.15"/>
      <rect x="-5" y="-5" width="4" height="4" rx="1" fill="#409EFF"/>
      <rect x="1" y="-5" width="4" height="4" rx="1" fill="#409EFF"/>
      <rect x="-5" y="1" width="4" height="4" rx="1" fill="#409EFF"/>
      <rect x="1" y="1" width="4" height="4" rx="1" fill="#409EFF"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#409EFF" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
    <text x="12" y="-4" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">分解重构</text>
    <text x="12" y="14" text-anchor="middle" font-size="11" fill="#666">拆解子问题</text>
  </g>

  <!-- ===== 策略4：外部验证 — 右下 ===== -->
  <g transform="translate(660, 370)" filter="url(#shadow)">
    <rect x="-72" y="-30" width="144" height="60" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 数据库图标 -->
    <g transform="translate(-44, 0)">
      <rect x="-8" y="-8" width="16" height="16" rx="4" fill="#409EFF" opacity="0.15"/>
      <ellipse cx="0" cy="-4" rx="6" ry="2.5" fill="none" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="-6" y1="-4" x2="-6" y2="4" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="6" y1="-4" x2="6" y2="4" stroke="#409EFF" stroke-width="1.2"/>
      <ellipse cx="0" cy="4" rx="6" ry="2.5" fill="none" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="-3" y1="-1" x2="-3" y2="1" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="3" y1="-1" x2="3" y2="1" stroke="#409EFF" stroke-width="0.8"/>
    </g>
    <text x="12" y="-4" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">外部验证</text>
    <text x="12" y="14" text-anchor="middle" font-size="11" fill="#666">客观事实</text>
  </g>

  <!-- ===== 连接线：中心到四个策略 ===== -->
  <!-- 到左上 -->
  <path d="M370,195 Q300,170 210,155" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- 到右上 -->
  <path d="M430,195 Q500,170 590,155" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- 到左下 -->
  <path d="M370,250 Q300,290 210,345" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- 到右下 -->
  <path d="M430,250 Q500,290 590,345" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ===== 检测条件面板 — 底部居中 ===== -->
  <g transform="translate(400, 460)">
    <rect x="-220" y="-22" width="440" height="44" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.5" filter="url(#shadow)"/>
    <text x="-200" y="-4" font-size="12" font-weight="700" fill="#1a1a2e">检测条件：</text>
    <!-- 条件1 -->
    <circle cx="-110" cy="-4" r="3" fill="#409EFF"/>
    <text x="-102" y="-1" font-size="11" fill="#555">超轮次</text>
    <!-- 条件2 -->
    <circle cx="-30" cy="-4" r="3" fill="#409EFF"/>
    <text x="-22" y="-1" font-size="11" fill="#555">连续相同投票</text>
    <!-- 条件3 -->
    <circle cx="80" cy="-4" r="3" fill="#409EFF"/>
    <text x="88" y="-1" font-size="11" fill="#555">共识不足</text>
    <!-- 条件4 -->
    <circle cx="165" cy="-4" r="3" fill="#409EFF"/>
    <text x="173" y="-1" font-size="11" fill="#555">超时</text>
  </g>

  <!-- 标注1：左上策略说明 -->
  <g transform="translate(50, 95)">
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="40" y="15" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">手动介入</text>
  </g>

  <!-- 标注2：右上策略说明 -->
  <g transform="translate(670, 95)">
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="40" y="15" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">回退机制</text>
  </g>

  <!-- 标注3：左下策略说明 -->
  <g transform="translate(50, 335)">
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="40" y="15" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">分而治之</text>
  </g>

  <!-- 标注4：右下策略说明 -->
  <g transform="translate(670, 335)">
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="40" y="15" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">数据仲裁</text>
  </g>

  <!-- 标注5：中心上方 -->
  <g transform="translate(400, 150)">
    <rect x="-45" y="0" width="90" height="22" rx="6" fill="#E74C3C" opacity="0.08"/>
    <text x="0" y="15" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="600">双方僵持</text>
  </g>

  <!-- 标注6：中心下方 -->
  <g transform="translate(400, 290)">
    <rect x="-45" y="0" width="90" height="22" rx="6" fill="#E74C3C" opacity="0.08"/>
    <text x="0" y="15" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="600">无法推进</text>
  </g>

</svg>