<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">知识体系总览</text>

  <!-- 知识环 - 外圈图标排列 (圆形排列) -->
  <!-- 环中心: 400, 210; 半径: 120 -->

  <!-- 1. 智能体类型 - 左上 (320, 110) -->
  <g transform="translate(290, 100)">
    <rect x="-28" y="-28" width="56" height="56" rx="28" fill="#409EFF" opacity="0.12"/>
    <rect x="-22" y="-22" width="44" height="44" rx="22" fill="#409EFF" opacity="0.25"/>
    <!-- 三个小圆点表示三种类型 -->
    <circle cx="-8" cy="-6" r="5" fill="#409EFF"/>
    <circle cx="0" cy="8" r="5" fill="#409EFF"/>
    <circle cx="10" cy="-4" r="5" fill="#409EFF" opacity="0.6"/>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">智能体类型</text>
  </g>

  <!-- 2. 记忆系统 - 上中 (400, 80) -->
  <g transform="translate(400, 80)">
    <rect x="-28" y="-28" width="56" height="56" rx="28" fill="#409EFF" opacity="0.12"/>
    <rect x="-22" y="-22" width="44" height="44" rx="22" fill="#409EFF" opacity="0.25"/>
    <!-- 三层金字塔 -->
    <rect x="-14" y="-14" width="28" height="8" rx="2" fill="#409EFF" opacity="0.9"/>
    <rect x="-10" y="-4" width="20" height="8" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="-6" y="6" width="12" height="8" rx="2" fill="#409EFF" opacity="0.5"/>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">记忆系统</text>
  </g>

  <!-- 3. OTA循环 - 右上 (510, 100) -->
  <g transform="translate(510, 100)">
    <rect x="-28" y="-28" width="56" height="56" rx="28" fill="#409EFF" opacity="0.12"/>
    <rect x="-22" y="-22" width="44" height="44" rx="22" fill="#409EFF" opacity="0.25"/>
    <!-- 循环箭头 -->
    <path d="M-8,-10 A14,14 0 1,1 -10,8" fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <polygon points="-10,8 -16,4 -4,4" fill="#409EFF"/>
    <path d="M8,10 A14,14 0 1,1 10,-8" fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <polygon points="10,-8 16,-4 4,-4" fill="#409EFF" opacity="0.6"/>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">OTA循环</text>
  </g>

  <!-- 4. 架构 - 右下 (510, 290) -->
  <g transform="translate(510, 290)">
    <rect x="-28" y="-28" width="56" height="56" rx="28" fill="#409EFF" opacity="0.12"/>
    <rect x="-22" y="-22" width="44" height="44" rx="22" fill="#409EFF" opacity="0.25"/>
    <!-- 四层堆叠 -->
    <rect x="-14" y="-16" width="28" height="6" rx="2" fill="#409EFF" opacity="0.9"/>
    <rect x="-14" y="-8" width="28" height="6" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="-14" y="0" width="28" height="6" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="-14" y="8" width="28" height="6" rx="2" fill="#409EFF" opacity="0.3"/>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">四层架构</text>
  </g>

  <!-- 5. 能力边界 - 左下 (290, 290) -->
  <g transform="translate(290, 290)">
    <rect x="-28" y="-28" width="56" height="56" rx="28" fill="#409EFF" opacity="0.12"/>
    <rect x="-22" y="-22" width="44" height="44" rx="22" fill="#409EFF" opacity="0.25"/>
    <!-- 天平 -->
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="14" r="3" fill="#409EFF"/>
    <rect x="-16" y="-6" width="8" height="6" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="8" y="-6" width="8" height="6" rx="1" fill="#409EFF" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">能力边界</text>
  </g>

  <!-- 连接线（环） -->
  <circle cx="400" cy="195" r="115" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- 中央：笔记本电脑/编辑器 -->
  <g transform="translate(400, 195)">
    <!-- 发光箭头（向上） -->
    <path d="M0,-70 L-6,-58 L-2,-58 L-2,-42 L2,-42 L2,-58 L6,-58 Z" fill="#409EFF" opacity="0.25"/>
    <path d="M0,-65 L-4,-56 L-1,-56 L-1,-44 L1,-44 L1,-56 L4,-56 Z" fill="#409EFF" opacity="0.4"/>

    <!-- 笔记本电脑底座 -->
    <rect x="-48" y="8" width="96" height="6" rx="3" fill="#1a1a2e" opacity="0.15"/>
    <!-- 屏幕 -->
    <rect x="-42" y="-32" width="84" height="42" rx="6" fill="#1a1a2e" opacity="0.08"/>
    <rect x="-38" y="-28" width="76" height="34" rx="4" fill="#1a1a2e" opacity="0.12"/>
    <!-- 代码行 -->
    <rect x="-32" y="-22" width="40" height="3" rx="1.5" fill="#409EFF" opacity="0.6"/>
    <rect x="-32" y="-16" width="55" height="3" rx="1.5" fill="#409EFF" opacity="0.4"/>
    <rect x="-32" y="-10" width="30" height="3" rx="1.5" fill="#409EFF" opacity="0.5"/>
    <rect x="-32" y="-4" width="48" height="3" rx="1.5" fill="#409EFF" opacity="0.35"/>

    <!-- 从屏幕冒出的小机器人 -->
    <g transform="translate(0, -36)">
      <!-- 身体 -->
      <rect x="-10" y="-8" width="20" height="16" rx="4" fill="#409EFF" opacity="0.85"/>
      <!-- 头 -->
      <rect x="-8" y="-16" width="16" height="10" rx="4" fill="#409EFF"/>
      <!-- 眼睛 -->
      <circle cx="-4" cy="-12" r="2" fill="white"/>
      <circle cx="4" cy="-12" r="2" fill="white"/>
      <!-- 天线 -->
      <line x1="0" y1="-16" x2="0" y2="-22" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="-24" r="3" fill="#409EFF" opacity="0.7"/>
      <!-- 手臂 -->
      <rect x="-14" y="-6" width="4" height="8" rx="2" fill="#409EFF" opacity="0.7"/>
      <rect x="10" y="-6" width="4" height="8" rx="2" fill="#409EFF" opacity="0.7"/>
    </g>
  </g>

  <!-- 底部标语 -->
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">最好的学习时机是现在，最好的学习方式是动手构建</text>

  <!-- 副标语 / 标注 -->
  <text x="400" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#409EFF" opacity="0.8">从此刻开始，构建你的 AI 智能体</text>

  <!-- 6个标注 - 指向各知识点的简短说明 -->
  <!-- 标注1: 智能体类型 -->
  <line x1="305" y1="130" x2="305" y2="150" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="305" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#409EFF">反应/ deliberative/混合</text>

  <!-- 标注2: 记忆系统 -->
  <line x1="400" y1="108" x2="400" y2="128" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="400" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#409EFF">三层金字塔结构</text>

  <!-- 标注3: OTA循环 -->
  <line x1="495" y1="130" x2="495" y2="150" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="495" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#409EFF">观察-思考-行动</text>

  <!-- 标注4: 架构 -->
  <line x1="495" y1="318" x2="495" y2="338" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="495" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#409EFF">感知-决策-执行-学习</text>

  <!-- 标注5: 能力边界 -->
  <line x1="305" y1="318" x2="305" y2="338" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="305" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#409EFF">平衡扩展与约束</text>

  <!-- 标注6: 中央构建 -->
  <line x1="400" y1="240" x2="400" y2="260" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="400" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#409EFF">立即开始构建</text>

  <!-- 底部装饰线 -->
  <line x1="200" y1="430" x2="600" y2="430" stroke="#409EFF" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="430" r="3" fill="#409EFF" opacity="0.4"/>

  <!-- 底部小字 -->
  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.4">教育插画 · AI 智能体知识体系</text>

  <!-- 向上箭头（右侧小箭头） -->
  <g transform="translate(720, 420)">
    <path d="M0,20 L-6,10 L-2,10 L-2,0 L2,0 L2,10 L6,10 Z" fill="#409EFF" opacity="0.3"/>
  </g>
</svg>