<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Transformer 核心架构组件</text>

  <!-- Connecting lines (pentagon + center) -->
  <g stroke="#1a1a2e" stroke-width="2.5" fill="none" opacity="0.6">
    <!-- Center to cards -->
    <line x1="400" y1="250" x2="400" y2="120"/>
    <line x1="400" y1="250" x2="580" y2="185"/>
    <line x1="400" y1="250" x2="535" y2="370"/>
    <line x1="400" y1="250" x2="265" y2="370"/>
    <line x1="400" y1="250" x2="220" y2="185"/>
    <!-- Outer pentagon ring -->
    <polygon points="400,120 580,185 535,370 265,370 220,185" stroke-dasharray="6,4" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Central core -->
  <circle cx="400" cy="250" r="52" fill="url(#coreGrad)" stroke="#409EFF" stroke-width="2"/>
  <circle cx="400" cy="250" r="44" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Transformer</text>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#aaccff">Core</text>

  <!-- Card 1: Token Embedding (top) -->
  <g transform="translate(400,120)">
    <rect x="-68" y="-30" width="136" height="60" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Token Embedding</text>
    <!-- Icon: T→V transformation -->
    <g transform="translate(0,8)" stroke="#ffffff" stroke-width="1.5" fill="none">
      <rect x="-16" y="-6" width="12" height="12" rx="2"/>
      <text x="-10" y="4" text-anchor="middle" font-size="8" fill="#ffffff" stroke="none">T</text>
      <line x1="-2" y1="0" x2="4" y2="0"/>
      <polygon points="4,-3 8,0 4,3"/>
      <rect x="8" y="-6" width="12" height="12" rx="2"/>
      <text x="14" y="4" text-anchor="middle" font-size="7" fill="#ffffff" stroke="none">V</text>
    </g>
  </g>

  <!-- Card 2: Positional Encoding (top-right) -->
  <g transform="translate(580,185)">
    <rect x="-72" y="-30" width="144" height="60" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Positional Encoding</text>
    <!-- Icon: sine wave -->
    <g transform="translate(0,8)" stroke="#ffffff" stroke-width="1.5" fill="none">
      <path d="M-20,0 Q-15,-10 -10,0 Q-5,10 0,0 Q5,-10 10,0 Q15,10 20,0"/>
      <text x="-26" y="6" font-size="7" fill="#ffffff" stroke="none">1</text>
      <text x="22" y="6" font-size="7" fill="#ffffff" stroke="none">n</text>
    </g>
  </g>

  <!-- Card 3: Self-Attention (bottom-right) -->
  <g transform="translate(535,370)">
    <rect x="-68" y="-30" width="136" height="60" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Self-Attention</text>
    <!-- Icon: Q-K-V nodes -->
    <g transform="translate(0,8)" stroke="#ffffff" stroke-width="1.3" fill="none">
      <circle cx="-14" cy="0" r="6"/>
      <text x="-14" y="2" text-anchor="middle" font-size="6" fill="#ffffff" stroke="none">Q</text>
      <circle cx="0" cy="-10" r="6"/>
      <text x="0" y="-8" text-anchor="middle" font-size="6" fill="#ffffff" stroke="none">K</text>
      <circle cx="14" cy="0" r="6"/>
      <text x="14" y="2" text-anchor="middle" font-size="6" fill="#ffffff" stroke="none">V</text>
      <!-- Arrows between -->
      <line x1="-8" y1="-2" x2="-4" y2="-6"/>
      <line x1="4" y1="-6" x2="8" y2="-2"/>
      <line x1="-8" y1="2" x2="-4" y2="6"/>
      <line x1="4" y1="6" x2="8" y2="2"/>
      <line x1="-4" y1="0" x2="4" y2="0"/>
    </g>
  </g>

  <!-- Card 4: Multi-Head Attention (bottom-left) -->
  <g transform="translate(265,370)">
    <rect x="-78" y="-30" width="156" height="60" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Multi-Head Attention</text>
    <!-- Icon: parallel heads converging -->
    <g transform="translate(0,8)" stroke="#ffffff" stroke-width="1.3" fill="none">
      <line x1="-20" y1="-8" x2="-4" y2="0"/>
      <line x1="-20" y1="0" x2="-4" y2="0"/>
      <line x1="-20" y1="8" x2="-4" y2="0"/>
      <line x1="4" y1="0" x2="20" y2="0"/>
      <circle cx="-20" cy="-8" r="3" fill="#ffffff" opacity="0.4"/>
      <circle cx="-20" cy="0" r="3" fill="#ffffff" opacity="0.4"/>
      <circle cx="-20" cy="8" r="3" fill="#ffffff" opacity="0.4"/>
      <polygon points="20,-3 24,0 20,3"/>
    </g>
  </g>

  <!-- Card 5: Feed-Forward Network (top-left) -->
  <g transform="translate(220,185)">
    <rect x="-78" y="-30" width="156" height="60" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Feed-Forward Network</text>
    <!-- Icon: layered neural nodes -->
    <g transform="translate(0,8)" stroke="#ffffff" stroke-width="1.3" fill="none">
      <circle cx="-18" cy="0" r="3"/>
      <circle cx="-10" cy="-6" r="3"/>
      <circle cx="-10" cy="0" r="3"/>
      <circle cx="-10" cy="6" r="3"/>
      <circle cx="0" cy="-4" r="3"/>
      <circle cx="0" cy="4" r="3"/>
      <circle cx="10" cy="0" r="3"/>
      <circle cx="18" cy="0" r="3"/>
      <!-- connections -->
      <line x1="-15" y1="0" x2="-12" y2="-4"/>
      <line x1="-15" y1="0" x2="-12" y2="0"/>
      <line x1="-15" y1="0" x2="-12" y2="4"/>
      <line x1="-7" y1="-4" x2="-3" y2="-2"/>
      <line x1="-7" y1="0" x2="-3" y2="-2"/>
      <line x1="-7" y1="4" x2="-3" y2="-2"/>
      <line x1="-7" y1="-4" x2="-3" y2="2"/>
      <line x1="-7" y1="0" x2="-3" y2="2"/>
      <line x1="-7" y1="4" x2="-3" y2="2"/>
      <line x1="3" y1="-2" x2="7" y2="0"/>
      <line x1="3" y1="2" x2="7" y2="0"/>
      <line x1="13" y1="0" x2="15" y2="0"/>
    </g>
  </g>

  <!-- Bottom note box -->
  <g transform="translate(400,460)">
    <rect x="-290" y="-28" width="580" height="56" rx="10" fill="#1a1a2e" opacity="0.08"/>
    <rect x="-288" y="-26" width="576" height="52" rx="9" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">残差连接 (Residual Connection)  &amp;  层归一化 (Layer Normalization)</text>
    <text x="0" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#2d2d5e">这两个技巧虽然看似简单，但对于训练深层 Transformer 至关重要。</text>
  </g>

  <!-- Subtle decorative dots -->
  <circle cx="50" cy="460" r="3" fill="#409EFF" opacity="0.15"/>
  <circle cx="750" cy="460" r="3" fill="#409EFF" opacity="0.15"/>
  <circle cx="50" cy="40" r="3" fill="#409EFF" opacity="0.15"/>
  <circle cx="750" cy="40" r="3" fill="#409EFF" opacity="0.15"/>
</svg>