<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7cd0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">LlamaIndex：RAG 框架桥接 LLM 与您的数据</text>

  <!-- ===== 左侧：LLM ===== -->
  <g transform="translate(80, 130)">
    <!-- LLM 图标背景 -->
    <rect x="0" y="0" width="140" height="140" rx="16" fill="#1a1a2e" opacity="0.9"/>
    <!-- 神经网络示意 -->
    <circle cx="70" cy="35" r="10" fill="#409EFF"/>
    <circle cx="45" cy="65" r="8" fill="#409EFF" opacity="0.7"/>
    <circle cx="95" cy="65" r="8" fill="#409EFF" opacity="0.7"/>
    <circle cx="70" cy="65" r="8" fill="#409EFF"/>
    <circle cx="35" cy="95" r="7" fill="#409EFF" opacity="0.5"/>
    <circle cx="70" cy="95" r="7" fill="#409EFF" opacity="0.5"/>
    <circle cx="105" cy="95" r="7" fill="#409EFF" opacity="0.5"/>
    <!-- 连接线 -->
    <line x1="70" y1="45" x2="45" y2="57" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="70" y1="45" x2="95" y2="57" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="45" y1="73" x2="35" y2="88" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="73" x2="70" y2="88" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="95" y1="73" x2="70" y2="88" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="95" y1="73" x2="105" y2="88" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="70" y1="73" x2="70" y2="88" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <!-- 标签 -->
    <text x="70" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">大语言模型</text>
  </g>

  <!-- 左侧标注：LLM -->
  <text x="150" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">大语言模型</text>
  <text x="150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">GPT / 文心 / 通义</text>

  <!-- ===== 桥梁 ===== -->
  <!-- 桥面 -->
  <rect x="240" y="200" width="320" height="40" rx="8" fill="url(#bridgeGrad)" opacity="0.9"/>
  <!-- 桥面文字 -->
  <text x="400" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">LlamaIndex</text>

  <!-- 桥墩 -->
  <g>
    <!-- 桥墩 1：数据连接器 -->
    <rect x="260" y="240" width="60" height="100" rx="6" fill="#409EFF" opacity="0.25"/>
    <rect x="260" y="240" width="60" height="6" rx="3" fill="#409EFF"/>
    <text x="290" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">数据</text>
    <text x="290" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">连接器</text>

    <!-- 桥墩 2：索引 -->
    <rect x="340" y="240" width="60" height="100" rx="6" fill="#409EFF" opacity="0.25"/>
    <rect x="340" y="240" width="60" height="6" rx="3" fill="#409EFF"/>
    <text x="370" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">索引</text>
    <text x="370" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">构建</text>

    <!-- 桥墩 3：查询引擎 -->
    <rect x="420" y="240" width="60" height="100" rx="6" fill="#409EFF" opacity="0.25"/>
    <rect x="420" y="240" width="60" height="6" rx="3" fill="#409EFF"/>
    <text x="450" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">查询</text>
    <text x="450" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">引擎</text>

    <!-- 桥墩 4：对话引擎 -->
    <rect x="500" y="240" width="60" height="100" rx="6" fill="#409EFF" opacity="0.25"/>
    <rect x="500" y="240" width="60" height="6" rx="3" fill="#409EFF"/>
    <text x="530" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">对话</text>
    <text x="530" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">引擎</text>
  </g>

  <!-- 桥下标注 -->
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">核心能力支柱</text>

  <!-- ===== 右侧：您的数据 ===== -->
  <g transform="translate(580, 100)">
    <!-- 数据图标组 -->
    <!-- 文档 -->
    <rect x="0" y="0" width="130" height="50" rx="8" fill="#1a1a2e" opacity="0.85"/>
    <rect x="12" y="8" width="18" height="24" rx="2" fill="#ffffff" opacity="0.9"/>
    <line x1="14" y1="14" x2="28" y2="14" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="14" y1="20" x2="28" y2="20" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="14" y1="26" x2="24" y2="26" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="55" y="22" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">文档</text>
    <text x="55" y="40" font-family="Arial, sans-serif" font-size="11" fill="#aac">PDF / Word</text>

    <!-- 数据库 -->
    <rect x="0" y="60" width="130" height="50" rx="8" fill="#1a1a2e" opacity="0.85"/>
    <ellipse cx="22" cy="82" rx="14" ry="6" fill="#409EFF" opacity="0.6"/>
    <rect x="8" y="82" width="28" height="16" rx="2" fill="#409EFF" opacity="0.3"/>
    <ellipse cx="22" cy="98" rx="14" ry="6" fill="#409EFF" opacity="0.4"/>
    <text x="55" y="82" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">数据库</text>
    <text x="55" y="100" font-family="Arial, sans-serif" font-size="11" fill="#aac">SQL / 向量库</text>

    <!-- API -->
    <rect x="0" y="120" width="130" height="50" rx="8" fill="#1a1a2e" opacity="0.85"/>
    <rect x="12" y="130" width="20" height="20" rx="4" fill="#409EFF" opacity="0.5"/>
    <rect x="16" y="134" width="12" height="12" rx="2" fill="#ffffff" opacity="0.7"/>
    <text x="55" y="142" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">API</text>
    <text x="55" y="160" font-family="Arial, sans-serif" font-size="11" fill="#aac">SaaS / 内部系统</text>
  </g>

  <!-- 右侧标注 -->
  <text x="645" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">您的数据</text>
  <text x="645" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">多种数据源</text>

  <!-- ===== 连接箭头 ===== -->
  <!-- 左侧箭头：LLM → 桥梁 -->
  <g>
    <line x1="220" y1="200" x2="240" y2="200" stroke="#409EFF" stroke-width="3" marker-end="url(#arrowLeft)"/>
    <defs>
      <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
      </marker>
    </defs>
  </g>

  <!-- 右侧箭头：桥梁 → 数据 -->
  <g>
    <line x1="560" y1="200" x2="580" y2="200" stroke="#409EFF" stroke-width="3" marker-end="url(#arrowRight)"/>
    <defs>
      <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
      </marker>
    </defs>
  </g>

  <!-- 桥下双向箭头示意 -->
  <g>
    <path d="M 280 380 Q 400 420 520 380" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" opacity="0.7">检索增强生成（RAG）双向数据流</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888">LlamaIndex 提供统一接口，连接大语言模型与私有数据，实现高效检索与生成</text>
</svg>