<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e3f0ff"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f9ff"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2d7fd3"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">提示工程模板设计模式</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ============ 左侧：变量插值 ============ -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="220" height="180" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="110" y="24" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">变量插值</text>
    <text x="110" y="40" text-anchor="middle" font-family="'Arial',sans-serif" font-size="11" fill="#666">Variable Interpolation</text>

    <!-- 文档模板 -->
    <rect x="25" y="52" width="170" height="80" rx="6" fill="#f0f7ff" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
    <text x="110" y="70" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#1a1a2e">你是一个 {role}</text>
    <text x="110" y="88" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#1a1a2e">将 {source_lang}</text>
    <text x="110" y="106" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#1a1a2e">翻译为 {target_lang}</text>
    <text x="110" y="124" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#999">...</text>

    <!-- 替换箭头 -->
    <line x1="50" y1="138" x2="50" y2="158" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="110" y1="138" x2="110" y2="158" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="170" y1="138" x2="170" y2="158" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 替换值 -->
    <rect x="30" y="158" width="40" height="18" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="50" y="170" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">翻译助手</text>
    <rect x="90" y="158" width="40" height="18" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="170" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">中文</text>
    <rect x="150" y="158" width="40" height="18" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="170" y="170" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">英文</text>
  </g>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ============ 中间：条件分支 ============ -->
  <g transform="translate(290, 70)">
    <rect x="0" y="0" width="220" height="180" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="110" y="24" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">条件分支</text>
    <text x="110" y="40" text-anchor="middle" font-family="'Arial',sans-serif" font-size="11" fill="#666">Conditional Branching</text>

    <!-- 决策树 -->
    <rect x="85" y="52" width="50" height="22" rx="11" fill="#409EFF"/>
    <text x="110" y="67" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#fff">水平?</text>

    <!-- 分支线 -->
    <line x1="110" y1="74" x2="110" y2="90" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="40" y1="90" x2="180" y2="90" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="40" y1="90" x2="40" y2="105" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="110" y1="90" x2="110" y2="105" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="180" y1="90" x2="180" y2="105" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 分支节点 -->
    <rect x="20" y="105" width="40" height="18" rx="4" fill="#e8f4ff" stroke="#409EFF" stroke-width="0.8"/>
    <text x="40" y="117" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">beginner</text>
    <rect x="90" y="105" width="40" height="18" rx="4" fill="#e8f4ff" stroke="#409EFF" stroke-width="0.8"/>
    <text x="110" y="117" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">intermediate</text>
    <rect x="160" y="105" width="40" height="18" rx="4" fill="#e8f4ff" stroke="#409EFF" stroke-width="0.8"/>
    <text x="180" y="117" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">advanced</text>

    <!-- 分支结果 -->
    <line x1="40" y1="123" x2="40" y2="138" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="110" y1="123" x2="110" y2="138" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="180" y1="123" x2="180" y2="138" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>

    <rect x="15" y="138" width="50" height="16" rx="3" fill="#f5f9ff" stroke="#ccc" stroke-width="0.5"/>
    <text x="40" y="149" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#666">简单指令</text>
    <rect x="85" y="138" width="50" height="16" rx="3" fill="#f5f9ff" stroke="#ccc" stroke-width="0.5"/>
    <text x="110" y="149" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#666">标准指令</text>
    <rect x="155" y="138" width="50" height="16" rx="3" fill="#f5f9ff" stroke="#ccc" stroke-width="0.5"/>
    <text x="180" y="149" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#666">专家指令</text>

    <!-- 提示片段 -->
    <rect x="25" y="158" width="170" height="18" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="0.5" opacity="0.7"/>
    <text x="110" y="170" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#e65100">不同水平 → 不同提示片段</text>
  </g>

  <!-- ============ 右侧：模块化组合 ============ -->
  <g transform="translate(550, 70)">
    <rect x="0" y="0" width="220" height="180" rx="12" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="110" y="24" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">模块化组合</text>
    <text x="110" y="40" text-anchor="middle" font-family="'Arial',sans-serif" font-size="11" fill="#666">Modular Composition</text>

    <!-- 拼图模块 -->
    <g transform="translate(25, 55)">
      <!-- 模块1 -->
      <path d="M0,0 L50,0 L50,10 L40,15 L50,20 L50,30 L0,30 Z" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1"/>
      <text x="25" y="20" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#409EFF">Role</text>

      <!-- 模块2 -->
      <path d="M55,0 L105,0 L105,10 L95,15 L105,20 L105,30 L55,30 Z" fill="#409EFF" opacity="0.35" stroke="#409EFF" stroke-width="1"/>
      <text x="80" y="20" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#fff">Safety</text>

      <!-- 模块3 -->
      <path d="M110,0 L160,0 L160,10 L150,15 L160,20 L160,30 L110,30 Z" fill="#409EFF" opacity="0.5" stroke="#409EFF" stroke-width="1"/>
      <text x="135" y="20" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#fff">Output</text>
    </g>

    <!-- 齿轮图标 -->
    <g transform="translate(110, 110)">
      <circle cx="0" cy="0" r="18" fill="url(#gearGrad)" opacity="0.15"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#409EFF" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#409EFF"/>
      <!-- 齿轮齿 -->
      <rect x="-3" y="-16" width="6" height="6" rx="1" fill="#409EFF"/>
      <rect x="-3" y="10" width="6" height="6" rx="1" fill="#409EFF"/>
      <rect x="-16" y="-3" width="6" height="6" rx="1" fill="#409EFF"/>
      <rect x="10" y="-3" width="6" height="6" rx="1" fill="#409EFF"/>
      <rect x="7" y="-12" width="5" height="5" rx="1" fill="#409EFF" transform="rotate(45 9 -9)"/>
      <rect x="-12" y="7" width="5" height="5" rx="1" fill="#409EFF" transform="rotate(45 -9 9)"/>
      <rect x="7" y="7" width="5" height="5" rx="1" fill="#409EFF" transform="rotate(45 9 9)"/>
      <rect x="-12" y="-12" width="5" height="5" rx="1" fill="#409EFF" transform="rotate(45 -9 -9)"/>
    </g>

    <text x="110" y="148" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#666">组装完整提示</text>

    <!-- 完成提示 -->
    <rect x="30" y="156" width="160" height="20" rx="5" fill="#409EFF" opacity="0.1" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="110" y="169" text-anchor="middle" font-family="'Arial',sans-serif" font-size="9" fill="#409EFF">角色 + 安全 + 输出格式</text>
  </g>

  <!-- ============ 底部：配置化 ============ -->
  <g transform="translate(0, 280)">
    <rect x="200" y="0" width="400" height="90" rx="14" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="400" y="24" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">配置化 / Configuration-Driven</text>

    <!-- YAML 图标 -->
    <g transform="translate(280, 38)">
      <rect x="0" y="0" width="40" height="48" rx="4" fill="#f0f7ff" stroke="#409EFF" stroke-width="1"/>
      <text x="20" y="20" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#409EFF">YAML</text>
      <line x1="6" y1="28" x2="34" y2="28" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
      <line x1="6" y1="34" x2="28" y2="34" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
      <line x1="6" y1="40" x2="30" y2="40" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- 配置示例 -->
    <g transform="translate(340, 35)">
      <text x="0" y="12" font-family="'Courier New',monospace" font-size="11" fill="#1a1a2e">role: 翻译助手</text>
      <text x="0" y="28" font-family="'Courier New',monospace" font-size="11" fill="#1a1a2e">source: 中文</text>
      <text x="0" y="44" font-family="'Courier New',monospace" font-size="11" fill="#1a1a2e">target: 英文</text>
    </g>

    <!-- 箭头连接 -->
    <g transform="translate(470, 42)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
      <polygon points="40,-4 48,0 40,4" fill="#409EFF"/>
    </g>

    <!-- 输出提示 -->
    <g transform="translate(520, 35)">
      <rect x="0" y="0" width="60" height="40" rx="6" fill="#409EFF" opacity="0.1"/>
      <text x="30" y="16" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#409EFF">生成</text>
      <text x="30" y="32" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#409EFF">提示</text>
    </g>
  </g>

  <!-- 标注 -->
  <g font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#1a1a2e">
    <!-- 标注1 -->
    <circle cx="160" cy="200" r="3" fill="#409EFF"/>
    <line x1="160" y1="200" x2="160" y2="215" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="135" y="215" width="50" height="18" rx="4" fill="#409EFF" opacity="0.12"/>
    <text x="160" y="228" text-anchor="middle" font-size="11" fill="#409EFF">占位符替换</text>

    <!-- 标注2 -->
    <circle cx="400" cy="210" r="3" fill="#409EFF"/>
    <line x1="400" y1="210" x2="400" y2="225" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="375" y="225" width="50" height="18" rx="4" fill="#409EFF" opacity="0.12"/>
    <text x="400" y="238" text-anchor="middle" font-size="11" fill="#409EFF">水平判断</text>

    <!-- 标注3 -->
    <circle cx="660" cy="210" r="3" fill="#409EFF"/>
    <line x1="660" y1="210" x2="660" y2="225" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="635" y="225" width="50" height="18" rx="4" fill="#409EFF" opacity="0.12"/>
    <text x="660" y="238" text-anchor="middle" font-size="11" fill="#409EFF">模块组装</text>

    <!-- 标注4 -->
    <circle cx="400" cy="330" r="3" fill="#409EFF"/>
    <line x1="400" y1="330" x2="400" y2="345" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="375" y="345" width="50" height="18" rx="4" fill="#409EFF" opacity="0.12"/>
    <text x="400" y="358" text-anchor="middle" font-size="11" fill="#409EFF">配置驱动</text>

    <!-- 标注5 -->
    <circle cx="50" cy="130" r="3" fill="#409EFF"/>
    <line x1="50" y1="130" x2="20" y2="145" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="5" y="145" width="40" height="18" rx="4" fill="#409EFF" opacity="0.12"/>
    <text x="25" y="158" text-anchor="middle" font-size="11" fill="#409EFF">模板文档</text>

    <!-- 标注6 -->
    <circle cx="680" cy="130" r="3" fill="#409EFF"/>
    <line x1="680" y1="130" x2="710" y2="145" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="695" y="145" width="40" height="18" rx="4" fill="#409EFF" opacity="0.12"/>
    <text x="715" y="158" text-anchor="middle" font-size="11" fill="#409EFF">齿轮组装</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#409EFF" stroke-width="0.5" opacity="0.2"/>
</svg>