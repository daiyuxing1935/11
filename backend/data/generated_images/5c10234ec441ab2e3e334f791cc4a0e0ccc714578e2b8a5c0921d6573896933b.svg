      <stop offset="100%" stop-color="#e5f0ff"/>
    </linearGradient>
    <linearGradient id="barGrad7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="barGrad8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#f2f7ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI模型多环境评估得分对比</text>

  <!-- 图表区域 -->
  <!-- Y轴标签 -->
  <text x="120" y="92" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">GPT-4</text>
  <text x="120" y="142" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">GPT-3.5</text>
  <text x="120" y="192" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">Claude-2</text>
  <text x="120" y="242" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">Llama-2</text>
  <text x="120" y="292" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">ChatGLM3</text>

  <!-- 网格线（水平） -->
  <line x1="140" y1="80" x2="740" y2="80" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="140" y1="130" x2="740" y2="130" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="140" y1="180" x2="740" y2="180" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="140" y1="230" x2="740" y2="230" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="140" y1="280" x2="740" y2="280" stroke="#d0d8e8" stroke-width="0.5"/>

  <!-- 网格线（垂直） -->
  <line x1="140" y1="70" x2="140" y2="300" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="260" y1="70" x2="260" y2="300" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="380" y1="70" x2="380" y2="300" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="500" y1="70" x2="500" y2="300" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="620" y1="70" x2="620" y2="300" stroke="#d0d8e8" stroke-width="0.5"/>
  <line x1="740" y1="70" x2="740" y2="300" stroke="#d0d8e8" stroke-width="0.5"/>

