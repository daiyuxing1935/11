  <text x="440" y="348" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e">评估得分</text>

  <!-- 条形图 - 每个模型有8个环境评估 -->
  <!-- 环境1: 代码生成 -->
  <rect x="140" y="72" width="540" height="10" rx="5" ry="5" fill="url(#barGrad1)" opacity="0.9"/>
  <rect x="140" y="122" width="480" height="10" rx="5" ry="5" fill="url(#barGrad2)" opacity="0.9"/>
  <rect x="140" y="172" width="510" height="10" rx="5" ry="5" fill="url(#barGrad3)" opacity="0.9"/>
  <rect x="140" y="222" width="450" height="10" rx="5" ry="5" fill="url(#barGrad4)" opacity="0.9"/>
  <rect x="140" y="272" width="420" height="10" rx="5" ry="5" fill="url(#barGrad5)" opacity="0.9"/>

  <!-- 环境2: 逻辑推理 -->
  <rect x="140" y="86" width="510" height="10" rx="5" ry="5" fill="url(#barGrad2)" opacity="0.85"/>
  <rect x="140" y="136" width="450" height="10" rx="5" ry="5" fill="url(#barGrad3)" opacity="0.85"/>
  <rect x="140" y="186" width="480" height="10" rx="5" ry="5" fill="url(#barGrad4)" opacity="0.85"/>
  <rect x="140" y="236" width="420" height="10" rx="5" ry="5" fill="url(#barGrad5)" opacity="0.85"/>
  <rect x="140" y="286" width="390" height="10" rx="5" ry="5" fill="url(#barGrad6)" opacity="0.85"/>

  <!-- 环境3: 文本摘要 -->
  <rect x="140" y="100" width="480" height="10" rx="5" ry="5" fill="url(#barGrad3)" opacity="0.8"/>
  <rect x="140" y="150" width="420" height="10" rx="5" ry="5" fill="url(#barGrad4)" opacity="0.8"/>
  <rect x="140" y="200" width="450" height="10" rx="5" ry="5" fill="url(#barGrad5)" opacity="0.8"/>
  <rect x="140" y="250" width="390" height="10" rx="5" ry="5" fill="url(#barGrad6)" opacity="0.8"/>
  <rect x="140" y="300" width="360" height="10" rx="5" ry="5" fill="url(#barGrad7)" opacity="0.8"/>

  <!-- 环境4: 翻译任务 -->
  <rect x="140" y="114" width="450" height="10" rx="5" ry="5" fill="url(#barGrad4)" opacity="0.75"/>
  <rect x="140" y="164" width="390" height="10" rx="5" ry="5" fill="url(#barGrad5)" opacity="0.75"/>
  <rect x="140" y="214" width="420" height="10" rx="5" ry="5" fill="url(#barGrad6)" opacity="0.75"/>
  <rect x="140" y="264" width="360" height="10" rx="5" ry="5" fill="url(#barGrad7)" opacity="0.75"/>
  <rect x="140" y="314" width="330" height="10" rx="5" ry="5" fill="url(#barGrad8)" opacity="0.75"/>

  <!-- 图例 -->
  <rect x="200" y="370" width="400" height="100" rx="8" ry="8" fill="white" stroke="#d0d8e8" stroke-width="1"/>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">评估环境说明</text>

  <!-- 图例项 -->
  <rect x="220" y="404" width="12" height="12" rx="2" fill="url(#barGrad1)"/>
  <text x="238" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">代码生成</text>

  <rect x="330" y="404" width="12" height="12" rx="2" fill="url(#barGrad2)"/>
  <text x="348" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">逻辑推理</text>

  <rect x="440" y="404" width="12" height="12" rx="2" fill="url(#barGrad3)"/>
  <text x="458" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">文本摘要</text>

  <rect x="545" y="404" width="12" height="12" rx="2" fill="url(#barGrad4)"/>
  <text x="563" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">翻译任务</text>

  <rect x="220" y="430" width="12" height="12" rx="2" fill="url(#barGrad5)"/>
  <text x="238" y="441" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">知识问答</text>

  <rect x="330" y="430" width="12" height="12" rx="2" fill="url(#barGrad6)"/>
  <text x="348" y="441" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">对话交互</text>

  <rect x="440" y="430" width="12" height="12" rx="2" fill="url(#barGrad7)"/>
  <text x="458" y="441" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">情感分析</text>

  <rect x="545" y="430" width="12" height="12" rx="2" fill="url(#barGrad8)"/>
  <text x="563" y="441" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">安全合规</text>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#8899aa">数据来源：公开评测基准 · 分数越高表示模型在该环境表现越好</text>
</svg>