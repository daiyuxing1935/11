  <text x="140" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">0</text>
  <text x="260" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">20</text>
  <text x="380" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">40</text>
  <text x="500" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">60</text>
  <text x="620" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">80</text>
  <text x="740" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#1a1a2e">100</text>

