<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 黑板主体 -->
  <rect x="60" y="40" width="680" height="380" rx="12" fill="url(#board)" filter="url(#shadow)"/>
  <!-- 黑板边框 -->
  <rect x="60" y="40" width="680" height="380" rx="12" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <!-- 黑板内框 -->
  <rect x="78" y="58" width="644" height="344" rx="6" fill="#1E2A3A" stroke="#3D5A80" stroke-width="1"/>

  <!-- 黑板顶部标题 -->
  <text x="400" y="82" text-anchor="middle" fill="#A8C8E8" font-size="13" font-weight="600" letter-spacing="6">智能体协作黑板</text>

  <!-- ========== 左侧：发布区 ========== -->
  <text x="130" y="112" fill="#409EFF" font-size="16" font-weight="700">📤 发布</text>

  <!-- 卡片1：任务请求 -->
  <g filter="url(#cardShadow)">
    <rect x="96" y="124" width="170" height="100" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="96" y="124" width="170" height="100" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <!-- 图标 -->
    <text x="110" y="148" font-size="18">🆘</text>
    <text x="132" y="148" fill="#1a1a2e" font-size="14" font-weight="600">任务请求</text>
    <!-- 元数据 -->
    <text x="106" y="168" fill="#666" font-size="11">#编程 #Python</text>
    <text x="106" y="184" fill="#666" font-size="11">技能: 中级</text>
    <text x="106" y="200" fill="#666" font-size="11">优先级: 高</text>
    <rect x="216" y="126" width="46" height="18" rx="9" fill="#F56C6C" opacity="0.85"/>
    <text x="239" y="139" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">紧急</text>
  </g>

  <!-- 卡片2：任务结果 -->
  <g filter="url(#cardShadow)">
    <rect x="96" y="236" width="170" height="100" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="96" y="236" width="170" height="100" rx="8" fill="none" stroke="#67C23A" stroke-width="1.5" opacity="0.5"/>
    <text x="110" y="260" font-size="18">✅</text>
    <text x="132" y="260" fill="#1a1a2e" font-size="14" font-weight="600">任务结果</text>
    <text x="106" y="280" fill="#666" font-size="11">状态: 已完成</text>
    <text x="106" y="296" fill="#666" font-size="11">耗时: 2.3s</text>
    <text x="106" y="312" fill="#666" font-size="11">输出: data.json</text>
    <rect x="216" y="238" width="46" height="18" rx="9" fill="#67C23A" opacity="0.85"/>
    <text x="239" y="251" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">成功</text>
  </g>

  <!-- 卡片3：知识 -->
  <g filter="url(#cardShadow)">
    <rect x="96" y="348" width="170" height="42" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="96" y="348" width="170" height="42" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <text x="110" y="374" font-size="18">💡</text>
    <text x="132" y="374" fill="#1a1a2e" font-size="14" font-weight="600">知识条目</text>
    <text x="190" y="374" fill="#409EFF" font-size="11">#算法</text>
  </g>

  <!-- 左侧标注 -->
  <g>
    <rect x="276" y="158" width="52" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
    <text x="302" y="174" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">发布条目</text>
    <line x1="276" y1="170" x2="266" y2="170" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- ========== 中间：黑板内容 ========== -->
  <!-- 黑板上的条目列表 -->
  <rect x="310" y="108" width="180" height="280" rx="6" fill="#1A2535" stroke="#3D5A80" stroke-width="0.8"/>

  <!-- 条目列表标题 -->
  <text x="400" y="132" text-anchor="middle" fill="#A8C8E8" font-size="12" font-weight="600">📋 黑板条目</text>
  <line x1="320" y1="140" x2="480" y2="140" stroke="#3D5A80" stroke-width="0.5"/>

  <!-- 条目1 -->
  <rect x="320" y="150" width="160" height="28" rx="4" fill="#2A3A4A"/>
  <text x="328" y="169" fill="#E0E8F0" font-size="11">🔹 任务: 数据分析</text>

  <!-- 条目2 -->
  <rect x="320" y="186" width="160" height="28" rx="4" fill="#2A3A4A"/>
  <text x="328" y="205" fill="#E0E8F0" font-size="11">🔹 结果: 报告_v2</text>

  <!-- 条目3 -->
  <rect x="320" y="222" width="160" height="28" rx="4" fill="#2A3A4A"/>
  <text x="328" y="241" fill="#E0E8F0" font-size="11">🔹 知识: 模型优化</text>

  <!-- 条目4 -->
  <rect x="320" y="258" width="160" height="28" rx="4" fill="#2A3A4A"/>
  <text x="328" y="277" fill="#E0E8F0" font-size="11">🔹 任务: 数据清洗</text>

  <!-- 条目5 -->
  <rect x="320" y="294" width="160" height="28" rx="4" fill="#2A3A4A"/>
  <text x="328" y="313" fill="#E0E8F0" font-size="11">🔹 任务: 可视化</text>

  <!-- 条目6 -->
  <rect x="320" y="330" width="160" height="28" rx="4" fill="#2A3A4A"/>
  <text x="328" y="349" fill="#E0E8F0" font-size="11">🔹 知识: 最佳实践</text>

  <!-- CAS 锁图标 -->
  <g transform="translate(400, 392)">
    <rect x="-18" y="-10" width="36" height="20" rx="10" fill="#E6A23C" opacity="0.9"/>
    <text x="0" y="4" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🔒 CAS</text>
  </g>

  <!-- 中间标注 -->
  <g>
    <rect x="494" y="200" width="52" height="22" rx="11" fill="#E6A23C" opacity="0.9"/>
    <text x="520" y="216" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">原子认领</text>
    <line x1="494" y1="210" x2="490" y2="210" stroke="#E6A23C" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- ========== 右侧：读取区 ========== -->
  <text x="620" y="112" fill="#409EFF" font-size="16" font-weight="700">📖 读取</text>

  <!-- 读取卡片1 -->
  <g filter="url(#cardShadow)">
    <rect x="560" y="124" width="150" height="72" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="560" y="124" width="150" height="72" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <text x="574" y="148" font-size="16">🔍</text>
    <text x="594" y="148" fill="#1a1a2e" font-size="13" font-weight="600">查找可用任务</text>
    <text x="570" y="168" fill="#666" font-size="11">过滤: 技能匹配</text>
    <text x="570" y="184" fill="#666" font-size="11">关键词: Python</text>
  </g>

  <!-- 读取卡片2 -->
  <g filter="url(#cardShadow)">
    <rect x="560" y="208" width="150" height="72" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="560" y="208" width="150" height="72" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <text x="574" y="232" font-size="16">📚</text>
    <text x="594" y="232" fill="#1a1a2e" font-size="13" font-weight="600">读取知识</text>
    <text x="570" y="252" fill="#666" font-size="11">标签: #算法</text>
    <text x="570" y="268" fill="#666" font-size="11">关键词: 优化</text>
  </g>

  <!-- 读取卡片3 -->
  <g filter="url(#cardShadow)">
    <rect x="560" y="292" width="150" height="72" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="560" y="292" width="150" height="72" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <text x="574" y="316" font-size="16">📋</text>
    <text x="594" y="316" fill="#1a1a2e" font-size="13" font-weight="600">读取结果</text>
    <text x="570" y="336" fill="#666" font-size="11">父任务: 分析</text>
    <text x="570" y="352" fill="#666" font-size="11">状态: 成功</text>
  </g>

  <!-- 右侧标注 -->
  <g>
    <rect x="494" y="310" width="52" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
    <text x="520" y="326" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">查询过滤</text>
    <line x1="520" y1="320" x2="558" y2="320" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- ========== 底部连接线 ========== -->
  <!-- 发布 → 黑板 -->
  <line x1="266" y1="170" x2="310" y2="170" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- 黑板 → 读取 -->
  <line x1="490" y1="170" x2="558" y2="170" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 底部信息 -->
  <text x="400" y="460" text-anchor="middle" fill="#A0B4C8" font-size="11" opacity="0.7">智能体通过黑板进行异步协作 · CAS机制保证任务原子性</text>

  <!-- 底部标注 -->
  <g>
    <rect x="310" y="440" width="80" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
    <text x="350" y="454" text-anchor="middle" fill="#409EFF" font-size="10" font-weight="600">协作模式</text>
  </g>
</svg>