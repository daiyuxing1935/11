<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EAF8"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 黑板 -->
  <rect x="200" y="60" width="400" height="280" rx="8" fill="url(#boardGrad)"/>
  <rect x="200" y="60" width="400" height="280" rx="8" fill="none" stroke="#409EFF" stroke-width="2.5" opacity="0.5"/>
  <!-- 黑板边框 -->
  <rect x="196" y="56" width="408" height="288" rx="10" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>

  <!-- 黑板标题 -->
  <text x="400" y="90" text-anchor="middle" fill="#409EFF" font-size="15" font-weight="bold" font-family="sans-serif">智能体黑板</text>

  <!-- 黑板上的卡片 -->
  <!-- 任务请求卡片 -->
  <rect x="220" y="105" width="110" height="65" rx="6" fill="#fff" opacity="0.9" filter="url(#shadow)"/>
  <text x="275" y="125" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="sans-serif">任务请求</text>
  <!-- 求助图标 -->
  <rect x="230" y="130" width="16" height="16" rx="3" fill="#409EFF" opacity="0.8"/>
  <text x="238" y="142" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="sans-serif">!</text>
  <text x="252" y="142" fill="#1a1a2e" font-size="9" font-family="sans-serif">#技能匹配</text>
  <text x="230" y="158" fill="#1a1a2e" font-size="8" font-family="sans-serif">优先级: 高</text>

  <!-- 任务结果卡片 -->
  <rect x="345" y="105" width="110" height="65" rx="6" fill="#fff" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="125" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="sans-serif">任务结果</text>
  <!-- 完成印章图标 -->
  <rect x="355" y="130" width="16" height="16" rx="3" fill="#67C23A" opacity="0.8"/>
  <text x="363" y="142" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold" font-family="sans-serif">✓</text>
  <text x="377" y="142" fill="#1a1a2e" font-size="9" font-family="sans-serif">#已完成</text>
  <text x="355" y="158" fill="#1a1a2e" font-size="8" font-family="sans-serif">状态: 成功</text>

  <!-- 知识卡片 -->
  <rect x="470" y="105" width="110" height="65" rx="6" fill="#fff" opacity="0.9" filter="url(#shadow)"/>
  <text x="525" y="125" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="sans-serif">知识</text>
  <!-- 灯泡图标 -->
  <circle cx="482" cy="138" r="8" fill="#E6A23C" opacity="0.8"/>
  <text x="482" y="142" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold" font-family="sans-serif">💡</text>
  <text x="496" y="142" fill="#1a1a2e" font-size="9" font-family="sans-serif">#标签搜索</text>
  <text x="480" y="158" fill="#1a1a2e" font-size="8" font-family="sans-serif">关键词: AI</text>

  <!-- 黑板上的锁图标（CAS机制） -->
  <rect x="370" y="185" width="60" height="28" rx="5" fill="#409EFF" opacity="0.2"/>
  <rect x="380" y="190" width="12" height="14" rx="2" fill="#409EFF"/>
  <text x="386" y="201" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">🔒</text>
  <text x="398" y="202" fill="#409EFF" font-size="10" font-weight="bold" font-family="sans-serif">CAS</text>

  <!-- 黑板上的其他条目 -->
  <rect x="220" y="225" width="170" height="45" rx="5" fill="#fff" opacity="0.7"/>
  <text x="235" y="245" fill="#1a1a2e" font-size="9" font-family="sans-serif">📋 可用任务: 数据分析</text>
  <text x="235" y="260" fill="#1a1a2e" font-size="8" font-family="sans-serif">技能: Python, SQL</text>

  <rect x="410" y="225" width="170" height="45" rx="5" fill="#fff" opacity="0.7"/>
  <text x="425" y="245" fill="#1a1a2e" font-size="9" font-family="sans-serif">📖 知识: 机器学习</text>
  <text x="425" y="260" fill="#1a1a2e" font-size="8" font-family="sans-serif">标签: #ML #监督学习</text>

  <!-- 左侧智能体 - 发布者 -->
  <g filter="url(#shadow)">
    <rect x="30" y="160" width="130" height="140" rx="12" fill="#fff"/>
    <rect x="30" y="160" width="130" height="140" rx="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <!-- 智能体图标 -->
    <circle cx="95" cy="195" r="18" fill="#409EFF" opacity="0.15"/>
    <circle cx="95" cy="195" r="10" fill="#409EFF" opacity="0.4"/>
    <text x="95" y="199" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">A</text>
    <text x="95" y="228" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">发布者</text>
    <text x="95" y="248" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">发布</text>
    <text x="95" y="265" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">任务/知识</text>
    <text x="95" y="285" text-anchor="middle" fill="#1a1a2e" font-size="10" font-family="sans-serif">→ 黑板</text>
  </g>

  <!-- 右侧智能体 - 读取者 -->
  <g filter="url(#shadow)">
    <rect x="640" y="160" width="130" height="140" rx="12" fill="#fff"/>
    <rect x="640" y="160" width="130" height="140" rx="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <!-- 智能体图标 -->
    <circle cx="705" cy="195" r="18" fill="#409EFF" opacity="0.15"/>
    <circle cx="705" cy="195" r="10" fill="#409EFF" opacity="0.4"/>
    <text x="705" y="199" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">B</text>
    <text x="705" y="228" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">读取者</text>
    <text x="705" y="248" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">查询</text>
    <text x="705" y="265" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">任务/知识</text>
    <text x="705" y="285" text-anchor="middle" fill="#1a1a2e" font-size="10" font-family="sans-serif">← 黑板</text>
  </g>

  <!-- 连接箭头 - 发布者到黑板 -->
  <line x1="160" y1="230" x2="200" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="200,195 192,200 200,205" fill="#409EFF"/>
  <text x="170" y="218" fill="#409EFF" font-size="10" font-family="sans-serif">发布</text>

  <!-- 连接箭头 - 黑板到读取者 -->
  <line x1="600" y1="200" x2="640" y2="230" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="640,235 648,230 640,225" fill="#409EFF"/>
  <text x="610" y="218" fill="#409EFF" font-size="10" font-family="sans-serif">读取</text>

  <!-- 标注 -->
  <!-- 标注1：发布模式 -->
  <rect x="40" y="370" width="160" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="50" y="388" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">① 发布模式</text>

  <!-- 标注2：读取模式 -->
  <rect x="600" y="370" width="160" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="610" y="388" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">② 读取模式</text>

  <!-- 标注3：CAS机制 -->
  <rect x="290" y="370" width="160" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="300" y="388" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">③ CAS 锁机制</text>

  <!-- 标注4：任务卡片 -->
  <rect x="40" y="410" width="160" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="50" y="428" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">④ 任务卡片</text>

  <!-- 标注5：知识卡片 -->
  <rect x="290" y="410" width="160" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="300" y="428" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">⑤ 知识卡片</text>

  <!-- 标注6：结果卡片 -->
  <rect x="600" y="410" width="160" height="28" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="610" y="428" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">⑥ 结果卡片</text>

  <!-- 底部说明文字 -->
  <text x="400" y="475" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="sans-serif" opacity="0.6">智能体通过黑板模式发布和读取任务、结果与知识</text>

  <!-- 装饰性连接线 -->
  <line x1="160" y1="385" x2="200" y2="385" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="385" x2="600" y2="385" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="425" x2="220" y2="425" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="425" x2="600" y2="425" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
</svg>