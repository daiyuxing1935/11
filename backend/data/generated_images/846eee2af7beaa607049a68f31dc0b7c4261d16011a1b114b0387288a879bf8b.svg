<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0eaff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b7ed9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5aadff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#409EFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">通信安全防护五重盾</text>
  <line x1="280" y1="52" x2="520" y2="52" stroke="#409EFF" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ====== 盾牌 1：消息认证 ====== -->
  <g transform="translate(60, 80)">
    <!-- 盾牌主体 -->
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="url(#shieldGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
    <!-- 盾牌内图标：钥匙/徽章 -->
    <circle cx="60" cy="55" r="18" fill="#fff" opacity="0.9"/>
    <text x="60" y="60" text-anchor="middle" font-family="Arial" font-size="16" fill="#409EFF">🔑</text>
    <!-- 标签 -->
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">消息认证</text>
    <text x="60" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">API密钥/JWT令牌</text>
  </g>

  <!-- ====== 盾牌 2：消息加密 ====== -->
  <g transform="translate(200, 80)">
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="url(#shieldGrad2)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
    <!-- 锁图标 -->
    <circle cx="60" cy="55" r="18" fill="#fff" opacity="0.9"/>
    <text x="60" y="60" text-anchor="middle" font-family="Arial" font-size="16" fill="#409EFF">🔒</text>
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">消息加密</text>
    <text x="60" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">TLS/SSL传输加密</text>
  </g>

  <!-- ====== 盾牌 3：输入验证 ====== -->
  <g transform="translate(340, 80)">
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="url(#shieldGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
    <!-- 过滤器图标 -->
    <circle cx="60" cy="55" r="18" fill="#fff" opacity="0.9"/>
    <text x="60" y="60" text-anchor="middle" font-family="Arial" font-size="16" fill="#409EFF">🔍</text>
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">输入验证</text>
    <text x="60" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">过滤注入攻击</text>
  </g>

  <!-- ====== 盾牌 4：速率限制 ====== -->
  <g transform="translate(480, 80)">
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="url(#shieldGrad2)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
    <!-- 速度表图标 -->
    <circle cx="60" cy="55" r="18" fill="#fff" opacity="0.9"/>
    <text x="60" y="60" text-anchor="middle" font-family="Arial" font-size="16" fill="#409EFF">⏱</text>
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">速率限制</text>
    <text x="60" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">防止消息洪泛</text>
  </g>

  <!-- ====== 盾牌 5：审计日志 ====== -->
  <g transform="translate(620, 80)">
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="url(#shieldGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M60,10 L110,10 L110,50 Q110,100 60,120 Q10,100 10,50 L10,10 Z" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
    <!-- 日志簿图标 -->
    <circle cx="60" cy="55" r="18" fill="#fff" opacity="0.9"/>
    <text x="60" y="60" text-anchor="middle" font-family="Arial" font-size="16" fill="#409EFF">📋</text>
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">审计日志</text>
    <text x="60" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">通信全记录追溯</text>
  </g>

  <!-- ====== 底部说明区域 ====== -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="680" height="180" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="0" y="0" width="680" height="180" rx="12" fill="#409EFF" opacity="0.04"/>

    <!-- 说明标题 -->
    <text x="340" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">安全防护机制说明</text>
    <line x1="240" y1="38" x2="440" y2="38" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>

    <!-- 5个说明项 -->
    <g transform="translate(20, 55)">
      <circle cx="8" cy="5" r="5" fill="#409EFF"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="13" fill="#333"><tspan font-weight="bold" fill="#409EFF">消息认证</tspan> — 通过API密钥或JWT令牌验证发送方身份</text>
    </g>
    <g transform="translate(20, 80)">
      <circle cx="8" cy="5" r="5" fill="#5aadff"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="13" fill="#333"><tspan font-weight="bold" fill="#409EFF">消息加密</tspan> — 使用TLS/SSL协议加密传输中的数据</text>
    </g>
    <g transform="translate(20, 105)">
      <circle cx="8" cy="5" r="5" fill="#409EFF"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="13" fill="#333"><tspan font-weight="bold" fill="#409EFF">输入验证</tspan> — 过滤和检查传入消息，防御注入攻击</text>
    </g>
    <g transform="translate(20, 130)">
      <circle cx="8" cy="5" r="5" fill="#5aadff"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="13" fill="#333"><tspan font-weight="bold" fill="#409EFF">速率限制</tspan> — 控制请求频率，防止恶意消息洪泛</text>
    </g>
    <g transform="translate(20, 155)">
      <circle cx="8" cy="5" r="5" fill="#409EFF"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="13" fill="#333"><tspan font-weight="bold" fill="#409EFF">审计日志</tspan> — 记录所有通信行为，支持安全追溯</text>
    </g>
  </g>

  <!-- 底部连接线 -->
  <g stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3">
    <line x1="130" y1="200" x2="130" y2="280"/>
    <line x1="270" y1="200" x2="270" y2="280"/>
    <line x1="410" y1="200" x2="410" y2="280"/>
    <line x1="550" y1="200" x2="550" y2="280"/>
    <line x1="690" y1="200" x2="690" y2="280"/>
  </g>

  <!-- 底部装饰文字 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">扁平化设计 · 科技蓝主题 · 通信安全防护体系</text>
</svg>