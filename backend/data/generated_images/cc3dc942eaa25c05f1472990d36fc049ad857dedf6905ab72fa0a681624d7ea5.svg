<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e0f0fe"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8fe6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <rect x="200" y="22" width="400" height="48" rx="24" fill="#1a1a2e" opacity="0.95"/>
  <text x="400" y="54" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" font-family="sans-serif">模型参数与能力 核心要点</text>

  <!-- 第1项：参数是知识存储的脑连接 -->
  <rect x="30" y="95" width="340" height="72" rx="14" fill="url(#cardGrad)" opacity="0.92"/>
  <rect x="30" y="95" width="340" height="72" rx="14" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.1"/>
  <!-- 脑网络图标 -->
  <circle cx="65" cy="131" r="22" fill="#ffffff" opacity="0.25"/>
  <circle cx="58" cy="125" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="72" cy="122" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="62" cy="140" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="75" cy="138" r="5" fill="#ffffff" opacity="0.9"/>
  <line x1="58" y1="125" x2="72" y2="122" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="125" x2="62" y2="140" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="72" y1="122" x2="75" y2="138" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="62" y1="140" x2="75" y2="138" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <text x="105" y="126" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">参数是知识存储的脑连接</text>
  <text x="105" y="148" fill="#ffffff" font-size="12" opacity="0.85" font-family="sans-serif">模型参数越多，知识容量越大</text>

  <!-- 第2项：缩放定律可预测改进但收益递减 -->
  <rect x="430" y="95" width="340" height="72" rx="14" fill="url(#cardGrad)" opacity="0.92"/>
  <rect x="430" y="95" width="340" height="72" rx="14" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.1"/>
  <!-- 曲线图图标 -->
  <rect x="458" y="110" width="36" height="28" rx="3" fill="#ffffff" opacity="0.2"/>
  <polyline points="462,134 470,126 478,120 486,116 490,114" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="505" y="126" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">缩放定律可预测改进</text>
  <text x="505" y="148" fill="#ffffff" font-size="12" opacity="0.85" font-family="sans-serif">但收益递减，需平衡规模</text>

  <!-- 第3项：涌现能力在阈值处质变 -->
  <rect x="30" y="192" width="340" height="72" rx="14" fill="url(#cardGrad)" opacity="0.92"/>
  <rect x="30" y="192" width="340" height="72" rx="14" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.1"/>
  <!-- 阶梯图标 -->
  <rect x="50" y="216" width="10" height="10" fill="#ffffff" opacity="0.6" rx="1"/>
  <rect x="50" y="226" width="10" height="10" fill="#ffffff" opacity="0.6" rx="1"/>
  <rect x="62" y="226" width="10" height="10" fill="#ffffff" opacity="0.6" rx="1"/>
  <rect x="50" y="236" width="10" height="10" fill="#ffffff" opacity="0.6" rx="1"/>
  <rect x="62" y="236" width="10" height="10" fill="#ffffff" opacity="0.6" rx="1"/>
  <rect x="74" y="236" width="10" height="10" fill="#ffffff" opacity="0.6" rx="1"/>
  <text x="105" y="223" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">涌现能力在阈值处质变</text>
  <text x="105" y="245" fill="#ffffff" font-size="12" opacity="0.85" font-family="sans-serif">跨越临界规模，能力跃升</text>

  <!-- 第4项：大模型原型，小模型生产策略 -->
  <rect x="430" y="192" width="340" height="72" rx="14" fill="url(#cardGrad)" opacity="0.92"/>
  <rect x="430" y="192" width="340" height="72" rx="14" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.1"/>
  <!-- 大转小图标 -->
  <rect x="450" y="210" width="18" height="18" rx="3" fill="#ffffff" opacity="0.3"/>
  <rect x="470" y="222" width="14" height="14" rx="3" fill="#ffffff" opacity="0.6"/>
  <text x="450" y="232" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">大</text>
  <text x="477" y="232" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">小</text>
  <line x1="468" y1="219" x2="470" y2="222" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <text x="505" y="223" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">大模型原型，小模型生产</text>
  <text x="505" y="245" fill="#ffffff" font-size="12" opacity="0.85" font-family="sans-serif">知识蒸馏，降本增效</text>

  <!-- 第5项：量化实现低成本部署 -->
  <rect x="230" y="289" width="340" height="72" rx="14" fill="url(#cardGrad)" opacity="0.92"/>
  <rect x="230" y="289" width="340" height="72" rx="14" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.1"/>
  <!-- 压缩芯片图标 -->
  <rect x="255" y="306" width="22" height="22" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="260" y="311" width="12" height="12" rx="2" fill="#ffffff" opacity="0.5"/>
  <line x1="266" y1="306" x2="266" y2="302" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="266" y1="328" x2="266" y2="332" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="255" y1="317" x2="251" y2="317" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="277" y1="317" x2="281" y2="317" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <text x="295" y="320" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">量化实现低成本部署</text>
  <text x="295" y="342" fill="#ffffff" font-size="12" opacity="0.85" font-family="sans-serif">压缩模型体积，加速推理</text>

  <!-- 底部装饰线 -->
  <line x1="250" y1="395" x2="550" y2="395" stroke="#409EFF" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- 底部提示 -->
  <text x="400" y="430" text-anchor="middle" fill="#1a1a2e" font-size="13" opacity="0.5" font-family="sans-serif">掌握这些核心要点，构建高效的模型策略</text>

  <!-- 装饰圆点 -->
  <circle cx="380" cy="395" r="4" fill="#409EFF" opacity="0.4"/>
  <circle cx="400" cy="395" r="4" fill="#409EFF" opacity="0.6"/>
  <circle cx="420" cy="395" r="4" fill="#409EFF" opacity="0.4"/>

  <!-- 卡片编号标签 -->
  <circle cx="30" cy="95" r="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="30" y="100" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">1</text>

  <circle cx="430" cy="95" r="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="430" y="100" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">2</text>

  <circle cx="30" cy="192" r="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="30" y="197" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">3</text>

  <circle cx="430" cy="192" r="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="430" y="197" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">4</text>

  <circle cx="230" cy="289" r="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="230" y="294" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">5</text>

</svg>