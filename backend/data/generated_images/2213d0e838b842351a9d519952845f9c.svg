<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="800" height="52" fill="url(#headerGrad)"/>
  <text x="400" y="33" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold">囚徒困境 — 收益矩阵</text>

  <!-- 副标题 -->
  <text x="400" y="82" text-anchor="middle" fill="#1a1a2e" font-size="15" opacity="0.8">双人博弈 · 策略选择</text>

  <!-- 矩阵外框 -->
  <rect x="220" y="108" width="360" height="260" fill="none" stroke="#409EFF" stroke-width="2" rx="6" filter="url(#shadow)"/>

  <!-- 矩阵内网格线 -->
  <!-- 水平中线 -->
  <line x1="220" y1="238" x2="580" y2="238" stroke="#C8DCE8" stroke-width="1.5"/>
  <!-- 垂直中线 -->
  <line x1="400" y1="108" x2="400" y2="368" stroke="#C8DCE8" stroke-width="1.5"/>

  <!-- 行标签区域（左侧） -->
  <rect x="140" y="108" width="80" height="260" fill="#F0F8FF" rx="6"/>
  <text x="180" y="178" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">Agent A</text>
  <text x="180" y="248" text-anchor="middle" fill="#1a1a2e" font-size="14">合作</text>
  <text x="180" y="340" text-anchor="middle" fill="#1a1a2e" font-size="14">背叛</text>

  <!-- 列标签区域（顶部） -->
  <rect x="220" y="108" width="360" height="40" fill="#F0F8FF" rx="6"/>
  <text x="400" y="134" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">Agent B</text>
  <text x="310" y="134" text-anchor="middle" fill="#1a1a2e" font-size="14">合作</text>
  <text x="490" y="134" text-anchor="middle" fill="#1a1a2e" font-size="14">背叛</text>

  <!-- 单元格内容 -->
  <!-- 左上：合作，合作 -->
  <text x="310" y="185" text-anchor="middle" fill="#1a1a2e" font-size="16">(3, 3)</text>
  <text x="310" y="210" text-anchor="middle" fill="#666" font-size="12">各得3分</text>

  <!-- 右上：合作，背叛 -->
  <text x="490" y="185" text-anchor="middle" fill="#1a1a2e" font-size="16">(0, 5)</text>
  <text x="490" y="210" text-anchor="middle" fill="#666" font-size="12">A:0 B:5</text>

  <!-- 左下：背叛，合作 -->
  <text x="310" y="290" text-anchor="middle" fill="#1a1a2e" font-size="16">(5, 0)</text>
  <text x="310" y="315" text-anchor="middle" fill="#666" font-size="12">A:5 B:0</text>

  <!-- 右下：背叛，背叛 — 纳什均衡 -->
  <rect x="401" y="239" width="179" height="129" fill="#E8F4FD" rx="0"/>
  <text x="490" y="290" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">(1, 1)</text>
  <text x="490" y="315" text-anchor="middle" fill="#666" font-size="12">各得1分</text>

  <!-- 纳什均衡高亮边框 -->
  <rect x="401" y="239" width="179" height="129" fill="none" stroke="#409EFF" stroke-width="3" rx="0" stroke-dasharray="6,3"/>

  <!-- 图钉标记 -->
  <g filter="url(#pinShadow)">
    <circle cx="490" cy="239" r="10" fill="#409EFF"/>
    <circle cx="490" cy="239" r="5" fill="#FFFFFF"/>
    <line x1="490" y1="249" x2="490" y2="265" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="482" y1="260" x2="498" y2="260" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 纳什均衡标注 -->
  <rect x="530" y="108" width="120" height="32" rx="16" fill="#409EFF" opacity="0.9"/>
  <text x="590" y="129" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">纳什均衡</text>

  <!-- 标注线：从纳什均衡到标注 -->
  <line x1="530" y1="239" x2="530" y2="124" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 策略说明标注 -->
  <rect x="40" y="400" width="160" height="36" rx="18" fill="#409EFF" opacity="0.85"/>
  <text x="120" y="423" text-anchor="middle" fill="#FFFFFF" font-size="14">合作共赢</text>

  <rect x="220" y="400" width="160" height="36" rx="18" fill="#409EFF" opacity="0.85"/>
  <text x="300" y="423" text-anchor="middle" fill="#FFFFFF" font-size="14">背叛诱惑</text>

  <rect x="400" y="400" width="160" height="36" rx="18" fill="#409EFF" opacity="0.85"/>
  <text x="480" y="423" text-anchor="middle" fill="#FFFFFF" font-size="14">相互背叛</text>

  <rect x="580" y="400" width="180" height="36" rx="18" fill="#409EFF" opacity="0.85"/>
  <text x="670" y="423" text-anchor="middle" fill="#FFFFFF" font-size="14">理性选择</text>

  <!-- 底部说明 -->
  <text x="400" y="475" text-anchor="middle" fill="#1a1a2e" font-size="13" opacity="0.6">每个单元格中数字表示 (Agent A得分, Agent B得分)</text>

  <!-- 装饰性角标 -->
  <rect x="220" y="108" width="12" height="12" fill="#409EFF" rx="2"/>
  <rect x="568" y="108" width="12" height="12" fill="#409EFF" rx="2"/>
  <rect x="220" y="356" width="12" height="12" fill="#409EFF" rx="2"/>
  <rect x="568" y="356" width="12" height="12" fill="#409EFF" rx="2"/>
</svg>