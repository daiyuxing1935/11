<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="panelGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">微调流程示意图</text>

  <!-- ============ 左侧面板：指令微调 ============ -->
  <rect x="30" y="60" width="340" height="400" rx="14" fill="white" stroke="#409EFF" stroke-width="2"/>
  <rect x="30" y="60" width="340" height="44" rx="14" fill="url(#panelGrad)"/>
  <rect x="30" y="90" width="340" height="14" fill="url(#panelGrad)"/>
  <text x="200" y="89" text-anchor="middle" font-size="16" font-weight="bold" fill="white">指令微调（Instruction Tuning）</text>

  <!-- 指令格式框 -->
  <rect x="52" y="118" width="296" height="80" rx="10" fill="#F0F7FF" stroke="#B3D8FF" stroke-width="1.5"/>
  <text x="72" y="144" font-size="14" fill="#1a1a2e" font-weight="bold">指令（Instruction）</text>
  <text x="72" y="170" font-size="13" fill="#666">请解释什么是机器学习</text>

  <!-- 箭头 -->
  <line x1="200" y1="200" x2="200" y2="220" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <rect x="52" y="224" width="296" height="50" rx="10" fill="#E8F4FD" stroke="#B3D8FF" stroke-width="1.5"/>
  <text x="72" y="250" font-size="14" fill="#1a1a2e" font-weight="bold">期望回复（Expected Response）</text>
  <text x="72" y="270" font-size="13" fill="#666">机器学习是人工智能的一个分支...</text>

  <!-- 示例表格 -->
  <text x="200" y="310" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">示例数据对</text>

  <!-- 表格 -->
  <rect x="52" y="322" width="296" height="28" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="100" y="341" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">指令</text>
  <line x1="200" y1="322" x2="200" y2="350" stroke="#B3D8FF" stroke-width="1"/>
  <text x="250" y="341" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">期望回复</text>

  <rect x="52" y="350" width="296" height="24" rx="0" fill="white"/>
  <text x="100" y="366" text-anchor="middle" font-size="12" fill="#555">翻译：Hello</text>
  <line x1="200" y1="350" x2="200" y2="374" stroke="#E0E0E0" stroke-width="1"/>
  <text x="250" y="366" text-anchor="middle" font-size="12" fill="#555">你好</text>

  <rect x="52" y="374" width="296" height="24" rx="0" fill="#F8FBFF"/>
  <text x="100" y="390" text-anchor="middle" font-size="12" fill="#555">总结：文章内容</text>
  <line x1="200" y1="374" x2="200" y2="398" stroke="#E0E0E0" stroke-width="1"/>
  <text x="250" y="390" text-anchor="middle" font-size="12" fill="#555">本文主要讨论了...</text>

  <rect x="52" y="398" width="296" height="24" rx="0" fill="white"/>
  <text x="100" y="414" text-anchor="middle" font-size="12" fill="#555">分类：情感</text>
  <line x1="200" y1="398" x2="200" y2="422" stroke="#E0E0E0" stroke-width="1"/>
  <text x="250" y="414" text-anchor="middle" font-size="12" fill="#555">正面</text>

  <rect x="52" y="422" width="296" height="4" rx="0" fill="#409EFF" opacity="0.3"/>

  <!-- 左侧标注 -->
  <rect x="370" y="145" width="6" height="60" rx="3" fill="#409EFF"/>
  <text x="382" y="180" font-size="13" fill="#1a1a2e">结构化格式</text>

  <!-- ============ 连接箭头 ============ -->
  <line x1="375" y1="260" x2="410" y2="260" stroke="#1a1a2e" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="408,254 420,260 408,266" fill="#1a1a2e"/>
  <text x="393" y="250" text-anchor="middle" font-size="12" fill="#1a1a2e">→</text>

  <!-- ============ 右侧面板：RLHF ============ -->
  <rect x="430" y="60" width="340" height="400" rx="14" fill="white" stroke="#409EFF" stroke-width="2"/>
  <rect x="430" y="60" width="340" height="44" rx="14" fill="url(#panelGrad2)"/>
  <rect x="430" y="90" width="340" height="14" fill="url(#panelGrad2)"/>
  <text x="600" y="89" text-anchor="middle" font-size="16" font-weight="bold" fill="white">RLHF 流程</text>

  <!-- 步骤 1 -->
  <rect x="452" y="118" width="296" height="80" rx="10" fill="#F0F7FF" stroke="#B3D8FF" stroke-width="1.5"/>
  <circle cx="472" cy="142" r="12" fill="#409EFF"/>
  <text x="472" y="147" text-anchor="middle" font-size="13" fill="white" font-weight="bold">1</text>
  <text x="492" y="147" font-size="14" fill="#1a1a2e" font-weight="bold">人工标注排序</text>

  <!-- 拇指图标 -->
  <text x="480" y="178" font-size="20">👍</text>
  <text x="520" y="178" font-size="20">👎</text>
  <text x="560" y="178" font-size="20">👍</text>
  <text x="600" y="178" font-size="20">👎</text>
  <text x="640" y="178" font-size="20">👍</text>

  <!-- 箭头 1→2 -->
  <line x1="600" y1="200" x2="600" y2="222" stroke="#409EFF" stroke-width="2"/>
  <polygon points="594,218 600,228 606,218" fill="#409EFF"/>

  <!-- 步骤 2 -->
  <rect x="452" y="232" width="296" height="80" rx="10" fill="#F0F7FF" stroke="#B3D8FF" stroke-width="1.5"/>
  <circle cx="472" cy="256" r="12" fill="#409EFF"/>
  <text x="472" y="261" text-anchor="middle" font-size="13" fill="white" font-weight="bold">2</text>
  <text x="492" y="261" font-size="14" fill="#1a1a2e" font-weight="bold">奖励模型训练</text>

  <!-- 奖杯图标 -->
  <text x="510" y="296" font-size="24">🏆</text>
  <text x="550" y="296" font-size="14" fill="#555">训练奖励模型</text>
  <text x="660" y="296" font-size="14" fill="#555">RM</text>

  <!-- 箭头 2→3 -->
  <line x1="600" y1="314" x2="600" y2="336" stroke="#409EFF" stroke-width="2"/>
  <polygon points="594,332 600,342 606,332" fill="#409EFF"/>

  <!-- 步骤 3 -->
  <rect x="452" y="346" width="296" height="80" rx="10" fill="#F0F7FF" stroke="#B3D8FF" stroke-width="1.5"/>
  <circle cx="472" cy="370" r="12" fill="#409EFF"/>
  <text x="472" y="375" text-anchor="middle" font-size="13" fill="white" font-weight="bold">3</text>
  <text x="492" y="375" font-size="14" fill="#1a1a2e" font-weight="bold">强化学习优化</text>

  <!-- 反馈循环图标 -->
  <text x="510" y="410" font-size="22">🔄</text>
  <text x="545" y="410" font-size="14" fill="#555">策略梯度优化</text>
  <text x="660" y="410" font-size="14" fill="#555">PPO</text>

  <!-- 反馈循环箭头（从步骤3回到步骤1） -->
  <path d="M748 386 Q770 386 770 300 Q770 158 748 158" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="742,162 748,152 754,162" fill="#409EFF"/>
  <text x="776" y="300" font-size="11" fill="#409EFF" transform="rotate(90,776,300)">反馈循环</text>

  <!-- 右侧标注 -->
  <rect x="430" y="440" width="340" height="3" rx="1.5" fill="#409EFF" opacity="0.4"/>
  <text x="600" y="458" text-anchor="middle" font-size="13" fill="#1a1a2e">三阶段循环流程</text>

  <!-- 底部标注 -->
  <rect x="300" y="475" width="200" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>
  <text x="400" y="490" text-anchor="middle" font-size="13" fill="#1a1a2e">指令微调 → RLHF 顺序执行</text>

</svg>