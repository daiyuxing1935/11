<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="panelGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="panelGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="panelGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">角色冲突管理策略</text>

  <!-- ====== 面板 1：明确角色边界 ====== -->
  <rect x="20" y="60" width="240" height="420" rx="10" ry="10" fill="url(#panelGrad1)" stroke="#409EFF" stroke-width="2"/>
  <rect x="20" y="60" width="240" height="38" rx="10" ry="10" fill="#409EFF"/>
  <rect x="20" y="88" width="240" height="10" fill="#409EFF"/>
  <text x="140" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">策略一：明确角色边界</text>

  <!-- 角色卡 A -->
  <rect x="40" y="115" width="90" height="50" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="85" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">角色A</text>

  <!-- 角色卡 B -->
  <rect x="150" y="115" width="90" height="50" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="195" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">角色B</text>

  <!-- 边界线 A -->
  <line x1="85" y1="170" x2="85" y2="230" stroke="#409EFF" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="85" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">边界</text>

  <!-- 边界线 B -->
  <line x1="195" y1="170" x2="195" y2="230" stroke="#409EFF" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="195" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">边界</text>

  <!-- 协作接口区域 -->
  <rect x="95" y="265" width="90" height="40" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="140" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">协作接口</text>

  <!-- 箭头标注 -->
  <path d="M140 305 L140 320" stroke="#28a745" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="140" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#28a745">预防冲突</text>

  <!-- 标注：预防为主 -->
  <rect x="50" y="365" width="180" height="35" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="140" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">预防为主</text>

  <!-- 范围标注 -->
  <rect x="50" y="415" width="180" height="35" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1"/>
  <text x="140" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">明确职责范围</text>

  <!-- ====== 面板 2：协调员角色 ====== -->
  <rect x="280" y="60" width="240" height="420" rx="10" ry="10" fill="url(#panelGrad2)" stroke="#409EFF" stroke-width="2"/>
  <rect x="280" y="60" width="240" height="38" rx="10" ry="10" fill="#409EFF"/>
  <rect x="280" y="88" width="240" height="10" fill="#409EFF"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">策略二：协调员角色</text>

  <!-- 冲突代理 A -->
  <rect x="300" y="115" width="80" height="45" rx="6" fill="#ffe0e0" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="340" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理A</text>

  <!-- 冲突代理 B -->
  <rect x="420" y="115" width="80" height="45" rx="6" fill="#ffe0e0" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="460" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理B</text>

  <!-- 冲突箭头 -->
  <path d="M380 137 L420 137" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <path d="M420 137 L380 137" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">冲突</text>

  <!-- 协调员居中 -->
  <rect x="345" y="180" width="110" height="50" rx="25" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">协调员</text>

  <!-- 协调员连接线 -->
  <line x1="360" y1="230" x2="340" y2="260" stroke="#409EFF" stroke-width="2"/>
  <line x1="440" y1="230" x2="460" y2="260" stroke="#409EFF" stroke-width="2"/>

  <!-- 裁决决策 -->
  <rect x="310" y="265" width="180" height="40" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">做出绑定决策</text>

  <!-- 法槌图标 -->
  <rect x="370" y="320" width="60" height="50" rx="6" fill="#f0f0f0" stroke="#1a1a2e" stroke-width="1"/>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">⚖️</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">法槌</text>

  <!-- 标注 -->
  <rect x="310" y="390" width="180" height="35" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">中立仲裁者</text>

  <rect x="310" y="435" width="180" height="35" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">权威裁决</text>

  <!-- ====== 面板 3：升级机制 ====== -->
  <rect x="540" y="60" width="240" height="420" rx="10" ry="10" fill="url(#panelGrad3)" stroke="#409EFF" stroke-width="2"/>
  <rect x="540" y="60" width="240" height="38" rx="10" ry="10" fill="#409EFF"/>
  <rect x="540" y="88" width="240" height="10" fill="#409EFF"/>
  <text x="660" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">策略三：升级机制</text>

  <!-- 第1级：直接沟通 -->
  <rect x="560" y="115" width="200" height="65" rx="8" fill="#e6f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="660" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">第1级：直接沟通</text>
  <text x="660" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">💬 对话气泡</text>

  <!-- 向上箭头 -->
  <path d="M660 180 L660 200" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- 第2级：协调员调解 -->
  <rect x="560" y="205" width="200" height="65" rx="8" fill="#e6f0ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="660" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">第2级：协调员调解</text>
  <text x="660" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">👤 调解人介入</text>

  <!-- 向上箭头 -->
  <path d="M660 270 L660 290" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- 第3级：人工操作员 -->
  <rect x="560" y="295" width="200" height="65" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="660" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">第3级：人工操作员</text>
  <text x="660" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d69e00">✋ 人工干预</text>

  <!-- 升级阶梯指示 -->
  <rect x="560" y="380" width="200" height="35" rx="6" fill="#409EFF" stroke="#1a1a2e" stroke-width="1"/>
  <text x="660" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">逐级升级</text>

  <rect x="560" y="425" width="200" height="35" rx="6" fill="#e6f0ff" stroke="#409EFF" stroke-width="1"/>
  <text x="660" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">自动化 → 人工</text>

  <!-- 图例 / 底部说明 -->
  <rect x="20" y="490" width="760" height="2" rx="1" fill="#409EFF" opacity="0.3"/>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28a745"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
  </defs>
</svg>