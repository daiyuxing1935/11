<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">角色冲突管理策略</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ========== 面板 1：明确角色边界 ========== -->
  <g filter="url(#shadow)">
    <rect x="20" y="70" width="240" height="400" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 面板标题 -->
    <rect x="20" y="70" width="240" height="36" rx="10" fill="#409EFF" fill-opacity="0.1"/>
    <text x="140" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="#409EFF">策略一：明确角色边界</text>

    <!-- 角色卡片 1 -->
    <rect x="40" y="130" width="200" height="80" rx="8" fill="#409EFF" fill-opacity="0.08" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="140" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">角色 A</text>
    <text x="140" y="182" text-anchor="middle" font-size="11" fill="#666">职责范围明确</text>
    <!-- 范围线 -->
    <line x1="40" y1="210" x2="240" y2="210" stroke="#409EFF" stroke-width="2" stroke-opacity="0.6"/>

    <!-- 协作接口区域 -->
    <rect x="60" y="218" width="160" height="36" rx="18" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="140" y="241" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">协作接口</text>

    <!-- 角色卡片 2 -->
    <rect x="40" y="270" width="200" height="80" rx="8" fill="#409EFF" fill-opacity="0.08" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="140" y="302" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">角色 B</text>
    <text x="140" y="322" text-anchor="middle" font-size="11" fill="#666">职责范围明确</text>
    <!-- 范围线 -->
    <line x1="40" y1="350" x2="240" y2="350" stroke="#409EFF" stroke-width="2" stroke-opacity="0.6"/>

    <!-- 预防图标 -->
    <circle cx="140" cy="400" r="22" fill="#409EFF" fill-opacity="0.1" stroke="#409EFF" stroke-width="1.5"/>
    <text x="140" y="406" text-anchor="middle" font-size="18">🛡</text>
    <text x="140" y="440" text-anchor="middle" font-size="12" fill="#409EFF" font-weight="bold">预防为主</text>

    <!-- 标注 1 -->
    <rect x="35" y="455" width="210" height="24" rx="12" fill="#409EFF" fill-opacity="0.08"/>
    <text x="140" y="472" text-anchor="middle" font-size="11" fill="#409EFF">边界清晰 · 协作有序</text>
  </g>

  <!-- ========== 面板 2：协调者角色 ========== -->
  <g filter="url(#shadow)">
    <rect x="280" y="70" width="240" height="400" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 面板标题 -->
    <rect x="280" y="70" width="240" height="36" rx="10" fill="#409EFF" fill-opacity="0.1"/>
    <text x="400" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="#409EFF">策略二：协调者角色</text>

    <!-- 冲突代理 1 -->
    <rect x="300" y="130" width="80" height="50" rx="6" fill="#FF6B6B" fill-opacity="0.12" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="340" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">代理 A</text>

    <!-- 冲突箭头 -->
    <line x1="380" y1="155" x2="420" y2="155" stroke="#FF6B6B" stroke-width="2" stroke-opacity="0.6"/>
    <polygon points="420,150 430,155 420,160" fill="#FF6B6B" fill-opacity="0.6"/>

    <!-- 冲突代理 2 -->
    <rect x="420" y="130" width="80" height="50" rx="6" fill="#FF6B6B" fill-opacity="0.12" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="460" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">代理 B</text>

    <!-- 冲突标识 -->
    <text x="400" y="210" text-anchor="middle" font-size="22">⚡</text>
    <text x="400" y="232" text-anchor="middle" font-size="11" fill="#FF6B6B">冲突</text>

    <!-- 协调者 -->
    <rect x="340" y="260" width="120" height="60" rx="30" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="2"/>
    <text x="400" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#409EFF">协调者</text>
    <text x="400" y="306" text-anchor="middle" font-size="11" fill="#409EFF">仲裁员</text>

    <!-- 连接线：协调者到代理 -->
    <line x1="360" y1="260" x2="340" y2="180" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.5"/>
    <line x1="440" y1="260" x2="460" y2="180" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.5"/>

    <!-- 法槌图标 -->
    <circle cx="400" cy="360" r="24" fill="#409EFF" fill-opacity="0.1" stroke="#409EFF" stroke-width="1.5"/>
    <text x="400" y="367" text-anchor="middle" font-size="22">⚖</text>
    <text x="400" y="398" text-anchor="middle" font-size="11" fill="#409EFF">权威裁决</text>

    <!-- 标注 2 -->
    <rect x="295" y="455" width="210" height="24" rx="12" fill="#409EFF" fill-opacity="0.08"/>
    <text x="400" y="472" text-anchor="middle" font-size="11" fill="#409EFF">第三方介入 · 公正裁决</text>
  </g>

  <!-- ========== 面板 3：升级机制 ========== -->
  <g filter="url(#shadow)">
    <rect x="540" y="70" width="240" height="400" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 面板标题 -->
    <rect x="540" y="70" width="240" height="36" rx="10" fill="#409EFF" fill-opacity="0.1"/>
    <text x="660" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="#409EFF">策略三：升级机制</text>

    <!-- 第 1 级 -->
    <rect x="560" y="120" width="200" height="70" rx="8" fill="#409EFF" fill-opacity="0.06" stroke="#409EFF" stroke-width="1.2"/>
    <text x="570" y="142" font-size="12" font-weight="bold" fill="#1a1a2e">第 1 级：直接沟通</text>
    <text x="570" y="162" font-size="11" fill="#666">代理之间对话协商</text>
    <!-- 对话气泡 -->
    <ellipse cx="710" cy="138" rx="22" ry="14" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <ellipse cx="730" cy="148" rx="8" ry="5" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="0.8"/>
    <text x="710" y="143" text-anchor="middle" font-size="10" fill="#409EFF">💬</text>

    <!-- 向上箭头 -->
    <polygon points="660,192 650,192 660,202 670,192" fill="#409EFF" fill-opacity="0.4"/>
    <line x1="660" y1="190" x2="660" y2="200" stroke="#409EFF" stroke-width="2" stroke-opacity="0.4"/>

    <!-- 第 2 级 -->
    <rect x="560" y="210" width="200" height="70" rx="8" fill="#409EFF" fill-opacity="0.06" stroke="#409EFF" stroke-width="1.2"/>
    <text x="570" y="232" font-size="12" font-weight="bold" fill="#1a1a2e">第 2 级：协调调解</text>
    <text x="570" y="252" font-size="11" fill="#666">协调者介入调解</text>
    <!-- 调解人图标 -->
    <circle cx="710" cy="238" r="14" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="710" y="243" text-anchor="middle" font-size="12" fill="#409EFF">🤝</text>

    <!-- 向上箭头 -->
    <polygon points="660,282 650,282 660,292 670,282" fill="#409EFF" fill-opacity="0.4"/>
    <line x1="660" y1="280" x2="660" y2="292" stroke="#409EFF" stroke-width="2" stroke-opacity="0.4"/>

    <!-- 第 3 级 -->
    <rect x="560" y="300" width="200" height="70" rx="8" fill="#409EFF" fill-opacity="0.06" stroke="#409EFF" stroke-width="1.2"/>
    <text x="570" y="322" font-size="12" font-weight="bold" fill="#1a1a2e">第 3 级：人工干预</text>
    <text x="570" y="342" font-size="11" fill="#666">运维人员最终裁决</text>
    <!-- 人手图标 -->
    <circle cx="710" cy="328" r="14" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="710" y="333" text-anchor="middle" font-size="12" fill="#409EFF">✋</text>

    <!-- 升级说明 -->
    <rect x="560" y="390" width="200" height="30" rx="6" fill="#409EFF" fill-opacity="0.08"/>
    <text x="660" y="410" text-anchor="middle" font-size="11" fill="#409EFF">逐级升级 · 有序解决</text>

    <!-- 标注 3 -->
    <rect x="555" y="455" width="210" height="24" rx="12" fill="#409EFF" fill-opacity="0.08"/>
    <text x="660" y="472" text-anchor="middle" font-size="11" fill="#409EFF">从对话到人工的路径</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="100" y1="490" x2="700" y2="490" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
</svg>