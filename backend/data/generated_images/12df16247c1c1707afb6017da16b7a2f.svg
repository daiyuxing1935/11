<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6f0ff"/>
      <stop offset="100%" stop-color="#d4e4ff"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4e4ff"/>
      <stop offset="100%" stop-color="#b8d4ff"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8d4ff"/>
      <stop offset="100%" stop-color="#90bfff"/>
    </linearGradient>
    <linearGradient id="cardGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90bfff"/>
      <stop offset="100%" stop-color="#70a8ff"/>
    </linearGradient>
    <linearGradient id="cardGrad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#70a8ff"/>
      <stop offset="100%" stop-color="#5090ff"/>
    </linearGradient>
    <linearGradient id="cardGrad6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5090ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="cardGrad7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3070cc"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 智能体框架学习路线图</text>

  <!-- 难度标签 -->
  <text x="120" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7a9bcb">入门</text>
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">进阶</text>
  <text x="680" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3a6aaf">高级</text>

  <!-- 难度渐变条 -->
  <rect x="80" y="75" width="640" height="4" rx="2" fill="#409EFF" opacity="0.3"/>
  <rect x="80" y="75" width="640" height="4" rx="2" fill="url(#cardGrad1)" opacity="0.5"/>

  <!-- 第1行：3个卡片 -->
  <!-- 卡片1: LangChain -->
  <g transform="translate(65, 100)">
    <rect x="0" y="0" width="200" height="100" rx="12" fill="white" stroke="#d4e4ff" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#cardGrad1)" opacity="0.4"/>
    <!-- 图标：链环 -->
    <g transform="translate(20, 25)">
      <circle cx="15" cy="10" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
      <circle cx="15" cy="30" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="15" y1="18" x2="15" y2="22" stroke="#409EFF" stroke-width="2"/>
      <circle cx="25" cy="20" r="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="65" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LangChain</text>
    <text x="65" y="68" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">链式调用框架</text>
  </g>

  <!-- 卡片2: LangGraph -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="200" height="100" rx="12" fill="white" stroke="#b8d4ff" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#cardGrad2)" opacity="0.4"/>
    <!-- 图标：图节点 -->
    <g transform="translate(20, 20)">
      <circle cx="15" cy="15" r="6" fill="#409EFF"/>
      <circle cx="30" cy="30" r="6" fill="#409EFF"/>
      <circle cx="10" cy="35" r="6" fill="#409EFF"/>
      <line x1="18" y1="18" x2="27" y2="27" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="15" y1="21" x2="12" y2="32" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="65" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LangGraph</text>
    <text x="65" y="68" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">图结构编排</text>
  </g>

  <!-- 卡片3: CrewAI -->
  <g transform="translate(535, 100)">
    <rect x="0" y="0" width="200" height="100" rx="12" fill="white" stroke="#90bfff" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#cardGrad3)" opacity="0.4"/>
    <!-- 图标：三个小机器人 -->
    <g transform="translate(15, 22)">
      <rect x="5" y="15" width="12" height="14" rx="3" fill="#409EFF" opacity="0.8"/>
      <circle cx="11" cy="8" r="5" fill="#409EFF" opacity="0.8"/>
      <rect x="22" y="10" width="12" height="14" rx="3" fill="#409EFF" opacity="0.6"/>
      <circle cx="28" cy="3" r="5" fill="#409EFF" opacity="0.6"/>
      <rect x="39" y="15" width="12" height="14" rx="3" fill="#409EFF" opacity="0.4"/>
      <circle cx="45" cy="8" r="5" fill="#409EFF" opacity="0.4"/>
    </g>
    <text x="65" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">CrewAI</text>
    <text x="65" y="68" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">多智能体协作</text>
  </g>

  <!-- 第2行：2个卡片 -->
  <!-- 卡片4: AutoGen -->
  <g transform="translate(130, 230)">
    <rect x="0" y="0" width="240" height="110" rx="12" fill="white" stroke="#70a8ff" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="110" rx="12" fill="url(#cardGrad4)" opacity="0.4"/>
    <!-- 图标：对话框气泡 -->
    <g transform="translate(20, 25)">
      <rect x="5" y="5" width="30" height="22" rx="8" fill="none" stroke="#409EFF" stroke-width="2"/>
      <polygon points="20,27 15,38 25,27" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="12" y1="14" x2="28" y2="14" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="12" y1="20" x2="24" y2="20" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="75" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">AutoGen</text>
    <text x="75" y="75" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">微软多智能体对话</text>
  </g>

  <!-- 卡片5: OpenAI Agent SDK -->
  <g transform="translate(430, 230)">
    <rect x="0" y="0" width="240" height="110" rx="12" fill="white" stroke="#5090ff" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="110" rx="12" fill="url(#cardGrad5)" opacity="0.4"/>
    <!-- 图标：齿轮+火花 -->
    <g transform="translate(20, 25)">
      <circle cx="20" cy="18" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
      <circle cx="20" cy="18" r="4" fill="#409EFF"/>
      <line x1="20" y1="4" x2="20" y2="8" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="20" y1="28" x2="20" y2="32" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="4" y1="18" x2="8" y2="18" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="32" y1="18" x2="36" y2="18" stroke="#409EFF" stroke-width="1.5"/>
      <!-- 火花 -->
      <line x1="33" y1="5" x2="36" y2="2" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="35" y1="8" x2="38" y2="7" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="30" y1="3" x2="32" y2="1" stroke="#FFD700" stroke-width="1.5"/>
    </g>
    <text x="75" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">OpenAI Agent SDK</text>
    <text x="75" y="75" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">官方智能体开发包</text>
  </g>

  <!-- 第3行：2个卡片 -->
  <!-- 卡片6: Anthropic Agent SDK -->
  <g transform="translate(130, 365)">
    <rect x="0" y="0" width="240" height="105" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="105" rx="12" fill="url(#cardGrad6)" opacity="0.4"/>
    <!-- 图标：天平 -->
    <g transform="translate(20, 22)">
      <line x1="20" y1="5" x2="20" y2="30" stroke="#409EFF" stroke-width="2"/>
      <line x1="5" y1="15" x2="35" y2="15" stroke="#409EFF" stroke-width="2"/>
      <rect x="2" y="15" width="10" height="3" rx="1" fill="#409EFF"/>
      <rect x="28" y="15" width="10" height="3" rx="1" fill="#409EFF"/>
      <polygon points="20,30 16,36 24,36" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Anthropic Agent SDK</text>
    <text x="75" y="72" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">安全可控智能体</text>
  </g>

  <!-- 卡片7: Dify/Coze -->
  <g transform="translate(430, 365)">
    <rect x="0" y="0" width="240" height="105" rx="12" fill="white" stroke="#3070cc" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="105" rx="12" fill="url(#cardGrad7)" opacity="0.4"/>
    <!-- 图标：拖拽积木块 -->
    <g transform="translate(18, 20)">
      <rect x="3" y="5" width="12" height="12" rx="2" fill="#409EFF" opacity="0.9"/>
      <rect x="18" y="5" width="12" height="12" rx="2" fill="#409EFF" opacity="0.7"/>
      <rect x="10" y="20" width="12" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
      <rect x="25" y="20" width="12" height="12" rx="2" fill="#409EFF" opacity="0.3"/>
    </g>
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Dify / Coze</text>
    <text x="75" y="72" font-family="Arial, sans-serif" font-size="12" fill="#5a8abf">低代码拖拽搭建</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7a9bcb">颜色由浅至深表示学习难度递增</text>
</svg>