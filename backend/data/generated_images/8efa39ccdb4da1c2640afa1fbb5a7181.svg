<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">思维树（Tree of Thoughts）五大最佳实践</text>

  <!-- 第1项 -->
  <g transform="translate(60, 85)">
    <circle cx="28" cy="28" r="28" fill="url(#circleGrad)"/>
    <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">1</text>
    <!-- 踏脚石图标 -->
    <rect x="80" y="18" width="36" height="8" rx="3" fill="#409EFF" opacity="0.7"/>
    <rect x="88" y="8" width="28" height="8" rx="3" fill="#409EFF" opacity="0.5"/>
    <rect x="96" y="0" width="20" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
    <text x="130" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">从 CoT 开始</text>
  </g>

  <!-- 第2项 -->
  <g transform="translate(60, 170)">
    <circle cx="28" cy="28" r="28" fill="url(#circleGrad)"/>
    <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">2</text>
    <!-- 计时器图标 -->
    <circle cx="95" cy="28" r="18" fill="none" stroke="#409EFF" stroke-width="3"/>
    <line x1="95" y1="28" x2="95" y2="16" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="95" y1="28" x2="103" y2="28" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="128" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">控制搜索预算</text>
  </g>

  <!-- 第3项 -->
  <g transform="translate(60, 255)">
    <circle cx="28" cy="28" r="28" fill="url(#circleGrad)"/>
    <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">3</text>
    <!-- 靶心+对勾图标 -->
    <circle cx="95" cy="28" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="95" cy="28" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="95" cy="28" r="3" fill="#409EFF"/>
    <polyline points="108,20 100,30 94,24" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">领域专用评估器</text>
  </g>

  <!-- 第4项 -->
  <g transform="translate(60, 340)">
    <circle cx="28" cy="28" r="28" fill="url(#circleGrad)"/>
    <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">4</text>
    <!-- 层叠图标 -->
    <rect x="80" y="30" width="40" height="6" rx="2" fill="#409EFF" opacity="0.3"/>
    <rect x="84" y="22" width="36" height="6" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="88" y="14" width="32" height="6" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="92" y="6" width="28" height="6" rx="2" fill="#409EFF"/>
    <text x="130" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">渐进式深化</text>
  </g>

  <!-- 第5项 -->
  <g transform="translate(60, 425)">
    <circle cx="28" cy="28" r="28" fill="url(#circleGrad)"/>
    <text x="28" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">5</text>
    <!-- 缓存/循环图标 -->
    <path d="M95,14 A16,16 0 1,1 79,30" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="79,30 79,20 89,20" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="108" y="22" width="10" height="12" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="112" y="26" width="6" height="4" rx="1" fill="#fff" opacity="0.5"/>
    <text x="130" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">缓存思维节点</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="60" y1="478" x2="740" y2="478" stroke="#409EFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- 底部标注 -->
  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">思维树 · 五大最佳实践</text>
</svg>