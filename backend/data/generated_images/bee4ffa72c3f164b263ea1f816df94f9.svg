<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="blockGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8ee6"/>
    </linearGradient>
    <linearGradient id="blockGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ab0ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="blockGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90c8ff"/>
      <stop offset="100%" stop-color="#6ab0ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">量化原理图解</text>

  <!-- ===== 第一部分：FP32-FP16-BF16 位结构 ===== -->
  <text x="30" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">① 位结构对比</text>

  <!-- FP32 -->
  <text x="30" y="85" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">FP32</text>
  <rect x="80" y="72" width="60" height="20" rx="3" fill="#409EFF" opacity="0.85"/>
  <text x="110" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">符号(1)</text>
  <rect x="145" y="72" width="100" height="20" rx="3" fill="#6ab0ff" opacity="0.85"/>
  <text x="195" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">指数(8)</text>
  <rect x="250" y="72" width="140" height="20" rx="3" fill="#90c8ff" opacity="0.85"/>
  <text x="320" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">尾数(23)</text>

  <!-- FP16 -->
  <text x="30" y="115" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">FP16</text>
  <rect x="80" y="102" width="60" height="20" rx="3" fill="#409EFF" opacity="0.85"/>
  <text x="110" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">符号(1)</text>
  <rect x="145" y="102" width="70" height="20" rx="3" fill="#6ab0ff" opacity="0.85"/>
  <text x="180" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">指数(5)</text>
  <rect x="220" y="102" width="80" height="20" rx="3" fill="#90c8ff" opacity="0.85"/>
  <text x="260" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">尾数(10)</text>

  <!-- BF16 -->
  <text x="30" y="145" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">BF16</text>
  <rect x="80" y="132" width="60" height="20" rx="3" fill="#409EFF" opacity="0.85"/>
  <text x="110" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">符号(1)</text>
  <rect x="145" y="132" width="100" height="20" rx="3" fill="#6ab0ff" opacity="0.85"/>
  <text x="195" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">指数(8)</text>
  <rect x="250" y="132" width="50" height="20" rx="3" fill="#90c8ff" opacity="0.85"/>
  <text x="275" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">尾数(7)</text>

  <!-- 标注1 -->
  <rect x="420" y="72" width="100" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="470" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">精度递减</text>

  <!-- ===== 第二部分：浮点转整数映射 ===== -->
  <text x="30" y="178" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">② 浮点→整数映射</text>

  <!-- 对称量化 -->
  <text x="30" y="200" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">对称量化</text>
  <!-- 数轴 -->
  <line x1="130" y1="200" x2="370" y2="200" stroke="#1a1a2e" stroke-width="1.5"/>
  <polygon points="370,200 364,196 364,204" fill="#1a1a2e"/>
  <!-- 刻度 -->
  <line x1="160" y1="196" x2="160" y2="204" stroke="#1a1a2e" stroke-width="1"/>
  <text x="160" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">-127</text>
  <line x1="250" y1="196" x2="250" y2="204" stroke="#1a1a2e" stroke-width="1"/>
  <text x="250" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">0</text>
  <line x1="340" y1="196" x2="340" y2="204" stroke="#1a1a2e" stroke-width="1"/>
  <text x="340" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">127</text>
  <!-- 箭头标注 -->
  <text x="250" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">scale=1, zero=0</text>

  <!-- 非对称量化 -->
  <text x="30" y="255" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">非对称量化</text>
  <line x1="130" y1="255" x2="370" y2="255" stroke="#1a1a2e" stroke-width="1.5"/>
  <polygon points="370,255 364,251 364,259" fill="#1a1a2e"/>
  <line x1="130" y1="251" x2="130" y2="259" stroke="#1a1a2e" stroke-width="1"/>
  <text x="130" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">0</text>
  <line x1="250" y1="251" x2="250" y2="259" stroke="#1a1a2e" stroke-width="1"/>
  <text x="250" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">128</text>
  <line x1="370" y1="251" x2="370" y2="259" stroke="#1a1a2e" stroke-width="1"/>
  <text x="370" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">255</text>
  <text x="250" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">scale=1, zero=128</text>

  <!-- 标注2 -->
  <rect x="420" y="195" width="110" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="475" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">零中心 vs 偏移</text>

  <!-- 标注3 -->
  <rect x="420" y="250" width="100" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="470" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">范围利用率高</text>

  <!-- ===== 第三部分：量化粒度 ===== -->
  <text x="30" y="320" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">③ 量化粒度</text>

  <!-- Per-tensor -->
  <rect x="30" y="335" width="220" height="50" rx="6" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="140" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Per-tensor</text>
  <text x="140" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">整个矩阵一个 scale</text>

  <!-- Per-channel -->
  <rect x="290" y="335" width="220" height="50" rx="6" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Per-channel</text>
  <text x="400" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">每行一个 scale</text>

  <!-- Per-group -->
  <rect x="550" y="335" width="220" height="50" rx="6" fill="#fff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="660" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Per-group</text>
  <text x="660" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">小分块各自 scale</text>

  <!-- 精度指示箭头 -->
  <text x="140" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">精度低</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">精度中</text>
  <text x="660" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">精度高</text>

  <!-- 精度渐变条 -->
  <rect x="100" y="415" width="600" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="100" y="415" width="200" height="6" rx="3" fill="#90c8ff"/>
  <rect x="300" y="415" width="200" height="6" rx="3" fill="#6ab0ff"/>
  <rect x="500" y="415" width="200" height="6" rx="3" fill="#409EFF"/>

  <!-- 标注4 -->
  <rect x="100" y="430" width="80" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="140" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">粗粒度</text>

  <!-- 标注5 -->
  <rect x="360" y="430" width="80" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">中粒度</text>

  <!-- 标注6 -->
  <rect x="620" y="430" width="80" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="660" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">细粒度</text>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#999">量化粒度越细，精度越高，但计算开销也越大</text>

</svg>