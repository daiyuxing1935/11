<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">少样本提示结构 / Few-Shot Prompt Anatomy</text>

  <!-- 主提示框 -->
  <rect x="100" y="55" width="600" height="410" rx="14" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="2"/>

  <!-- ====== 顶部：任务说明 ====== -->
  <rect x="120" y="72" width="560" height="64" rx="10" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 剪贴板图标 -->
  <rect x="140" y="86" width="28" height="32" rx="4" fill="#409EFF" opacity="0.15"/>
  <rect x="144" y="90" width="20" height="24" rx="2" fill="none" stroke="#409EFF" stroke-width="1.8"/>
  <rect x="148" y="94" width="12" height="2" rx="1" fill="#409EFF"/>
  <rect x="148" y="99" width="12" height="2" rx="1" fill="#409EFF"/>
  <rect x="148" y="104" width="8" height="2" rx="1" fill="#409EFF"/>
  <rect x="144" y="86" width="20" height="6" rx="2" fill="#409EFF"/>
  <rect x="148" y="88" width="4" height="3" rx="1" fill="#FFFFFF"/>

  <text x="182" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">任务说明 / Task Description</text>
  <text x="182" y="122" font-family="Arial, sans-serif" font-size="13" fill="#555">请根据示例，为新的输入生成对应的输出。</text>

  <!-- 分隔线1 -->
  <line x1="120" y1="148" x2="680" y2="148" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>

  <!-- ====== 示例区域 ====== -->
  <text x="400" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">示例 / Examples</text>

  <!-- 示例1 -->
  <rect x="135" y="185" width="530" height="72" rx="10" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="135" y="185" width="530" height="24" rx="10" fill="#409EFF" opacity="0.08"/>
  <text x="150" y="201" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">示例1 / Example 1</text>

  <!-- 输入框 -->
  <rect x="150" y="215" width="200" height="32" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="160" y="236" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输入：今天天气如何？</text>

  <!-- 箭头 -->
  <text x="370" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#409EFF">→</text>

  <!-- 输出框 -->
  <rect x="410" y="215" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="420" y="236" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输出：晴天，气温25°C。</text>

  <!-- 示例2 -->
  <rect x="135" y="267" width="530" height="72" rx="10" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="135" y="267" width="530" height="24" rx="10" fill="#409EFF" opacity="0.08"/>
  <text x="150" y="283" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">示例2 / Example 2</text>

  <rect x="150" y="297" width="200" height="32" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="160" y="318" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输入：明天会下雨吗？</text>

  <text x="370" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#409EFF">→</text>

  <rect x="410" y="297" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="420" y="318" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输出：有70%概率降雨。</text>

  <!-- 示例3 -->
  <rect x="135" y="349" width="530" height="72" rx="10" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="135" y="349" width="530" height="24" rx="10" fill="#409EFF" opacity="0.08"/>
  <text x="150" y="365" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">示例3 / Example 3</text>

  <rect x="150" y="379" width="200" height="32" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="160" y="400" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输入：周末适合出行吗？</text>

  <text x="370" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#409EFF">→</text>

  <rect x="410" y="379" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="420" y="400" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输出：适合，天气晴朗。</text>

  <!-- 分隔线2 -->
  <line x1="120" y1="433" x2="680" y2="433" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>

  <!-- ====== 底部：新输入 ====== -->
  <rect x="120" y="440" width="560" height="50" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="150" y="466" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">新输入 / New Input</text>
  <rect x="310" y="452" width="200" height="28" rx="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
  <text x="320" y="471" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">输入：下周温度如何？</text>
  <!-- 闪烁光标 -->
  <rect x="422" y="455" width="2" height="22" fill="#409EFF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ====== 标注 ====== -->
  <!-- 标注1：任务说明 -->
  <line x1="100" y1="80" x2="80" y2="80" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="80" y1="80" x2="80" y2="50" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="80" cy="50" r="3" fill="#409EFF"/>
  <text x="20" y="46" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">指导</text>

  <!-- 标注2：示例 -->
  <line x1="100" y1="220" x2="70" y2="220" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="70" y1="220" x2="70" y2="195" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="70" cy="195" r="3" fill="#409EFF"/>
  <text x="15" y="191" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">示范</text>

  <!-- 标注3：输入输出对 -->
  <line x1="690" y1="230" x2="720" y2="230" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="720" y1="230" x2="720" y2="210" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="720" cy="210" r="3" fill="#409EFF"/>
  <text x="725" y="206" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">配对</text>

  <!-- 标注4：新输入 -->
  <line x1="690" y1="460" x2="720" y2="460" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="720" y1="460" x2="720" y2="480" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="720" cy="480" r="3" fill="#409EFF"/>
  <text x="725" y="484" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">待处理</text>

  <!-- 标注5：结构分层 -->
  <line x1="400" y1="55" x2="400" y2="28" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="400" cy="28" r="3" fill="#409EFF"/>
  <text x="420" y="24" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">分层结构</text>

  <!-- 标注6：颜色编码 -->
  <line x1="620" y1="55" x2="650" y2="40" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="650" cy="40" r="3" fill="#409EFF"/>
  <text x="655" y="36" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">颜色编码</text>

</svg>