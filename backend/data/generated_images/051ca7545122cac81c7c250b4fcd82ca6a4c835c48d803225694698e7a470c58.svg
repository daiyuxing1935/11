<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ebff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">四种投票策略</text>

  <!-- ========== 左上：多数投票 ========== -->
  <rect x="25" y="55" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="25" y="55" width="360" height="32" rx="12" fill="#409EFF"/>
  <rect x="25" y="75" width="360" height="12" fill="#409EFF"/>
  <text x="205" y="76" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#ffffff">多数投票</text>

  <!-- 三张选票 -->
  <rect x="55" y="105" width="70" height="90" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="90" y="130" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">A</text>
  <text x="90" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">✓</text>
  <rect x="65" y="165" width="50" height="18" rx="4" fill="#409EFF"/>
  <text x="90" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">选中</text>

  <rect x="145" y="105" width="70" height="90" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2"/>
  <text x="180" y="130" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">A</text>
  <text x="180" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">✓</text>
  <rect x="155" y="165" width="50" height="18" rx="4" fill="#409EFF"/>
  <text x="180" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">选中</text>

  <rect x="235" y="105" width="70" height="90" rx="6" fill="#ffffff" stroke="#ccc" stroke-width="1.2"/>
  <text x="270" y="130" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">B</text>
  <text x="270" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ccc">✗</text>

  <!-- 结果标注 -->
  <rect x="320" y="115" width="55" height="55" rx="27" fill="#409EFF" opacity="0.15"/>
  <text x="347" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">A胜</text>
  <text x="347" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">2:1</text>

  <!-- ========== 右上：加权投票 ========== -->
  <rect x="415" y="55" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="55" width="360" height="32" rx="12" fill="#409EFF"/>
  <rect x="415" y="75" width="360" height="12" fill="#409EFF"/>
  <text x="595" y="76" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#ffffff">加权投票</text>

  <!-- 三位专家 -->
  <g transform="translate(440, 105)">
    <circle cx="20" cy="20" r="20" fill="#409EFF" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">专</text>
    <text x="20" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">权重2.0</text>
    <rect x="5" y="65" width="30" height="18" rx="4" fill="#409EFF"/>
    <text x="20" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">A</text>
  </g>

  <g transform="translate(510, 105)">
    <circle cx="20" cy="20" r="20" fill="#409EFF" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">专</text>
    <text x="20" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">权重1.0</text>
    <rect x="5" y="65" width="30" height="18" rx="4" fill="#409EFF"/>
    <text x="20" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">A</text>
  </g>

  <g transform="translate(580, 105)">
    <circle cx="20" cy="20" r="20" fill="#ccc" opacity="0.3"/>
    <text x="20" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#999">专</text>
    <text x="20" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">权重0.5</text>
    <rect x="5" y="65" width="30" height="18" rx="4" fill="#ccc"/>
    <text x="20" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">B</text>
  </g>

  <!-- 天平 -->
  <g transform="translate(660, 110)">
    <line x1="0" y1="10" x2="60" y2="10" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="30" y1="10" x2="30" y2="40" stroke="#1a1a2e" stroke-width="2"/>
    <polygon points="20,40 40,40 30,50" fill="#1a1a2e"/>
    <rect x="0" y="0" width="18" height="10" rx="2" fill="#409EFF"/>
    <text x="9" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">3.0</text>
    <rect x="42" y="0" width="18" height="10" rx="2" fill="#ccc"/>
    <text x="51" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">0.5</text>
  </g>

  <text x="690" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#409EFF">A胜</text>

  <!-- ========== 左下：共识/一致同意 ========== -->
  <rect x="25" y="275" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="25" y="275" width="360" height="32" rx="12" fill="#409EFF"/>
  <rect x="25" y="295" width="360" height="12" fill="#409EFF"/>
  <text x="205" y="296" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#ffffff">共识 / 一致同意</text>

  <!-- 三位专家竖大拇指 -->
  <g transform="translate(65, 325)">
    <circle cx="30" cy="30" r="28" fill="#409EFF" opacity="0.15"/>
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="22">👍</text>
    <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">专家甲</text>
  </g>

  <g transform="translate(175, 325)">
    <circle cx="30" cy="30" r="28" fill="#409EFF" opacity="0.15"/>
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="22">👍</text>
    <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">专家乙</text>
  </g>

  <g transform="translate(285, 325)">
    <circle cx="30" cy="30" r="28" fill="#409EFF" opacity="0.15"/>
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="22">👍</text>
    <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">专家丙</text>
  </g>

  <!-- 圆形一致指示器 -->
  <g transform="translate(345, 335)">
    <circle cx="0" cy="0" r="28" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">100%</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">一致</text>
  </g>

  <!-- ========== 右下：波达计数法 ========== -->
  <rect x="415" y="275" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="275" width="360" height="32" rx="12" fill="#409EFF"/>
  <rect x="415" y="295" width="360" height="12" fill="#409EFF"/>
  <text x="595" y="296" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#ffffff">波达计数法</text>

  <!-- 排名表 -->
  <g transform="translate(440, 320)">
    <!-- 表头 -->
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="40" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">选项</text>
    <rect x="85" y="0" width="80" height="24" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="125" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">排名分</text>
    <rect x="170" y="0" width="80" height="24" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="210" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">总分</text>

    <!-- 行1：A -->
    <rect x="0" y="30" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="40" y="49" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">A</text>
    <rect x="85" y="30" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="125" y="49" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">3+2+2=7</text>
    <rect x="170" y="30" width="80" height="28" rx="4" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
    <text x="210" y="49" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">7</text>

    <!-- 行2：B -->
    <rect x="0" y="64" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="40" y="83" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">B</text>
    <rect x="85" y="64" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="125" y="83" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">2+3+1=6</text>
    <rect x="170" y="64" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="210" y="83" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">6</text>

    <!-- 行3：C -->
    <rect x="0" y="98" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="40" y="117" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">C</text>
    <rect x="85" y="98" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="125" y="117" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">1+1+3=5</text>
    <rect x="170" y="98" width="80" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="210" y="117" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">5</text>
  </g>

  <!-- 最高分高亮 -->
  <g transform="translate(660, 350)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF"/>
    <text x="45" y="19" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">A 最高分</text>
  </g>

  <!-- 底部标注 -->
  <text x="400" y="488" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666" opacity="0.7">Flat-design 2D 矢量插图 · 四种投票策略对比</text>
</svg>