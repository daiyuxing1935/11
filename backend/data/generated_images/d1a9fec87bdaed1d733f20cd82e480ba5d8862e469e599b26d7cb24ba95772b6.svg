<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <linearGradient id="satGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="satGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 轨道线 -->
  <ellipse cx="400" cy="250" rx="130" ry="130" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="6,5" opacity="0.35"/>
  <ellipse cx="400" cy="250" rx="210" ry="210" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="5,6" opacity="0.25"/>
  <ellipse cx="400" cy="250" rx="290" ry="290" fill="none" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="4,7" opacity="0.15"/>

  <!-- 核心节点：LangChain 核心框架 -->
  <g transform="translate(400,250)">
    <!-- 六边形 -->
    <polygon points="0,-48 42,-24 42,24 0,48 -42,24 -42,-24" fill="url(#coreGrad)" stroke="#2b7ed4" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="sans-serif">LangChain</text>
    <text x="0" y="14" text-anchor="middle" fill="#e0f0ff" font-size="12" font-family="sans-serif">核心框架</text>
  </g>

  <!-- 卫星节点 1：LangSmith（上方偏右） -->
  <g transform="translate(530,160)">
    <rect x="-52" y="-28" width="104" height="56" rx="12" fill="url(#satGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 放大镜图标 -->
    <circle cx="-28" cy="-6" r="7" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-23" y1="-1" x2="-18" y2="4" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="-8" y="-4" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold" font-family="sans-serif">LangSmith</text>
    <text x="-8" y="14" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">调试与监控</text>
  </g>

  <!-- 卫星节点 2：LangServe（右侧） -->
  <g transform="translate(610,250)">
    <rect x="-52" y="-28" width="104" height="56" rx="12" fill="url(#satGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- API 端点图标 -->
    <rect x="-32" y="-12" width="10" height="14" rx="2" fill="none" stroke="#409EFF" stroke-width="1.3"/>
    <line x1="-20" y1="-8" x2="-12" y2="-8" stroke="#409EFF" stroke-width="1.3"/>
    <line x1="-20" y1="-4" x2="-12" y2="-4" stroke="#409EFF" stroke-width="1.3"/>
    <line x1="-20" y1="0" x2="-12" y2="0" stroke="#409EFF" stroke-width="1.3"/>
    <text x="-2" y="-4" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold" font-family="sans-serif">LangServe</text>
    <text x="-2" y="14" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">API 部署</text>
  </g>

  <!-- 卫星节点 3：LangGraph（下方偏右） -->
  <g transform="translate(530,340)">
    <rect x="-52" y="-28" width="104" height="56" rx="12" fill="url(#satGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 有向图节点图标 -->
    <circle cx="-28" cy="-8" r="5" fill="#409EFF" opacity="0.6"/>
    <circle cx="-28" cy="6" r="5" fill="#409EFF" opacity="0.6"/>
    <line x1="-28" y1="-3" x2="-28" y2="1" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-23" y1="-6" x2="-15" y2="-6" stroke="#409EFF" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="-2" y="-4" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold" font-family="sans-serif">LangGraph</text>
    <text x="-2" y="14" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">图流程编排</text>
  </g>

  <!-- 卫星节点 4：LangChain Hub（左侧） -->
  <g transform="translate(190,250)">
    <rect x="-52" y="-28" width="104" height="56" rx="12" fill="url(#satGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 社区/共享图标 -->
    <circle cx="-30" cy="-6" r="5" fill="none" stroke="#409EFF" stroke-width="1.3"/>
    <circle cx="-20" cy="-6" r="5" fill="none" stroke="#409EFF" stroke-width="1.3"/>
    <path d="M-30,-1 Q-25,6 -20,-1" fill="none" stroke="#409EFF" stroke-width="1.3"/>
    <text x="-4" y="-4" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold" font-family="sans-serif">LangChain Hub</text>
    <text x="-4" y="14" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">社区与共享</text>
  </g>

  <!-- 卫星节点 5：生态扩展（上方偏左） -->
  <g transform="translate(270,160)">
    <rect x="-52" y="-28" width="104" height="56" rx="12" fill="url(#satGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 辐射扩展图标 -->
    <circle cx="-28" cy="-6" r="4" fill="#409EFF" opacity="0.5"/>
    <line x1="-28" y1="-12" x2="-28" y2="-16" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-22" y1="-6" x2="-18" y2="-6" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-34" y1="-6" x2="-38" y2="-6" stroke="#409EFF" stroke-width="1.2"/>
    <text x="-2" y="-4" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold" font-family="sans-serif">生态扩展</text>
    <text x="-2" y="14" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">工具与集成</text>
  </g>

  <!-- 连接线（从核心到卫星） -->
  <line x1="400" y1="250" x2="530" y2="160" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="400" y1="250" x2="610" y2="250" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="400" y1="250" x2="530" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="400" y1="250" x2="190" y2="250" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="400" y1="250" x2="270" y2="160" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold" font-family="sans-serif">LangChain 生态系统架构图</text>
  <text x="400" y="60" text-anchor="middle" fill="#409EFF" font-size="13" font-family="sans-serif">模块化 AI 应用开发框架</text>

  <!-- 底部图例 -->
  <g transform="translate(400,470)">
    <rect x="-160" y="-14" width="320" height="28" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#409EFF" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="-130" cy="0" r="4" fill="#409EFF" opacity="0.5"/>
    <text x="-118" y="4" text-anchor="start" fill="#1a1a2e" font-size="11" font-family="sans-serif">核心框架</text>
    <rect x="-50" y="-4" width="8" height="8" rx="2" fill="url(#satGrad1)" stroke="#409EFF" stroke-width="0.8"/>
    <text x="-36" y="4" text-anchor="start" fill="#1a1a2e" font-size="11" font-family="sans-serif">功能模块</text>
    <line x1="40" y1="0" x2="60" y2="0" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <text x="66" y="4" text-anchor="start" fill="#1a1a2e" font-size="11" font-family="sans-serif">连接与依赖</text>
  </g>
</svg>