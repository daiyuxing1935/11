<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8ee6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 智能体公式</text>

  <!-- 等号 -->
  <text x="340" y="260" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#1a1a2e">=</text>

  <!-- 左侧：机器人图标 -->
  <!-- 机器人头部 -->
  <rect x="120" y="80" width="120" height="90" rx="20" fill="#409EFF" opacity="0.9"/>
  <!-- 机器人眼睛 -->
  <circle cx="155" cy="120" r="10" fill="white"/>
  <circle cx="205" cy="120" r="10" fill="white"/>
  <circle cx="155" cy="120" r="5" fill="#1a1a2e"/>
  <circle cx="205" cy="120" r="5" fill="#1a1a2e"/>
  <!-- 天线 -->
  <line x1="180" y1="80" x2="180" y2="55" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="180" cy="50" r="6" fill="#409EFF"/>
  <!-- 机器人身体 -->
  <rect x="130" y="180" width="100" height="100" rx="12" fill="#409EFF" opacity="0.7"/>
  <!-- 机器人手臂 -->
  <rect x="95" y="190" width="35" height="12" rx="6" fill="#409EFF" opacity="0.6"/>
  <rect x="230" y="190" width="35" height="12" rx="6" fill="#409EFF" opacity="0.6"/>
  <!-- 机器人腿 -->
  <rect x="145" y="290" width="30" height="40" rx="8" fill="#409EFF" opacity="0.55"/>
  <rect x="185" y="290" width="30" height="40" rx="8" fill="#409EFF" opacity="0.55"/>
  <!-- 机器人标签 -->
  <text x="180" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">智能体</text>

  <!-- 右侧：六个组件块 -->
  <!-- 第1行：大脑（LLM） -->
  <rect x="410" y="70" width="160" height="50" rx="10" fill="url(#boxGrad)"/>
  <text x="490" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">🧠 大脑 (LLM)</text>

  <!-- 第2行：工具 -->
  <rect x="410" y="140" width="160" height="50" rx="10" fill="url(#boxGrad)"/>
  <text x="490" y="170" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">🔧 工具箱 (Tools)</text>

  <!-- 第3行：记忆 -->
  <rect x="410" y="210" width="160" height="50" rx="10" fill="url(#boxGrad)"/>
  <text x="490" y="240" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">💾 记忆 (Memory)</text>

  <!-- 第4行：规划 -->
  <rect x="410" y="280" width="160" height="50" rx="10" fill="url(#boxGrad)"/>
  <text x="490" y="310" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">🗺️ 规划 (Planning)</text>

  <!-- 第5行：执行循环 -->
  <rect x="410" y="350" width="160" height="50" rx="10" fill="url(#boxGrad)"/>
  <text x="490" y="380" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">🔄 执行循环 (Loop)</text>

  <!-- 第6行：错误恢复 -->
  <rect x="410" y="420" width="160" height="50" rx="10" fill="url(#boxGrad)"/>
  <text x="490" y="450" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">🛡️ 错误恢复 (Recovery)</text>

  <!-- 连接线：等号到组件块 -->
  <line x1="370" y1="95" x2="410" y2="95" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="165" x2="410" y2="165" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="235" x2="410" y2="235" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="305" x2="410" y2="305" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="375" x2="410" y2="375" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="370" y1="445" x2="410" y2="445" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.6">六大核心组件协同构成完整 AI 智能体系统</text>
</svg>