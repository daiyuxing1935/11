<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="easyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#B3E0FF"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4ECFF"/>
      <stop offset="100%" stop-color="#7EC8FF"/>
    </linearGradient>
    <linearGradient id="hardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8D8FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="advGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7EC8FF"/>
      <stop offset="100%" stop-color="#1A5C9E"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 智能体框架学习路线图</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">从入门到进阶 · 七种主流框架</text>

  <!-- ===== 第1行：3个入门级 ===== -->
  <!-- 卡片1：LangChain -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="220" height="110" rx="12" fill="url(#easyGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 图标：链环 -->
    <circle cx="80" cy="120" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="110" cy="120" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="98" y1="120" x2="92" y2="120" stroke="#409EFF" stroke-width="2.5"/>
    <text x="150" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LangChain</text>
    <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">链式调用 · 入门</text>
    <!-- 难度标签 -->
    <rect x="40" y="170" width="220" height="20" rx="0 0 12 12" fill="#409EFF" opacity="0.15"/>
    <text x="150" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">★☆☆ 入门</text>
  </g>

  <!-- 卡片2：CrewAI -->
  <g filter="url(#shadow)">
    <rect x="290" y="80" width="220" height="110" rx="12" fill="url(#easyGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 图标：三个小机器人 -->
    <circle cx="320" cy="108" r="6" fill="#409EFF"/>
    <circle cx="338" cy="108" r="6" fill="#409EFF"/>
    <circle cx="356" cy="108" r="6" fill="#409EFF"/>
    <rect x="316" y="114" width="8" height="10" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="334" y="114" width="8" height="10" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="352" y="114" width="8" height="10" rx="2" fill="#409EFF" opacity="0.6"/>
    <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">CrewAI</text>
    <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">多智能体协作</text>
    <rect x="290" y="170" width="220" height="20" rx="0 0 12 12" fill="#409EFF" opacity="0.15"/>
    <text x="400" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">★☆☆ 入门</text>
  </g>

  <!-- 卡片3：Dify/Coze -->
  <g filter="url(#shadow)">
    <rect x="540" y="80" width="220" height="110" rx="12" fill="url(#easyGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 图标：拖放块 -->
    <rect x="568" y="100" width="14" height="14" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="586" y="100" width="14" height="14" rx="2" fill="#409EFF" opacity="0.4"/>
    <rect x="568" y="118" width="14" height="14" rx="2" fill="#409EFF" opacity="0.4"/>
    <rect x="586" y="118" width="14" height="14" rx="2" fill="#409EFF" opacity="0.7"/>
    <text x="650" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Dify/Coze</text>
    <text x="650" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">低代码搭建</text>
    <rect x="540" y="170" width="220" height="20" rx="0 0 12 12" fill="#409EFF" opacity="0.15"/>
    <text x="650" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">★☆☆ 入门</text>
  </g>

  <!-- ===== 第2行：2个进阶级 ===== -->
  <!-- 卡片4：LangGraph -->
  <g filter="url(#shadow)">
    <rect x="100" y="220" width="260" height="110" rx="12" fill="url(#midGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 图标：图节点 -->
    <circle cx="140" cy="258" r="8" fill="#409EFF"/>
    <circle cx="170" cy="248" r="6" fill="#409EFF" opacity="0.7"/>
    <circle cx="170" cy="270" r="6" fill="#409EFF" opacity="0.7"/>
    <line x1="148" y1="258" x2="164" y2="248" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="148" y1="258" x2="164" y2="270" stroke="#409EFF" stroke-width="1.5"/>
    <text x="210" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LangGraph</text>
    <text x="210" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">图状态 · 进阶</text>
    <rect x="100" y="310" width="260" height="20" rx="0 0 12 12" fill="#409EFF" opacity="0.2"/>
    <text x="230" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2E7DB8">★★☆ 进阶</text>
  </g>

  <!-- 卡片5：AutoGen -->
  <g filter="url(#shadow)">
    <rect x="440" y="220" width="260" height="110" rx="12" fill="url(#midGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 图标：对话框气泡 -->
    <rect x="475" y="240" width="30" height="20" rx="6" fill="#409EFF" opacity="0.8"/>
    <polygon points="490,260 485,268 495,260" fill="#409EFF" opacity="0.8"/>
    <text x="480" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">MS</text>
    <text x="550" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">AutoGen</text>
    <text x="550" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">微软 · 多智能体</text>
    <rect x="440" y="310" width="260" height="20" rx="0 0 12 12" fill="#409EFF" opacity="0.2"/>
    <text x="570" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2E7DB8">★★☆ 进阶</text>
  </g>

  <!-- ===== 第3行：2个高级 ===== -->
  <!-- 卡片6：OpenAI Agent SDK -->
  <g filter="url(#shadow)">
    <rect x="100" y="360" width="260" height="110" rx="12" fill="url(#hardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 图标：齿轮+火花 -->
    <circle cx="145" cy="400" r="12" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="145" cy="400" r="4" fill="#1a1a2e"/>
    <line x1="145" y1="386" x2="145" y2="390" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="145" y1="410" x2="145" y2="414" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="131" y1="400" x2="135" y2="400" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="155" y1="400" x2="159" y2="400" stroke="#1a1a2e" stroke-width="2"/>
    <!-- 火花 -->
    <line x1="162" y1="388" x2="166" y2="384" stroke="#FFA500" stroke-width="1.5"/>
    <line x1="165" y1="395" x2="170" y2="394" stroke="#FFA500" stroke-width="1.5"/>
    <text x="210" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">OpenAI Agent</text>
    <text x="210" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.8">SDK</text>
    <text x="210" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">函数调用 · 高级</text>
    <rect x="100" y="450" width="260" height="20" rx="0 0 12 12" fill="#1a1a2e" opacity="0.15"/>
    <text x="230" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a5c9e">★★★ 高级</text>
  </g>

  <!-- 卡片7：Anthropic Agent SDK -->
  <g filter="url(#shadow)">
    <rect x="440" y="360" width="260" height="110" rx="12" fill="url(#advGrad)" stroke="#1A5C9E" stroke-width="1.5"/>
    <!-- 图标：天平 -->
    <line x1="490" y1="390" x2="490" y2="410" stroke="white" stroke-width="2"/>
    <line x1="478" y1="395" x2="502" y2="395" stroke="white" stroke-width="2"/>
    <polygon points="478,395 482,400 482,390" fill="white" opacity="0.8"/>
    <polygon points="502,395 498,400 498,390" fill="white" opacity="0.8"/>
    <text x="550" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Anthropic Agent</text>
    <text x="550" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.8">SDK</text>
    <text x="550" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E0F0FF">安全对齐 · 高级</text>
    <rect x="440" y="450" width="260" height="20" rx="0 0 12 12" fill="#0D3B6E" opacity="0.4"/>
    <text x="570" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7EC8FF">★★★ 高级</text>
  </g>

  <!-- 连接线（装饰性） -->
  <line x1="260" y1="190" x2="260" y2="220" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="510" y1="190" x2="510" y2="220" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="230" y1="330" x2="230" y2="360" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="570" y1="330" x2="570" y2="360" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- 难度指示箭头 -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">入门 → 进阶 → 高级</text>
  <line x1="340" y1="488" x2="460" y2="488" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>
</svg>