<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="easyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFF"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0ECFF"/>
      <stop offset="100%" stop-color="#A0D0FF"/>
    </linearGradient>
    <linearGradient id="advGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0D0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI 智能体框架学习路径</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">入门 · 进阶 · 高级</text>

  <!-- ===== 第一行：入门级（浅蓝） ===== -->

  <!-- 卡片 1: LangChain -->
  <rect x="40" y="85" width="220" height="110" rx="14" fill="white" stroke="#B0D4FF" stroke-width="1.5"/>
  <rect x="40" y="85" width="220" height="110" rx="14" fill="url(#easyGrad)" opacity="0.4"/>
  <!-- 图标：链环 -->
  <g transform="translate(70, 115)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="18" cy="0" r="8" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="6" y1="0" x2="12" y2="0" stroke="#409EFF" stroke-width="2.5"/>
  </g>
  <text x="110" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LangChain</text>
  <text x="110" y="142" font-family="Arial, sans-serif" font-size="12" fill="#666">链式调用 · 基础组件</text>
  <rect x="55" y="158" width="60" height="20" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
  <text x="85" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">入门</text>

  <!-- 卡片 2: LangGraph -->
  <rect x="290" y="85" width="220" height="110" rx="14" fill="white" stroke="#B0D4FF" stroke-width="1.5"/>
  <rect x="290" y="85" width="220" height="110" rx="14" fill="url(#easyGrad)" opacity="0.4"/>
  <!-- 图标：图节点 -->
  <g transform="translate(320, 115)">
    <circle cx="0" cy="0" r="6" fill="#409EFF"/>
    <circle cx="16" cy="-8" r="6" fill="#409EFF"/>
    <circle cx="16" cy="8" r="6" fill="#409EFF"/>
    <line x1="5" y1="-2" x2="11" y2="-6" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="5" y1="2" x2="11" y2="6" stroke="#409EFF" stroke-width="1.5"/>
  </g>
  <text x="360" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LangGraph</text>
  <text x="360" y="142" font-family="Arial, sans-serif" font-size="12" fill="#666">图工作流 · 状态管理</text>
  <rect x="305" y="158" width="60" height="20" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
  <text x="335" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">入门</text>

  <!-- 卡片 3: Dify/Coze -->
  <rect x="540" y="85" width="220" height="110" rx="14" fill="white" stroke="#B0D4FF" stroke-width="1.5"/>
  <rect x="540" y="85" width="220" height="110" rx="14" fill="url(#easyGrad)" opacity="0.4"/>
  <!-- 图标：拖拽块 -->
  <g transform="translate(570, 110)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#409EFF" opacity="0.7"/>
    <rect x="16" y="0" width="12" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="0" y="16" width="12" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="16" y="16" width="12" height="12" rx="2" fill="#409EFF" opacity="0.3"/>
  </g>
  <text x="610" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Dify / Coze</text>
  <text x="610" y="142" font-family="Arial, sans-serif" font-size="12" fill="#666">低代码 · 拖拽搭建</text>
  <rect x="555" y="158" width="60" height="20" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.8"/>
  <text x="585" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">入门</text>

  <!-- ===== 第二行：进阶级（中蓝） ===== -->

  <!-- 卡片 4: CrewAI -->
  <rect x="40" y="225" width="220" height="110" rx="14" fill="white" stroke="#80BFFF" stroke-width="1.5"/>
  <rect x="40" y="225" width="220" height="110" rx="14" fill="url(#midGrad)" opacity="0.3"/>
  <!-- 图标：三个迷你机器人 -->
  <g transform="translate(65, 252)">
    <rect x="0" y="4" width="12" height="10" rx="3" fill="#409EFF"/>
    <circle cx="6" cy="2" r="4" fill="#409EFF"/>
    <rect x="18" y="4" width="12" height="10" rx="3" fill="#409EFF" opacity="0.7"/>
    <circle cx="24" cy="2" r="4" fill="#409EFF" opacity="0.7"/>
    <rect x="36" y="4" width="12" height="10" rx="3" fill="#409EFF" opacity="0.5"/>
    <circle cx="42" cy="2" r="4" fill="#409EFF" opacity="0.5"/>
  </g>
  <text x="110" y="260" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">CrewAI</text>
  <text x="110" y="282" font-family="Arial, sans-serif" font-size="12" fill="#666">多智能体 · 角色协作</text>
  <rect x="55" y="298" width="60" height="20" rx="10" fill="#D0ECFF" stroke="#409EFF" stroke-width="0.8"/>
  <text x="85" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">进阶</text>

  <!-- 卡片 5: AutoGen -->
  <rect x="290" y="225" width="220" height="110" rx="14" fill="white" stroke="#80BFFF" stroke-width="1.5"/>
  <rect x="290" y="225" width="220" height="110" rx="14" fill="url(#midGrad)" opacity="0.3"/>
  <!-- 图标：微软风格对话气泡 -->
  <g transform="translate(320, 252)">
    <rect x="0" y="0" width="20" height="16" rx="4" fill="#409EFF" opacity="0.8"/>
    <polygon points="4,16 8,22 12,16" fill="#409EFF" opacity="0.8"/>
    <rect x="5" y="5" width="10" height="2" rx="1" fill="white"/>
    <rect x="5" y="9" width="7" height="2" rx="1" fill="white"/>
  </g>
  <text x="360" y="260" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">AutoGen</text>
  <text x="360" y="282" font-family="Arial, sans-serif" font-size="12" fill="#666">对话驱动 · 多代理</text>
  <rect x="305" y="298" width="60" height="20" rx="10" fill="#D0ECFF" stroke="#409EFF" stroke-width="0.8"/>
  <text x="335" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">进阶</text>

  <!-- ===== 第三行：高级（深蓝） ===== -->

  <!-- 卡片 6: OpenAI Agent SDK -->
  <rect x="40" y="365" width="220" height="110" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="40" y="365" width="220" height="110" rx="14" fill="url(#advGrad)" opacity="0.2"/>
  <!-- 图标：齿轮+火花 -->
  <g transform="translate(68, 392)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="10" cy="10" r="3" fill="#409EFF"/>
    <line x1="10" y1="0" x2="10" y2="3" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="10" y1="17" x2="10" y2="20" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="3" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="17" y1="10" x2="20" y2="10" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="3" y1="3" x2="5" y2="5" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="15" y1="15" x2="17" y2="17" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 火花 -->
    <line x1="22" y1="2" x2="25" y2="0" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="24" y1="6" x2="27" y2="5" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="20" y1="20" x2="23" y2="22" stroke="#FFD700" stroke-width="1.2"/>
  </g>
  <text x="110" y="400" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">OpenAI Agent SDK</text>
  <text x="110" y="422" font-family="Arial, sans-serif" font-size="12" fill="#666">函数调用 · 工具集成</text>
  <rect x="55" y="438" width="60" height="20" rx="10" fill="#A0D0FF" stroke="#409EFF" stroke-width="0.8"/>
  <text x="85" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">高级</text>

  <!-- 卡片 7: Anthropic Agent SDK -->
  <rect x="290" y="365" width="220" height="110" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="290" y="365" width="220" height="110" rx="14" fill="url(#advGrad)" opacity="0.2"/>
  <!-- 图标：天平/平衡 -->
  <g transform="translate(322, 392)">
    <line x1="10" y1="0" x2="10" y2="8" stroke="#409EFF" stroke-width="2"/>
    <line x1="0" y1="8" x2="20" y2="8" stroke="#409EFF" stroke-width="2"/>
    <polygon points="0,8 3,18 -3,18" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="20,8 23,18 17,18" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  </g>
  <text x="360" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Anthropic Agent SDK</text>
  <text x="360" y="422" font-family="Arial, sans-serif" font-size="12" fill="#666">安全对齐 · 平衡控制</text>
  <rect x="305" y="438" width="60" height="20" rx="10" fill="#A0D0FF" stroke="#409EFF" stroke-width="0.8"/>
  <text x="335" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">高级</text>

  <!-- 底部标注 -->
  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">难度递进：浅蓝 → 深蓝</text>
</svg>