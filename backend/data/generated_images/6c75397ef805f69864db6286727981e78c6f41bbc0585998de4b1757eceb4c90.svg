<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EAF8"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">黑板架构（Blackboard Architecture）</text>

  <!-- ===== 中央黑板 ===== -->
  <rect x="250" y="60" width="300" height="200" rx="8" fill="url(#boardGrad)" stroke="#2B7BD4" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">黑板（Blackboard）</text>

  <!-- 黑板内三个分区 -->
  <!-- 知识项 -->
  <rect x="265" y="100" width="85" height="145" rx="4" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="307" y="118" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">知识项</text>
  <!-- 文档图标 -->
  <rect x="278" y="130" width="20" height="24" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="282" y1="136" x2="294" y2="136" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="282" y1="141" x2="294" y2="141" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="282" y1="146" x2="290" y2="146" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="318" y="130" width="20" height="24" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="322" y1="136" x2="334" y2="136" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="322" y1="141" x2="334" y2="141" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="322" y1="146" x2="330" y2="146" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="278" y="170" width="20" height="24" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="282" y1="176" x2="294" y2="176" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="282" y1="181" x2="294" y2="181" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="282" y1="186" x2="290" y2="186" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="318" y="170" width="20" height="24" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="322" y1="176" x2="334" y2="176" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="322" y1="181" x2="334" y2="181" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="322" y1="186" x2="330" y2="186" stroke="#FFFFFF" stroke-width="1"/>

  <!-- 任务 -->
  <rect x="357" y="100" width="85" height="145" rx="4" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="399" y="118" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">任务</text>
  <!-- 剪贴板 -->
  <rect x="375" y="130" width="22" height="28" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="378" y="126" width="16" height="6" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="380" y1="138" x2="392" y2="138" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="380" y1="144" x2="392" y2="144" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="380" y1="150" x2="388" y2="150" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="383" cy="134" r="1.5" fill="#FFFFFF"/>

  <!-- 部分结果 -->
  <rect x="449" y="100" width="86" height="145" rx="4" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="492" y="118" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">部分结果</text>
  <!-- 拼图 -->
  <rect x="462" y="130" width="22" height="22" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="462" y="130" width="11" height="11" rx="2" fill="#FFFFFF" fill-opacity="0.4"/>
  <rect x="478" y="145" width="11" height="11" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="462" y="160" width="22" height="22" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="462" y="160" width="11" height="11" rx="2" fill="#FFFFFF" fill-opacity="0.4"/>
  <rect x="478" y="175" width="11" height="11" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- ===== 调度器 ===== -->
  <rect x="555" y="60" width="230" height="200" rx="8" fill="#FFFFFF" stroke="#409EFF" stroke-width="2"/>
  <text x="670" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">调度器（Scheduler）</text>

  <!-- 三个功能 -->
  <rect x="568" y="100" width="204" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="670" y="125" text-anchor="middle" font-size="13" fill="#1a1a2e">匹配任务与能力</text>

  <rect x="568" y="150" width="204" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="670" y="175" text-anchor="middle" font-size="13" fill="#1a1a2e">管理优先级</text>

  <rect x="568" y="200" width="204" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="670" y="225" text-anchor="middle" font-size="13" fill="#1a1a2e">触发检测</text>

  <!-- 调度器到黑板的连接线 -->
  <line x1="555" y1="120" x2="550" y2="120" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="555" y1="170" x2="550" y2="170" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="555" y1="220" x2="550" y2="220" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== 三个智能体 ===== -->

  <!-- 智能体A - 搜索 -->
  <rect x="30" y="290" width="180" height="80" rx="8" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="42" y="300" width="36" height="36" rx="6" fill="#409EFF"/>
  <text x="60" y="324" text-anchor="middle" font-size="16" fill="#FFFFFF">🔍</text>
  <text x="90" y="318" font-size="15" font-weight="bold" fill="#1a1a2e">智能体A</text>
  <text x="90" y="338" font-size="12" fill="#666">搜索能力</text>
  <!-- 读写箭头 -->
  <line x1="210" y1="310" x2="245" y2="310" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="245" y1="340" x2="210" y2="340" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlueRev)"/>
  <text x="228" y="300" text-anchor="middle" font-size="11" fill="#409EFF">写</text>
  <text x="228" y="358" text-anchor="middle" font-size="11" fill="#409EFF">读</text>

  <!-- 智能体B - 分析 -->
  <rect x="310" y="290" width="180" height="80" rx="8" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="322" y="300" width="36" height="36" rx="6" fill="#409EFF"/>
  <text x="340" y="324" text-anchor="middle" font-size="16" fill="#FFFFFF">📊</text>
  <text x="370" y="318" font-size="15" font-weight="bold" fill="#1a1a2e">智能体B</text>
  <text x="370" y="338" font-size="12" fill="#666">分析能力</text>

  <!-- 智能体C - 写作 -->
  <rect x="590" y="290" width="180" height="80" rx="8" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="602" y="300" width="36" height="36" rx="6" fill="#409EFF"/>
  <text x="620" y="324" text-anchor="middle" font-size="16" fill="#FFFFFF">✏️</text>
  <text x="650" y="318" font-size="15" font-weight="bold" fill="#1a1a2e">智能体C</text>
  <text x="650" y="338" font-size="12" fill="#666">写作能力</text>
  <!-- 读写箭头 -->
  <line x1="590" y1="310" x2="555" y2="310" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="555" y1="340" x2="590" y2="340" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlueRev)"/>
  <text x="572" y="300" text-anchor="middle" font-size="11" fill="#409EFF">写</text>
  <text x="572" y="358" text-anchor="middle" font-size="11" fill="#409EFF">读</text>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
    </marker>
    <marker id="arrowBlueRev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8,0 0,3 8,6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 智能体B到黑板的箭头 -->
  <line x1="400" y1="290" x2="400" y2="265" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="260" x2="400" y2="285" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlueRev)"/>
  <text x="412" y="272" font-size="11" fill="#409EFF">读/写</text>

  <!-- ===== 对比插图 ===== -->
  <rect x="30" y="400" width="740" height="85" rx="8" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 消息传递 -->
  <rect x="50" y="412" width="330" height="60" rx="5" fill="#F0F7FF" stroke="#409EFF" stroke-width="1"/>
  <text x="215" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">消息传递：智能体→智能体</text>
  <text x="215" y="452" text-anchor="middle" font-size="12" fill="#666">（点对点通信）</text>
  <!-- 图示 -->
  <circle cx="120" cy="460" r="8" fill="#409EFF"/>
  <text x="120" y="463" text-anchor="middle" font-size="8" fill="#FFF">A</text>
  <line x1="130" y1="460" x2="155" y2="460" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <circle cx="165" cy="460" r="8" fill="#409EFF"/>
  <text x="165" y="463" text-anchor="middle" font-size="8" fill="#FFF">B</text>

  <!-- VS -->
  <text x="400" y="450" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">VS</text>

  <!-- 黑板模式 -->
  <rect x="420" y="412" width="330" height="60" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="585" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">黑板：智能体→黑板→智能体</text>
  <text x="585" y="452" text-anchor="middle" font-size="12" fill="#666">（发布-发现机制）</text>
  <!-- 图示 -->
  <circle cx="490" cy="460" r="8" fill="#409EFF"/>
  <text x="490" y="463" text-anchor="middle" font-size="8" fill="#FFF">A</text>
  <line x1="500" y1="458" x2="520" y2="450" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <rect x="522" y="442" width="16" height="16" rx="2" fill="#409EFF" fill-opacity="0.5" stroke="#409EFF" stroke-width="1"/>
  <line x1="540" y1="450" x2="558" y2="458" stroke="#409EFF" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <circle cx="568" cy="460" r="8" fill="#409EFF"/>
  <text x="568" y="463" text-anchor="middle" font-size="8" fill="#FFF">B</text>

</svg>