<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">常见结构化格式对比</text>

  <!-- 卡片1: JSON -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="220" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 标签 -->
    <rect x="60" y="-12" width="100" height="28" rx="14" fill="#409EFF"/>
    <text x="110" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">JSON 格式</text>

    <!-- 花括号图标 -->
    <text x="110" y="60" text-anchor="middle" font-family="monospace" font-size="32" fill="#409EFF" font-weight="bold">{ }</text>

    <!-- 键值对可视化 -->
    <g transform="translate(25, 90)">
      <rect x="0" y="0" width="170" height="90" rx="6" fill="#F0F7FF" stroke="#D0E8F8" stroke-width="1"/>
      <text x="12" y="22" font-family="monospace" font-size="13" fill="#1a1a2e">"name": "小明"</text>
      <text x="12" y="44" font-family="monospace" font-size="13" fill="#1a1a2e">"age": 25</text>
      <text x="12" y="66" font-family="monospace" font-size="13" fill="#1a1a2e">"city": "北京"</text>
    </g>

    <!-- 标注1 -->
    <rect x="45" y="200" width="130" height="24" rx="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="110" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">键值对结构</text>

    <!-- 标注2 -->
    <rect x="45" y="240" width="130" height="24" rx="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="110" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">花括号包裹</text>

    <!-- 小提示 -->
    <text x="110" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7A8BA0">轻量数据交换</text>
  </g>

  <!-- 卡片2: Markdown -->
  <g transform="translate(290, 80)">
    <rect x="0" y="0" width="220" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 标签 -->
    <rect x="55" y="-12" width="110" height="28" rx="14" fill="#409EFF"/>
    <text x="110" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Markdown 格式</text>

    <!-- # 标题图标 -->
    <text x="110" y="60" text-anchor="middle" font-family="monospace" font-size="36" fill="#409EFF" font-weight="bold"># H1</text>

    <!-- 内容可视化 -->
    <g transform="translate(25, 90)">
      <rect x="0" y="0" width="170" height="90" rx="6" fill="#F0F7FF" stroke="#D0E8F8" stroke-width="1"/>
      <text x="12" y="22" font-family="monospace" font-size="13" fill="#1a1a2e"># 一级标题</text>
      <text x="12" y="44" font-family="monospace" font-size="13" fill="#1a1a2e">## 二级标题</text>
      <text x="12" y="66" font-family="monospace" font-size="13" fill="#1a1a2e">- 列表项</text>
    </g>

    <!-- 标注3 -->
    <rect x="45" y="200" width="130" height="24" rx="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="110" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">标题层级</text>

    <!-- 标注4 -->
    <rect x="45" y="240" width="130" height="24" rx="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="110" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">列表与表格</text>

    <!-- 小表格 -->
    <g transform="translate(40, 278)">
      <rect x="0" y="0" width="140" height="36" rx="4" fill="none" stroke="#C0D9E8" stroke-width="1"/>
      <line x1="0" y1="18" x2="140" y2="18" stroke="#C0D9E8" stroke-width="1"/>
      <line x1="70" y1="0" x2="70" y2="36" stroke="#C0D9E8" stroke-width="1"/>
      <text x="35" y="13" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a1a2e">语法</text>
      <text x="105" y="13" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a1a2e">效果</text>
      <text x="35" y="31" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a1a2e">**粗**</text>
      <text x="105" y="31" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a1a2e"><tspan font-weight="bold">粗体</tspan></text>
    </g>
  </g>

  <!-- 卡片3: XML -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="220" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 标签 -->
    <rect x="65" y="-12" width="90" height="28" rx="14" fill="#409EFF"/>
    <text x="110" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">XML 格式</text>

    <!-- 尖括号图标 -->
    <text x="110" y="55" text-anchor="middle" font-family="monospace" font-size="28" fill="#409EFF" font-weight="bold">&lt;/&gt;</text>

    <!-- 嵌套树结构 -->
    <g transform="translate(25, 85)">
      <rect x="0" y="0" width="170" height="95" rx="6" fill="#F0F7FF" stroke="#D0E8F8" stroke-width="1"/>
      <text x="12" y="22" font-family="monospace" font-size="12" fill="#409EFF">&lt;book&gt;</text>
      <text x="24" y="42" font-family="monospace" font-size="12" fill="#1a1a2e">&lt;title&gt;...&lt;/title&gt;</text>
      <text x="24" y="62" font-family="monospace" font-size="12" fill="#1a1a2e">&lt;author&gt;...&lt;/author&gt;</text>
      <text x="12" y="82" font-family="monospace" font-size="12" fill="#409EFF">&lt;/book&gt;</text>
    </g>

    <!-- 标注5 -->
    <rect x="45" y="200" width="130" height="24" rx="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="110" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">标签嵌套</text>

    <!-- 标注6 -->
    <rect x="45" y="240" width="130" height="24" rx="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="110" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">树形结构</text>

    <!-- 小提示 -->
    <text x="110" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7A8BA0">可扩展标记语言</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="100" y1="460" x2="700" y2="460" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7A8BA0" opacity="0.6">数据格式 · 结构化表示 · 编程基础</text>
</svg>