<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="shieldGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7bd6"/>
    </linearGradient>
    <linearGradient id="shieldGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cb8ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="shieldGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7bd6"/>
    </linearGradient>
    <linearGradient id="shieldGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cb8ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="shieldGrad5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7bd6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a3a5c">通信安全防护措施</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ====== 盾牌 1：消息认证 ====== -->
  <g transform="translate(80, 75)">
    <!-- 盾牌外形 -->
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="url(#shieldGrad1)" opacity="0.9"/>
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="none" stroke="#2b7bd6" stroke-width="1.5"/>
    <!-- 盾牌内图标：API 密钥 / JWT 徽章 -->
    <rect x="35" y="25" width="50" height="35" rx="5" fill="white" opacity="0.9"/>
    <text x="60" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#409EFF" font-weight="bold">JWT</text>
    <text x="60" y="54" text-anchor="middle" font-family="monospace" font-size="7" fill="#2b7bd6">令牌</text>
    <!-- 盾牌内验证勾 -->
    <circle cx="95" cy="95" r="12" fill="white" opacity="0.8"/>
    <path d="M89,95 L93,99 L101,91" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 盾牌下文字 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">消息认证</text>
    <text x="60" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a7a9c">API密钥/JWT验证</text>
  </g>

  <!-- ====== 盾牌 2：消息加密 ====== -->
  <g transform="translate(240, 75)">
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="url(#shieldGrad2)" opacity="0.9"/>
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="none" stroke="#2b7bd6" stroke-width="1.5"/>
    <!-- 盾牌内图标：锁 -->
    <rect x="35" y="30" width="50" height="40" rx="6" fill="white" opacity="0.9"/>
    <circle cx="60" cy="42" r="8" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <rect x="48" y="48" width="24" height="18" rx="3" fill="#409EFF"/>
    <rect x="54" y="54" width="12" height="6" rx="2" fill="white"/>
    <!-- 盾牌内 TLS/SSL 文字 -->
    <text x="60" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="bold">TLS/SSL</text>
    <!-- 盾牌下文字 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">消息加密</text>
    <text x="60" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a7a9c">TLS/SSL传输加密</text>
  </g>

  <!-- ====== 盾牌 3：输入验证 ====== -->
  <g transform="translate(400, 75)">
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="url(#shieldGrad3)" opacity="0.9"/>
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="none" stroke="#2b7bd6" stroke-width="1.5"/>
    <!-- 盾牌内图标：过滤器/闸门 -->
    <rect x="30" y="25" width="60" height="45" rx="4" fill="white" opacity="0.9"/>
    <!-- 过滤器栅栏 -->
    <line x1="38" y1="30" x2="38" y2="65" stroke="#409EFF" stroke-width="2"/>
    <line x1="46" y1="30" x2="46" y2="65" stroke="#409EFF" stroke-width="2"/>
    <line x1="54" y1="30" x2="54" y2="65" stroke="#409EFF" stroke-width="2"/>
    <line x1="62" y1="30" x2="62" y2="65" stroke="#409EFF" stroke-width="2"/>
    <line x1="70" y1="30" x2="70" y2="65" stroke="#409EFF" stroke-width="2"/>
    <line x1="78" y1="30" x2="78" y2="65" stroke="#409EFF" stroke-width="2"/>
    <!-- 箭头表示输入 -->
    <path d="M40,20 L60,20 L55,16 M60,20 L55,24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 盾牌内文字 -->
    <text x="60" y="100" text-anchor="middle" font-family="monospace" font-size="7" fill="white">注入攻击</text>
    <text x="60" y="110" text-anchor="middle" font-family="monospace" font-size="7" fill="white">过滤</text>
    <!-- 盾牌下文字 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">输入验证</text>
    <text x="60" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a7a9c">消息注入攻击过滤</text>
  </g>

  <!-- ====== 盾牌 4：速率限制 ====== -->
  <g transform="translate(560, 75)">
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="url(#shieldGrad4)" opacity="0.9"/>
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="none" stroke="#2b7bd6" stroke-width="1.5"/>
    <!-- 盾牌内图标：速度表 -->
    <circle cx="60" cy="45" r="22" fill="white" opacity="0.9"/>
    <path d="M60,45 L60,28" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M60,45 L72,38" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M60,45 L48,52" stroke="#d9363e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="45" r="3" fill="#2b7bd6"/>
    <!-- 刻度 -->
    <path d="M42,35 A22,22 0 0,1 78,35" fill="none" stroke="#2b7bd6" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- 盾牌内文字 -->
    <text x="60" y="100" text-anchor="middle" font-family="monospace" font-size="7" fill="white">洪水攻击</text>
    <text x="60" y="110" text-anchor="middle" font-family="monospace" font-size="7" fill="white">限制</text>
    <!-- 盾牌下文字 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">速率限制</text>
    <text x="60" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a7a9c">防止消息洪泛</text>
  </g>

  <!-- ====== 盾牌 5：审计日志 ====== -->
  <g transform="translate(680, 75)">
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="url(#shieldGrad5)" opacity="0.9"/>
    <path d="M0,20 Q0,0 20,0 L100,0 Q120,0 120,20 L120,80 Q120,120 60,150 Q0,120 0,80 Z" fill="none" stroke="#2b7bd6" stroke-width="1.5"/>
    <!-- 盾牌内图标：日志本 -->
    <rect x="35" y="25" width="50" height="55" rx="3" fill="white" opacity="0.9"/>
    <line x1="42" y1="35" x2="78" y2="35" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="42" y1="43" x2="78" y2="43" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="42" y1="51" x2="78" y2="51" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="42" y1="59" x2="78" y2="59" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="42" y1="67" x2="70" y2="67" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 笔 -->
    <line x1="80" y1="30" x2="88" y2="22" stroke="#2b7bd6" stroke-width="2" stroke-linecap="round"/>
    <!-- 盾牌下文字 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">审计日志</text>
    <text x="60" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5a7a9c">通信记录可追溯</text>
  </g>

  <!-- ====== 底部说明区域 ====== -->
  <rect x="40" y="280" width="720" height="200" rx="12" fill="#e8f4ff" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <text x="400" y="305" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c">安全防护体系</text>

  <!-- 5 个防护说明 -->
  <g transform="translate(60, 325)">
    <circle cx="8" cy="8" r="8" fill="#409EFF"/>
    <text x="8" y="12" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">1</text>
    <text x="22" y="13" font-family="sans-serif" font-size="13" fill="#1a3a5c">消息认证：通过 API 密钥 / JWT 令牌验证发送方身份真实性</text>
  </g>

  <g transform="translate(60, 358)">
    <circle cx="8" cy="8" r="8" fill="#409EFF"/>
    <text x="8" y="12" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">2</text>
    <text x="22" y="13" font-family="sans-serif" font-size="13" fill="#1a3a5c">消息加密：使用 TLS/SSL 协议加密传输中的数据</text>
  </g>

  <g transform="translate(60, 391)">
    <circle cx="8" cy="8" r="8" fill="#409EFF"/>
    <text x="8" y="12" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">3</text>
    <text x="22" y="13" font-family="sans-serif" font-size="13" fill="#1a3a5c">输入验证：过滤检查传入消息，防止注入攻击</text>
  </g>

  <g transform="translate(60, 424)">
    <circle cx="8" cy="8" r="8" fill="#409EFF"/>
    <text x="8" y="12" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">4</text>
    <text x="22" y="13" font-family="sans-serif" font-size="13" fill="#1a3a5c">速率限制：通过速度控制防止恶意消息洪泛</text>
  </g>

  <g transform="translate(60, 457)">
    <circle cx="8" cy="8" r="8" fill="#409EFF"/>
    <text x="8" y="12" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">5</text>
    <text x="22" y="13" font-family="sans-serif" font-size="13" fill="#1a3a5c">审计日志：记录所有通信行为，实现全程可追溯</text>
  </g>

</svg>