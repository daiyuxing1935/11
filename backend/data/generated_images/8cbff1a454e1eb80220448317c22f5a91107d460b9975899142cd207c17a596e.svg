<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 装饰性背景元素 -->
  <circle cx="720" cy="60" r="80" fill="#409EFF" opacity="0.04"/>
  <circle cx="80" cy="440" r="60" fill="#409EFF" opacity="0.04"/>
  <circle cx="400" cy="250" r="200" fill="#409EFF" opacity="0.02"/>

  <!-- 标题区域 -->
  <rect x="200" y="24" width="400" height="48" rx="24" fill="#1a1a2e" opacity="0.92"/>
  <text x="400" y="55" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="3">上下文窗口 核心要点</text>

  <!-- 第一行：3张卡片 -->
  <!-- 卡片1：Token ≠ 字数 -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="230" height="110" rx="12" fill="url(#cardGrad)"/>
    <rect x="30" y="100" width="230" height="110" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 图标：计数器 -->
    <g transform="translate(55, 120)">
      <rect x="0" y="0" width="28" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
      <text x="14" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#409EFF">123</text>
      <rect x="2" y="22" width="8" height="3" rx="1" fill="#ffffff" opacity="0.6"/>
      <rect x="14" y="22" width="8" height="3" rx="1" fill="#ffffff" opacity="0.6"/>
    </g>
    <text x="92" y="133" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Token ≠ 字数</text>
    <text x="48" y="160" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">始终使用 Tokenizer</text>
    <text x="48" y="180" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">进行精确计数</text>
  </g>

  <!-- 卡片2：Key info at beginning and end -->
  <g filter="url(#shadow)">
    <rect x="285" y="100" width="230" height="110" rx="12" fill="url(#cardGrad)"/>
    <rect x="285" y="100" width="230" height="110" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 图标：两端书签 -->
    <g transform="translate(310, 120)">
      <rect x="0" y="0" width="10" height="22" rx="2" fill="#ffffff" opacity="0.95"/>
      <polygon points="0,16 5,12 10,16" fill="#409EFF"/>
      <rect x="18" y="0" width="10" height="22" rx="2" fill="#ffffff" opacity="0.95"/>
      <polygon points="18,16 23,12 28,16" fill="#409EFF"/>
      <line x1="5" y1="26" x2="23" y2="26" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="2,2"/>
    </g>
    <text x="347" y="133" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#ffffff">关键信息置两端</text>
    <text x="303" y="160" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">避免"Lost in the</text>
    <text x="303" y="180" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">Middle"问题</text>
  </g>

  <!-- 卡片3：RAG and long context -->
  <g filter="url(#shadow)">
    <rect x="540" y="100" width="230" height="110" rx="12" fill="url(#cardGrad)"/>
    <rect x="540" y="100" width="230" height="110" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 图标：分叉路径 -->
    <g transform="translate(565, 120)">
      <circle cx="12" cy="4" r="4" fill="#ffffff" opacity="0.95"/>
      <line x1="12" y1="8" x2="4" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="8" x2="20" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="4" cy="26" r="3" fill="#ffffff" opacity="0.7"/>
      <circle cx="20" cy="26" r="3" fill="#ffffff" opacity="0.7"/>
    </g>
    <text x="602" y="133" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#ffffff">RAG vs 长上下文</text>
    <text x="558" y="160" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">按任务类型选择</text>
    <text x="558" y="180" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">各有所长</text>
  </g>

  <!-- 第二行：3张卡片 -->
  <!-- 卡片4：Context compression -->
  <g filter="url(#shadow)">
    <rect x="30" y="240" width="230" height="110" rx="12" fill="url(#cardGrad)"/>
    <rect x="30" y="240" width="230" height="110" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 图标：压缩/展开 -->
    <g transform="translate(55, 260)">
      <rect x="0" y="0" width="24" height="8" rx="2" fill="#ffffff" opacity="0.95"/>
      <rect x="0" y="12" width="24" height="8" rx="2" fill="#ffffff" opacity="0.95"/>
      <line x1="12" y1="8" x2="12" y2="12" stroke="#ffffff" stroke-width="2"/>
      <polygon points="8,24 12,20 16,24" fill="#ffffff" opacity="0.7"/>
      <polygon points="8,28 12,32 16,28" fill="#ffffff" opacity="0.7"/>
    </g>
    <text x="92" y="273" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#ffffff">上下文压缩</text>
    <text x="48" y="300" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">必备核心技能</text>
    <text x="48" y="320" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">压缩与扩展</text>
  </g>

  <!-- 卡片5：Needle-in-Haystack -->
  <g filter="url(#shadow)">
    <rect x="285" y="240" width="230" height="110" rx="12" fill="url(#cardGrad)"/>
    <rect x="285" y="240" width="230" height="110" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 图标：干草堆中的针 -->
    <g transform="translate(310, 258)">
      <rect x="2" y="0" width="16" height="20" rx="2" fill="#ffffff" opacity="0.3"/>
      <rect x="4" y="2" width="12" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
      <rect x="4" y="8" width="12" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
      <rect x="4" y="14" width="12" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
      <line x1="10" y1="0" x2="10" y2="24" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="10" cy="26" r="3" fill="#FFD700" opacity="0.95"/>
    </g>
    <text x="347" y="273" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#ffffff">大海捞针测试</text>
    <text x="303" y="300" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">验证真实能力</text>
    <text x="303" y="320" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">Needle-in-Haystack</text>
  </g>

  <!-- 卡片6：Good input management -->
  <g filter="url(#shadow)">
    <rect x="540" y="240" width="230" height="110" rx="12" fill="url(#cardGrad)"/>
    <rect x="540" y="240" width="230" height="110" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- 图标：质量vs数量 -->
    <g transform="translate(565, 258)">
      <circle cx="8" cy="8" r="8" fill="#ffffff" opacity="0.3"/>
      <circle cx="8" cy="8" r="5" fill="#ffffff" opacity="0.7"/>
      <circle cx="20" cy="20" r="8" fill="#ffffff" opacity="0.95"/>
      <text x="20" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#409EFF">Q</text>
      <line x1="14" y1="6" x2="24" y2="16" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
    <text x="602" y="273" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#ffffff">优质输入管理</text>
    <text x="558" y="300" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">优于盲目追求</text>
    <text x="558" y="320" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.9">更大窗口</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="100" y1="380" x2="700" y2="380" stroke="#409EFF" stroke-opacity="0.15" stroke-width="1"/>

  <!-- 底部提示文字 -->
  <text x="400" y="410" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#1a1a2e" fill-opacity="0.4" letter-spacing="1">高效利用上下文窗口 · 提升模型输出质量</text>

  <!-- 装饰性小点 -->
  <circle cx="400" cy="435" r="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="380" cy="435" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="420" cy="435" r="2" fill="#409EFF" opacity="0.15"/>

  <!-- 页码装饰 -->
  <rect x="370" y="460" width="60" height="6" rx="3" fill="#409EFF" opacity="0.15"/>
  <rect x="385" y="460" width="30" height="6" rx="3" fill="#409EFF" opacity="0.4"/>
</svg>