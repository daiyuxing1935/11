<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="brokerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE8"/>
    </linearGradient>
    <linearGradient id="pubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8FF9"/>
      <stop offset="100%" stop-color="#3B6FE0"/>
    </linearGradient>
    <linearGradient id="subGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE8"/>
    </linearGradient>
    <linearGradient id="subGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8FF9"/>
      <stop offset="100%" stop-color="#3B6FE0"/>
    </linearGradient>
    <linearGradient id="subGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA0FF"/>
      <stop offset="100%" stop-color="#4A80E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Pub/Sub 消息代理通信流程</text>

  <!-- 发布者区域 -->
  <rect x="30" y="75" width="160" height="340" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadowLight)" opacity="0.9"/>
  <text x="110" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">发布者</text>
  <text x="110" y="125" text-anchor="middle" font-size="12" fill="#666">Publisher Agent</text>

  <!-- 发布者图标 -->
  <rect x="70" y="145" width="80" height="80" rx="40" fill="url(#pubGrad)" opacity="0.15"/>
  <text x="110" y="190" text-anchor="middle" font-size="28">📤</text>

  <!-- 发布者消息 -->
  <rect x="50" y="250" width="120" height="36" rx="18" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="110" y="273" text-anchor="middle" font-size="13" fill="#409EFF">发送消息</text>

  <rect x="50" y="300" width="120" height="36" rx="18" fill="#F0F8FF" stroke="#5B8FF9" stroke-width="1"/>
  <text x="110" y="323" text-anchor="middle" font-size="12" fill="#5B8FF9">task.completed</text>

  <rect x="50" y="350" width="120" height="36" rx="18" fill="#F0F8FF" stroke="#5B8FF9" stroke-width="1"/>
  <text x="110" y="373" text-anchor="middle" font-size="12" fill="#5B8FF9">system.alert</text>

  <!-- 箭头 发布者 → 代理 -->
  <line x1="190" y1="245" x2="255" y2="245" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67C23A"/>
    </marker>
  </defs>

  <!-- 消息代理中心 -->
  <rect x="270" y="75" width="200" height="340" rx="12" fill="white" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <rect x="270" y="75" width="200" height="42" rx="12" fill="url(#brokerGrad)"/>
  <rect x="270" y="105" width="200" height="12" fill="url(#brokerGrad)"/>
  <text x="370" y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="white">消息代理</text>
  <text x="370" y="122" text-anchor="middle" font-size="12" fill="white" opacity="0.85">Message Broker</text>

  <!-- 主题标签 -->
  <rect x="290" y="140" width="160" height="32" rx="16" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="370" y="161" text-anchor="middle" font-size="13" fill="#409EFF">📋 主题管理</text>

  <rect x="295" y="185" width="70" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
  <text x="330" y="204" text-anchor="middle" font-size="12" fill="#409EFF">task.*</text>

  <rect x="375" y="185" width="80" height="28" rx="14" fill="#5B8FF9" opacity="0.12"/>
  <text x="415" y="204" text-anchor="middle" font-size="12" fill="#5B8FF9">system.*</text>

  <rect x="295" y="225" width="70" height="28" rx="14" fill="#67C23A" opacity="0.12"/>
  <text x="330" y="244" text-anchor="middle" font-size="12" fill="#67C23A">user.*</text>

  <rect x="375" y="225" width="80" height="28" rx="14" fill="#E6A23C" opacity="0.12"/>
  <text x="415" y="244" text-anchor="middle" font-size="12" fill="#E6A23C">error.*</text>

  <!-- 代理内部处理 -->
  <rect x="290" y="270" width="160" height="55" rx="8" fill="#F5F9FF" stroke="#409EFF" stroke-width="0.8"/>
  <text x="370" y="292" text-anchor="middle" font-size="12" fill="#1a1a2e">消息路由</text>
  <text x="370" y="310" text-anchor="middle" font-size="11" fill="#666">匹配 → 转发</text>

  <!-- 代理状态 -->
  <rect x="310" y="340" width="120" height="28" rx="14" fill="#67C23A" opacity="0.15"/>
  <text x="370" y="359" text-anchor="middle" font-size="12" fill="#67C23A">● 运行中</text>

  <!-- 箭头 代理 → 订阅者 -->
  <line x1="470" y1="140" x2="540" y2="140" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="470" y1="245" x2="540" y2="245" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="470" y1="350" x2="540" y2="350" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- 订阅者区域 -->
  <rect x="555" y="60" width="210" height="370" rx="12" fill="white" stroke="#67C23A" stroke-width="1.5" filter="url(#shadowLight)" opacity="0.9"/>
  <text x="660" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">订阅者</text>
  <text x="660" y="108" text-anchor="middle" font-size="12" fill="#666">Subscriber Agents</text>

  <!-- 订阅者 1 -->
  <rect x="575" y="125" width="170" height="70" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1"/>
  <rect x="575" y="125" width="170" height="24" rx="10" fill="#409EFF" opacity="0.1"/>
  <text x="660" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#409EFF">订阅者 A</text>
  <text x="660" y="165" text-anchor="middle" font-size="11" fill="#666">接收: task.completed</text>
  <rect x="610" y="178" width="100" height="14" rx="7" fill="#409EFF" opacity="0.08"/>
  <text x="660" y="189" text-anchor="middle" font-size="10" fill="#409EFF">订阅: task.*</text>

  <!-- 订阅者 2 -->
  <rect x="575" y="215" width="170" height="70" rx="10" fill="#F0F8FF" stroke="#5B8FF9" stroke-width="1"/>
  <rect x="575" y="215" width="170" height="24" rx="10" fill="#5B8FF9" opacity="0.1"/>
  <text x="660" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B8FF9">订阅者 B</text>
  <text x="660" y="255" text-anchor="middle" font-size="11" fill="#666">接收: system.alert</text>
  <rect x="610" y="268" width="100" height="14" rx="7" fill="#5B8FF9" opacity="0.08"/>
  <text x="660" y="279" text-anchor="middle" font-size="10" fill="#5B8FF9">订阅: system.*</text>

  <!-- 订阅者 3 -->
  <rect x="575" y="305" width="170" height="70" rx="10" fill="#F0F8FF" stroke="#67C23A" stroke-width="1"/>
  <rect x="575" y="305" width="170" height="24" rx="10" fill="#67C23A" opacity="0.1"/>
  <text x="660" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#67C23A">订阅者 C</text>
  <text x="660" y="345" text-anchor="middle" font-size="11" fill="#666">接收: error.alert</text>
  <rect x="610" y="358" width="100" height="14" rx="7" fill="#67C23A" opacity="0.08"/>
  <text x="660" y="369" text-anchor="middle" font-size="10" fill="#67C23A">订阅: error.*</text>

  <!-- 底部标注 -->
  <rect x="30" y="440" width="740" height="45" rx="8" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.85"/>
  <text x="400" y="460" text-anchor="middle" font-size="13" fill="#1a1a2e">
    <tspan font-weight="bold" fill="#409EFF">发布者 → 代理 → 订阅者</tspan>
    <tspan fill="#666"> | 发布者不知道订阅者的存在</tspan>
  </text>
  <text x="400" y="478" text-anchor="middle" font-size="11" fill="#999">发布者与订阅者通过消息代理解耦，实现异步通信</text>

  <!-- 代码浮层 -->
  <rect x="490" y="400" width="280" height="90" rx="8" fill="#1a1a2e" opacity="0.92" filter="url(#shadow)"/>
  <text x="505" y="420" font-size="11" fill="#67C23A" font-family="'Courier New', monospace">// 发布</text>
  <text x="505" y="438" font-size="11" fill="#E6A23C" font-family="'Courier New', monospace">broker.publish("task.completed", data)</text>
  <text x="505" y="458" font-size="11" fill="#67C23A" font-family="'Courier New', monospace">// 订阅</text>
  <text x="505" y="476" font-size="11" fill="#409EFF" font-family="'Courier New', monospace">broker.subscribe("task.*", callback)</text>

  <!-- 标注 1 -->
  <rect x="195" y="130" width="65" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="227" y="147" text-anchor="middle" font-size="11" fill="#409EFF">发布消息</text>

  <!-- 标注 2 -->
  <rect x="480" y="115" width="55" height="24" rx="12" fill="#67C23A" opacity="0.15"/>
  <text x="507" y="132" text-anchor="middle" font-size="11" fill="#67C23A">匹配转发</text>

  <!-- 标注 3 -->
  <rect x="480" y="220" width="55" height="24" rx="12" fill="#67C23A" opacity="0.15"/>
  <text x="507" y="237" text-anchor="middle" font-size="11" fill="#67C23A">匹配转发</text>

  <!-- 标注 4 -->
  <rect x="480" y="325" width="55" height="24" rx="12" fill="#67C23A" opacity="0.15"/>
  <text x="507" y="342" text-anchor="middle" font-size="11" fill="#67C23A">匹配转发</text>

  <!-- 标注 5 -->
  <rect x="290" y="395" width="55" height="24" rx="12" fill="#E6A23C" opacity="0.15"/>
  <text x="317" y="412" text-anchor="middle" font-size="11" fill="#E6A23C">解耦通信</text>

</svg>