<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="blueGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#7BA7F5"/>
    </linearGradient>
    <linearGradient id="blueGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2D2D5E"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="52" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="22" font-weight="700" fill="#1a1a2e" letter-spacing="3">智能体的基础循环</text>

  <!-- 副标题 -->
  <text x="400" y="78" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="14" fill="#5A6A7E" letter-spacing="1">Agent's Fundamental Rhythm</text>

  <!-- 连接箭头：Observe → Think（弧形） -->
  <path d="M 295 210 Q 350 170 410 195" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 连接箭头：Think → Act（弧形） -->
  <path d="M 470 280 Q 430 350 370 350" fill="none" stroke="#5B8DEF" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowMid)"/>
  <defs>
    <marker id="arrowMid" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#5B8DEF"/>
    </marker>
  </defs>

  <!-- 连接箭头：Act → Observe（弧形） -->
  <path d="M 310 350 Q 250 350 230 280" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowDark)"/>
  <defs>
    <marker id="arrowDark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 节点1：Observe（顶部） -->
  <g filter="url(#shadow)">
    <rect x="230" y="130" width="140" height="80" rx="40" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="270" cy="170" r="18" fill="url(#blueGrad1)" opacity="0.9"/>
    <!-- 眼睛图标 -->
    <g transform="translate(260, 160)">
      <ellipse cx="10" cy="10" rx="8" ry="6" fill="none" stroke="white" stroke-width="1.8"/>
      <circle cx="10" cy="10" r="3" fill="white"/>
    </g>
    <text x="325" y="175" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">观察</text>
  </g>

  <!-- 节点2：Think（右下） -->
  <g filter="url(#shadow)">
    <rect x="430" y="240" width="140" height="80" rx="40" fill="white" stroke="#5B8DEF" stroke-width="2.5"/>
    <circle cx="470" cy="280" r="18" fill="url(#blueGrad2)" opacity="0.9"/>
    <!-- 大脑/齿轮图标 -->
    <g transform="translate(460, 270)">
      <circle cx="10" cy="10" r="7" fill="none" stroke="white" stroke-width="1.8"/>
      <circle cx="10" cy="10" r="2.5" fill="white"/>
      <line x1="10" y1="1" x2="10" y2="4" stroke="white" stroke-width="1.5"/>
      <line x1="10" y1="16" x2="10" y2="19" stroke="white" stroke-width="1.5"/>
      <line x1="1" y1="10" x2="4" y2="10" stroke="white" stroke-width="1.5"/>
      <line x1="16" y1="10" x2="19" y2="10" stroke="white" stroke-width="1.5"/>
    </g>
    <text x="525" y="285" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">思考</text>
  </g>

  <!-- 节点3：Act（左下） -->
  <g filter="url(#shadow)">
    <rect x="230" y="240" width="140" height="80" rx="40" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
    <circle cx="270" cy="280" r="18" fill="url(#blueGrad3)" opacity="0.9"/>
    <!-- 手部/行动图标 -->
    <g transform="translate(260, 270)">
      <path d="M 5 18 L 5 8 C 5 5 7 4 8 6 L 10 10 L 10 4 C 10 2 12 2 12 4 L 12 10 L 14 6 C 14 4 16 4 16 6 L 14 14 C 14 18 11 20 8 20 L 5 20 Z" fill="none" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
    </g>
    <text x="325" y="285" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">行动</text>
  </g>

  <!-- 中心心跳波形 -->
  <g transform="translate(400, 280)" filter="url(#shadowLight)">
    <!-- 外圈脉冲 -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3">
      <animate attributeName="r" values="32;42;32" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="22;30;22" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.08;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- 心形轮廓 -->
    <path d="M 0 -12 C -6 -20 -18 -18 -18 -8 C -18 0 0 14 0 14 C 0 14 18 0 18 -8 C 18 -18 6 -20 0 -12 Z" fill="none" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.5;0.85" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- 内部小爱心 -->
    <path d="M 0 -6 C -3 -10 -9 -9 -9 -4 C -9 0 0 7 0 7 C 0 7 9 0 9 -4 C 9 -9 3 -10 0 -6 Z" fill="#409EFF" opacity="0.25">
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 底部文字 -->
  <text x="400" y="448" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="16" font-weight="600" fill="#1a1a2e" letter-spacing="2">智能体的基本节奏</text>

  <!-- 标注1：观察 -->
  <text x="205" y="125" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#409EFF" font-weight="500">感知输入</text>

  <!-- 标注2：思考 -->
  <text x="580" y="235" text-anchor="start" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#5B8DEF" font-weight="500">分析推理</text>

  <!-- 标注3：行动 -->
  <text x="205" y="325" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#1a1a2e" font-weight="500">执行反馈</text>

  <!-- 标注4：循环 -->
  <text x="400" y="395" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#5A6A7E" font-weight="400">持续循环</text>

  <!-- 装饰性小点 -->
  <circle cx="160" cy="170" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="640" cy="280" r="3" fill="#5B8DEF" opacity="0.3"/>
  <circle cx="160" cy="280" r="3" fill="#1a1a2e" opacity="0.3"/>
  <circle cx="400" cy="110" r="3" fill="#409EFF" opacity="0.2"/>
  <circle cx="400" cy="420" r="3" fill="#409EFF" opacity="0.2"/>
</svg>