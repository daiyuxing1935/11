<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <linearGradient id="blockGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3588D9"/>
    </linearGradient>
    <linearGradient id="blockGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AA8FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="blockGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <linearGradient id="blockGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AA8FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="blockGrad5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3588D9"/>
    </linearGradient>
    <linearGradient id="blockGrad6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AA8FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">AI Agent 智能体公式</text>
  
  <!-- 等号 = -->
  <text x="340" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1a1a2e">=</text>

  <!-- 左侧：机器人图标 -->
  <g transform="translate(100, 80)">
    <!-- 机器人头 -->
    <rect x="35" y="0" width="80" height="65" rx="12" fill="url(#robotGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- 天线 -->
    <line x1="75" y1="0" x2="75" y2="-18" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="75" cy="-22" r="5" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="55" cy="28" r="8" fill="white"/>
    <circle cx="55" cy="28" r="4" fill="#1a1a2e"/>
    <circle cx="95" cy="28" r="8" fill="white"/>
    <circle cx="95" cy="28" r="4" fill="#1a1a2e"/>
    <!-- 嘴巴 -->
    <rect x="55" y="45" width="40" height="6" rx="3" fill="white"/>
    
    <!-- 身体 -->
    <rect x="25" y="75" width="100" height="90" rx="10" fill="url(#robotGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    
    <!-- 身体细节 - 按钮 -->
    <circle cx="75" cy="110" r="12" fill="white" opacity="0.3"/>
    <circle cx="75" cy="110" r="6" fill="white"/>
    
    <!-- 手臂 - 左 -->
    <rect x="-5" y="85" width="22" height="50" rx="8" fill="url(#robotGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- 手臂 - 右 -->
    <rect x="133" y="85" width="22" height="50" rx="8" fill="url(#robotGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    
    <!-- 腿 - 左 -->
    <rect x="40" y="173" width="28" height="40" rx="6" fill="url(#robotGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- 腿 - 右 -->
    <rect x="82" y="173" width="28" height="40" rx="6" fill="url(#robotGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    
    <!-- 机器人标签 -->
    <text x="75" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">AI Agent</text>
  </g>

  <!-- 右侧：六个组件块 -->
  <g transform="translate(420, 55)">
    
    <!-- 1. LLM 大脑 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="280" height="55" rx="10" fill="url(#blockGrad1)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- 大脑图标 -->
      <g transform="translate(20, 12)">
        <ellipse cx="15" cy="15" rx="12" ry="10" fill="white" opacity="0.9"/>
        <path d="M8,10 Q15,5 22,10 Q25,15 22,20 Q15,25 8,20 Q5,15 8,10Z" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <path d="M10,12 Q15,8 20,12" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
        <path d="M10,18 Q15,22 20,18" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
      </g>
      <text x="55" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">LLM 大语言模型</text>
    </g>

    <!-- 2. Tools 工具 -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="280" height="55" rx="10" fill="url(#blockGrad2)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- 工具箱图标 -->
      <g transform="translate(18, 12)">
        <rect x="2" y="8" width="26" height="18" rx="3" fill="white" opacity="0.9"/>
        <rect x="8" y="4" width="14" height="6" rx="2" fill="none" stroke="white" stroke-width="1.8"/>
        <line x1="15" y1="4" x2="15" y2="2" stroke="white" stroke-width="1.5"/>
      </g>
      <text x="55" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">Tools 工具调用</text>
    </g>

    <!-- 3. Memory 记忆 -->
    <g transform="translate(0, 140)">
      <rect x="0" y="0" width="280" height="55" rx="10" fill="url(#blockGrad3)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- 记忆芯片图标 -->
      <g transform="translate(18, 12)">
        <rect x="2" y="4" width="28" height="22" rx="3" fill="white" opacity="0.9"/>
        <rect x="6" y="8" width="8" height="6" rx="1" fill="#409EFF"/>
        <rect x="18" y="8" width="8" height="6" rx="1" fill="#409EFF"/>
        <rect x="6" y="17" width="8" height="6" rx="1" fill="#409EFF"/>
        <rect x="18" y="17" width="8" height="6" rx="1" fill="#409EFF"/>
      </g>
      <text x="55" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">Memory 记忆系统</text>
    </g>

    <!-- 4. Planning 规划 -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="280" height="55" rx="10" fill="url(#blockGrad4)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- 路线图树图标 -->
      <g transform="translate(18, 8)">
        <line x1="15" y1="2" x2="15" y2="35" stroke="white" stroke-width="2"/>
        <line x1="15" y1="12" x2="5" y2="20" stroke="white" stroke-width="1.8"/>
        <line x1="15" y1="20" x2="25" y2="28" stroke="white" stroke-width="1.8"/>
        <circle cx="15" cy="2" r="4" fill="white"/>
        <circle cx="5" cy="20" r="3" fill="white"/>
        <circle cx="25" cy="28" r="3" fill="white"/>
        <circle cx="15" cy="35" r="3" fill="white"/>
      </g>
      <text x="55" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">Planning 任务规划</text>
    </g>

    <!-- 5. Execution Loop 执行循环 -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="280" height="55" rx="10" fill="url(#blockGrad5)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- 循环箭头图标 -->
      <g transform="translate(18, 10)">
        <path d="M22,5 A12,12 0 1,1 8,17" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="8,17 5,10 11,13" fill="white"/>
        <path d="M8,25 A12,12 0 1,1 22,13" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="22,13 19,20 25,17" fill="white"/>
      </g>
      <text x="55" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">Execution 执行循环</text>
    </g>

    <!-- 6. Error Recovery 错误恢复 -->
    <g transform="translate(0, 350)">
      <rect x="0" y="0" width="280" height="55" rx="10" fill="url(#blockGrad6)" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- 盾牌+反弹图标 -->
      <g transform="translate(18, 10)">
        <path d="M15,2 L28,8 L28,18 Q28,28 15,35 Q2,28 2,18 L2,8Z" fill="white" opacity="0.9"/>
        <path d="M15,8 L15,28" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10,18 Q15,12 20,18" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      </g>
      <text x="55" y="33" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">Error 错误恢复</text>
    </g>

  </g>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666" font-style="italic">AI Agent = LLM + Tools + Memory + Planning + Execution + Error Recovery</text>

</svg>