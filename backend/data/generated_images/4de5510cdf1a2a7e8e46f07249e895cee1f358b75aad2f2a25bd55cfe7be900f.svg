<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a8a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">并行处理子模式示意图</text>

  <!-- ====== 上半部分：分块并行 ====== -->
  <rect x="20" y="45" width="760" height="210" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="35" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">分块并行</text>

  <!-- 输入文档 -->
  <rect x="60" y="85" width="130" height="50" rx="6" fill="url(#boxGrad2)"/>
  <text x="125" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">长文档</text>

  <!-- 分块1 -->
  <rect x="60" y="165" width="80" height="36" rx="4" fill="#e8f4fd" stroke="#409EFF" stroke-width="1.2"/>
  <text x="100" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">Ch1-Ch3</text>

  <!-- 分块2 -->
  <rect x="155" y="165" width="80" height="36" rx="4" fill="#e8f4fd" stroke="#409EFF" stroke-width="1.2"/>
  <text x="195" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">Ch4-Ch6</text>

  <!-- 分块3 -->
  <rect x="250" y="165" width="80" height="36" rx="4" fill="#e8f4fd" stroke="#409EFF" stroke-width="1.2"/>
  <text x="290" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">Ch7-Ch9</text>

  <!-- 从文档到分块的箭头 -->
  <line x1="125" y1="135" x2="100" y2="163" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="125" y1="135" x2="195" y2="163" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="125" y1="135" x2="290" y2="163" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 并行LLM分析块 -->
  <rect x="370" y="85" width="110" height="36" rx="4" fill="url(#boxGrad1)"/>
  <text x="425" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">LLM分析A</text>

  <rect x="370" y="130" width="110" height="36" rx="4" fill="url(#boxGrad1)"/>
  <text x="425" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">LLM分析B</text>

  <rect x="370" y="175" width="110" height="36" rx="4" fill="url(#boxGrad1)"/>
  <text x="425" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">LLM分析C</text>

  <!-- 从分块到LLM的箭头 -->
  <line x1="140" y1="183" x2="368" y2="103" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="235" y1="183" x2="368" y2="148" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="330" y1="183" x2="368" y2="193" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 合并结果 -->
  <rect x="530" y="120" width="130" height="50" rx="6" fill="url(#boxGrad2)"/>
  <text x="595" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">综合报告</text>

  <!-- 从LLM到合并的箭头 -->
  <line x1="480" y1="103" x2="528" y2="135" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="480" y1="148" x2="528" y2="145" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="480" y1="193" x2="528" y2="155" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 并行标注 -->
  <text x="425" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-style="italic">并行执行</text>

  <!-- ====== 下半部分：多模型投票 ====== -->
  <rect x="20" y="265" width="760" height="220" rx="6" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="35" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">多模型投票</text>

  <!-- 输入代码 -->
  <rect x="60" y="310" width="130" height="50" rx="6" fill="url(#boxGrad2)"/>
  <text x="125" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">代码输入</text>

  <!-- 四个审查节点 -->
  <rect x="280" y="300" width="120" height="38" rx="4" fill="url(#boxGrad1)"/>
  <text x="340" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">安全审查员</text>

  <rect x="280" y="348" width="120" height="38" rx="4" fill="url(#boxGrad1)"/>
  <text x="340" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">性能审查员</text>

  <rect x="280" y="396" width="120" height="38" rx="4" fill="url(#boxGrad1)"/>
  <text x="340" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">代码规范审查员</text>

  <rect x="280" y="444" width="120" height="38" rx="4" fill="url(#boxGrad1)"/>
  <text x="340" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">逻辑审查员</text>

  <!-- 从代码到审查节点的箭头 -->
  <line x1="190" y1="325" x2="278" y2="319" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="190" y1="335" x2="278" y2="367" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="190" y1="345" x2="278" y2="415" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="190" y1="355" x2="278" y2="463" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- CTO聚合器 -->
  <rect x="530" y="365" width="140" height="50" rx="6" fill="#1a1a2e"/>
  <text x="600" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">CTO聚合器</text>

  <!-- 从审查节点到CTO的箭头 -->
  <line x1="400" y1="319" x2="528" y2="380" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="367" x2="528" y2="385" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="415" x2="528" y2="390" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="463" x2="528" y2="395" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 最终报告 -->
  <rect x="720" y="375" width="50" height="36" rx="4" fill="#e8f4fd" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="745" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">报告</text>

  <line x1="670" y1="390" x2="718" y2="393" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- 并行标注 -->
  <text x="340" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-style="italic">并行审查</text>

  <!-- 图例 -->
  <rect x="620" y="55" width="12" height="12" rx="2" fill="url(#boxGrad1)"/>
  <text x="636" y="66" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">处理节点</text>
  <line x1="620" y1="80" x2="640" y2="80" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="636" y="84" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">数据流</text>
</svg>