<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">Transformer 前向传播流程</text>

  <!-- 输入文本 -->
  <rect x="325" y="52" width="150" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="400" y="76" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ffffff" font-weight="bold">输入文本</text>

  <!-- 箭头 1 -->
  <line x1="400" y1="90" x2="400" y2="118" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="400,121 394,112 406,112" fill="#1a1a2e"/>

  <!-- Token 嵌入 -->
  <rect x="310" y="124" width="180" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="400" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Token 嵌入</text>

  <!-- 箭头 2 -->
  <line x1="400" y1="162" x2="400" y2="190" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="400,193 394,184 406,184" fill="#1a1a2e"/>

  <!-- 位置编码 -->
  <rect x="310" y="196" width="180" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="400" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">+ 位置编码</text>

  <!-- 箭头 3 -->
  <line x1="400" y1="234" x2="400" y2="262" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="400,265 394,256 406,256" fill="#1a1a2e"/>

  <!-- 编码器层 1-N -->
  <rect x="295" y="268" width="210" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="400" y="292" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">编码器层 1 → N</text>

  <!-- 箭头 4 -->
  <line x1="400" y1="306" x2="400" y2="334" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="400,337 394,328 406,328" fill="#1a1a2e"/>

  <!-- 编码表示 -->
  <rect x="310" y="340" width="180" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="400" y="364" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">编码表示</text>

  <!-- 分叉箭头 -->
  <line x1="400" y1="378" x2="400" y2="400" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="400" y1="400" x2="240" y2="400" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="400" y1="400" x2="560" y2="400" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="240" y1="400" x2="240" y2="418" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="560" y1="400" x2="560" y2="418" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="240,421 234,412 246,412" fill="#1a1a2e"/>
  <polygon points="560,421 554,412 566,412" fill="#1a1a2e"/>

  <!-- 训练路径 -->
  <rect x="130" y="424" width="220" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="240" y="448" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">训练：教师强制并行</text>

  <!-- 推理路径 -->
  <rect x="450" y="424" width="220" height="38" rx="10" fill="url(#blockGrad)" filter="url(#shadow)"/>
  <text x="560" y="448" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">推理：自回归逐词生成</text>

  <!-- 标注 -->
  <text x="400" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">嵌入层</text>
  <text x="400" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">特征融合</text>
  <text x="400" y="328" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">多层堆叠</text>
  <text x="400" y="398" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">特征提取</text>
  <text x="180" y="418" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">训练模式</text>
  <text x="620" y="418" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">推理模式</text>

  <!-- 输出文本 -->
  <rect x="325" y="460" width="150" height="30" rx="10" fill="#1a1a2e" opacity="0.85"/>
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" font-weight="bold">输出文本</text>

  <!-- 从训练/推理到输出的箭头 -->
  <line x1="240" y1="462" x2="325" y2="475" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="462" x2="475" y2="475" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 装饰性网格点 -->
  <circle cx="50" cy="50" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="750" cy="50" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="50" cy="450" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="750" cy="450" r="2" fill="#409EFF" opacity="0.15"/>
</svg>