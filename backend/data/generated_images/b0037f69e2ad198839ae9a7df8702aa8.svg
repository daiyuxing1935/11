<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6ab4ff"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6ab4ff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bar8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6ab4ff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">不同规模模型在多步推理中的准确率对比</text>

  <!-- 图例 -->
  <rect x="520" y="52" width="14" height="14" fill="url(#bar2)" rx="2"/>
  <text x="540" y="64" font-family="sans-serif" font-size="14" fill="#1a1a2e">2步推理</text>
  <rect x="620" y="52" width="14" height="14" fill="url(#bar4)" rx="2"/>
  <text x="640" y="64" font-family="sans-serif" font-size="14" fill="#1a1a2e">4步推理</text>
  <rect x="720" y="52" width="14" height="14" fill="url(#bar8)" rx="2"/>
  <text x="740" y="64" font-family="sans-serif" font-size="14" fill="#1a1a2e">8步推理</text>

  <!-- Y轴 -->
  <line x1="80" y1="90" x2="80" y2="400" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="72" y="100" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">100%</text>
  <text x="72" y="175" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">75%</text>
  <text x="72" y="250" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">50%</text>
  <text x="72" y="325" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">25%</text>
  <text x="72" y="400" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">0%</text>

  <!-- 网格线 -->
  <line x1="80" y1="100" x2="760" y2="100" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="175" x2="760" y2="175" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="250" x2="760" y2="250" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="325" x2="760" y2="325" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="400" x2="760" y2="400" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- X轴 -->
  <line x1="80" y1="400" x2="760" y2="400" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 柱状图数据 -->
  <!-- 每组宽度约100，间距约36 -->
  <!-- 组1: 1B-3B (x=130) -->
  <!-- 2步: 85% -> y=145, h=255 -->
  <rect x="108" y="145" width="26" height="255" fill="url(#bar2)" rx="3"/>
  <!-- 4步: 60% -> y=220, h=180 -->
  <rect x="140" y="220" width="26" height="180" fill="url(#bar4)" rx="3"/>
  <!-- 8步: 25% -> y=325, h=75 -->
  <rect x="172" y="325" width="26" height="75" fill="url(#bar8)" rx="3"/>
  <text x="135" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">1B-3B</text>

  <!-- 组2: 7B-8B (x=270) -->
  <!-- 2步: 88% -> y=136, h=264 -->
  <rect x="248" y="136" width="26" height="264" fill="url(#bar2)" rx="3"/>
  <!-- 4步: 65% -> y=205, h=195 -->
  <rect x="280" y="205" width="26" height="195" fill="url(#bar4)" rx="3"/>
  <!-- 8步: 30% -> y=310, h=90 -->
  <rect x="312" y="310" width="26" height="90" fill="url(#bar8)" rx="3"/>
  <text x="275" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">7B-8B</text>

  <!-- 组3: 13B-20B (x=410) -->
  <!-- 2步: 92% -> y=124, h=276 -->
  <rect x="388" y="124" width="26" height="276" fill="url(#bar2)" rx="3"/>
  <!-- 4步: 72% -> y=190, h=210 -->
  <rect x="420" y="190" width="26" height="210" fill="url(#bar4)" rx="3"/>
  <!-- 8步: 40% -> y=280, h=120 -->
  <rect x="452" y="280" width="26" height="120" fill="url(#bar8)" rx="3"/>
  <text x="415" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">13B-20B</text>

  <!-- 组4: 70B-72B (x=550) -->
  <!-- 2步: 95% -> y=115, h=285 -->
  <rect x="528" y="115" width="26" height="285" fill="url(#bar2)" rx="3"/>
  <!-- 4步: 85% -> y=145, h=255 -->
  <rect x="560" y="145" width="26" height="255" fill="url(#bar4)" rx="3"/>
  <!-- 8步: 78% -> y=166, h=234 -->
  <rect x="592" y="166" width="26" height="234" fill="url(#bar8)" rx="3"/>
  <text x="555" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">70B-72B</text>

  <!-- 组5: 405B+ (x=690) -->
  <!-- 2步: 97% -> y=109, h=291 -->
  <rect x="668" y="109" width="26" height="291" fill="url(#bar2)" rx="3"/>
  <!-- 4步: 92% -> y=124, h=276 -->
  <rect x="700" y="124" width="26" height="276" fill="url(#bar4)" rx="3"/>
  <!-- 8步: 90% -> y=130, h=270 -->
  <rect x="732" y="130" width="26" height="270" fill="url(#bar8)" rx="3"/>
  <text x="695" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">405B+</text>

  <!-- 标注1: 小模型8步推理低 -->
  <text x="186" y="315" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">准确率低</text>
  <line x1="186" y1="320" x2="186" y2="340" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 标注2: 大模型8步推理高 -->
  <text x="605" y="155" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">显著提升</text>
  <line x1="605" y1="160" x2="605" y2="175" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 标注3: 大模型8步接近2步 -->
  <text x="700" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">接近2步水平</text>
  <line x1="700" y1="123" x2="700" y2="138" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 大脑图标 + 链牌（70B组） -->
  <g transform="translate(555, 440)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="#409EFF">🧠</text>
    <circle cx="14" cy="-8" r="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="10" y1="-8" x2="6" y2="-2" stroke="#409EFF" stroke-width="1.2"/>
  </g>

  <!-- 大脑图标 + 链牌（405B组） -->
  <g transform="translate(695, 440)">
    <circle cx="0" cy="0" r="12" fill="#409EFF" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="#409EFF">🧠</text>
    <circle cx="14" cy="-8" r="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="10" y1="-8" x2="6" y2="-2" stroke="#409EFF" stroke-width="1.2"/>
  </g>

  <!-- 标注4: 自纠错能力 -->
  <text x="625" y="468" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF" font-weight="bold">自纠错能力</text>

  <!-- 标注5: 深度推理 -->
  <text x="135" y="460" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">浅层推理</text>

  <!-- 标注6: 深度推理 -->
  <text x="695" y="460" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">深度推理</text>

  <!-- 趋势箭头 -->
  <path d="M 200 380 Q 400 370 600 360" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a1a2e"/>
    </marker>
  </defs>
  <text x="400" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">模型规模增大 →</text>

</svg>