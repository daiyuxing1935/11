<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  <rect width="800" height="500" fill="none" stroke="#D0E8F8" stroke-width="1" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">四层架构演化路径</text>

  <!-- 左侧：单体图标 -->
  <rect x="60" y="130" width="100" height="100" rx="14" fill="#409EFF" opacity="0.85"/>
  <rect x="60" y="130" width="100" height="100" rx="14" fill="none" stroke="#409EFF" stroke-width="2"/>
  <text x="110" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">单体</text>
  <text x="110" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E0F0FF">简单起步</text>

  <!-- 左侧标注 -->
  <text x="110" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">起始简单</text>

  <!-- 从左到右箭头 -->
  <line x1="165" y1="180" x2="225" y2="180" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="225,174 238,180 225,186" fill="#1a1a2e"/>

  <!-- 中心：四层堆栈 -->
  <!-- 感知层 -->
  <rect x="250" y="100" width="220" height="44" rx="10" fill="url(#layerGrad)"/>
  <text x="360" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">感知</text>

  <!-- 推理层 -->
  <rect x="250" y="152" width="220" height="44" rx="10" fill="#409EFF" opacity="0.85"/>
  <text x="360" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">推理</text>

  <!-- 执行层 -->
  <rect x="250" y="204" width="220" height="44" rx="10" fill="#409EFF" opacity="0.7"/>
  <text x="360" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">执行</text>

  <!-- 记忆层 -->
  <rect x="250" y="256" width="220" height="44" rx="10" fill="#409EFF" opacity="0.55"/>
  <text x="360" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">记忆</text>

  <!-- 中心标注 -->
  <text x="360" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">四层架构</text>

  <!-- 从中心到右侧箭头 -->
  <line x1="475" y1="180" x2="535" y2="180" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="535,174 548,180 535,186" fill="#1a1a2e"/>

  <!-- 右侧：模块化生产图标 -->
  <rect x="560" y="100" width="48" height="48" rx="10" fill="#409EFF" opacity="0.8"/>
  <text x="584" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">M1</text>

  <rect x="618" y="100" width="48" height="48" rx="10" fill="#409EFF" opacity="0.7"/>
  <text x="642" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">M2</text>

  <rect x="560" y="158" width="48" height="48" rx="10" fill="#409EFF" opacity="0.6"/>
  <text x="584" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">M3</text>

  <rect x="618" y="158" width="48" height="48" rx="10" fill="#409EFF" opacity="0.5"/>
  <text x="642" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">M4</text>

  <!-- 右侧标注 -->
  <text x="637" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">模块化生产</text>
  <text x="637" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">独立模块</text>

  <!-- 底部：时间线箭头 -->
  <line x1="120" y1="370" x2="680" y2="370" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="680,364 695,370 680,376" fill="#1a1a2e"/>

  <!-- 时间线节点 -->
  <circle cx="200" cy="370" r="8" fill="#409EFF"/>
  <circle cx="400" cy="370" r="8" fill="#409EFF"/>
  <circle cx="600" cy="370" r="8" fill="#409EFF"/>

  <!-- 时间线标注 -->
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e" font-weight="bold">原型</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e" font-weight="bold">MVP</text>
  <text x="600" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a1a2e" font-weight="bold">生产</text>

  <!-- 底部时间线标签 -->
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">推荐演化路径</text>

  <!-- 连接线：四层到底部时间线 -->
  <line x1="360" y1="300" x2="360" y2="370" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="360" y1="370" x2="400" y2="370" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 底部装饰线 -->
  <line x1="100" y1="440" x2="700" y2="440" stroke="#D0E8F8" stroke-width="1"/>
</svg>