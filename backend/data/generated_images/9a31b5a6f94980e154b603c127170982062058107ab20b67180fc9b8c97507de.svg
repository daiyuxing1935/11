<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">自我反思与修正流程</text>

  <!-- 循环箭头 - 主流程 -->
  <!-- 从阶段1到阶段2的箭头 -->
  <path d="M 310 150 L 370 150" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- 从阶段2到阶段3的箭头 -->
  <path d="M 490 150 L 550 150" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- 从阶段3回到阶段2的循环箭头（上方） -->
  <path d="M 570 120 Q 570 80 490 80 Q 420 80 420 110" stroke="#409EFF" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowBlueLight)"/>
  <!-- 从阶段3到终点的箭头 -->
  <path d="M 570 180 Q 570 220 620 250 Q 660 270 700 270" stroke="#1a1a2e" stroke-width="2.5" fill="none" marker-end="url(#arrowDark)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowBlueLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#409EFF" opacity="0.7"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 阶段1：RAG生成 -->
  <g filter="url(#shadow)">
    <rect x="130" y="105" width="180" height="90" rx="14" fill="url(#stageGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 文档图标 -->
    <rect x="155" y="125" width="22" height="28" rx="3" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="160" y1="133" x2="172" y2="133" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="160" y1="139" x2="172" y2="139" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="160" y1="145" x2="168" y2="145" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 大脑图标 -->
    <circle cx="200" cy="139" r="14" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <path d="M 194 135 Q 192 128 198 126 Q 204 124 206 130" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <path d="M 206 130 Q 210 126 212 130 Q 214 136 208 138" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 文字输出 -->
    <text x="230" y="133" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">→ 文字</text>
    <text x="230" y="150" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">输出</text>
    <!-- 阶段标签 -->
    <text x="220" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">RAG生成</text>
  </g>

  <!-- 阶段2：自我反思 -->
  <g filter="url(#shadow)">
    <rect x="380" y="105" width="180" height="90" rx="14" fill="url(#stageGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 镜子图标 -->
    <ellipse cx="420" cy="135" rx="16" ry="20" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="420" y1="155" x2="420" y2="162" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="410" y1="162" x2="430" y2="162" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 红色批注标记 -->
    <text x="450" y="128" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">✗ 缺失</text>
    <text x="450" y="143" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">✗ 不准确</text>
    <text x="450" y="158" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">✗ 冗余</text>
    <!-- 阶段标签 -->
    <text x="470" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">自我反思</text>
  </g>

  <!-- 阶段3：修正 -->
  <g filter="url(#shadow)">
    <rect x="560" y="105" width="180" height="90" rx="14" fill="url(#stageGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 铅笔编辑图标 -->
    <line x1="590" y1="145" x2="620" y2="120" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="620" y1="120" x2="628" y2="128" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="590" y1="145" x2="582" y2="137" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 绿色勾 -->
    <text x="640" y="132" font-family="Arial, sans-serif" font-size="14" fill="#27AE60">✓ 已修正</text>
    <text x="640" y="150" font-family="Arial, sans-serif" font-size="11" fill="#27AE60" opacity="0.8">✓ 已验证</text>
    <!-- 阶段标签 -->
    <text x="650" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">修正</text>
  </g>

  <!-- 循环标注 -->
  <text x="445" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" opacity="0.8">仍有问题则循环</text>

  <!-- 最终验证输出节点 -->
  <g filter="url(#shadow)">
    <rect x="620" y="255" width="160" height="50" rx="25" fill="#1a1a2e" stroke="#409EFF" stroke-width="1.5"/>
    <text x="700" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">✓ 最终验证输出</text>
  </g>

  <!-- 标注 -->
  <!-- 标注1：RAG生成 -->
  <line x1="160" y1="200" x2="140" y2="230" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="135" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">检索增强生成</text>

  <!-- 标注2：自我反思 -->
  <line x1="420" y1="200" x2="400" y2="230" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="395" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">检查输出质量</text>

  <!-- 标注3：修正 -->
  <line x1="650" y1="200" x2="670" y2="230" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="675" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">修正发现问题</text>

  <!-- 标注4：循环 -->
  <line x1="490" y1="88" x2="490" y2="70" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="490" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">迭代优化</text>

  <!-- 标注5：最终输出 -->
  <line x1="700" y1="310" x2="700" y2="335" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="700" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">高质量最终答案</text>

  <!-- 标注6：流程方向 -->
  <text x="340" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→</text>
  <text x="535" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→</text>

  <!-- 底部说明 -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.6">元认知自我修正流程：生成 → 反思 → 修正 → 验证</text>

  <!-- 装饰性圆点 -->
  <circle cx="50" cy="50" r="4" fill="#409EFF" opacity="0.15"/>
  <circle cx="750" cy="60" r="6" fill="#409EFF" opacity="0.1"/>
  <circle cx="60" cy="440" r="5" fill="#409EFF" opacity="0.12"/>
  <circle cx="740" cy="430" r="3" fill="#409EFF" opacity="0.18"/>

</svg>