<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Worker Agent 职责范围</text>
  <line x1="300" y1="52" x2="500" y2="52" stroke="#409EFF" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ==================== Worker 1：专注执行 ==================== -->
  <g transform="translate(40, 80)">
    <!-- 范围虚线框 -->
    <rect x="0" y="0" width="220" height="340" rx="12" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="6,4" stroke-opacity="0.6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" fill="#409EFF" fill-opacity="0.7">Scope Boundary</text>

    <!-- 角色卡片 -->
    <rect x="12" y="32" width="196" height="290" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <!-- 头部 -->
    <rect x="12" y="32" width="196" height="44" rx="10" fill="#409EFF" fill-opacity="0.12"/>
    <circle cx="46" cy="54" r="14" fill="#409EFF" fill-opacity="0.2"/>
    <text x="46" y="58" text-anchor="middle" font-size="16" fill="#409EFF">🎯</text>
    <text x="72" y="52" font-size="15" font-weight="bold" fill="#1a1a2e">专注执行</text>
    <text x="72" y="68" font-size="11" fill="#666">Focused Execution</text>

    <!-- 放大镜图标 -->
    <g transform="translate(60, 110)">
      <circle cx="25" cy="25" r="22" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <line x1="41" y1="41" x2="52" y2="52" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
      <!-- 放大镜下的任务列表 -->
      <rect x="50" y="-8" width="70" height="18" rx="3" fill="#409EFF" fill-opacity="0.1"/>
      <text x="55" y="5" font-size="10" fill="#409EFF">单一任务</text>
      <line x1="50" y1="16" x2="120" y2="16" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
      <line x1="50" y1="24" x2="110" y2="24" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
      <line x1="50" y1="32" x2="115" y2="32" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
    </g>

    <!-- 描述文字 -->
    <text x="110" y="190" text-anchor="middle" font-size="12" fill="#555">聚焦单一任务</text>
    <text x="110" y="208" text-anchor="middle" font-size="12" fill="#555">排除干扰执行</text>

    <!-- 标注 -->
    <rect x="30" y="240" width="160" height="28" rx="14" fill="#409EFF" fill-opacity="0.08"/>
    <text x="110" y="258" text-anchor="middle" font-size="12" fill="#409EFF">🔍 深度聚焦模式</text>
  </g>

  <!-- ==================== Worker 2：结果报告 ==================== -->
  <g transform="translate(290, 80)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="6,4" stroke-opacity="0.6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" fill="#409EFF" fill-opacity="0.7">Scope Boundary</text>

    <rect x="12" y="32" width="196" height="290" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="12" y="32" width="196" height="44" rx="10" fill="#409EFF" fill-opacity="0.12"/>
    <circle cx="46" cy="54" r="14" fill="#409EFF" fill-opacity="0.2"/>
    <text x="46" y="58" text-anchor="middle" font-size="16" fill="#409EFF">📋</text>
    <text x="72" y="52" font-size="15" font-weight="bold" fill="#1a1a2e">结果报告</text>
    <text x="72" y="68" font-size="11" fill="#666">Result Reporting</text>

    <!-- 报告文档 -->
    <g transform="translate(40, 100)">
      <rect x="0" y="0" width="120" height="90" rx="4" fill="#fff" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="120" height="22" rx="4" fill="#409EFF" fill-opacity="0.1"/>
      <text x="60" y="15" text-anchor="middle" font-size="9" fill="#409EFF">report.json</text>
      <text x="10" y="38" font-size="8" fill="#555">{</text>
      <text x="16" y="50" font-size="8" fill="#555">"status": "completed",</text>
      <text x="16" y="62" font-size="8" fill="#555">"result": "success",</text>
      <text x="16" y="74" font-size="8" fill="#555">"duration": "1.2s"</text>
      <text x="10" y="86" font-size="8" fill="#555">}</text>
    </g>

    <text x="110" y="210" text-anchor="middle" font-size="12" fill="#555">结构化报告</text>
    <text x="110" y="228" text-anchor="middle" font-size="12" fill="#555">JSON 格式输出</text>

    <rect x="30" y="250" width="160" height="28" rx="14" fill="#409EFF" fill-opacity="0.08"/>
    <text x="110" y="268" text-anchor="middle" font-size="12" fill="#409EFF">📊 数据驱动报告</text>
  </g>

  <!-- ==================== Worker 3：自我评估 ==================== -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-dasharray="6,4" stroke-opacity="0.6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" fill="#409EFF" fill-opacity="0.7">Scope Boundary</text>

    <rect x="12" y="32" width="196" height="290" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="12" y="32" width="196" height="44" rx="10" fill="#409EFF" fill-opacity="0.12"/>
    <circle cx="46" cy="54" r="14" fill="#409EFF" fill-opacity="0.2"/>
    <text x="46" y="58" text-anchor="middle" font-size="16" fill="#409EFF">📊</text>
    <text x="72" y="52" font-size="15" font-weight="bold" fill="#1a1a2e">自我评估</text>
    <text x="72" y="68" font-size="11" fill="#666">Self-Assessment</text>

    <!-- 置信度仪表 -->
    <g transform="translate(50, 105)">
      <!-- 仪表盘背景弧 -->
      <path d="M 10 60 A 50 50 0 0 1 90 60" fill="none" stroke="#eee" stroke-width="8" stroke-linecap="round"/>
      <!-- 高置信度弧（绿色） -->
      <path d="M 10 60 A 50 50 0 0 1 60 15" fill="none" stroke="#2ECC71" stroke-width="8" stroke-linecap="round"/>
      <!-- 中置信度弧（黄色） -->
      <path d="M 60 15 A 50 50 0 0 1 85 40" fill="none" stroke="#F1C40F" stroke-width="8" stroke-linecap="round"/>
      <!-- 低置信度弧（红色） -->
      <path d="M 85 40 A 50 50 0 0 1 90 60" fill="none" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
      <!-- 指针 -->
      <line x1="50" y1="60" x2="50" y2="18" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="60" r="5" fill="#1a1a2e"/>
    </g>

    <!-- 标签 -->
    <text x="110" y="195" text-anchor="middle" font-size="11" fill="#2ECC71">● 高</text>
    <text x="110" y="212" text-anchor="middle" font-size="11" fill="#F1C40F">● 中</text>
    <text x="110" y="229" text-anchor="middle" font-size="11" fill="#E74C3C">● 低</text>

    <rect x="30" y="250" width="160" height="28" rx="14" fill="#409EFF" fill-opacity="0.08"/>
    <text x="110" y="268" text-anchor="middle" font-size="12" fill="#409EFF">📈 置信度评估</text>
  </g>

  <!-- ==================== 越界重定向箭头 ==================== -->
  <!-- 从 Worker 1 指向 Manager 的箭头 -->
  <g transform="translate(150, 430)">
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">越界</text>
    <line x1="0" y1="8" x2="0" y2="28" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>
  </g>

  <!-- 从 Worker 2 指向 Manager 的箭头 -->
  <g transform="translate(400, 430)">
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">越界</text>
    <line x1="0" y1="8" x2="0" y2="28" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>
  </g>

  <!-- 从 Worker 3 指向 Manager 的箭头 -->
  <g transform="translate(650, 430)">
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">越界</text>
    <line x1="0" y1="8" x2="0" y2="28" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>
  </g>

  <!-- ==================== Manager 区域 ==================== -->
  <g transform="translate(280, 445)">
    <rect x="0" y="0" width="240" height="40" rx="20" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
    <text x="120" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#409EFF">👨‍💼 Manager Agent</text>
  </g>

  <!-- 从 Manager 到 Worker 的分配箭头 -->
  <g transform="translate(340, 440)">
    <line x1="0" y1="0" x2="-60" y2="-20" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" stroke-opacity="0.5"/>
  </g>
  <g transform="translate(400, 440)">
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" stroke-opacity="0.5"/>
  </g>
  <g transform="translate(460, 440)">
    <line x1="0" y1="0" x2="60" y2="-20" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" stroke-opacity="0.5"/>
  </g>

  <!-- ==================== 底部标注 ==================== -->
  <g transform="translate(0, 0)">
    <!-- 标注 1 -->
    <rect x="30" y="468" width="16" height="16" rx="3" fill="#409EFF" fill-opacity="0.2"/>
    <text x="52" y="481" font-size="11" fill="#666">虚线框 = 职责边界</text>

    <!-- 标注 2 -->
    <rect x="230" y="468" width="16" height="16" rx="3" fill="#E74C3C" fill-opacity="0.2"/>
    <text x="252" y="481" font-size="11" fill="#666">红色箭头 = 越界回退</text>

    <!-- 标注 3 -->
    <rect x="450" y="468" width="16" height="16" rx="3" fill="#409EFF" fill-opacity="0.2"/>
    <text x="472" y="481" font-size="11" fill="#666">蓝色虚线 = 任务分配</text>
  </g>
</svg>