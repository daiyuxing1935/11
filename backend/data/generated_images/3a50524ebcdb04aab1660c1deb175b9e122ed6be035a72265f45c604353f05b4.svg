<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFB"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">RAG 系统评估流程</text>

  <!-- ===== 左侧：文档图标 ===== -->
  <rect x="60" y="120" width="100" height="130" rx="10" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
  <!-- 文档折角 -->
  <path d="M110 120 L110 170 L160 170 L160 250 L60 250 L60 120 Z" fill="white" stroke="none"/>
  <path d="M110 120 L160 170" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>
  <!-- 文档线条 -->
  <line x1="80" y1="155" x2="140" y2="155" stroke="#409EFF" stroke-width="2"/>
  <line x1="80" y1="175" x2="140" y2="175" stroke="#409EFF" stroke-width="2"/>
  <line x1="80" y1="195" x2="130" y2="195" stroke="#409EFF" stroke-width="2"/>
  <line x1="80" y1="215" x2="135" y2="215" stroke="#409EFF" stroke-width="2"/>
  <!-- 文档标签 -->
  <text x="110" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">知识文档</text>

  <!-- ===== 箭头 1：文档 → 检索 ===== -->
  <line x1="160" y1="185" x2="230" y2="185" stroke="#409EFF" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ===== 中间左侧：放大镜（检索） ===== -->
  <circle cx="300" cy="185" r="50" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
  <circle cx="300" cy="185" r="30" fill="none" stroke="#409EFF" stroke-width="3"/>
  <line x1="322" y1="207" x2="345" y2="230" stroke="#409EFF" stroke-width="3.5" stroke-linecap="round"/>
  <text x="300" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">检索模块</text>

  <!-- ===== 箭头 2：检索 → 生成 ===== -->
  <line x1="350" y1="185" x2="420" y2="185" stroke="#409EFF" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- ===== 中间右侧：大脑（生成） ===== -->
  <g transform="translate(490, 185)">
    <!-- 大脑外形 -->
    <ellipse cx="0" cy="0" rx="55" ry="45" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
    <!-- 大脑沟回 -->
    <path d="M-30 -15 Q-15 -30 0 -15 Q15 -30 30 -15" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-35 0 Q-15 -10 0 0 Q15 -10 35 0" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-30 15 Q-15 5 0 15 Q15 5 30 15" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 神经元节点 -->
    <circle cx="-20" cy="-20" r="4" fill="#409EFF"/>
    <circle cx="20" cy="-20" r="4" fill="#409EFF"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF"/>
    <circle cx="-15" cy="18" r="4" fill="#409EFF"/>
    <circle cx="18" cy="18" r="4" fill="#409EFF"/>
  </g>
  <text x="490" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">生成模块</text>

  <!-- ===== 箭头 3：生成 → 评估 ===== -->
  <line x1="545" y1="185" x2="610" y2="185" stroke="#409EFF" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- ===== 右侧：评估清单 ===== -->
  <rect x="620" y="100" width="155" height="170" rx="12" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
  <rect x="620" y="100" width="155" height="35" rx="12" fill="#409EFF" stroke="none"/>
  <rect x="620" y="123" width="155" height="12" fill="#409EFF" stroke="none"/>
  <text x="697" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white" font-weight="bold">评估清单</text>

  <!-- 评估项 1 -->
  <g transform="translate(635, 155)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#409EFF" stroke="none"/>
    <polyline points="4,9 8,14 15,4" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="14" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">准确度</text>
  </g>

  <!-- 评估项 2 -->
  <g transform="translate(635, 190)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#409EFF" stroke="none"/>
    <polyline points="4,9 8,14 15,4" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="14" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">相关性</text>
  </g>

  <!-- 评估项 3 -->
  <g transform="translate(635, 225)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#409EFF" stroke="none"/>
    <polyline points="4,9 8,14 15,4" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="14" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">完整性</text>
  </g>

  <!-- ===== 分数条 ===== -->
  <g transform="translate(635, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">综合评分</text>
    <rect x="0" y="10" width="126" height="14" rx="7" fill="#E0E0E0" stroke="none"/>
    <rect x="0" y="10" width="95" height="14" rx="7" fill="#409EFF" stroke="none"/>
    <text x="132" y="22" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">75%</text>
  </g>

  <!-- ===== 底部标注 ===== -->
  <g transform="translate(400, 370)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">评估标准：精确匹配率 · 召回率 · F1 分数</text>
  </g>

  <!-- ===== 装饰性基准线 ===== -->
  <line x1="100" y1="420" x2="700" y2="420" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" opacity="0.7">学术基准测试环境</text>

  <!-- ===== 小装饰：右上角 ===== -->
  <g transform="translate(720, 30)" opacity="0.3">
    <rect x="0" y="0" width="40" height="25" rx="5" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="20" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">基准</text>
  </g>

</svg>