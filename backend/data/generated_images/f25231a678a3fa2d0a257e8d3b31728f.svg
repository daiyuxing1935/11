<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F7FF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 顶部标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">零样本学习：直接指令</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 左侧：AI机器人 -->
  <g transform="translate(130, 180)" filter="url(#shadow)">
    <!-- 身体 -->
    <rect x="-45" y="20" width="90" height="100" rx="18" fill="#409EFF" opacity="0.15"/>
    <rect x="-40" y="25" width="80" height="90" rx="14" fill="#409EFF" opacity="0.08"/>
    <!-- 头部 -->
    <circle cx="0" cy="-10" r="38" fill="#409EFF" opacity="0.12"/>
    <circle cx="0" cy="-10" r="32" fill="#409EFF" opacity="0.06"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-18" r="6" fill="#409EFF"/>
    <circle cx="12" cy="-18" r="6" fill="#409EFF"/>
    <circle cx="-12" cy="-18" r="2.5" fill="#1a1a2e" opacity="0.3"/>
    <circle cx="12" cy="-18" r="2.5" fill="#1a1a2e" opacity="0.3"/>
    <!-- 微笑 -->
    <path d="M-10,-4 Q0,6 10,-4" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 天线 -->
    <line x1="0" y1="-48" x2="0" y2="-60" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-64" r="5" fill="#409EFF" opacity="0.5"/>
    <!-- 耳朵 -->
    <rect x="-48" y="-20" width="10" height="16" rx="4" fill="#409EFF" opacity="0.2"/>
    <rect x="38" y="-20" width="10" height="16" rx="4" fill="#409EFF" opacity="0.2"/>
    <!-- 手臂 -->
    <rect x="-60" y="30" width="14" height="50" rx="7" fill="#409EFF" opacity="0.1"/>
    <rect x="46" y="30" width="14" height="50" rx="7" fill="#409EFF" opacity="0.1"/>
  </g>

  <!-- 机器人标签 -->
  <rect x="85" y="340" width="90" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
  <text x="130" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">AI 助手</text>

  <!-- 中间：发光箭头 -->
  <g transform="translate(340, 220)">
    <!-- 箭头路径 -->
    <line x1="0" y1="0" x2="120" y2="0" stroke="#409EFF" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <polygon points="120,-8 135,0 120,8" fill="#409EFF" opacity="0.8"/>
    <!-- 光晕 -->
    <ellipse cx="60" cy="0" rx="50" ry="20" fill="#409EFF" opacity="0.06"/>
    <ellipse cx="60" cy="0" rx="30" ry="10" fill="#409EFF" opacity="0.08"/>
  </g>

  <!-- 箭头标注 -->
  <rect x="340" y="250" width="100" height="26" rx="13" fill="#409EFF" opacity="0.1"/>
  <text x="390" y="267" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">直接指令</text>

  <!-- 右侧：用户 -->
  <g transform="translate(580, 180)">
    <!-- 用户身体 -->
    <rect x="-35" y="25" width="70" height="95" rx="16" fill="#1a1a2e" opacity="0.06"/>
    <!-- 用户头部 -->
    <circle cx="0" cy="-8" r="32" fill="#1a1a2e" opacity="0.08"/>
    <circle cx="0" cy="-8" r="26" fill="#1a1a2e" opacity="0.04"/>
    <!-- 面部特征 -->
    <circle cx="-10" cy="-16" r="4" fill="#1a1a2e" opacity="0.25"/>
    <circle cx="10" cy="-16" r="4" fill="#1a1a2e" opacity="0.25"/>
    <path d="M-8,-2 Q0,6 8,-2" stroke="#1a1a2e" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- 头发 -->
    <path d="M-28,-20 Q-30,-40 -15,-45 Q0,-48 15,-45 Q30,-40 28,-20" fill="#1a1a2e" opacity="0.1"/>
  </g>

  <!-- 用户标签 -->
  <rect x="535" y="340" width="90" height="28" rx="14" fill="#1a1a2e" opacity="0.06"/>
  <text x="580" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">用户</text>

  <!-- 对话气泡 -->
  <g transform="translate(490, 100)">
    <path d="M0,0 Q0,-35 30,-35 L110,-35 Q140,-35 140,-5 L140,25 Q140,50 110,50 L45,50 L30,65 L35,50 L30,50 Q0,50 0,20 Z" fill="white" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="70" y="5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">请翻译这段</text>
    <text x="70" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">文字为英文</text>
  </g>

  <!-- 底部概念说明 -->
  <g transform="translate(400, 430)">
    <rect x="-180" y="-15" width="360" height="36" rx="18" fill="#409EFF" opacity="0.08"/>
    <text x="0" y="7" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">零样本：直接给出任务指令，不提供任何示例</text>
  </g>

  <!-- 标注1：无示例 -->
  <rect x="530" y="150" width="72" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="566" y="166" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">无示例</text>
  <line x1="566" y1="174" x2="566" y2="195" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- 标注2：直接沟通 -->
  <rect x="310" y="150" width="72" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="346" y="166" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">直接沟通</text>
  <line x1="346" y1="174" x2="346" y2="195" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- 标注3：理解任务 -->
  <rect x="100" y="150" width="72" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="136" y="166" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">理解任务</text>
  <line x1="136" y1="174" x2="136" y2="195" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- 装饰性圆点 -->
  <circle cx="30" cy="470" r="3" fill="#409EFF" opacity="0.15"/>
  <circle cx="770" cy="30" r="3" fill="#409EFF" opacity="0.15"/>
  <circle cx="750" cy="460" r="2" fill="#409EFF" opacity="0.1"/>
  <circle cx="60" cy="60" r="2" fill="#409EFF" opacity="0.1"/>
</svg>