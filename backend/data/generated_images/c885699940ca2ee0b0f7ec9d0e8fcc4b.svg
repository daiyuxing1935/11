<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">单智能体到多智能体的进化路径</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- 阶梯式布局：5级台阶，从左下到右上 -->

  <!-- 台阶1：单智能体原型 - 左下 -->
  <rect x="60" y="390" width="140" height="70" rx="10" fill="#409EFF" filter="url(#shadow)"/>
  <rect x="60" y="390" width="140" height="70" rx="10" fill="none" stroke="#2B7ED6" stroke-width="1.5"/>
  <text x="130" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">单智能体原型</text>
  <!-- 简单机器人图标 -->
  <circle cx="100" cy="440" r="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="94" y="448" width="12" height="10" rx="2" fill="#FFFFFF" opacity="0.9"/>
  <rect x="88" y="458" width="6" height="6" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="106" y="458" width="6" height="6" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <text x="155" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">🤖 基础</text>

  <!-- 箭头1→2 -->
  <path d="M200 425 L260 425" stroke="url(#arrowGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
  </defs>
  <!-- 触发条件标注 -->
  <rect x="210" y="408" width="90" height="22" rx="11" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="255" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">工具需求触发</text>

  <!-- 台阶2：智能体+增强工具 -->
  <rect x="300" y="340" width="150" height="75" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="375" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">智能体+增强工具</text>
  <!-- 机器人带工具腰带 -->
  <circle cx="340" cy="392" r="8" fill="#409EFF" opacity="0.8"/>
  <rect x="334" y="400" width="12" height="10" rx="2" fill="#409EFF" opacity="0.8"/>
  <rect x="330" y="410" width="4" height="5" rx="1" fill="#409EFF" opacity="0.6"/>
  <rect x="346" y="410" width="4" height="5" rx="1" fill="#409EFF" opacity="0.6"/>
  <!-- 工具腰带 -->
  <rect x="330" y="406" width="20" height="3" rx="1" fill="#409EFF" opacity="0.5"/>
  <circle cx="335" cy="406" r="1.5" fill="#409EFF"/>
  <circle cx="345" cy="406" r="1.5" fill="#409EFF"/>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">🔧 工具包</text>

  <!-- 箭头2→3 -->
  <path d="M450 377 L510 377" stroke="url(#arrowGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <rect x="460" y="360" width="90" height="22" rx="11" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="505" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">效率不足触发</text>

  <!-- 台阶3：添加1-2个辅助智能体 -->
  <rect x="540" y="280" width="160" height="80" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="620" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">添加辅助智能体</text>
  <!-- 主机器人 + 小助手 -->
  <circle cx="575" cy="335" r="9" fill="#409EFF" opacity="0.85"/>
  <rect x="569" y="344" width="12" height="10" rx="2" fill="#409EFF" opacity="0.85"/>
  <circle cx="600" cy="340" r="6" fill="#409EFF" opacity="0.5"/>
  <circle cx="615" cy="345" r="5" fill="#409EFF" opacity="0.4"/>
  <text x="650" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">🤖 + 助手×2</text>

  <!-- 箭头3→4 -->
  <path d="M700 320 L740 320" stroke="url(#arrowGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <rect x="705" y="303" width="85" height="22" rx="11" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="747" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">协作需求触发</text>

  <!-- 台阶4：正式多智能体设计 - 右上 -->
  <rect x="540" y="140" width="220" height="85" rx="10" fill="#409EFF" filter="url(#shadow)"/>
  <rect x="540" y="140" width="220" height="85" rx="10" fill="none" stroke="#2B7ED6" stroke-width="1.5"/>
  <text x="650" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">正式多智能体设计</text>
  <!-- 结构化团队图标 -->
  <rect x="560" y="178" width="20" height="14" rx="3" fill="#FFFFFF" opacity="0.9"/>
  <text x="570" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#409EFF">M</text>
  <rect x="590" y="178" width="16" height="14" rx="3" fill="#FFFFFF" opacity="0.7"/>
  <text x="598" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#409EFF">S1</text>
  <rect x="612" y="178" width="16" height="14" rx="3" fill="#FFFFFF" opacity="0.7"/>
  <text x="620" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#409EFF">S2</text>
  <rect x="634" y="178" width="16" height="14" rx="3" fill="#FFFFFF" opacity="0.7"/>
  <text x="642" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#409EFF">S3</text>
  <text x="700" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.9">管理者+专家团队</text>

  <!-- 箭头4→5 - 向下折返 -->
  <path d="M540 182 L480 182 L480 120 L460 120" stroke="url(#arrowGrad)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="470" y="145" width="90" height="22" rx="11" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="515" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">成本压力触发</text>

  <!-- 台阶5：优化与精简 - 左上 -->
  <rect x="280" y="90" width="160" height="75" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="360" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">优化与精简</text>
  <!-- 精简团队图标 -->
  <rect x="305" y="132" width="18" height="14" rx="3" fill="#409EFF" opacity="0.85"/>
  <text x="314" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF">M</text>
  <rect x="330" y="132" width="14" height="14" rx="3" fill="#409EFF" opacity="0.6"/>
  <text x="337" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF">S</text>
  <text x="385" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">精简高效团队</text>
  <!-- 删除标记 -->
  <text x="355" y="142" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C" opacity="0.7">✕</text>

  <!-- 进化阶梯连接线（背景阶梯效果） -->
  <line x1="60" y1="460" x2="60" y2="390" stroke="#409EFF" stroke-width="2" opacity="0.15"/>
  <line x1="60" y1="460" x2="300" y2="460" stroke="#409EFF" stroke-width="2" opacity="0.15"/>
  <line x1="300" y1="460" x2="300" y2="340" stroke="#409EFF" stroke-width="2" opacity="0.15"/>
  <line x1="300" y1="460" x2="540" y2="460" stroke="#409EFF" stroke-width="2" opacity="0.15"/>
  <line x1="540" y1="460" x2="540" y2="280" stroke="#409EFF" stroke-width="2" opacity="0.15"/>
  <line x1="540" y1="460" x2="760" y2="460" stroke="#409EFF" stroke-width="2" opacity="0.15"/>

  <!-- 底部标注 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.6">进化路径：从简单到复杂，再从复杂到精简</text>

  <!-- 步骤编号 -->
  <circle cx="75" cy="400" r="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="75" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">1</text>

  <circle cx="315" cy="350" r="10" fill="#409EFF" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="315" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">2</text>

  <circle cx="555" cy="290" r="10" fill="#409EFF" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="555" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">3</text>

  <circle cx="555" cy="150" r="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="555" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">4</text>

  <circle cx="295" cy="100" r="10" fill="#409EFF" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="295" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">5</text>

</svg>