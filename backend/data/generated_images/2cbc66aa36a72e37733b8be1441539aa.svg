<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6CB8FF"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6CB8FF"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6CB8FF"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6CB8FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">多维评分框架</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- 四个评分柱 -->
  <!-- 柱1: 任务能力分 -->
  <g transform="translate(80, 70)">
    <text x="60" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">任务能力分</text>
    <!-- 刻度线 -->
    <line x1="20" y1="25" x2="20" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <line x1="100" y1="25" x2="100" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <!-- 刻度标签 -->
    <text x="20" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">1</text>
    <text x="60" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">5</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">10</text>
    <!-- 柱体背景 -->
    <rect x="35" y="25" width="30" height="170" rx="6" fill="#E8EDF5"/>
    <!-- 柱体填充 - 8/10 -->
    <rect x="35" y="41" width="30" height="136" rx="6" fill="url(#barGrad1)"/>
    <!-- 分数 -->
    <text x="60" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#409EFF">8</text>
  </g>

  <!-- 柱2: 响应延迟分 -->
  <g transform="translate(240, 70)">
    <text x="60" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">响应延迟分</text>
    <line x1="20" y1="25" x2="20" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <line x1="100" y1="25" x2="100" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <text x="20" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">1</text>
    <text x="60" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">5</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">10</text>
    <rect x="35" y="25" width="30" height="170" rx="6" fill="#E8EDF5"/>
    <!-- 6/10 -->
    <rect x="35" y="93" width="30" height="102" rx="6" fill="url(#barGrad2)"/>
    <text x="60" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#409EFF">6</text>
  </g>

  <!-- 柱3: 成本效率分 -->
  <g transform="translate(400, 70)">
    <text x="60" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">成本效率分</text>
    <line x1="20" y1="25" x2="20" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <line x1="100" y1="25" x2="100" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <text x="20" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">1</text>
    <text x="60" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">5</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">10</text>
    <rect x="35" y="25" width="30" height="170" rx="6" fill="#E8EDF5"/>
    <!-- 7/10 -->
    <rect x="35" y="67" width="30" height="119" rx="6" fill="url(#barGrad3)"/>
    <text x="60" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#409EFF">7</text>
  </g>

  <!-- 柱4: 可靠性分 -->
  <g transform="translate(560, 70)">
    <text x="60" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">可靠性分</text>
    <line x1="20" y1="25" x2="20" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <line x1="100" y1="25" x2="100" y2="195" stroke="#D0D5E0" stroke-width="1.5"/>
    <text x="20" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">1</text>
    <text x="60" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">5</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">10</text>
    <rect x="35" y="25" width="30" height="170" rx="6" fill="#E8EDF5"/>
    <!-- 8/10 -->
    <rect x="35" y="41" width="30" height="136" rx="6" fill="url(#barGrad4)"/>
    <text x="60" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#409EFF">8</text>
  </g>

  <!-- 加权公式区域 -->
  <g transform="translate(0, 330)">
    <rect x="80" y="0" width="640" height="70" rx="10" fill="white" filter="url(#shadow)" opacity="0.95"/>
    <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">综合评分 = 0.3×能力 + 0.3×延迟 + 0.2×成本 + 0.2×可靠性</text>
    <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#409EFF">综合评分：7.2</text>
  </g>

  <!-- 场景卡片 -->
  <!-- 卡片1 -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="190" height="60" rx="8" fill="white" filter="url(#shadow)" opacity="0.92"/>
    <rect x="0" y="0" width="6" height="60" rx="3" fill="#409EFF"/>
    <text x="95" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">面向用户应用</text>
    <text x="95" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">能力:0.4 延迟:0.3</text>
  </g>

  <!-- 卡片2 -->
  <g transform="translate(305, 420)">
    <rect x="0" y="0" width="190" height="60" rx="8" fill="white" filter="url(#shadow)" opacity="0.92"/>
    <rect x="0" y="0" width="6" height="60" rx="3" fill="#409EFF"/>
    <text x="95" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">批量离线处理</text>
    <text x="95" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">成本:0.4 能力:0.3</text>
  </g>

  <!-- 卡片3 -->
  <g transform="translate(530, 420)">
    <rect x="0" y="0" width="190" height="60" rx="8" fill="white" filter="url(#shadow)" opacity="0.92"/>
    <rect x="0" y="0" width="6" height="60" rx="3" fill="#409EFF"/>
    <text x="95" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">高风险决策</text>
    <text x="95" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899B0">可靠:0.5 能力:0.3</text>
  </g>

</svg>