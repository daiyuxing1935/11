<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fa"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">大语言模型最佳实践徽章</text>

  <!-- 六边形路径模板（正六边形，中心在 cx,cy，半径 r=58） -->
  <!-- 使用多边形：6个顶点 -->
  <!-- 顶部水平边，尖角朝上 -->

  <!-- 六边形1：Use LCEL - 行1列1 -->
  <g transform="translate(200, 130)">
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 管道运算符图标 | -->
    <line x1="-12" y1="-20" x2="-12" y2="20" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="-20" x2="12" y2="20" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">使用LCEL</text>
  </g>

  <!-- 六边形2：Control Temperature - 行1列2 -->
  <g transform="translate(400, 130)">
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 恒温器刻度盘 0-1 -->
    <circle cx="0" cy="-5" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="0" y1="-5" x2="10" y2="-15" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="-12" y="10" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">0</text>
    <text x="6" y="10" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">1</text>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">控制温度</text>
  </g>

  <!-- 六边形3：Error Handling - 行1列3 -->
  <g transform="translate(600, 130)">
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- try-except 盾牌图标 -->
    <path d="M0,-22 L-16,-14 L-16,2 Q-16,14 0,22 Q16,14 16,2 L16,-14 Z" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="-6" y="4" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">✓</text>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">错误处理</text>
  </g>

  <!-- 六边形4：Track Cost - 行2列1 -->
  <g transform="translate(200, 310)">
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 美元硬币 + 代币计数器 -->
    <circle cx="0" cy="-8" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <text x="0" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">$</text>
    <!-- 代币计数 -->
    <rect x="-14" y="8" width="28" height="10" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="0" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#409EFF">代币</text>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">追踪成本</text>
  </g>

  <!-- 六边形5：Start Simple - 行2列2 -->
  <g transform="translate(400, 310)">
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 极简箭头向上 -->
    <line x1="0" y1="15" x2="0" y2="-18" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <polyline points="-10,-8 0,-18 10,-8" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 底部横线 -->
    <line x1="-12" y1="15" x2="12" y2="15" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">从简开始</text>
  </g>

  <!-- 六边形6：Test Prompts - 行2列3 -->
  <g transform="translate(600, 310)">
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29" fill="url(#hexGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 复选框 + 播放按钮 -->
    <rect x="-14" y="-18" width="12" height="12" rx="2" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <polyline points="-12,-14 -9,-11 -5,-16" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 播放三角形 -->
    <polygon points="4,-14 4,2 18,-6" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">测试提示</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666" opacity="0.7">最佳实践徽章 — 六项核心原则</text>

</svg>