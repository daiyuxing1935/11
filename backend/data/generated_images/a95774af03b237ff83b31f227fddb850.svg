<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="curveN" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="curveD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="curveC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="6" height="6">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#409EFF" stroke-opacity="0.12" stroke-width="1" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="700" letter-spacing="1">缩放定律（Scaling Laws）—— 损失随规模变化</text>

  <!-- 图表区域 -->
  <!-- Y轴标签 -->
  <text x="62" y="80" text-anchor="end" fill="#1a1a2e" font-size="14" font-weight="600">测试损失</text>
  <text x="62" y="110" text-anchor="end" fill="#1a1a2e" font-size="13">高</text>
  <text x="62" y="380" text-anchor="end" fill="#1a1a2e" font-size="13">低</text>

  <!-- Y轴箭头 -->
  <line x1="75" y1="90" x2="75" y2="400" stroke="#1a1a2e" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="75,85 71,95 79,95" fill="#1a1a2e" fill-opacity="0.3"/>

  <!-- X轴标签 -->
  <text x="400" y="440" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="600">规模（参数量 / 数据量 / 计算量）</text>
  <text x="120" y="430" text-anchor="middle" fill="#1a1a2e" font-size="12">小</text>
  <text x="680" y="430" text-anchor="middle" fill="#1a1a2e" font-size="12">大</text>

  <!-- X轴箭头 -->
  <line x1="90" y1="410" x2="710" y2="410" stroke="#1a1a2e" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="715,410 705,406 705,414" fill="#1a1a2e" fill-opacity="0.3"/>

  <!-- 网格线（浅色） -->
  <line x1="90" y1="120" x2="710" y2="120" stroke="#409EFF" stroke-opacity="0.08" stroke-width="0.8"/>
  <line x1="90" y1="190" x2="710" y2="190" stroke="#409EFF" stroke-opacity="0.08" stroke-width="0.8"/>
  <line x1="90" y1="260" x2="710" y2="260" stroke="#409EFF" stroke-opacity="0.08" stroke-width="0.8"/>
  <line x1="90" y1="330" x2="710" y2="330" stroke="#409EFF" stroke-opacity="0.08" stroke-width="0.8"/>
  <line x1="90" y1="400" x2="710" y2="400" stroke="#409EFF" stroke-opacity="0.08" stroke-width="0.8"/>

  <!-- 渐近线 L∞ -->
  <line x1="90" y1="370" x2="710" y2="370" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="6,4" stroke-opacity="0.5"/>
  <rect x="590" y="358" width="130" height="22" rx="4" fill="#1a1a2e" fill-opacity="0.08"/>
  <text x="655" y="374" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="600">L∞（不可约减损失）</text>

  <!-- 曲线 N（参数量） -->
  <path d="M 100,140 C 180,155 280,195 380,240 C 480,285 560,320 620,345 C 660,358 685,365 700,369" 
        fill="none" stroke="#409EFF" stroke-width="2.8" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- 曲线 D（数据量） -->
  <path d="M 100,160 C 180,175 280,215 380,258 C 480,300 560,332 620,352 C 660,362 685,367 700,369" 
        fill="none" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.6" stroke-dasharray="8,4"/>
  <!-- 曲线 C（计算量） -->
  <path d="M 100,180 C 180,195 280,232 380,272 C 480,312 560,340 620,356 C 660,364 685,368 700,369" 
        fill="none" stroke="#409EFF" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.35" stroke-dasharray="3,4"/>

  <!-- 曲线标注 -->
  <rect x="475" y="270" width="70" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="510" y="284" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="600">参数量 N</text>

  <rect x="475" y="310" width="70" height="20" rx="4" fill="#409EFF" fill-opacity="0.08"/>
  <text x="510" y="324" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="600" fill-opacity="0.7">数据量 D</text>

  <rect x="475" y="345" width="70" height="20" rx="4" fill="#409EFF" fill-opacity="0.05"/>
  <text x="510" y="359" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="600" fill-opacity="0.45">计算量 C</text>

  <!-- 图标区域：三个小图标 -->
  <!-- 图标1：警告标志 - 数据不足瓶颈 -->
  <g transform="translate(30, 455)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#409EFF" fill-opacity="0.15"/>
    <polygon points="11,4 18,18 4,18" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="11" y1="10" x2="11" y2="14" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="11" cy="16.5" r="1" fill="#409EFF"/>
    <text x="28" y="16" fill="#1a1a2e" font-size="12">数据不足瓶颈</text>
  </g>

  <!-- 图标2：递减曲线 - 边际效益递减 -->
  <g transform="translate(230, 455)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#409EFF" fill-opacity="0.15"/>
    <path d="M 3,18 C 7,18 10,10 14,8 C 17,6 19,6 19,6" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="14" cy="8" r="1.2" fill="#409EFF"/>
    <text x="28" y="16" fill="#1a1a2e" font-size="12">边际效益递减</text>
  </g>

  <!-- 图标3：美元/时钟 - 推理成本 -->
  <g transform="translate(460, 455)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#409EFF" fill-opacity="0.15"/>
    <circle cx="11" cy="11" r="7" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="11" y1="6" x2="11" y2="11" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="11" x2="15" y2="11" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="28" y="16" fill="#1a1a2e" font-size="12">推理成本</text>
  </g>

  <!-- 公式框 -->
  <g transform="translate(560, 55)">
    <rect x="0" y="0" width="225" height="65" rx="6" fill="#ffffff" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.4" filter="url(#shadow)"/>
    <text x="112" y="22" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="600">缩放定律公式</text>
    <text x="112" y="50" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="'Times New Roman', serif" font-style="italic">
      L(N, D, C) = (Nc/N)<tspan font-size="11" dy="-4">α</tspan><tspan dy="4"> + (Dc/D)</tspan><tspan font-size="11" dy="-4">α</tspan><tspan dy="4"> + (Cc/C)</tspan><tspan font-size="11" dy="-4">α</tspan><tspan dy="4"> + L∞</tspan>
    </text>
  </g>

  <!-- 数据点标记（小圆点） -->
  <circle cx="380" cy="240" r="3.5" fill="#409EFF" stroke="#fff" stroke-width="1.5"/>
  <circle cx="380" cy="258" r="3" fill="#409EFF" fill-opacity="0.6" stroke="#fff" stroke-width="1.2"/>
  <circle cx="380" cy="272" r="3" fill="#409EFF" fill-opacity="0.35" stroke="#fff" stroke-width="1.2"/>

  <!-- 底部装饰线 -->
  <line x1="30" y1="495" x2="770" y2="495" stroke="#409EFF" stroke-opacity="0.15" stroke-width="1"/>
</svg>