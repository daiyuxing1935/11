<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="clipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" letter-spacing="2">Trust but Verify</text>
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" letter-spacing="1">幻觉防御检查清单</text>

  <!-- 中央剪贴板 -->
  <g transform="translate(400, 290)">
    <!-- 剪贴板主体 -->
    <rect x="-170" y="-120" width="340" height="240" rx="12" fill="url(#clipGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 剪贴板顶部夹子 -->
    <rect x="-40" y="-132" width="80" height="20" rx="4" fill="#409EFF"/>
    <circle cx="0" cy="-122" r="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 8项清单 -->
    <!-- 第1项：人工审查 -->
    <g transform="translate(-140, -90)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <circle cx="6" cy="6" r="4" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <path d="M0 18 Q6 12 12 18" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">人工审查</text>
    </g>

    <!-- 第2项：RAG 溯源 -->
    <g transform="translate(-140, -55)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <rect x="0" y="0" width="14" height="10" rx="2" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <rect x="2" y="6" width="10" height="2" rx="1" fill="#1a1a2e"/>
        <path d="M4 12 L7 16 L10 12" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">RAG 溯源</text>
    </g>

    <!-- 第3项：提示诚实 -->
    <g transform="translate(-140, -20)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <ellipse cx="7" cy="8" rx="7" ry="6" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="5" y="11" font-family="Arial" font-size="8" fill="#1a1a2e" font-weight="bold">?</text>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">提示诚实</text>
    </g>

    <!-- 第4项：低温度 -->
    <g transform="translate(-140, 15)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <rect x="3" y="0" width="6" height="14" rx="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <circle cx="6" cy="16" r="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="1" y="10" font-family="Arial" font-size="6" fill="#409EFF" font-weight="bold">0.3</text>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">低温度 0.3</text>
    </g>

    <!-- 第5项：外部验证 -->
    <g transform="translate(30, -90)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <rect x="0" y="0" width="16" height="16" rx="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <path d="M3 8 L7 12 L13 4" stroke="#1a1a2e" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">外部验证</text>
    </g>

    <!-- 第6项：透明 UI -->
    <g transform="translate(30, -55)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <ellipse cx="8" cy="8" rx="8" ry="5" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="2.5" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">透明 UI</text>
    </g>

    <!-- 第7项：用户反馈 -->
    <g transform="translate(30, -20)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <path d="M2 14 L2 6 Q2 2 8 2 L8 6 Q14 6 14 10 L10 14 Z" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <path d="M4 10 L8 10" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M4 7 L7 7" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">用户反馈</text>
    </g>

    <!-- 第8项：定期审计 -->
    <g transform="translate(30, 15)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M4 11 L9 16 L18 6" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(30, 2)">
        <rect x="1" y="2" width="14" height="14" rx="2" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="4" y="7" font-family="Arial" font-size="6" fill="#1a1a2e" font-weight="bold">8</text>
        <text x="4" y="14" font-family="Arial" font-size="6" fill="#1a1a2e" font-weight="bold">15</text>
        <path d="M1 8 L15 8" stroke="#1a1a2e" stroke-width="0.8"/>
      </g>
      <text x="52" y="16" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">定期审计</text>
    </g>
  </g>

  <!-- 标注1：人工审核 -->
  <g transform="translate(80, 175)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">人工审核</text>
  </g>

  <!-- 标注2：溯源验证 -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">溯源验证</text>
  </g>

  <!-- 标注3：不确定性 -->
  <g transform="translate(80, 265)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">不确定性</text>
  </g>

  <!-- 标注4：参数控制 -->
  <g transform="translate(630, 175)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">参数控制</text>
  </g>

  <!-- 标注5：可解释性 -->
  <g transform="translate(630, 220)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">可解释性</text>
  </g>

  <!-- 标注6：持续改进 -->
  <g transform="translate(630, 265)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">持续改进</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="200" y1="460" x2="600" y2="460" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="460" r="4" fill="#409EFF" opacity="0.5"/>
</svg>