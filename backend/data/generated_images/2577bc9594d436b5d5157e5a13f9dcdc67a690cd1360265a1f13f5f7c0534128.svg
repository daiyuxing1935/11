<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="syncGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="asyncGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">同步 vs 异步通信对比</text>

  <!-- ====== 左侧：同步 ====== -->
  <rect x="30" y="55" width="350" height="195" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="55" width="350" height="32" rx="10" fill="#409EFF"/>
  <rect x="30" y="75" width="350" height="12" fill="#409EFF"/>
  <text x="205" y="76" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">同步通信</text>

  <!-- 时间线 -->
  <line x1="60" y1="130" x2="350" y2="130" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="350,125 360,130 350,135" fill="#1a1a2e"/>

  <!-- Agent A -->
  <rect x="60" y="105" width="70" height="28" rx="14" fill="#409EFF" opacity="0.85"/>
  <text x="95" y="123" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">发送方 A</text>

  <!-- 请求箭头 -->
  <line x1="130" y1="118" x2="190" y2="118" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
    </marker>
  </defs>
  <text x="160" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">请求</text>

  <!-- 等待图标（沙漏） -->
  <rect x="195" y="105" width="28" height="28" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="209" y="123" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FF9800">⏳</text>

  <!-- 等待文字 -->
  <text x="225" y="123" font-family="sans-serif" font-size="12" fill="#FF9800">等待中...</text>

  <!-- 响应箭头 -->
  <line x1="260" y1="118" x2="320" y2="118" stroke="#67C23A" stroke-width="2"/>
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#67C23A"/>
    </marker>
  </defs>
  <line x1="260" y1="118" x2="320" y2="118" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="290" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#67C23A">响应</text>

  <!-- 继续 -->
  <rect x="325" y="105" width="40" height="28" rx="14" fill="#409EFF" opacity="0.85"/>
  <text x="345" y="123" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">继续</text>

  <!-- 底部说明 -->
  <text x="205" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">发送请求后必须等待响应，</text>
  <text x="205" y="183" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">期间无法执行其他任务</text>

  <!-- 线性时间标注 -->
  <text x="60" y="205" font-family="sans-serif" font-size="11" fill="#909399">线性时间 →</text>
  <line x1="60" y1="210" x2="350" y2="210" stroke="#DCDFE6" stroke-width="1"/>
  <circle cx="95" cy="210" r="3" fill="#409EFF"/>
  <circle cx="209" cy="210" r="3" fill="#FF9800"/>
  <circle cx="345" cy="210" r="3" fill="#67C23A"/>

  <!-- ====== 右侧：异步 ====== -->
  <rect x="420" y="55" width="350" height="195" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="420" y="55" width="350" height="32" rx="10" fill="#409EFF"/>
  <rect x="420" y="75" width="350" height="12" fill="#409EFF"/>
  <text x="595" y="76" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">异步通信</text>

  <!-- Agent A -->
  <rect x="450" y="95" width="70" height="28" rx="14" fill="#409EFF" opacity="0.85"/>
  <text x="485" y="113" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">发送方 A</text>

  <!-- 请求箭头 -->
  <line x1="520" y1="108" x2="580" y2="108" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="550" y="102" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">请求</text>

  <!-- 立即继续 -->
  <rect x="585" y="95" width="55" height="28" rx="14" fill="#67C23A" opacity="0.85"/>
  <text x="612" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">继续工作</text>

  <!-- 并行任务条 -->
  <rect x="450" y="135" width="120" height="16" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="510" y="147" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">任务 B</text>

  <rect x="450" y="157" width="100" height="16" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="500" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">任务 C</text>

  <rect x="450" y="179" width="80" height="16" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="490" y="191" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">任务 D</text>

  <!-- 通知铃铛 -->
  <rect x="640" y="95" width="28" height="28" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="654" y="113" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FF9800">🔔</text>

  <!-- 处理响应 -->
  <rect x="680" y="95" width="70" height="28" rx="14" fill="#409EFF" opacity="0.85"/>
  <text x="715" y="113" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">处理响应</text>

  <!-- 底部说明 -->
  <text x="595" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">发送请求后立即继续其他工作，</text>
  <text x="595" y="183" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">响应到达时通过通知处理</text>

  <!-- 时间标注 -->
  <text x="450" y="210" font-family="sans-serif" font-size="11" fill="#909399">时间 →</text>
  <line x1="450" y1="215" x2="760" y2="215" stroke="#DCDFE6" stroke-width="1"/>
  <circle cx="485" cy="215" r="3" fill="#409EFF"/>
  <circle cx="612" cy="215" r="3" fill="#67C23A"/>
  <circle cx="654" cy="215" r="3" fill="#FF9800"/>

  <!-- ====== 选择指南表格 ====== -->
  <rect x="30" y="270" width="740" height="215" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="270" width="740" height="32" rx="10" fill="#1a1a2e"/>
  <rect x="30" y="290" width="740" height="12" fill="#1a1a2e"/>
  <text x="400" y="291" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">通信方式选择指南</text>

  <!-- 表头 -->
  <rect x="50" y="315" width="200" height="30" rx="4" fill="#E8F4FD"/>
  <text x="150" y="335" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">场景</text>

  <rect x="270" y="315" width="200" height="30" rx="4" fill="#E8F4FD"/>
  <text x="370" y="335" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">推荐方式</text>

  <rect x="490" y="315" width="260" height="30" rx="4" fill="#E8F4FD"/>
  <text x="620" y="335" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">说明</text>

  <!-- 行1 -->
  <rect x="50" y="350" width="200" height="28" rx="3" fill="#F5F7FA"/>
  <text x="150" y="369" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">快速查询（&lt;2s）</text>

  <rect x="270" y="350" width="200" height="28" rx="3" fill="#E8F4FD"/>
  <text x="370" y="369" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→ 同步</text>

  <rect x="490" y="350" width="260" height="28" rx="3" fill="#F5F7FA"/>
  <text x="620" y="369" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#606266">等待时间短，直接返回</text>

  <!-- 行2 -->
  <rect x="50" y="382" width="200" height="28" rx="3" fill="#F5F7FA"/>
  <text x="150" y="401" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">复杂计算（&gt;5s）</text>

  <rect x="270" y="382" width="200" height="28" rx="3" fill="#E8F4FD"/>
  <text x="370" y="401" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→ 异步</text>

  <rect x="490" y="382" width="260" height="28" rx="3" fill="#F5F7FA"/>
  <text x="620" y="401" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#606266">避免长时间阻塞</text>

  <!-- 行3 -->
  <rect x="50" y="414" width="200" height="28" rx="3" fill="#F5F7FA"/>
  <text x="150" y="433" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">不确定时长</text>

  <rect x="270" y="414" width="200" height="28" rx="3" fill="#E8F4FD"/>
  <text x="370" y="433" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→ 异步 + 进度</text>

  <rect x="490" y="414" width="260" height="28" rx="3" fill="#F5F7FA"/>
  <text x="620" y="433" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#606266">显示进度，提升体验</text>

  <!-- 行4 -->
  <rect x="50" y="446" width="200" height="28" rx="3" fill="#F5F7FA"/>
  <text x="150" y="465" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">需要结果才能继续</text>

  <rect x="270" y="446" width="200" height="28" rx="3" fill="#E8F4FD"/>
  <text x="370" y="465" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→ 同步</text>

  <rect x="490" y="446" width="260" height="28" rx="3" fill="#F5F7FA"/>
  <text x="620" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#606266">必须拿到结果再执行</text>

  <!-- 行5 -->
  <rect x="50" y="478" width="200" height="28" rx="3" fill="#F5F7FA"/>
  <text x="150" y="497" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">可以并行执行</text>

  <rect x="270" y="478" width="200" height="28" rx="3" fill="#E8F4FD"/>
  <text x="370" y="497" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">→ 异步</text>

  <rect x="490" y="478" width="260" height="28" rx="3" fill="#F5F7FA"/>
  <text x="620" y="497" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#606266">同时处理多个任务</text>

</svg>