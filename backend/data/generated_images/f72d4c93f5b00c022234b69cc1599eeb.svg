<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D6EEFA"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 黑板主体 -->
  <rect x="230" y="60" width="340" height="260" rx="8" ry="8" fill="url(#boardGrad)" filter="url(#shadow)"/>
  <rect x="230" y="60" width="340" height="260" rx="8" ry="8" fill="none" stroke="#3d5a73" stroke-width="3"/>

  <!-- 黑板内部分隔线 -->
  <line x1="230" y1="145" x2="570" y2="145" stroke="#4a6a5a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="230" y1="230" x2="570" y2="230" stroke="#4a6a5a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 分区标题 -->
  <text x="400" y="90" text-anchor="middle" fill="#A8D8B8" font-size="12" font-family="sans-serif">知识项</text>
  <text x="400" y="175" text-anchor="middle" fill="#A8D8B8" font-size="12" font-family="sans-serif">任务</text>
  <text x="400" y="258" text-anchor="middle" fill="#A8D8B8" font-size="12" font-family="sans-serif">部分结果</text>

  <!-- 知识项 - 文档图标 -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="18" height="22" rx="2" fill="#7EC8A0" stroke="none"/>
    <rect x="3" y="3" width="12" height="2" rx="1" fill="#3d5a73"/>
    <rect x="3" y="8" width="12" height="2" rx="1" fill="#3d5a73"/>
    <rect x="3" y="13" width="8" height="2" rx="1" fill="#3d5a73"/>
  </g>
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="18" height="22" rx="2" fill="#7EC8A0" stroke="none"/>
    <rect x="3" y="3" width="12" height="2" rx="1" fill="#3d5a73"/>
    <rect x="3" y="8" width="12" height="2" rx="1" fill="#3d5a73"/>
    <rect x="3" y="13" width="8" height="2" rx="1" fill="#3d5a73"/>
  </g>
  <g transform="translate(360, 100)">
    <rect x="0" y="0" width="18" height="22" rx="2" fill="#7EC8A0" stroke="none"/>
    <rect x="3" y="3" width="12" height="2" rx="1" fill="#3d5a73"/>
    <rect x="3" y="8" width="12" height="2" rx="1" fill="#3d5a73"/>
    <rect x="3" y="13" width="8" height="2" rx="1" fill="#3d5a73"/>
  </g>
  <text x="410" y="117" fill="#B8D8C8" font-size="11" font-family="sans-serif">文档1</text>
  <text x="410" y="132" fill="#B8D8C8" font-size="11" font-family="sans-serif">文档2</text>

  <!-- 任务 - 剪贴板 -->
  <g transform="translate(290, 155)">
    <rect x="0" y="3" width="24" height="28" rx="3" fill="#7EC8A0" stroke="none"/>
    <rect x="7" y="0" width="10" height="6" rx="2" fill="#5a9a7a" stroke="none"/>
    <rect x="4" y="10" width="16" height="2" rx="1" fill="#3d5a73"/>
    <rect x="4" y="15" width="16" height="2" rx="1" fill="#3d5a73"/>
    <rect x="4" y="20" width="10" height="2" rx="1" fill="#3d5a73"/>
  </g>
  <text x="330" y="175" fill="#B8D8C8" font-size="11" font-family="sans-serif">任务列表...</text>

  <!-- 部分结果 - 拼图 -->
  <g transform="translate(290, 240)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#7EC8A0" stroke="#3d5a73" stroke-width="1"/>
    <rect x="18" y="0" width="16" height="16" rx="2" fill="#5a9a7a" stroke="#3d5a73" stroke-width="1"/>
    <rect x="0" y="18" width="16" height="16" rx="2" fill="#5a9a7a" stroke="#3d5a73" stroke-width="1"/>
    <rect x="18" y="18" width="16" height="16" rx="2" fill="#3d5a73" stroke="#3d5a73" stroke-width="1"/>
  </g>
  <text x="330" y="258" fill="#B8D8C8" font-size="11" font-family="sans-serif">完成75%</text>

  <!-- 调度器 - 连接在黑板上方 -->
  <rect x="260" y="28" width="280" height="28" rx="6" fill="#409EFF" filter="url(#shadow)"/>
  <text x="400" y="46" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">调度器</text>

  <!-- 调度器功能标签 -->
  <rect x="268" y="30" width="80" height="24" rx="4" fill="#fff" opacity="0.2"/>
  <text x="308" y="46" text-anchor="middle" fill="#fff" font-size="9" font-family="sans-serif">匹配任务与能力</text>

  <rect x="360" y="30" width="70" height="24" rx="4" fill="#fff" opacity="0.2"/>
  <text x="395" y="46" text-anchor="middle" fill="#fff" font-size="9" font-family="sans-serif">管理优先级</text>

  <rect x="442" y="30" width="80" height="24" rx="4" fill="#fff" opacity="0.2"/>
  <text x="482" y="46" text-anchor="middle" fill="#fff" font-size="9" font-family="sans-serif">触发检测</text>

  <!-- 智能体 A - 搜索 -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="4" fill="#409EFF"/>
    <line x1="32" y1="32" x2="38" y2="38" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <text x="55" y="22" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">智能体 A</text>
    <text x="55" y="40" fill="#666" font-size="11" font-family="sans-serif">搜索</text>
    <!-- 读写箭头 -->
    <line x1="130" y1="25" x2="165" y2="25" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="165" y1="45" x2="130" y2="45" stroke="#FF6B6B" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  </g>

  <!-- 智能体 B - 分析 -->
  <g transform="translate(60, 240)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <text x="21" y="30" text-anchor="middle" fill="#409EFF" font-size="14" font-weight="bold" font-family="sans-serif">∑</text>
    <text x="55" y="22" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">智能体 B</text>
    <text x="55" y="40" fill="#666" font-size="11" font-family="sans-serif">分析</text>
    <line x1="130" y1="25" x2="165" y2="25" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="165" y1="45" x2="130" y2="45" stroke="#FF6B6B" stroke-width="1.5"/>
  </g>

  <!-- 智能体 C - 写作 -->
  <g transform="translate(610, 180)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="25" cy="25" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="19" y1="25" x2="31" y2="25" stroke="#409EFF" stroke-width="2"/>
    <line x1="22" y1="30" x2="28" y2="30" stroke="#409EFF" stroke-width="1.5"/>
    <text x="55" y="22" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">智能体 C</text>
    <text x="55" y="40" fill="#666" font-size="11" font-family="sans-serif">写作</text>
    <line x1="0" y1="25" x2="-35" y2="25" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-35" y1="45" x2="0" y2="45" stroke="#FF6B6B" stroke-width="1.5"/>
  </g>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FF6B6B"/>
    </marker>
  </defs>

  <!-- 读写箭头 - 智能体A到黑板 -->
  <line x1="190" y1="145" x2="225" y2="145" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="225" y1="165" x2="190" y2="165" stroke="#FF6B6B" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- 读写箭头 - 智能体B到黑板 -->
  <line x1="190" y1="265" x2="225" y2="265" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="225" y1="285" x2="190" y2="285" stroke="#FF6B6B" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- 读写箭头 - 智能体C到黑板 -->
  <line x1="610" y1="205" x2="575" y2="205" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="575" y1="225" x2="610" y2="225" stroke="#FF6B6B" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- 标注 -->
  <g transform="translate(65, 195)">
    <rect x="0" y="0" width="90" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="15" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">读写黑板</text>
  </g>

  <g transform="translate(615, 260)">
    <rect x="0" y="0" width="90" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
    <text x="45" y="15" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">协作共享</text>
  </g>

  <!-- 对比图例 -->
  <g transform="translate(60, 370)">
    <rect x="0" y="0" width="680" height="110" rx="10" fill="#fff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="340" y="25" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">消息传递 vs 黑板架构</text>

    <!-- 左侧：点对点 -->
    <rect x="30" y="40" width="280" height="55" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1"/>
    <text x="170" y="58" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold" font-family="sans-serif">消息传递：智能体→智能体</text>
    <text x="170" y="78" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">(点对点)</text>
    <circle cx="60" cy="72" r="8" fill="#409EFF" opacity="0.3"/>
    <circle cx="90" cy="72" r="8" fill="#409EFF" opacity="0.3"/>
    <line x1="68" y1="72" x2="82" y2="72" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 右侧：黑板 -->
    <rect x="370" y="40" width="280" height="55" rx="6" fill="#F0F7FF" stroke="#409EFF" stroke-width="1"/>
    <text x="510" y="58" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="bold" font-family="sans-serif">黑板：智能体→黑板→智能体</text>
    <text x="510" y="78" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">(发布-发现)</text>
    <rect x="400" y="64" width="16" height="16" rx="2" fill="#409EFF" opacity="0.3"/>
    <circle cx="440" cy="72" r="8" fill="#409EFF" opacity="0.3"/>
    <circle cx="470" cy="72" r="8" fill="#409EFF" opacity="0.3"/>
    <line x1="416" y1="72" x2="432" y2="72" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="448" y1="72" x2="462" y2="72" stroke="#409EFF" stroke-width="1.5"/>
  </g>

  <!-- 标题 -->
  <text x="400" y="350" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold" font-family="sans-serif">黑板架构协作模式</text>

</svg>