<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="agentGradA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6F0FF"/>
      <stop offset="100%" stop-color="#D6E8FF"/>
    </linearGradient>
    <linearGradient id="agentGradB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D8ECFF"/>
    </linearGradient>
    <linearGradient id="agentGradC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#DCEAFF"/>
    </linearGradient>
    <linearGradient id="commGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 主框架 - 多智能体系统 -->
  <rect x="50" y="60" width="700" height="380" rx="18" ry="18" fill="none" stroke="#409EFF" stroke-width="3" stroke-dasharray="0"/>
  <rect x="50" y="60" width="700" height="380" rx="18" ry="18" fill="rgba(64,158,255,0.04)"/>

  <!-- 框架标题 -->
  <rect x="250" y="45" width="300" height="36" rx="18" ry="18" fill="url(#frameGrad)"/>
  <text x="400" y="69" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">多智能体系统 (Multi-Agent System)</text>

  <!-- ========== 智能体 A - 研究员 ========== -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="195" height="170" rx="12" ry="12" fill="url(#agentGradA)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 角色标题 -->
    <rect x="0" y="0" width="195" height="36" rx="12" ry="12" fill="#409EFF"/>
    <rect x="0" y="18" width="195" height="18" fill="#409EFF"/>
    <text x="97" y="24" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">智能体 A · 研究员</text>

    <!-- 图标：搜索 -->
    <circle cx="30" cy="62" r="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="39" y1="71" x2="48" y2="80" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 工具 -->
    <text x="52" y="67" fill="#1a1a2e" font-size="14" font-weight="bold">工具：搜索</text>

    <!-- 知识域 -->
    <rect x="12" y="88" width="170" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="97" y="107" text-anchor="middle" fill="#1a1a2e" font-size="13">知识域：学术论文</text>

    <!-- 描述 -->
    <text x="97" y="142" text-anchor="middle" fill="#666" font-size="12">负责信息检索与</text>
    <text x="97" y="158" text-anchor="middle" fill="#666" font-size="12">数据收集</text>
  </g>

  <!-- ========== 智能体 B - 分析师 ========== -->
  <g transform="translate(302, 120)">
    <rect x="0" y="0" width="195" height="170" rx="12" ry="12" fill="url(#agentGradB)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 角色标题 -->
    <rect x="0" y="0" width="195" height="36" rx="12" ry="12" fill="#409EFF"/>
    <rect x="0" y="18" width="195" height="18" fill="#409EFF"/>
    <text x="97" y="24" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">智能体 B · 分析师</text>

    <!-- 图标：代码 -->
    <text x="20" y="68" text-anchor="middle" fill="#409EFF" font-size="22" font-weight="bold">&lt;/&gt;</text>

    <!-- 工具 -->
    <text x="52" y="67" fill="#1a1a2e" font-size="14" font-weight="bold">工具：代码</text>

    <!-- 知识域 -->
    <rect x="12" y="88" width="170" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="97" y="107" text-anchor="middle" fill="#1a1a2e" font-size="13">知识域：数据分析</text>

    <!-- 描述 -->
    <text x="97" y="142" text-anchor="middle" fill="#666" font-size="12">负责数据建模与</text>
    <text x="97" y="158" text-anchor="middle" fill="#666" font-size="12">统计分析</text>
  </g>

  <!-- ========== 智能体 C - 作家 ========== -->
  <g transform="translate(524, 120)">
    <rect x="0" y="0" width="195" height="170" rx="12" ry="12" fill="url(#agentGradC)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 角色标题 -->
    <rect x="0" y="0" width="195" height="36" rx="12" ry="12" fill="#409EFF"/>
    <rect x="0" y="18" width="195" height="18" fill="#409EFF"/>
    <text x="97" y="24" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold">智能体 C · 作家</text>

    <!-- 图标：编辑 -->
    <text x="22" y="68" text-anchor="middle" fill="#409EFF" font-size="22">✎</text>

    <!-- 工具 -->
    <text x="52" y="67" fill="#1a1a2e" font-size="14" font-weight="bold">工具：编辑</text>

    <!-- 知识域 -->
    <rect x="12" y="88" width="170" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="97" y="107" text-anchor="middle" fill="#1a1a2e" font-size="13">知识域：自然语言</text>

    <!-- 描述 -->
    <text x="97" y="142" text-anchor="middle" fill="#666" font-size="12">负责内容生成与</text>
    <text x="97" y="158" text-anchor="middle" fill="#666" font-size="12">文本润色</text>
  </g>

  <!-- ========== 通信基础设施 ========== -->
  <g transform="translate(80, 330)">
    <rect x="0" y="0" width="640" height="44" rx="10" ry="10" fill="url(#commGrad)" opacity="0.9"/>
    <rect x="0" y="0" width="640" height="44" rx="10" ry="10" fill="none" stroke="#2B7ED6" stroke-width="1.5"/>

    <!-- 消息队列图标 -->
    <rect x="16" y="12" width="20" height="20" rx="4" ry="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="22" y1="18" x2="30" y2="18" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="22" y1="24" x2="28" y2="24" stroke="#FFFFFF" stroke-width="1.5"/>

    <text x="50" y="28" fill="#FFFFFF" font-size="15" font-weight="bold">通信基础设施 (消息队列 / 总线)</text>

    <!-- 连接线到各智能体 -->
    <line x1="60" y1="-10" x2="60" y2="0" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="320" y1="-10" x2="320" y2="0" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="580" y1="-10" x2="580" y2="0" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- ========== 能力标注 ========== -->

  <!-- 感知 - 左上 -->
  <g transform="translate(55, 72)">
    <rect x="-8" y="-8" width="80" height="32" rx="16" ry="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 眼睛图标 -->
    <circle cx="8" cy="8" r="5" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="2" fill="#409EFF"/>
    <text x="22" y="13" fill="#1a1a2e" font-size="13" font-weight="bold">感知</text>
  </g>

  <!-- 决策 - 右上 -->
  <g transform="translate(665, 72)">
    <rect x="-8" y="-8" width="80" height="32" rx="16" ry="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 大脑图标 -->
    <circle cx="8" cy="8" r="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M4,8 Q8,2 12,8" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <text x="22" y="13" fill="#1a1a2e" font-size="13" font-weight="bold">决策</text>
  </g>

  <!-- 行动 - 左下 -->
  <g transform="translate(55, 405)">
    <rect x="-8" y="-8" width="80" height="32" rx="16" ry="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 手/齿轮图标 -->
    <circle cx="8" cy="8" r="5" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="8" y1="3" x2="8" y2="13" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="3" y1="8" x2="13" y2="8" stroke="#409EFF" stroke-width="1.2"/>
    <text x="22" y="13" fill="#1a1a2e" font-size="13" font-weight="bold">行动</text>
  </g>

  <!-- 通信 - 右下 -->
  <g transform="translate(665, 405)">
    <rect x="-8" y="-8" width="80" height="32" rx="16" ry="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 对话气泡图标 -->
    <rect x="3" y="3" width="12" height="10" rx="3" ry="3" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="6,13 9,10 12,13" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <text x="22" y="13" fill="#1a1a2e" font-size="13" font-weight="bold">通信</text>
  </g>

  <!-- 顶部装饰线 -->
  <line x1="300" y1="0" x2="500" y2="0" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
</svg>