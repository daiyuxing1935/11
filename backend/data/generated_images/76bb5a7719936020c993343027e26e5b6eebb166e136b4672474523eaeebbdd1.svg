<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <linearGradient id="darkBlueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">传统方式 vs MCP协议方式</text>

  <!-- ===== 左侧：传统方式 ===== -->
  <text x="200" y="70" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">传统方式：混乱直连</text>

  <!-- 左侧三个Agent框 -->
  <rect x="95" y="90" width="110" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="150" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Agent 1</text>

  <rect x="95" y="150" width="110" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="150" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Agent 2</text>

  <rect x="95" y="210" width="110" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="150" y="235" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Agent 3</text>

  <!-- 左侧三个工具框 -->
  <rect x="280" y="100" width="100" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="330" y="123" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">工具 A</text>

  <rect x="280" y="160" width="100" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="330" y="183" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">工具 B</text>

  <rect x="280" y="220" width="100" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="330" y="243" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">工具 C</text>

  <!-- 左侧混乱连线 -->
  <line x1="205" y1="110" x2="280" y2="118" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>
  <line x1="205" y1="110" x2="280" y2="178" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>
  <line x1="205" y1="110" x2="280" y2="238" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>

  <line x1="205" y1="170" x2="280" y2="118" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>
  <line x1="205" y1="170" x2="280" y2="178" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>
  <line x1="205" y1="170" x2="280" y2="238" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>

  <line x1="205" y1="230" x2="280" y2="118" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>
  <line x1="205" y1="230" x2="280" y2="178" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>
  <line x1="205" y1="230" x2="280" y2="238" stroke="#E74C3C" stroke-width="1.8" opacity="0.7"/>

  <!-- 复杂度标注 - 左侧 -->
  <text x="260" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#E74C3C" font-weight="bold">M×N 混乱</text>

  <rect x="215" y="275" width="80" height="26" rx="13" fill="#E74C3C" opacity="0.8"/>
  <text x="255" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">复杂度高</text>

  <!-- ===== 右侧：MCP方式 ===== -->
  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">MCP协议方式：标准化</text>

  <!-- 右侧三个Agent框 -->
  <rect x="470" y="90" width="110" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="525" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Agent 1</text>

  <rect x="470" y="150" width="110" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="525" y="175" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Agent 2</text>

  <rect x="470" y="210" width="110" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="525" y="235" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">Agent 3</text>

  <!-- MCP中心枢纽 -->
  <rect x="610" y="140" width="120" height="50" rx="25" fill="url(#blueGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="670" y="170" text-anchor="middle" font-family="sans-serif" font-size="15" fill="white" font-weight="bold">MCP协议</text>

  <!-- 右侧三个工具框 -->
  <rect x="760" y="100" width="30" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="775" y="123" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">A</text>

  <rect x="760" y="160" width="30" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="775" y="183" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">B</text>

  <rect x="760" y="220" width="30" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="775" y="243" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">C</text>

  <!-- Agent到MCP的连线 -->
  <line x1="580" y1="110" x2="610" y2="155" stroke="#409EFF" stroke-width="2.5" opacity="0.8"/>
  <line x1="580" y1="170" x2="610" y2="165" stroke="#409EFF" stroke-width="2.5" opacity="0.8"/>
  <line x1="580" y1="230" x2="610" y2="175" stroke="#409EFF" stroke-width="2.5" opacity="0.8"/>

  <!-- MCP到工具的连线 -->
  <line x1="730" y1="155" x2="760" y2="118" stroke="#409EFF" stroke-width="2.5" opacity="0.8"/>
  <line x1="730" y1="165" x2="760" y2="178" stroke="#409EFF" stroke-width="2.5" opacity="0.8"/>
  <line x1="730" y1="175" x2="760" y2="238" stroke="#409EFF" stroke-width="2.5" opacity="0.8"/>

  <!-- 标准化标注 -->
  <text x="670" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">统一接口</text>

  <rect x="615" y="210" width="110" height="26" rx="13" fill="#409EFF" opacity="0.85"/>
  <text x="670" y="228" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">复杂度降低</text>

  <!-- 底部说明 -->
  <rect x="250" y="330" width="300" height="36" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="353" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">M×N 复杂度 → M+N 复杂度，标准化交互</text>

  <!-- 左侧箭头标注 -->
  <text x="205" y="320" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#E74C3C">9条连接</text>

  <!-- 右侧箭头标注 -->
  <text x="670" y="320" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">6条连接</text>

  <!-- 分隔线 -->
  <line x1="400" y1="55" x2="400" y2="310" stroke="#1a1a2e" stroke-width="1" opacity="0.12" stroke-dasharray="6,4"/>

</svg>