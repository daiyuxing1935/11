<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2d7fd3"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5aabf5"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 顶部标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">程序 → 知识 → 智能体的演进</text>

  <!-- ===== 左侧面板：传统程序 ===== -->
  <g transform="translate(40, 65)">
    <!-- 面板背景 -->
    <rect x="0" y="0" width="220" height="280" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#f5f9ff" opacity="0.5"/>

    <!-- 标题 -->
    <rect x="10" y="10" width="200" height="36" rx="18" fill="url(#blueGrad)"/>
    <text x="110" y="33" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="white" font-weight="bold">传统程序</text>

    <!-- 传送带机器 -->
    <rect x="25" y="65" width="170" height="40" rx="6" fill="#e0eaf5" stroke="#409EFF" stroke-width="1"/>
    <text x="110" y="90" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">传送带</text>

    <!-- 齿轮 -->
    <circle cx="55" cy="130" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="55" cy="130" r="6" fill="#409EFF"/>
    <line x1="45" y1="120" x2="65" y2="140" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="65" y1="120" x2="45" y2="140" stroke="#409EFF" stroke-width="1.5"/>

    <circle cx="110" cy="130" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="110" cy="130" r="6" fill="#409EFF"/>
    <line x1="100" y1="120" x2="120" y2="140" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="120" y1="120" x2="100" y2="140" stroke="#409EFF" stroke-width="1.5"/>

    <circle cx="165" cy="130" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="165" cy="130" r="6" fill="#409EFF"/>
    <line x1="155" y1="120" x2="175" y2="140" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="175" y1="120" x2="155" y2="140" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 固定路径箭头 -->
    <path d="M30 170 L190 170" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="190,165 198,170 190,175" fill="#409EFF"/>

    <!-- 标注 -->
    <rect x="25" y="195" width="170" height="32" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1"/>
    <text x="110" y="215" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">固定规则 / 无弹性</text>

    <!-- 底部小标签 -->
    <rect x="25" y="240" width="170" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="258" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">工具</text>
  </g>

  <!-- ===== 中间面板：LLM ===== -->
  <g transform="translate(290, 65)">
    <!-- 面板背景 -->
    <rect x="0" y="0" width="220" height="280" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#f5f9ff" opacity="0.5"/>

    <!-- 标题 -->
    <rect x="10" y="10" width="200" height="36" rx="18" fill="url(#brainGrad)"/>
    <text x="110" y="33" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="white" font-weight="bold">大语言模型</text>

    <!-- 大脑形状的图书馆 -->
    <!-- 大脑轮廓 -->
    <path d="M110 55 C80 55, 55 70, 50 95 C45 115, 50 130, 60 140 C55 150, 55 165, 65 175 C75 185, 90 185, 100 180 C105 190, 115 195, 125 190 C135 195, 145 190, 150 180 C160 185, 175 185, 185 175 C195 165, 195 150, 190 140 C200 130, 205 115, 200 95 C195 70, 170 55, 140 55 Z" fill="none" stroke="#409EFF" stroke-width="2"/>

    <!-- 书架线条 -->
    <line x1="72" y1="95" x2="148" y2="95" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="68" y1="115" x2="152" y2="115" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="70" y1="135" x2="150" y2="135" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="75" y1="155" x2="145" y2="155" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>

    <!-- 书籍 -->
    <rect x="78" y="75" width="8" height="18" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="89" y="72" width="7" height="21" rx="1" fill="#2d7fd3" opacity="0.7"/>
    <rect x="100" y="76" width="9" height="17" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="115" y="73" width="6" height="20" rx="1" fill="#2d7fd3" opacity="0.6"/>
    <rect x="126" y="77" width="8" height="16" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="138" y="74" width="7" height="19" rx="1" fill="#2d7fd3" opacity="0.5"/>

    <rect x="80" y="97" width="7" height="16" rx="1" fill="#2d7fd3" opacity="0.6"/>
    <rect x="92" y="99" width="9" height="14" rx="1" fill="#409EFF" opacity="0.5"/>
    <rect x="108" y="96" width="6" height="17" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="120" y="100" width="8" height="13" rx="1" fill="#2d7fd3" opacity="0.6"/>
    <rect x="133" y="97" width="7" height="16" rx="1" fill="#409EFF" opacity="0.5"/>

    <rect x="82" y="117" width="8" height="16" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="95" y="119" width="7" height="14" rx="1" fill="#2d7fd3" opacity="0.5"/>
    <rect x="110" y="116" width="9" height="17" rx="1" fill="#409EFF" opacity="0.7"/>
    <rect x="125" y="120" width="6" height="13" rx="1" fill="#2d7fd3" opacity="0.6"/>

    <rect x="84" y="137" width="7" height="16" rx="1" fill="#2d7fd3" opacity="0.5"/>
    <rect x="98" y="139" width="8" height="14" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="113" y="136" width="7" height="17" rx="1" fill="#2d7fd3" opacity="0.7"/>
    <rect x="127" y="140" width="9" height="13" rx="1" fill="#409EFF" opacity="0.5"/>

    <!-- 知识光芒 -->
    <line x1="160" y1="80" x2="175" y2="70" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="165" y1="100" x2="182" y2="95" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="162" y1="120" x2="178" y2="118" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="160" y1="140" x2="176" y2="142" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

    <!-- 标注 -->
    <rect x="25" y="210" width="170" height="32" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1"/>
    <text x="110" y="230" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">海量知识 / 无行动力</text>

    <!-- 底部小标签 -->
    <rect x="25" y="255" width="170" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="273" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">知识</text>
  </g>

  <!-- ===== 右侧面板：AI Agent ===== -->
  <g transform="translate(540, 65)">
    <!-- 面板背景 -->
    <rect x="0" y="0" width="220" height="280" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
    <rect x="0" y="0" width="220" height="280" rx="12" fill="#f5f9ff" opacity="0.5"/>

    <!-- 标题 -->
    <rect x="10" y="10" width="200" height="36" rx="18" fill="#1a1a2e"/>
    <text x="110" y="33" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" fill="white" font-weight="bold">AI 智能体</text>

    <!-- 机器人厨师 -->
    <!-- 身体 -->
    <rect x="85" y="100" width="50" height="45" rx="8" fill="#e0eaf5" stroke="#409EFF" stroke-width="1.5"/>

    <!-- 头 -->
    <rect x="90" y="68" width="40" height="32" rx="10" fill="#409EFF"/>
    <!-- 眼睛 -->
    <circle cx="103" cy="82" r="4" fill="white"/>
    <circle cx="117" cy="82" r="4" fill="white"/>
    <!-- 天线 -->
    <line x1="110" y1="68" x2="110" y2="55" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="110" cy="52" r="3" fill="#409EFF"/>

    <!-- 围裙 -->
    <path d="M90 130 L85 145 L135 145 L130 130" fill="white" stroke="#409EFF" stroke-width="1"/>

    <!-- 左手臂 - 拿锅铲 -->
    <line x1="85" y1="110" x2="60" y2="125" stroke="#409EFF" stroke-width="2.5"/>
    <rect x="52" y="122" width="14" height="6" rx="2" fill="#2d7fd3" transform="rotate(-15,59,125)"/>

    <!-- 右手臂 - 拿勺子 -->
    <line x1="135" y1="110" x2="155" y2="120" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="160" cy="123" r="6" fill="#2d7fd3"/>

    <!-- 炉灶 -->
    <rect x="65" y="148" width="90" height="20" rx="4" fill="#d0dae8" stroke="#409EFF" stroke-width="1"/>
    <circle cx="80" cy="158" r="4" fill="#409EFF" opacity="0.6"/>
    <circle cx="100" cy="158" r="4" fill="#409EFF" opacity="0.6"/>
    <circle cx="120" cy="158" r="4" fill="#409EFF" opacity="0.6"/>
    <circle cx="140" cy="158" r="4" fill="#409EFF" opacity="0.6"/>

    <!-- 火焰 -->
    <path d="M95 148 Q98 140, 100 148 Q102 140, 105 148" fill="#ff6b35" opacity="0.7"/>
    <path d="M115 148 Q118 138, 120 148 Q122 138, 125 148" fill="#ff6b35" opacity="0.7"/>

    <!-- 锅 -->
    <rect x="92" y="140" width="36" height="10" rx="3" fill="#b0c4de" stroke="#409EFF" stroke-width="1"/>

    <!-- 食材 -->
    <circle cx="62" cy="145" r="5" fill="#409EFF" opacity="0.5"/>
    <rect x="148" y="142" width="8" height="8" rx="2" fill="#2d7fd3" opacity="0.5"/>
    <circle cx="70" cy="152" r="4" fill="#409EFF" opacity="0.4"/>

    <!-- 菜谱 -->
    <rect x="155" y="88" width="18" height="24" rx="2" fill="white" stroke="#409EFF" stroke-width="1"/>
    <line x1="158" y1="94" x2="170" y2="94" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="158" y1="98" x2="170" y2="98" stroke="#409EFF" stroke-width="0.8"/>
    <line x1="158" y1="102" x2="168" y2="102" stroke="#409EFF" stroke-width="0.8"/>

    <!-- 标注 -->
    <rect x="25" y="210" width="170" height="32" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1"/>
    <text x="110" y="230" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">主动执行 / 使用工具</text>

    <!-- 底部小标签 -->
    <rect x="25" y="255" width="170" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="273" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">智能体</text>
  </g>

  <!-- ===== 底部桥接隐喻 ===== -->
  <g transform="translate(0, 370)">
    <!-- 桥接线 -->
    <line x1="150" y1="20" x2="260" y2="20" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>
    <line x1="370" y1="20" x2="480" y2="20" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- 箭头 -->
    <polygon points="260,15 270,20 260,25" fill="#409EFF"/>
    <polygon points="480,15 490,20 480,25" fill="#409EFF"/>

    <!-- 三个桥墩 -->
    <rect x="120" y="30" width="60" height="35" rx="8" fill="#1a1a2e"/>
    <text x="150" y="52" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="white" font-weight="bold">工具</text>

    <rect x="340" y="30" width="60" height="35" rx="8" fill="#1a1a2e"/>
    <text x="370" y="52" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="white" font-weight="bold">知识</text>

    <rect x="560" y="30" width="60" height="35" rx="8" fill="#1a1a2e"/>
    <text x="590" y="52" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="white" font-weight="bold">工作者</text>

    <!-- 桥面文字 -->
    <text x="150" y="90" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">被动执行</text>
    <text x="370" y="90" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">静态知识</text>
    <text x="590" y="90" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF" opacity="0.7">主动行动</text>

    <!-- 桥面 -->
    <path d="M80 75 Q200 65, 300 75 Q400 85, 500 75 Q600 65, 720 75" fill="none" stroke="#409EFF" stroke-width="2.5" opacity="0.4"/>
  </g>
</svg>