<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF8E8E"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2D7FE0"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">协作模式 vs 竞争模式</text>

  <!-- 分隔线 -->
  <line x1="400" y1="50" x2="400" y2="470" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- ===== 左侧：协作模式 ===== -->
  <rect x="30" y="60" width="340" height="420" rx="14" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.9"/>

  <!-- 左侧标题 -->
  <rect x="30" y="60" width="340" height="40" rx="14" fill="#409EFF"/>
  <rect x="30" y="86" width="340" height="14" fill="#409EFF"/>
  <text x="200" y="86" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">协 作 模 式</text>

  <!-- 协作模式图标区域 -->
  <!-- 三个智能体 -->
  <circle cx="100" cy="150" r="22" fill="url(#leftGrad)" opacity="0.9"/>
  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">A</text>

  <circle cx="200" cy="140" r="22" fill="url(#leftGrad)" opacity="0.9"/>
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">B</text>

  <circle cx="300" cy="150" r="22" fill="url(#leftGrad)" opacity="0.9"/>
  <text x="300" y="155" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">C</text>

  <!-- 握手图标（A-B） -->
  <g transform="translate(140, 135)">
    <rect x="0" y="0" width="24" height="12" rx="6" fill="#409EFF" opacity="0.3"/>
    <path d="M4,6 L20,6" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M8,3 L12,6 L16,3" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 握手图标（B-C） -->
  <g transform="translate(240, 135)">
    <rect x="0" y="0" width="24" height="12" rx="6" fill="#409EFF" opacity="0.3"/>
    <path d="M4,6 L20,6" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M8,3 L12,6 L16,3" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 信息流动箭头 -->
  <path d="M85,175 Q100,195 115,175" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrowSmall)"/>
  <path d="M185,165 Q200,185 215,165" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M285,175 Q300,195 315,175" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- 汇聚箭头指向目标旗帜 -->
  <path d="M100,175 L100,230" stroke="#409EFF" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M200,165 L200,230" stroke="#409EFF" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M300,175 L300,230" stroke="#409EFF" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- 汇聚点 -->
  <circle cx="200" cy="240" r="6" fill="#409EFF" opacity="0.5"/>

  <!-- 目标旗帜 -->
  <g transform="translate(200, 260)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a2e" stroke-width="2.5"/>
    <path d="M2,2 L40,12 L2,22 Z" fill="url(#flagGrad)"/>
    <text x="20" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">目标</text>
  </g>

  <!-- 协作标注 -->
  <rect x="55" y="320" width="120" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
  <text x="115" y="339" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">信息共享</text>

  <rect x="195" y="320" width="120" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
  <text x="255" y="339" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">共同目标</text>

  <!-- 协作示例 -->
  <rect x="55" y="365" width="290" height="95" rx="10" fill="#F0F8FF" stroke="#409EFF" stroke-width="1" opacity="0.7"/>

  <text x="200" y="388" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">示例场景</text>

  <!-- 示例1：团队合作 -->
  <circle cx="85" cy="415" r="12" fill="#409EFF" opacity="0.2"/>
  <text x="85" y="419" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">🤝</text>
  <text x="105" y="420" font-family="sans-serif" font-size="11" fill="#1a1a2e">团队合作开发</text>

  <!-- 示例2：知识共享 -->
  <circle cx="85" cy="442" r="12" fill="#409EFF" opacity="0.2"/>
  <text x="85" y="446" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">📚</text>
  <text x="105" y="447" font-family="sans-serif" font-size="11" fill="#1a1a2e">知识共享与互助</text>

  <!-- ===== 右侧：竞争模式 ===== -->
  <rect x="430" y="60" width="340" height="420" rx="14" fill="white" stroke="#FF6B6B" stroke-width="2" opacity="0.9"/>

  <!-- 右侧标题 -->
  <rect x="430" y="60" width="340" height="40" rx="14" fill="#FF6B6B"/>
  <rect x="430" y="86" width="340" height="14" fill="#FF6B6B"/>
  <text x="600" y="86" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">竞 争 模 式</text>

  <!-- 竞争模式图标区域 -->
  <!-- 两个对手 -->
  <circle cx="520" cy="150" r="24" fill="#FF6B6B" opacity="0.85"/>
  <text x="520" y="155" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">甲</text>

  <circle cx="680" cy="150" r="24" fill="#FF8E8E" opacity="0.85"/>
  <text x="680" y="155" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">乙</text>

  <!-- VS 符号 -->
  <g transform="translate(585, 135)">
    <circle cx="15" cy="15" r="18" fill="#FF6B6B" opacity="0.15"/>
    <text x="15" y="21" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FF6B6B">VS</text>
  </g>

  <!-- 辩论气泡 -->
  <g transform="translate(490, 90)">
    <rect x="0" y="0" width="55" height="30" rx="10" fill="#FF6B6B" opacity="0.1" stroke="#FF6B6B" stroke-width="1"/>
    <text x="27" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6B6B">我的方案好！</text>
  </g>

  <g transform="translate(655, 90)">
    <rect x="0" y="0" width="55" height="30" rx="10" fill="#FF8E8E" opacity="0.1" stroke="#FF8E8E" stroke-width="1"/>
    <text x="27" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF8E8E">我的更优！</text>
  </g>

  <!-- 裁判 -->
  <g transform="translate(600, 190)">
    <circle cx="0" cy="0" r="18" fill="#FFD700" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#DAA520">⚖</text>
    <text x="0" y="24" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">裁判</text>
  </g>

  <!-- 竞争标注 -->
  <rect x="455" y="320" width="120" height="28" rx="14" fill="#FF6B6B" opacity="0.12"/>
  <text x="515" y="339" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FF6B6B" font-weight="bold">对抗辩论</text>

  <rect x="625" y="320" width="120" height="28" rx="14" fill="#FF6B6B" opacity="0.12"/>
  <text x="685" y="339" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FF6B6B" font-weight="bold">裁判裁决</text>

  <!-- 竞争示例 -->
  <rect x="455" y="365" width="290" height="95" rx="10" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="1" opacity="0.7"/>

  <text x="600" y="388" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">示例场景</text>

  <!-- 示例1：辩论 -->
  <circle cx="485" cy="415" r="12" fill="#FF6B6B" opacity="0.2"/>
  <text x="485" y="419" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6B6B">🗣</text>
  <text x="505" y="420" font-family="sans-serif" font-size="11" fill="#1a1a2e">辩论赛（正反方+裁判）</text>

  <!-- 示例2：攻防 -->
  <circle cx="485" cy="442" r="12" fill="#FF6B6B" opacity="0.2"/>
  <text x="485" y="446" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6B6B">🛡</text>
  <text x="505" y="447" font-family="sans-serif" font-size="11" fill="#1a1a2e">代码攻防（写代码 vs 找漏洞）</text>

  <!-- 底部说明 -->
  <rect x="250" y="478" width="300" height="18" rx="9" fill="#409EFF" opacity="0.08"/>
  <text x="400" y="491" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">协作凝聚力量 · 竞争激发创新</text>

</svg>