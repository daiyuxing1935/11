<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#79BBFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">Transformer 学习路线图</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- 曲线路径 -->
  <path d="M 100 420 Q 200 380, 280 340 Q 360 300, 420 260 Q 480 220, 540 180 Q 600 140, 680 110"
        fill="none" stroke="url(#pathGrad)" stroke-width="4" stroke-dasharray="8,4" opacity="0.6"/>

  <!-- 连接线（步骤之间） -->
  <line x1="155" y1="355" x2="230" y2="315" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
  <line x1="305" y1="275" x2="370" y2="240" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
  <line x1="440" y1="205" x2="500" y2="175" stroke="#409EFF" stroke-width="2" opacity="0.3"/>
  <line x1="570" y1="145" x2="630" y2="120" stroke="#409EFF" stroke-width="2" opacity="0.3"/>

  <!-- 步骤 1：理解自注意力 -->
  <g filter="url(#shadow)">
    <circle cx="120" cy="390" r="38" fill="#409EFF"/>
    <circle cx="120" cy="390" r="34" fill="white"/>
    <circle cx="120" cy="390" r="30" fill="#EBF5FF"/>
    <!-- 灯泡图标 -->
    <circle cx="120" cy="383" r="10" fill="#FFD700" opacity="0.8"/>
    <rect x="116" y="393" width="8" height="3" rx="1" fill="#FFD700" opacity="0.8"/>
    <line x1="118" y1="397" x2="122" y2="397" stroke="#FFD700" stroke-width="1.5" opacity="0.8"/>
    <line x1="118" y1="400" x2="122" y2="400" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
    <text x="120" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">1</text>
  </g>
  <text x="120" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">理解自注意力</text>
  <text x="120" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">QKV 机制</text>

  <!-- 步骤 2：绘制架构 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="310" r="38" fill="#409EFF"/>
    <circle cx="270" cy="310" r="34" fill="white"/>
    <circle cx="270" cy="310" r="30" fill="#EBF5FF"/>
    <!-- 铅笔和图表图标 -->
    <line x1="258" y1="298" x2="282" y2="322" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="262" y1="296" x2="284" y2="318" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="260" y="300" width="8" height="6" rx="1" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="272" y="306" width="8" height="6" rx="1" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="270" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">2</text>
  </g>
  <text x="270" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">绘制架构图</text>
  <text x="270" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Encoder-Decoder</text>

  <!-- 步骤 3：HuggingFace 实践 -->
  <g filter="url(#shadow)">
    <circle cx="410" cy="235" r="38" fill="#409EFF"/>
    <circle cx="410" cy="235" r="34" fill="white"/>
    <circle cx="410" cy="235" r="30" fill="#EBF5FF"/>
    <!-- 齿轮和代码图标 -->
    <circle cx="410" cy="232" r="9" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="410" cy="232" r="4" fill="#409EFF"/>
    <text x="410" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">3</text>
  </g>
  <text x="410" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">HuggingFace 实践</text>
  <text x="410" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Pipeline 微调</text>

  <!-- 步骤 4：阅读原始论文 -->
  <g filter="url(#shadow)">
    <circle cx="540" cy="170" r="38" fill="#409EFF"/>
    <circle cx="540" cy="170" r="34" fill="white"/>
    <circle cx="540" cy="170" r="30" fill="#EBF5FF"/>
    <!-- 文档图标 -->
    <rect x="528" y="158" width="16" height="20" rx="2" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="532" y1="164" x2="540" y2="164" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="532" y1="168" x2="540" y2="168" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="532" y1="172" x2="538" y2="172" stroke="#409EFF" stroke-width="1.5"/>
    <text x="540" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">4</text>
  </g>
  <text x="540" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">阅读原始论文</text>
  <text x="540" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">"Attention Is All You Need"</text>

  <!-- 步骤 5：探索前沿 -->
  <g filter="url(#shadow)">
    <circle cx="670" cy="115" r="38" fill="#409EFF"/>
    <circle cx="670" cy="115" r="34" fill="white"/>
    <circle cx="670" cy="115" r="30" fill="#EBF5FF"/>
    <!-- 火箭图标 -->
    <polygon points="670,98 666,108 674,108" fill="#409EFF" opacity="0.8"/>
    <rect x="667" y="108" width="6" height="10" rx="1" fill="#409EFF" opacity="0.8"/>
    <polygon points="665,118 670,122 675,118" fill="#FFD700" opacity="0.6"/>
    <text x="670" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">5</text>
  </g>
  <text x="670" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">探索前沿方向</text>
  <text x="670" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">LLM / 多模态</text>

  <!-- 警告：位置编码误区 -->
  <g>
    <rect x="170" y="400" width="130" height="36" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
    <text x="180" y="415" font-family="Arial, sans-serif" font-size="11" fill="#E65100" font-weight="bold">⚠ 误区</text>
    <text x="180" y="429" font-family="Arial, sans-serif" font-size="10" fill="#BF360C">位置编码</text>
    <line x1="235" y1="400" x2="235" y2="390" stroke="#FFB74D" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 警告：多头注意力误区 -->
  <g>
    <rect x="350" y="330" width="155" height="36" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
    <text x="360" y="345" font-family="Arial, sans-serif" font-size="11" fill="#E65100" font-weight="bold">⚠ 误区</text>
    <text x="360" y="359" font-family="Arial, sans-serif" font-size="10" fill="#BF360C">多头 ≠ 更好</text>
    <line x1="420" y1="330" x2="420" y2="310" stroke="#FFB74D" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 警告：跳过预热误区 -->
  <g>
    <rect x="500" y="260" width="145" height="36" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
    <text x="510" y="275" font-family="Arial, sans-serif" font-size="11" fill="#E65100" font-weight="bold">⚠ 误区</text>
    <text x="510" y="289" font-family="Arial, sans-serif" font-size="10" fill="#BF360C">跳过预热</text>
    <line x1="560" y1="260" x2="555" y2="235" stroke="#FFB74D" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 底部装饰线 -->
  <line x1="50" y1="485" x2="750" y2="485" stroke="#409EFF" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- 底部小字 -->
  <text x="400" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999" opacity="0.6">循序渐进 · 夯实基础 · 关注前沿</text>
</svg>