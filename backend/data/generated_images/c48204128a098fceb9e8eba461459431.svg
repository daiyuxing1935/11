<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">"Lost in the Middle" 现象</text>

  <!-- 文档条背景 -->
  <rect x="60" y="70" width="680" height="60" rx="8" fill="#ffffff" stroke="#d0e4f7" stroke-width="1.5" filter="url(#shadowFilter)"/>

  <!-- 文档条 - 开头区域（蓝色高亮） -->
  <rect x="60" y="70" width="200" height="60" rx="8" fill="url(#blueGlow)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="60" y="70" width="200" height="60" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="160" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#409EFF">开头</text>

  <!-- 文档条 - 中间区域（暗淡） -->
  <rect x="260" y="70" width="280" height="60" fill="#f5f7fa"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a4b0" opacity="0.6">第 5–16 页 · 中间内容</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c0c4cc">信息容易被忽略</text>

  <!-- 中间警告图标 -->
  <circle cx="400" cy="85" r="10" fill="#ffa726" opacity="0.8"/>
  <text x="400" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">!</text>

  <!-- 文档条 - 结尾区域（蓝色高亮） -->
  <rect x="540" y="70" width="200" height="60" rx="8" fill="url(#blueGlow)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="540" y="70" width="200" height="60" rx="8" fill="#409EFF" opacity="0.08"/>
  <text x="640" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#409EFF">结尾</text>

  <!-- U形准确率曲线 -->
  <!-- 坐标轴 -->
  <line x1="100" y1="280" x2="700" y2="280" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="100" y1="180" x2="100" y2="280" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Y轴标签 -->
  <text x="90" y="185" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">高</text>
  <text x="90" y="280" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">低</text>
  <text x="55" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" transform="rotate(-90,55,235)">检索准确率</text>

  <!-- U形曲线区域填充 -->
  <path d="M120,190 C200,190 250,270 400,270 C550,270 600,190 680,190 L680,280 L120,280 Z" fill="#409EFF" opacity="0.12"/>

  <!-- U形曲线 -->
  <path d="M120,190 C200,190 250,270 400,270 C550,270 600,190 680,190" fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>

  <!-- 曲线上的数据点 -->
  <circle cx="120" cy="190" r="5" fill="#409EFF"/>
  <circle cx="250" cy="265" r="4" fill="#409EFF"/>
  <circle cx="400" cy="270" r="5" fill="#409EFF"/>
  <circle cx="550" cy="265" r="4" fill="#409EFF"/>
  <circle cx="680" cy="190" r="5" fill="#409EFF"/>

  <!-- X轴标签 -->
  <text x="160" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">开头</text>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#a0a4b0">中间</text>
  <text x="640" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">结尾</text>

  <!-- 放大镜 - 开头（清晰聚焦） -->
  <g transform="translate(130, 330)" filter="url(#shadowFilter)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="30" y1="30" x2="40" y2="40" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="6" fill="#409EFF" opacity="0.2"/>
    <text x="18" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">✓</text>
  </g>
  <text x="148" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">聚焦清晰</text>

  <!-- 放大镜 - 中间（模糊不确定） -->
  <g transform="translate(370, 330)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#c0c4cc" stroke-width="2.5" stroke-dasharray="3,2"/>
    <line x1="30" y1="30" x2="40" y2="40" stroke="#c0c4cc" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="6" fill="#e0e4e8" opacity="0.4"/>
    <text x="18" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a0a4b0">?</text>
  </g>
  <text x="388" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0a4b0">模糊不清</text>

  <!-- 放大镜 - 结尾（清晰聚焦） -->
  <g transform="translate(610, 330)" filter="url(#shadowFilter)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="30" y1="30" x2="40" y2="40" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="6" fill="#409EFF" opacity="0.2"/>
    <text x="18" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">✓</text>
  </g>
  <text x="628" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">聚焦清晰</text>

  <!-- 标注框 -->
  <rect x="200" y="420" width="400" height="50" rx="25" fill="#1a1a2e" opacity="0.9"/>
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">关键信息放在开头或结尾</text>

  <!-- 标注箭头 -->
  <line x1="400" y1="420" x2="400" y2="385" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 底部小字说明 -->
  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a4b0">U 形曲线：两端检索准确率最高，中间显著下降</text>
</svg>