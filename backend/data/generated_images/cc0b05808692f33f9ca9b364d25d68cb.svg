<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="embedGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  <rect x="15" y="15" width="770" height="470" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.2" rx="6"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Token 内部处理流程</text>

  <!-- ===== 输入 Token ===== -->
  <rect x="310" y="58" width="180" height="36" rx="18" fill="#409EFF" filter="url(#shadow)"/>
  <text x="400" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" font-weight="bold">输入 Token</text>

  <!-- 箭头 1 -->
  <line x1="400" y1="94" x2="400" y2="120" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ===== Embedding 层 ===== -->
  <rect x="250" y="122" width="300" height="46" rx="10" fill="url(#embedGrad)" filter="url(#shadow)"/>
  <text x="400" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Embedding 层</text>
  <text x="400" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E0F0FF">向量变换</text>

  <!-- 维度标注 1 -->
  <rect x="560" y="130" width="110" height="30" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="615" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">4096维向量</text>

  <!-- 箭头 2 -->
  <line x1="400" y1="168" x2="400" y2="198" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== Transformer 层 x3 ===== -->
  <!-- 层 1 -->
  <rect x="220" y="200" width="360" height="52" rx="10" fill="#409EFF" filter="url(#shadow)"/>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Transformer 层 1</text>
  <!-- 子层 -->
  <rect x="235" y="228" width="155" height="18" rx="4" fill="#3A8EE6"/>
  <text x="312" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF">自注意力 (Self-Attention)</text>
  <rect x="410" y="228" width="155" height="18" rx="4" fill="#3A8EE6"/>
  <text x="487" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF">前馈网络 (FFN)</text>

  <!-- 上下文箭头 -->
  <line x1="220" y1="226" x2="190" y2="226" stroke="#5AB0FF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="190" y1="226" x2="190" y2="252" stroke="#5AB0FF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="190" y1="252" x2="220" y2="252" stroke="#5AB0FF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="178" y="242" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#5AB0FF">上下文</text>

  <!-- 箭头 3 -->
  <line x1="400" y1="252" x2="400" y2="270" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 层 2 -->
  <rect x="220" y="272" width="360" height="52" rx="10" fill="#409EFF" filter="url(#shadow)"/>
  <text x="400" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Transformer 层 2</text>
  <rect x="235" y="300" width="155" height="18" rx="4" fill="#3A8EE6"/>
  <text x="312" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF">自注意力 (Self-Attention)</text>
  <rect x="410" y="300" width="155" height="18" rx="4" fill="#3A8EE6"/>
  <text x="487" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF">前馈网络 (FFN)</text>

  <!-- 箭头 4 -->
  <line x1="400" y1="324" x2="400" y2="342" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 层 3 -->
  <rect x="220" y="344" width="360" height="52" rx="10" fill="#409EFF" filter="url(#shadow)"/>
  <text x="400" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Transformer 层 3</text>
  <rect x="235" y="372" width="155" height="18" rx="4" fill="#3A8EE6"/>
  <text x="312" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF">自注意力 (Self-Attention)</text>
  <rect x="410" y="372" width="155" height="18" rx="4" fill="#3A8EE6"/>
  <text x="487" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D0E8FF">前馈网络 (FFN)</text>

  <!-- 维度标注 2 -->
  <rect x="590" y="280" width="100" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="640" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">维度不变</text>

  <!-- 箭头 5 -->
  <line x1="400" y1="396" x2="400" y2="420" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== 输出层 / LM Head ===== -->
  <rect x="250" y="422" width="300" height="46" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">输出层 / LM Head</text>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#A0C4FF">投影 + Softmax</text>

  <!-- 维度标注 3 -->
  <rect x="560" y="430" width="120" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="620" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">词汇表大小</text>

  <!-- ===== 右下角：自注意力放大图 ===== -->
  <rect x="610" y="58" width="175" height="155" rx="8" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="697" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">自注意力放大</text>

  <!-- Q -->
  <rect x="625" y="90" width="45" height="28" rx="5" fill="#409EFF" opacity="0.8"/>
  <text x="647" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">Q</text>

  <!-- K -->
  <rect x="680" y="90" width="45" height="28" rx="5" fill="#409EFF" opacity="0.8"/>
  <text x="702" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">K</text>

  <!-- V -->
  <rect x="735" y="90" width="40" height="28" rx="5" fill="#409EFF" opacity="0.8"/>
  <text x="755" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">V</text>

  <!-- 运算符号 -->
  <text x="647" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">×</text>
  <text x="702" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">→</text>
  <text x="755" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">Softmax</text>

  <!-- 结果 -->
  <rect x="645" y="155" width="100" height="24" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="695" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">注意力权重</text>

  <!-- ===== 左侧标注 ===== -->
  <text x="205" y="145" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">①</text>
  <text x="205" y="226" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">②</text>
  <text x="205" y="298" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">③</text>
  <text x="205" y="370" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">④</text>
  <text x="205" y="445" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">⑤</text>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666666">Token 经过嵌入、多层 Transformer 处理，最终输出概率分布</text>
</svg>