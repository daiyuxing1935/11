<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="topLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EC8F0"/>
      <stop offset="100%" stop-color="#6BBFE8"/>
    </linearGradient>
    <linearGradient id="midLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
    <linearGradient id="botLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">理想智能体架构设计——分层蛋糕图</text>

  <!-- 第三层（底部）：反应安全层 -->
  <g transform="translate(400, 420)">
    <!-- 底层圆角矩形 -->
    <rect x="-220" y="-55" width="440" height="110" rx="16" fill="url(#botLayer)" stroke="#0F1A30" stroke-width="1.5"/>
    <!-- 盾牌图标 -->
    <g transform="translate(-150, 0)">
      <circle cx="0" cy="0" r="22" fill="rgba(255,255,255,0.15)"/>
      <path d="M-10,-12 L10,-12 L10,-2 C10,8 0,14 0,14 C0,14 -10,8 -10,-2 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- 层标签 -->
    <text x="-80" y="-10" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">反应安全层</text>
    <text x="-80" y="16" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#B0C4DE">快速 · 可靠 · 始终在线</text>
  </g>

  <!-- 第二层（中部）：审慎推理层 -->
  <g transform="translate(400, 295)">
    <rect x="-200" y="-50" width="400" height="100" rx="14" fill="url(#midLayer)" stroke="#3070C0" stroke-width="1.5"/>
    <!-- 大脑图标 -->
    <g transform="translate(-135, 0)">
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.15)"/>
      <path d="M-8,-12 C-14,-12 -16,-4 -12,2 C-14,6 -12,12 -6,12 C-3,12 0,10 0,10 C0,10 3,12 6,12 C12,12 14,6 12,2 C16,-4 14,-12 8,-12 C5,-12 0,-8 0,-8 C0,-8 -5,-12 -8,-12 Z" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M-4,-4 C-2,-6 2,-6 4,-4" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M-3,2 C-1,4 1,4 3,2" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="0" y1="-8" x2="0" y2="-2" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <!-- 层标签 -->
    <text x="-70" y="-8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">审慎推理层</text>
    <text x="-70" y="16" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#D0E4FF">深度思考 · 规划 · 决策</text>
  </g>

  <!-- 第一层（顶部）：协调层 -->
  <g transform="translate(400, 175)">
    <rect x="-175" y="-45" width="350" height="90" rx="12" fill="url(#topLayer)" stroke="#5AA8D8" stroke-width="1.5"/>
    <!-- 天平图标 -->
    <g transform="translate(-118, 0)">
      <circle cx="0" cy="0" r="18" fill="rgba(255,255,255,0.15)"/>
      <line x1="0" y1="-12" x2="0" y2="8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M-12,-4 L-8,8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M12,-4 L8,8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-10" cy="10" r="2.5" fill="#FFFFFF"/>
      <circle cx="10" cy="10" r="2.5" fill="#FFFFFF"/>
    </g>
    <!-- 层标签 -->
    <text x="-60" y="-6" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">协调层</text>
    <text x="-60" y="16" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#2A4A6A">仲裁 · 优先级 · 模式切换</text>
  </g>

  <!-- 连接箭头（层间） -->
  <g transform="translate(400, 230)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#409EFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <polygon points="-4,6 0,12 4,6" fill="#409EFF" opacity="0.5"/>
  </g>
  <g transform="translate(400, 350)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#409EFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <polygon points="-4,6 0,12 4,6" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 标注 1：顶层标注 -->
  <g transform="translate(585, 175)">
    <line x1="-8" y1="0" x2="-30" y2="0" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <rect x="-8" y="-14" width="90" height="28" rx="14" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="37" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">最高优先级</text>
  </g>

  <!-- 标注 2：中层标注 -->
  <g transform="translate(610, 295)">
    <line x1="-8" y1="0" x2="-25" y2="0" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <rect x="-8" y="-14" width="95" height="28" rx="14" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="39.5" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">核心推理引擎</text>
  </g>

  <!-- 标注 3：底层标注 -->
  <g transform="translate(630, 420)">
    <line x1="-8" y1="0" x2="-20" y2="0" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <rect x="-8" y="-14" width="100" height="28" rx="14" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="42" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">安全防护基础</text>
  </g>

  <!-- 标注 4：左侧架构说明 -->
  <g transform="translate(160, 295)">
    <line x1="8" y1="0" x2="25" y2="0" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <rect x="8" y="-20" width="110" height="40" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="63" y="-1" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">分层架构</text>
    <text x="63" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e">逐层递进</text>
  </g>

  <!-- 标注 5：底部说明 -->
  <g transform="translate(400, 480)">
    <rect x="-120" y="-14" width="240" height="28" rx="14" fill="#1a1a2e" opacity="0.08"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.7">智能体架构 · 三层蛋糕模型</text>
  </g>

</svg>