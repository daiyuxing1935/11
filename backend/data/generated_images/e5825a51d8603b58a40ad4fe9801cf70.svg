<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ab0ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="blockGradDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8fe0"/>
      <stop offset="100%" stop-color="#3078c0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">Transformer 架构完整示意</text>

  <!-- ==================== ENCODER STACK (LEFT) ==================== -->

  <!-- Encoder column label -->
  <text x="195" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">编码器 (Encoder) × N</text>

  <!-- Encoder block 1 (top) -->
  <rect x="95" y="68" width="200" height="52" rx="10" fill="url(#blockGrad)" stroke="#3078c0" stroke-width="1.5"/>
  <text x="195" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">前馈网络 (FFN)</text>
  <text x="195" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d4e6ff">Feed-Forward Network</text>

  <!-- LayerNorm label top -->
  <rect x="115" y="124" width="160" height="18" rx="5" fill="#e0ecfa" stroke="#b0cce8" stroke-width="1"/>
  <text x="195" y="137" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e" font-weight="bold">层归一化 (LayerNorm)</text>

  <!-- Add & Norm label -->
  <text x="195" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">⊕ 残差连接</text>

  <!-- Encoder block 2 (bottom) -->
  <rect x="95" y="158" width="200" height="52" rx="10" fill="url(#blockGrad)" stroke="#3078c0" stroke-width="1.5"/>
  <text x="195" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">多头自注意力 (MHA)</text>
  <text x="195" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d4e6ff">Multi-Head Self-Attention</text>

  <!-- LayerNorm label bottom -->
  <rect x="115" y="214" width="160" height="18" rx="5" fill="#e0ecfa" stroke="#b0cce8" stroke-width="1"/>
  <text x="195" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e" font-weight="bold">层归一化 (LayerNorm)</text>

  <!-- Add & Norm label -->
  <text x="195" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">⊕ 残差连接</text>

  <!-- Encoder Nx indicator -->
  <rect x="170" y="245" width="50" height="16" rx="4" fill="#d4e6ff" stroke="#b0cce8" stroke-width="1"/>
  <text x="195" y="257" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e" font-weight="bold">× N</text>

  <!-- Input embedding block -->
  <rect x="95" y="272" width="200" height="28" rx="8" fill="#e8f2fb" stroke="#b0cce8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="195" y="291" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">词嵌入 + 位置编码</text>

  <!-- Input tokens -->
  <rect x="110" y="310" width="40" height="18" rx="4" fill="#409EFF" opacity="0.7"/>
  <text x="130" y="323" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">词1</text>
  <rect x="160" y="310" width="40" height="18" rx="4" fill="#409EFF" opacity="0.7"/>
  <text x="180" y="323" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">词2</text>
  <rect x="210" y="310" width="40" height="18" rx="4" fill="#409EFF" opacity="0.7"/>
  <text x="230" y="323" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">词3</text>

  <!-- Input arrow -->
  <line x1="195" y1="328" x2="195" y2="340" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="145" y="340" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">输入序列</text>

  <!-- Arrow encoder input to embedding -->
  <line x1="195" y1="340" x2="195" y2="300" stroke="#409EFF" stroke-width="1.5"/>

  <!-- Arrow embedding to MHA -->
  <line x1="195" y1="300" x2="195" y2="272" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="195" y1="272" x2="195" y2="260" stroke="#409EFF" stroke-width="1.5"/>

  <!-- Residual arrow from input to top -->
  <line x1="85" y1="290" x2="85" y2="100" stroke="#a0c4e8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="72" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#a0c4e8" transform="rotate(-90,72,195)">残差连接</text>

  <!-- ==================== DECODER STACK (RIGHT) ==================== -->

  <!-- Decoder column label -->
  <text x="605" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">解码器 (Decoder) × N</text>

  <!-- Decoder block 1 (top) -->
  <rect x="505" y="68" width="200" height="52" rx="10" fill="url(#blockGrad)" stroke="#3078c0" stroke-width="1.5"/>
  <text x="605" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">前馈网络 (FFN)</text>
  <text x="605" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d4e6ff">Feed-Forward Network</text>

  <!-- LayerNorm -->
  <rect x="525" y="124" width="160" height="18" rx="5" fill="#e0ecfa" stroke="#b0cce8" stroke-width="1"/>
  <text x="605" y="137" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e" font-weight="bold">层归一化 (LayerNorm)</text>
  <text x="605" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">⊕ 残差连接</text>

  <!-- Decoder block 2 (cross-attention) -->
  <rect x="505" y="158" width="200" height="52" rx="10" fill="url(#blockGradDark)" stroke="#2568a0" stroke-width="1.5"/>
  <text x="605" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">交叉注意力 (Cross-Attn)</text>
  <text x="605" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#c4d8ee">Key/Value ← 编码器</text>

  <!-- LayerNorm -->
  <rect x="525" y="214" width="160" height="18" rx="5" fill="#e0ecfa" stroke="#b0cce8" stroke-width="1"/>
  <text x="605" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e" font-weight="bold">层归一化 (LayerNorm)</text>
  <text x="605" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">⊕ 残差连接</text>

  <!-- Decoder block 3 (masked self-attention) -->
  <rect x="505" y="248" width="200" height="52" rx="10" fill="url(#blockGrad)" stroke="#3078c0" stroke-width="1.5"/>
  <text x="605" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">掩码自注意力 (Masked MHA)</text>
  <text x="605" y="286" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d4e6ff">Masked Self-Attention</text>

  <!-- LayerNorm -->
  <rect x="525" y="304" width="160" height="18" rx="5" fill="#e0ecfa" stroke="#b0cce8" stroke-width="1"/>
  <text x="605" y="317" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e" font-weight="bold">层归一化 (LayerNorm)</text>
  <text x="605" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">⊕ 残差连接</text>

  <!-- Decoder Nx indicator -->
  <rect x="580" y="335" width="50" height="16" rx="4" fill="#d4e6ff" stroke="#b0cce8" stroke-width="1"/>
  <text x="605" y="347" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e" font-weight="bold">× N</text>

  <!-- Output embedding -->
  <rect x="505" y="355" width="200" height="28" rx="8" fill="#e8f2fb" stroke="#b0cce8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="605" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">词嵌入 + 位置编码</text>

  <!-- Output tokens (shifted right) -->
  <rect x="520" y="393" width="40" height="18" rx="4" fill="#409EFF" opacity="0.7"/>
  <text x="540" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">词1</text>
  <rect x="570" y="393" width="40" height="18" rx="4" fill="#409EFF" opacity="0.7"/>
  <text x="590" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">词2</text>
  <rect x="620" y="393" width="40" height="18" rx="4" fill="#409EFF" opacity="0.7"/>
  <text x="640" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff">词3</text>

  <!-- Output arrow -->
  <line x1="605" y1="420" x2="605" y2="435" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="655" y="430" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">输出序列</text>

  <!-- ==================== CROSS-ATTENTION ARROWS ==================== -->

  <!-- Arrow from encoder top to decoder cross-attention -->
  <line x1="300" y1="92" x2="500" y2="184" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="385" y="128" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1a1a2e">Key / Value</text>
  <text x="385" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#666">编码器输出 → 解码器</text>

  <!-- Second cross-attention arrow from encoder bottom -->
  <line x1="300" y1="185" x2="500" y2="185" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ==================== ARROW MARKERS ==================== -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ==================== BOTTOM COMPONENT EXPLANATION ==================== -->

  <!-- Section divider -->
  <line x1="20" y1="445" x2="780" y2="445" stroke="#c0d8e8" stroke-width="1"/>

  <!-- Component deep dive title -->
  <text x="400" y="462" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">五大核心组件 — 词嵌入 (Token Embedding) 深入解析</text>

  <!-- Explanation text -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#444">
    计算机无法直接理解文字，需要将离散的词转换为连续的数值向量。假设词汇表有 50,000 个词，嵌入维度 d_model=512，每个词被映射为一个 512 维的向量。
  </text>

</svg>