  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">版本管理与A/B测试工作流</text>

  <!-- ========== 左侧：版本管理 ========== -->
  <rect x="30" y="50" width="360" height="210" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
  <rect x="30" y="50" width="360" height="32" rx="10" fill="url(#leftGrad)" opacity="0.85"/>
  <rect x="30" y="72" width="360" height="10" rx="0" fill="url(#leftGrad)" opacity="0.85"/>
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">版本管理 / Version Management</text>

  <!-- Git分支树 -->
  <line x1="80" y1="110" x2="80" y2="190" stroke="#409EFF" stroke-width="2"/>
  <line x1="80" y1="130" x2="140" y2="130" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="80" y1="160" x2="140" y2="160" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="80" y1="190" x2="140" y2="190" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 分支节点 -->
