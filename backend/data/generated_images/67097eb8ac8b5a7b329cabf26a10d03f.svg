  <text x="180" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">v1.0.0</text>
  <rect x="145" y="152" width="70" height="16" rx="8" fill="#409EFF" opacity="0.15"/>
  <text x="180" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">v1.1.0</text>
  <rect x="145" y="182" width="70" height="16" rx="8" fill="#409EFF" opacity="0.15"/>
  <text x="180" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">v2.0.0</text>

  <!-- 箭头 -->
