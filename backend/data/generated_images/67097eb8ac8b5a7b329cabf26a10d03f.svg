  <text x="302" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">CHANGELOG</text>
  <line x1="240" y1="130" x2="365" y2="130" stroke="#409EFF" stroke-width="0.5" opacity="0.4"/>
