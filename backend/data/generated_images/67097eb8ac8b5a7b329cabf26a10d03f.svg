  <circle cx="80" cy="130" r="5" fill="#409EFF" opacity="0.7"/>
  <circle cx="80" cy="160" r="5" fill="#409EFF" opacity="0.7"/>
  <circle cx="80" cy="190" r="6" fill="#409EFF"/>

