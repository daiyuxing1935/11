<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#66b1ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI 能力进化对比</text>

  <!-- ===== 上半部分：纯 LLM ===== -->
  <g transform="translate(0, 50)">
    <!-- 标签 -->
    <text x="400" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888" font-style="italic">纯 LLM：会说话的脑子</text>

    <!-- 输入箭头 -->
    <rect x="100" y="40" width="100" height="36" rx="18" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/>
    <text x="150" y="63" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#666">输入文本</text>

    <!-- 箭头 -->
    <line x1="200" y1="58" x2="270" y2="58" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <defs>
      <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
      </marker>
    </defs>

    <!-- 大脑图标 -->
    <rect x="280" y="32" width="80" height="52" rx="26" fill="#f0f0f0" stroke="#bbb" stroke-width="1.5"/>
    <text x="320" y="63" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#888">🧠</text>

    <!-- 箭头 -->
    <line x1="360" y1="58" x2="430" y2="58" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- 输出箭头 -->
    <rect x="440" y="40" width="100" height="36" rx="18" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/>
    <text x="490" y="63" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#666">输出文本</text>
  </g>

  <!-- ===== 转换箭头 ===== -->
  <g transform="translate(400, 155)">
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
      </marker>
    </defs>
    <rect x="-10" y="-14" width="20" height="28" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">⬇</text>
    <text x="0" y="-22" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">从“会说话的脑子”到“能干活的助手”</text>
  </g>

  <!-- ===== 下半部分：Agent ===== -->
  <g transform="translate(0, 185)">
    <!-- 标签 -->
    <text x="400" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888" font-style="italic">Agent：能干活的助手</text>

    <!-- 步骤1：输入目标 -->
    <rect x="40" y="40" width="90" height="36" rx="18" fill="#409EFF" filter="url(#softShadow)"/>
    <text x="85" y="63" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">输入目标</text>

    <line x1="130" y1="58" x2="165" y2="58" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue2)"/>
    <defs>
      <marker id="arrowBlue2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
      </marker>
    </defs>

    <!-- 步骤2：大脑/LLM -->
    <rect x="170" y="32" width="70" height="52" rx="26" fill="#e8f4ff" stroke="#409EFF" stroke-width="1.5"/>
    <text x="205" y="63" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#409EFF">🧠</text>

    <line x1="240" y1="58" x2="275" y2="58" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue2)"/>

    <!-- 步骤3：规划分解 -->
    <rect x="280" y="40" width="90" height="36" rx="18" fill="#409EFF" filter="url(#softShadow)"/>
    <text x="325" y="63" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">规划分解</text>

    <line x1="370" y1="58" x2="405" y2="58" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue2)"/>

    <!-- 步骤4：工具执行 -->
    <rect x="410" y="40" width="90" height="36" rx="18" fill="#409EFF" filter="url(#softShadow)"/>
    <text x="455" y="63" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">工具执行</text>

    <line x1="500" y1="58" x2="535" y2="58" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue2)"/>

    <!-- 步骤5：观察结果 -->
    <rect x="540" y="40" width="90" height="36" rx="18" fill="#409EFF" filter="url(#softShadow)"/>
    <text x="585" y="63" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">观察结果</text>

    <!-- 循环箭头 -->
    <path d="M585 76 Q585 95 455 95 Q325 95 325 76" fill="none" stroke="#66b1ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlueLight)"/>
    <defs>
      <marker id="arrowBlueLight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#66b1ff"/>
      </marker>
    </defs>
    <text x="455" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#66b1ff" font-style="italic">循环直到完成</text>

    <!-- 步骤6：交付结果 -->
    <rect x="540" y="120" width="90" height="36" rx="18" fill="url(#glowGrad)" filter="url(#glow)"/>
    <text x="585" y="143" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">交付结果</text>

    <!-- 从观察结果到交付结果的箭头 -->
    <line x1="585" y1="76" x2="585" y2="118" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue2)"/>
  </g>

  <!-- ===== 底部公式 ===== -->
  <g transform="translate(400, 410)">
    <rect x="-220" y="-20" width="440" height="40" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1a1a2e" font-weight="bold">
      Agent = LLM × 工具 × 记忆 × 规划 × 执行
    </text>
  </g>

  <!-- 标注 -->
  <g font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">
    <text x="75" y="110" text-anchor="middle">直接问答</text>
    <text x="490" y="110" text-anchor="middle">单向输出</text>
    <text x="85" y="310" text-anchor="middle">明确目标</text>
    <text x="325" y="310" text-anchor="middle">任务拆解</text>
    <text x="455" y="310" text-anchor="middle">调用工具</text>
    <text x="585" y="310" text-anchor="middle">反馈闭环</text>
  </g>
</svg>