<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0D5DD"/>
      <stop offset="100%" stop-color="#B8BCC4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LoRA 低秩分解示意图</text>

  <!-- 上方大矩阵 W（冻结） -->
  <rect x="280" y="70" width="240" height="100" rx="6" fill="url(#wGrad)" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="400" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">W（冻结）</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">4096×4096</text>
  <text x="400" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">= 1670万 参数</text>

  <!-- 挂锁图标 -->
  <rect x="530" y="78" width="20" height="24" rx="3" fill="#6B7280"/>
  <rect x="534" y="82" width="12" height="8" rx="2" fill="#9CA3AF"/>
  <circle cx="540" cy="96" r="3" fill="#F9FAFB"/>
  <rect x="537" y="96" width="6" height="6" rx="1" fill="#F9FAFB"/>

  <!-- 加号连接 -->
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#409EFF">+</text>

  <!-- 下方两个小矩阵 -->
  <!-- B 矩阵 -->
  <rect x="260" y="235" width="130" height="55" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="325" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">B（d×r）</text>
  <text x="325" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E0F0FF">r=16</text>

  <!-- 乘号 -->
  <text x="420" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#409EFF">×</text>

  <!-- A 矩阵 -->
  <rect x="455" y="235" width="130" height="55" rx="6" fill="#7EC8FF" opacity="0.9"/>
  <text x="520" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">A（r×d）</text>
  <text x="520" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">r=16</text>

  <!-- 可训练标注 -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">可训练：约 13.1万 参数</text>

  <!-- 箭头和标注：参数减少 128 倍 -->
  <!-- 箭头从右侧指向小矩阵 -->
  <line x1="630" y1="262" x2="590" y2="262" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a2e"/>
    </marker>
  </defs>

  <rect x="635" y="240" width="145" height="44" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="707" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">参数减少 128 倍！</text>
  <text x="707" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D1D5DB">从 1670万 → 13.1万</text>

  <!-- 底部说明标注 -->
  <!-- 标注 1 -->
  <rect x="70" y="370" width="160" height="36" rx="16" fill="#409EFF" opacity="0.12"/>
  <text x="150" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">冻结预训练权重</text>

  <!-- 标注 2 -->
  <rect x="270" y="370" width="140" height="36" rx="16" fill="#409EFF" opacity="0.12"/>
  <text x="340" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">低秩适配矩阵</text>

  <!-- 标注 3 -->
  <rect x="450" y="370" width="140" height="36" rx="16" fill="#409EFF" opacity="0.12"/>
  <text x="520" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">仅更新 A 和 B</text>

  <!-- 标注 4 -->
  <rect x="630" y="370" width="140" height="36" rx="16" fill="#409EFF" opacity="0.12"/>
  <text x="700" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">高效微调</text>

  <!-- 连接线：从标注到对应元素 -->
  <line x1="150" y1="370" x2="150" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="340" y1="370" x2="340" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="520" y1="370" x2="520" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="700" y1="370" x2="700" y2="340" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 底部小字 -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">LoRA：Low-Rank Adaptation 低秩适配</text>

  <!-- 装饰性虚线框 -->
  <rect x="55" y="350" width="730" height="1" rx="0" fill="#E5E7EB" opacity="0.5"/>
</svg>