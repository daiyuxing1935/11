<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowDeep" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LLM 推理流程</text>

  <!-- ====== 主流程线 ====== -->
  <!-- 用户输入气泡 -->
  <rect x="40" y="80" width="160" height="70" rx="16" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">用户提问</text>
  <text x="120" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">“什么是AI？”</text>
  <!-- 气泡小三角 -->
  <polygon points="195,115 210,105 210,125" fill="#409EFF"/>

  <!-- 箭头1 -->
  <line x1="210" y1="115" x2="270" y2="115" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 模型块 -->
  <rect x="280" y="70" width="180" height="90" rx="18" fill="url(#brainGrad)" filter="url(#shadow)"/>
  <!-- 大脑/神经网络图标 -->
  <g transform="translate(330, 85)" stroke="#ffffff" stroke-width="1.8" fill="none">
    <!-- 大脑轮廓 -->
    <path d="M20,10 C10,10 5,18 8,28 C3,32 3,42 10,46 C8,52 12,58 20,56 C25,62 35,62 40,56 C48,58 52,52 50,46 C57,42 57,32 52,28 C55,18 50,10 40,10 C35,6 25,6 20,10 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- 神经网络节点 -->
    <circle cx="20" cy="22" r="2.5" fill="#fff"/>
    <circle cx="40" cy="22" r="2.5" fill="#fff"/>
    <circle cx="30" cy="33" r="2.5" fill="#fff"/>
    <circle cx="20" cy="44" r="2.5" fill="#fff"/>
    <circle cx="40" cy="44" r="2.5" fill="#fff"/>
    <line x1="22" y1="24" x2="28" y2="31" stroke-width="1"/>
    <line x1="38" y1="24" x2="32" y2="31" stroke-width="1"/>
    <line x1="28" y1="35" x2="22" y2="42" stroke-width="1"/>
    <line x1="32" y1="35" x2="38" y2="42" stroke-width="1"/>
    <line x1="20" y1="22" x2="40" y2="22" stroke-width="0.8" stroke-dasharray="2,2"/>
    <line x1="20" y1="44" x2="40" y2="44" stroke-width="0.8" stroke-dasharray="2,2"/>
  </g>
  <text x="370" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">大语言模型</text>

  <!-- 箭头2 -->
  <line x1="460" y1="115" x2="520" y2="115" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Token 输出序列 -->
  <rect x="530" y="80" width="42" height="42" rx="8" fill="#409EFF" filter="url(#shadow)"/>
  <text x="551" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">T1</text>

  <rect x="582" y="80" width="42" height="42" rx="8" fill="#409EFF" opacity="0.8"/>
  <text x="603" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">T2</text>

  <rect x="634" y="80" width="42" height="42" rx="8" fill="#409EFF" opacity="0.6"/>
  <text x="655" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">T3</text>

  <rect x="686" y="80" width="42" height="42" rx="8" fill="#409EFF" opacity="0.4"/>
  <text x="707" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">T4</text>

  <rect x="738" y="80" width="42" height="42" rx="8" fill="#409EFF" opacity="0.25"/>
  <text x="759" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">…</text>

  <!-- 输出标签 -->
  <text x="640" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">逐 token 生成</text>

  <!-- ====== 下方放大镜标注区 ====== -->
  <!-- 分隔线 -->
  <line x1="60" y1="190" x2="740" y2="190" stroke="#409EFF" stroke-width="1" opacity="0.3"/>

  <!-- 标注1：自回归生成 -->
  <g filter="url(#shadowDeep)">
    <!-- 放大镜图标 -->
    <circle cx="120" cy="260" r="28" fill="#fff" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="120" cy="260" r="18" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="280" x2="155" y2="295" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <!-- 放大镜内部小图 -->
    <text x="120" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#409EFF">→</text>
  </g>
  <rect x="165" y="238" width="160" height="44" rx="10" fill="#1a1a2e" filter="url(#shadowDeep)"/>
  <text x="245" y="258" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">自回归生成</text>
  <text x="245" y="274" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#aab">Autoregressive</text>

  <!-- 连接线：模型块到标注1 -->
  <path d="M370,160 L370,175 L120,175 L120,228" stroke="#409EFF" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- 标注2：KV Cache加速 -->
  <g filter="url(#shadowDeep)">
    <circle cx="120" cy="340" r="28" fill="#fff" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="120" cy="340" r="18" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="360" x2="155" y2="375" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <!-- 缓存图标 -->
    <rect x="110" y="332" width="20" height="16" rx="3" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="115" y1="338" x2="125" y2="338" stroke="#409EFF" stroke-width="1"/>
    <line x1="115" y1="343" x2="125" y2="343" stroke="#409EFF" stroke-width="1"/>
  </g>
  <rect x="165" y="318" width="160" height="44" rx="10" fill="#1a1a2e" filter="url(#shadowDeep)"/>
  <text x="245" y="338" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">KV Cache 加速</text>
  <text x="245" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#aab">KV Cache</text>

  <!-- 连接线 -->
  <path d="M370,160 L370,185 L370,340 L152,340" stroke="#409EFF" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- 标注3：采样策略调控 -->
  <g filter="url(#shadowDeep)">
    <circle cx="120" cy="420" r="28" fill="#fff" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="120" cy="420" r="18" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="440" x2="155" y2="455" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <!-- 采样图标 -->
    <text x="120" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#409EFF">±</text>
  </g>
  <rect x="165" y="398" width="160" height="44" rx="10" fill="#1a1a2e" filter="url(#shadowDeep)"/>
  <text x="245" y="418" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#fff" font-weight="bold">采样策略调控</text>
  <text x="245" y="434" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#aab">Sampling</text>

  <!-- 连接线 -->
  <path d="M370,160 L370,195 L640,195 L640,420 L152,420" stroke="#409EFF" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- 底部说明 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#888">LLM 推理管线：输入 → 模型推理 → 逐 token 输出</text>
</svg>