<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fa"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 连接线 - 五角星模式 -->
  <g stroke="#409EFF" stroke-width="1.8" fill="none" opacity="0.7">
    <!-- 外圈五边形 -->
    <line x1="400" y1="72" x2="640" y2="195"/>
    <line x1="640" y1="195" x2="570" y2="400"/>
    <line x1="570" y1="400" x2="230" y2="400"/>
    <line x1="230" y1="400" x2="160" y2="195"/>
    <line x1="160" y1="195" x2="400" y2="72"/>

    <!-- 内五角星 -->
    <line x1="400" y1="72" x2="570" y2="400"/>
    <line x1="640" y1="195" x2="230" y2="400"/>
    <line x1="570" y1="400" x2="160" y2="195"/>
    <line x1="230" y1="400" x2="400" y2="72"/>
    <line x1="160" y1="195" x2="640" y2="195"/>

    <!-- 中心到各点 -->
    <line x1="400" y1="72" x2="400" y2="250"/>
    <line x1="640" y1="195" x2="400" y2="250"/>
    <line x1="570" y1="400" x2="400" y2="250"/>
    <line x1="230" y1="400" x2="400" y2="250"/>
    <line x1="160" y1="195" x2="400" y2="250"/>
  </g>

  <!-- 中心圆点 -->
  <circle cx="400" cy="250" r="10" fill="#409EFF" opacity="0.5"/>
  <circle cx="400" cy="250" r="5" fill="#409EFF"/>

  <!-- 卡片 1：目标清晰 - 顶部 -->
  <g filter="url(#cardShadow)">
    <rect x="335" y="42" width="130" height="90" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 靶心图标 -->
    <circle cx="400" cy="72" r="16" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="400" cy="72" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="400" cy="72" r="4" fill="#409EFF"/>
    <!-- 十字准线 -->
    <line x1="384" y1="72" x2="416" y2="72" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="400" y1="56" x2="400" y2="88" stroke="#409EFF" stroke-width="1.5"/>
    <text x="400" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">目标清晰</text>
  </g>

  <!-- 卡片 2：工具简洁 - 右上 -->
  <g filter="url(#cardShadow)">
    <rect x="575" y="158" width="130" height="90" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 扳手 -->
    <g transform="translate(598, 188)" stroke="#409EFF" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="6"/>
      <line x1="5" y1="5" x2="16" y2="16"/>
      <line x1="12" y1="14" x2="20" y2="20" stroke-width="3"/>
    </g>
    <!-- 螺丝刀 -->
    <g transform="translate(620, 188)" stroke="#409EFF" stroke-width="2" fill="none">
      <line x1="0" y1="8" x2="0" y2="-8"/>
      <line x1="-4" y1="-8" x2="4" y2="-8"/>
      <line x1="-2" y1="-10" x2="2" y2="-10"/>
    </g>
    <!-- 锤子 -->
    <g transform="translate(642, 188)" stroke="#409EFF" stroke-width="2" fill="none">
      <rect x="-6" y="-8" width="12" height="8" rx="1"/>
      <line x1="0" y1="0" x2="0" y2="12"/>
    </g>
    <text x="640" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">少即是多</text>
    <text x="640" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">工具简洁</text>
  </g>

  <!-- 卡片 3：人机协同 - 右下 -->
  <g filter="url(#cardShadow)">
    <rect x="505" y="365" width="130" height="90" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 人手 -->
    <g transform="translate(545, 400)">
      <path d="M-8,-10 Q-12,-6 -10,0 L-8,6 Q-6,10 -2,8 L4,6 Q8,4 6,0 L4,-4 Q2,-8 -2,-6 L-4,-2" fill="none" stroke="#409EFF" stroke-width="2"/>
    </g>
    <!-- 机器手 -->
    <g transform="translate(585, 400)">
      <rect x="-4" y="-8" width="8" height="6" rx="1" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <rect x="-6" y="-2" width="12" height="5" rx="1" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-4" y1="3" x2="-4" y2="8" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="0" y1="3" x2="0" y2="8" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="4" y1="3" x2="4" y2="8" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <!-- 对勾 -->
    <g transform="translate(565, 395)">
      <circle cx="0" cy="0" r="8" fill="#409EFF" opacity="0.2"/>
      <polyline points="-4,0 -1,3 5,-3" fill="none" stroke="#409EFF" stroke-width="2"/>
    </g>
    <text x="570" y="438" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">人机协同</text>
  </g>

  <!-- 卡片 4：容错机制 - 左下 -->
  <g filter="url(#cardShadow)">
    <rect x="165" y="365" width="130" height="90" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 盾牌 -->
    <g transform="translate(230, 400)">
      <path d="M0,-12 L10,-8 L10,2 Q10,8 0,12 Q-10,8 -10,2 L-10,-8 Z" fill="none" stroke="#409EFF" stroke-width="2"/>
      <rect x="-4" y="-4" width="8" height="8" rx="1" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <!-- 重试循环箭头 -->
    <g transform="translate(230, 400)" fill="none" stroke="#409EFF" stroke-width="1.5">
      <path d="M14,-8 A16,16 0 1,1 8,12" stroke-dasharray="3,2"/>
      <polyline points="8,12 4,8 10,10"/>
    </g>
    <text x="230" y="438" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">容错机制</text>
  </g>

  <!-- 卡片 5：可观测性 - 左上 -->
  <g filter="url(#cardShadow)">
    <rect x="95" y="158" width="130" height="90" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 放大镜 -->
    <g transform="translate(160, 188)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="7" y1="7" x2="16" y2="16" stroke="#409EFF" stroke-width="2.5"/>
    </g>
    <!-- 透明机器人内部齿轮 -->
    <g transform="translate(160, 188)" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.6">
      <circle cx="0" cy="0" r="4"/>
      <circle cx="0" cy="0" r="2" fill="#409EFF" opacity="0.3"/>
      <line x1="-4" y1="0" x2="4" y2="0"/>
      <line x1="0" y1="-4" x2="0" y2="4"/>
    </g>
    <!-- 思维气泡 -->
    <g transform="translate(148, 172)" fill="none" stroke="#409EFF" stroke-width="1.2">
      <circle cx="0" cy="0" r="3" opacity="0.4"/>
      <circle cx="-6" cy="-5" r="2" opacity="0.3"/>
    </g>
    <text x="160" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">透明可见</text>
    <text x="160" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">可观测性</text>
  </g>

  <!-- 标题 -->
  <text x="400" y="485" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e" opacity="0.6">AI 系统设计原则</text>

</svg>