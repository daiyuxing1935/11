<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B3D9FF"/>
      <stop offset="100%" stop-color="#99CCFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">三种协作模式</text>

  <!-- ============ 面板 1：顺序协作 ============ -->
  <rect x="30" y="55" width="740" height="125" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="55" width="740" height="30" rx="10" fill="url(#blueGrad)"/>
  <rect x="30" y="75" width="740" height="10" fill="url(#blueGrad)"/>
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">顺序协作</text>

  <!-- 顺序：Agent A → Agent B → Agent C -->
  <!-- Agent A -->
  <rect x="80" y="105" width="100" height="40" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="130" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">Agent A</text>

  <!-- 箭头 A→B -->
  <line x1="185" y1="125" x2="225" y2="125" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <polygon points="225,120 235,125 225,130" fill="#409EFF"/>

  <!-- 文档图标 1 -->
  <rect x="200" y="115" width="16" height="20" rx="2" fill="white" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="204" y1="120" x2="212" y2="120" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="204" y1="124" x2="212" y2="124" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="204" y1="128" x2="210" y2="128" stroke="#409EFF" stroke-width="0.8"/>

  <!-- Agent B -->
  <rect x="290" y="105" width="100" height="40" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="340" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">Agent B</text>

  <!-- 箭头 B→C -->
  <line x1="395" y1="125" x2="435" y2="125" stroke="#409EFF" stroke-width="2"/>
  <polygon points="435,120 445,125 435,130" fill="#409EFF"/>

  <!-- 文档图标 2 -->
  <rect x="410" y="115" width="16" height="20" rx="2" fill="white" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="414" y1="120" x2="422" y2="120" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="414" y1="124" x2="422" y2="124" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="414" y1="128" x2="420" y2="128" stroke="#409EFF" stroke-width="0.8"/>

  <!-- Agent C -->
  <rect x="500" y="105" width="100" height="40" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="550" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">Agent C</text>

  <!-- 最佳标注 -->
  <rect x="640" y="108" width="120" height="34" rx="17" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="700" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">最佳：流水线任务</text>

  <!-- ============ 面板 2：并行协作 ============ -->
  <rect x="30" y="195" width="740" height="125" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="195" width="740" height="30" rx="10" fill="url(#blueGrad)"/>
  <rect x="30" y="215" width="740" height="10" fill="url(#blueGrad)"/>
  <text x="50" y="215" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">并行协作</text>

  <!-- 中心任务 -->
  <rect x="60" y="250" width="90" height="40" rx="20" fill="#409EFF"/>
  <text x="105" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">任务</text>

  <!-- 发散线 -->
  <line x1="155" y1="260" x2="230" y2="260" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="155" y1="270" x2="230" y2="270" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="155" y1="280" x2="230" y2="280" stroke="#409EFF" stroke-width="1.8"/>

  <!-- 三个并行 Agent -->
  <rect x="240" y="242" width="90" height="36" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="285" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">Agent A</text>

  <rect x="240" y="252" width="90" height="36" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="285" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">Agent B</text>

  <rect x="240" y="262" width="90" height="36" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="285" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">Agent C</text>

  <!-- 汇聚线 -->
  <line x1="335" y1="260" x2="410" y2="270" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="335" y1="270" x2="410" y2="270" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="335" y1="280" x2="410" y2="270" stroke="#409EFF" stroke-width="1.8"/>

  <!-- 汇聚 Agent -->
  <rect x="420" y="250" width="100" height="40" rx="8" fill="#409EFF"/>
  <text x="470" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">汇总 Agent</text>

  <!-- 最佳标注 -->
  <rect x="640" y="248" width="120" height="34" rx="17" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="700" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">最佳：多角度分析</text>

  <!-- ============ 面板 3：层级协作 ============ -->
  <rect x="30" y="335" width="740" height="130" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="335" width="740" height="30" rx="10" fill="url(#blueGrad)"/>
  <rect x="30" y="355" width="740" height="10" fill="url(#blueGrad)"/>
  <text x="50" y="355" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">层级协作</text>

  <!-- 管理者 -->
  <rect x="330" y="378" width="100" height="38" rx="8" fill="#409EFF"/>
  <text x="380" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">管理者</text>

  <!-- 连接线 -->
  <line x1="360" y1="418" x2="200" y2="448" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="380" y1="418" x2="380" y2="448" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="400" y1="418" x2="560" y2="448" stroke="#409EFF" stroke-width="1.8"/>

  <!-- Worker A -->
  <rect x="140" y="435" width="100" height="36" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="190" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">Worker A</text>

  <!-- Worker B -->
  <rect x="330" y="435" width="100" height="36" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="380" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">Worker B</text>

  <!-- Worker C -->
  <rect x="520" y="435" width="100" height="36" rx="8" fill="url(#lightBlueGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="570" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">Worker C</text>

  <!-- 最佳标注 -->
  <rect x="640" y="388" width="120" height="34" rx="17" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="700" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">最佳：复杂动态任务</text>

</svg>