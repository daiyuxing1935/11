<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>
  
  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">提示词优化前后对比</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- ============ 左侧：优化前 ============ -->
  <rect x="30" y="70" width="280" height="390" rx="12" fill="white" stroke="#E0E6ED" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="70" width="280" height="36" rx="12" fill="#FF6B6B" opacity="0.15"/>
  <rect x="30" y="94" width="280" height="12" fill="#FF6B6B" opacity="0.15"/>
  <text x="170" y="93" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#E74C3C">⚠ 优化前 · 问题提示词</text>

  <!-- 问题1：回答笼统 -->
  <rect x="52" y="120" width="236" height="50" rx="8" fill="#FFF0F0" stroke="#FFB8B8" stroke-width="1.2"/>
  <text x="66" y="142" font-family="sans-serif" font-size="13" fill="#1a1a2e">请描述一下人工智能的发展</text>
  <text x="66" y="160" font-family="sans-serif" font-size="11" fill="#E74C3C">⏺ 回答笼统 · 缺乏具体方向</text>
  <circle cx="268" cy="135" r="10" fill="#FF6B6B" opacity="0.8"/>
  <text x="268" y="139" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">!</text>

  <!-- 问题2：遗漏信息 -->
  <rect x="52" y="182" width="236" height="50" rx="8" fill="#FFF0F0" stroke="#FFB8B8" stroke-width="1.2"/>
  <text x="66" y="204" font-family="sans-serif" font-size="13" fill="#1a1a2e">比较Python和Java</text>
  <text x="66" y="222" font-family="sans-serif" font-size="11" fill="#E74C3C">⏺ 遗漏信息 · 缺少比较维度</text>
  <rect x="262" y="192" width="18" height="18" rx="3" fill="#FFB8B8" stroke="#E74C3C" stroke-width="1.2"/>
  <line x1="266" y1="196" x2="276" y2="206" stroke="#E74C3C" stroke-width="1.5"/>
  <line x1="276" y1="196" x2="266" y2="206" stroke="#E74C3C" stroke-width="1.5"/>

  <!-- 问题3：格式不稳定 -->
  <rect x="52" y="244" width="236" height="50" rx="8" fill="#FFF0F0" stroke="#FFB8B8" stroke-width="1.2"/>
  <text x="66" y="264" font-family="sans-serif" font-size="13" fill="#1a1a2e">1. 第一步 2.第二步 3. 第三步</text>
  <text x="66" y="282" font-family="sans-serif" font-size="11" fill="#E74C3C">⏺ 格式不稳定 · 排版混乱</text>
  <rect x="260" y="254" width="20" height="14" rx="2" fill="#FFB8B8" stroke="#E74C3C" stroke-width="1"/>
  <rect x="262" y="256" width="16" height="3" rx="1" fill="#E74C3C" opacity="0.5"/>
  <rect x="262" y="261" width="10" height="3" rx="1" fill="#E74C3C" opacity="0.5"/>

  <!-- 问题4：存在偏见 -->
  <rect x="52" y="306" width="236" height="50" rx="8" fill="#FFF0F0" stroke="#FFB8B8" stroke-width="1.2"/>
  <text x="66" y="328" font-family="sans-serif" font-size="13" fill="#1a1a2e">为什么苹果手机最好用？</text>
  <text x="66" y="346" font-family="sans-serif" font-size="11" fill="#E74C3C">⏺ 存在偏见 · 预设立场</text>
  <polygon points="270,310 278,326 262,326" fill="#FFB8B8" stroke="#E74C3C" stroke-width="1.2"/>
  <line x1="270" y1="316" x2="270" y2="322" stroke="#E74C3C" stroke-width="1.5"/>
  <circle cx="270" cy="324" r="1.5" fill="#E74C3C"/>

  <!-- 问题5：幻觉 -->
  <rect x="52" y="368" width="236" height="50" rx="8" fill="#FFF0F0" stroke="#FFB8B8" stroke-width="1.2"/>
  <text x="66" y="390" font-family="sans-serif" font-size="13" fill="#1a1a2e">2025年GDP增长20%</text>
  <text x="66" y="408" font-family="sans-serif" font-size="11" fill="#E74C3C">⏺ 幻觉 · 数据不实</text>
  <circle cx="270" cy="383" r="10" fill="#E8E0FF" stroke="#9B8ED8" stroke-width="1.2" opacity="0.8"/>
  <text x="270" y="387" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7B6EC0">?</text>

  <!-- ============ 中间：优化齿轮 ============ -->
  <!-- 箭头背景 -->
  <rect x="322" y="200" width="56" height="100" rx="28" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- 齿轮图标 -->
  <g transform="translate(350, 250)">
    <circle cx="0" cy="0" r="22" fill="url(#gearGrad)" stroke="#2B7ED6" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="white"/>
    <!-- 齿轮齿 -->
    <rect x="-4" y="-28" width="8" height="10" rx="2" fill="#409EFF"/>
    <rect x="-4" y="18" width="8" height="10" rx="2" fill="#409EFF"/>
    <rect x="-28" y="-4" width="10" height="8" rx="2" fill="#409EFF"/>
    <rect x="18" y="-4" width="10" height="8" rx="2" fill="#409EFF"/>
    <rect x="13" y="-23" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(45, 17, -18)"/>
    <rect x="-21" y="13" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(45, -17, 18)"/>
    <rect x="-21" y="-23" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(-45, -17, -18)"/>
    <rect x="13" y="13" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(-45, 17, 18)"/>
  </g>
  
  <text x="350" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">优化</text>
  
  <!-- 箭头 -->
  <polygon points="345,235 355,235 350,228" fill="#409EFF" opacity="0.6"/>
  <polygon points="345,265 355,265 350,272" fill="#409EFF" opacity="0.6"/>

  <!-- ============ 右侧：优化后 ============ -->
  <rect x="490" y="70" width="280" height="390" rx="12" fill="white" stroke="#E0E6ED" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="490" y="70" width="280" height="36" rx="12" fill="#67C23A" opacity="0.12"/>
  <rect x="490" y="94" width="280" height="12" fill="#67C23A" opacity="0.12"/>
  <text x="630" y="93" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#67C23A">✓ 优化后 · 优质提示词</text>

  <!-- 优化1：具体明确 -->
  <rect x="512" y="120" width="236" height="50" rx="8" fill="#F0FFF0" stroke="#B8E6B8" stroke-width="1.2"/>
  <text x="526" y="142" font-family="sans-serif" font-size="13" fill="#1a1a2e">请从技术、伦理、应用三方面</text>
  <text x="526" y="160" font-family="sans-serif" font-size="13" fill="#1a1a2e">介绍人工智能发展历程</text>
  <circle cx="728" cy="135" r="10" fill="#67C23A"/>
  <text x="728" y="139" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">✓</text>

  <!-- 优化2：信息完整 -->
  <rect x="512" y="182" width="236" height="50" rx="8" fill="#F0FFF0" stroke="#B8E6B8" stroke-width="1.2"/>
  <text x="526" y="204" font-family="sans-serif" font-size="13" fill="#1a1a2e">从语法、性能、生态、学习曲线</text>
  <text x="526" y="222" font-family="sans-serif" font-size="13" fill="#1a1a2e">四个维度比较Python和Java</text>
  <circle cx="728" cy="197" r="10" fill="#67C23A"/>
  <text x="728" y="201" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">✓</text>

  <!-- 优化3：格式规范 -->
  <rect x="512" y="244" width="236" height="50" rx="8" fill="#F0FFF0" stroke="#B8E6B8" stroke-width="1.2"/>
  <text x="526" y="264" font-family="sans-serif" font-size="13" fill="#1a1a2e">步骤一：准备工作</text>
  <text x="526" y="282" font-family="sans-serif" font-size="13" fill="#1a1a2e">步骤二：执行操作  步骤三：验证结果</text>
  <circle cx="728" cy="259" r="10" fill="#67C23A"/>
  <text x="728" y="263" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">✓</text>

  <!-- 优化4：客观中立 -->
  <rect x="512" y="306" width="236" height="50" rx="8" fill="#F0FFF0" stroke="#B8E6B8" stroke-width="1.2"/>
  <text x="526" y="328" font-family="sans-serif" font-size="13" fill="#1a1a2e">请客观比较iOS与Android</text>
  <text x="526" y="346" font-family="sans-serif" font-size="13" fill="#1a1a2e">在用户体验、安全、开放性方面</text>
  <circle cx="728" cy="321" r="10" fill="#67C23A"/>
  <text x="728" y="325" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">✓</text>

  <!-- 优化5：数据可靠 -->
  <rect x="512" y="368" width="236" height="50" rx="8" fill="#F0FFF0" stroke="#B8E6B8" stroke-width="1.2"/>
  <text x="526" y="390" font-family="sans-serif" font-size="13" fill="#1a1a2e">请提供2025年中国GDP增长</text>
  <text x="526" y="408" font-family="sans-serif" font-size="13" fill="#1a1a2e">的权威预测数据及来源</text>
  <circle cx="728" cy="383" r="10" fill="#67C23A"/>
  <text x="728" y="387" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">✓</text>

  <!-- 底部标注 -->
  <text x="400" y="485" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#909399">提示：具体 · 完整 · 规范 · 客观 · 可靠</text>
</svg>