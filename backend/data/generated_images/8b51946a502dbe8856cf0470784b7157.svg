<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3070cc"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f9ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">上下文学习（无参数更新）</text>

  <!-- 上下文光环环 -->
  <ellipse cx="400" cy="255" rx="210" ry="155" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <ellipse cx="400" cy="255" rx="195" ry="142" fill="url(#ringGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.25"/>

  <!-- 中心大脑图标 -->
  <g transform="translate(400, 255)">
    <!-- 大脑主体 -->
    <ellipse cx="0" cy="0" rx="52" ry="42" fill="url(#brainGrad)" opacity="0.9"/>
    <!-- 大脑褶皱 -->
    <path d="M-30,-15 Q-15,-25 0,-18 Q15,-25 30,-15" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
    <path d="M-35,-5 Q-18,-12 0,-8 Q18,-12 35,-5" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
    <path d="M-32,8 Q-16,2 0,6 Q16,2 32,8" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
    <path d="M-25,18 Q-12,12 0,16 Q12,12 25,18" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
    <!-- 大脑中间分割线 -->
    <line x1="0" y1="-38" x2="0" y2="38" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <!-- 锁图标 -->
    <rect x="-10" y="-10" width="20" height="16" rx="3" fill="#fff" opacity="0.9"/>
    <path d="M-6,-10 L-6,-14 Q-6,-18 0,-18 Q6,-18 6,-14 L6,-10" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>
    <circle cx="0" cy="-4" r="2" fill="#409EFF"/>
    <!-- 锁孔 -->
    <rect x="-1.5" y="-3" width="3" height="5" rx="1" fill="#409EFF"/>
  </g>

  <!-- 示例卡片 - 左侧 -->
  <g transform="translate(255, 175)">
    <rect x="-42" y="-28" width="84" height="56" rx="8" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">↓</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">输出</text>
  </g>

  <g transform="translate(230, 255)">
    <rect x="-42" y="-28" width="84" height="56" rx="8" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">↓</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">输出</text>
  </g>

  <g transform="translate(255, 335)">
    <rect x="-42" y="-28" width="84" height="56" rx="8" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">↓</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">输出</text>
  </g>

  <!-- 示例卡片 - 右侧 -->
  <g transform="translate(545, 175)">
    <rect x="-42" y="-28" width="84" height="56" rx="8" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">↓</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">输出</text>
  </g>

  <g transform="translate(570, 255)">
    <rect x="-42" y="-28" width="84" height="56" rx="8" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">↓</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">输出</text>
  </g>

  <g transform="translate(545, 335)">
    <rect x="-42" y="-28" width="84" height="56" rx="8" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入</text>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">↓</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">输出</text>
  </g>

  <!-- 从下方进入的新测试输入 -->
  <g transform="translate(400, 410)">
    <rect x="-55" y="-22" width="110" height="44" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">新测试输入</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" font-weight="bold">？→ 输出</text>
  </g>

  <!-- 从新输入到上下文的箭头 -->
  <line x1="400" y1="388" x2="400" y2="305" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="396,310 400,300 404,310" fill="#409EFF" opacity="0.5"/>

  <!-- 从上下文到输出的箭头（右侧） -->
  <path d="M480,255 Q520,255 530,255" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <polygon points="525,251 535,255 525,259" fill="#409EFF" opacity="0.4"/>

  <!-- 标注 -->
  <!-- 标注1：大脑锁定 -->
  <g transform="translate(400, 190)">
    <rect x="-65" y="-14" width="130" height="28" rx="6" fill="#1a1a2e" opacity="0.75"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">大脑参数已锁定</text>
  </g>
  <line x1="400" y1="204" x2="400" y2="215" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>

  <!-- 标注2：上下文环 -->
  <g transform="translate(580, 210)">
    <rect x="-58" y="-14" width="116" height="28" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">上下文信息环</text>
  </g>
  <line x1="540" y1="220" x2="510" y2="235" stroke="#409EFF" stroke-width="1" opacity="0.5"/>

  <!-- 标注3：示例对 -->
  <g transform="translate(230, 150)">
    <rect x="-48" y="-14" width="96" height="28" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">输入输出示例</text>
  </g>
  <line x1="250" y1="164" x2="265" y2="175" stroke="#409EFF" stroke-width="1" opacity="0.5"/>

  <!-- 标注4：无权重更新 -->
  <g transform="translate(170, 280)">
    <rect x="-58" y="-14" width="116" height="28" rx="6" fill="#1a1a2e" opacity="0.75"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">无需权重更新</text>
  </g>
  <line x1="210" y1="280" x2="240" y2="270" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>

  <!-- 标注5：新输入 -->
  <g transform="translate(400, 445)">
    <rect x="-48" y="-14" width="96" height="28" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">新测试输入</text>
  </g>

  <!-- 标注6：正确输出 -->
  <g transform="translate(610, 370)">
    <rect x="-48" y="-14" width="96" height="28" rx="6" fill="#1a1a2e" opacity="0.75"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">生成正确输出</text>
  </g>
  <line x1="580" y1="370" x2="560" y2="355" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>

  <!-- 底部说明文字 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.5">通过上下文示例自适应，模型权重保持不变</text>

</svg>