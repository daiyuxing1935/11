<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FE0"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B3D9FF"/>
      <stop offset="100%" stop-color="#99CCFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  <rect x="15" y="15" width="770" height="470" fill="none" stroke="#409EFF" stroke-width="1.5" rx="6" opacity="0.3"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">CrewAI 角色设计模式</text>
  <line x1="300" y1="50" x2="500" y2="50" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ==================== 模式1：专家团队 ==================== -->
  <text x="30" y="82" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">模式1：专家团队</text>

  <!-- 专家团队背景框 -->
  <rect x="25" y="90" width="240" height="130" rx="8" fill="white" stroke="#409EFF" stroke-width="1.2" opacity="0.7"/>

  <!-- 5个专家角色 - 上半排3个 -->
  <!-- 会计 -->
  <rect x="42" y="100" width="44" height="44" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="64" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">📊</text>
  <text x="64" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">会计</text>

  <!-- 市场分析师 -->
  <rect x="100" y="100" width="44" height="44" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="122" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">📈</text>
  <text x="122" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">市场分析师</text>

  <!-- 风险经理 -->
  <rect x="158" y="100" width="44" height="44" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="180" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">⚠️</text>
  <text x="180" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">风险经理</text>

  <!-- 下半排2个 -->
  <!-- 综合员 -->
  <rect x="70" y="162" width="44" height="44" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="92" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">🔄</text>
  <text x="92" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">综合员</text>

  <!-- 技术专家 -->
  <rect x="128" y="162" width="44" height="44" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="150" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">💻</text>
  <text x="150" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">技术专家</text>

  <!-- 团队连接线 -->
  <line x1="86" y1="144" x2="86" y2="162" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  <line x1="144" y1="144" x2="144" y2="162" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  <line x1="202" y1="144" x2="170" y2="162" stroke="#409EFF" stroke-width="1" opacity="0.4"/>

  <!-- 标注1 -->
  <rect x="35" y="225" width="72" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="71" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">各司其职</text>

  <!-- ==================== 模式2：生成-批评 ==================== -->
  <text x="290" y="82" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">模式2：生成-批评</text>

  <rect x="285" y="90" width="230" height="130" rx="8" fill="white" stroke="#409EFF" stroke-width="1.2" opacity="0.7"/>

  <!-- 写手 -->
  <rect x="305" y="110" width="55" height="55" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="332" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">✏️</text>
  <text x="332" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">写手</text>

  <!-- 批评者 -->
  <rect x="440" y="110" width="55" height="55" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="467" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">🔍</text>
  <text x="467" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">批评者</text>

  <!-- 循环箭头：写手→批评者 -->
  <path d="M360 137 L430 137" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowBlueBack" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 反馈循环：批评者→写手（下方返回） -->
  <path d="M467 165 Q467 190 332 190 Q305 190 305 175" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowBlueBack)"/>

  <!-- 反馈标签 -->
  <text x="400" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">反馈循环</text>

  <!-- 标注2 -->
  <rect x="310" y="225" width="72" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="346" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">迭代优化</text>

  <!-- ==================== 模式3：导师-学徒 ==================== -->
  <text x="545" y="82" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">模式3：导师-学徒</text>

  <rect x="535" y="90" width="240" height="130" rx="8" fill="white" stroke="#409EFF" stroke-width="1.2" opacity="0.7"/>

  <!-- 高级开发者（大） -->
  <rect x="555" y="105" width="65" height="65" rx="10" fill="url(#blueGrad)" opacity="0.95"/>
  <text x="587" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">👨‍💻</text>
  <text x="587" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">高级开发者</text>

  <!-- 初级开发者（小） -->
  <rect x="690" y="118" width="50" height="50" rx="8" fill="url(#lightBlueGrad)" opacity="0.9"/>
  <text x="715" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">👨‍🎓</text>
  <text x="715" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">初级开发者</text>

  <!-- 指导箭头 -->
  <path d="M620 125 L680 125" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)" fill="none"/>
  <path d="M620 145 L680 145" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)" fill="none"/>

  <!-- 代码传递 -->
  <rect x="630" y="155" width="40" height="18" rx="3" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="650" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#409EFF">代码</text>

  <!-- 标注3 -->
  <rect x="610" y="225" width="72" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="646" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">传帮带</text>

  <!-- ==================== 底部说明区域 ==================== -->
  <rect x="25" y="260" width="750" height="1" fill="#409EFF" opacity="0.3"/>

  <!-- 底部三个模式的总结标注 -->
  <!-- 模式1 总结 -->
  <rect x="25" y="280" width="240" height="60" rx="8" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <text x="145" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">专家团队</text>
  <text x="145" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">多角色协作，各展所长</text>

  <!-- 模式2 总结 -->
  <rect x="285" y="280" width="230" height="60" rx="8" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <text x="400" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">生成-批评</text>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">内容生成与质量把控</text>

  <!-- 模式3 总结 -->
  <rect x="535" y="280" width="240" height="60" rx="8" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <text x="655" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">导师-学徒</text>
  <text x="655" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">经验传承与能力培养</text>

  <!-- 底部装饰线 -->
  <line x1="100" y1="360" x2="700" y2="360" stroke="#409EFF" stroke-width="1" opacity="0.2"/>

  <!-- 底部小字 -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#999">CrewAI 角色设计模式 · 教育配图</text>

  <!-- 装饰元素 -->
  <circle cx="750" cy="30" r="15" fill="#409EFF" opacity="0.08"/>
  <circle cx="750" cy="30" r="8" fill="#409EFF" opacity="0.12"/>
  <circle cx="50" cy="30" r="10" fill="#409EFF" opacity="0.08"/>

</svg>