<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EBF9"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <linearGradient id="leftBoxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
    <linearGradient id="rightBoxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" letter-spacing="2">提示词优化前后对比</text>

  <!-- ============ 左侧：优化前 ============ -->
  <rect x="40" y="60" width="300" height="380" rx="14" fill="url(#leftBoxGrad)" stroke="#E0E8F0" stroke-width="1.5"/>
  <rect x="40" y="60" width="300" height="42" rx="14" fill="#FF6B6B" opacity="0.15"/>
  <text x="190" y="88" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#E74C3C">❌ 优化前 · 混乱提示</text>

  <!-- 问题1：回答笼统 - 模糊文字块 -->
  <rect x="60" y="118" width="260" height="50" rx="10" fill="#FFF0F0" stroke="#FFB3B3" stroke-width="1.2"/>
  <text x="190" y="138" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#CC5555">回答笼统 / Vague</text>
  <text x="190" y="157" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#CC5555" opacity="0.7">内容模糊不具体</text>
  <rect x="60" y="118" width="260" height="50" rx="10" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 问题2：遗漏信息 - 缺失拼图 -->
  <rect x="60" y="182" width="260" height="50" rx="10" fill="#FFF5F0" stroke="#FFCCAA" stroke-width="1.2"/>
  <text x="190" y="202" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#CC7733">遗漏信息 / Missing Info</text>
  <text x="190" y="221" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#CC7733" opacity="0.7">关键要素缺失</text>
  <!-- 拼图块 -->
  <rect x="68" y="190" width="14" height="14" rx="3" fill="#FF9944" opacity="0.5"/>
  <rect x="84" y="190" width="14" height="14" rx="3" fill="#FF9944" opacity="0.3"/>

  <!-- 问题3：格式不稳定 -->
  <rect x="60" y="246" width="260" height="50" rx="10" fill="#FFF8F0" stroke="#FFD9AA" stroke-width="1.2"/>
  <text x="190" y="266" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#CC8833">格式不稳定 / Unstable Format</text>
  <text x="190" y="285" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#CC8833" opacity="0.7">排版错乱不对齐</text>
  <!-- 错位方块 -->
  <rect x="68" y="254" width="10" height="10" rx="2" fill="#FFBB55" opacity="0.6"/>
  <rect x="82" y="258" width="10" height="10" rx="2" fill="#FFBB55" opacity="0.4"/>
  <rect x="96" y="252" width="10" height="10" rx="2" fill="#FFBB55" opacity="0.5"/>

  <!-- 问题4：存在偏见 -->
  <rect x="60" y="310" width="260" height="50" rx="10" fill="#FFF0F5" stroke="#FFB3CC" stroke-width="1.2"/>
  <text x="190" y="330" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#CC5577">存在偏见 / Bias</text>
  <text x="190" y="349" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#CC5577" opacity="0.7">立场不中立</text>
  <!-- 倾斜天平 -->
  <line x1="68" y1="345" x2="98" y2="345" stroke="#DD6688" stroke-width="2.5" transform="rotate(-15, 83, 345)"/>
  <circle cx="83" cy="345" r="3" fill="#DD6688"/>

  <!-- 问题5：幻觉 -->
  <rect x="60" y="374" width="260" height="50" rx="10" fill="#F0F0FF" stroke="#B3B3FF" stroke-width="1.2"/>
  <text x="190" y="394" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#5555CC">幻觉 / Hallucination</text>
  <text x="190" y="413" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#5555CC" opacity="0.7">生成不实内容</text>
  <!-- 鬼影云 -->
  <ellipse cx="78" cy="402" rx="12" ry="7" fill="#9999DD" opacity="0.4"/>
  <ellipse cx="78" cy="398" rx="8" ry="5" fill="#AAAAEE" opacity="0.3"/>

  <!-- ============ 中央：优化齿轮 ============ -->
  <!-- 箭头背景 -->
  <rect x="355" y="200" width="90" height="100" rx="45" fill="#409EFF" opacity="0.08"/>

  <!-- 齿轮图标 -->
  <g transform="translate(400, 250)">
    <!-- 外齿轮 -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#gearGrad)" stroke-width="3.5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#gearGrad)" stroke-width="2.5"/>
    <!-- 齿 -->
    <rect x="-4" y="-32" width="8" height="10" rx="2" fill="#409EFF"/>
    <rect x="-4" y="22" width="8" height="10" rx="2" fill="#409EFF"/>
    <rect x="-32" y="-4" width="10" height="8" rx="2" fill="#409EFF"/>
    <rect x="22" y="-4" width="10" height="8" rx="2" fill="#409EFF"/>
    <rect x="16" y="-26" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(45, 20, -21)"/>
    <rect x="-24" y="16" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(45, -20, 21)"/>
    <rect x="16" y="16" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(-45, 20, 21)"/>
    <rect x="-24" y="-26" width="8" height="10" rx="2" fill="#409EFF" transform="rotate(-45, -20, -21)"/>
    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="8" fill="#409EFF"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
  </g>

  <!-- 优化文字 -->
  <text x="400" y="300" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">优化</text>
  <text x="400" y="316" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Optimize</text>

  <!-- 箭头 -->
  <line x1="355" y1="250" x2="345" y2="250" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <line x1="445" y1="250" x2="455" y2="250" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowRight)"/>

  <defs>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ============ 右侧：优化后 ============ -->
  <rect x="460" y="60" width="300" height="380" rx="14" fill="url(#rightBoxGrad)" stroke="#C8E6C9" stroke-width="1.5"/>
  <rect x="460" y="60" width="300" height="42" rx="14" fill="#4CAF50" opacity="0.12"/>
  <text x="610" y="88" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#2E7D32">✅ 优化后 · 清晰提示</text>

  <!-- 优化后：清晰结构 -->
  <rect x="480" y="118" width="260" height="50" rx="10" fill="#F0FFF4" stroke="#A5D6A7" stroke-width="1.5"/>
  <rect x="480" y="118" width="50" height="50" rx="10" fill="#4CAF50" opacity="0.15"/>
  <text x="505" y="148" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#2E7D32">✓</text>
  <text x="545" y="140" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">具体明确</text>
  <text x="545" y="157" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">内容清晰有细节</text>

  <rect x="480" y="182" width="260" height="50" rx="10" fill="#F0FFF4" stroke="#A5D6A7" stroke-width="1.5"/>
  <rect x="480" y="182" width="50" height="50" rx="10" fill="#4CAF50" opacity="0.15"/>
  <text x="505" y="212" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#2E7D32">✓</text>
  <text x="545" y="204" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">信息完整</text>
  <text x="545" y="221" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">关键要素齐全</text>

  <rect x="480" y="246" width="260" height="50" rx="10" fill="#F0FFF4" stroke="#A5D6A7" stroke-width="1.5"/>
  <rect x="480" y="246" width="50" height="50" rx="10" fill="#4CAF50" opacity="0.15"/>
  <text x="505" y="276" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#2E7D32">✓</text>
  <text x="545" y="268" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">格式规范</text>
  <text x="545" y="285" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">排版整齐统一</text>

  <rect x="480" y="310" width="260" height="50" rx="10" fill="#F0FFF4" stroke="#A5D6A7" stroke-width="1.5"/>
  <rect x="480" y="310" width="50" height="50" rx="10" fill="#4CAF50" opacity="0.15"/>
  <text x="505" y="340" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#2E7D32">✓</text>
  <text x="545" y="332" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">中立客观</text>
  <text x="545" y="349" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">立场公正平衡</text>

  <rect x="480" y="374" width="260" height="50" rx="10" fill="#F0FFF4" stroke="#A5D6A7" stroke-width="1.5"/>
  <rect x="480" y="374" width="50" height="50" rx="10" fill="#4CAF50" opacity="0.15"/>
  <text x="505" y="404" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#2E7D32">✓</text>
  <text x="545" y="396" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">真实可靠</text>
  <text x="545" y="413" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">内容准确可验证</text>

  <!-- 底部装饰线 -->
  <line x1="40" y1="460" x2="760" y2="460" stroke="#409EFF" stroke-width="1" opacity="0.15"/>
  <text x="400" y="482" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#409EFF" opacity="0.5">提示词工程 · 优化前后对比</text>
</svg>