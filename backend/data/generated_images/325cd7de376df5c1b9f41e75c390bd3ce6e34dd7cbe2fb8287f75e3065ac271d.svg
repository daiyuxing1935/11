<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="tier1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#60B0FF"/>
    </linearGradient>
    <linearGradient id="tier2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#60B0FF"/>
    </linearGradient>
    <linearGradient id="tier3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#60B0FF"/>
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">三层隐私保护架构</text>

  <!-- ==================== 左侧决策树 ==================== -->
  <g transform="translate(30, 55)">
    <!-- 决策树背景框 -->
    <rect x="0" y="0" width="160" height="430" rx="12" fill="#1a1a2e" opacity="0.06"/>
    <text x="80" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">数据敏感度</text>

    <!-- 根节点：数据输入 -->
    <rect x="40" y="38" width="80" height="30" rx="15" fill="url(#decisionGrad)" filter="url(#shadow)"/>
    <text x="80" y="57" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">数据输入</text>

    <!-- 分支线 -->
    <line x1="80" y1="68" x2="80" y2="88" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="80" y1="88" x2="80" y2="108" stroke="#1a1a2e" stroke-width="1.5"/>

    <!-- 三个分支标签 -->
    <text x="82" y="102" font-family="sans-serif" font-size="11" fill="#1a1a2e">高</text>
    <text x="82" y="202" font-family="sans-serif" font-size="11" fill="#1a1a2e">中</text>
    <text x="82" y="302" font-family="sans-serif" font-size="11" fill="#1a1a2e">低</text>

    <!-- 高敏感度分支 -->
    <line x1="80" y1="108" x2="80" y2="118" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="25" y="118" width="110" height="28" rx="14" fill="#409EFF" opacity="0.85" filter="url(#shadow)"/>
    <text x="80" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">本地预处理</text>
    <line x1="80" y1="146" x2="80" y2="160" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="25" y="160" width="110" height="28" rx="14" fill="#1a1a2e" opacity="0.7" filter="url(#shadow)"/>
    <text x="80" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">本地存储</text>

    <!-- 中敏感度分支 -->
    <line x1="80" y1="108" x2="80" y2="210" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="25" y="210" width="110" height="28" rx="14" fill="#409EFF" opacity="0.85" filter="url(#shadow)"/>
    <text x="80" y="228" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">本地预处理</text>
    <line x1="80" y1="238" x2="80" y2="252" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="25" y="252" width="110" height="28" rx="14" fill="#409EFF" opacity="0.7" filter="url(#shadow)"/>
    <text x="80" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">云端处理</text>

    <!-- 低敏感度分支 -->
    <line x1="80" y1="108" x2="80" y2="310" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="2,4"/>
    <rect x="25" y="310" width="110" height="28" rx="14" fill="#409EFF" opacity="0.6" filter="url(#shadow)"/>
    <text x="80" y="328" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">直接云端</text>

    <!-- 决策树底部说明 -->
    <text x="80" y="380" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">高敏感度 → 本地</text>
    <text x="80" y="396" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">中敏感度 → 本地+云</text>
    <text x="80" y="412" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">低敏感度 → 直接云</text>
  </g>

  <!-- ==================== 右侧三层架构 ==================== -->
  <g transform="translate(210, 55)">

    <!-- 层级 1：本地预处理 -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="555" height="120" rx="14" fill="#fff" stroke="#409EFF" stroke-width="2"/>
      <rect x="0" y="0" width="555" height="36" rx="14" fill="url(#tier1Grad)"/>
      <rect x="0" y="20" width="555" height="16" fill="url(#tier1Grad)"/>
    </g>
    <text x="20" y="24" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fff">第1层：本地预处理</text>

    <!-- 电脑图标 -->
    <g transform="translate(30, 50)">
      <rect x="0" y="8" width="40" height="28" rx="4" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
      <rect x="12" y="14" width="16" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
      <rect x="10" y="36" width="20" height="4" rx="2" fill="#409EFF" opacity="0.4"/>
      <rect x="5" y="40" width="30" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>
    </g>

    <!-- 绿盾图标 -->
    <g transform="translate(100, 52)">
      <path d="M20 2 L38 10 L38 24 C38 34 20 42 20 42 C20 42 2 34 2 24 L2 10 Z" fill="#52C41A" opacity="0.25" stroke="#52C41A" stroke-width="1.5"/>
      <path d="M20 8 L20 30 M12 18 L28 18" stroke="#52C41A" stroke-width="2" stroke-linecap="round"/>
    </g>

    <text x="145" y="62" font-family="sans-serif" font-size="13" fill="#1a1a2e">数据清洗</text>
    <text x="145" y="82" font-family="sans-serif" font-size="13" fill="#1a1a2e">脱敏处理（本地）</text>

    <!-- 本地标注 -->
    <rect x="300" y="50" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.08"/>
    <text x="340" y="66" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">本地设备</text>

    <!-- 箭头 1→2 -->
    <line x1="277" y1="120" x2="277" y2="148" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="273,145 277,155 281,145" fill="#409EFF"/>

    <!-- 层级 2：边缘处理 -->
    <g filter="url(#shadow)">
      <rect x="0" y="155" width="555" height="120" rx="14" fill="#fff" stroke="#409EFF" stroke-width="2"/>
      <rect x="0" y="155" width="555" height="36" rx="14" fill="url(#tier2Grad)"/>
      <rect x="0" y="175" width="555" height="16" fill="url(#tier2Grad)"/>
    </g>
    <text x="20" y="179" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fff">第2层：边缘处理</text>

    <!-- 服务器图标 -->
    <g transform="translate(30, 205)">
      <rect x="0" y="0" width="36" height="24" rx="3" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
      <rect x="4" y="4" width="28" height="4" rx="1" fill="#409EFF" opacity="0.4"/>
      <rect x="4" y="10" width="28" height="4" rx="1" fill="#409EFF" opacity="0.4"/>
      <rect x="4" y="16" width="28" height="4" rx="1" fill="#409EFF" opacity="0.4"/>
      <circle cx="18" cy="30" r="3" fill="#409EFF" opacity="0.3"/>
    </g>

    <text x="85" y="218" font-family="sans-serif" font-size="13" fill="#1a1a2e">小模型推理</text>
    <text x="85" y="238" font-family="sans-serif" font-size="13" fill="#1a1a2e">简单任务处理</text>

    <!-- 边缘标注 -->
    <rect x="300" y="205" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.08"/>
    <text x="340" y="221" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">边缘节点</text>

    <!-- 箭头 2→3 -->
    <line x1="277" y1="275" x2="277" y2="303" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="273,300 277,310 281,300" fill="#409EFF"/>

    <!-- 层级 3：云端处理 -->
    <g filter="url(#shadow)">
      <rect x="0" y="310" width="555" height="120" rx="14" fill="#fff" stroke="#409EFF" stroke-width="2"/>
      <rect x="0" y="310" width="555" height="36" rx="14" fill="url(#tier3Grad)"/>
      <rect x="0" y="330" width="555" height="16" fill="url(#tier3Grad)"/>
    </g>
    <text x="20" y="334" font-family="sans-serif" font-size="15" font-weight="bold" fill="#fff">第3层：云端处理</text>

    <!-- 云图标 -->
    <g transform="translate(30, 360)">
      <path d="M12 20 C6 20 2 16 2 12 C2 8 6 4 12 4 C14 2 18 1 22 3 C26 1 30 3 32 7 C36 8 36 14 32 17 C30 19 26 20 22 19 C20 21 16 21 14 20 Z" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M10 14 L18 14 L18 10 L26 10 L26 14 L34 14" stroke="#409EFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <text x="85" y="373" font-family="sans-serif" font-size="13" fill="#1a1a2e">大模型复杂任务</text>
    <text x="85" y="393" font-family="sans-serif" font-size="13" fill="#1a1a2e">仅接收脱敏数据</text>

    <!-- 云端标注 -->
    <rect x="300" y="360" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.08"/>
    <text x="340" y="376" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">云端服务</text>

    <!-- 数据流向标注 -->
    <g transform="translate(420, 50)">
      <rect x="0" y="0" width="110" height="70" rx="8" fill="#1a1a2e" opacity="0.04"/>
      <text x="55" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">数据流向</text>
      <line x1="20" y1="32" x2="90" y2="32" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
      <polygon points="87,29 95,32 87,35" fill="#409EFF"/>
      <text x="55" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.5">仅脱敏数据→云</text>
    </g>

    <!-- 安全标注 -->
    <g transform="translate(420, 200)">
      <rect x="0" y="0" width="110" height="50" rx="8" fill="#52C41A" opacity="0.06"/>
      <text x="55" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#52C41A" opacity="0.8">安全机制</text>
      <text x="55" y="38" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.5">数据脱敏保护</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="488" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.4">三层隐私保护架构 · 数据分级处理</text>
</svg>