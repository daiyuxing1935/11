<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="scrollGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">🧠 提示词魔法 · 思维激活</text>

  <!-- 中心卷轴区域 -->
  <rect x="225" y="65" width="350" height="130" rx="20" fill="url(#scrollGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>

  <!-- 卷轴装饰 -->
  <rect x="235" y="75" width="330" height="110" rx="14" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- 卷轴顶部装饰 -->
  <rect x="245" y="80" width="310" height="4" rx="2" fill="#409EFF" opacity="0.2"/>
  <rect x="245" y="176" width="310" height="4" rx="2" fill="#409EFF" opacity="0.2"/>

  <!-- 魔法咒语 -->
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#409EFF" filter="url(#glow)">✨ Let's think step by step</text>

  <!-- 咒语副标题 -->
  <text x="400" y="152" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">— 激活推理能力的魔法指令 —</text>

  <!-- 连接线 - 从卷轴到图标 -->
  <!-- 左上 -->
  <path d="M225,130 L160,130 L140,200" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 右上 -->
  <path d="M575,130 L640,130 L660,200" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 左中 -->
  <path d="M225,160 L180,160 L160,280" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 右中 -->
  <path d="M575,160 L620,160 L640,280" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- 下 -->
  <path d="M400,195 L400,360" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- 激活开关（在卷轴下方中央） -->
  <circle cx="400" cy="210" r="12" fill="#409EFF" opacity="0.15"/>
  <circle cx="400" cy="210" r="8" fill="#409EFF" opacity="0.3"/>
  <circle cx="400" cy="210" r="4" fill="#409EFF"/>

  <!-- ===== 图标 1：数学/计算器（左上） ===== -->
  <g transform="translate(110, 200)">
    <rect x="-25" y="-25" width="50" height="50" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-16" y="-16" width="32" height="22" rx="3" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="-2" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#409EFF">+</text>
    <text x="0" y="12" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#409EFF">÷</text>
    <rect x="-16" y="6" width="32" height="18" rx="3" fill="#409EFF" opacity="0.1"/>
    <text x="0" y="19" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">123</text>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">数学</text>
    <text x="0" y="63" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Arithmetic</text>
  </g>

  <!-- ===== 图标 2：逻辑/拼图（右上） ===== -->
  <g transform="translate(690, 200)">
    <rect x="-25" y="-25" width="50" height="50" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 拼图块 -->
    <rect x="-12" y="-12" width="14" height="14" rx="3" fill="#409EFF" opacity="0.3"/>
    <rect x="2" y="-12" width="14" height="14" rx="3" fill="#409EFF" opacity="0.5"/>
    <rect x="-12" y="2" width="14" height="14" rx="3" fill="#409EFF" opacity="0.5"/>
    <rect x="2" y="2" width="14" height="14" rx="3" fill="#409EFF" opacity="0.3"/>
    <circle cx="-5" cy="-5" r="2" fill="white"/>
    <circle cx="9" cy="-5" r="2" fill="white"/>
    <circle cx="-5" cy="9" r="2" fill="white"/>
    <circle cx="9" cy="9" r="2" fill="white"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">逻辑推理</text>
    <text x="0" y="63" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Logic</text>
  </g>

  <!-- ===== 图标 3：决策树（左中） ===== -->
  <g transform="translate(130, 280)">
    <rect x="-25" y="-25" width="50" height="50" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 决策树 -->
    <line x1="0" y1="-14" x2="0" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="-10" y2="8" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="10" y2="8" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-10" y1="8" x2="-14" y2="18" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="-10" y1="8" x2="-6" y2="18" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="10" y1="8" x2="6" y2="18" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="10" y1="8" x2="14" y2="18" stroke="#409EFF" stroke-width="1.2"/>
    <circle cx="0" cy="-14" r="3" fill="#409EFF"/>
    <circle cx="0" cy="-4" r="2.5" fill="#409EFF" opacity="0.7"/>
    <circle cx="-10" cy="8" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="10" cy="8" r="2" fill="#409EFF" opacity="0.5"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">多条件决策</text>
    <text x="0" y="63" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Decision</text>
  </g>

  <!-- ===== 图标 4：综合分析（右中） ===== -->
  <g transform="translate(670, 280)">
    <rect x="-25" y="-25" width="50" height="50" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 数据表格合并 -->
    <rect x="-14" y="-14" width="12" height="12" rx="2" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="2" y="-14" width="12" height="12" rx="2" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="-14" y="2" width="12" height="12" rx="2" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="0.8"/>
    <rect x="2" y="2" width="12" height="12" rx="2" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="0.8"/>
    <!-- 合并箭头 -->
    <path d="M-8,2 L-8,-2 L8,-2 L8,2" stroke="#409EFF" stroke-width="1.2" fill="none"/>
    <path d="M-8,14 L-8,8 L8,8 L8,14" stroke="#409EFF" stroke-width="1.2" fill="none" opacity="0.5"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">综合分析</text>
    <text x="0" y="63" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Analysis</text>
  </g>

  <!-- ===== 图标 5：规划/路线图（下中） ===== -->
  <g transform="translate(400, 370)">
    <rect x="-25" y="-25" width="50" height="50" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- 路线图 -->
    <circle cx="-8" cy="-8" r="3" fill="#409EFF"/>
    <circle cx="0" cy="0" r="2.5" fill="#409EFF" opacity="0.6"/>
    <circle cx="8" cy="8" r="2" fill="#409EFF" opacity="0.4"/>
    <path d="M-8,-8 L0,0 L8,8" stroke="#409EFF" stroke-width="1.5" fill="none"/>
    <!-- 旗帜 -->
    <line x1="8" y1="8" x2="8" y2="18" stroke="#409EFF" stroke-width="1.2"/>
    <polygon points="8,8 16,11 8,14" fill="#409EFF" opacity="0.6"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">规划</text>
    <text x="0" y="63" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Planning</text>
  </g>

  <!-- 底部说明文字 -->
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.5">一句魔法指令，激活模型的深层推理能力</text>

  <!-- 装饰性小点 -->
  <circle cx="50" cy="50" r="3" fill="#409EFF" opacity="0.08"/>
  <circle cx="750" cy="50" r="3" fill="#409EFF" opacity="0.08"/>
  <circle cx="50" cy="450" r="3" fill="#409EFF" opacity="0.08"/>
  <circle cx="750" cy="450" r="3" fill="#409EFF" opacity="0.08"/>
  <circle cx="400" cy="490" r="2" fill="#409EFF" opacity="0.1"/>
</svg>