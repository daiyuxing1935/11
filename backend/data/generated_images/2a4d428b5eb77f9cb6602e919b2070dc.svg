<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BC0FF"/>
      <stop offset="100%" stop-color="#6AB5F5"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 连线 -->
  <!-- 根节点到左分支（是） -->
  <line x1="400" y1="68" x2="400" y2="95" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="95" x2="200" y2="95" stroke="#409EFF" stroke-width="2"/>
  <line x1="200" y1="95" x2="200" y2="120" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 根节点到右分支（否） -->
  <line x1="400" y1="95" x2="600" y2="95" stroke="#409EFF" stroke-width="2"/>
  <line x1="600" y1="95" x2="600" y2="120" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 左分支：长上下文模型 → 子分支 -->
  <line x1="200" y1="175" x2="200" y2="200" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="200" x2="100" y2="200" stroke="#409EFF" stroke-width="2"/>
  <line x1="100" y1="200" x2="100" y2="225" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="200" x2="300" y2="200" stroke="#409EFF" stroke-width="2"/>
  <line x1="300" y1="200" x2="300" y2="225" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 右分支：查找还是理解？ → 子分支 -->
  <line x1="600" y1="175" x2="600" y2="200" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="200" x2="520" y2="200" stroke="#409EFF" stroke-width="2"/>
  <line x1="520" y1="200" x2="520" y2="225" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="200" x2="680" y2="200" stroke="#409EFF" stroke-width="2"/>
  <line x1="680" y1="200" x2="680" y2="225" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 递归摘要 → 子分支（左左） -->
  <line x1="100" y1="280" x2="100" y2="305" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 直接输入 → 子分支（左右） -->
  <line x1="300" y1="280" x2="300" y2="305" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 逐块处理 → 子分支（右右） -->
  <line x1="680" y1="280" x2="680" y2="305" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 节点 -->

  <!-- 根节点 -->
  <rect x="250" y="30" width="300" height="38" rx="19" fill="url(#nodeGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="400" y="54" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Arial, sans-serif">你的任务需要理解全文全局结构吗？</text>

  <!-- 左分支节点：长上下文模型 -->
  <rect x="120" y="120" width="160" height="55" rx="12" fill="url(#nodeGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="200" y="143" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Arial, sans-serif">使用长上下文模型</text>
  <!-- 文档图标 -->
  <rect x="155" y="150" width="14" height="18" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="158" y1="155" x2="166" y2="155" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="158" y1="159" x2="166" y2="159" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="158" y1="163" x2="166" y2="163" stroke="#FFFFFF" stroke-width="1"/>
  <text x="200" y="168" text-anchor="middle" fill="#FFFFFF" font-size="9" font-family="Arial, sans-serif">全文</text>

  <!-- 右分支节点：查找还是理解？ -->
  <rect x="535" y="120" width="130" height="55" rx="12" fill="url(#nodeGrad)" stroke="#3070C0" stroke-width="1.5"/>
  <text x="600" y="148" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Arial, sans-serif">查找还是理解？</text>

  <!-- 左左叶子：文档超过窗口80% -->
  <rect x="30" y="225" width="140" height="55" rx="10" fill="url(#leafGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="100" y="248" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="Arial, sans-serif">文档超过窗口80%</text>
  <text x="100" y="268" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="Arial, sans-serif">→ 递归摘要</text>

  <!-- 左右叶子：窗口内 -->
  <rect x="235" y="225" width="130" height="55" rx="10" fill="url(#leafGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="300" y="248" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="Arial, sans-serif">窗口内</text>
  <text x="300" y="268" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="Arial, sans-serif">→ 直接输入关键信息</text>

  <!-- 右左叶子：查找 → RAG -->
  <rect x="450" y="225" width="140" height="55" rx="10" fill="url(#leafGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="520" y="248" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="Arial, sans-serif">查找</text>
  <text x="520" y="268" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="Arial, sans-serif">→ RAG</text>
  <!-- 放大镜图标 -->
  <circle cx="490" cy="242" r="7" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="495" y1="247" x2="500" y2="252" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 右右叶子：理解 → 逐块处理 -->
  <rect x="610" y="225" width="140" height="55" rx="10" fill="url(#leafGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="680" y="248" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="Arial, sans-serif">理解</text>
  <text x="680" y="268" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="Arial, sans-serif">→ 逐块处理</text>
  <!-- 文档块图标 -->
  <rect x="655" y="238" width="8" height="14" rx="1" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="665" y="238" width="8" height="14" rx="1" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="675" y="238" width="8" height="14" rx="1" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>

  <!-- 递归摘要子节点 -->
  <rect x="40" y="305" width="120" height="40" rx="8" fill="#E0F0FF" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="100" y="330" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="Arial, sans-serif">递归摘要处理</text>

  <!-- 直接输入子节点 -->
  <rect x="240" y="305" width="120" height="40" rx="8" fill="#E0F0FF" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="330" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="Arial, sans-serif">关键信息优先输入</text>

  <!-- 逐块处理子节点 -->
  <rect x="620" y="305" width="120" height="40" rx="8" fill="#E0F0FF" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="680" y="330" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="Arial, sans-serif">顺序块处理</text>

  <!-- 标注 -->
  <rect x="15" y="370" width="90" height="24" rx="12" fill="#409EFF" opacity="0.85"/>
  <text x="60" y="386" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">全局结构优先</text>

  <rect x="130" y="370" width="90" height="24" rx="12" fill="#409EFF" opacity="0.85"/>
  <text x="175" y="386" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">窗口大小判断</text>

  <rect x="245" y="370" width="90" height="24" rx="12" fill="#409EFF" opacity="0.85"/>
  <text x="290" y="386" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">直接输入策略</text>

  <rect x="420" y="370" width="90" height="24" rx="12" fill="#409EFF" opacity="0.85"/>
  <text x="465" y="386" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">检索增强生成</text>

  <rect x="535" y="370" width="90" height="24" rx="12" fill="#409EFF" opacity="0.85"/>
  <text x="580" y="386" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">分块理解</text>

  <rect x="650" y="370" width="90" height="24" rx="12" fill="#409EFF" opacity="0.85"/>
  <text x="695" y="386" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">顺序处理</text>

  <!-- 底部说明 -->
  <text x="400" y="440" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="Arial, sans-serif" opacity="0.7">决策树：根据任务需求选择上下文策略</text>

  <!-- 图例 -->
  <rect x="280" y="455" width="12" height="12" rx="3" fill="url(#nodeGrad)"/>
  <text x="297" y="465" fill="#1a1a2e" font-size="10" font-family="Arial, sans-serif">决策节点</text>
  <rect x="370" y="455" width="12" height="12" rx="3" fill="url(#leafGrad)"/>
  <text x="387" y="465" fill="#1a1a2e" font-size="10" font-family="Arial, sans-serif">策略节点</text>
  <rect x="460" y="455" width="12" height="12" rx="3" fill="#E0F0FF" stroke="#409EFF" stroke-width="1"/>
  <text x="477" y="465" fill="#1a1a2e" font-size="10" font-family="Arial, sans-serif">执行节点</text>
</svg>