<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="52" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">不同场景，不同侧重</text>
  <text x="400" y="74" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5a6a7e">四种核心能力在典型应用场景中的优先级对比</text>

  <!-- 卡片1：交易系统 -->
  <g filter="url(#shadow)">
    <rect x="30" y="105" width="170" height="310" rx="12" fill="url(#cardGrad)" stroke="#E0E8F0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="65" y="125" width="100" height="80" rx="10" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 股票图 -->
    <polyline points="80,180 95,160 110,170 125,140 140,150 150,130" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="150" cy="130" r="3" fill="#409EFF"/>
    <!-- 闪电图标 -->
    <polygon points="120,128 115,145 125,145 118,162" fill="#409EFF" opacity="0.9"/>
    <!-- 标签 -->
    <text x="115" y="230" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">交易系统</text>
    <!-- 特性列表 -->
    <rect x="45" y="250" width="140" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
    <text x="115" y="269" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">⚡ 响应性</text>
    <rect x="45" y="286" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="115" y="303" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">主动性</text>
    <rect x="45" y="318" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="115" y="335" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">社交能力</text>
    <rect x="45" y="350" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="115" y="367" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">自主性</text>
    <!-- 标注 -->
    <rect x="50" y="388" width="130" height="18" rx="9" fill="#1a1a2e" opacity="0.7"/>
    <text x="115" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFFFFF">低延迟交易</text>
  </g>

  <!-- 卡片2：个人助理 -->
  <g filter="url(#shadow)">
    <rect x="220" y="105" width="170" height="310" rx="12" fill="url(#cardGrad)" stroke="#E0E8F0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="255" y="125" width="100" height="80" rx="10" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 日历 -->
    <rect x="275" y="140" width="60" height="50" rx="5" fill="none" stroke="#409EFF" stroke-width="2"/>
    <text x="305" y="162" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">15</text>
    <line x1="275" y1="152" x2="335" y2="152" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="280" y1="135" x2="280" y2="142" stroke="#409EFF" stroke-width="2"/>
    <line x1="330" y1="135" x2="330" y2="142" stroke="#409EFF" stroke-width="2"/>
    <!-- 前向箭头 -->
    <path d="M340,165 L350,165 L345,158 M340,165 L345,172" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 标签 -->
    <text x="305" y="230" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">个人助理</text>
    <!-- 特性列表 -->
    <rect x="235" y="250" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="305" y="267" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">响应性</text>
    <rect x="235" y="282" width="140" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
    <text x="305" y="301" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">▶ 主动性</text>
    <rect x="235" y="318" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="305" y="335" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">社交能力</text>
    <rect x="235" y="350" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="305" y="367" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">自主性</text>
    <!-- 标注 -->
    <rect x="240" y="388" width="130" height="18" rx="9" fill="#1a1a2e" opacity="0.7"/>
    <text x="305" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFFFFF">提前预判需求</text>
  </g>

  <!-- 卡片3：客服系统 -->
  <g filter="url(#shadow)">
    <rect x="410" y="105" width="170" height="310" rx="12" fill="url(#cardGrad)" stroke="#E0E8F0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="445" y="125" width="100" height="80" rx="10" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 耳机 -->
    <circle cx="495" cy="155" r="20" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <path d="M475,155 Q475,175 485,178" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M515,155 Q515,175 505,178" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 两人图标 -->
    <circle cx="480" cy="190" r="6" fill="#409EFF" opacity="0.6"/>
    <circle cx="510" cy="190" r="6" fill="#409EFF" opacity="0.6"/>
    <path d="M474,198 Q480,205 486,198" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <path d="M504,198 Q510,205 516,198" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <!-- 标签 -->
    <text x="495" y="230" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">客服系统</text>
    <!-- 特性列表 -->
    <rect x="425" y="250" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="495" y="267" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">响应性</text>
    <rect x="425" y="282" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="495" y="299" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">主动性</text>
    <rect x="425" y="314" width="140" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
    <text x="495" y="333" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">👥 社交能力</text>
    <rect x="425" y="350" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="495" y="367" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">自主性</text>
    <!-- 标注 -->
    <rect x="430" y="388" width="130" height="18" rx="9" fill="#1a1a2e" opacity="0.7"/>
    <text x="495" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFFFFF">多轮对话</text>
  </g>

  <!-- 卡片4：科研系统 -->
  <g filter="url(#shadow)">
    <rect x="600" y="105" width="170" height="310" rx="12" fill="url(#cardGrad)" stroke="#E0E8F0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="635" y="125" width="100" height="80" rx="10" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 放大镜 -->
    <circle cx="665" cy="155" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="677" y1="167" x2="690" y2="180" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 大脑图标 -->
    <path d="M700,155 Q710,140 720,155 Q725,165 720,175 Q710,185 700,175 Q695,165 700,155Z" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <path d="M705,158 Q710,150 715,158" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M703,165 Q710,158 717,165" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 标签 -->
    <text x="685" y="230" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">科研系统</text>
    <!-- 特性列表 -->
    <rect x="615" y="250" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="685" y="267" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">响应性</text>
    <rect x="615" y="282" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="685" y="299" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">主动性</text>
    <rect x="615" y="314" width="140" height="24" rx="6" fill="#F0F2F5"/>
    <text x="685" y="331" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a6a7e">社交能力</text>
    <rect x="615" y="346" width="140" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
    <text x="685" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">🧠 自主性</text>
    <!-- 标注 -->
    <rect x="620" y="388" width="130" height="18" rx="9" fill="#1a1a2e" opacity="0.7"/>
    <text x="685" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFFFFF">自主探索</text>
  </g>

  <!-- 底部说明 -->
  <rect x="250" y="445" width="300" height="28" rx="14" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="464" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">高亮标记表示该场景下最核心的能力维度</text>

</svg>