<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">🧠 思维链提示技巧 · Chain-of-Thought 指南</text>

  <!-- 2x3 网格卡片 -->
  <!-- 卡片 1: 从零样本CoT开始 -->
  <g transform="translate(40, 70)">
    <rect width="220" height="120" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="8" y="8" width="36" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
    <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" font-weight="bold">1</text>
    <text x="58" y="26" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">从零样本CoT开始</text>
    <text x="58" y="44" font-family="Arial, sans-serif" font-size="11" fill="#666">Start with Zero-Shot CoT</text>
    <!-- 旗帜 + 魔法棒 -->
    <polygon points="30,90 30,60 70,60 60,70 70,80 30,80" fill="#409EFF" opacity="0.7"/>
    <line x1="30" y1="60" x2="30" y2="90" stroke="#409EFF" stroke-width="2"/>
    <text x="50" y="75" text-anchor="middle" font-size="16" fill="#fff">⚡</text>
    <text x="90" y="80" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">“让我们逐步思考”</text>
  </g>

  <!-- 卡片 2: 调整推理粒度 -->
  <g transform="translate(290, 70)">
    <rect width="220" height="120" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="8" y="8" width="36" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
    <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" font-weight="bold">2</text>
    <text x="58" y="26" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">调整推理粒度</text>
    <text x="58" y="44" font-family="Arial, sans-serif" font-size="11" fill="#666">Adjust Granularity</text>
    <!-- 滑块 -->
    <rect x="20" y="70" width="140" height="6" rx="3" fill="#E0E8F0"/>
    <circle cx="90" cy="73" r="10" fill="#409EFF"/>
    <circle cx="90" cy="73" r="5" fill="#fff"/>
    <text x="175" y="77" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">粗细</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="10" fill="#888">← 简略 · 详细 →</text>
  </g>

  <!-- 卡片 3: 明确标注最终答案 -->
  <g transform="translate(540, 70)">
    <rect width="220" height="120" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="8" y="8" width="36" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
    <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" font-weight="bold">3</text>
    <text x="58" y="26" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">明确标注最终答案</text>
    <text x="58" y="44" font-family="Arial, sans-serif" font-size="11" fill="#666">Mark Final Answer</text>
    <!-- 带高亮环的答案 -->
    <circle cx="60" cy="82" r="22" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
    <circle cx="60" cy="82" r="26" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="60" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E65100" font-weight="bold">答案</text>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">用 “因此” 或</text>
    <text x="100" y="96" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">“最终答案：” 标注</text>
  </g>

  <!-- 卡片 4: 结合角色设定 -->
  <g transform="translate(40, 220)">
    <rect width="220" height="120" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="8" y="8" width="36" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
    <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" font-weight="bold">4</text>
    <text x="58" y="26" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">结合角色设定</text>
    <text x="58" y="44" font-family="Arial, sans-serif" font-size="11" fill="#666">Combine with Role</text>
    <!-- 两个重叠剪影 -->
    <circle cx="45" cy="78" r="18" fill="#409EFF" opacity="0.25"/>
    <circle cx="45" cy="78" r="12" fill="#409EFF" opacity="0.4"/>
    <text x="45" y="82" text-anchor="middle" font-size="14" fill="#1a1a2e">👩‍🏫</text>
    <circle cx="80" cy="78" r="18" fill="#1a1a2e" opacity="0.15"/>
    <circle cx="80" cy="78" r="12" fill="#1a1a2e" opacity="0.25"/>
    <text x="80" y="82" text-anchor="middle" font-size="14" fill="#1a1a2e">🤔</text>
    <text x="110" y="75" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">“你是一位数学</text>
    <text x="110" y="91" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">老师”</text>
  </g>

  <!-- 卡片 5: 验证推理 -->
  <g transform="translate(290, 220)">
    <rect width="220" height="120" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="8" y="8" width="36" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
    <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" font-weight="bold">5</text>
    <text x="58" y="26" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">验证推理</text>
    <text x="58" y="44" font-family="Arial, sans-serif" font-size="11" fill="#666">Verify Reasoning</text>
    <!-- 文档 + 放大镜 -->
    <rect x="25" y="62" width="36" height="44" rx="3" fill="#FFF" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="32" y1="72" x2="54" y2="72" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <line x1="32" y1="78" x2="54" y2="78" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <line x1="32" y1="84" x2="48" y2="84" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <circle cx="72" cy="78" r="14" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="82" y1="88" x2="88" y2="94" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="105" y="78" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">检查每一步</text>
    <text x="105" y="94" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">逻辑是否连贯</text>
  </g>

  <!-- 卡片 6: AI智能体应用 -->
  <g transform="translate(540, 220)">
    <rect width="220" height="120" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="8" y="8" width="36" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
    <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF" font-weight="bold">6</text>
    <text x="58" y="26" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">AI智能体应用</text>
    <text x="58" y="44" font-family="Arial, sans-serif" font-size="11" fill="#666">AI Agent Application</text>
    <!-- 齿轮 + 大脑 -->
    <g transform="translate(50, 78)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="4 3"/>
      <circle cx="0" cy="0" r="10" fill="#409EFF" opacity="0.2"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="#1a1a2e">🧠</text>
    </g>
    <text x="90" y="75" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">结合工具与</text>
    <text x="90" y="91" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">知识库推理</text>
  </g>

  <!-- 底部提示 -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">💡 提示：从简单开始，逐步增加复杂度 · 保持推理步骤清晰可读</text>

  <!-- 装饰性底部元素 -->
  <rect x="300" y="400" width="200" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>

  <!-- 装饰圆点 -->
  <circle cx="30" cy="30" r="4" fill="#409EFF" opacity="0.1"/>
  <circle cx="770" cy="30" r="4" fill="#409EFF" opacity="0.1"/>
  <circle cx="30" cy="470" r="4" fill="#409EFF" opacity="0.1"/>
  <circle cx="770" cy="470" r="4" fill="#409EFF" opacity="0.1"/>
</svg>