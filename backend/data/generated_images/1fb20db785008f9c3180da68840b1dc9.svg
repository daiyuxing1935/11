<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6ab7ff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 左侧：模糊意图云朵 -->
  <g transform="translate(75, 200)">
    <ellipse cx="0" cy="0" rx="60" ry="40" fill="#e8f4ff" stroke="#409EFF" stroke-width="2.5"/>
    <ellipse cx="-25" cy="-15" rx="30" ry="22" fill="#e8f4ff" stroke="#409EFF" stroke-width="2.5"/>
    <ellipse cx="25" cy="-12" rx="28" ry="20" fill="#e8f4ff" stroke="#409EFF" stroke-width="2.5"/>
    <ellipse cx="-10" cy="-25" rx="22" ry="16" fill="#e8f4ff" stroke="#409EFF" stroke-width="2.5"/>
    <ellipse cx="15" cy="-22" rx="20" ry="15" fill="#e8f4ff" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 波浪线 -->
    <path d="M-30,10 Q-20,0 -10,10 Q0,20 10,10 Q20,0 30,10" fill="none" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
    <path d="M-25,20 Q-15,12 -5,20 Q5,28 15,20 Q25,12 30,20" fill="none" stroke="#409EFF" stroke-width="1.8" opacity="0.4"/>
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">模糊意图</text>
    <text x="0" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Fuzzy Intent</text>
  </g>

  <!-- 右侧：精确输出菱形 -->
  <g transform="translate(725, 200)">
    <polygon points="0,-45 35,0 0,45 -35,0" fill="#e8f4ff" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 内部锐利线条 -->
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">精确输出</text>
    <text x="0" y="77" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.7">Precise Output</text>
  </g>

  <!-- 桥 - 弧形桥身 -->
  <path d="M140,210 Q400,160 660,210" fill="none" stroke="url(#bridgeGrad)" stroke-width="18" stroke-linecap="round" opacity="0.9" filter="url(#shadow)"/>
  <!-- 桥面装饰线 -->
  <path d="M140,210 Q400,160 660,210" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- 桥面板：三个卡片 -->
  <!-- 卡片1：代表性+多样性+正确性 -->
  <g transform="translate(260, 155)">
    <rect x="-85" y="-30" width="170" height="60" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">代表性+多样性+正确性</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">Representative + Diverse + Correct</text>
  </g>

  <!-- 卡片2：格式一致性 -->
  <g transform="translate(400, 140)">
    <rect x="-65" y="-25" width="130" height="50" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-3" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">格式一致性</text>
    <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">Format Consistency</text>
  </g>

  <!-- 卡片3：恰当数量 -->
  <g transform="translate(540, 155)">
    <rect x="-55" y="-25" width="110" height="50" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-3" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">恰当数量</text>
    <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">Right Number</text>
  </g>

  <!-- 桥墩装饰 - 左侧 -->
  <rect x="155" y="205" width="8" height="25" rx="4" fill="#409EFF" opacity="0.4"/>
  <!-- 桥墩装饰 - 右侧 -->
  <rect x="637" y="205" width="8" height="25" rx="4" fill="#409EFF" opacity="0.4"/>

  <!-- 底部标注 -->
  <g transform="translate(400, 430)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.6">从模糊意图到精确输出 · 桥接思维</text>
  </g>

  <!-- 小装饰：左侧水波纹 -->
  <ellipse cx="200" cy="240" rx="30" ry="4" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.2"/>
  <ellipse cx="200" cy="248" rx="20" ry="3" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.15"/>

  <!-- 小装饰：右侧水波纹 -->
  <ellipse cx="600" cy="240" rx="30" ry="4" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.2"/>
  <ellipse cx="600" cy="248" rx="20" ry="3" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.15"/>

</svg>