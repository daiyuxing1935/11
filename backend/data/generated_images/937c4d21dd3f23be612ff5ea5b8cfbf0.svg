<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">智能体架构蓝图</text>

  <!-- ===== 输入：左侧用户图标 ===== -->
  <g transform="translate(45, 250)">
    <!-- 用户图标 -->
    <circle cx="0" cy="0" r="22" fill="#409EFF" opacity="0.9"/>
    <circle cx="0" cy="-6" r="8" fill="white" opacity="0.9"/>
    <path d="M-14,16 Q0,6 14,16" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- 输入箭头 -->
    <line x1="22" y1="0" x2="58" y2="0" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  </g>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- ===== 顶部：LLM 模型模块 ===== -->
  <g transform="translate(400, 95)" filter="url(#shadow)">
    <rect x="-95" y="-38" width="190" height="76" rx="16" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 大脑图标 -->
    <g transform="translate(-65, 0)">
      <ellipse cx="0" cy="-6" rx="12" ry="10" fill="#409EFF" opacity="0.15"/>
      <path d="M-8,-6 Q-8,-16 0,-16 Q8,-16 8,-6" stroke="#409EFF" stroke-width="1.8" fill="none"/>
      <path d="M-6,-2 Q-6,-14 0,-14 Q6,-14 6,-2" stroke="#409EFF" stroke-width="1.8" fill="none"/>
      <path d="M-10,2 Q-10,-10 0,-10 Q10,-10 10,2" stroke="#409EFF" stroke-width="1.8" fill="none"/>
      <path d="M-4,6 Q-4,-4 0,-4 Q4,-4 4,6" stroke="#409EFF" stroke-width="1.5" fill="none"/>
      <circle cx="0" cy="-6" r="3" fill="#409EFF" opacity="0.3"/>
    </g>
    <text x="20" y="-5" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">LLM 模型</text>
    <text x="20" y="14" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#666">大语言模型推理</text>
  </g>

  <!-- ===== 右侧：工具集模块 ===== -->
  <g transform="translate(680, 250)" filter="url(#shadow)">
    <rect x="-85" y="-70" width="170" height="140" rx="16" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 工具箱图标 -->
    <g transform="translate(-55, -42)">
      <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-5" y1="-8" x2="-5" y2="-12" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="5" y1="-8" x2="5" y2="-12" stroke="#409EFF" stroke-width="1.5"/>
      <rect x="-6" y="-3" width="4" height="4" rx="1" fill="#409EFF" opacity="0.4"/>
    </g>
    <text x="10" y="-42" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">工具集</text>
    <!-- 工具芯片 -->
    <g transform="translate(-55, -18)">
      <rect x="0" y="0" width="60" height="22" rx="11" fill="#e8f4ff" stroke="#409EFF" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#409EFF">API</text>
    </g>
    <g transform="translate(-55, 10)">
      <rect x="0" y="0" width="60" height="22" rx="11" fill="#e8f4ff" stroke="#409EFF" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#409EFF">数据库</text>
    </g>
    <g transform="translate(-55, 38)">
      <rect x="0" y="0" width="60" height="22" rx="11" fill="#e8f4ff" stroke="#409EFF" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#409EFF">邮件</text>
    </g>
  </g>

  <!-- ===== 中央：智能体核心（六边形） ===== -->
  <g transform="translate(400, 250)" filter="url(#shadow)">
    <!-- 六边形 -->
    <polygon points="0,-65 56,-32 56,32 0,65 -56,32 -56,-32" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 运行循环图标 -->
    <g transform="translate(0, -8)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#409EFF" stroke-width="2"/>
      <path d="M-8,0 A8,8 0 1,1 8,0" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <polygon points="8,-4 12,0 8,4" fill="#409EFF"/>
      <circle cx="0" cy="0" r="3" fill="#409EFF" opacity="0.4"/>
    </g>
    <text x="0" y="22" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">智能体核心</text>
    <text x="0" y="40" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#666">运行循环</text>
  </g>

  <!-- ===== 输出：右侧响应气泡 ===== -->
  <g transform="translate(755, 250)">
    <rect x="-30" y="-18" width="60" height="36" rx="18" fill="#409EFF" opacity="0.9"/>
    <path d="M-18,0 L-28,-8" stroke="#409EFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">响应</text>
  </g>

  <!-- ===== 连接箭头 ===== -->

  <!-- 输入 → 智能体核心 -->
  <line x1="103" y1="250" x2="340" y2="250" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- 智能体核心 → 输出 -->
  <line x1="456" y1="250" x2="720" y2="250" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- LLM 模型 ↔ 智能体核心（双向） -->
  <line x1="400" y1="133" x2="400" y2="183" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="188" x2="400" y2="218" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- 智能体核心 ↔ 工具集（双向） -->
  <line x1="456" y1="265" x2="590" y2="265" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="590" y1="250" x2="456" y2="235" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== 标注 ===== -->
  <!-- 标注 1：感知 -->
  <g transform="translate(220, 220)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">感知输入</text>
  </g>

  <!-- 标注 2：规划 -->
  <g transform="translate(400, 155)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">规划推理</text>
  </g>

  <!-- 标注 3：执行 -->
  <g transform="translate(570, 210)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">工具执行</text>
  </g>

  <!-- 标注 4：循环 -->
  <g transform="translate(400, 310)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">循环反馈</text>
  </g>

  <!-- 标注 5：输出 -->
  <g transform="translate(640, 300)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">生成输出</text>
  </g>

  <!-- 标注 6：循环箭头 -->
  <g transform="translate(520, 155)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="white" font-weight="600">感知-规划-执行</text>
  </g>

  <!-- 底部图例 -->
  <g transform="translate(400, 460)">
    <rect x="-180" y="-18" width="360" height="36" rx="18" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <circle cx="-140" cy="0" r="5" fill="#409EFF"/>
    <text x="-128" y="4" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#1a1a2e">感知</text>
    <circle cx="-50" cy="0" r="5" fill="#1a1a2e" opacity="0.85"/>
    <text x="-38" y="4" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#1a1a2e">规划</text>
    <circle cx="50" cy="0" r="5" fill="#409EFF" opacity="0.6"/>
    <text x="62" y="4" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#1a1a2e">执行</text>
    <circle cx="140" cy="0" r="5" fill="#409EFF" opacity="0.3"/>
    <text x="152" y="4" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#1a1a2e">循环</text>
  </g>
</svg>