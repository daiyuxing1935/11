<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7be5"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f9ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">博弈论核心设计原则</text>
  <text x="400" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7a8ba8">五边形雷达图 · 多智能体系统</text>

  <!-- 连接线：中心到五个节点 -->
  <g stroke="#409EFF" stroke-width="1.8" stroke-opacity="0.35" fill="none">
    <!-- 上 -->
    <line x1="400" y1="240" x2="400" y2="115"/>
    <!-- 右上 -->
    <line x1="400" y1="240" x2="588" y2="160"/>
    <!-- 右下 -->
    <line x1="400" y1="240" x2="520" y2="365"/>
    <!-- 左下 -->
    <line x1="400" y1="240" x2="280" y2="365"/>
    <!-- 左上 -->
    <line x1="400" y1="240" x2="212" y2="160"/>
  </g>

  <!-- 五边形雷达轮廓 -->
  <g stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.2" fill="none">
    <polygon points="400,115 588,160 520,365 280,365 212,160"/>
    <polygon points="400,155 541,190 490,320 310,320 259,190"/>
    <polygon points="400,195 494,220 460,275 340,275 306,220"/>
  </g>

  <!-- 中心：多智能体系统枢纽 -->
  <circle cx="400" cy="240" r="38" fill="url(#hubGrad)" stroke="#2b7be5" stroke-width="2"/>
  <circle cx="400" cy="240" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <!-- 中心图标：三个连接的圆 -->
  <circle cx="392" cy="232" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="410" cy="235" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="400" cy="250" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="396" y1="238" x2="406" y2="238" stroke="#fff" stroke-width="1.2"/>
  <line x1="395" y1="244" x2="405" y2="248" stroke="#fff" stroke-width="1.2"/>
  <line x1="395" y1="248" x2="405" y2="244" stroke="#fff" stroke-width="1.2"/>
  <text x="400" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">多智能体</text>
  <text x="400" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">系统枢纽</text>

  <!-- 节点1：上 - 机制设计 -->
  <g transform="translate(400,115)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 图标：齿轮 -->
    <circle cx="0" cy="-2" r="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="3" fill="#409EFF"/>
    <line x1="-6" y1="-8" x2="6" y2="4" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="6" y1="-8" x2="-6" y2="4" stroke="#409EFF" stroke-width="1.2"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">机制设计</text>
  </g>

  <!-- 节点2：右上 - 激励相容 -->
  <g transform="translate(588,160)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 图标：箭头上升 -->
    <line x1="-8" y1="6" x2="0" y2="-6" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="8" y2="6" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-4" y1="6" x2="0" y2="0" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4" y1="6" x2="0" y2="0" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">激励相容</text>
  </g>

  <!-- 节点3：右下 - 策略证明 -->
  <g transform="translate(520,365)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 图标：盾牌 -->
    <path d="M0,-10 L8,-6 L8,2 Q8,10 0,14 Q-8,10 -8,2 L-8,-6 Z" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-4" y1="2" x2="0" y2="6" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="6" x2="5" y2="-2" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">策略证明</text>
  </g>

  <!-- 节点4：左下 - 鲁棒性 -->
  <g transform="translate(280,365)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 图标：循环箭头 -->
    <path d="M-6,-4 A8,8 0 1,1 6,-4" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="6,-4 2,-8 2,0" fill="#409EFF"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">鲁棒性</text>
  </g>

  <!-- 节点5：左上 - 公平性 -->
  <g transform="translate(212,160)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.8"/>
    <!-- 图标：天平 -->
    <line x1="0" y1="-10" x2="0" y2="6" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-10" y1="2" x2="10" y2="2" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-10" y1="2" x2="-6" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="10" y1="2" x2="6" y2="-4" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="-6" cy="-6" r="2" fill="#409EFF"/>
    <circle cx="6" cy="-6" r="2" fill="#409EFF"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">公平性</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7a8ba8">五边形雷达图展示博弈论核心设计原则及其相互关系</text>

  <!-- 装饰性角标 -->
  <rect x="20" y="20" width="30" height="2" rx="1" fill="#409EFF" opacity="0.4"/>
  <rect x="20" y="26" width="20" height="2" rx="1" fill="#409EFF" opacity="0.25"/>
  <rect x="750" y="20" width="30" height="2" rx="1" fill="#409EFF" opacity="0.4"/>
  <rect x="750" y="26" width="20" height="2" rx="1" fill="#409EFF" opacity="0.25"/>
</svg>