<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">合作博弈与非合作博弈对比</text>

  <!-- 左侧区域 - 合作博弈 -->
  <rect x="30" y="60" width="350" height="400" rx="12" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  <rect x="30" y="60" width="350" height="40" rx="12" fill="#409EFF"/>
  <rect x="30" y="88" width="350" height="12" fill="#409EFF"/>
  <text x="205" y="86" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">合作博弈</text>

  <!-- 合作博弈 - 联盟圆 -->
  <circle cx="205" cy="220" r="80" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- 沙普利值饼图 -->
  <path d="M205,220 L205,155 A65,65 0 0,1 256,185 Z" fill="#409EFF" opacity="0.7"/>
  <path d="M205,220 L256,185 A65,65 0 0,1 270,240 Z" fill="#6BB5FF" opacity="0.7"/>
  <path d="M205,220 L270,240 A65,65 0 0,1 235,278 Z" fill="#1a1a2e" opacity="0.5"/>
  <path d="M205,220 L235,278 A65,65 0 0,1 175,278 Z" fill="#409EFF" opacity="0.5"/>
  <path d="M205,220 L175,278 A65,65 0 0,1 140,240 Z" fill="#6BB5FF" opacity="0.5"/>
  <path d="M205,220 L140,240 A65,65 0 0,1 154,185 Z" fill="#1a1a2e" opacity="0.35"/>

  <!-- 联盟中心点 -->
  <circle cx="205" cy="220" r="12" fill="#1a1a2e"/>
  <text x="205" y="224" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">联盟</text>

  <!-- 代理人节点（公平份额） -->
  <circle cx="205" cy="130" r="18" fill="#409EFF"/>
  <text x="205" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">A</text>

  <circle cx="285" cy="175" r="18" fill="#6BB5FF"/>
  <text x="285" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">B</text>

  <circle cx="295" cy="260" r="18" fill="#1a1a2e" opacity="0.7"/>
  <text x="295" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">C</text>

  <circle cx="205" cy="310" r="18" fill="#409EFF" opacity="0.7"/>
  <text x="205" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">D</text>

  <circle cx="115" cy="260" r="18" fill="#6BB5FF" opacity="0.7"/>
  <text x="115" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">E</text>

  <circle cx="125" cy="175" r="18" fill="#1a1a2e" opacity="0.5"/>
  <text x="125" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">F</text>

  <!-- 指向代理人公平份额的箭头 -->
  <line x1="205" y1="208" x2="205" y2="150" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="220" y1="210" x2="275" y2="190" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="225" y1="230" x2="285" y2="250" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="210" y1="240" x2="210" y2="298" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="190" y1="235" x2="130" y2="252" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="190" y1="210" x2="140" y2="188" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1a1a2e"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#555"/>
    </marker>
  </defs>

  <!-- 公平份额标注 -->
  <text x="205" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">公平份额</text>

  <!-- 底部说明 - 合作博弈 -->
  <text x="205" y="360" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">沙普利值分配</text>
  <text x="205" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">按边际贡献公平分配</text>
  <text x="205" y="400" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">可执行契约</text>

  <!-- 中间分割线 -->
  <line x1="395" y1="70" x2="395" y2="450" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="395" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">VS</text>

  <!-- 分割线标注 -->
  <rect x="340" y="230" width="110" height="50" rx="6" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <text x="395" y="250" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">具有约束力</text>
  <text x="395" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">协议</text>

  <rect x="340" y="290" width="110" height="50" rx="6" fill="white" stroke="#1a1a2e" stroke-width="1.5" opacity="0.95"/>
  <text x="395" y="310" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">无协议</text>
  <text x="395" y="328" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">独立决策</text>

  <!-- 右侧区域 - 非合作博弈 -->
  <rect x="420" y="60" width="350" height="400" rx="12" fill="white" stroke="#1a1a2e" stroke-width="2" opacity="0.95"/>
  <rect x="420" y="60" width="350" height="40" rx="12" fill="#1a1a2e"/>
  <rect x="420" y="88" width="350" height="12" fill="#1a1a2e"/>
  <text x="595" y="86" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">非合作博弈</text>

  <!-- 博弈矩阵表 -->
  <rect x="460" y="130" width="270" height="200" rx="6" fill="#F5F8FA" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 矩阵行标签 -->
  <text x="480" y="160" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">玩家1</text>
  <text x="480" y="195" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">策略A</text>
  <text x="480" y="245" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">策略B</text>
  <text x="480" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">策略C</text>

  <!-- 矩阵列标签 -->
  <text x="595" y="155" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">玩家2</text>
  <text x="545" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">X</text>
  <text x="605" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Y</text>
  <text x="665" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Z</text>

  <!-- 矩阵网格线 -->
  <line x1="500" y1="180" x2="720" y2="180" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="230" x2="720" y2="230" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="280" x2="720" y2="280" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="330" x2="720" y2="330" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>

  <line x1="525" y1="180" x2="525" y2="330" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="585" y1="180" x2="585" y2="330" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="645" y1="180" x2="645" y2="330" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>

  <!-- 矩阵单元格中的收益值 -->
  <text x="542" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(3,2)</text>
  <text x="602" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(1,4)</text>
  <text x="662" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(2,1)</text>

  <text x="542" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(2,3)</text>
  <text x="602" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(4,1)</text>
  <text x="662" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(1,3)</text>

  <text x="542" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(1,2)</text>
  <text x="602" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(3,3)</text>
  <text x="662" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">(2,2)</text>

  <!-- 独立代理人（站在矩阵旁的玩家） -->
  <!-- 玩家1 -->
  <circle cx="445" cy="200" r="16" fill="#409EFF"/>
  <text x="445" y="205" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">P1</text>

  <!-- 玩家2 -->
  <circle cx="730" cy="200" r="16" fill="#6BB5FF"/>
  <text x="730" y="205" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">P2</text>

  <!-- 指向矩阵的箭头 -->
  <line x1="458" y1="200" x2="498" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="714" y1="200" x2="678" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 独立策略选择标注 -->
  <text x="445" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">独立选择</text>
  <text x="730" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">独立选择</text>

  <!-- 底部说明 - 非合作博弈 -->
  <text x="595" y="360" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">纳什均衡</text>
  <text x="595" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">个体理性决策</text>
  <text x="595" y="400" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">无约束力协议</text>

  <!-- 底部对比标注 -->
  <rect x="60" y="435" width="120" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="120" y="450" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">集体利益最大化</text>

  <rect x="620" y="435" width="120" height="22" rx="4" fill="#1a1a2e" opacity="0.15"/>
  <text x="680" y="450" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">个人利益最大化</text>

</svg>