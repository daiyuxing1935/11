<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">7B 模型内部参数分布</text>

  <!-- ===== 中心饼图 ===== -->
  <g transform="translate(310, 240)">
    <!-- 饼图外圈阴影 -->
    <circle cx="0" cy="0" r="118" fill="none" stroke="#d0d8e8" stroke-width="1" opacity="0.4"/>

    <!-- 饼图扇区：前馈网络层 61.4% (221°) -->
    <path d="M0,0 L0,-115 A115,115 0 0,1 107.5,40.8 Z" fill="#409EFF" stroke="white" stroke-width="2"/>

    <!-- 饼图扇区：注意力层 30.0% (108°) -->
    <path d="M0,0 L107.5,40.8 A115,115 0 0,1 -35.5,109.4 Z" fill="#5CB0FF" stroke="white" stroke-width="2"/>

    <!-- 饼图扇区：词嵌入层 5.7% (20.5°) -->
    <path d="M0,0 L-35.5,109.4 A115,115 0 0,1 -113.5,-18.5 Z" fill="#8CCEFF" stroke="white" stroke-width="2"/>

    <!-- 饼图扇区：其他 2.9% (10.5°) -->
    <path d="M0,0 L-113.5,-18.5 A115,115 0 0,1 -110.5,-31.8 Z" fill="#B0D8FF" stroke="white" stroke-width="2"/>

    <!-- 补全最后一点 -->
    <path d="M0,0 L-110.5,-31.8 A115,115 0 0,1 0,-115 Z" fill="#B0D8FF" stroke="white" stroke-width="2"/>

    <!-- 中心白点 -->
    <circle cx="0" cy="0" r="28" fill="white" stroke="#e0e6f0" stroke-width="1"/>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">7B</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6a7a8e">参数</text>

    <!-- 标签：前馈网络层 -->
    <line x1="80" y1="20" x2="140" y2="-10" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="142" y="-22" width="120" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
    <text x="202" y="-6" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">前馈网络层 61.4%</text>

    <!-- 标签：注意力层 -->
    <line x1="60" y1="65" x2="130" y2="85" stroke="#5CB0FF" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="132" y="73" width="120" height="24" rx="12" fill="#5CB0FF" opacity="0.12"/>
    <text x="192" y="89" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5CB0FF" font-weight="bold">注意力层 30.0%</text>

    <!-- 标签：词嵌入层 -->
    <line x1="-70" y1="70" x2="-130" y2="90" stroke="#8CCEFF" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="-252" y="78" width="120" height="24" rx="12" fill="#8CCEFF" opacity="0.12"/>
    <text x="-192" y="94" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5A9FD0" font-weight="bold">词嵌入层 5.7%</text>

    <!-- 标签：其他 -->
    <line x1="-85" y1="-30" x2="-140" y2="-50" stroke="#B0D8FF" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="-230" y="-64" width="88" height="24" rx="12" fill="#B0D8FF" opacity="0.12"/>
    <text x="-186" y="-50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7AADD0" font-weight="bold">其他 2.9%</text>
  </g>

  <!-- ===== 标注卡片 ===== -->

  <!-- 卡片1：注意力层（左上） -->
  <g transform="translate(30, 65)" filter="url(#shadow)">
    <rect width="175" height="130" rx="10" fill="white" stroke="#e0e6f0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="12" y="12" width="32" height="32" rx="8" fill="#5CB0FF" opacity="0.15"/>
    <text x="28" y="33" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#5CB0FF">QKV</text>
    <!-- 标题 -->
    <text x="54" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">注意力层</text>
    <!-- 参数 -->
    <text x="54" y="48" font-family="sans-serif" font-size="12" fill="#6a7a8e">参数: 2.1B</text>
    <!-- 描述 -->
    <text x="20" y="72" font-family="sans-serif" font-size="11" fill="#4a5a6e">Q-K-V-O 矩阵计算</text>
    <text x="20" y="90" font-family="sans-serif" font-size="11" fill="#4a5a6e">多头自注意力机制</text>
    <text x="20" y="108" font-family="sans-serif" font-size="11" fill="#4a5a6e">捕获长距离依赖</text>
    <!-- 连接线 -->
    <line x1="175" y1="65" x2="210" y2="145" stroke="#5CB0FF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- 卡片2：前馈网络层（右上） -->
  <g transform="translate(590, 65)" filter="url(#shadow)">
    <rect width="175" height="130" rx="10" fill="white" stroke="#e0e6f0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="12" y="12" width="32" height="32" rx="8" fill="#409EFF" opacity="0.15"/>
    <text x="28" y="33" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#409EFF">FFN</text>
    <!-- 标题 -->
    <text x="54" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">前馈网络层</text>
    <!-- 参数 -->
    <text x="54" y="48" font-family="sans-serif" font-size="12" fill="#6a7a8e">参数: 4.3B</text>
    <!-- 描述 -->
    <text x="20" y="72" font-family="sans-serif" font-size="11" fill="#4a5a6e">多层神经节点结构</text>
    <text x="20" y="90" font-family="sans-serif" font-size="11" fill="#4a5a6e">SwiGLU 激活函数</text>
    <text x="20" y="108" font-family="sans-serif" font-size="11" fill="#4a5a6e">特征变换与映射</text>
    <!-- 连接线 -->
    <line x1="0" y1="65" x2="-35" y2="145" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- 卡片3：词嵌入层（左下） -->
  <g transform="translate(30, 310)" filter="url(#shadow)">
    <rect width="175" height="120" rx="10" fill="white" stroke="#e0e6f0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="12" y="12" width="32" height="32" rx="8" fill="#8CCEFF" opacity="0.15"/>
    <text x="28" y="33" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8CCEFF">词→</text>
    <!-- 标题 -->
    <text x="54" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">词嵌入层</text>
    <!-- 参数 -->
    <text x="54" y="48" font-family="sans-serif" font-size="12" fill="#6a7a8e">参数: 0.4B</text>
    <!-- 描述 -->
    <text x="20" y="72" font-family="sans-serif" font-size="11" fill="#4a5a6e">文本向量化转换</text>
    <text x="20" y="90" font-family="sans-serif" font-size="11" fill="#4a5a6e">词汇语义编码</text>
    <!-- 连接线 -->
    <line x1="175" y1="60" x2="210" y2="100" stroke="#8CCEFF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- 卡片4：归一化层（右下） -->
  <g transform="translate(590, 310)" filter="url(#shadow)">
    <rect width="175" height="120" rx="10" fill="white" stroke="#e0e6f0" stroke-width="1"/>
    <!-- 图标区域 -->
    <rect x="12" y="12" width="32" height="32" rx="8" fill="#B0D8FF" opacity="0.15"/>
    <text x="28" y="33" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7AADD0">⚖</text>
    <!-- 标题 -->
    <text x="54" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">归一化层</text>
    <!-- 参数 -->
    <text x="54" y="48" font-family="sans-serif" font-size="12" fill="#6a7a8e">参数: 0.2B</text>
    <!-- 描述 -->
    <text x="20" y="72" font-family="sans-serif" font-size="11" fill="#4a5a6e">层归一化处理</text>
    <text x="20" y="90" font-family="sans-serif" font-size="11" fill="#4a5a6e">训练稳定性保障</text>
    <!-- 连接线 -->
    <line x1="0" y1="60" x2="-35" y2="100" stroke="#B0D8FF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8a9aae">注：参数分布基于标准 7B 规模 Transformer 架构，实际比例因模型设计略有差异</text>

</svg>