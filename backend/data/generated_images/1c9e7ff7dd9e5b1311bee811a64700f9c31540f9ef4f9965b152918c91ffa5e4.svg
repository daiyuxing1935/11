<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <!-- 左路径渐变 -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ab0ff;stop-opacity:1" />
    </linearGradient>
    <!-- 右路径渐变 -->
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89c4ff;stop-opacity:1" />
    </linearGradient>
    <!-- 合并节点渐变 -->
    <linearGradient id="mergeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d5e;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
    <filter id="shadowDeep" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">混合搜索流程</text>

  <!-- ===== 左路径：稀疏/关键词 ===== -->

  <!-- 左路径标签 -->
  <rect x="60" y="70" width="200" height="36" rx="18" fill="#409EFF" filter="url(#shadow)"/>
  <text x="160" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">稀疏 / 关键词</text>

  <!-- BM25 算法图标 -->
  <rect x="85" y="130" width="150" height="56" rx="12" fill="#ffffff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#409EFF">BM25 算法</text>
  <text x="160" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">词频·逆文档频率</text>

  <!-- 箭头：BM25 → 关键词匹配 -->
  <line x1="160" y1="186" x2="160" y2="218" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 关键词匹配结果 -->
  <rect x="70" y="220" width="180" height="70" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="160" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">关键词匹配</text>
  <text x="160" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">精确词条匹配高亮</text>
  <!-- 高亮标记 -->
  <rect x="90" y="274" width="30" height="6" rx="3" fill="#409EFF" opacity="0.5"/>
  <rect x="128" y="274" width="22" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
  <rect x="158" y="274" width="35" height="6" rx="3" fill="#409EFF" opacity="0.5"/>
  <rect x="200" y="274" width="18" height="6" rx="3" fill="#409EFF" opacity="0.3"/>

  <!-- 箭头：关键词匹配 → 融合节点 -->
  <path d="M 160 290 Q 160 330 310 370" stroke="#409EFF" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- ===== 右路径：密集/向量 ===== -->

  <!-- 右路径标签 -->
  <rect x="540" y="70" width="200" height="36" rx="18" fill="#5a9eff" filter="url(#shadow)"/>
  <text x="640" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">密集 / 向量</text>

  <!-- 嵌入向量图标 -->
  <rect x="565" y="130" width="150" height="56" rx="12" fill="#ffffff" stroke="#5a9eff" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5a9eff">嵌入向量</text>
  <text x="640" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">稠密语义表示</text>

  <!-- 箭头：嵌入 → 语义相似度 -->
  <line x1="640" y1="186" x2="640" y2="218" stroke="#5a9eff" stroke-width="2" marker-end="url(#arrowLight)"/>
  <defs>
    <marker id="arrowLight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a9eff"/>
    </marker>
  </defs>

  <!-- 语义相似度结果 -->
  <rect x="550" y="220" width="180" height="70" rx="10" fill="#ffffff" stroke="#5a9eff" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="640" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">语义相似度</text>
  <text x="640" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a9eff">相关概念连接</text>
  <!-- 连接点 -->
  <circle cx="580" cy="275" r="4" fill="#5a9eff" opacity="0.6"/>
  <circle cx="600" cy="272" r="3" fill="#5a9eff" opacity="0.4"/>
  <circle cx="620" cy="277" r="5" fill="#5a9eff" opacity="0.7"/>
  <circle cx="645" cy="273" r="3" fill="#5a9eff" opacity="0.4"/>
  <circle cx="665" cy="276" r="4" fill="#5a9eff" opacity="0.6"/>
  <circle cx="690" cy="274" r="3" fill="#5a9eff" opacity="0.5"/>
  <!-- 连接线 -->
  <line x1="580" y1="275" x2="600" y2="272" stroke="#5a9eff" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="272" x2="620" y2="277" stroke="#5a9eff" stroke-width="1" opacity="0.4"/>
  <line x1="620" y1="277" x2="645" y2="273" stroke="#5a9eff" stroke-width="1" opacity="0.4"/>
  <line x1="645" y1="273" x2="665" y2="276" stroke="#5a9eff" stroke-width="1" opacity="0.4"/>
  <line x1="665" y1="276" x2="690" y2="274" stroke="#5a9eff" stroke-width="1" opacity="0.4"/>

  <!-- 箭头：语义相似度 → 融合节点 -->
  <path d="M 640 290 Q 640 330 490 370" stroke="#5a9eff" stroke-width="2" fill="none" marker-end="url(#arrowLight)"/>

  <!-- ===== 融合节点：倒数排名融合 ===== -->

  <!-- 汇聚箭头 -->
  <line x1="310" y1="370" x2="370" y2="370" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="370" x2="430" y2="370" stroke="#5a9eff" stroke-width="2" marker-end="url(#arrowLight)"/>

  <!-- 融合节点 -->
  <rect x="300" y="345" width="200" height="50" rx="25" fill="url(#mergeGrad)" filter="url(#shadowDeep)"/>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">倒数排名融合</text>

  <!-- 箭头：融合 → 最终结果 -->
  <line x1="400" y1="395" x2="400" y2="430" stroke="#1a1a2e" stroke-width="2.5" marker-end="url(#arrowDark)"/>
  <defs>
    <marker id="arrowDark" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 最终结果 -->
  <rect x="310" y="432" width="180" height="48" rx="14" fill="#1a1a2e" filter="url(#shadowDeep)"/>
  <text x="400" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">组合排序结果</text>

  <!-- ===== 标注 ===== -->

  <!-- 标注 1：左路径 -->
  <rect x="20" y="130" width="50" height="22" rx="11" fill="#409EFF" opacity="0.85"/>
  <text x="45" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">①</text>

  <!-- 标注 2：右路径 -->
  <rect x="730" y="130" width="50" height="22" rx="11" fill="#5a9eff" opacity="0.85"/>
  <text x="755" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">②</text>

  <!-- 标注 3：BM25 -->
  <rect x="20" y="230" width="50" height="22" rx="11" fill="#409EFF" opacity="0.7"/>
  <text x="45" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">③</text>

  <!-- 标注 4：语义 -->
  <rect x="730" y="230" width="50" height="22" rx="11" fill="#5a9eff" opacity="0.7"/>
  <text x="755" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">④</text>

  <!-- 标注 5：融合 -->
  <rect x="270" y="355" width="24" height="24" rx="12" fill="#1a1a2e" opacity="0.8"/>
  <text x="282" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">⑤</text>

  <!-- 标注 6：结果 -->
  <rect x="500" y="448" width="50" height="22" rx="11" fill="#1a1a2e" opacity="0.7"/>
  <text x="525" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">⑥</text>

</svg>