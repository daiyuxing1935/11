<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60B0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="darkBlueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0D0FF"/>
      <stop offset="100%" stop-color="#70B8FF"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5CB8FF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">可扩展性设计原则</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- ============================================ -->
  <!-- 左侧：水平扩展 -->
  <!-- ============================================ -->

  <!-- 左侧区域标题 -->
  <rect x="30" y="70" width="220" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
  <text x="140" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#409EFF">水平扩展</text>

  <!-- 负载均衡器（左） -->
  <rect x="55" y="130" width="170" height="40" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="140" y="156" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">负载均衡器</text>

  <!-- 从负载均衡器向下的箭头 -->
  <line x1="90" y1="170" x2="90" y2="210" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="140" y1="170" x2="140" y2="210" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="190" y1="170" x2="190" y2="210" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 代理实例 1→3→5 -->
  <!-- 第1行：1个实例 -->
  <rect x="115" y="215" width="50" height="50" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="2"/>
  <text x="140" y="245" text-anchor="middle" font-size="12" fill="#409EFF">Agent</text>

  <!-- 第2行：3个实例 -->
  <rect x="65" y="280" width="50" height="50" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="2"/>
  <text x="90" y="310" text-anchor="middle" font-size="12" fill="#409EFF">Agent</text>

  <rect x="140" y="280" width="50" height="50" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="2"/>
  <text x="165" y="310" text-anchor="middle" font-size="12" fill="#409EFF">Agent</text>

  <!-- 第3行：5个实例 -->
  <rect x="40" y="345" width="40" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="60" y="370" text-anchor="middle" font-size="10" fill="#409EFF">A</text>

  <rect x="90" y="345" width="40" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="110" y="370" text-anchor="middle" font-size="10" fill="#409EFF">A</text>

  <rect x="140" y="345" width="40" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="160" y="370" text-anchor="middle" font-size="10" fill="#409EFF">A</text>

  <rect x="190" y="345" width="40" height="40" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="210" y="370" text-anchor="middle" font-size="10" fill="#409EFF">A</text>

  <!-- 增长箭头 -->
  <text x="140" y="410" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">1 → 3 → 5 实例</text>

  <!-- 标注1 -->
  <rect x="30" y="425" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="70" y="442" text-anchor="middle" font-size="12" fill="#409EFF">添加实例</text>

  <!-- ============================================ -->
  <!-- 中间：无状态设计 -->
  <!-- ============================================ -->

  <!-- 中间区域标题 -->
  <rect x="290" y="70" width="220" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
  <text x="400" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#409EFF">无状态设计</text>

  <!-- 中间代理实例 -->
  <rect x="340" y="130" width="120" height="60" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="400" y="158" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">Agent 实例</text>
  <text x="400" y="178" text-anchor="middle" font-size="12" fill="#fff" opacity="0.85">无状态</text>

  <!-- 状态外部存储箭头 -->
  <path d="M 460 160 L 510 160" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>

  <!-- Redis/数据库圆柱 -->
  <ellipse cx="560" cy="145" rx="35" ry="10" fill="url(#dbGrad)"/>
  <rect x="525" y="145" width="70" height="50" rx="0" fill="url(#dbGrad)"/>
  <ellipse cx="560" cy="195" rx="35" ry="10" fill="#3A8FE0"/>
  <rect x="525" y="145" width="70" height="50" fill="url(#dbGrad)"/>
  <text x="560" y="175" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Redis</text>
  <text x="560" y="192" text-anchor="middle" font-size="11" fill="#fff" opacity="0.85">数据库</text>

  <!-- 标注2 -->
  <rect x="520" y="210" width="85" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="562" y="227" text-anchor="middle" font-size="12" fill="#409EFF">外部存储状态</text>

  <!-- 任意实例处理请求 -->
  <text x="400" y="260" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">任意实例可处理任意请求</text>

  <!-- 请求路由示意 -->
  <rect x="310" y="280" width="180" height="36" rx="18" fill="#409EFF" opacity="0.08"/>
  <text x="400" y="304" text-anchor="middle" font-size="13" fill="#409EFF">请求 → 任意实例 → 外部状态</text>

  <!-- 标注3 -->
  <rect x="290" y="330" width="90" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="335" y="347" text-anchor="middle" font-size="12" fill="#409EFF">无状态设计</text>

  <!-- ============================================ -->
  <!-- 右侧：垂直扩展 -->
  <!-- ============================================ -->

  <!-- 右侧区域标题 -->
  <rect x="550" y="70" width="220" height="36" rx="18" fill="#409EFF" opacity="0.15"/>
  <text x="660" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#409EFF">垂直扩展</text>

  <!-- 小实例 -->
  <rect x="610" y="130" width="60" height="50" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="2"/>
  <text x="640" y="155" text-anchor="middle" font-size="12" fill="#409EFF">Agent</text>
  <text x="640" y="170" text-anchor="middle" font-size="10" fill="#1a1a2e" opacity="0.5">小</text>

  <!-- 增长箭头 -->
  <text x="640" y="200" text-anchor="middle" font-size="16" fill="#409EFF">↓</text>

  <!-- 中实例 -->
  <rect x="600" y="215" width="80" height="60" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="2.5"/>
  <text x="640" y="243" text-anchor="middle" font-size="13" fill="#409EFF">Agent</text>
  <text x="640" y="260" text-anchor="middle" font-size="10" fill="#1a1a2e" opacity="0.5">中</text>

  <!-- 增长箭头 -->
  <text x="640" y="290" text-anchor="middle" font-size="16" fill="#409EFF">↓</text>

  <!-- 大实例 -->
  <rect x="590" y="305" width="100" height="70" rx="8" fill="url(#blueGrad)" opacity="0.85"/>
  <text x="640" y="338" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">Agent</text>
  <text x="640" y="358" text-anchor="middle" font-size="12" fill="#fff" opacity="0.85">大</text>

  <!-- CPU/内存标注 -->
  <rect x="700" y="310" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="740" y="327" text-anchor="middle" font-size="11" fill="#409EFF">↑ CPU</text>

  <rect x="700" y="345" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="740" y="362" text-anchor="middle" font-size="11" fill="#409EFF">↑ 内存</text>

  <!-- 标注4 -->
  <rect x="590" y="395" width="90" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="635" y="412" text-anchor="middle" font-size="12" fill="#409EFF">增强单实例</text>

  <!-- ============================================ -->
  <!-- 底部：负载均衡器路由 -->
  <!-- ============================================ -->

  <rect x="55" y="445" width="690" height="40" rx="10" fill="#409EFF" opacity="0.06"/>
  <text x="400" y="470" text-anchor="middle" font-size="14" fill="#1a1a2e" opacity="0.8">负载均衡器将任务路由到负载最低的实例</text>

  <!-- 标注5 -->
  <rect x="630" y="445" width="95" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="677" y="462" text-anchor="middle" font-size="12" fill="#409EFF">负载均衡路由</text>

  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

</svg>