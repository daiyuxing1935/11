<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">两种思维路径对比</text>

  <!-- 顶部：24点游戏卡片 -->
  <rect x="310" y="55" width="180" height="70" rx="12" fill="url(#cardGrad)" opacity="0.9"/>
  <rect x="310" y="55" width="180" height="70" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#ffffff" font-weight="bold">24点游戏</text>
  <text x="400" y="110" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ffffff" font-weight="bold">1 2 3 4</text>

  <!-- 左侧：CoT 线性路径 -->
  <text x="200" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">CoT（链式思维）</text>

  <!-- 线性路径节点 -->
  <circle cx="80" cy="230" r="16" fill="#409EFF" opacity="0.8"/>
  <text x="80" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">A</text>

  <circle cx="200" cy="230" r="16" fill="#409EFF" opacity="0.8"/>
  <text x="200" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">B</text>

  <circle cx="320" cy="230" r="16" fill="#409EFF" opacity="0.8"/>
  <text x="320" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">C</text>

  <circle cx="440" cy="230" r="18" fill="#409EFF"/>
  <text x="440" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">✓</text>

  <!-- 箭头 A→B -->
  <line x1="96" y1="230" x2="184" y2="230" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <polygon points="184,226 194,230 184,234" fill="#888"/>

  <!-- 箭头 B→C -->
  <line x1="216" y1="230" x2="304" y2="230" stroke="#888" stroke-width="2"/>
  <polygon points="304,226 314,230 304,234" fill="#888"/>

  <!-- 箭头 C→Answer -->
  <line x1="336" y1="230" x2="422" y2="230" stroke="#888" stroke-width="2"/>
  <polygon points="422,226 432,230 422,234" fill="#888"/>

  <!-- 线性路径标注 -->
  <text x="260" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">单一顺序</text>
  <text x="260" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">逐步推理</text>

  <!-- 右侧：ToT 树状结构 -->
  <text x="600" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">ToT（树状思维）</text>

  <!-- 根节点 -->
  <circle cx="600" cy="210" r="14" fill="#409EFF"/>
  <text x="600" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">根</text>

  <!-- 第一层分支 -->
  <line x1="600" y1="224" x2="540" y2="280" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <line x1="600" y1="224" x2="600" y2="280" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>
  <line x1="600" y1="224" x2="660" y2="280" stroke="#409EFF" stroke-width="1.8" opacity="0.7"/>

  <!-- 第一层节点 -->
  <circle cx="540" cy="280" r="10" fill="#409EFF" opacity="0.6"/>
  <circle cx="600" cy="280" r="10" fill="#409EFF" opacity="0.6"/>
  <circle cx="660" cy="280" r="10" fill="#409EFF" opacity="0.6"/>

  <!-- 第二层分支 - 左 -->
  <line x1="540" y1="290" x2="510" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="540" y1="290" x2="570" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>

  <!-- 第二层分支 - 中 -->
  <line x1="600" y1="290" x2="580" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="290" x2="620" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>

  <!-- 第二层分支 - 右 -->
  <line x1="660" y1="290" x2="640" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="660" y1="290" x2="680" y2="340" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>

  <!-- 第二层节点（叶子） -->
  <circle cx="510" cy="340" r="8" fill="#409EFF" opacity="0.4"/>
  <circle cx="570" cy="340" r="8" fill="#409EFF" opacity="0.4"/>
  <circle cx="580" cy="340" r="8" fill="#409EFF" opacity="0.4"/>
  <circle cx="620" cy="340" r="8" fill="#409EFF" opacity="0.4"/>
  <circle cx="640" cy="340" r="8" fill="#409EFF" opacity="0.4"/>
  <circle cx="680" cy="340" r="8" fill="#409EFF" opacity="0.4"/>

  <!-- 死胡同标记 X -->
  <text x="510" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">✕</text>
  <text x="580" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">✕</text>
  <text x="640" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">✕</text>
  <text x="680" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">✕</text>

  <!-- 成功路径高亮 -->
  <line x1="600" y1="224" x2="600" y2="280" stroke="#409EFF" stroke-width="2.5" opacity="1"/>
  <line x1="600" y1="290" x2="620" y2="340" stroke="#409EFF" stroke-width="2.5" opacity="1"/>
  <circle cx="620" cy="340" r="8" fill="#409EFF" stroke="#409EFF" stroke-width="2"/>

  <!-- 成功节点星标 -->
  <text x="620" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">★</text>

  <!-- 右侧标注 -->
  <text x="720" y="250" text-anchor="start" font-family="sans-serif" font-size="12" fill="#409EFF">分支探索</text>
  <text x="720" y="270" text-anchor="start" font-family="sans-serif" font-size="12" fill="#e74c3c">死胡同</text>
  <text x="720" y="290" text-anchor="start" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">最优解</text>

  <!-- 底部对比标注 -->
  <rect x="100" y="380" width="200" height="50" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" opacity="0.8"/>
  <text x="200" y="402" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">线性推理</text>
  <text x="200" y="420" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">一条路走到黑</text>

  <rect x="500" y="380" width="200" height="50" rx="8" fill="#fff" stroke="#409EFF" stroke-width="1.5" opacity="0.8"/>
  <text x="600" y="402" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">树状探索</text>
  <text x="600" y="420" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">多路径回溯</text>

  <!-- 底部装饰线 -->
  <line x1="100" y1="460" x2="700" y2="460" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">教育插画 · 思维方法对比</text>
</svg>