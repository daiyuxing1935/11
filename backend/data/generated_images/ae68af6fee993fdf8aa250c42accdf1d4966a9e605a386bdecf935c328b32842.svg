<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8899AA"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">智能体架构蓝图</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ========== 左侧输入箭头（用户图标 →） ========== -->
  <g transform="translate(30, 250)">
    <!-- 用户图标 -->
    <circle cx="20" cy="0" r="18" fill="#1a1a2e" opacity="0.85"/>
    <circle cx="20" cy="-6" r="7" fill="#FFFFFF"/>
    <path d="M5,16 Q20,26 35,16" fill="#FFFFFF"/>
    <text x="20" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">用户</text>
  </g>

  <!-- 输入箭头 -->
  <line x1="68" y1="250" x2="155" y2="250" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="112" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899AA">输入</text>

  <!-- ========== 顶部：LLM 模型模块 ========== -->
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="180" height="90" rx="16" ry="16" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 大脑图标 -->
    <g transform="translate(20, 20)">
      <ellipse cx="15" cy="12" rx="14" ry="10" fill="#409EFF" opacity="0.2"/>
      <ellipse cx="15" cy="12" rx="10" ry="7" fill="#409EFF" opacity="0.4"/>
      <path d="M8,8 Q15,2 22,8 Q25,12 22,16 Q15,22 8,16 Q5,12 8,8Z" fill="none" stroke="#409EFF" stroke-width="1.8"/>
      <path d="M12,10 L18,10 M11,13 L19,13 M13,16 L17,16" stroke="#409EFF" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="90" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">LLM 模型</text>
    <text x="90" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8899AA">大语言模型</text>
  </g>

  <!-- ========== 右侧：工具集模块 ========== -->
  <g transform="translate(560, 200)">
    <rect x="0" y="0" width="180" height="160" rx="16" ry="16" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 工具箱图标 -->
    <g transform="translate(20, 18)">
      <rect x="0" y="8" width="24" height="16" rx="3" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
      <rect x="4" y="4" width="16" height="6" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="12" y1="4" x2="12" y2="0" stroke="#409EFF" stroke-width="1.5"/>
    </g>
    <text x="90" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">工具集</text>
    <!-- 工具芯片 -->
    <g transform="translate(15, 55)">
      <rect x="0" y="0" width="145" height="28" rx="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
      <text x="72" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">🔌 API 接口</text>
    </g>
    <g transform="translate(15, 90)">
      <rect x="0" y="0" width="145" height="28" rx="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
      <text x="72" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">🗄️ 数据库</text>
    </g>
    <g transform="translate(15, 125)">
      <rect x="0" y="0" width="145" height="28" rx="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
      <text x="72" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">📧 邮件服务</text>
    </g>
  </g>

  <!-- ========== 中央：智能体核心（六边形） ========== -->
  <g transform="translate(310, 210)">
    <!-- 六边形 -->
    <polygon points="90,0 168,52 168,156 90,208 12,156 12,52" fill="url(#hexGrad)" stroke="#2B7BD4" stroke-width="2" opacity="0.9"/>
    <polygon points="90,15 158,60 158,148 90,193 22,148 22,60" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
    <!-- 循环符号 -->
    <g transform="translate(90, 80)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
      <path d="M-8,-18 A22,22 0 0,1 18,-8" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="18,-8 12,-14 22,-12" fill="#FFFFFF"/>
      <path d="M8,18 A22,22 0 0,1 -18,8" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="-18,8 -12,14 -22,12" fill="#FFFFFF"/>
    </g>
    <text x="90" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">智能体核心</text>
    <text x="90" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">运行循环</text>
  </g>

  <!-- ========== 连接箭头 ========== -->

  <!-- LLM → 智能体核心（向下） -->
  <line x1="370" y1="170" x2="370" y2="210" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="380" y="195" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">推理</text>

  <!-- 智能体核心 → LLM（向上） -->
  <line x1="430" y1="210" x2="430" y2="170" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="440" y="195" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">请求</text>

  <!-- 智能体核心 → 工具集（向右） -->
  <line x1="478" y1="280" x2="558" y2="280" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="518" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">调用</text>

  <!-- 工具集 → 智能体核心（向左） -->
  <line x1="560" y1="310" x2="478" y2="310" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="519" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">结果</text>

  <!-- ========== 右侧输出箭头（→ 响应气泡） ========== -->
  <g transform="translate(740, 250)">
    <!-- 响应气泡 -->
    <rect x="-30" y="-20" width="60" height="40" rx="18" ry="18" fill="#1a1a2e" opacity="0.85"/>
    <polygon points="-10,20 -5,30 0,20" fill="#1a1a2e" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">响应</text>
  </g>

  <!-- 输出箭头 -->
  <line x1="740" y1="250" x2="705" y2="250" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="723" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899AA">输出</text>

  <!-- ========== 循环标注 ========== -->
  <!-- 感知-规划-执行 循环标注 -->
  <g transform="translate(310, 440)">
    <rect x="0" y="0" width="380" height="36" rx="18" fill="#1a1a2e" opacity="0.08"/>
    <text x="190" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">
      <tspan font-weight="bold" fill="#409EFF">感知</tspan>
      <tspan fill="#1a1a2e"> → </tspan>
      <tspan font-weight="bold" fill="#409EFF">规划</tspan>
      <tspan fill="#1a1a2e"> → </tspan>
      <tspan font-weight="bold" fill="#409EFF">执行</tspan>
      <tspan fill="#1a1a2e"> 循环回路</tspan>
    </text>
  </g>

  <!-- 流程标注 -->
  <g transform="translate(80, 430)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
    <text x="65" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">感知 → 行动</text>
  </g>

  <g transform="translate(560, 430)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#409EFF" opacity="0.12"/>
    <text x="65" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">工具增强</text>
  </g>

</svg>