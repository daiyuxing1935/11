<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="blockGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AACFF"/>
    </linearGradient>
    <linearGradient id="blockGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AACFF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI Agent 公式：智能体 = 六大核心模块</text>

  <!-- 等号 = -->
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a2e">=</text>

  <!-- 左侧：机器人图标 -->
  <g transform="translate(130, 60)">
    <!-- 机器人头部 -->
    <rect x="30" y="10" width="80" height="60" rx="12" fill="url(#robotGrad)" stroke="#409EFF" stroke-width="2"/>
    <!-- 眼睛 -->
    <circle cx="55" cy="35" r="6" fill="white"/>
    <circle cx="85" cy="35" r="6" fill="white"/>
    <circle cx="55" cy="35" r="3" fill="#1a1a2e"/>
    <circle cx="85" cy="35" r="3" fill="#1a1a2e"/>
    <!-- 天线 -->
    <rect x="63" y="0" width="14" height="12" rx="4" fill="#409EFF"/>
    <circle cx="70" cy="-3" r="6" fill="#FFD700" opacity="0.8"/>
    <!-- 身体 -->
    <rect x="25" y="78" width="90" height="70" rx="10" fill="url(#robotGrad)" stroke="#409EFF" stroke-width="2"/>
    <!-- 身体细节 -->
    <rect x="40" y="95" width="60" height="8" rx="4" fill="white" opacity="0.3"/>
    <rect x="40" y="110" width="60" height="8" rx="4" fill="white" opacity="0.3"/>
    <!-- 手臂 -->
    <rect x="5" y="85" width="18" height="50" rx="6" fill="#409EFF" opacity="0.8"/>
    <rect x="117" y="85" width="18" height="50" rx="6" fill="#409EFF" opacity="0.8"/>
    <!-- 腿 -->
    <rect x="40" y="155" width="20" height="35" rx="6" fill="#409EFF" opacity="0.7"/>
    <rect x="80" y="155" width="20" height="35" rx="6" fill="#409EFF" opacity="0.7"/>
  </g>

  <!-- 右侧：六个构建块 -->
  <g transform="translate(480, 55)">
    <!-- 第1行：LLM + Tools -->
    <!-- 模块1：LLM / 大脑 -->
    <rect x="0" y="0" width="130" height="50" rx="10" fill="url(#blockGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <g transform="translate(12, 10)">
      <path d="M0,15 Q8,0 16,15 Q24,30 32,15" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="16" cy="8" r="4" fill="white"/>
    </g>
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">LLM 大脑</text>

    <!-- 模块2：Tools / 工具箱 -->
    <rect x="150" y="0" width="130" height="50" rx="10" fill="url(#blockGrad2)" stroke="#409EFF" stroke-width="1.5"/>
    <g transform="translate(162, 12)">
      <rect x="0" y="5" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
      <rect x="0" y="20" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
      <rect x="14" y="5" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
      <rect x="14" y="20" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
    </g>
    <text x="200" y="30" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Tools 工具</text>

    <!-- 第2行：Memory + Planning -->
    <!-- 模块3：Memory / 记忆 -->
    <rect x="0" y="70" width="130" height="50" rx="10" fill="url(#blockGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <g transform="translate(12, 80)">
      <rect x="0" y="5" width="12" height="8" rx="2" fill="white" opacity="0.8"/>
      <rect x="0" y="17" width="12" height="8" rx="2" fill="white" opacity="0.8"/>
      <rect x="0" y="29" width="12" height="8" rx="2" fill="white" opacity="0.8"/>
    </g>
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Memory 记忆</text>

    <!-- 模块4：Planning / 规划 -->
    <rect x="150" y="70" width="130" height="50" rx="10" fill="url(#blockGrad2)" stroke="#409EFF" stroke-width="1.5"/>
    <g transform="translate(162, 82)">
      <path d="M0,25 L8,8 L16,25 L24,8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8" cy="8" r="3" fill="white"/>
      <circle cx="24" cy="8" r="3" fill="white"/>
    </g>
    <text x="200" y="100" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Planning 规划</text>

    <!-- 第3行：Execution + Error Recovery -->
    <!-- 模块5：Execution Loop / 执行循环 -->
    <rect x="0" y="140" width="130" height="50" rx="10" fill="url(#blockGrad1)" stroke="#409EFF" stroke-width="1.5"/>
    <g transform="translate(12, 152)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="2.5"/>
      <path d="M12,2 L12,6 L16,6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <polygon points="8,22 12,18 16,22" fill="white" opacity="0.8"/>
    </g>
    <text x="50" y="170" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">Execution 执行</text>

    <!-- 模块6：Error Recovery / 错误恢复 -->
    <rect x="150" y="140" width="130" height="50" rx="10" fill="url(#blockGrad2)" stroke="#409EFF" stroke-width="1.5"/>
    <g transform="translate(162, 150)">
      <path d="M6,20 Q12,5 20,12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M20,12 L16,8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M20,12 L24,10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="6" cy="20" r="4" fill="white" opacity="0.7"/>
    </g>
    <text x="200" y="170" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">Error 恢复</text>
  </g>

  <!-- 底部连接线：从机器人到等号 -->
  <line x1="330" y1="200" x2="380" y2="120" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="330" y1="200" x2="380" y2="200" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部标注 -->
  <g transform="translate(400, 440)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">六大模块协同工作，构成完整 AI Agent 智能体</text>
  </g>

  <!-- 装饰性小点 -->
  <circle cx="50" cy="460" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="750" cy="460" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="50" cy="40" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="750" cy="40" r="3" fill="#409EFF" opacity="0.3"/>
</svg>