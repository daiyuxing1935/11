<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fa"/>
    </linearGradient>
    <linearGradient id="highAttn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
    <linearGradient id="medAttn1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="100%" stop-color="#5a7fb5"/>
    </linearGradient>
    <linearGradient id="medAttn2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ba3d4"/>
      <stop offset="100%" stop-color="#8bb3e4"/>
    </linearGradient>
    <linearGradient id="lowAttn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8d4f0"/>
      <stop offset="100%" stop-color="#c8e0f8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">注意力权重热力图</text>

  <!-- 矩阵网格：6x6，单元格大小 44x44，间距 4 -->
  <!-- 矩阵起始位置：x=220, y=70 -->
  <!-- 行标签（Y轴）：从左到右对应单词 -->
  <!-- 列标签（X轴）：从上到下对应单词 -->

  <!-- 行标签 -->
  <text x="200" y="96" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">The</text>
  <text x="200" y="144" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">cat</text>
  <text x="200" y="192" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">sat</text>
  <text x="200" y="240" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">on</text>
  <text x="200" y="288" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">the</text>
  <text x="200" y="336" text-anchor="end" font-family="sans-serif" font-size="14" fill="#1a1a2e">mat</text>

  <!-- 列标签 -->
  <text x="242" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">The</text>
  <text x="290" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">cat</text>
  <text x="338" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">sat</text>
  <text x="386" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">on</text>
  <text x="434" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">the</text>
  <text x="482" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">mat</text>

  <!-- 单元格数据：行0=The, 行1=cat, 行2=sat, 行3=on, 行4=the, 行5=mat -->
  <!-- 每行6个单元格，x从222开始，步长48；y从74开始，步长48 -->

  <!-- 第0行：The -->
  <rect x="222" y="74" width="44" height="44" rx="6" fill="url(#highAttn)" filter="url(#glow)"/>
  <rect x="270" y="74" width="44" height="44" rx="6" fill="url(#medAttn2)"/>
  <rect x="318" y="74" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="366" y="74" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="414" y="74" width="44" height="44" rx="6" fill="url(#medAttn1)"/>
  <rect x="462" y="74" width="44" height="44" rx="6" fill="url(#lowAttn)"/>

  <!-- 第1行：cat -->
  <rect x="222" y="122" width="44" height="44" rx="6" fill="url(#medAttn2)"/>
  <rect x="270" y="122" width="44" height="44" rx="6" fill="url(#highAttn)" filter="url(#glow)"/>
  <rect x="318" y="122" width="44" height="44" rx="6" fill="url(#medAttn1)"/>
  <rect x="366" y="122" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="414" y="122" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="462" y="122" width="44" height="44" rx="6" fill="url(#medAttn2)"/>

  <!-- 第2行：sat -->
  <rect x="222" y="170" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="270" y="170" width="44" height="44" rx="6" fill="url(#medAttn1)"/>
  <rect x="318" y="170" width="44" height="44" rx="6" fill="url(#highAttn)" filter="url(#glow)"/>
  <rect x="366" y="170" width="44" height="44" rx="6" fill="url(#medAttn2)"/>
  <rect x="414" y="170" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="462" y="170" width="44" height="44" rx="6" fill="url(#lowAttn)"/>

  <!-- 第3行：on -->
  <rect x="222" y="218" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="270" y="218" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="318" y="218" width="44" height="44" rx="6" fill="url(#medAttn2)"/>
  <rect x="366" y="218" width="44" height="44" rx="6" fill="url(#highAttn)" filter="url(#glow)"/>
  <rect x="414" y="218" width="44" height="44" rx="6" fill="url(#medAttn1)"/>
  <rect x="462" y="218" width="44" height="44" rx="6" fill="url(#lowAttn)"/>

  <!-- 第4行：the -->
  <rect x="222" y="266" width="44" height="44" rx="6" fill="url(#medAttn1)"/>
  <rect x="270" y="266" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="318" y="266" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="366" y="266" width="44" height="44" rx="6" fill="url(#medAttn2)"/>
  <rect x="414" y="266" width="44" height="44" rx="6" fill="url(#highAttn)" filter="url(#glow)"/>
  <rect x="462" y="266" width="44" height="44" rx="6" fill="url(#medAttn1)"/>

  <!-- 第5行：mat -->
  <rect x="222" y="314" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="270" y="314" width="44" height="44" rx="6" fill="url(#medAttn2)"/>
  <rect x="318" y="314" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="366" y="314" width="44" height="44" rx="6" fill="url(#lowAttn)"/>
  <rect x="414" y="314" width="44" height="44" rx="6" fill="url(#medAttn1)"/>
  <rect x="462" y="314" width="44" height="44" rx="6" fill="url(#highAttn)" filter="url(#glow)"/>

  <!-- 标注1：对角线主导 -->
  <line x1="222" y1="74" x2="160" y2="74" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="74" x2="160" y2="50" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="100" y="36" width="120" height="22" rx="4" fill="#ffffff" stroke="#409EFF" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">对角线主导</text>

  <!-- 标注2：相邻词注意力 -->
  <line x1="270" y1="170" x2="160" y2="170" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="170" x2="160" y2="140" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="85" y="126" width="150" height="22" rx="4" fill="#ffffff" stroke="#409EFF" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">相邻词注意力</text>

  <!-- 标注3：分隔词注意力 -->
  <line x1="414" y1="266" x2="540" y2="266" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="540" y1="266" x2="540" y2="240" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="490" y="226" width="140" height="22" rx="4" fill="#ffffff" stroke="#409EFF" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="242" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">分隔词注意力</text>

  <!-- 标注4：高注意力权重 -->
  <line x1="462" y1="314" x2="560" y2="314" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="560" y1="314" x2="560" y2="290" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="500" y="276" width="120" height="22" rx="4" fill="#ffffff" stroke="#409EFF" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">高注意力权重</text>

  <!-- 标注5：中等注意力 -->
  <line x1="366" y1="122" x2="560" y2="122" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="560" y1="122" x2="560" y2="100" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="505" y="86" width="110" height="22" rx="4" fill="#ffffff" stroke="#409EFF" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="102" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">中等注意力</text>

  <!-- 标注6：低注意力 -->
  <line x1="318" y1="74" x2="160" y2="74" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="74" x2="160" y2="380" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="100" y="366" width="120" height="22" rx="4" fill="#ffffff" stroke="#409EFF" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">低注意力</text>

  <!-- 图例 -->
  <rect x="580" y="360" width="180" height="110" rx="8" fill="#ffffff" stroke="#d0d8e8" stroke-width="1" filter="url(#shadow)"/>
  <text x="670" y="380" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">注意力强度</text>

  <rect x="595" y="392" width="20" height="14" rx="3" fill="url(#highAttn)"/>
  <text x="625" y="404" font-family="sans-serif" font-size="12" fill="#1a1a2e">高</text>

  <rect x="595" y="414" width="20" height="14" rx="3" fill="url(#medAttn1)"/>
  <text x="625" y="426" font-family="sans-serif" font-size="12" fill="#1a1a2e">中</text>

  <rect x="595" y="436" width="20" height="14" rx="3" fill="url(#lowAttn)"/>
  <text x="625" y="448" font-family="sans-serif" font-size="12" fill="#1a1a2e">低</text>

  <!-- Y轴标签 -->
  <text x="200" y="370" text-anchor="end" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">Y：查询词</text>

  <!-- X轴标签 -->
  <text x="242" y="378" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">X：键词</text>

</svg>