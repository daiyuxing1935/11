<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fa"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6ab0ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">智能体架构设计哲学</text>
  <line x1="300" y1="52" x2="500" y2="52" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ========== 左侧：反应式智能体 ========== -->
  <g transform="translate(100, 130)">
    <!-- 机器人身体 -->
    <rect x="0" y="50" width="120" height="100" rx="20" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 头部（闪电） -->
    <polygon points="60,10 45,45 55,45 40,80 75,40 63,40 78,10" fill="#1a1a2e" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 眼睛传感器 -->
    <circle cx="60" cy="65" r="6" fill="#409EFF" opacity="0.8"/>
    <circle cx="60" cy="65" r="3" fill="white"/>
    <!-- 手臂执行器 -->
    <rect x="130" y="85" width="30" height="12" rx="6" fill="#409EFF"/>
    <!-- 传感器→执行器箭头 -->
    <line x1="66" y1="68" x2="128" y2="90" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="4,3"/>
    <polygon points="128,90 120,84 122,94" fill="#1a1a2e"/>
    <!-- 标签 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">反应式</text>
    <text x="60" y="195" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">刺激→响应</text>
  </g>

  <!-- ========== 中间：慎思式智能体 ========== -->
  <g transform="translate(340, 130)">
    <!-- 机器人身体 -->
    <rect x="0" y="50" width="120" height="100" rx="20" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 大脑形状头部 -->
    <ellipse cx="60" cy="30" rx="35" ry="25" fill="url(#brainGrad)" opacity="0.85"/>
    <path d="M35,25 Q40,10 55,15 Q65,8 75,15 Q90,12 85,28 Q92,38 80,42 Q70,50 55,45 Q40,48 35,38 Q28,32 35,25Z" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M45,20 Q50,28 48,35" stroke="#1a1a2e" stroke-width="1" fill="none"/>
    <path d="M75,20 Q70,28 72,35" stroke="#1a1a2e" stroke-width="1" fill="none"/>
    <!-- 世界模型（球体） -->
    <circle cx="140" cy="75" r="22" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <ellipse cx="140" cy="75" rx="22" ry="8" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <line x1="118" y1="75" x2="162" y2="75" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="140" y1="53" x2="140" y2="97" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <text x="140" y="79" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">世界</text>
    <!-- 规划路径 -->
    <path d="M60,55 Q70,45 85,50 Q100,42 110,55 Q120,48 130,60" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <circle cx="130" cy="60" r="3" fill="#1a1a2e"/>
    <!-- 标签 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">慎思式</text>
    <text x="60" y="195" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">规划+推理</text>
  </g>

  <!-- ========== 右侧：混合式智能体 ========== -->
  <g transform="translate(580, 130)">
    <!-- 机器人身体 -->
    <rect x="0" y="50" width="120" height="100" rx="20" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 分层躯干 -->
    <rect x="15" y="55" width="90" height="28" rx="6" fill="#409EFF" opacity="0.25" stroke="#409EFF" stroke-width="1"/>
    <text x="60" y="73" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">深层思考</text>
    <rect x="15" y="86" width="90" height="24" rx="6" fill="#409EFF" opacity="0.45" stroke="#409EFF" stroke-width="1"/>
    <text x="60" y="102" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">协调层</text>
    <rect x="15" y="113" width="90" height="24" rx="6" fill="#409EFF" opacity="0.7" stroke="#409EFF" stroke-width="1"/>
    <text x="60" y="129" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">快速反射</text>
    <!-- 头部 -->
    <circle cx="60" cy="25" r="20" fill="white" stroke="#409EFF" stroke-width="2"/>
    <circle cx="52" cy="20" r="3" fill="#1a1a2e"/>
    <circle cx="68" cy="20" r="3" fill="#1a1a2e"/>
    <path d="M50,32 Q60,38 70,32" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <!-- 标签 -->
    <text x="60" y="175" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">混合式</text>
    <text x="60" y="195" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">分层架构</text>
  </g>

  <!-- ========== 底部连接线 ========== -->
  <g transform="translate(0, 0)">
    <line x1="220" y1="330" x2="340" y2="330" stroke="#409EFF" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="460" y1="330" x2="580" y2="330" stroke="#409EFF" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
  </g>

  <!-- ========== 底部标注 ========== -->
  <g transform="translate(0, 0)">
    <!-- 反应式标注 -->
    <line x1="100" y1="340" x2="100" y2="370" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <circle cx="100" cy="340" r="3" fill="#409EFF"/>
    <rect x="40" y="370" width="120" height="28" rx="14" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="100" y="389" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">感知-动作回路</text>

    <!-- 慎思式标注 -->
    <line x1="400" y1="340" x2="400" y2="370" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <circle cx="400" cy="340" r="3" fill="#409EFF"/>
    <rect x="340" y="370" width="120" height="28" rx="14" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="400" y="389" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">世界模型+规划</text>

    <!-- 混合式标注 -->
    <line x1="640" y1="340" x2="640" y2="370" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <circle cx="640" cy="340" r="3" fill="#409EFF"/>
    <rect x="580" y="370" width="120" height="28" rx="14" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="640" y="389" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">分层融合架构</text>
  </g>

  <!-- ========== 副标题 ========== -->
  <text x="400" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#888" letter-spacing="3">三种智能体设计哲学</text>

  <!-- ========== 装饰性元素 ========== -->
  <circle cx="30" cy="30" r="15" fill="none" stroke="#409EFF" stroke-width="0.5" opacity="0.15"/>
  <circle cx="770" cy="30" r="15" fill="none" stroke="#409EFF" stroke-width="0.5" opacity="0.15"/>
  <circle cx="30" cy="470" r="15" fill="none" stroke="#409EFF" stroke-width="0.5" opacity="0.15"/>
  <circle cx="770" cy="470" r="15" fill="none" stroke="#409EFF" stroke-width="0.5" opacity="0.15"/>
</svg>