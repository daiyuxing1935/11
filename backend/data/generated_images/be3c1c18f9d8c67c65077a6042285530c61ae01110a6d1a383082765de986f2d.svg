<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4f8"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60b0ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">智能体设计哲学</text>

  <!-- ===== 左侧：反应式智能体 ===== -->
  <g transform="translate(100, 100)">
    <!-- 机器人身体 -->
    <rect x="0" y="40" width="120" height="130" rx="20" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 机器人头部（闪电） -->
    <polygon points="60,5 45,40 55,40 40,75 75,35 63,35 78,5" fill="#409EFF" opacity="0.85"/>
    <!-- 眼睛传感器 -->
    <circle cx="45" cy="65" r="6" fill="#1a1a2e"/>
    <circle cx="75" cy="65" r="6" fill="#1a1a2e"/>
    <circle cx="45" cy="65" r="3" fill="#60b0ff"/>
    <circle cx="75" cy="65" r="3" fill="#60b0ff"/>
    <!-- 手臂 -->
    <rect x="-18" y="80" width="14" height="50" rx="7" fill="#409EFF" opacity="0.7"/>
    <rect x="124" y="80" width="14" height="50" rx="7" fill="#409EFF" opacity="0.7"/>
    <!-- 手部执行器 -->
    <circle cx="-11" cy="135" r="10" fill="#1a1a2e"/>
    <circle cx="131" cy="135" r="10" fill="#1a1a2e"/>
    <!-- 刺激-反应箭头 -->
    <path d="M45,72 L-11,125" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
    <path d="M75,72 L131,125" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
    <!-- 标签 -->
    <text x="60" y="195" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">反应式</text>
    <text x="60" y="215" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#666">刺激→响应</text>
  </g>

  <!-- ===== 中间：慎思式智能体 ===== -->
  <g transform="translate(340, 100)">
    <!-- 机器人身体 -->
    <rect x="0" y="40" width="120" height="130" rx="20" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 大脑形状头部 -->
    <ellipse cx="60" cy="30" rx="40" ry="28" fill="#409EFF" opacity="0.2"/>
    <path d="M30,25 Q30,5 60,5 Q90,5 90,25 Q90,45 75,50 Q60,55 45,50 Q30,45 30,25Z" fill="#409EFF" opacity="0.4" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M45,20 Q50,15 55,20" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <path d="M65,20 Q70,15 75,20" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <path d="M50,30 Q60,25 70,30" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
    <!-- 世界模型球体 -->
    <circle cx="140" cy="70" r="28" fill="white" stroke="#409EFF" stroke-width="2"/>
    <ellipse cx="140" cy="70" rx="14" ry="28" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="140" cy="70" rx="28" ry="10" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <line x1="112" y1="70" x2="168" y2="70" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <!-- 规划路径 -->
    <path d="M60,75 Q80,95 100,85 Q120,75 130,90 Q140,105 150,100" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
    <circle cx="150" cy="100" r="5" fill="#1a1a2e"/>
    <!-- 连接线：大脑到世界模型 -->
    <line x1="95" y1="50" x2="115" y2="60" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,2"/>
    <!-- 标签 -->
    <text x="60" y="195" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">慎思式</text>
    <text x="60" y="215" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#666">世界模型+规划</text>
  </g>

  <!-- ===== 右侧：混合式智能体 ===== -->
  <g transform="translate(580, 100)">
    <!-- 机器人身体 -->
    <rect x="0" y="40" width="120" height="130" rx="20" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <!-- 分层躯干 -->
    <rect x="15" y="45" width="90" height="35" rx="8" fill="#409EFF" opacity="0.25" stroke="#409EFF" stroke-width="1.2"/>
    <rect x="15" y="85" width="90" height="35" rx="8" fill="#409EFF" opacity="0.45" stroke="#409EFF" stroke-width="1.2"/>
    <rect x="15" y="125" width="90" height="35" rx="8" fill="#409EFF" opacity="0.65" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 层次标签 -->
    <text x="60" y="67" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#1a1a2e">深度思考层</text>
    <text x="60" y="107" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#1a1a2e">协调层</text>
    <text x="60" y="147" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="white">快速反射层</text>
    <!-- 头部 -->
    <circle cx="60" cy="22" r="20" fill="white" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="52" cy="18" r="4" fill="#1a1a2e"/>
    <circle cx="68" cy="18" r="4" fill="#1a1a2e"/>
    <path d="M50,28 Q60,34 70,28" stroke="#409EFF" stroke-width="1.5" fill="none"/>
    <!-- 层次间连接箭头 -->
    <path d="M40,82 L40,88" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
    <path d="M80,82 L80,88" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
    <path d="M40,122 L40,128" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
    <path d="M80,122 L80,128" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowSmall)"/>
    <!-- 标签 -->
    <text x="60" y="195" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">混合式</text>
    <text x="60" y="215" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#666">分层架构</text>
  </g>

  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1a1a2e"/>
    </marker>
    <marker id="arrowSmall" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 底部标注 -->
  <text x="400" y="470" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" fill="#888">三种智能体设计哲学</text>

  <!-- 装饰性底部线条 -->
  <line x1="200" y1="480" x2="600" y2="480" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>

</svg>