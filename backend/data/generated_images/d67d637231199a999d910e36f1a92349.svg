<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0c4de"/>
      <stop offset="100%" stop-color="#9ab0cc"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2d7fd3"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3388dd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- Divider line -->
  <line x1="400" y1="50" x2="400" y2="470" stroke="#c0d0e0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT SIDE: Traditional Program ===== -->
  <g opacity="0.85">
    <!-- Left half background tint -->
    <rect x="0" y="0" width="400" height="500" fill="#e8eef5" rx="8"/>

    <!-- Title -->
    <text x="200" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">传统程序</text>
    <text x="200" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#5a6a7e">固定流程 + 批量处理</text>

    <!-- Flowchart -->
    <!-- Start -->
    <rect x="140" y="75" width="120" height="32" rx="16" fill="url(#leftGrad)" stroke="#7a8aa0" stroke-width="1.5"/>
    <text x="200" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">开始</text>

    <!-- Arrow down -->
    <line x1="200" y1="107" x2="200" y2="125" stroke="#7a8aa0" stroke-width="1.5"/>
    <polygon points="196,123 200,132 204,123" fill="#7a8aa0"/>

    <!-- Decision diamond -->
    <polygon points="200,132 260,160 200,188 140,160" fill="#d0dce8" stroke="#7a8aa0" stroke-width="1.5"/>
    <text x="200" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e">if/else</text>
    <text x="200" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#5a6a7e">条件判断</text>

    <!-- Left branch -->
    <line x1="140" y1="160" x2="90" y2="160" stroke="#7a8aa0" stroke-width="1.2"/>
    <line x1="90" y1="160" x2="90" y2="210" stroke="#7a8aa0" stroke-width="1.2"/>
    <polygon points="86,208 90,217 94,208" fill="#7a8aa0"/>
    <rect x="50" y="217" width="80" height="28" rx="6" fill="#d0dce8" stroke="#7a8aa0" stroke-width="1.2"/>
    <text x="90" y="235" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e">分支 A</text>

    <!-- Right branch -->
    <line x1="260" y1="160" x2="310" y2="160" stroke="#7a8aa0" stroke-width="1.2"/>
    <line x1="310" y1="160" x2="310" y2="210" stroke="#7a8aa0" stroke-width="1.2"/>
    <polygon points="306,208 310,217 314,208" fill="#7a8aa0"/>
    <rect x="270" y="217" width="80" height="28" rx="6" fill="#d0dce8" stroke="#7a8aa0" stroke-width="1.2"/>
    <text x="310" y="235" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e">分支 B</text>

    <!-- Merge back -->
    <line x1="90" y1="245" x2="90" y2="275" stroke="#7a8aa0" stroke-width="1.2"/>
    <line x1="310" y1="245" x2="310" y2="275" stroke="#7a8aa0" stroke-width="1.2"/>
    <line x1="90" y1="275" x2="310" y2="275" stroke="#7a8aa0" stroke-width="1.2"/>
    <line x1="200" y1="275" x2="200" y2="293" stroke="#7a8aa0" stroke-width="1.5"/>
    <polygon points="196,291 200,300 204,291" fill="#7a8aa0"/>

    <!-- Process box -->
    <rect x="130" y="300" width="140" height="32" rx="6" fill="#d0dce8" stroke="#7a8aa0" stroke-width="1.5"/>
    <text x="200" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1a1a2e">批量处理</text>

    <!-- Arrow -->
    <line x1="200" y1="332" x2="200" y2="355" stroke="#7a8aa0" stroke-width="1.5"/>
    <polygon points="196,353 200,362 204,353" fill="#7a8aa0"/>

    <!-- Envelopes row -->
    <rect x="110" y="362" width="30" height="22" rx="3" fill="#b8c8dd" stroke="#7a8aa0" stroke-width="1"/>
    <line x1="110" y1="368" x2="140" y2="368" stroke="#7a8aa0" stroke-width="0.8"/>
    <line x1="110" y1="374" x2="140" y2="374" stroke="#7a8aa0" stroke-width="0.8"/>
    <rect x="150" y="362" width="30" height="22" rx="3" fill="#b8c8dd" stroke="#7a8aa0" stroke-width="1"/>
    <line x1="150" y1="368" x2="180" y2="368" stroke="#7a8aa0" stroke-width="0.8"/>
    <line x1="150" y1="374" x2="180" y2="374" stroke="#7a8aa0" stroke-width="0.8"/>
    <rect x="190" y="362" width="30" height="22" rx="3" fill="#b8c8dd" stroke="#7a8aa0" stroke-width="1"/>
    <line x1="190" y1="368" x2="220" y2="368" stroke="#7a8aa0" stroke-width="0.8"/>
    <line x1="190" y1="374" x2="220" y2="374" stroke="#7a8aa0" stroke-width="0.8"/>
    <rect x="230" y="362" width="30" height="22" rx="3" fill="#b8c8dd" stroke="#7a8aa0" stroke-width="1"/>
    <line x1="230" y1="368" x2="260" y2="368" stroke="#7a8aa0" stroke-width="0.8"/>
    <line x1="230" y1="374" x2="260" y2="374" stroke="#7a8aa0" stroke-width="0.8"/>

    <text x="200" y="402" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#5a6a7e">× 1000 封相同模板邮件</text>

    <!-- End -->
    <rect x="145" y="418" width="110" height="28" rx="14" fill="url(#leftGrad)" stroke="#7a8aa0" stroke-width="1.5"/>
    <text x="200" y="437" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">结束</text>
  </g>

  <!-- ===== RIGHT SIDE: AI Agent ===== -->
  <g>
    <!-- Right half background -->
    <rect x="400" y="0" width="400" height="500" fill="#f5faff" rx="8"/>

    <!-- Title -->
    <text x="600" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">AI 智能体</text>
    <text x="600" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#409EFF">动态推理 + 个性化生成</text>

    <!-- Desk -->
    <rect x="440" y="360" width="320" height="12" rx="3" fill="#c8d8e8"/>
    <rect x="460" y="372" width="10" height="50" fill="#b0c4de"/>
    <rect x="730" y="372" width="10" height="50" fill="#b0c4de"/>

    <!-- Monitor -->
    <rect x="460" y="280" width="100" height="65" rx="4" fill="#2a3a4e"/>
    <rect x="464" y="284" width="92" height="50" rx="2" fill="#e8f0ff"/>
    <!-- Screen content -->
    <rect x="470" y="290" width="20" height="4" rx="2" fill="#409EFF" opacity="0.6"/>
    <rect x="470" y="298" width="35" height="4" rx="2" fill="#409EFF" opacity="0.4"/>
    <rect x="470" y="306" width="28" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="470" y="314" width="40" height="4" rx="2" fill="#409EFF" opacity="0.3"/>
    <rect x="470" y="322" width="22" height="4" rx="2" fill="#409EFF" opacity="0.5"/>
    <!-- Monitor stand -->
    <rect x="500" y="345" width="20" height="15" rx="2" fill="#2a3a4e"/>
    <rect x="490" y="355" width="40" height="5" rx="2" fill="#2a3a4e"/>

    <!-- Screen label -->
    <text x="510" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#409EFF">客户资料</text>

    <!-- Robot AI Agent sitting at desk -->
    <!-- Body -->
    <rect x="565" y="290" width="60" height="70" rx="10" fill="url(#robotBody)"/>

    <!-- Head -->
    <rect x="570" y="250" width="50" height="45" rx="12" fill="#409EFF"/>
    <!-- Eyes -->
    <circle cx="588" cy="268" r="5" fill="white"/>
    <circle cx="602" cy="268" r="5" fill="white"/>
    <circle cx="589" cy="268" r="2.5" fill="#1a1a2e"/>
    <circle cx="603" cy="268" r="2.5" fill="#1a1a2e"/>
    <!-- Smile -->
    <path d="M585 280 Q595 288 605 280" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Antenna -->
    <line x1="595" y1="250" x2="595" y2="238" stroke="#409EFF" stroke-width="2"/>
    <circle cx="595" cy="235" r="4" fill="#409EFF"/>
    <circle cx="595" cy="235" r="2" fill="white"/>

    <!-- Arms -->
    <!-- Left arm reaching to keyboard -->
    <path d="M565 310 Q540 320 530 340" stroke="#409EFF" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M625 310 Q650 330 640 350" stroke="#409EFF" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Keyboard -->
    <rect x="520" y="342" width="50" height="18" rx="3" fill="#d0dce8" stroke="#b0c4de" stroke-width="1"/>
    <rect x="524" y="345" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="533" y="345" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="542" y="345" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="551" y="345" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="524" y="352" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="533" y="352" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="542" y="352" width="6" height="4" rx="1" fill="#b0c4de"/>
    <rect x="551" y="352" width="6" height="4" rx="1" fill="#b0c4de"/>

    <!-- Personalized letters on desk -->
    <rect x="660" y="330" width="35" height="25" rx="2" fill="white" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="664" y1="337" x2="691" y2="337" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="664" y1="342" x2="688" y2="342" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="664" y1="347" x2="685" y2="347" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>

    <rect x="700" y="335" width="35" height="25" rx="2" fill="white" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="704" y1="342" x2="731" y2="342" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="704" y1="347" x2="728" y2="347" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="704" y1="352" x2="725" y2="352" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>

    <!-- Thought bubble -->
    <ellipse cx="630" cy="220" rx="85" ry="38" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
    <circle cx="600" cy="248" r="5" fill="white" stroke="#409EFF" stroke-width="1"/>
    <circle cx="593" cy="256" r="3" fill="white" stroke="#409EFF" stroke-width="0.8"/>

    <!-- Thought bubble text -->
    <text x="630" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a1a2e">分析客户画像...</text>
    <text x="630" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">个性化生成</text>
    <text x="630" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#5a6a7e">“根据偏好定制内容”</text>

    <!-- Personalization icons -->
    <g transform="translate(470, 420)">
      <rect x="0" y="0" width="55" height="18" rx="9" fill="#e8f0ff" stroke="#409EFF" stroke-width="0.8"/>
      <text x="27" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#409EFF">用户A</text>
    </g>
    <g transform="translate(545, 420)">
      <rect x="0" y="0" width="55" height="18" rx="9" fill="#e8f0ff" stroke="#409EFF" stroke-width="0.8"/>
      <text x="27" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#409EFF">用户B</text>
    </g>
    <g transform="translate(620, 420)">
      <rect x="0" y="0" width="55" height="18" rx="9" fill="#e8f0ff" stroke="#409EFF" stroke-width="0.8"/>
      <text x="27" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#409EFF">用户C</text>
    </g>
    <g transform="translate(695, 420)">
      <rect x="0" y="0" width="55" height="18" rx="9" fill="#e8f0ff" stroke="#409EFF" stroke-width="0.8"/>
      <text x="27" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#409EFF">用户D</text>
    </g>

    <text x="600" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#409EFF">每封邮件独一无二，量身定制</text>
  </g>

  <!-- Bottom labels -->
  <text x="200" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">机械式 if/else 流程</text>
  <text x="600" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">动态推理 + 个性化生成</text>

  <!-- Center divider label -->
  <rect x="375" y="460" width="50" height="18" rx="9" fill="#1a1a2e"/>
  <text x="400" y="473" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="white" font-weight="bold">深度对比</text>
</svg>