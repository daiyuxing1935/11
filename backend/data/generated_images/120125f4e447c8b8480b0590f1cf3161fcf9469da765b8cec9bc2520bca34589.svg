<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="tier1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#66B1FF"/>
    </linearGradient>
    <linearGradient id="tier2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#79BBFF"/>
    </linearGradient>
    <linearGradient id="tier3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#337ECC"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGrad>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">三层决策流程：混合任务分配策略</text>

  <!-- ==================== 第一层 ==================== -->
  <rect x="40" y="60" width="720" height="120" rx="12" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  <rect x="40" y="60" width="720" height="34" rx="12" fill="url(#tier1Grad)"/>
  <rect x="40" y="82" width="720" height="12" fill="url(#tier1Grad)"/>
  <text x="60" y="83" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="white">第一层：优先级排序</text>

  <!-- 优先级标签 -->
  <rect x="65" y="108" width="130" height="48" rx="8" fill="#FF4757" opacity="0.9"/>
  <text x="130" y="137" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">P0 紧急</text>

  <rect x="215" y="108" width="130" height="48" rx="8" fill="#FF9F43" opacity="0.9"/>
  <text x="280" y="137" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">P1 重要</text>

  <rect x="365" y="108" width="130" height="48" rx="8" fill="#409EFF" opacity="0.9"/>
  <text x="430" y="137" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">P2 普通</text>

  <rect x="515" y="108" width="130" height="48" rx="8" fill="#A0A0A0" opacity="0.85"/>
  <text x="580" y="137" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">P3 低优</text>

  <!-- 箭头 -->
  <text x="670" y="138" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#1a1a2e" opacity="0.7">→ 高优先先做</text>

  <!-- 连接箭头 1→2 -->
  <polygon points="400,182 392,198 408,198" fill="#409EFF"/>
  <line x1="400" y1="180" x2="400" y2="198" stroke="#409EFF" stroke-width="3"/>

  <!-- ==================== 第二层 ==================== -->
  <rect x="40" y="210" width="720" height="120" rx="12" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  <rect x="40" y="210" width="720" height="34" rx="12" fill="url(#tier2Grad)"/>
  <rect x="40" y="232" width="720" height="12" fill="url(#tier2Grad)"/>
  <text x="60" y="233" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="white">第二层：能力匹配</text>

  <!-- 任务技能标签 -->
  <rect x="65" y="258" width="100" height="44" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="115" y="278" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">任务技能</text>
  <text x="115" y="295" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">[编程, 设计]</text>

  <!-- 拼图图标 -->
  <text x="185" y="288" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#409EFF">🧩</text>

  <!-- 代理能力标签 -->
  <rect x="230" y="258" width="130" height="44" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="295" y="278" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">代理能力</text>
  <text x="295" y="295" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#409EFF">[编程, 设计, 测试]</text>

  <!-- 匹配标记 -->
  <rect x="390" y="262" width="80" height="36" rx="18" fill="#67C23A" opacity="0.9"/>
  <text x="430" y="286" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="white">最佳匹配</text>

  <!-- 箭头 -->
  <text x="500" y="288" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18" fill="#1a1a2e" opacity="0.7">→ 技能匹配度最高</text>

  <!-- 连接箭头 2→3 -->
  <polygon points="400,332 392,348 408,348" fill="#409EFF"/>
  <line x1="400" y1="330" x2="400" y2="348" stroke="#409EFF" stroke-width="3"/>

  <!-- ==================== 第三层 ==================== -->
  <rect x="40" y="360" width="720" height="120" rx="12" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  <rect x="40" y="360" width="720" height="34" rx="12" fill="url(#tier3Grad)"/>
  <rect x="40" y="382" width="720" height="12" fill="url(#tier3Grad)"/>
  <text x="60" y="383" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="white">第三层：负载选择</text>

  <!-- 代理A -->
  <rect x="65" y="408" width="160" height="50" rx="8" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="145" y="428" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">代理 A</text>
  <rect x="80" y="436" width="130" height="10" rx="5" fill="#E8E8E8"/>
  <rect x="80" y="436" width="90" height="10" rx="5" fill="#FF9F43"/>
  <text x="80" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">负载 70%</text>

  <!-- 代理B -->
  <rect x="255" y="408" width="160" height="50" rx="8" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="335" y="428" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">代理 B</text>
  <rect x="270" y="436" width="130" height="10" rx="5" fill="#E8E8E8"/>
  <rect x="270" y="436" width="30" height="10" rx="5" fill="#67C23A"/>
  <text x="270" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">负载 20%</text>

  <!-- 代理C -->
  <rect x="445" y="408" width="160" height="50" rx="8" fill="#F0F8FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="525" y="428" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">代理 C</text>
  <rect x="460" y="436" width="130" height="10" rx="5" fill="#E8E8E8"/>
  <rect x="460" y="436" width="110" height="10" rx="5" fill="#FF4757"/>
  <text x="460" y="452" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#666">负载 85%</text>

  <!-- 选择箭头 -->
  <polygon points="620,433 640,433 640,428 655,438 640,448 640,443 620,443" fill="#67C23A"/>

  <text x="670" y="442" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#67C23A">选负载最低</text>

  <!-- 底部混合流程说明 -->
  <rect x="180" y="470" width="440" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
  <text x="400" y="487" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="white">混合策略：优先级排序 → 能力过滤 → 负载选择</text>

</svg>