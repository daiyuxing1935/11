<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ecf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5faff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">四种投票策略</text>

  <!-- 左上：多数投票 -->
  <rect x="30" y="60" width="355" height="195" rx="12" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="60" width="355" height="32" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="207" y="82" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">多数投票</text>

  <!-- 三张选票 -->
  <rect x="65" y="110" width="70" height="90" rx="4" fill="#fff" stroke="#ccc" stroke-width="1.2"/>
  <text x="100" y="145" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#409EFF">A</text>
  <text x="100" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">✓</text>

  <rect x="155" y="110" width="70" height="90" rx="4" fill="#fff" stroke="#ccc" stroke-width="1.2"/>
  <text x="190" y="145" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#409EFF">A</text>
  <text x="190" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">✓</text>

  <rect x="245" y="110" width="70" height="90" rx="4" fill="#fff" stroke="#ccc" stroke-width="1.2"/>
  <text x="280" y="145" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#e6a23c">B</text>

  <!-- 高亮胜者 -->
  <rect x="65" y="110" width="70" height="90" rx="4" fill="none" stroke="#409EFF" stroke-width="2.5"/>
  <rect x="155" y="110" width="70" height="90" rx="4" fill="none" stroke="#409EFF" stroke-width="2.5"/>

  <!-- 标注 -->
  <rect x="120" y="218" width="80" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="160" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">A 胜出</text>

  <!-- 右上：加权投票 -->
  <rect x="415" y="60" width="355" height="195" rx="12" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="60" width="355" height="32" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="592" y="82" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">加权投票</text>

  <!-- 三位专家 -->
  <circle cx="470" cy="130" r="22" fill="#409EFF" opacity="0.2"/>
  <text x="470" y="136" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">2.0</text>
  <circle cx="470" cy="130" r="22" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <circle cx="555" cy="130" r="18" fill="#409EFF" opacity="0.15"/>
  <text x="555" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">1.0</text>
  <circle cx="555" cy="130" r="18" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <circle cx="630" cy="130" r="14" fill="#409EFF" opacity="0.1"/>
  <text x="630" y="134" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#409EFF">0.5</text>
  <circle cx="630" cy="130" r="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 天平 -->
  <line x1="460" y1="175" x2="650" y2="175" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="555,175 548,195 562,195" fill="#1a1a2e"/>
  <line x1="555" y1="195" x2="555" y2="220" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="535" y="215" width="40" height="8" rx="2" fill="#1a1a2e"/>

  <!-- 加权合计 -->
  <text x="555" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">加权合计：3.5</text>

  <!-- 标注 -->
  <rect x="520" y="218" width="70" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="555" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">加权计票</text>

  <!-- 左下：共识/全体一致 -->
  <rect x="30" y="280" width="355" height="195" rx="12" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="280" width="355" height="32" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="207" y="302" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">共识 / 全体一致</text>

  <!-- 三位专家竖大拇指 -->
  <g transform="translate(80, 360)">
    <circle cx="0" cy="0" r="20" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="18">👍</text>
  </g>
  <g transform="translate(180, 360)">
    <circle cx="0" cy="0" r="20" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="18">👍</text>
  </g>
  <g transform="translate(280, 360)">
    <circle cx="0" cy="0" r="20" fill="#409EFF" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="18">👍</text>
  </g>

  <!-- 圆形一致指示器 -->
  <circle cx="207" cy="430" r="28" fill="none" stroke="#409EFF" stroke-width="3"/>
  <path d="M 187 430 A 20 20 0 0 1 227 430" fill="none" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
  <text x="207" y="435" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">100%</text>

  <!-- 标注 -->
  <rect x="157" y="448" width="100" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="207" y="463" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">全体一致</text>

  <!-- 右下：波达计数法 -->
  <rect x="415" y="280" width="355" height="195" rx="12" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="280" width="355" height="32" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="592" y="302" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">波达计数法</text>

  <!-- 排名表 -->
  <rect x="460" y="325" width="100" height="28" rx="4" fill="#409EFF" opacity="0.1"/>
  <text x="510" y="344" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">选项</text>
  <rect x="570" y="325" width="60" height="28" rx="4" fill="#409EFF" opacity="0.1"/>
  <text x="600" y="344" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">排名</text>
  <rect x="640" y="325" width="70" height="28" rx="4" fill="#409EFF" opacity="0.1"/>
  <text x="675" y="344" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">得分</text>

  <rect x="460" y="358" width="100" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="510" y="375" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">A</text>
  <rect x="570" y="358" width="60" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="375" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">1st</text>
  <rect x="640" y="358" width="70" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="675" y="375" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">3</text>

  <rect x="460" y="388" width="100" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="510" y="405" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">B</text>
  <rect x="570" y="388" width="60" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="405" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">2nd</text>
  <rect x="640" y="388" width="70" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="675" y="405" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">2</text>

  <rect x="460" y="418" width="100" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="510" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">C</text>
  <rect x="570" y="418" width="60" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">3rd</text>
  <rect x="640" y="418" width="70" height="26" rx="3" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="675" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">1</text>

  <!-- 高亮最高分 -->
  <rect x="460" y="358" width="100" height="26" rx="3" fill="none" stroke="#409EFF" stroke-width="2"/>
  <rect x="640" y="358" width="70" height="26" rx="3" fill="none" stroke="#409EFF" stroke-width="2"/>

  <!-- 标注 -->
  <rect x="530" y="448" width="80" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="570" y="463" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">最高分胜出</text>

</svg>