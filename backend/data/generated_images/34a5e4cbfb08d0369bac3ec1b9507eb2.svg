<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">四种投票策略</text>

  <!-- ===== 左上：多数投票 ===== -->
  <rect x="30" y="55" width="355" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="55" width="355" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="207" y="76" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">多数投票</text>

  <!-- 三张选票 -->
  <!-- 选票A（标记A） -->
  <rect x="65" y="105" width="72" height="50" rx="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="101" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">选票</text>
  <text x="101" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">A</text>

  <!-- 选票A（标记A） -->
  <rect x="155" y="105" width="72" height="50" rx="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="191" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">选票</text>
  <text x="191" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">A</text>

  <!-- 选票B（标记B） -->
  <rect x="245" y="105" width="72" height="50" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="281" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">选票</text>
  <text x="281" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#999">B</text>

  <!-- 结果标注 -->
  <rect x="130" y="175" width="160" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
  <text x="210" y="194" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">A 获胜（2/3）</text>

  <!-- 标注1 -->
  <rect x="60" y="215" width="80" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
  <text x="100" y="231" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">简单多数</text>

  <!-- ===== 右上：加权投票 ===== -->
  <rect x="415" y="55" width="355" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="55" width="355" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="592" y="76" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">加权投票</text>

  <!-- 专家1（权重2.0） -->
  <circle cx="475" cy="125" r="22" fill="#409EFF" opacity="0.2"/>
  <text x="475" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#409EFF">2.0</text>
  <text x="475" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">专家A</text>

  <!-- 专家2（权重1.0） -->
  <circle cx="555" cy="125" r="18" fill="#409EFF" opacity="0.15"/>
  <text x="555" y="130" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">1.0</text>
  <text x="555" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">专家B</text>

  <!-- 专家3（权重0.5） -->
  <circle cx="625" cy="125" r="14" fill="#409EFF" opacity="0.1"/>
  <text x="625" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#409EFF">0.5</text>
  <text x="625" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">专家C</text>

  <!-- 天平 -->
  <line x1="460" y1="175" x2="640" y2="175" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="550" y1="175" x2="550" y2="195" stroke="#1a1a2e" stroke-width="2"/>
  <polygon points="540,195 560,195 550,205" fill="#1a1a2e"/>

  <!-- 加权总计 -->
  <rect x="490" y="210" width="120" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="550" y="227" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">加权总计：3.5</text>

  <!-- 标注2 -->
  <rect x="620" y="215" width="80" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
  <text x="660" y="231" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">权重分配</text>

  <!-- ===== 左下：共识/一致 ===== -->
  <rect x="30" y="275" width="355" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="275" width="355" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="207" y="296" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">共识 / 一致</text>

  <!-- 三位专家竖大拇指 -->
  <!-- 专家1 -->
  <circle cx="120" cy="355" r="20" fill="#409EFF" opacity="0.15"/>
  <text x="120" y="360" text-anchor="middle" font-family="sans-serif" font-size="18">👍</text>
  <text x="120" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">专家A</text>

  <!-- 专家2 -->
  <circle cx="207" cy="355" r="20" fill="#409EFF" opacity="0.15"/>
  <text x="207" y="360" text-anchor="middle" font-family="sans-serif" font-size="18">👍</text>
  <text x="207" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">专家B</text>

  <!-- 专家3 -->
  <circle cx="295" cy="355" r="20" fill="#409EFF" opacity="0.15"/>
  <text x="295" y="360" text-anchor="middle" font-family="sans-serif" font-size="18">👍</text>
  <text x="295" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">专家C</text>

  <!-- 圆形一致指示器 -->
  <circle cx="207" cy="430" r="22" fill="none" stroke="#409EFF" stroke-width="3"/>
  <circle cx="207" cy="430" r="22" fill="#409EFF" opacity="0.1" stroke="#409EFF" stroke-width="3"
          stroke-dasharray="138" stroke-dashoffset="0"/>
  <text x="207" y="435" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#409EFF">100%</text>

  <!-- 标注3 -->
  <rect x="60" y="440" width="80" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
  <text x="100" y="456" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">全体一致</text>

  <!-- ===== 右下：波达计数 ===== -->
  <rect x="415" y="275" width="355" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="275" width="355" height="32" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="592" y="296" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">波达计数</text>

  <!-- 排名表 -->
  <!-- 表头 -->
  <rect x="455" y="320" width="80" height="24" rx="4" fill="#409EFF" opacity="0.1"/>
  <text x="495" y="337" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">选项</text>
  <rect x="540" y="320" width="60" height="24" rx="4" fill="#409EFF" opacity="0.1"/>
  <text x="570" y="337" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">排名</text>
  <rect x="605" y="320" width="60" height="24" rx="4" fill="#409EFF" opacity="0.1"/>
  <text x="635" y="337" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">得分</text>

  <!-- 行1：选项A -->
  <rect x="455" y="348" width="80" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="495" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">选项A</text>
  <rect x="540" y="348" width="60" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="570" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">第1</text>
  <rect x="605" y="348" width="60" height="24" rx="4" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
  <text x="635" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#409EFF">3分</text>

  <!-- 行2：选项B -->
  <rect x="455" y="376" width="80" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="495" y="393" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">选项B</text>
  <rect x="540" y="376" width="60" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="570" y="393" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">第2</text>
  <rect x="605" y="376" width="60" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="635" y="393" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">2分</text>

  <!-- 行3：选项C -->
  <rect x="455" y="404" width="80" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="495" y="421" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">选项C</text>
  <rect x="540" y="404" width="60" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="570" y="421" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">第3</text>
  <rect x="605" y="404" width="60" height="24" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="635" y="421" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">1分</text>

  <!-- 最高分高亮 -->
  <rect x="455" y="348" width="210" height="24" rx="4" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 标注4 -->
  <rect x="620" y="440" width="80" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
  <text x="660" y="456" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">排序计分</text>

  <!-- 标注5 -->
  <rect x="350" y="140" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
  <text x="385" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">2×2 网格</text>

  <!-- 标注6 -->
  <rect x="350" y="360" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
  <text x="385" y="376" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">四种策略</text>

</svg>