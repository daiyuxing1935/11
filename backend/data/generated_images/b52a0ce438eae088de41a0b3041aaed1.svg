<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7fd4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#d4e8ff" stroke-width="1" rx="11"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">ICL / Few-Shot Prompting 核心洞察</text>

  <!-- 中心发光灯泡 -->
  <circle cx="400" cy="175" r="48" fill="#e6f2ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="400" cy="175" r="38" fill="url(#hubGrad)" filter="url(#shadow)"/>
  <text x="400" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">ICL /</text>
  <text x="400" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Few-Shot</text>
  <text x="400" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d4e8ff">Prompting</text>

  <!-- 灯泡图标 -->
  <path d="M393 148 Q393 140 400 140 Q407 140 407 148 L407 152 Q407 156 403 158 L403 160 Q403 162 397 162 L397 160 Q393 158 393 152 Z" fill="#ffe58f" opacity="0.9"/>
  <rect x="397" y="162" width="6" height="2" rx="1" fill="#ffe58f" opacity="0.7"/>
  <rect x="398" y="165" width="4" height="2" rx="1" fill="#ffe58f" opacity="0.5"/>

  <!-- 连接线 - 中心到卡片 -->
  <g stroke="#409EFF" stroke-width="1.2" fill="none" opacity="0.35">
    <!-- 右上 -->
    <path d="M435 155 Q480 120 530 100"/>
    <!-- 右中 -->
    <path d="M438 175 Q490 180 540 185"/>
    <!-- 右下 -->
    <path d="M435 195 Q480 230 530 260"/>
    <!-- 左上 -->
    <path d="M365 155 Q320 120 270 100"/>
    <!-- 左中 -->
    <path d="M362 175 Q310 180 260 185"/>
    <!-- 左下 -->
    <path d="M365 195 Q320 230 270 260"/>
    <!-- 正下 -->
    <path d="M400 213 Q400 240 400 270"/>
  </g>

  <!-- 卡片 1 - 右上 -->
  <g filter="url(#shadow)">
    <rect x="530" y="78" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="546" cy="104" r="12" fill="#409EFF"/>
    <text x="546" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">1</text>
    <text x="564" y="98" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">本质是模式匹配</text>
    <text x="564" y="115" font-family="Arial, sans-serif" font-size="9" fill="#666">Pattern Matching not Learning</text>
    <!-- 注意力图标 -->
    <circle cx="735" cy="100" r="10" fill="#e6f2ff" opacity="0.6"/>
    <circle cx="735" cy="100" r="6" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <circle cx="735" cy="100" r="2" fill="#409EFF" opacity="0.6"/>
  </g>

  <!-- 卡片 2 - 右中 -->
  <g filter="url(#shadow)">
    <rect x="530" y="163" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="546" cy="189" r="12" fill="#409EFF"/>
    <text x="546" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">2</text>
    <text x="564" y="183" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">示例选择是核心杠杆</text>
    <text x="564" y="200" font-family="Arial, sans-serif" font-size="9" fill="#666">Example Selection is Key</text>
    <!-- KNN/MMR图标 -->
    <text x="725" y="193" font-family="Arial, sans-serif" font-size="8" fill="#409EFF" font-weight="bold">KNN</text>
    <text x="740" y="193" font-family="Arial, sans-serif" font-size="8" fill="#2b7fd4" font-weight="bold">MMR</text>
  </g>

  <!-- 卡片 3 - 右下 -->
  <g filter="url(#shadow)">
    <rect x="530" y="248" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="546" cy="274" r="12" fill="#409EFF"/>
    <text x="546" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">3</text>
    <text x="564" y="268" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">3-5示例最佳区间</text>
    <text x="564" y="285" font-family="Arial, sans-serif" font-size="9" fill="#666">3-5 Shot Optimal</text>
    <!-- 钟形曲线 -->
    <path d="M720 280 Q730 262 735 270 Q740 278 745 265 Q750 252 755 280" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.7"/>
    <line x1="720" y1="280" x2="755" y2="280" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- 卡片 4 - 左上 -->
  <g filter="url(#shadow)">
    <rect x="50" y="78" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="66" cy="104" r="12" fill="#409EFF"/>
    <text x="66" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">4</text>
    <text x="84" y="98" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">格式一致性被低估</text>
    <text x="84" y="115" font-family="Arial, sans-serif" font-size="9" fill="#666">Format Matters</text>
    <!-- 模板图标 -->
    <rect x="235" y="90" width="22" height="16" rx="2" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="239" y1="95" x2="253" y2="95" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="239" y1="99" x2="250" y2="99" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="239" y1="103" x2="248" y2="103" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- 卡片 5 - 左中 -->
  <g filter="url(#shadow)">
    <rect x="50" y="163" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="66" cy="189" r="12" fill="#409EFF"/>
    <text x="66" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">5</text>
    <text x="84" y="183" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">标注质量是底线</text>
    <text x="84" y="200" font-family="Arial, sans-serif" font-size="9" fill="#666">Label Quality Baseline</text>
    <!-- 对号/叉号 -->
    <text x="238" y="187" font-size="14" fill="#67c23a" font-weight="bold">✓</text>
    <text x="252" y="187" font-size="14" fill="#f56c6c" font-weight="bold">✗</text>
  </g>

  <!-- 卡片 6 - 左下 -->
  <g filter="url(#shadow)">
    <rect x="50" y="248" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="66" cy="274" r="12" fill="#409EFF"/>
    <text x="66" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">6</text>
    <text x="84" y="268" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">动态选择是生产标配</text>
    <text x="84" y="285" font-family="Arial, sans-serif" font-size="9" fill="#666">Dynamic Selection for Production</text>
    <!-- 管道图标 -->
    <rect x="232" y="262" width="24" height="14" rx="3" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <circle cx="238" cy="269" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="244" cy="269" r="2" fill="#409EFF" opacity="0.5"/>
    <circle cx="250" cy="269" r="2" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 卡片 7 - 正下 -->
  <g filter="url(#shadow)">
    <rect x="290" y="270" width="220" height="52" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="0.8"/>
    <circle cx="306" cy="296" r="12" fill="#409EFF"/>
    <text x="306" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">7</text>
    <text x="324" y="290" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">ICL非银弹</text>
    <text x="324" y="307" font-family="Arial, sans-serif" font-size="9" fill="#666">ICL is Not a Silver Bullet</text>
    <!-- 盾牌图标 -->
    <path d="M480 288 Q490 288 490 296 Q490 304 480 308 Q470 304 470 296 Q470 288 480 288 Z" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
    <text x="480" y="300" text-anchor="middle" font-size="8" fill="#409EFF" opacity="0.6">!</text>
  </g>

  <!-- 底部工具箱 -->
  <g transform="translate(200, 355)">
    <rect x="0" y="0" width="400" height="42" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="0.8" filter="url(#shadow)" opacity="0.9"/>
    <text x="200" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" font-weight="bold">组合工具箱 / Toolbox</text>

    <!-- CoT -->
    <rect x="30" y="22" width="80" height="14" rx="7" fill="#e6f2ff"/>
    <text x="70" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#409EFF" font-weight="bold">CoT 思维链</text>

    <!-- 连接加号 -->
    <text x="118" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">+</text>

    <!-- Few-Shot -->
    <rect x="135" y="22" width="90" height="14" rx="7" fill="#e6f2ff"/>
    <text x="180" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#409EFF" font-weight="bold">Few-Shot 示例</text>

    <!-- 连接加号 -->
    <text x="233" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">+</text>

    <!-- 结构化输出 -->
    <rect x="250" y="22" width="110" height="14" rx="7" fill="#e6f2ff"/>
    <text x="305" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#409EFF" font-weight="bold">结构化输出</text>
  </g>

  <!-- 标注 1 -->
  <g>
    <line x1="530" y1="90" x2="510" y2="70" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <text x="510" y="66" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">模式匹配</text>
  </g>

  <!-- 标注 2 -->
  <g>
    <line x1="530" y1="178" x2="510" y2="158" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <text x="510" y="154" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">选择策略</text>
  </g>

  <!-- 标注 3 -->
  <g>
    <line x1="270" y1="90" x2="290" y2="70" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <text x="290" y="66" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">格式对齐</text>
  </g>

  <!-- 标注 4 -->
  <g>
    <line x1="270" y1="178" x2="290" y2="158" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <text x="290" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">质量把关</text>
  </g>

  <!-- 标注 5 -->
  <g>
    <line x1="400" y1="270" x2="400" y2="258" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <text x="400" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">认知边界</text>
  </g>

  <!-- 标注 6 -->
  <g>
    <line x1="530" y1="263" x2="510" y2="243" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <text x="510" y="239" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#409EFF" font-weight="bold">生产部署</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999" opacity="0.7">ICL = In-Context Learning · 上下文学习</text>
</svg>