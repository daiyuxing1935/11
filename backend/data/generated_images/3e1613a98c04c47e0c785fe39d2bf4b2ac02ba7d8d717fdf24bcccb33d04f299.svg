<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0eaf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d5e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8" ry="8"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="56" fill="url(#headerGrad)" rx="8" ry="8"/>
  <rect x="0" y="30" width="800" height="26" fill="url(#headerGrad)"/>
  <text x="400" y="36" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">囚徒困境 — 收益矩阵</text>

  <!-- 玩家标签 -->
  <text x="400" y="82" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="16" font-weight="bold">玩家 B</text>
  <text x="160" y="160" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="16" font-weight="bold" transform="rotate(-90,160,160)">玩家 A</text>

  <!-- 矩阵表格 -->
  <g filter="url(#shadow)">
    <!-- 表头行 - 策略标签 -->
    <rect x="220" y="96" width="250" height="40" fill="#1a1a2e" rx="4"/>
    <text x="345" y="122" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold">合作</text>

    <rect x="490" y="96" width="250" height="40" fill="#1a1a2e" rx="4"/>
    <text x="615" y="122" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold">背叛</text>

    <!-- 行标签 -->
    <rect x="100" y="150" width="100" height="110" fill="#1a1a2e" rx="4"/>
    <text x="150" y="210" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold">合作</text>

    <rect x="100" y="280" width="100" height="110" fill="#1a1a2e" rx="4"/>
    <text x="150" y="340" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold">背叛</text>

    <!-- 单元格 (1,1) 合作-合作 -->
    <rect x="220" y="150" width="250" height="110" fill="#ffffff" stroke="#409EFF" stroke-width="2" rx="4"/>
    <text x="345" y="185" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="14" font-weight="bold">A: 3年</text>
    <text x="345" y="215" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="14" font-weight="bold">B: 3年</text>
    <text x="345" y="245" text-anchor="middle" fill="#666666" font-family="sans-serif" font-size="12">（双方合作）</text>

    <!-- 单元格 (1,2) 合作-背叛 -->
    <rect x="490" y="150" width="250" height="110" fill="#f0f7ff" stroke="#409EFF" stroke-width="1.5" rx="4"/>
    <text x="615" y="185" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="14" font-weight="bold">A: 10年</text>
    <text x="615" y="215" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="14" font-weight="bold">B: 1年</text>
    <text x="615" y="245" text-anchor="middle" fill="#666666" font-family="sans-serif" font-size="12">（A合作 B背叛）</text>

    <!-- 单元格 (2,1) 背叛-合作 -->
    <rect x="220" y="280" width="250" height="110" fill="#f0f7ff" stroke="#409EFF" stroke-width="1.5" rx="4"/>
    <text x="345" y="315" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="14" font-weight="bold">A: 1年</text>
    <text x="345" y="345" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="14" font-weight="bold">B: 10年</text>
    <text x="345" y="375" text-anchor="middle" fill="#666666" font-family="sans-serif" font-size="12">（A背叛 B合作）</text>

    <!-- 单元格 (2,2) 背叛-背叛 - 纳什均衡高亮 -->
    <rect x="490" y="280" width="250" height="110" fill="#e6f2ff" stroke="#409EFF" stroke-width="3" rx="4"/>
    <!-- 高亮边框内发光 -->
    <rect x="492" y="282" width="246" height="106" fill="none" stroke="#409EFF" stroke-width="1" rx="3" stroke-dasharray="6,4" opacity="0.5"/>
    <text x="615" y="315" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="14" font-weight="bold">A: 8年</text>
    <text x="615" y="345" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="14" font-weight="bold">B: 8年</text>
    <text x="615" y="375" text-anchor="middle" fill="#409EFF" font-family="sans-serif" font-size="12" font-weight="bold">★ 纳什均衡</text>

    <!-- 纳什均衡标记图钉 -->
    <g transform="translate(740,285)">
      <circle cx="0" cy="0" r="14" fill="#409EFF" stroke="#ffffff" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#ffffff"/>
      <line x1="0" y1="14" x2="0" y2="28" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="30" r="4" fill="#409EFF"/>
    </g>
  </g>

  <!-- 标注区域 -->
  <g font-family="sans-serif" font-size="13" fill="#1a1a2e">
    <!-- 标注1 -->
    <line x1="50" y1="130" x2="50" y2="96" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="50" cy="130" r="3" fill="#409EFF"/>
    <text x="50" y="92" text-anchor="middle" font-size="13" font-weight="bold">策略选择</text>

    <!-- 标注2 -->
    <line x1="470" y1="130" x2="470" y2="96" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="470" cy="130" r="3" fill="#409EFF"/>
    <text x="470" y="92" text-anchor="middle" font-size="13" font-weight="bold">策略选择</text>

    <!-- 标注3 -->
    <line x1="85" y1="205" x2="85" y2="160" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="85" cy="205" r="3" fill="#409EFF"/>
    <text x="85" y="155" text-anchor="middle" font-size="13" font-weight="bold">玩家A</text>

    <!-- 标注4 -->
    <line x1="85" y1="335" x2="85" y2="290" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="85" cy="335" r="3" fill="#409EFF"/>
    <text x="85" y="285" text-anchor="middle" font-size="13" font-weight="bold">玩家A</text>

    <!-- 标注5 -->
    <line x1="345" y1="265" x2="345" y2="410" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="345" cy="265" r="3" fill="#409EFF"/>
    <text x="345" y="428" text-anchor="middle" font-size="13">收益对称</text>

    <!-- 标注6 -->
    <line x1="615" y1="395" x2="615" y2="440" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="615" cy="395" r="3" fill="#409EFF"/>
    <text x="615" y="458" text-anchor="middle" font-size="13" font-weight="bold">占优策略</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="490" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">收益数值表示监禁年数（越低越好） | 蓝色高亮单元格为纳什均衡</text>
</svg>