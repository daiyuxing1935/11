<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2d7fd3"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="pyramidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 顶部横幅 -->
  <rect x="140" y="18" width="520" height="38" rx="19" fill="url(#bannerGrad)" opacity="0.92"/>
  <text x="400" y="43" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="Arial, sans-serif">先说清 → 再结构 → 才上生产 / Clarify → Structure → Productionize</text>

  <!-- 五个区块 - 从左到右 -->
  <!-- 区块1 -->
  <rect x="30" y="80" width="130" height="100" rx="12" fill="url(#blockGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="95" cy="115" r="16" fill="#409EFF" opacity="0.15"/>
  <circle cx="95" cy="115" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="95" y1="105" x2="95" y2="125" stroke="#409EFF" stroke-width="2"/>
  <line x1="85" y1="115" x2="105" y2="115" stroke="#409EFF" stroke-width="2"/>
  <text x="95" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="Arial, sans-serif">清晰的意图表达</text>
  <text x="95" y="162" text-anchor="middle" fill="#409EFF" font-size="9" font-family="Arial, sans-serif">Clear Intent</text>

  <!-- 箭头1 -->
  <line x1="162" y1="130" x2="188" y2="130" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 区块2 -->
  <rect x="192" y="80" width="130" height="100" rx="12" fill="url(#blockGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="257" cy="115" r="16" fill="#409EFF" opacity="0.15"/>
  <circle cx="257" cy="115" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
  <circle cx="257" cy="115" r="4" fill="#409EFF"/>
  <text x="257" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="Arial, sans-serif">准确的模型输出</text>
  <text x="257" y="162" text-anchor="middle" fill="#409EFF" font-size="9" font-family="Arial, sans-serif">Accurate Output</text>

  <!-- 箭头2 -->
  <line x1="324" y1="130" x2="350" y2="130" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 区块3 -->
  <rect x="354" y="80" width="130" height="100" rx="12" fill="url(#blockGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="419" cy="115" r="16" fill="#409EFF" opacity="0.15"/>
  <rect x="410" y="106" width="18" height="18" rx="3" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="413" y1="112" x2="425" y2="112" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="413" y1="116" x2="422" y2="116" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="413" y1="120" x2="425" y2="120" stroke="#409EFF" stroke-width="1.5"/>
  <text x="419" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="Arial, sans-serif">更少的后处理</text>
  <text x="419" y="162" text-anchor="middle" fill="#409EFF" font-size="9" font-family="Arial, sans-serif">Less Post-Processing</text>

  <!-- 箭头3 -->
  <line x1="486" y1="130" x2="512" y2="130" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 区块4 -->
  <rect x="516" y="80" width="130" height="100" rx="12" fill="url(#blockGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="581" cy="115" r="16" fill="#409EFF" opacity="0.15"/>
  <circle cx="575" cy="112" r="7" fill="none" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="587" cy="118" r="7" fill="none" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="581" cy="115" r="2" fill="#409EFF"/>
  <text x="581" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="Arial, sans-serif">可靠的自动化</text>
  <text x="581" y="162" text-anchor="middle" fill="#409EFF" font-size="9" font-family="Arial, sans-serif">Reliable Automation</text>

  <!-- 箭头4 -->
  <line x1="648" y1="130" x2="674" y2="130" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 区块5 -->
  <rect x="678" y="80" width="110" height="100" rx="12" fill="url(#blockGrad)" stroke="#409EFF" stroke-width="1.8"/>
  <circle cx="733" cy="115" r="16" fill="#409EFF" opacity="0.15"/>
  <ellipse cx="726" cy="112" rx="6" ry="5" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <ellipse cx="740" cy="112" rx="6" ry="5" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <path d="M726 118 Q733 124 740 118" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="733" y="148" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="Arial, sans-serif">高效的人机协作</text>
  <text x="733" y="162" text-anchor="middle" fill="#409EFF" font-size="9" font-family="Arial, sans-serif">Efficient Collaboration</text>

  <!-- 金字塔部分 - 底部 -->
  <!-- 基础层 - 版本管理 & A/B测试 -->
  <rect x="200" y="210" width="400" height="32" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="400" y="231" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="Arial, sans-serif">版本管理 &amp; A/B测试</text>

  <!-- 第4层 - 模板化 -->
  <rect x="240" y="248" width="320" height="30" rx="6" fill="#409EFF" opacity="0.75"/>
  <text x="400" y="268" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">模板化</text>

  <!-- 第3层 - 输出格式 -->
  <rect x="275" y="284" width="250" height="30" rx="6" fill="#409EFF" opacity="0.65"/>
  <text x="400" y="304" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">输出格式</text>

  <!-- 第2层 - 用户指令 -->
  <rect x="310" y="320" width="180" height="30" rx="6" fill="#409EFF" opacity="0.55"/>
  <text x="400" y="340" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">用户指令</text>

  <!-- 第1层 - 系统指令 -->
  <rect x="345" y="356" width="110" height="30" rx="6" fill="#409EFF" opacity="0.45"/>
  <text x="400" y="376" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" font-family="Arial, sans-serif">系统指令</text>

  <!-- 金字塔标注 -->
  <text x="400" y="408" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold" font-family="Arial, sans-serif">提示工程金字塔</text>
  <text x="400" y="422" text-anchor="middle" fill="#409EFF" font-size="9" font-family="Arial, sans-serif">Prompt Engineering Pyramid</text>

  <!-- 左侧标注 -->
  <text x="18" y="450" fill="#1a1a2e" font-size="9" font-family="Arial, sans-serif" opacity="0.6">价值流路线图</text>

  <!-- 右侧标注 -->
  <text x="720" y="450" fill="#1a1a2e" font-size="9" font-family="Arial, sans-serif" opacity="0.6">结构化提示</text>

  <!-- 底部装饰线 -->
  <line x1="30" y1="460" x2="770" y2="460" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>

  <!-- 标注标签 -->
  <rect x="30" y="475" width="60" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
  <text x="60" y="487" text-anchor="middle" fill="#409EFF" font-size="8" font-family="Arial, sans-serif">清晰意图</text>

  <rect x="120" y="475" width="60" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
  <text x="150" y="487" text-anchor="middle" fill="#409EFF" font-size="8" font-family="Arial, sans-serif">准确输出</text>

  <rect x="210" y="475" width="60" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
  <text x="240" y="487" text-anchor="middle" fill="#409EFF" font-size="8" font-family="Arial, sans-serif">减少后处理</text>

  <rect x="300" y="475" width="60" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
  <text x="330" y="487" text-anchor="middle" fill="#409EFF" font-size="8" font-family="Arial, sans-serif">可靠自动化</text>

  <rect x="390" y="475" width="60" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
  <text x="420" y="487" text-anchor="middle" fill="#409EFF" font-size="8" font-family="Arial, sans-serif">人机协作</text>

  <rect x="480" y="475" width="60" height="16" rx="8" fill="#409EFF" opacity="0.12"/>
  <text x="510" y="487" text-anchor="middle" fill="#409EFF" font-size="8" font-family="Arial, sans-serif">版本管理</text>
</svg>