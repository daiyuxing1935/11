<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="libraryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8864E"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F12"/>
    </linearGradient>
    <linearGradient id="brainGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LLM → AI 智能体：从知识到行动</text>

  <!-- ==================== 左侧：图书馆（LLM） ==================== -->
  <g transform="translate(80, 80)">
    <!-- 图书馆主体 -->
    <rect x="0" y="60" width="220" height="200" rx="4" fill="url(#libraryGrad)" stroke="#8B6914" stroke-width="2"/>
    
    <!-- 屋顶 -->
    <polygon points="-10,60 110,15 230,60" fill="url(#roofGrad)" stroke="#5A3E0A" stroke-width="2"/>
    
    <!-- 门 -->
    <rect x="90" y="180" width="40" height="80" rx="3" fill="#5A3E0A"/>
    <circle cx="120" cy="220" r="3" fill="#D4A574"/>
    
    <!-- 窗户 -->
    <rect x="20" y="90" width="50" height="60" rx="3" fill="#C8E6F5" stroke="#8B6914" stroke-width="1.5"/>
    <rect x="150" y="90" width="50" height="60" rx="3" fill="#C8E6F5" stroke="#8B6914" stroke-width="1.5"/>
    
    <!-- 书架 - 左侧 -->
    <rect x="25" y="100" width="40" height="8" rx="1" fill="#6B4F12"/>
    <rect x="25" y="115" width="40" height="8" rx="1" fill="#6B4F12"/>
    <rect x="25" y="130" width="40" height="8" rx="1" fill="#6B4F12"/>
    <!-- 书 -->
    <rect x="28" y="101" width="6" height="6" fill="#E74C3C" rx="1"/>
    <rect x="36" y="101" width="5" height="6" fill="#3498DB" rx="1"/>
    <rect x="43" y="101" width="6" height="6" fill="#2ECC71" rx="1"/>
    <rect x="28" y="116" width="5" height="6" fill="#9B59B6" rx="1"/>
    <rect x="35" y="116" width="6" height="6" fill="#E67E22" rx="1"/>
    <rect x="28" y="131" width="6" height="6" fill="#1ABC9C" rx="1"/>
    <rect x="36" y="131" width="5" height="6" fill="#E74C3C" rx="1"/>
    
    <!-- 书架 - 右侧 -->
    <rect x="155" y="100" width="40" height="8" rx="1" fill="#6B4F12"/>
    <rect x="155" y="115" width="40" height="8" rx="1" fill="#6B4F12"/>
    <rect x="155" y="130" width="40" height="8" rx="1" fill="#6B4F12"/>
    <rect x="158" y="101" width="6" height="6" fill="#F39C12" rx="1"/>
    <rect x="166" y="101" width="5" height="6" fill="#2980B9" rx="1"/>
    <rect x="158" y="116" width="6" height="6" fill="#C0392B" rx="1"/>
    <rect x="166" y="116" width="5" height="6" fill="#27AE60" rx="1"/>
    <rect x="158" y="131" width="5" height="6" fill="#8E44AD" rx="1"/>
    
    <!-- 标签：LLM -->
    <text x="110" y="290" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">LLM</text>
    <text x="110" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">知识库</text>
  </g>

  <!-- 发光大脑 -->
  <circle cx="190" cy="115" r="40" fill="url(#brainGlow)"/>
  <g transform="translate(175, 100)">
    <!-- 大脑形状 -->
    <ellipse cx="15" cy="15" rx="22" ry="18" fill="#409EFF" opacity="0.3"/>
    <path d="M0,15 C0,5 8,0 15,0 C22,0 30,5 30,15 C30,25 22,30 15,30 C8,30 0,25 0,15Z" fill="#409EFF" opacity="0.5"/>
    <path d="M5,12 C5,8 10,5 15,5 C20,5 25,8 25,12" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.8"/>
    <path d="M5,18 C5,22 10,25 15,25 C20,25 25,22 25,18" fill="none" stroke="#409EFF" stroke-width="2" opacity="0.8"/>
    <path d="M8,12 L8,18" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <path d="M15,8 L15,22" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <path d="M22,12 L22,18" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ==================== 连接虚线 ==================== -->
  <line x1="300" y1="195" x2="440" y2="195" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.7"/>
  <!-- 虚线发光效果 -->
  <line x1="300" y1="195" x2="440" y2="195" stroke="#409EFF" stroke-width="5" stroke-dasharray="8,6" opacity="0.15"/>

  <!-- 连接标签 -->
  <text x="370" y="185" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">知识调用</text>

  <!-- ==================== 右侧：AI 智能体 ==================== -->
  <g transform="translate(480, 70)">
    <!-- 机器人身体 -->
    <rect x="30" y="80" width="80" height="100" rx="10" fill="#409EFF" opacity="0.9"/>
    <rect x="30" y="80" width="80" height="100" rx="10" fill="none" stroke="#2B7FE0" stroke-width="2"/>
    
    <!-- 机器人头部 -->
    <rect x="40" y="25" width="60" height="55" rx="12" fill="#409EFF" opacity="0.9"/>
    <rect x="40" y="25" width="60" height="55" rx="12" fill="none" stroke="#2B7FE0" stroke-width="2"/>
    
    <!-- 眼睛 -->
    <circle cx="58" cy="48" r="8" fill="white"/>
    <circle cx="82" cy="48" r="8" fill="white"/>
    <circle cx="60" cy="48" r="4" fill="#1a1a2e"/>
    <circle cx="84" cy="48" r="4" fill="#1a1a2e"/>
    
    <!-- 天线 -->
    <rect x="67" y="10" width="6" height="15" rx="3" fill="#2B7FE0"/>
    <circle cx="70" cy="8" r="6" fill="#409EFF" stroke="#2B7FE0" stroke-width="1.5"/>
    
    <!-- 嘴巴 -->
    <rect x="55" y="62" width="30" height="5" rx="2" fill="white" opacity="0.8"/>
    
    <!-- 手臂 - 左（拿地图） -->
    <rect x="0" y="95" width="30" height="10" rx="4" fill="#409EFF" stroke="#2B7FE0" stroke-width="1.5"/>
    <!-- 手（工具） -->
    <rect x="-8" y="90" width="12" height="20" rx="3" fill="#2B7FE0"/>
    <rect x="-5" y="93" width="6" height="6" rx="1" fill="#FFD700"/>
    
    <!-- 地图 -->
    <g transform="translate(-30, 70)">
      <rect x="0" y="0" width="30" height="40" rx="2" fill="#FFF8DC" stroke="#DAA520" stroke-width="1.5"/>
      <line x1="5" y1="10" x2="25" y2="10" stroke="#DAA520" stroke-width="1"/>
      <line x1="5" y1="20" x2="20" y2="20" stroke="#DAA520" stroke-width="1"/>
      <line x1="5" y1="30" x2="25" y2="30" stroke="#DAA520" stroke-width="1"/>
      <circle cx="20" cy="15" r="3" fill="#E74C3C" opacity="0.7"/>
      <text x="-2" y="50" font-family="sans-serif" font-size="9" fill="#1a1a2e">地图</text>
    </g>
    
    <!-- 手臂 - 右（工具箱） -->
    <rect x="110" y="95" width="30" height="10" rx="4" fill="#409EFF" stroke="#2B7FE0" stroke-width="1.5"/>
    <!-- 手 -->
    <rect x="136" y="90" width="12" height="20" rx="3" fill="#2B7FE0"/>
    <rect x="139" y="93" width="6" height="6" rx="1" fill="#FFD700"/>
    
    <!-- 工具箱 -->
    <g transform="translate(140, 80)">
      <rect x="0" y="0" width="25" height="20" rx="3" fill="#D4A574" stroke="#8B6914" stroke-width="1.5"/>
      <rect x="8" y="-4" width="9" height="5" rx="2" fill="#D4A574" stroke="#8B6914" stroke-width="1.5"/>
      <text x="12" y="30" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">工具箱</text>
    </g>
    
    <!-- 腿 - 左 -->
    <rect x="40" y="180" width="14" height="50" rx="5" fill="#409EFF" stroke="#2B7FE0" stroke-width="1.5"/>
    <rect x="35" y="225" width="24" height="10" rx="4" fill="#2B7FE0"/>
    
    <!-- 腿 - 右（迈步动作） -->
    <rect x="80" y="180" width="14" height="50" rx="5" fill="#409EFF" stroke="#2B7FE0" stroke-width="1.5" transform="rotate(-15, 87, 180)"/>
    <rect x="78" y="225" width="24" height="10" rx="4" fill="#2B7FE0" transform="rotate(-15, 90, 230)"/>
    
    <!-- 背包（记忆） -->
    <rect x="100" y="100" width="25" height="35" rx="5" fill="#2B7FE0" stroke="#1a1a2e" stroke-width="1.5"/>
    <rect x="105" y="105" width="15" height="8" rx="2" fill="#409EFF"/>
    <rect x="105" y="117" width="15" height="8" rx="2" fill="#409EFF"/>
    <rect x="105" y="129" width="15" height="8" rx="2" fill="#409EFF"/>
    <text x="112" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">记忆</text>
    
    <!-- 指南针（规划） -->
    <g transform="translate(115, 60)">
      <circle cx="0" cy="0" r="10" fill="white" stroke="#1a1a2e" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#E74C3C"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#1a1a2e" stroke-width="1.5"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#1a1a2e" stroke-width="1"/>
      <polygon points="0,-7 -3,-2 3,-2" fill="#E74C3C"/>
      <text x="0" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">规划</text>
    </g>
    
    <!-- 标签：AI 智能体 -->
    <text x="70" y="255" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">AI 智能体</text>
    <text x="70" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">行动者</text>
  </g>

  <!-- ==================== 思维气泡 ==================== -->
  <g transform="translate(430, 55)">
    <ellipse cx="60" cy="20" rx="55" ry="25" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
    <circle cx="20" cy="45" r="6" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="10" cy="55" r="4" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">解决问题</text>
    <text x="60" y="32" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">采取行动</text>
  </g>

  <!-- ==================== 底部标注 ==================== -->
  <!-- 标注1：知识库 -->
  <g transform="translate(130, 440)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#D4A574" opacity="0.8"/>
    <text x="50" y="19" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">📚 知识库</text>
  </g>

  <!-- 标注2：工具使用 -->
  <g transform="translate(370, 440)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#409EFF" opacity="0.8"/>
    <text x="50" y="19" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">🔧 工具使用</text>
  </g>

  <!-- 标注3：行动力 -->
  <g transform="translate(580, 440)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#409EFF" opacity="0.8"/>
    <text x="50" y="19" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">⚡ 行动力</text>
  </g>

  <!-- 标注4：记忆 -->
  <g transform="translate(700, 130)">
    <rect x="0" y="0" width="70" height="24" rx="12" fill="#2B7FE0" opacity="0.7"/>
    <text x="35" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">记忆</text>
  </g>

  <!-- 标注5：规划 -->
  <g transform="translate(700, 200)">
    <rect x="0" y="0" width="70" height="24" rx="12" fill="#2B7FE0" opacity="0.7"/>
    <text x="35" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">规划</text>
  </g>

  <!-- 标注6：大脑 -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="70" height="24" rx="12" fill="#409EFF" opacity="0.6"/>
    <text x="35" y="17" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">🧠 知识</text>
  </g>

  <!-- 底部说明文字 -->
  <text x="400" y="485" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" font-style="italic">LLM 提供知识基础，AI 智能体将知识转化为实际行动</text>
</svg>