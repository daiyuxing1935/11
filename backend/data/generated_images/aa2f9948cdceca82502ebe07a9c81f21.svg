  <text x="400" y="262" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold" font-family="sans-serif">评估体系</text>

  <!-- 分支1：知识理解（右上） -->
  <line x1="445" y1="218" x2="600" y2="100" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="600" cy="100" r="32" fill="#E8F4FE" stroke="#409EFF" stroke-width="2"/>
  <text x="600" y="94" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="sans-serif">知识理解</text>
  <text x="600" y="112" text-anchor="middle" fill="#409EFF" font-size="16">📖</text>
  <!-- 子节点 -->
  <text x="660" y="80" fill="#1a1a2e" font-size="13" font-family="sans-serif">MMLU</text>
  <text x="660" y="100" fill="#1a1a2e" font-size="13" font-family="sans-serif">C-Eval</text>
  <text x="660" y="120" fill="#1a1a2e" font-size="13" font-family="sans-serif">AGIEval</text>

  <!-- 分支2：推理能力（右侧） -->
  <line x1="452" y1="250" x2="620" y2="250" stroke="#5CB0FF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="620" cy="250" r="32" fill="#E8F4FE" stroke="#5CB0FF" stroke-width="2"/>
  <text x="620" y="244" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="sans-serif">推理能力</text>
  <text x="620" y="262" text-anchor="middle" fill="#5CB0FF" font-size="16">⚙️🧠</text>
  <!-- 子节点 -->
  <text x="680" y="230" fill="#1a1a2e" font-size="13" font-family="sans-serif">GSM8K</text>
  <text x="680" y="250" fill="#1a1a2e" font-size="13" font-family="sans-serif">MATH</text>
  <text x="680" y="270" fill="#1a1a2e" font-size="13" font-family="sans-serif">BBH</text>

  <!-- 分支3：语言能力（右下） -->
  <line x1="445" y1="282" x2="600" y2="400" stroke="#7EC4FF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="600" cy="400" r="32" fill="#E8F4FE" stroke="#7EC4FF" stroke-width="2"/>
