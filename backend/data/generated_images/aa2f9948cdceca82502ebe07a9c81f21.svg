  <line x1="355" y1="218" x2="200" y2="100" stroke="#7EC4FF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="100" r="32" fill="#E8F4FE" stroke="#7EC4FF" stroke-width="2"/>
  <text x="200" y="94" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="sans-serif">对话交互</text>
  <text x="200" y="112" text-anchor="middle" fill="#7EC4FF" font-size="16">💬💬</text>
