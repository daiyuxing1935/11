  <circle cx="200" cy="400" r="32" fill="#E8F4FE" stroke="#409EFF" stroke-width="2"/>
  <text x="200" y="394" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold" font-family="sans-serif">代码能力</text>
