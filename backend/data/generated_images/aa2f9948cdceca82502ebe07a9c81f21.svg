  <text x="100" y="230" fill="#1a1a2e" font-size="13" font-family="sans-serif">RLHF</text>
  <text x="100" y="250" fill="#1a1a2e" font-size="13" font-family="sans-serif">红队测试</text>
  <text x="100" y="270" fill="#1a1a2e" font-size="13" font-family="sans-serif">安全对齐</text>

