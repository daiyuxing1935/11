  <rect x="700" y="60" width="85" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="742" y="76" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">全面评估</text>

  <!-- 标注2 -->
  <rect x="700" y="140" width="85" height="24" rx="12" fill="#5CB0FF" opacity="0.15"/>
  <text x="742" y="156" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">多维指标</text>

  <!-- 标注3 -->
  <rect x="700" y="220" width="85" height="24" rx="12" fill="#7EC4FF" opacity="0.15"/>
  <text x="742" y="236" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">标准化</text>

  <!-- 标注4 -->
  <rect x="10" y="60" width="85" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="52" y="76" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">可量化</text>

  <!-- 标注5 -->
  <rect x="10" y="140" width="85" height="24" rx="12" fill="#5CB0FF" opacity="0.15"/>
  <text x="52" y="156" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">可对比</text>

  <!-- 标注6 -->
  <rect x="10" y="220" width="85" height="24" rx="12" fill="#7EC4FF" opacity="0.15"/>
  <text x="52" y="236" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">可追踪</text>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="sans-serif" opacity="0.7">LLM 能力评估维度 · 覆盖知识、推理、语言、代码、安全与对话</text>
</svg>