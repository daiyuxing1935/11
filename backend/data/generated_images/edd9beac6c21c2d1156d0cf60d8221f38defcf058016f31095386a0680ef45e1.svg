  <rect x="250" y="320" width="85" height="55" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="292" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">分析师 C</text>
  <text x="292" y="358" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">结果 ✓</text>

