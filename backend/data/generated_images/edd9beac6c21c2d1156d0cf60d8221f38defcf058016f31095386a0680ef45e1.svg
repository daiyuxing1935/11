  <circle cx="660" cy="345" r="22" fill="#409EFF" opacity="0.15"/>
  <circle cx="660" cy="345" r="16" fill="#409EFF" opacity="0.25"/>
  <text x="660" y="350" text-anchor="middle" font-family="sans-serif" font-size="16">💡</text>

  <!-- 说明文字 -->
  <text x="540" y="410" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">简单交互 → 集体智慧涌现</text>

  <!-- 标注 -->
  <rect x="440" y="440" width="80" height="20" rx="4" fill="#409EFF" opacity="0.12"/>
  <text x="480" y="454" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">协同创新</text>

