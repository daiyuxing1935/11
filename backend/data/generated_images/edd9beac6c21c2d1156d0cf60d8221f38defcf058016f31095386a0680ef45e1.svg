  <line x1="498" y1="350" x2="522" y2="362" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  <line x1="558" y1="335" x2="582" y2="342" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  <line x1="558" y1="360" x2="582" y2="348" stroke="#409EFF" stroke-width="1" opacity="0.4"/>

