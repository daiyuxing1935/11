  <text x="102" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">Sonnet</text>

  <!-- 智能体2：代码 -->
  <rect x="160" y="100" width="95" height="60" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <circle cx="180" cy="120" r="10" fill="#409EFF"/>
  <text x="180" y="124" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff">💻</text>
  <text x="207" y="124" font-family="sans-serif" font-size="11" fill="#1a1a2e">代码</text>
  <rect x="170" y="138" width="75" height="16" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="207" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">Sonnet</text>

