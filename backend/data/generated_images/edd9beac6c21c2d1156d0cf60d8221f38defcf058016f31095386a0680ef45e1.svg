  <text x="92" y="358" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">结果 ✓</text>

  <rect x="150" y="320" width="85" height="55" rx="8" fill="#E8F4FD" stroke="#e74c3c" stroke-width="1.5"/>
