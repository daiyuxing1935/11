<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0eaff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7fbff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">仿真平台对比：NVIDIA Isaac Sim vs Gazebo</text>

  <!-- 左侧卡片 - NVIDIA Isaac Sim -->
  <rect x="30" y="60" width="350" height="310" rx="14" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 左侧标题栏 -->
  <rect x="30" y="60" width="350" height="40" rx="14" fill="#409EFF" opacity="0.12"/>
  <rect x="30" y="86" width="350" height="14" fill="#409EFF" opacity="0.12"/>
  <text x="205" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#409EFF">NVIDIA Isaac Sim</text>

  <!-- 左侧内容 - 机器人场景 -->
  <rect x="55" y="112" width="300" height="120" rx="10" fill="#f0f7ff" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- 机器人主体 -->
  <rect x="140" y="140" width="60" height="50" rx="8" fill="#409EFF" opacity="0.7"/>
  <rect x="155" y="130" width="30" height="15" rx="5" fill="#409EFF" opacity="0.5"/>
  <circle cx="170" cy="128" r="8" fill="#409EFF" opacity="0.4"/>
  <!-- 机械臂 -->
  <line x1="200" y1="155" x2="230" y2="135" stroke="#409EFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="230" y1="135" x2="255" y2="150" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="255" cy="150" r="4" fill="#409EFF"/>
  <!-- 射线追踪光线 -->
  <line x1="70" y1="130" x2="140" y2="160" stroke="#409EFF" stroke-width="1" opacity="0.3"/>
  <line x1="75" y1="125" x2="145" y2="155" stroke="#409EFF" stroke-width="0.8" opacity="0.2"/>
  <line x1="65" y1="135" x2="135" y2="165" stroke="#409EFF" stroke-width="0.8" opacity="0.2"/>
  <text x="340" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.6">RTX</text>

  <!-- 左侧标注 -->
  <rect x="55" y="248" width="130" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="120" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">PhysX 5 物理</text>

  <rect x="200" y="248" width="80" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="240" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">GPU 加速</text>

  <!-- 左侧标签 -->
  <rect x="55" y="290" width="300" height="30" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="205" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">高视觉保真度 / 商业版</text>

  <!-- 右侧卡片 - Gazebo -->
  <rect x="420" y="60" width="350" height="310" rx="14" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#1a1a2e" stroke-width="1" opacity="0.8"/>
  <!-- 右侧标题栏 -->
  <rect x="420" y="60" width="350" height="40" rx="14" fill="#1a1a2e" opacity="0.06"/>
  <rect x="420" y="86" width="350" height="14" fill="#1a1a2e" opacity="0.06"/>
  <text x="595" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">Gazebo</text>

  <!-- 右侧内容 - 机器人场景 -->
  <rect x="445" y="112" width="300" height="120" rx="10" fill="#f5f5f8" stroke="#1a1a2e" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- 机器人主体（简化） -->
  <rect x="530" y="140" width="50" height="45" rx="6" fill="#1a1a2e" opacity="0.5"/>
  <rect x="540" y="132" width="25" height="12" rx="4" fill="#1a1a2e" opacity="0.35"/>
  <circle cx="552" cy="130" r="6" fill="#1a1a2e" opacity="0.3"/>
  <!-- 简化机械臂 -->
  <line x1="580" y1="152" x2="600" y2="140" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="600" y1="140" x2="618" y2="150" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="618" cy="150" r="3" fill="#1a1a2e" opacity="0.5"/>
  <!-- OGRE 渲染提示 -->
  <text x="730" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.4">OGRE</text>

  <!-- 右侧标注 -->
  <rect x="445" y="248" width="130" height="28" rx="6" fill="#1a1a2e" opacity="0.1"/>
  <text x="510" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">CPU 物理引擎</text>

  <rect x="590" y="248" width="110" height="28" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="645" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Apache 2.0</text>

  <!-- 右侧标签 -->
  <rect x="445" y="290" width="300" height="30" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="595" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">开源 / 学术友好</text>

  <!-- 底部连接区域 -->
  <rect x="180" y="390" width="440" height="50" rx="25" fill="#1a1a2e" opacity="0.06" filter="url(#shadowLight)"/>
  <rect x="180" y="390" width="440" height="50" rx="25" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 连接线 -->
  <line x1="205" y1="370" x2="205" y2="395" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="595" y1="370" x2="595" y2="395" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

  <!-- ROS2 桥接图标 -->
  <circle cx="400" cy="415" r="16" fill="#409EFF" opacity="0.2"/>
  <circle cx="400" cy="415" r="10" fill="#409EFF" opacity="0.4"/>
  <circle cx="400" cy="415" r="5" fill="#409EFF"/>

  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">ROS2 Bridge</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.6">互操作性连接</text>

  <!-- 底部说明 -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">学术仿真环境选择指南 · 扁平化设计对比</text>
</svg>