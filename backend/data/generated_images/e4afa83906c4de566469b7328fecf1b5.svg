<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FE0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">多智能体系统的隐性成本</text>

  <!-- 天平底座 -->
  <rect x="340" y="420" width="120" height="10" rx="4" fill="#B0C4DE"/>
  <rect x="385" y="400" width="30" height="20" rx="3" fill="#A0B4CE"/>

  <!-- 天平横梁 -->
  <rect x="100" y="130" width="600" height="8" rx="4" fill="#409EFF" filter="url(#shadow)"/>

  <!-- 左侧托盘线 -->
  <line x1="200" y1="138" x2="200" y2="190" stroke="#409EFF" stroke-width="2.5"/>
  <!-- 左侧托盘 -->
  <rect x="140" y="190" width="120" height="12" rx="4" fill="#409EFF" opacity="0.85"/>

  <!-- 右侧托盘线 -->
  <line x1="600" y1="138" x2="600" y2="190" stroke="#409EFF" stroke-width="2.5"/>
  <!-- 右侧托盘 -->
  <rect x="540" y="190" width="120" height="12" rx="4" fill="#409EFF" opacity="0.85"/>

  <!-- 左侧：收益（向上箭头） -->
  <g transform="translate(200, 0)">
    <!-- 专业化 -->
    <g transform="translate(-80, 80)">
      <rect x="-28" y="-30" width="56" height="56" rx="28" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <polygon points="0,-18 -8,-4 8,-4" fill="#409EFF"/>
      <polygon points="0,-18 -6,-6 6,-6" fill="#409EFF"/>
      <text x="0" y="42" text-anchor="middle" font-size="13" fill="#1a1a2e">专业化</text>
    </g>

    <!-- 并行性 -->
    <g transform="translate(-10, 60)">
      <rect x="-28" y="-30" width="56" height="56" rx="28" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <polygon points="0,-18 -8,-4 8,-4" fill="#409EFF"/>
      <polygon points="0,-18 -6,-6 6,-6" fill="#409EFF"/>
      <text x="0" y="42" text-anchor="middle" font-size="13" fill="#1a1a2e">并行性</text>
    </g>

    <!-- 鲁棒性 -->
    <g transform="translate(60, 80)">
      <rect x="-28" y="-30" width="56" height="56" rx="28" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <polygon points="0,-18 -8,-4 8,-4" fill="#409EFF"/>
      <polygon points="0,-18 -6,-6 6,-6" fill="#409EFF"/>
      <text x="0" y="42" text-anchor="middle" font-size="13" fill="#1a1a2e">鲁棒性</text>
    </g>

    <!-- 涌现智能 -->
    <g transform="translate(130, 65)">
      <rect x="-28" y="-30" width="56" height="56" rx="28" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
      <polygon points="0,-18 -8,-4 8,-4" fill="#409EFF"/>
      <polygon points="0,-18 -6,-6 6,-6" fill="#409EFF"/>
      <text x="0" y="42" text-anchor="middle" font-size="13" fill="#1a1a2e">涌现智能</text>
    </g>
  </g>

  <!-- 右侧：成本（向下箭头/重物） -->
  <g transform="translate(600, 0)">
    <!-- 开发复杂度 -->
    <g transform="translate(-100, 85)">
      <rect x="-38" y="-20" width="76" height="40" rx="8" fill="#FFF0F0" stroke="#E06B6B" stroke-width="1.5"/>
      <circle cx="-12" cy="-5" r="6" fill="none" stroke="#E06B6B" stroke-width="1.2"/>
      <circle cx="0" cy="-5" r="6" fill="none" stroke="#E06B6B" stroke-width="1.2"/>
      <circle cx="12" cy="-5" r="6" fill="none" stroke="#E06B6B" stroke-width="1.2"/>
      <line x1="-12" y1="1" x2="12" y2="1" stroke="#E06B6B" stroke-width="1.2"/>
      <line x1="-6" y1="7" x2="6" y2="7" stroke="#E06B6B" stroke-width="1.2"/>
      <text x="0" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e">开发复杂度</text>
    </g>

    <!-- 运行成本 -->
    <g transform="translate(-20, 80)">
      <rect x="-38" y="-20" width="76" height="40" rx="8" fill="#FFF0F0" stroke="#E06B6B" stroke-width="1.5"/>
      <circle cx="-8" cy="-2" r="5" fill="#E8C84A" stroke="#D4A820" stroke-width="1"/>
      <circle cx="4" cy="-2" r="5" fill="#E8C84A" stroke="#D4A820" stroke-width="1"/>
      <circle cx="16" cy="-2" r="5" fill="#E8C84A" stroke="#D4A820" stroke-width="1"/>
      <text x="0" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e">运行成本</text>
    </g>

    <!-- 信息衰减 -->
    <g transform="translate(60, 90)">
      <rect x="-38" y="-20" width="76" height="40" rx="8" fill="#FFF0F0" stroke="#E06B6B" stroke-width="1.5"/>
      <text x="0" y="-4" text-anchor="middle" font-size="10" fill="#888">智能体A → B → C</text>
      <text x="0" y="8" text-anchor="middle" font-size="8" fill="#AAA">信息逐级衰减</text>
      <text x="0" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e">信息衰减</text>
    </g>

    <!-- 一致性问题 -->
    <g transform="translate(140, 85)">
      <rect x="-38" y="-20" width="76" height="40" rx="8" fill="#FFF0F0" stroke="#E06B6B" stroke-width="1.5"/>
      <line x1="-15" y1="-8" x2="15" y2="8" stroke="#E06B6B" stroke-width="1.8"/>
      <line x1="15" y1="-8" x2="-15" y2="8" stroke="#E06B6B" stroke-width="1.8"/>
      <text x="0" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e">一致性问题</text>
    </g>

    <!-- 延迟叠加 -->
    <g transform="translate(220, 80)">
      <rect x="-38" y="-20" width="76" height="40" rx="8" fill="#FFF0F0" stroke="#E06B6B" stroke-width="1.5"/>
      <circle cx="-8" cy="-2" r="7" fill="none" stroke="#E06B6B" stroke-width="1.2"/>
      <line x1="-8" y1="-2" x2="-4" y2="-2" stroke="#E06B6B" stroke-width="1.2"/>
      <line x1="-8" y1="-2" x2="-8" y2="-7" stroke="#E06B6B" stroke-width="1.2"/>
      <circle cx="8" cy="-2" r="7" fill="none" stroke="#E06B6B" stroke-width="1.2"/>
      <line x1="8" y1="-2" x2="12" y2="-2" stroke="#E06B6B" stroke-width="1.2"/>
      <line x1="8" y1="-2" x2="8" y2="-7" stroke="#E06B6B" stroke-width="1.2"/>
      <text x="0" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e">延迟叠加</text>
    </g>
  </g>

  <!-- 天平倾斜指示（右侧更重） -->
  <g transform="translate(400, 155)">
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#E06B6B" font-weight="bold">成本 &gt; 收益？</text>
  </g>

  <!-- 标注 -->
  <g fill="#1a1a2e" font-size="13">
    <text x="200" y="240" text-anchor="middle">收益</text>
    <text x="600" y="240" text-anchor="middle">隐性成本</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="470" text-anchor="middle" font-size="13" fill="#666">多智能体系统在带来优势的同时，也引入了开发、运行、信息、一致性与延迟等隐性成本</text>
</svg>