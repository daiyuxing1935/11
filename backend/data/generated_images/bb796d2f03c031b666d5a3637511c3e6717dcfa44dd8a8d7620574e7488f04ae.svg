<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">企业平台工作流 — 技能创建管线</text>

  <!-- ===== 顶部流程管线 ===== -->
  <!-- 连接线 -->
  <line x1="70" y1="80" x2="730" y2="80" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 阶段1：草稿 -->
  <g filter="url(#shadow)">
    <circle cx="70" cy="80" r="22" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 铅笔图标 -->
    <line x1="62" y1="72" x2="78" y2="88" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="72" x2="66" y2="70" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="78" y1="88" x2="76" y2="92" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="70" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">草稿</text>

  <!-- 箭头1 -->
  <polygon points="100,75 110,80 100,85" fill="#409EFF"/>

  <!-- 阶段2：内测 -->
  <g filter="url(#shadow)">
    <circle cx="150" cy="80" r="22" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 烧瓶图标 -->
    <path d="M145,68 L155,68 L155,72 L150,80 L145,72 Z" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="148" y1="68" x2="148" y2="64" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="152" y1="68" x2="152" y2="64" stroke="#409EFF" stroke-width="1.8"/>
    <circle cx="150" cy="74" r="2" fill="#409EFF"/>
  </g>
  <text x="150" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">内测</text>

  <!-- 箭头2 -->
  <polygon points="180,75 190,80 180,85" fill="#409EFF"/>

  <!-- 阶段3：安全扫描 -->
  <g filter="url(#shadow)">
    <circle cx="270" cy="80" r="22" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 盾牌图标 -->
    <path d="M262,72 L270,66 L278,72 L275,82 L270,86 L265,82 Z" fill="none" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="270" y1="72" x2="270" y2="82" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="266" y1="76" x2="274" y2="76" stroke="#409EFF" stroke-width="1.5"/>
  </g>
  <text x="270" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">安全扫描</text>

  <!-- 漏洞列表小标签 -->
  <rect x="248" y="126" width="44" height="16" rx="4" fill="#FFE8E8" stroke="#FF6B6B" stroke-width="0.8"/>
  <text x="270" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6B6B">漏洞清单</text>

  <!-- 箭头3 -->
  <polygon points="300,75 310,80 300,85" fill="#409EFF"/>

  <!-- 阶段4：审核批准 -->
  <g filter="url(#shadow)">
    <circle cx="390" cy="80" r="22" fill="white" stroke="#409EFF" stroke-width="2"/>
    <!-- 对勾图标 -->
    <polyline points="380,78 387,86 400,72" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="390" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">审核批准</text>

  <!-- 箭头4 -->
  <polygon points="420,75 430,80 420,85" fill="#409EFF"/>

  <!-- 阶段5：部署到代理 -->
  <g filter="url(#shadow)">
    <circle cx="510" cy="80" r="22" fill="url(#blueGrad)" stroke="#409EFF" stroke-width="2"/>
    <!-- 注入箭头图标 -->
    <line x1="502" y1="80" x2="518" y2="80" stroke="white" stroke-width="2"/>
    <polygon points="515,74 522,80 515,86" fill="white"/>
    <circle cx="506" cy="76" r="2" fill="white"/>
  </g>
  <text x="510" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">部署到代理</text>

  <!-- 流程标签 -->
  <rect x="555" y="68" width="80" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="595" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">5步审核管线</text>

  <!-- ===== 分隔线 ===== -->
  <line x1="40" y1="150" x2="760" y2="150" stroke="#409EFF" stroke-width="1" opacity="0.3"/>

  <!-- ===== 下方用例面板 ===== -->

  <!-- 用例1：客户服务 -->
  <g filter="url(#shadow)">
    <rect x="40" y="175" width="220" height="290" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 面板标题 -->
    <rect x="40" y="175" width="220" height="36" rx="10" fill="#409EFF" opacity="0.1"/>
    <rect x="40" y="195" width="220" height="16" fill="#409EFF" opacity="0.1"/>
    <!-- 气泡图标 -->
    <circle cx="70" cy="193" r="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M62,190 L62,196 L68,196 L70,200 L72,196 L78,196 L78,190 Z" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <text x="150" y="197" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">客户服务</text>

    <!-- 技能标签 -->
    <rect x="60" y="230" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="100" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">FAQ</text>

    <rect x="155" y="230" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="195" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">订单</text>

    <rect x="60" y="275" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="100" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">退货</text>

    <rect x="155" y="275" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="195" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">情感</text>

    <!-- 描述 -->
    <text x="60" y="335" font-family="sans-serif" font-size="12" fill="#666">自动回复客户咨询</text>
    <text x="60" y="355" font-family="sans-serif" font-size="12" fill="#666">处理订单与售后</text>
    <text x="60" y="375" font-family="sans-serif" font-size="12" fill="#666">情感识别与响应</text>

    <!-- 标注 -->
    <rect x="60" y="400" width="100" height="20" rx="4" fill="#1a1a2e" opacity="0.8"/>
    <text x="110" y="414" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">4个技能模块</text>
  </g>

  <!-- 用例2：开发 -->
  <g filter="url(#shadow)">
    <rect x="290" y="175" width="220" height="290" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 面板标题 -->
    <rect x="290" y="175" width="220" height="36" rx="10" fill="#409EFF" opacity="0.1"/>
    <rect x="290" y="195" width="220" height="16" fill="#409EFF" opacity="0.1"/>
    <!-- 代码括号图标 -->
    <text x="68" y="200" font-family="monospace" font-size="18" fill="#409EFF" font-weight="bold" transform="translate(290,0)">{ }</text>
    <text x="150" y="197" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e" transform="translate(290,0)">开发</text>

    <!-- 技能标签 -->
    <rect x="310" y="230" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="350" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">审查</text>

    <rect x="405" y="230" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="445" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">测试</text>

    <rect x="310" y="275" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="350" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">文档</text>

    <rect x="405" y="275" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="445" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">迁移</text>

    <!-- 描述 -->
    <text x="310" y="335" font-family="sans-serif" font-size="12" fill="#666">代码审查与合并</text>
    <text x="310" y="355" font-family="sans-serif" font-size="12" fill="#666">自动化测试套件</text>
    <text x="310" y="375" font-family="sans-serif" font-size="12" fill="#666">文档生成与同步</text>

    <!-- 标注 -->
    <rect x="310" y="400" width="100" height="20" rx="4" fill="#1a1a2e" opacity="0.8"/>
    <text x="360" y="414" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">4个开发流程</text>
  </g>

  <!-- 用例3：数据分析 -->
  <g filter="url(#shadow)">
    <rect x="540" y="175" width="220" height="290" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 面板标题 -->
    <rect x="540" y="175" width="220" height="36" rx="10" fill="#409EFF" opacity="0.1"/>
    <rect x="540" y="195" width="220" height="16" fill="#409EFF" opacity="0.1"/>
    <!-- 图表图标 -->
    <rect x="555" y="186" width="6" height="14" rx="1" fill="#409EFF"/>
    <rect x="564" y="182" width="6" height="18" rx="1" fill="#409EFF"/>
    <rect x="573" y="188" width="6" height="12" rx="1" fill="#409EFF"/>
    <rect x="582" y="184" width="6" height="16" rx="1" fill="#409EFF"/>
    <text x="150" y="197" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e" transform="translate(540,0)">数据分析</text>

    <!-- 技能标签 -->
    <rect x="560" y="230" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="600" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">探索</text>

    <rect x="655" y="230" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="695" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">可视化</text>

    <rect x="560" y="275" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="600" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">统计</text>

    <rect x="655" y="275" width="80" height="28" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="695" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF">报告</text>

    <!-- 描述 -->
    <text x="560" y="335" font-family="sans-serif" font-size="12" fill="#666">数据探索与清洗</text>
    <text x="560" y="355" font-family="sans-serif" font-size="12" fill="#666">可视化图表生成</text>
    <text x="560" y="375" font-family="sans-serif" font-size="12" fill="#666">统计分析与报告</text>

    <!-- 标注 -->
    <rect x="560" y="400" width="100" height="20" rx="4" fill="#1a1a2e" opacity="0.8"/>
    <text x="610" y="414" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">4个分析模块</text>
  </g>

  <!-- ===== 底部标注 ===== -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#999">企业级技能创建与部署管线 · 科技蓝 #409EFF</text>
</svg>