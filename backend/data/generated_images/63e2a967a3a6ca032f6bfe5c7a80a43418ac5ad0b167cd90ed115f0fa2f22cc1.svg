<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0E9FA"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Worker 智能体职责说明</text>

  <!-- ========== Worker 1：专注执行 ========== -->
  <g transform="translate(30, 70)">
    <!-- 作用域边界虚线框 -->
    <rect x="0" y="0" width="220" height="340" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
    <text x="110" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.6">作用域边界</text>

    <!-- Worker 卡片 -->
    <rect x="15" y="32" width="190" height="290" rx="10" fill="url(#workerGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- 标题栏 -->
    <rect x="15" y="32" width="190" height="36" rx="10" fill="#409EFF"/>
    <rect x="15" y="48" width="190" height="20" fill="#409EFF"/>
    <text x="110" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">专注执行</text>

    <!-- 放大镜图标 -->
    <g transform="translate(110, 130)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#409EFF" stroke-width="3"/>
      <line x1="20" y1="20" x2="38" y2="38" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
      <!-- 放大镜中的任务项 -->
      <rect x="-14" y="-8" width="28" height="5" rx="2.5" fill="#409EFF" opacity="0.6"/>
      <rect x="-10" y="0" width="20" height="5" rx="2.5" fill="#409EFF" opacity="0.4"/>
      <rect x="-6" y="8" width="12" height="5" rx="2.5" fill="#409EFF" opacity="0.3"/>
    </g>

    <!-- 说明文字 -->
    <text x="110" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">聚焦单一任务</text>
    <text x="110" y="220" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">深度执行</text>

    <!-- 标注：专注 -->
    <rect x="70" y="250" width="80" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">专注执行</text>
  </g>

  <!-- ========== Worker 2：结果报告 ========== -->
  <g transform="translate(290, 70)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
    <text x="110" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.6">作用域边界</text>

    <rect x="15" y="32" width="190" height="290" rx="10" fill="url(#workerGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

    <rect x="15" y="32" width="190" height="36" rx="10" fill="#409EFF"/>
    <rect x="15" y="48" width="190" height="20" fill="#409EFF"/>
    <text x="110" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">结果报告</text>

    <!-- 报告文档图标 -->
    <g transform="translate(110, 120)">
      <rect x="-25" y="-30" width="50" height="60" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="-18" y1="-18" x2="18" y2="-18" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
      <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
      <line x1="-18" y1="-2" x2="18" y2="-2" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
      <!-- JSON 格式内容 -->
      <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="8" fill="#409EFF">{ }</text>
      <text x="0" y="22" text-anchor="middle" font-family="monospace" font-size="7" fill="#409EFF" opacity="0.7">"status": "ok"</text>
    </g>

    <text x="110" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">结构化报告</text>
    <text x="110" y="230" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">JSON 格式输出</text>

    <rect x="70" y="250" width="80" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">结果报告</text>
  </g>

  <!-- ========== Worker 3：自我评估 ========== -->
  <g transform="translate(550, 70)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
    <text x="110" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" opacity="0.6">作用域边界</text>

    <rect x="15" y="32" width="190" height="290" rx="10" fill="url(#workerGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>

    <rect x="15" y="32" width="190" height="36" rx="10" fill="#409EFF"/>
    <rect x="15" y="48" width="190" height="20" fill="#409EFF"/>
    <text x="110" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">自我评估</text>

    <!-- 置信度仪表 -->
    <g transform="translate(110, 135)">
      <!-- 仪表盘弧线 -->
      <path d="M -30,10 A 35,35 0 0,1 30,10" fill="none" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
      <!-- 高置信度指示 -->
      <path d="M -30,10 A 35,35 0 0,1 -5,-28" fill="none" stroke="#409EFF" stroke-width="6" stroke-linecap="round"/>
      <!-- 中置信度指示 -->
      <path d="M -5,-28 A 35,35 0 0,1 15,-22" fill="none" stroke="#5AB0FF" stroke-width="6" stroke-linecap="round"/>
      <!-- 低置信度指示 -->
      <path d="M 15,-22 A 35,35 0 0,1 30,10" fill="none" stroke="#A0D0FF" stroke-width="6" stroke-linecap="round"/>

      <!-- 指针 -->
      <line x1="0" y1="0" x2="-18" y2="-22" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="4" fill="#1a1a2e"/>

      <!-- 刻度标签 -->
      <text x="-30" y="24" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">高</text>
      <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5AB0FF">中</text>
      <text x="30" y="24" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#A0D0FF">低</text>
    </g>

    <text x="110" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">置信度评估</text>
    <text x="110" y="230" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">高/中/低 三级</text>

    <rect x="70" y="250" width="80" height="24" rx="12" fill="#409EFF" opacity="0.15"/>
    <text x="110" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF" font-weight="bold">自我评估</text>
  </g>

  <!-- ========== 越界重定向箭头 ========== -->
  <g transform="translate(400, 430)">
    <!-- 从 Worker 区域指向 Manager 的箭头 -->
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">越界重定向</text>

    <!-- 箭头线 -->
    <line x1="-180" y1="8" x2="180" y2="8" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="6,3"/>
    <!-- 箭头头部 -->
    <polygon points="180,3 195,8 180,13" fill="#1a1a2e"/>

    <!-- 标注 -->
    <rect x="-60" y="-28" width="120" height="22" rx="11" fill="#1a1a2e"/>
    <text x="0" y="-14" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">返回 Manager</text>
  </g>

  <!-- ========== 底部说明 ========== -->
  <text x="400" y="478" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">每个 Worker 在自身作用域内独立运作，越界任务自动回传 Manager</text>
</svg>