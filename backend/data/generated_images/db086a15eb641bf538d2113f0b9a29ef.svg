<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FE0"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="800" height="500" fill="none" stroke="#409EFF" stroke-width="1.5" rx="8" opacity="0.3"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">EventBroker 内部路由机制</text>

  <!-- ===== 左侧：发布者 ===== -->
  <rect x="30" y="70" width="100" height="50" rx="8" fill="url(#boxGrad)" filter="url(#shadow)"/>
  <text x="80" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">发布者</text>

  <!-- 发布者箭头 -->
  <line x1="130" y1="95" x2="175" y2="95" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- ===== 事件流进入 ===== -->
  <text x="155" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">事件流</text>

  <!-- ===== 中间区域：Broker 内部结构 ===== -->
  <rect x="180" y="55" width="440" height="390" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">EventBroker 内部</text>

  <!-- 1. 订阅表 -->
  <rect x="200" y="100" width="180" height="70" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="290" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">订阅表</text>
  <text x="290" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">topic_pattern → 订阅者</text>
  <text x="290" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">user.* → [S1, S2]</text>

  <!-- 2. 主题索引 -->
  <rect x="420" y="100" width="180" height="70" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="510" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">主题索引</text>
  <text x="510" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">精确匹配 O(1) 查找</text>
  <text x="510" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">topic → 订阅ID</text>

  <!-- 3. 通配符匹配器 -->
  <rect x="200" y="200" width="180" height="70" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="290" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">通配符匹配器</text>
  <text x="290" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">正则引擎 * 和 #</text>
  <text x="290" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">user.*.event</text>

  <!-- 4. 基于内容的过滤 -->
  <rect x="420" y="200" width="180" height="70" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="510" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">内容过滤</text>
  <text x="510" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">字段值过滤</text>
  <text x="510" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">severity ≥ 8</text>

  <!-- 5. 事件历史存储 -->
  <rect x="200" y="300" width="180" height="70" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="290" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">事件历史存储</text>
  <text x="290" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">时序列表</text>
  <text x="290" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">支持回放</text>

  <!-- 6. 统计计数器 -->
  <rect x="420" y="300" width="180" height="70" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="510" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">统计计数器</text>
  <text x="510" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">发布/投递/丢弃</text>
  <text x="510" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">活跃订阅数</text>

  <!-- 内部连接线 -->
  <line x1="380" y1="135" x2="420" y2="135" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="170" x2="290" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="510" y1="170" x2="510" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="235" x2="420" y2="235" stroke="#FFB74D" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="270" x2="290" y2="300" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="510" y1="270" x2="510" y2="300" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 事件流路径（从左到右穿过 broker） -->
  <path d="M175,95 L200,95 L200,135 L380,135 L420,135 L420,235 L510,235 L510,335 L600,335" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <circle cx="190" cy="95" r="3" fill="#409EFF"/>
  <circle cx="290" cy="135" r="3" fill="#409EFF"/>
  <circle cx="510" cy="235" r="3" fill="#FFB74D"/>
  <circle cx="510" cy="335" r="3" fill="#409EFF"/>

  <!-- ===== 右侧：订阅者 ===== -->
  <rect x="640" y="70" width="100" height="50" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)"/>
  <text x="690" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">订阅者</text>

  <rect x="640" y="150" width="100" height="50" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)"/>
  <text x="690" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">订阅者</text>

  <!-- 输出箭头 -->
  <line x1="620" y1="95" x2="640" y2="95" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="620" y1="175" x2="640" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== 标注 ===== -->
  <rect x="195" y="440" width="70" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="230" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">订阅路由</text>

  <rect x="295" y="440" width="70" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="330" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">索引查找</text>

  <rect x="395" y="440" width="70" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="430" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">通配匹配</text>

  <rect x="495" y="440" width="70" height="22" rx="4" fill="#FFB74D" opacity="0.2"/>
  <text x="530" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E65100">内容过滤</text>

  <rect x="595" y="440" width="70" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="630" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">历史回放</text>

  <rect x="695" y="440" width="70" height="22" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="730" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">统计监控</text>

  <!-- 底部信息 -->
  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">主色 #409EFF · 扁平化 2D 设计 · 事件代理路由机制</text>
</svg>