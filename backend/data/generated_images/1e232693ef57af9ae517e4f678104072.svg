<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="pathGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="pathGrad2" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7FC1FF"/>
    </linearGradient>
    <linearGradient id="pathGrad3" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#8CC8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题区域 -->
  <rect x="240" y="28" width="320" height="52" rx="26" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">AI Agent 学习路线图</text>

  <!-- 指南针图标（右上角） -->
  <g transform="translate(720, 38)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <polygon points="0,-10 3,-2 0,-4 -3,-2" fill="#409EFF"/>
    <polygon points="0,10 3,2 0,4 -3,2" fill="#1a1a2e" opacity="0.4"/>
    <polygon points="-10,0 -2,3 -4,0 -2,-3" fill="#1a1a2e" opacity="0.3"/>
    <polygon points="10,0 2,3 4,0 2,-3" fill="#409EFF"/>
    <circle cx="0" cy="0" r="2" fill="#1a1a2e"/>
  </g>

  <!-- 卷轴/地图书 -->
  <g transform="translate(400, 220)">
    <!-- 卷轴主体 -->
    <rect x="-95" y="-55" width="190" height="110" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
    <rect x="-85" y="-45" width="170" height="90" rx="6" fill="#F7FBFF" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>

    <!-- 卷轴上下装饰 -->
    <rect x="-95" y="-58" width="190" height="8" rx="4" fill="#409EFF" opacity="0.3"/>
    <rect x="-95" y="50" width="190" height="8" rx="4" fill="#409EFF" opacity="0.3"/>

    <!-- 卷轴上的路线图线条 -->
    <path d="M-60,-20 Q-20,-30 0,-15 Q20,0 50,-10 Q65,-15 70,-25" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <path d="M-50,0 Q-10,10 10,0 Q30,-10 55,5" fill="none" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.3"/>
    <circle cx="-60" cy="-20" r="2.5" fill="#409EFF" opacity="0.5"/>
    <circle cx="70" cy="-25" r="2.5" fill="#409EFF" opacity="0.5"/>

    <!-- 卷轴上的小旗 -->
    <g transform="translate(50,-10)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
      <polygon points="0,-8 10,-5 0,-2" fill="#409EFF" opacity="0.5"/>
    </g>
  </g>

  <!-- 起点人物（背包） -->
  <g transform="translate(400, 310)">
    <!-- 身体 -->
    <circle cx="0" cy="-12" r="10" fill="#409EFF" opacity="0.8"/>
    <rect x="-8" y="-2" width="16" height="18" rx="4" fill="#409EFF" opacity="0.6"/>
    <!-- 背包 -->
    <rect x="-12" y="-4" width="6" height="14" rx="3" fill="#1a1a2e" opacity="0.5"/>
    <rect x="6" y="-4" width="6" height="14" rx="3" fill="#1a1a2e" opacity="0.5"/>
    <!-- 腿 -->
    <rect x="-7" y="16" width="5" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="2" y="16" width="5" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
    <!-- 手臂 -->
    <rect x="-14" y="-2" width="4" height="10" rx="2" fill="#409EFF" opacity="0.4" transform="rotate(-10,-12,3)"/>
    <rect x="10" y="-2" width="4" height="10" rx="2" fill="#409EFF" opacity="0.4" transform="rotate(10,12,3)"/>
  </g>

  <!-- 路径1：初级（2-4周） - 短平路径 -->
  <g>
    <!-- 路径线 -->
    <path d="M370,340 Q320,350 270,355 Q240,358 220,360" fill="none" stroke="url(#pathGrad1)" stroke-width="3" stroke-linecap="round"/>
    <!-- 终点圆 -->
    <circle cx="215" cy="361" r="5" fill="#409EFF" opacity="0.7"/>
    <!-- 幼苗图标 -->
    <g transform="translate(215, 345)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#1a1a2e" stroke-width="1.2" opacity="0.5"/>
      <ellipse cx="-4" cy="-2" rx="4" ry="3" fill="#409EFF" opacity="0.6"/>
      <ellipse cx="4" cy="-1" rx="3.5" ry="2.5" fill="#409EFF" opacity="0.5"/>
    </g>
    <!-- 标签 -->
    <rect x="155" y="370" width="130" height="32" rx="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="220" y="391" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">初级（2-4周）</text>
  </g>

  <!-- 路径2：中级（4-8周） - 蜿蜒路径 -->
  <g>
    <path d="M410,345 Q440,360 470,355 Q500,348 520,360 Q540,372 560,365 Q580,358 600,362" fill="none" stroke="url(#pathGrad2)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="605" cy="362" r="5" fill="#409EFF" opacity="0.7"/>
    <!-- 成长树图标 -->
    <g transform="translate(605, 345)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#1a1a2e" stroke-width="1.2" opacity="0.5"/>
      <ellipse cx="0" cy="-2" rx="6" ry="5" fill="#409EFF" opacity="0.5"/>
      <ellipse cx="-3" cy="-5" rx="4" ry="3.5" fill="#409EFF" opacity="0.6"/>
      <ellipse cx="3" cy="-4" rx="3.5" ry="3" fill="#409EFF" opacity="0.4"/>
    </g>
    <!-- 标签 -->
    <rect x="540" y="375" width="135" height="32" rx="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="607" y="396" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">中级（4-8周）</text>
  </g>

  <!-- 路径3：高级（8-16周） - 向上攀升路径 -->
  <g>
    <path d="M420,340 Q450,320 480,310 Q510,298 530,280 Q545,265 555,250 Q562,240 565,230" fill="none" stroke="url(#pathGrad3)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="567" cy="225" r="5" fill="#409EFF" opacity="0.7"/>
    <!-- 大树/摩天楼图标 -->
    <g transform="translate(567, 205)">
      <rect x="-3" y="0" width="6" height="16" rx="1" fill="#1a1a2e" opacity="0.4"/>
      <polygon points="0,-16 -9,-2 9,-2" fill="#409EFF" opacity="0.5"/>
      <polygon points="0,-12 -7,0 7,0" fill="#409EFF" opacity="0.4"/>
      <rect x="-5" y="-4" width="3" height="3" rx="0.5" fill="#FFFFFF" opacity="0.5"/>
      <rect x="2" y="-6" width="3" height="3" rx="0.5" fill="#FFFFFF" opacity="0.5"/>
    </g>
    <!-- 标签 -->
    <rect x="500" y="170" width="140" height="32" rx="16" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2"/>
    <text x="570" y="191" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">高级（8-16周）</text>
  </g>

  <!-- 标注1：起点 -->
  <g transform="translate(370, 280)">
    <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#1a1a2e" opacity="0.08"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1a1a2e">学习起点</text>
  </g>

  <!-- 标注2：基础 -->
  <g transform="translate(270, 330)">
    <rect x="-35" y="-10" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#409EFF">基础入门</text>
  </g>

  <!-- 标注3：进阶 -->
  <g transform="translate(510, 340)">
    <rect x="-35" y="-10" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#409EFF">技能进阶</text>
  </g>

  <!-- 标注4：精通 -->
  <g transform="translate(620, 280)">
    <rect x="-35" y="-10" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#409EFF">精通实战</text>
  </g>

  <!-- 标注5：持续学习 -->
  <g transform="translate(580, 230)">
    <rect x="-45" y="-10" width="90" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#409EFF">持续成长</text>
  </g>

  <!-- 标注6：目标 -->
  <g transform="translate(565, 195)">
    <rect x="-35" y="-10" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.06"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#409EFF">学习目标</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="200" y1="470" x2="600" y2="470" stroke="#409EFF" stroke-width="0.8" opacity="0.15"/>
  <circle cx="200" cy="470" r="2" fill="#409EFF" opacity="0.3"/>
  <circle cx="400" cy="470" r="2" fill="#409EFF" opacity="0.3"/>
  <circle cx="600" cy="470" r="2" fill="#409EFF" opacity="0.3"/>

  <!-- 底部小字 -->
  <text x="400" y="488" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.25">从零开始 · 循序渐进 · 构建 AI Agent 知识体系</text>
</svg>