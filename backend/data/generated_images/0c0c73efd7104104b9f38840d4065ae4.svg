<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="cycleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ed4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI Agent Core Capabilities Cycle</text>

  <!-- Main cycle circle (dashed ring) -->
  <circle cx="400" cy="260" r="155" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.4"/>

  <!-- Curved arrows connecting quadrants -->
  <!-- Perception → Reasoning (top arc, clockwise) -->
  <path d="M 470 130 Q 540 160 540 220" fill="none" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <polygon points="540,228 534,216 546,216" fill="#409EFF"/>

  <!-- Reasoning → Planning (right arc) -->
  <path d="M 555 300 Q 560 370 500 400" fill="none" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="492,404 504,398 498,410" fill="#409EFF"/>

  <!-- Planning → Action (bottom arc) -->
  <path d="M 330 400 Q 260 400 260 340" fill="none" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="258,332 264,344 252,340" fill="#409EFF"/>

  <!-- Action → Perception (left arc) -->
  <path d="M 245 200 Q 240 130 300 110" fill="none" stroke="#409EFF" stroke-width="2.5"/>
  <polygon points="308,108 296,114 302,102" fill="#409EFF"/>

  <!-- ====== QUADRANT 1: Perception (Top-Left) ====== -->
  <g transform="translate(250, 120)">
    <!-- Eye icon -->
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="8" fill="#409EFF" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#409EFF"/>
    <!-- Signal waves entering -->
    <path d="M -45 -8 Q -38 -14 -32 -8" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.7"/>
    <path d="M -52 -4 Q -42 -12 -32 -4" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M -58 0 Q -46 -10 -32 0" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
    <!-- Label -->
    <text x="0" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Perception</text>
    <text x="0" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#409EFF">Senses &amp; Input</text>
  </g>

  <!-- ====== QUADRANT 2: Reasoning (Top-Right) ====== -->
  <g transform="translate(550, 120)">
    <!-- Brain icon -->
    <path d="M -20 -10 C -30 -20 -20 -35 -5 -30 C 0 -40 15 -40 20 -30 C 35 -35 40 -20 30 -10 C 35 0 30 15 20 15 C 15 25 0 25 -5 15 C -15 20 -25 10 -20 -10 Z" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <path d="M -8 -5 L 8 -5 M -5 2 L 5 2 M -3 9 L 3 9" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Thought bubbles -->
    <circle cx="25" cy="-30" r="7" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <circle cx="32" cy="-38" r="4" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="0.8"/>
    <text x="25" y="-28" text-anchor="middle" font-family="Arial" font-size="8" fill="#409EFF">∀</text>
    <circle cx="-28" cy="-28" r="7" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="-28" y="-26" text-anchor="middle" font-family="Arial" font-size="8" fill="#409EFF">∃</text>
    <!-- Label -->
    <text x="0" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Reasoning</text>
    <text x="0" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#409EFF">Logic &amp; Analysis</text>
  </g>

  <!-- ====== QUADRANT 3: Planning (Bottom-Right) ====== -->
  <g transform="translate(550, 380)">
    <!-- Roadmap/tree icon -->
    <circle cx="0" cy="-18" r="8" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#409EFF">G</text>
    <!-- Branches -->
    <line x1="0" y1="-10" x2="-20" y2="5" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="0" y1="-10" x2="20" y2="5" stroke="#409EFF" stroke-width="1.8"/>
    <line x1="-20" y1="5" x2="-30" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-20" y1="5" x2="-10" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="20" y1="5" x2="10" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="20" y1="5" x2="30" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <!-- Sub-step dots -->
    <circle cx="-30" cy="15" r="3" fill="#409EFF" opacity="0.5"/>
    <circle cx="-10" cy="15" r="3" fill="#409EFF" opacity="0.5"/>
    <circle cx="10" cy="15" r="3" fill="#409EFF" opacity="0.5"/>
    <circle cx="30" cy="15" r="3" fill="#409EFF" opacity="0.5"/>
    <text x="-30" y="19" text-anchor="middle" font-family="Arial" font-size="7" fill="#409EFF">S1</text>
    <text x="-10" y="19" text-anchor="middle" font-family="Arial" font-size="7" fill="#409EFF">S2</text>
    <text x="10" y="19" text-anchor="middle" font-family="Arial" font-size="7" fill="#409EFF">S3</text>
    <text x="30" y="19" text-anchor="middle" font-family="Arial" font-size="7" fill="#409EFF">S4</text>
    <!-- Label -->
    <text x="0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Planning</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#409EFF">Goal &amp; Sub-steps</text>
  </g>

  <!-- ====== QUADRANT 4: Action (Bottom-Left) ====== -->
  <g transform="translate(250, 380)">
    <!-- Gear/hand icon -->
    <circle cx="0" cy="-5" r="12" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="0" cy="-5" r="5" fill="#409EFF" opacity="0.3"/>
    <circle cx="0" cy="-5" r="3" fill="#409EFF"/>
    <!-- Gear teeth -->
    <rect x="-3" y="-22" width="6" height="6" rx="1" fill="#409EFF"/>
    <rect x="-3" y="6" width="6" height="6" rx="1" fill="#409EFF"/>
    <rect x="-20" y="-8" width="6" height="6" rx="1" fill="#409EFF"/>
    <rect x="14" y="-8" width="6" height="6" rx="1" fill="#409EFF"/>
    <!-- Tools radiating -->
    <line x1="15" y1="-15" x2="28" y2="-25" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="-15" y1="-15" x2="-28" y2="-25" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="18" y1="5" x2="30" y2="12" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="-18" y1="5" x2="-30" y2="12" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <!-- Small tool icons -->
    <path d="M 28 -28 L 32 -24 L 28 -22" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <path d="M -28 -28 L -32 -24 L -28 -22" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Action</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#409EFF">Tools &amp; Execution</text>
  </g>

  <!-- Center circle with "AI Agent" text -->
  <circle cx="400" cy="260" r="38" fill="#409EFF" opacity="0.08" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">AI</text>
  <text x="400" y="272" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#409EFF">Agent</text>

  <!-- Arrow markers in center -->
  <text x="400" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#409EFF" opacity="0.6">↻</text>

  <!-- Bottom comparison section -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">Continuous learning &amp; adaptation loop</text>

</svg>