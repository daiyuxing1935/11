<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">可观测性三大支柱</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#5a6a7a">Metrics · Logging · Distributed Tracing</text>

  <!-- ==================== 面板 1：指标 ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="74" width="230" height="400" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="30" y="74" width="230" height="36" rx="10" fill="#409EFF"/>
    <rect x="30" y="96" width="230" height="14" fill="#409EFF"/>
    <text x="145" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">📊 指标 Metrics</text>

    <!-- 仪表盘 -->
    <circle cx="100" cy="148" r="28" fill="none" stroke="#E8F0FE" stroke-width="6"/>
    <circle cx="100" cy="148" r="28" fill="none" stroke="#409EFF" stroke-width="6" stroke-dasharray="120 56" stroke-dashoffset="20"/>
    <text x="100" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">P50</text>

    <circle cx="190" cy="148" r="28" fill="none" stroke="#E8F0FE" stroke-width="6"/>
    <circle cx="190" cy="148" r="28" fill="none" stroke="#409EFF" stroke-width="6" stroke-dasharray="100 76" stroke-dashoffset="20"/>
    <text x="190" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">P95</text>

    <!-- 折线图 -->
    <polyline points="60,220 90,200 120,210 150,180 180,195 210,170" fill="none" stroke="#409EFF" stroke-width="2"/>
    <circle cx="60" cy="220" r="3" fill="#409EFF"/>
    <circle cx="90" cy="200" r="3" fill="#409EFF"/>
    <circle cx="120" cy="210" r="3" fill="#409EFF"/>
    <circle cx="150" cy="180" r="3" fill="#409EFF"/>
    <circle cx="180" cy="195" r="3" fill="#409EFF"/>
    <circle cx="210" cy="170" r="3" fill="#409EFF"/>
    <text x="135" y="240" text-anchor="middle" font-size="11" fill="#5a6a7a">延迟趋势</text>

    <!-- 柱状图 -->
    <rect x="60" y="280" width="22" height="50" rx="3" fill="#409EFF" opacity="0.7"/>
    <rect x="92" y="260" width="22" height="70" rx="3" fill="#409EFF" opacity="0.85"/>
    <rect x="124" y="290" width="22" height="40" rx="3" fill="#409EFF" opacity="0.7"/>
    <rect x="156" y="270" width="22" height="60" rx="3" fill="#409EFF" opacity="0.85"/>
    <rect x="188" y="285" width="22" height="45" rx="3" fill="#409EFF" opacity="0.7"/>
    <text x="135" y="355" text-anchor="middle" font-size="11" fill="#5a6a7a">吞吐量</text>

    <!-- 指标卡片 -->
    <rect x="50" y="375" width="190" height="28" rx="6" fill="#F0F8FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="62" y="394" font-size="11" fill="#5a6a7a">成功率</text>
    <text x="220" y="394" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a2e">99.2%</text>

    <rect x="50" y="410" width="190" height="28" rx="6" fill="#F0F8FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="62" y="429" font-size="11" fill="#5a6a7a">任务成本</text>
    <text x="220" y="429" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a2e">$0.023</text>

    <rect x="50" y="445" width="190" height="22" rx="6" fill="#F0F8FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="62" y="460" font-size="11" fill="#5a6a7a">队列长度</text>
    <text x="220" y="460" text-anchor="end" font-size="11" font-weight="700" fill="#1a1a2e">12</text>
  </g>

  <!-- ==================== 面板 2：日志 ==================== -->
  <g filter="url(#shadow)">
    <rect x="285" y="74" width="230" height="400" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="285" y="74" width="230" height="36" rx="10" fill="#409EFF"/>
    <rect x="285" y="96" width="230" height="14" fill="#409EFF"/>
    <text x="400" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">📝 日志 Logging</text>

    <!-- 日志条目 -->
    <rect x="305" y="126" width="190" height="52" rx="6" fill="#F5F9FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="313" y="142" font-size="10" fill="#409EFF" font-weight="600">timestamp</text>
    <text x="380" y="142" font-size="10" fill="#1a1a2e">2025-01-15T10:30:00Z</text>
    <text x="313" y="156" font-size="10" fill="#409EFF" font-weight="600">agent_id</text>
    <text x="370" y="156" font-size="10" fill="#1a1a2e">research-01</text>
    <text x="313" y="170" font-size="10" fill="#409EFF" font-weight="600">action</text>
    <text x="358" y="170" font-size="10" fill="#1a1a2e">search</text>

    <rect x="305" y="188" width="190" height="52" rx="6" fill="#F5F9FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="313" y="204" font-size="10" fill="#409EFF" font-weight="600">tool</text>
    <text x="345" y="204" font-size="10" fill="#1a1a2e">web_search</text>
    <text x="313" y="218" font-size="10" fill="#409EFF" font-weight="600">duration</text>
    <text x="375" y="218" font-size="10" fill="#1a1a2e">1.2s</text>
    <text x="313" y="232" font-size="10" fill="#409EFF" font-weight="600">token_usage</text>
    <text x="395" y="232" font-size="10" fill="#1a1a2e">342</text>

    <rect x="305" y="250" width="190" height="52" rx="6" fill="#F5F9FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="313" y="266" font-size="10" fill="#409EFF" font-weight="600">timestamp</text>
    <text x="380" y="266" font-size="10" fill="#1a1a2e">2025-01-15T10:30:01Z</text>
    <text x="313" y="280" font-size="10" fill="#409EFF" font-weight="600">agent_id</text>
    <text x="370" y="280" font-size="10" fill="#1a1a2e">router-02</text>
    <text x="313" y="294" font-size="10" fill="#409EFF" font-weight="600">action</text>
    <text x="358" y="294" font-size="10" fill="#1a1a2e">route</text>

    <rect x="305" y="312" width="190" height="52" rx="6" fill="#F5F9FF" stroke="#D0E8FF" stroke-width="1"/>
    <text x="313" y="328" font-size="10" fill="#409EFF" font-weight="600">tool</text>
    <text x="345" y="328" font-size="10" fill="#1a1a2e">llm_call</text>
    <text x="313" y="342" font-size="10" fill="#409EFF" font-weight="600">duration</text>
    <text x="375" y="342" font-size="10" fill="#1a1a2e">0.8s</text>
    <text x="313" y="356" font-size="10" fill="#409EFF" font-weight="600">token_usage</text>
    <text x="395" y="356" font-size="10" fill="#1a1a2e">521</text>

    <!-- 日志流箭头 -->
    <path d="M400,374 L400,390 L385,390 L400,405 L415,390 L400,390" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
    <text x="400" y="420" text-anchor="middle" font-size="11" fill="#5a6a7a">结构化日志流</text>

    <!-- 代理图标 -->
    <circle cx="340" cy="445" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="340" y="449" text-anchor="middle" font-size="9" fill="#409EFF">A1</text>
    <circle cx="400" cy="445" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="400" y="449" text-anchor="middle" font-size="9" fill="#409EFF">A2</text>
    <circle cx="460" cy="445" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="460" y="449" text-anchor="middle" font-size="9" fill="#409EFF">A3</text>
    <text x="400" y="475" text-anchor="middle" font-size="10" fill="#5a6a7a">多代理日志聚合</text>
  </g>

  <!-- ==================== 面板 3：分布式追踪 ==================== -->
  <g filter="url(#shadow)">
    <rect x="540" y="74" width="230" height="400" rx="10" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="540" y="74" width="230" height="36" rx="10" fill="#409EFF"/>
    <rect x="540" y="96" width="230" height="14" fill="#409EFF"/>
    <text x="655" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">🔗 分布式追踪</text>

    <!-- 追踪跨度 -->
    <text x="555" y="130" font-size="11" fill="#1a1a2e" font-weight="600">请求追踪路径</text>

    <!-- User -->
    <rect x="555" y="142" width="200" height="28" rx="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
    <text x="570" y="160" font-size="11" fill="#1a1a2e">👤 User</text>
    <text x="740" y="160" text-anchor="end" font-size="10" fill="#5a6a7a">0ms</text>

    <!-- 箭头 -->
    <path d="M655,170 L655,178" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- Router -->
    <rect x="555" y="182" width="200" height="28" rx="14" fill="#D0E8FF" stroke="#409EFF" stroke-width="1"/>
    <text x="570" y="200" font-size="11" fill="#1a1a2e">🚦 Router</text>
    <text x="740" y="200" text-anchor="end" font-size="10" fill="#5a6a7a">15ms</text>

    <!-- 箭头 -->
    <path d="M655,210 L655,218" stroke="#409EFF" stroke-width="1.5"/>

    <!-- Research Agent -->
    <rect x="555" y="222" width="200" height="28" rx="14" fill="#B8D8FF" stroke="#409EFF" stroke-width="1"/>
    <text x="570" y="240" font-size="11" fill="#1a1a2e">🔬 Research Agent</text>
    <text x="740" y="240" text-anchor="end" font-size="10" fill="#5a6a7a">320ms</text>

    <!-- 箭头 -->
    <path d="M655,250 L655,258" stroke="#409EFF" stroke-width="1.5"/>

    <!-- Web Search Tool -->
    <rect x="555" y="262" width="200" height="28" rx="14" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
    <text x="570" y="280" font-size="11" fill="#1a1a2e">🌐 Web Search Tool</text>
    <text x="740" y="280" text-anchor="end" font-size="10" fill="#5a6a7a">890ms</text>

    <!-- 时间线 -->
    <text x="555" y="315" font-size="11" fill="#1a1a2e" font-weight="600">各跳耗时</text>

    <!-- 时间条 -->
    <rect x="555" y="330" width="40" height="14" rx="4" fill="#409EFF" opacity="0.5"/>
    <text x="560" y="341" font-size="9" fill="#fff">15ms</text>
    <text x="600" y="341" font-size="9" fill="#5a6a7a">Router</text>

    <rect x="555" y="354" width="80" height="14" rx="4" fill="#409EFF" opacity="0.7"/>
    <text x="560" y="365" font-size="9" fill="#fff">320ms</text>
    <text x="640" y="365" font-size="9" fill="#5a6a7a">Research</text>

    <rect x="555" y="378" width="180" height="14" rx="4" fill="#409EFF"/>
    <text x="560" y="389" font-size="9" fill="#fff">890ms</text>
    <text x="740" y="389" font-size="9" fill="#5a6a7a">Web Search</text>

    <!-- 总耗时 -->
    <rect x="555" y="410" width="200" height="28" rx="8" fill="#1a1a2e" opacity="0.06"/>
    <text x="575" y="429" font-size="12" fill="#1a1a2e" font-weight="600">总耗时</text>
    <text x="735" y="429" text-anchor="end" font-size="12" fill="#409EFF" font-weight="700">1.225s</text>

    <!-- 追踪ID -->
    <text x="655" y="460" text-anchor="middle" font-size="10" fill="#5a6a7a">Trace ID: a3f8c9e1b2d7</text>
  </g>

  <!-- 面板间连接线 -->
  <line x1="260" y1="274" x2="285" y2="274" stroke="#409EFF" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="515" y1="274" x2="540" y2="274" stroke="#409EFF" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- 标注 -->
  <g font-size="11" fill="#1a1a2e">
    <!-- 标注 1 -->
    <rect x="30" y="500" width="0" height="0" fill="none"/>
    <text x="145" y="492" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">延迟指标</text>

    <!-- 标注 2 -->
    <text x="400" y="492" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">结构化日志</text>

    <!-- 标注 3 -->
    <text x="655" y="492" text-anchor="middle" font-size="11" fill="#409EFF" font-weight="600">请求追踪</text>
  </g>
</svg>