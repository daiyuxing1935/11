<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">纳什均衡 · 对比图解</text>
  <line x1="280" y1="50" x2="520" y2="50" stroke="#409EFF" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ===== 左侧：纯策略纳什均衡 ===== -->
  <rect x="40" y="70" width="320" height="400" rx="12" fill="white" filter="url(#shadow)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="40" y="70" width="320" height="40" rx="12" fill="#409EFF" fill-opacity="0.1"/>
  <text x="200" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">纯策略纳什均衡</text>

  <!-- 协调博弈矩阵 -->
  <rect x="70" y="130" width="260" height="210" rx="6" fill="#f8fbff" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- 矩阵标签 -->
  <text x="110" y="155" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">玩家 B</text>
  <text x="70" y="200" text-anchor="end" font-size="13" fill="#1a1a2e" font-weight="bold" transform="rotate(-90,70,200)">玩家 A</text>

  <!-- 列标签 -->
  <text x="145" y="172" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">左</text>
  <text x="255" y="172" text-anchor="middle" font-size="13" fill="#409EFF" font-weight="bold">右</text>

  <!-- 行标签 -->
  <text x="95" y="210" font-size="13" fill="#409EFF" font-weight="bold">左</text>
  <text x="95" y="290" font-size="13" fill="#409EFF" font-weight="bold">右</text>

  <!-- 单元格：左上 -->
  <rect x="115" y="180" width="80" height="55" rx="4" fill="#e6f3ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="155" y="205" text-anchor="middle" font-size="13" fill="#1a1a2e">(2, 2)</text>
  <!-- 高亮对勾 -->
  <circle cx="135" cy="195" r="8" fill="#409EFF" opacity="0.15"/>
  <text x="135" y="199" text-anchor="middle" font-size="12" fill="#409EFF">✓</text>

  <!-- 单元格：右上 -->
  <rect x="210" y="180" width="80" height="55" rx="4" fill="white" stroke="#c0d9f0" stroke-width="1"/>
  <text x="250" y="205" text-anchor="middle" font-size="13" fill="#1a1a2e">(0, 0)</text>

  <!-- 单元格：左下 -->
  <rect x="115" y="250" width="80" height="55" rx="4" fill="white" stroke="#c0d9f0" stroke-width="1"/>
  <text x="155" y="275" text-anchor="middle" font-size="13" fill="#1a1a2e">(0, 0)</text>

  <!-- 单元格：右下 -->
  <rect x="210" y="250" width="80" height="55" rx="4" fill="#e6f3ff" stroke="#409EFF" stroke-width="1.5"/>
  <text x="250" y="275" text-anchor="middle" font-size="13" fill="#1a1a2e">(2, 2)</text>
  <!-- 高亮对勾 -->
  <circle cx="230" cy="265" r="8" fill="#409EFF" opacity="0.15"/>
  <text x="230" y="269" text-anchor="middle" font-size="12" fill="#409EFF">✓</text>

  <!-- 标注 -->
  <rect x="75" y="360" width="250" height="95" rx="8" fill="#f0f7ff" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="200" y="382" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">均衡点</text>
  <text x="200" y="405" text-anchor="middle" font-size="13" fill="#1a1a2e">(左, 左) 与 (右, 右)</text>
  <text x="200" y="428" text-anchor="middle" font-size="13" fill="#1a1a2e">双方均无单方面</text>
  <text x="200" y="448" text-anchor="middle" font-size="13" fill="#1a1a2e">偏离动机</text>

  <!-- ===== 连接桥梁 ===== -->
  <rect x="370" y="230" width="60" height="40" rx="20" fill="url(#bridgeGrad)"/>
  <text x="400" y="255" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="bold">纳什均衡</text>

  <!-- 桥两端发光节点 -->
  <circle cx="370" cy="250" r="6" fill="#409EFF" filter="url(#glow)"/>
  <circle cx="430" cy="250" r="6" fill="#409EFF" filter="url(#glow)"/>

  <!-- ===== 右侧：混合策略纳什均衡 ===== -->
  <rect x="440" y="70" width="320" height="400" rx="12" fill="white" filter="url(#shadow)" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="440" y="70" width="320" height="40" rx="12" fill="#409EFF" fill-opacity="0.1"/>
  <text x="600" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">混合策略纳什均衡</text>

  <!-- 饼图：石头剪刀布 -->
  <g transform="translate(600, 210)">
    <!-- 饼图外圈 -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- 1/3 石头 - 0° 到 120° -->
    <path d="M0,0 L0,-90 A90,90 0 0,1 77.9,-45 Z" fill="#409EFF" fill-opacity="0.25" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 1/3 剪刀 - 120° 到 240° -->
    <path d="M0,0 L77.9,-45 A90,90 0 0,1 -77.9,-45 Z" fill="#409EFF" fill-opacity="0.45" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 1/3 布 - 240° 到 360° -->
    <path d="M0,0 L-77.9,-45 A90,90 0 0,1 0,-90 Z" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>

    <!-- 中心点 -->
    <circle cx="0" cy="0" r="4" fill="#1a1a2e"/>

    <!-- 标签 -->
    <text x="0" y="-60" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">石头</text>
    <text x="55" y="-15" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">剪刀</text>
    <text x="-55" y="-15" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">布</text>

    <!-- 概率标注 -->
    <text x="0" y="-45" text-anchor="middle" font-size="12" fill="#409EFF">1/3</text>
    <text x="40" y="-5" text-anchor="middle" font-size="12" fill="#409EFF">1/3</text>
    <text x="-40" y="-5" text-anchor="middle" font-size="12" fill="#409EFF">1/3</text>
  </g>

  <!-- 标注 -->
  <rect x="460" y="360" width="280" height="95" rx="8" fill="#f0f7ff" stroke="#409EFF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="600" y="382" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">均衡点</text>
  <text x="600" y="405" text-anchor="middle" font-size="13" fill="#1a1a2e">各策略以 1/3 概率混合</text>
  <text x="600" y="428" text-anchor="middle" font-size="13" fill="#1a1a2e">对手无法通过改变</text>
  <text x="600" y="448" text-anchor="middle" font-size="13" fill="#1a1a2e">策略分布获得优势</text>

  <!-- 底部装饰线 -->
  <line x1="100" y1="485" x2="700" y2="485" stroke="#409EFF" stroke-width="1" stroke-opacity="0.2"/>
  <text x="400" y="495" text-anchor="middle" font-size="11" fill="#409EFF" fill-opacity="0.5">博弈论 · 纳什均衡图解</text>
</svg>