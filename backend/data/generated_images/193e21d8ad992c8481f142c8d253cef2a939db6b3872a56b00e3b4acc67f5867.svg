<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ecf9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" rx="12" fill="url(#bgGrad)" />

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">ReAct 核心循环流程</text>

  <!-- ===== 思考（Thought）框 ===== -->
  <rect x="60" y="120" width="180" height="160" rx="16" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="2.5" />
  <!-- 灯泡图标 -->
  <g transform="translate(130, 160)">
    <circle cx="20" cy="22" r="14" fill="none" stroke="#409EFF" stroke-width="2" />
    <path d="M12 28 L28 28" stroke="#409EFF" stroke-width="2" stroke-linecap="round" />
    <path d="M14 32 L26 32" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round" />
    <path d="M16 36 L24 36" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" />
    <line x1="20" y1="8" x2="20" y2="12" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" />
    <line x1="10" y1="16" x2="13" y2="18" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" />
    <line x1="30" y1="16" x2="27" y2="18" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" />
  </g>
  <text x="150" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">思考</text>

  <!-- 箭头 1：思考 → 行动 -->
  <line x1="240" y1="200" x2="300" y2="200" stroke="#409EFF" stroke-width="2.5" />
  <polygon points="300,194 312,200 300,206" fill="#409EFF" />

  <!-- ===== 行动（Action）框 ===== -->
  <rect x="315" y="120" width="180" height="160" rx="16" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="2.5" />
  <!-- 播放按钮图标 -->
  <g transform="translate(385, 160)">
    <polygon points="10,8 10,38 34,23" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linejoin="round" />
  </g>
  <text x="405" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">行动</text>

  <!-- 箭头 2：行动 → 观察 -->
  <line x1="495" y1="200" x2="555" y2="200" stroke="#409EFF" stroke-width="2.5" />
  <polygon points="555,194 567,200 555,206" fill="#409EFF" />

  <!-- ===== 观察（Observation）框 ===== -->
  <rect x="570" y="120" width="180" height="160" rx="16" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="2.5" />
  <!-- 文档+勾选图标 -->
  <g transform="translate(640, 155)">
    <path d="M8,6 L24,6 L32,14 L32,38 L8,38 Z" fill="none" stroke="#409EFF" stroke-width="2" stroke-linejoin="round" />
    <path d="M24,6 L24,14 L32,14" fill="none" stroke="#409EFF" stroke-width="2" stroke-linejoin="round" />
    <path d="M14,26 L20,32 L28,22" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="660" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">观察</text>

  <!-- ===== 反馈回路箭头（观察 → 思考） ===== -->
  <!-- 弧形箭头从观察框下方绕回思考框下方 -->
  <path d="M570,280 Q570,340 400,340 Q230,340 240,280" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="8,4" />
  <polygon points="240,280 234,292 246,286" fill="#409EFF" />

  <!-- 反馈标签 -->
  <text x="400" y="358" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#409EFF" font-style="italic">反馈循环</text>

  <!-- ===== 标注 1：思考阶段 ===== -->
  <line x1="60" y1="100" x2="60" y2="80" stroke="#1a1a2e" stroke-width="1.2" />
  <line x1="60" y1="80" x2="150" y2="80" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="60" cy="100" r="3" fill="#1a1a2e" />
  <rect x="152" y="70" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="202" y="86" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">分析输入信息</text>

  <!-- ===== 标注 2：行动阶段 ===== -->
  <line x1="405" y1="120" x2="405" y2="95" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="405" cy="120" r="3" fill="#1a1a2e" />
  <rect x="355" y="70" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="405" y="86" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">执行决策</text>

  <!-- ===== 标注 3：观察阶段 ===== -->
  <line x1="660" y1="120" x2="660" y2="95" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="660" cy="120" r="3" fill="#1a1a2e" />
  <rect x="610" y="70" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="660" y="86" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">收集反馈</text>

  <!-- ===== 标注 4：循环迭代 ===== -->
  <line x1="400" y1="340" x2="400" y2="370" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="400" cy="340" r="3" fill="#1a1a2e" />
  <rect x="350" y="372" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="400" y="388" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">持续迭代</text>

  <!-- ===== 标注 5：推理过程 ===== -->
  <line x1="150" y1="280" x2="150" y2="310" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="150" cy="280" r="3" fill="#1a1a2e" />
  <rect x="100" y="312" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="150" y="328" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">逻辑推理</text>

  <!-- ===== 标注 6：环境交互 ===== -->
  <line x1="405" y1="280" x2="405" y2="310" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="405" cy="280" r="3" fill="#1a1a2e" />
  <rect x="355" y="312" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="405" y="328" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">环境交互</text>

  <!-- ===== 标注 7：知识更新 ===== -->
  <line x1="660" y1="280" x2="660" y2="310" stroke="#1a1a2e" stroke-width="1.2" />
  <circle cx="660" cy="280" r="3" fill="#1a1a2e" />
  <rect x="610" y="312" width="100" height="24" rx="6" fill="#1a1a2e" opacity="0.85" />
  <text x="660" y="328" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">知识更新</text>

  <!-- ===== 底部说明 ===== -->
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666666">ReAct 模式：思考 → 行动 → 观察 → 循环迭代</text>

</svg>