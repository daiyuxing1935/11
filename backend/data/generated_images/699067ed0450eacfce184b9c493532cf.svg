<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFA"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">少样本提示为何有效？</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5a5a7a">少样本提示（Few-Shot Prompting）的四个关键原理</text>

  <!-- 卡片1：上下文学习 -->
  <rect x="50" y="90" width="330" height="170" rx="14" fill="url(#cardBg)" stroke="#409EFF" stroke-width="2.5"/>
  <text x="215" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">上下文学习</text>
  <text x="215" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a5a7a">In-Context Learning</text>

  <!-- 大脑图标 -->
  <ellipse cx="185" cy="205" rx="40" ry="30" fill="none" stroke="#409EFF" stroke-width="2"/>
  <ellipse cx="185" cy="195" rx="28" ry="22" fill="none" stroke="#409EFF" stroke-width="2"/>
  <path d="M157 200 Q145 185 155 170 Q165 158 180 165" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  <path d="M213 200 Q225 185 215 170 Q205 158 190 165" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="175" cy="190" rx="6" ry="4" fill="#409EFF" opacity="0.3"/>
  <ellipse cx="195" cy="190" rx="6" ry="4" fill="#409EFF" opacity="0.3"/>

  <!-- 上下文光环 -->
  <ellipse cx="185" cy="205" rx="55" ry="42" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <ellipse cx="185" cy="205" rx="65" ry="50" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- 标注：上下文学习 -->
  <rect x="240" y="165" width="95" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="287" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">模式识别</text>

  <!-- 卡片2：消解歧义 -->
  <rect x="420" y="90" width="330" height="170" rx="14" fill="url(#cardBg)" stroke="#409EFF" stroke-width="2.5"/>
  <text x="585" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">消解歧义</text>
  <text x="585" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a5a7a">Disambiguation</text>

  <!-- 模糊→清晰文字 -->
  <rect x="510" y="158" width="60" height="22" rx="4" fill="#409EFF" opacity="0.08"/>
  <text x="540" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.5" font-weight="bold">模糊</text>
  <rect x="510" y="188" width="60" height="22" rx="4" fill="#409EFF" opacity="0.08"/>
  <text x="540" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.5" font-weight="bold">模糊</text>

  <!-- 箭头 -->
  <path d="M578 180 L598 180" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 清晰文字 -->
  <rect x="608" y="165" width="70" height="28" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="643" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">清晰</text>

  <!-- 标注 -->
  <rect x="510" y="220" width="95" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="557" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">消除歧义</text>

  <!-- 卡片3：格式锚定 -->
  <rect x="50" y="290" width="330" height="170" rx="14" fill="url(#cardBg)" stroke="#409EFF" stroke-width="2.5"/>
  <text x="215" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">格式锚定</text>
  <text x="215" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a5a7a">Format Anchoring</text>

  <!-- 模板文档 -->
  <rect x="140" y="360" width="100" height="70" rx="6" fill="none" stroke="#409EFF" stroke-width="2"/>
  <rect x="148" y="368" width="84" height="8" rx="2" fill="#409EFF" opacity="0.2"/>
  <text x="190" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">【输入】</text>
  <text x="190" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">【输出】</text>
  <text x="190" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">【格式】</text>

  <!-- 锚点图标 -->
  <circle cx="250" cy="395" r="12" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="250" y1="383" x2="250" y2="407" stroke="#409EFF" stroke-width="1.5"/>
  <path d="M244 395 Q250 390 256 395" fill="none" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 标注 -->
  <rect x="120" y="440" width="95" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="167" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">输出规范</text>

  <!-- 卡片4：任务分解 -->
  <rect x="420" y="290" width="330" height="170" rx="14" fill="url(#cardBg)" stroke="#409EFF" stroke-width="2.5"/>
  <text x="585" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">任务分解</text>
  <text x="585" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a5a7a">Task Decomposition</text>

  <!-- 拼图图标 -->
  <rect x="530" y="360" width="28" height="28" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
  <rect x="530" y="360" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>
  <rect x="544" y="374" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>

  <rect x="566" y="360" width="28" height="28" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
  <rect x="566" y="360" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>
  <rect x="580" y="374" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>

  <rect x="530" y="396" width="28" height="28" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
  <rect x="530" y="396" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>
  <rect x="544" y="410" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>

  <rect x="566" y="396" width="28" height="28" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
  <rect x="566" y="396" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>
  <rect x="580" y="410" width="14" height="14" rx="2" fill="#409EFF" opacity="0.25"/>

  <!-- 箭头：拼图碎片→分解 -->
  <path d="M620 395 L640 395" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 分解结果 -->
  <text x="660" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">步骤1</text>
  <text x="660" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">步骤2</text>

  <!-- 标注 -->
  <rect x="530" y="440" width="95" height="26" rx="13" fill="#409EFF" opacity="0.12"/>
  <text x="577" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">化繁为简</text>

</svg>