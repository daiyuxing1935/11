<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#d0ecfb"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">框架对比：LlamaIndex vs LangChain</text>

  <!-- ========== 左侧：LlamaIndex ========== -->
  <rect x="30" y="58" width="350" height="210" rx="10" fill="url(#card1)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="58" width="350" height="32" rx="10" fill="#409EFF"/>
  <rect x="30" y="78" width="350" height="12" fill="#409EFF"/>
  <text x="205" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">LlamaIndex 架构 — 围绕数据组织</text>

  <!-- 数据连接器 -->
  <rect x="55" y="108" width="120" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="115" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">数据连接器</text>

  <!-- 箭头1 -->
  <line x1="175" y1="126" x2="205" y2="126" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 节点 -->
  <rect x="210" y="108" width="80" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="250" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">节点</text>

  <!-- 箭头2 -->
  <line x1="290" y1="126" x2="310" y2="126" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 索引 -->
  <rect x="55" y="162" width="120" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="115" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">索引</text>

  <!-- 箭头3 -->
  <line x1="175" y1="180" x2="205" y2="180" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 查询引擎 -->
  <rect x="210" y="162" width="120" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="270" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">查询引擎</text>

  <!-- 数据标签 -->
  <text x="205" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-style="italic">以数据为中心</text>

  <!-- ========== 右侧：LangChain ========== -->
  <rect x="420" y="58" width="350" height="210" rx="10" fill="url(#card2)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="420" y="58" width="350" height="32" rx="10" fill="#409EFF"/>
  <rect x="420" y="78" width="350" height="12" fill="#409EFF"/>
  <text x="595" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">LangChain 架构 — 围绕流程组织</text>

  <!-- 提示 -->
  <rect x="445" y="108" width="100" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="495" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">提示</text>

  <!-- 箭头 -->
  <line x1="545" y1="126" x2="565" y2="126" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 模型 -->
  <rect x="570" y="108" width="100" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="620" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">模型</text>

  <!-- 箭头 -->
  <line x1="670" y1="126" x2="690" y2="126" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 链 -->
  <rect x="445" y="162" width="100" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="495" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">链</text>

  <!-- 箭头 -->
  <line x1="545" y1="180" x2="565" y2="180" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 代理 -->
  <rect x="570" y="162" width="100" height="36" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="620" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">代理</text>

  <!-- 流程标签 -->
  <text x="595" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-style="italic">以流程为中心</text>

  <!-- ========== 底部：决策树 ========== -->
  <rect x="100" y="290" width="600" height="190" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>

  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">决策树：如何选择框架</text>

  <!-- 根节点 -->
  <rect x="300" y="338" width="200" height="34" rx="17" fill="#1a1a2e"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">项目核心需求？</text>

  <!-- 分支线 -->
  <line x1="350" y1="372" x2="220" y2="400" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="450" y1="372" x2="580" y2="400" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 左分支 -->
  <rect x="120" y="398" width="200" height="34" rx="6" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.2"/>
  <text x="220" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">知识库问答 / 文档检索</text>

  <line x1="220" y1="432" x2="220" y2="450" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="450" width="160" height="34" rx="17" fill="#409EFF"/>
  <text x="220" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">LlamaIndex</text>

  <!-- 右分支 -->
  <rect x="480" y="398" width="200" height="34" rx="6" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="1.2"/>
  <text x="580" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">复杂工作流 / 多Agent</text>

  <line x1="580" y1="432" x2="580" y2="450" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="500" y="450" width="160" height="34" rx="17" fill="#409EFF"/>
  <text x="580" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">LangChain</text>

</svg>