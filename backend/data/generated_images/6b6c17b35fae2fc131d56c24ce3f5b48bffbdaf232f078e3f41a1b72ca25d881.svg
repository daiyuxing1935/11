<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EBF9"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6BB5FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 左侧：独立LLM -->
  <g transform="translate(100, 250)">
    <!-- 独立LLM标签 -->
    <text x="0" y="-95" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">独立LLM</text>

    <!-- 大脑图标 - 独立 -->
    <g transform="translate(0, -30)" filter="url(#shadow)">
      <!-- 大脑主体 -->
      <ellipse cx="0" cy="0" rx="38" ry="30" fill="url(#brainGrad)" opacity="0.9"/>
      <!-- 大脑沟回 -->
      <path d="M-20,-15 Q-10,-25 0,-15 Q10,-25 20,-15" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M-25,-5 Q-12,-18 0,-5 Q12,-18 25,-5" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M-22,8 Q-10,-5 0,8 Q10,-5 22,8" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M-18,18 Q-8,8 0,18 Q8,8 18,18" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>
      <!-- 中心发光点 -->
      <circle cx="0" cy="0" r="6" fill="#FFFFFF" opacity="0.3"/>
      <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.5"/>
    </g>

    <!-- 对话气泡 -->
    <g transform="translate(0, 25)">
      <rect x="-28" y="-8" width="56" height="28" rx="14" fill="#409EFF" opacity="0.15"/>
      <text x="0" y="10" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e">输出文本</text>
    </g>

    <!-- 标注线 -->
    <line x1="0" y1="-60" x2="0" y2="-75" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  </g>

  <!-- 分隔虚线 -->
  <line x1="210" y1="80" x2="210" y2="420" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- 右侧：AI智能体系统 -->
  <g transform="translate(500, 250)">

    <!-- AI智能体标签 -->
    <text x="0" y="-175" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">AI智能体系统</text>

    <!-- 智能体外框 -->
    <rect x="-155" y="-145" width="310" height="290" rx="20" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>

    <!-- 中心：LLM大脑 -->
    <g transform="translate(0, 0)" filter="url(#glow)">
      <!-- 大脑主体 -->
      <ellipse cx="0" cy="0" rx="45" ry="36" fill="url(#brainGrad)"/>
      <!-- 大脑沟回 -->
      <path d="M-24,-18 Q-12,-30 0,-18 Q12,-30 24,-18" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M-30,-6 Q-15,-22 0,-6 Q15,-22 30,-6" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M-28,8 Q-14,-6 0,8 Q14,-6 28,8" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M-22,20 Q-10,8 0,20 Q10,8 22,20" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5"/>
      <!-- 中心发光 -->
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" opacity="0.25"/>
      <circle cx="0" cy="0" r="5" fill="#FFFFFF" opacity="0.4"/>
      <!-- 核心LLM标签 -->
      <text x="0" y="50" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#409EFF">核心LLM</text>
    </g>

    <!-- 连接线 -->
    <g stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.5">
      <!-- 到工具 -->
      <line x1="35" y1="-30" x2="95" y2="-80"/>
      <!-- 到记忆 -->
      <line x1="35" y1="30" x2="95" y2="80"/>
      <!-- 到规划 -->
      <line x1="-35" y1="-30" x2="-95" y2="-80"/>
      <!-- 到感知 -->
      <line x1="-35" y1="30" x2="-95" y2="80"/>
    </g>

    <!-- 小圆点连接节点 -->
    <circle cx="35" cy="-30" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="35" cy="30" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="-35" cy="-30" r="3" fill="#409EFF" opacity="0.6"/>
    <circle cx="-35" cy="30" r="3" fill="#409EFF" opacity="0.6"/>

    <!-- 模块1：工具 - 右上 -->
    <g transform="translate(120, -95)">
      <rect x="-28" y="-28" width="56" height="56" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
      <!-- 工具箱图标 -->
      <rect x="-12" y="-8" width="14" height="14" rx="2" fill="none" stroke="#409EFF" stroke-width="2"/>
      <rect x="-8" y="-4" width="6" height="6" rx="1" fill="#409EFF"/>
      <line x1="4" y1="-6" x2="12" y2="-14" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="-10" x2="14" y2="-16" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <text x="0" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e">工具</text>
    </g>

    <!-- 模块2：记忆 - 右下 -->
    <g transform="translate(120, 95)">
      <rect x="-28" y="-28" width="56" height="56" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
      <!-- 记忆芯片图标 -->
      <rect x="-12" y="-10" width="24" height="20" rx="3" fill="none" stroke="#409EFF" stroke-width="2"/>
      <line x1="-6" y1="-10" x2="-6" y2="-16" stroke="#409EFF" stroke-width="2"/>
      <line x1="6" y1="-10" x2="6" y2="-16" stroke="#409EFF" stroke-width="2"/>
      <line x1="-6" y1="10" x2="-6" y2="16" stroke="#409EFF" stroke-width="2"/>
      <line x1="6" y1="10" x2="6" y2="16" stroke="#409EFF" stroke-width="2"/>
      <rect x="-8" y="-4" width="16" height="8" rx="1" fill="#409EFF" opacity="0.3"/>
      <text x="0" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e">记忆</text>
    </g>

    <!-- 模块3：规划 - 左上 -->
    <g transform="translate(-120, -95)">
      <rect x="-28" y="-28" width="56" height="56" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
      <!-- 路线图图标 -->
      <circle cx="-6" cy="-6" r="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <circle cx="8" cy="-8" r="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <circle cx="0" cy="8" r="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-3" y1="-3" x2="5" y2="-5" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="-2" y1="4" x2="5" y2="-5" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="5" y1="-5" x2="3" y2="5" stroke="#409EFF" stroke-width="1.5"/>
      <text x="0" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e">规划</text>
    </g>

    <!-- 模块4：感知 - 左下 -->
    <g transform="translate(-120, 95)">
      <rect x="-28" y="-28" width="56" height="56" rx="12" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
      <!-- 眼睛/传感器图标 -->
      <ellipse cx="0" cy="-4" rx="14" ry="10" fill="none" stroke="#409EFF" stroke-width="2"/>
      <circle cx="0" cy="-4" r="5" fill="#409EFF" opacity="0.4"/>
      <circle cx="0" cy="-4" r="2.5" fill="#409EFF"/>
      <!-- 信号波纹 -->
      <path d="M-10,6 Q-6,12 0,6 Q6,12 10,6" stroke="#409EFF" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M-14,10 Q-8,18 0,10 Q8,18 14,10" stroke="#409EFF" stroke-width="1.2" fill="none" opacity="0.3"/>
      <text x="0" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e">感知</text>
    </g>

  </g>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.5">LLM作为智能体系统的核心大脑，协调工具、记忆、规划与感知模块</text>

</svg>