<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fa"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1a1a2e">LoRA 应用场景与秩选择指南</text>

  <!-- ========== 面板 1：领域问答 ========== -->
  <rect x="40" y="70" width="720" height="100" rx="12" fill="url(#panelGrad)" stroke="#e0e8f0" stroke-width="1.5"/>
  <!-- 图标：FAQ 文档 -->
  <rect x="65" y="92" width="36" height="44" rx="4" fill="#409EFF" opacity="0.15"/>
  <rect x="65" y="92" width="36" height="44" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="73" y1="102" x2="93" y2="102" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="110" x2="93" y2="110" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="118" x2="88" y2="118" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  <text x="83" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#409EFF" font-weight="600">FAQ</text>

  <text x="120" y="105" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">领域问答</text>
  <text x="120" y="130" font-family="system-ui, sans-serif" font-size="14" fill="#5a6a7e">Domain Q&amp;A — 知识密集型任务</text>

  <!-- r=8 标签 -->
  <rect x="660" y="95" width="72" height="36" rx="18" fill="#409EFF"/>
  <text x="696" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">r=8</text>

  <!-- ========== 面板 2：指令微调 ========== -->
  <rect x="40" y="190" width="720" height="100" rx="12" fill="url(#panelGrad)" stroke="#e0e8f0" stroke-width="1.5"/>
  <!-- 图标：聊天气泡 -->
  <rect x="62" y="212" width="42" height="36" rx="10" fill="#409EFF" opacity="0.15"/>
  <rect x="62" y="212" width="42" height="36" rx="10" fill="none" stroke="#409EFF" stroke-width="2"/>
  <path d="M72 232 L78 240 L84 232" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="76" cy="224" r="2" fill="#409EFF"/>
  <circle cx="84" cy="224" r="2" fill="#409EFF"/>
  <circle cx="92" cy="224" r="2" fill="#409EFF"/>

  <text x="120" y="225" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">指令微调</text>
  <text x="120" y="250" font-family="system-ui, sans-serif" font-size="14" fill="#5a6a7e">Instruction Tuning — 对话与遵循能力</text>

  <!-- r=16 标签 -->
  <rect x="660" y="215" width="72" height="36" rx="18" fill="#409EFF"/>
  <text x="696" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">r=16</text>

  <!-- ========== 面板 3：风格迁移 ========== -->
  <rect x="40" y="310" width="720" height="100" rx="12" fill="url(#panelGrad)" stroke="#e0e8f0" stroke-width="1.5"/>
  <!-- 图标：画笔 -->
  <rect x="62" y="332" width="42" height="42" rx="6" fill="#409EFF" opacity="0.15"/>
  <rect x="62" y="332" width="42" height="42" rx="6" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="72" y1="352" x2="94" y2="340" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="94" cy="340" r="3" fill="#409EFF"/>
  <path d="M68 356 Q72 350 76 354" stroke="#409EFF" stroke-width="1.5" fill="none"/>

  <text x="120" y="345" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">风格迁移</text>
  <text x="120" y="370" font-family="system-ui, sans-serif" font-size="14" fill="#5a6a7e">Style Transfer — 创意与艺术生成</text>

  <!-- r=4 标签 -->
  <rect x="660" y="335" width="72" height="36" rx="18" fill="#409EFF"/>
  <text x="696" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">r=4</text>

  <!-- ========== 右侧：秩选择指南 ========== -->
  <rect x="40" y="430" width="720" height="55" rx="12" fill="#1a1a2e" opacity="0.06"/>

  <!-- 刻度尺 -->
  <text x="60" y="458" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a1a2e">秩选择指南</text>

  <!-- 刻度线 -->
  <line x1="200" y1="452" x2="740" y2="452" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- 刻度点与标签 -->
  <!-- r=2-4 -->
  <circle cx="230" cy="452" r="5" fill="#409EFF" opacity="0.6"/>
  <text x="230" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5a6a7e">r=2-4</text>
  <text x="230" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5a6a7e">简单</text>

  <!-- r=8（高亮） -->
  <circle cx="360" cy="452" r="8" fill="#409EFF"/>
  <circle cx="360" cy="452" r="4" fill="#ffffff"/>
  <text x="360" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#409EFF">r=8</text>
  <text x="360" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#409EFF">标准</text>
  <!-- 高亮指示线 -->
  <line x1="360" y1="430" x2="360" y2="445" stroke="#409EFF" stroke-width="2"/>

  <!-- r=16-32 -->
  <circle cx="530" cy="452" r="5" fill="#409EFF" opacity="0.6"/>
  <text x="530" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5a6a7e">r=16-32</text>
  <text x="530" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5a6a7e">复杂</text>

  <!-- r=64+ -->
  <circle cx="700" cy="452" r="5" fill="#409EFF" opacity="0.4"/>
  <text x="700" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5a6a7e">r=64+</text>
  <text x="700" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5a6a7e">近全微调</text>

  <!-- 标注：最多6个，每个3-6字 -->
  <!-- 标注1 -->
  <rect x="420" y="78" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="460" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#409EFF" font-weight="600">知识密集</text>

  <!-- 标注2 -->
  <rect x="420" y="198" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="460" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#409EFF" font-weight="600">对话遵循</text>

  <!-- 标注3 -->
  <rect x="420" y="318" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="460" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#409EFF" font-weight="600">创意生成</text>

  <!-- 标注4 -->
  <rect x="540" y="78" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="580" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#409EFF" font-weight="600">低秩高效</text>

  <!-- 标注5 -->
  <rect x="540" y="198" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="580" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#409EFF" font-weight="600">平衡泛化</text>

  <!-- 标注6 -->
  <rect x="540" y="318" width="80" height="24" rx="12" fill="#409EFF" opacity="0.12"/>
  <text x="580" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#409EFF" font-weight="600">轻量适配</text>

</svg>