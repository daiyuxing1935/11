<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="polyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="6"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">智能体能力雷达评估</text>

  <!-- ===== 雷达图区域 ===== -->
  <g transform="translate(240, 250)">

    <!-- 4个等级网格（同心四边形） -->
    <!-- 等级1（最内） -->
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="#d0d7e6" stroke-width="1"/>
    <!-- 等级2 -->
    <polygon points="0,-80 80,0 0,80 -80,0" fill="none" stroke="#d0d7e6" stroke-width="1"/>
    <!-- 等级3 -->
    <polygon points="0,-120 120,0 0,120 -120,0" fill="none" stroke="#d0d7e6" stroke-width="1"/>
    <!-- 等级4（最外） -->
    <polygon points="0,-160 160,0 0,160 -160,0" fill="none" stroke="#b0c0d8" stroke-width="1.5"/>

    <!-- 坐标轴 -->
    <!-- 自主性 - 上 -->
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#a0b4d0" stroke-width="1"/>
    <!-- 反应性 - 右 -->
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#a0b4d0" stroke-width="1"/>

    <!-- 轴标签（深蓝 #1a1a2e） -->
    <text x="0" y="-178" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">自主性</text>
    <text x="185" y="6" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">反应性</text>
    <text x="0" y="195" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">社会能力</text>
    <text x="-185" y="6" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">主动性</text>

    <!-- 等级标记（轴上小字） -->
    <text x="42" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7a8aaa">1</text>
    <text x="82" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7a8aaa">2</text>
    <text x="122" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7a8aaa">3</text>
    <text x="162" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7a8aaa">4</text>

    <!-- 等级文字说明 -->
    <text x="55" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8a9abc">初级</text>
    <text x="95" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8a9abc">中级</text>
    <text x="135" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8a9abc">高级</text>
    <text x="175" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8a9abc">专家</text>

    <!-- 数据多边形（蓝色 #409EFF） -->
    <!-- 假设分数：自主性=3，反应性=4，社会能力=2，主动性=3 -->
    <!-- 坐标：上(0,-120) 右(160,0) 下(0,80) 左(-120,0) -->
    <polygon points="0,-120 160,0 0,80 -120,0" fill="url(#polyGrad)" stroke="#409EFF" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- 数据点 -->
    <circle cx="0" cy="-120" r="5" fill="#409EFF"/>
    <circle cx="160" cy="0" r="5" fill="#409EFF"/>
    <circle cx="0" cy="80" r="5" fill="#409EFF"/>
    <circle cx="-120" cy="0" r="5" fill="#409EFF"/>

    <!-- 数据值标注 -->
    <text x="0" y="-125" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">3</text>
    <text x="165" y="-6" text-anchor="start" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">4</text>
    <text x="0" y="95" text-anchor="start" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">2</text>
    <text x="-125" y="-6" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">3</text>
  </g>

  <!-- ===== 评估表（右下） ===== -->
  <g transform="translate(520, 100)">

    <!-- 表格标题 -->
    <text x="90" y="-12" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">能力评估矩阵</text>

    <!-- 表头 -->
    <rect x="0" y="0" width="90" height="28" fill="#1a1a2e" rx="3"/>
    <text x="45" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold">能力</text>

    <rect x="90" y="0" width="45" height="28" fill="#1a1a2e" rx="3"/>
    <text x="112" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold">1</text>

    <rect x="135" y="0" width="45" height="28" fill="#1a1a2e" rx="3"/>
    <text x="157" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold">2</text>

    <rect x="180" y="0" width="45" height="28" fill="#1a1a2e" rx="3"/>
    <text x="202" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold">3</text>

    <rect x="225" y="0" width="45" height="28" fill="#1a1a2e" rx="3"/>
    <text x="247" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" font-weight="bold">4</text>

    <!-- 第1行：自主性 -->
    <rect x="0" y="30" width="90" height="32" fill="#eef2f7" rx="2"/>
    <text x="45" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">自主性</text>

    <rect x="90" y="30" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="112" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="135" y="30" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="157" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="180" y="30" width="45" height="32" fill="#b3d9ff" rx="2"/>
    <text x="202" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">◆</text>

    <rect x="225" y="30" width="45" height="32" fill="#ffffff" rx="2"/>
    <text x="247" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c0c8d8">○</text>

    <!-- 第2行：反应性 -->
    <rect x="0" y="64" width="90" height="32" fill="#eef2f7" rx="2"/>
    <text x="45" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">反应性</text>

    <rect x="90" y="64" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="112" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="135" y="64" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="157" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="180" y="64" width="45" height="32" fill="#b3d9ff" rx="2"/>
    <text x="202" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="225" y="64" width="45" height="32" fill="#409EFF" rx="2"/>
    <text x="247" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">◆</text>

    <!-- 第3行：社会能力 -->
    <rect x="0" y="98" width="90" height="32" fill="#eef2f7" rx="2"/>
    <text x="45" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">社会能力</text>

    <rect x="90" y="98" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="112" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="135" y="98" width="45" height="32" fill="#b3d9ff" rx="2"/>
    <text x="157" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">◆</text>

    <rect x="180" y="98" width="45" height="32" fill="#ffffff" rx="2"/>
    <text x="202" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c0c8d8">○</text>

    <rect x="225" y="98" width="45" height="32" fill="#ffffff" rx="2"/>
    <text x="247" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c0c8d8">○</text>

    <!-- 第4行：主动性 -->
    <rect x="0" y="132" width="90" height="32" fill="#eef2f7" rx="2"/>
    <text x="45" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">主动性</text>

    <rect x="90" y="132" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="112" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="135" y="132" width="45" height="32" fill="#fff3cd" rx="2"/>
    <text x="157" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">●</text>

    <rect x="180" y="132" width="45" height="32" fill="#b3d9ff" rx="2"/>
    <text x="202" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">◆</text>

    <rect x="225" y="132" width="45" height="32" fill="#ffffff" rx="2"/>
    <text x="247" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#c0c8d8">○</text>

    <!-- 图例 -->
    <rect x="0" y="178" width="12" height="12" fill="#fff3cd" rx="2"/>
    <text x="16" y="189" font-family="sans-serif" font-size="10" fill="#5a6a8a">初级</text>

    <rect x="58" y="178" width="12" height="12" fill="#b3d9ff" rx="2"/>
    <text x="74" y="189" font-family="sans-serif" font-size="10" fill="#5a6a8a">中级</text>

    <rect x="116" y="178" width="12" height="12" fill="#409EFF" rx="2"/>
    <text x="132" y="189" font-family="sans-serif" font-size="10" fill="#5a6a8a">高级</text>

    <rect x="174" y="178" width="12" height="12" fill="#1a1a2e" rx="2"/>
    <text x="190" y="189" font-family="sans-serif" font-size="10" fill="#5a6a8a">专家</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="475" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7a8aaa">雷达图展示智能体在四个维度上的能力评估结果</text>

</svg>