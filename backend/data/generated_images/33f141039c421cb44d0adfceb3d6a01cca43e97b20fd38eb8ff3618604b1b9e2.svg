<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#409EFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Docker Compose 部署架构图</text>

  <!-- 网络桥接区 -->
  <rect x="60" y="430" width="680" height="50" rx="12" fill="url(#netGrad)" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">agent-network 桥接网络</text>

  <!-- 第1行：agent-api + redis + chromadb -->
  <!-- agent-api -->
  <rect x="60" y="70" width="180" height="110" rx="10" fill="url(#containerGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="60" y="70" width="180" height="30" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">agent-api</text>
  <!-- FastAPI 图标 -->
  <rect x="95" y="108" width="20" height="20" rx="4" fill="#409EFF" opacity="0.3"/>
  <text x="105" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">F</text>
  <text x="125" y="123" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">FastAPI</text>
  <text x="150" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">端口 8000</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">健康检查 ✓</text>

  <!-- redis -->
  <rect x="310" y="70" width="180" height="110" rx="10" fill="url(#containerGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="310" y="70" width="180" height="30" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">redis</text>
  <!-- Redis 立方体图标 -->
  <rect x="345" y="108" width="20" height="20" rx="3" fill="#409EFF" opacity="0.3" transform="rotate(15, 355, 118)"/>
  <text x="375" y="123" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">缓存</text>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">端口 6379</text>
  <text x="400" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">健康检查 ✓</text>

  <!-- chromadb -->
  <rect x="560" y="70" width="180" height="110" rx="10" fill="url(#containerGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="560" y="70" width="180" height="30" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="650" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">chromadb</text>
  <!-- 向量数据库图标 -->
  <rect x="595" y="108" width="20" height="20" rx="4" fill="#409EFF" opacity="0.3"/>
  <text x="605" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">V</text>
  <text x="625" y="123" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">向量库</text>
  <text x="650" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">端口 8001</text>
  <text x="650" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">健康检查 ✓</text>

  <!-- 第2行：celery-worker + celery-beat -->
  <!-- celery-worker -->
  <rect x="125" y="230" width="220" height="110" rx="10" fill="url(#containerGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="125" y="230" width="220" height="30" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="235" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">celery-worker</text>
  <!-- 齿轮图标 -->
  <circle cx="165" cy="275" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
  <circle cx="165" cy="275" r="4" fill="#409EFF" opacity="0.5"/>
  <text x="185" y="280" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">工作节点</text>
  <text x="235" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">副本数 ×2</text>
  <text x="235" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">自动伸缩</text>

  <!-- celery-beat -->
  <rect x="455" y="230" width="220" height="110" rx="10" fill="url(#containerGrad)" stroke="#409EFF" stroke-width="2"/>
  <rect x="455" y="230" width="220" height="30" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="565" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">celery-beat</text>
  <!-- 时钟图标 -->
  <circle cx="495" cy="275" r="10" fill="none" stroke="#409EFF" stroke-width="2"/>
  <line x1="495" y1="275" x2="495" y2="268" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="495" y1="275" x2="501" y2="275" stroke="#409EFF" stroke-width="1.5"/>
  <text x="515" y="280" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">定时调度</text>
  <text x="565" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">Cron 触发器</text>
  <text x="565" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">周期任务</text>

  <!-- 第3行：prometheus + grafana -->
  <!-- prometheus -->
  <rect x="125" y="390" width="220" height="0" rx="0" fill="none"/>
  <rect x="125" y="390" width="220" height="0" rx="0" fill="none"/>

  <!-- 连接线：第1行到第2行 -->
  <line x1="150" y1="180" x2="235" y2="230" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="180" x2="235" y2="230" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="650" y1="180" x2="565" y2="230" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="180" x2="565" y2="230" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 连接线：第2行到网络 -->
  <line x1="235" y1="340" x2="235" y2="430" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="565" y1="340" x2="565" y2="430" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="150" y1="180" x2="150" y2="430" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="400" y1="180" x2="400" y2="430" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="650" y1="180" x2="650" y2="430" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 标注 -->
  <rect x="30" y="195" width="80" height="22" rx="4" fill="#1a1a2e" opacity="0.08"/>
  <text x="70" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">服务层</text>

  <rect x="30" y="355" width="80" height="22" rx="4" fill="#1a1a2e" opacity="0.08"/>
  <text x="70" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">任务层</text>

  <!-- 底部说明 -->
  <text x="400" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.7">容器编排 · 服务发现 · 负载均衡</text>
</svg>