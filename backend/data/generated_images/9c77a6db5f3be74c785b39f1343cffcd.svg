<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EBF9"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F9FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">LoRA 核心洞察 · 记忆公式卡</text>

  <!-- ===== 卡片 1 ===== -->
  <rect x="50" y="60" width="700" height="72" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="82" cy="96" r="16" fill="#409EFF"/>
  <text x="82" y="101" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">1</text>
  <text x="115" y="93" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">低秩假设</text>
  <text x="115" y="115" font-family="sans-serif" font-size="14" fill="#555">权重更新矩阵 ΔW 具有低秩性，可分解为 BA</text>
  <!-- BA 分解图标 -->
  <rect x="580" y="78" width="140" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="650" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF" font-weight="bold">B × A 分解</text>

  <!-- ===== 卡片 2 ===== -->
  <rect x="50" y="150" width="700" height="72" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="82" cy="186" r="16" fill="#409EFF"/>
  <text x="82" y="191" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">2</text>
  <text x="115" y="183" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">冻结 + 旁路</text>
  <text x="115" y="205" font-family="sans-serif" font-size="14" fill="#555">预训练权重冻结，仅训练低秩旁路分支</text>
  <!-- 锁图标 -->
  <rect x="580" y="168" width="60" height="36" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
  <text x="610" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#E65100">🔒 冻结</text>
  <!-- 旁路箭头 -->
  <rect x="655" y="168" width="65" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="687" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">↗ 旁路</text>

  <!-- ===== 卡片 3 ===== -->
  <rect x="50" y="240" width="700" height="72" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="82" cy="276" r="16" fill="#409EFF"/>
  <text x="82" y="281" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">3</text>
  <text x="115" y="273" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">可合并</text>
  <text x="115" y="295" font-family="sans-serif" font-size="14" fill="#555">训练后可与原始权重合并，推理零额外开销</text>
  <!-- 公式图标 -->
  <rect x="580" y="258" width="140" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="650" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF" font-weight="bold">W₀ + BA</text>

  <!-- ===== 卡片 4 ===== -->
  <rect x="50" y="330" width="700" height="72" rx="10" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="82" cy="366" r="16" fill="#409EFF"/>
  <text x="82" y="371" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">4</text>
  <text x="115" y="363" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">可热插拔</text>
  <text x="115" y="385" font-family="sans-serif" font-size="14" fill="#555">不同 LoRA 模块可动态切换，实现多任务适配</text>
  <!-- 插拔图标 -->
  <rect x="580" y="348" width="140" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="650" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#409EFF">🔌 热插拔</text>

  <!-- ===== 黄金法则横幅 ===== -->
  <rect x="50" y="425" width="700" height="50" rx="10" fill="#1a1a2e"/>
  <text x="400" y="455" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFD700">⭐ 黄金法则：r=8 起步 · α=2r · 仅 Q+V · 质量 > 数量</text>

</svg>