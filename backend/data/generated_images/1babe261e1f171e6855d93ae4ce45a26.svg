<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#D4E0EE"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7EC8FF"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8899AA"/>
      <stop offset="100%" stop-color="#A0B0C0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 分割线 -->
  <line x1="400" y1="60" x2="400" y2="460" stroke="#CCD5E0" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- 左侧：工作流（地图导航） -->
  <rect x="20" y="20" width="380" height="460" rx="12" fill="white" fill-opacity="0.85" stroke="#D0D8E0" stroke-width="1.5"/>

  <!-- 左侧标题 -->
  <text x="210" y="58" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">工作流：按已知路径行驶</text>

  <!-- 左侧地图区域 -->
  <rect x="50" y="75" width="320" height="280" rx="8" fill="url(#leftGrad)" fill-opacity="0.3" stroke="#B0C4DE" stroke-width="1"/>

  <!-- 地图网格线 -->
  <g stroke="#C8D4E0" stroke-width="0.5" fill="none">
    <line x1="50" y1="130" x2="370" y2="130"/>
    <line x1="50" y1="185" x2="370" y2="185"/>
    <line x1="50" y1="240" x2="370" y2="240"/>
    <line x1="50" y1="295" x2="370" y2="295"/>
    <line x1="120" y1="75" x2="120" y2="355"/>
    <line x1="190" y1="75" x2="190" y2="355"/>
    <line x1="260" y1="75" x2="260" y2="355"/>
    <line x1="330" y1="75" x2="330" y2="355"/>
  </g>

  <!-- 地图道路 -->
  <g fill="none" stroke="url(#roadGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- 水平道路 -->
    <line x1="80" y1="160" x2="340" y2="160"/>
    <line x1="80" y1="270" x2="340" y2="270"/>
    <!-- 垂直道路 -->
    <line x1="160" y1="100" x2="160" y2="340"/>
    <line x1="280" y1="100" x2="280" y2="340"/>
    <!-- 连接道路 -->
    <line x1="160" y1="160" x2="280" y2="160"/>
    <line x1="280" y1="160" x2="280" y2="270"/>
  </g>

  <!-- 高亮路径 -->
  <path d="M100 270 L160 270 L160 160 L280 160 L280 130" fill="none" stroke="#FF8C42" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3"/>

  <!-- 起点标记 -->
  <circle cx="100" cy="270" r="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="100" y="273" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">起</text>

  <!-- 终点标记 -->
  <circle cx="280" cy="130" r="8" fill="#F44336" stroke="#C62828" stroke-width="2"/>
  <text x="280" y="133" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="bold">终</text>

  <!-- 地图上的路径标注 -->
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666" font-style="italic">固定路线</text>

  <!-- 地图上的小建筑 -->
  <rect x="140" y="100" width="12" height="12" rx="2" fill="#A0B8D0" stroke="#8899AA" stroke-width="0.8"/>
  <rect x="260" y="100" width="12" height="12" rx="2" fill="#A0B8D0" stroke="#8899AA" stroke-width="0.8"/>
  <rect x="140" y="250" width="12" height="12" rx="2" fill="#A0B8D0" stroke="#8899AA" stroke-width="0.8"/>

  <!-- 送货车 -->
  <g transform="translate(190, 148)">
    <rect x="-12" y="-8" width="24" height="14" rx="3" fill="#5C7A9A" stroke="#4A6A8A" stroke-width="1.5"/>
    <rect x="-8" y="-6" width="10" height="6" rx="1" fill="#7EC8FF" opacity="0.6"/>
    <circle cx="-6" cy="8" r="4" fill="#333" stroke="#222" stroke-width="1"/>
    <circle cx="6" cy="8" r="4" fill="#333" stroke="#222" stroke-width="1"/>
  </g>

  <!-- 左侧底部说明框 -->
  <rect x="50" y="370" width="320" height="95" rx="8" fill="#E8EEF5" stroke="#D0D8E0" stroke-width="1"/>
  <text x="210" y="395" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">确定性任务 + 智能体</text>
  <text x="210" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold">= 不必要的成本和延迟</text>
  <text x="210" y="448" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">按图索骥，效率低下</text>

  <!-- 右侧：智能体（指南针导航） -->
  <rect x="400" y="20" width="380" height="460" rx="12" fill="white" fill-opacity="0.85" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 右侧标题 -->
  <text x="590" y="58" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">智能体：寻找自己的路</text>

  <!-- 右侧场景区域 -->
  <rect x="430" y="75" width="320" height="280" rx="8" fill="url(#rightGrad)" fill-opacity="0.12" stroke="#409EFF" stroke-width="1"/>

  <!-- 地形元素 -->
  <!-- 草地 -->
  <rect x="430" y="280" width="320" height="75" rx="0" fill="#7EC8FF" fill-opacity="0.08"/>
  <g fill="#7EC8FF" fill-opacity="0.15">
    <ellipse cx="460" cy="310" rx="20" ry="6"/>
    <ellipse cx="520" cy="320" rx="15" ry="5"/>
    <ellipse cx="580" cy="305" rx="18" ry="5"/>
    <ellipse cx="650" cy="315" rx="22" ry="6"/>
    <ellipse cx="710" cy="308" rx="16" ry="5"/>
  </g>

  <!-- 障碍物 - 岩石 -->
  <ellipse cx="500" cy="260" rx="14" ry="10" fill="#A0B8D0" stroke="#8899AA" stroke-width="1"/>
  <ellipse cx="630" cy="240" rx="12" ry="8" fill="#A0B8D0" stroke="#8899AA" stroke-width="1"/>
  <ellipse cx="560" cy="280" rx="10" ry="7" fill="#B0C8D8" stroke="#99AABB" stroke-width="1"/>

  <!-- 障碍物 - 树木 -->
  <g transform="translate(680, 200)">
    <rect x="-3" y="0" width="6" height="15" fill="#8B6B4A"/>
    <ellipse cx="0" cy="-8" rx="12" ry="14" fill="#5CAD5C" opacity="0.7"/>
  </g>
  <g transform="translate(480, 180)">
    <rect x="-3" y="0" width="6" height="12" fill="#8B6B4A"/>
    <ellipse cx="0" cy="-7" rx="10" ry="12" fill="#5CAD5C" opacity="0.7"/>
  </g>

  <!-- 河流 -->
  <path d="M440 200 Q470 190 500 210 Q530 230 560 200 Q590 170 620 210 Q650 250 680 220" fill="none" stroke="#409EFF" stroke-width="5" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- 目的地星星 -->
  <g transform="translate(710, 100)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,11 0,6 -7,11 -5,2 -12,-4 -3,-4" fill="#FFD700" stroke="#FFA000" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFA000" font-weight="bold">目标</text>
  </g>

  <!-- 指南针 -->
  <g transform="translate(470, 120)">
    <circle cx="0" cy="0" r="22" fill="white" stroke="#409EFF" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#409EFF" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="0,-14 3,-4 -3,-4" fill="#F44336"/>
    <polygon points="0,14 3,4 -3,4" fill="#409EFF"/>
    <circle cx="0" cy="0" r="3" fill="#1a1a2e"/>
    <!-- 指针指向星星 -->
    <line x1="0" y1="0" x2="18" y2="-12" stroke="#FFD700" stroke-width="2" stroke-dasharray="3,2"/>
  </g>

  <!-- 机器人徒步者 -->
  <g transform="translate(540, 260)">
    <!-- 身体 -->
    <rect x="-8" y="-12" width="16" height="18" rx="4" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <!-- 头 -->
    <rect x="-6" y="-22" width="12" height="12" rx="3" fill="#E0F0FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="-3" cy="-18" r="2" fill="#1a1a2e"/>
    <circle cx="3" cy="-18" r="2" fill="#1a1a2e"/>
    <!-- 天线 -->
    <line x1="0" y1="-22" x2="0" y2="-28" stroke="#409EFF" stroke-width="1.5"/>
    <circle cx="0" cy="-29" r="2" fill="#FFD700"/>
    <!-- 手臂 -->
    <line x1="-8" y1="-6" x2="-16" y2="-2" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="-6" x2="16" y2="-10" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="-4" y1="6" x2="-8" y2="16" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="6" x2="10" y2="14" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 背包 -->
    <rect x="-10" y="-10" width="4" height="10" rx="2" fill="#2B7FD4"/>
  </g>

  <!-- 动态路径线 -->
  <path d="M470 140 Q490 180 510 170 Q530 160 540 200 Q550 240 540 260" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.7"/>
  <path d="M540 260 Q560 250 580 230 Q600 210 620 220 Q640 230 660 210 Q680 190 700 150" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.7"/>

  <!-- 适应标注 -->
  <text x="580" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" font-style="italic">动态适应</text>

  <!-- 右侧底部说明框 -->
  <rect x="430" y="370" width="320" height="95" rx="8" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="590" y="395" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">智能体导航：寻找自己的路</text>
  <text x="590" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">灵活应对，高效直达</text>
  <text x="590" y="448" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">自主决策，动态规划</text>

  <!-- 顶部标注 -->
  <rect x="140" y="62" width="120" height="22" rx="11" fill="#E8EEF5" stroke="#B0C4DE" stroke-width="1"/>
  <text x="200" y="77" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">地图导航</text>

  <rect x="540" y="62" width="120" height="22" rx="11" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="600" y="77" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">指南针导航</text>

</svg>