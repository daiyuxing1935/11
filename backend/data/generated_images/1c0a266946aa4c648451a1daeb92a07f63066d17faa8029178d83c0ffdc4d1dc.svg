<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FD4"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7CC4FF"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">多智能体系统安全层架构</text>

  <!-- 外层环 - 智能体权限 (r=175) -->
  <circle cx="400" cy="260" r="175" fill="none" stroke="url(#ringGrad1)" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
  <circle cx="400" cy="260" r="165" fill="none" stroke="url(#ringGrad1)" stroke-width="2" opacity="0.3"/>

  <!-- 中层环 - 数据安全 (r=120) -->
  <circle cx="400" cy="260" r="120" fill="none" stroke="url(#ringGrad2)" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
  <circle cx="400" cy="260" r="112" fill="none" stroke="url(#ringGrad2)" stroke-width="2" opacity="0.3"/>

  <!-- 内层环 - 输入/输出过滤 (r=65) -->
  <circle cx="400" cy="260" r="65" fill="none" stroke="url(#ringGrad3)" stroke-width="3" stroke-dasharray="4,4" opacity="0.7"/>
  <circle cx="400" cy="260" r="58" fill="none" stroke="url(#ringGrad3)" stroke-width="2" opacity="0.3"/>

  <!-- 环标签 -->
  <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#409EFF">智能体权限</text>
  <text x="400" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">最小权限原则</text>

  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2B7FD4">数据安全</text>

  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5AB0FF">输入/输出过滤</text>

  <!-- === 外层环：智能体权限 元素 === -->

  <!-- 智能体1 - 左上 -->
  <g transform="translate(270, 140)">
    <rect x="-52" y="-22" width="104" height="44" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <circle cx="-36" cy="0" r="12" fill="#409EFF" opacity="0.15"/>
    <text x="-36" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">🤖</text>
    <text x="-18" y="-4" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">Agent A</text>
    <text x="-18" y="12" font-family="Arial, sans-serif" font-size="10" fill="#666">工具: 搜索, 读取</text>
  </g>

  <!-- 智能体2 - 右上 -->
  <g transform="translate(530, 140)">
    <rect x="-52" y="-22" width="104" height="44" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <circle cx="-36" cy="0" r="12" fill="#409EFF" opacity="0.15"/>
    <text x="-36" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">🤖</text>
    <text x="-18" y="-4" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">Agent B</text>
    <text x="-18" y="12" font-family="Arial, sans-serif" font-size="10" fill="#666">工具: 写入, 分析</text>
  </g>

  <!-- 智能体3 - 左下 -->
  <g transform="translate(270, 370)">
    <rect x="-52" y="-22" width="104" height="44" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <circle cx="-36" cy="0" r="12" fill="#409EFF" opacity="0.15"/>
    <text x="-36" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">🤖</text>
    <text x="-18" y="-4" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">Agent C</text>
    <text x="-18" y="12" font-family="Arial, sans-serif" font-size="10" fill="#666">工具: 数据库查询</text>
  </g>

  <!-- 智能体4 - 右下 -->
  <g transform="translate(530, 370)">
    <rect x="-52" y="-22" width="104" height="44" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(64,158,255,0.15))"/>
    <circle cx="-36" cy="0" r="12" fill="#409EFF" opacity="0.15"/>
    <text x="-36" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF" font-weight="bold">🤖</text>
    <text x="-18" y="-4" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">Agent D</text>
    <text x="-18" y="12" font-family="Arial, sans-serif" font-size="10" fill="#666">工具: 文件传输</text>
  </g>

  <!-- === 中层环：数据安全 元素 === -->

  <!-- 加密锁图标 -->
  <g transform="translate(340, 180)">
    <rect x="-28" y="-18" width="56" height="36" rx="6" fill="white" stroke="#2B7FD4" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(43,127,212,0.15))"/>
    <rect x="-8" y="-10" width="16" height="12" rx="2" fill="#2B7FD4" opacity="0.3"/>
    <rect x="-4" y="-6" width="8" height="6" rx="1" fill="#2B7FD4"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2B7FD4">加密</text>
  </g>

  <!-- API密钥 -->
  <g transform="translate(460, 180)">
    <rect x="-30" y="-18" width="60" height="36" rx="6" fill="white" stroke="#2B7FD4" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(43,127,212,0.15))"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" font-weight="bold">API密钥</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">环境隔离</text>
  </g>

  <!-- 审计日志 -->
  <g transform="translate(340, 340)">
    <rect x="-28" y="-18" width="56" height="36" rx="6" fill="white" stroke="#2B7FD4" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(43,127,212,0.15))"/>
    <rect x="-18" y="-12" width="8" height="10" rx="1" fill="#2B7FD4" opacity="0.4"/>
    <rect x="-6" y="-12" width="8" height="10" rx="1" fill="#2B7FD4" opacity="0.6"/>
    <rect x="6" y="-12" width="8" height="10" rx="1" fill="#2B7FD4" opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2B7FD4">审计日志</text>
  </g>

  <!-- 数据保留计时器 -->
  <g transform="translate(460, 340)">
    <rect x="-28" y="-18" width="56" height="36" rx="6" fill="white" stroke="#2B7FD4" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(43,127,212,0.15))"/>
    <circle cx="0" cy="-4" r="8" fill="none" stroke="#2B7FD4" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="-9" stroke="#2B7FD4" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="4" y2="-4" stroke="#2B7FD4" stroke-width="1.5"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2B7FD4">保留定时</text>
  </g>

  <!-- === 内层环：输入/输出过滤 元素 === -->

  <!-- 输入验证 - 盾牌 -->
  <g transform="translate(370, 240)">
    <rect x="-30" y="-18" width="60" height="36" rx="6" fill="white" stroke="#5AB0FF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(90,176,255,0.15))"/>
    <path d="M0,-12 L8,-8 L8,0 Q8,6 0,10 Q-8,6 -8,0 L-8,-8 Z" fill="#5AB0FF" opacity="0.3" stroke="#5AB0FF" stroke-width="1"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5AB0FF">输入验证</text>
  </g>

  <!-- 输出过滤 -->
  <g transform="translate(440, 260)">
    <rect x="-30" y="-18" width="60" height="36" rx="6" fill="white" stroke="#5AB0FF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(90,176,255,0.15))"/>
    <rect x="-12" y="-12" width="24" height="16" rx="2" fill="#5AB0FF" opacity="0.15"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#5AB0FF" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#5AB0FF" stroke-width="1.5"/>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5AB0FF">输出过滤</text>
  </g>

  <!-- Prompt注入防御 -->
  <g transform="translate(370, 290)">
    <rect x="-30" y="-18" width="60" height="36" rx="6" fill="white" stroke="#5AB0FF" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(90,176,255,0.15))"/>
    <rect x="-12" y="-12" width="24" height="16" rx="2" fill="#5AB0FF" opacity="0.15"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">防火墙</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5AB0FF">Prompt防御</text>
  </g>

  <!-- 中心图标 -->
  <circle cx="400" cy="260" r="18" fill="#409EFF" opacity="0.1"/>
  <text x="400" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#409EFF">🔒</text>

  <!-- 图例 -->
  <g transform="translate(30, 460)">
    <rect x="0" y="0" width="740" height="30" rx="6" fill="white" stroke="#E0E8F0" stroke-width="1" opacity="0.8"/>
    <circle cx="20" cy="15" r="5" fill="#409EFF"/>
    <text x="30" y="19" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">智能体权限层</text>
    <circle cx="180" cy="15" r="5" fill="#2B7FD4"/>
    <text x="190" y="19" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">数据安全层</text>
    <circle cx="340" cy="15" r="5" fill="#5AB0FF"/>
    <text x="350" y="19" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">输入/输出过滤层</text>
    <text x="530" y="19" font-family="Arial, sans-serif" font-size="11" fill="#999">多智能体系统安全防护</text>
  </g>

</svg>