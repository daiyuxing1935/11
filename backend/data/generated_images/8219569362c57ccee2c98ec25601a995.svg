<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <rect x="200" y="12" width="400" height="36" rx="18" fill="url(#headerGrad)"/>
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">静态 vs 动态角色分配对比</text>

  <!-- ===== 左侧：静态分配 ===== -->
  <rect x="30" y="65" width="350" height="190" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  <rect x="30" y="65" width="350" height="32" rx="10" fill="#409EFF"/>
  <rect x="30" y="85" width="350" height="12" fill="#409EFF"/>
  <text x="205" y="86" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">静态分配</text>

  <!-- 三个角色方框 -->
  <rect x="55" y="112" width="140" height="40" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1.5"/>
  <text x="125" y="137" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">🔬 研究员</text>

  <rect x="215" y="112" width="140" height="40" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1.5"/>
  <text x="285" y="137" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">✍️ 写作者</text>

  <rect x="135" y="167" width="140" height="40" rx="6" fill="#e8f2fb" stroke="#409EFF" stroke-width="1.5"/>
  <text x="205" y="192" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">📋 编辑者</text>

  <!-- 静态标签 -->
  <text x="205" y="240" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">任务固定 · 行为可预测 · 调试简单</text>

  <!-- ===== 右侧：动态分配 ===== -->
  <rect x="420" y="65" width="350" height="220" rx="10" fill="#ffffff" stroke="#409EFF" stroke-width="2" opacity="0.95"/>
  <rect x="420" y="65" width="350" height="32" rx="10" fill="#1a1a2e"/>
  <rect x="420" y="85" width="350" height="12" fill="#1a1a2e"/>
  <text x="595" y="86" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">动态分配</text>

  <!-- 流程步骤 -->
  <!-- 步骤1：任务分析 -->
  <rect x="445" y="108" width="150" height="34" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="520" y="130" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">分析任务需求</text>
  <text x="520" y="108" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">①</text>

  <!-- 箭头1 -->
  <polygon points="600,125 615,125 615,121 628,127 615,133 615,129 600,129" fill="#409EFF"/>

  <!-- 步骤2：决定角色 -->
  <rect x="632" y="108" width="120" height="34" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="692" y="130" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">决定角色配置</text>
  <text x="692" y="108" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">②</text>

  <!-- 步骤3：动态创建 -->
  <rect x="445" y="155" width="150" height="34" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="520" y="177" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">动态创建智能体</text>
  <text x="520" y="155" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">③</text>

  <!-- 箭头2 -->
  <polygon points="600,172 615,172 615,168 628,174 615,180 615,176 600,176" fill="#409EFF"/>

  <!-- 步骤4：执行任务 -->
  <rect x="632" y="155" width="120" height="34" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="692" y="177" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">智能体执行任务</text>
  <text x="692" y="155" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">④</text>

  <!-- 步骤5：释放角色 -->
  <rect x="540" y="202" width="120" height="34" rx="6" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
  <text x="600" y="224" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">释放角色资源</text>
  <text x="600" y="202" text-anchor="middle" fill="#409EFF" font-size="11" font-weight="bold" font-family="sans-serif">⑤</text>

  <!-- 动态标签 -->
  <text x="595" y="255" text-anchor="middle" fill="#1a1a2e" font-size="13" font-family="sans-serif">任务多样 · 灵活响应 · 管理复杂</text>

  <!-- ===== 对比表格 ===== -->
  <rect x="30" y="275" width="740" height="210" rx="8" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>

  <!-- 表头 -->
  <rect x="30" y="275" width="740" height="32" rx="8" fill="#409EFF"/>
  <rect x="30" y="295" width="740" height="12" fill="#409EFF"/>
  <text x="400" y="296" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">对比维度</text>

  <!-- 表头列 -->
  <line x1="276" y1="275" x2="276" y2="485" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  <line x1="536" y1="275" x2="536" y2="485" stroke="#409EFF" stroke-width="1" opacity="0.4"/>

  <text x="158" y="325" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">复杂性</text>
  <text x="406" y="325" text-anchor="middle" fill="#409EFF" font-size="14" font-family="sans-serif">低</text>
  <text x="666" y="325" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="sans-serif">高</text>

  <line x1="30" y1="340" x2="770" y2="340" stroke="#e8f2fb" stroke-width="1"/>

  <text x="158" y="365" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">灵活性</text>
  <text x="406" y="365" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="sans-serif">低</text>
  <text x="666" y="365" text-anchor="middle" fill="#409EFF" font-size="14" font-family="sans-serif">高</text>

  <line x1="30" y1="380" x2="770" y2="380" stroke="#e8f2fb" stroke-width="1"/>

  <text x="158" y="405" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">可预测性</text>
  <text x="406" y="405" text-anchor="middle" fill="#409EFF" font-size="14" font-family="sans-serif">高</text>
  <text x="666" y="405" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="sans-serif">低</text>

  <line x1="30" y1="420" x2="770" y2="420" stroke="#e8f2fb" stroke-width="1"/>

  <text x="158" y="445" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">调试难度</text>
  <text x="406" y="445" text-anchor="middle" fill="#409EFF" font-size="14" font-family="sans-serif">简单</text>
  <text x="666" y="445" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="sans-serif">困难</text>

  <line x1="30" y1="460" x2="770" y2="460" stroke="#e8f2fb" stroke-width="1"/>

  <text x="158" y="485" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">资源效率</text>
  <text x="406" y="485" text-anchor="middle" fill="#1a1a2e" font-size="14" font-family="sans-serif">中等</text>
  <text x="666" y="485" text-anchor="middle" fill="#409EFF" font-size="14" font-family="sans-serif">高</text>

  <!-- 列标签 -->
  <text x="158" y="298" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">维度</text>
  <text x="406" y="298" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">静态分配</text>
  <text x="666" y="298" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">动态分配</text>

  <!-- 底部小标签 -->
  <text x="400" y="495" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif" opacity="0.7">平面设计 2D 矢量插图 · 科技蓝主题</text>
</svg>