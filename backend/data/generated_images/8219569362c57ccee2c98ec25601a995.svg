<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6E9FF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">静态 vs 动态角色分配</text>

  <!-- ===== 左侧：静态 ===== -->
  <rect x="30" y="50" width="350" height="195" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="50" width="350" height="32" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="205" y="71" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">静态分配</text>

  <!-- 三个角色图标 -->
  <rect x="55" y="95" width="90" height="60" rx="8" fill="url(#blueGrad)" opacity="0.85"/>
  <text x="100" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="sans-serif">研究员</text>
  <text x="100" y="140" text-anchor="middle" font-size="10" fill="white" opacity="0.9" font-family="sans-serif">🔬 固定角色</text>

  <rect x="160" y="95" width="90" height="60" rx="8" fill="url(#blueGrad)" opacity="0.85"/>
  <text x="205" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="sans-serif">写作者</text>
  <text x="205" y="140" text-anchor="middle" font-size="10" fill="white" opacity="0.9" font-family="sans-serif">✍️ 固定角色</text>

  <rect x="265" y="95" width="90" height="60" rx="8" fill="url(#blueGrad)" opacity="0.85"/>
  <text x="310" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="sans-serif">编辑者</text>
  <text x="310" y="140" text-anchor="middle" font-size="10" fill="white" opacity="0.9" font-family="sans-serif">📋 固定角色</text>

  <!-- 箭头：启动时分配 -->
  <text x="205" y="175" text-anchor="middle" font-size="11" fill="#1a1a2e" font-family="sans-serif">启动时分配 → 全程不变</text>

  <!-- 标注 -->
  <rect x="55" y="190" width="300" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.5"/>
  <text x="205" y="205" text-anchor="middle" font-size="11" fill="#1a1a2e" font-family="sans-serif">固定任务 · 可预测行为 · 简单调试</text>

  <!-- 标签：静态 -->
  <rect x="55" y="218" width="60" height="18" rx="9" fill="#409EFF" opacity="0.2"/>
  <text x="85" y="231" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">静态</text>

  <!-- ===== 右侧：动态 ===== -->
  <rect x="420" y="50" width="350" height="195" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="420" y="50" width="350" height="32" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="595" y="71" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">动态分配</text>

  <!-- 流程步骤 -->
  <!-- 步骤1：系统分析任务 -->
  <rect x="440" y="92" width="60" height="28" rx="6" fill="#409EFF" opacity="0.2"/>
  <text x="470" y="110" text-anchor="middle" font-size="10" fill="#1a1a2e" font-weight="bold" font-family="sans-serif">分析任务</text>

  <!-- 箭头1 -->
  <text x="508" y="110" text-anchor="middle" font-size="12" fill="#409EFF">→</text>

  <!-- 步骤2：决策 -->
  <rect x="520" y="92" width="80" height="28" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="560" y="110" text-anchor="middle" font-size="10" fill="#1a1a2e" font-weight="bold" font-family="sans-serif">决策：3分析+1合成</text>

  <!-- 箭头2 -->
  <text x="608" y="110" text-anchor="middle" font-size="12" fill="#409EFF">→</text>

  <!-- 步骤3：动态创建 -->
  <rect x="620" y="92" width="70" height="28" rx="6" fill="#409EFF" opacity="0.5"/>
  <text x="655" y="110" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">动态创建</text>

  <!-- 步骤4：执行任务 -->
  <rect x="700" y="92" width="50" height="28" rx="6" fill="#409EFF" opacity="0.65"/>
  <text x="725" y="110" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">执行</text>

  <!-- 动态角色示例 -->
  <rect x="440" y="130" width="55" height="40" rx="6" fill="#409EFF" opacity="0.7"/>
  <text x="467" y="150" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">分析A</text>
  <text x="467" y="163" text-anchor="middle" font-size="8" fill="white" opacity="0.9" font-family="sans-serif">动态</text>

  <rect x="502" y="130" width="55" height="40" rx="6" fill="#409EFF" opacity="0.7"/>
  <text x="529" y="150" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">分析B</text>
  <text x="529" y="163" text-anchor="middle" font-size="8" fill="white" opacity="0.9" font-family="sans-serif">动态</text>

  <rect x="564" y="130" width="55" height="40" rx="6" fill="#409EFF" opacity="0.7"/>
  <text x="591" y="150" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">分析C</text>
  <text x="591" y="163" text-anchor="middle" font-size="8" fill="white" opacity="0.9" font-family="sans-serif">动态</text>

  <rect x="626" y="130" width="55" height="40" rx="6" fill="#6BB5FF" opacity="0.8"/>
  <text x="653" y="150" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">合成</text>
  <text x="653" y="163" text-anchor="middle" font-size="8" fill="white" opacity="0.9" font-family="sans-serif">动态</text>

  <!-- 释放角色 -->
  <text x="720" y="155" text-anchor="middle" font-size="10" fill="#1a1a2e" font-family="sans-serif">→ 释放</text>

  <!-- 标注 -->
  <rect x="440" y="180" width="310" height="22" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="0.5"/>
  <text x="595" y="195" text-anchor="middle" font-size="11" fill="#1a1a2e" font-family="sans-serif">多样化任务 · 灵活响应 · 复杂管理</text>

  <!-- 标签：动态 -->
  <rect x="440" y="210" width="60" height="18" rx="9" fill="#409EFF" opacity="0.35"/>
  <text x="470" y="223" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">动态</text>

  <!-- ===== 对比表 ===== -->
  <rect x="30" y="265" width="740" height="220" rx="10" fill="white" stroke="#409EFF" stroke-width="1.2" opacity="0.95"/>

  <!-- 表头 -->
  <rect x="30" y="265" width="740" height="32" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="400" y="286" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">对比维度</text>

  <!-- 维度列 -->
  <text x="120" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">维度</text>
  <text x="350" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">静态分配</text>
  <text x="580" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e" font-family="sans-serif">动态分配</text>

  <!-- 分隔线 -->
  <line x1="30" y1="297" x2="770" y2="297" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>

  <!-- 行1：复杂度 -->
  <text x="120" y="322" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">复杂度</text>
  <text x="350" y="322" text-anchor="middle" font-size="13" fill="#409EFF" font-family="sans-serif">低 ⭐</text>
  <text x="580" y="322" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">高 ⭐⭐⭐</text>
  <line x1="30" y1="332" x2="770" y2="332" stroke="#E8F4FD" stroke-width="0.5"/>

  <!-- 行2：灵活性 -->
  <text x="120" y="352" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">灵活性</text>
  <text x="350" y="352" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">低 ⭐</text>
  <text x="580" y="352" text-anchor="middle" font-size="13" fill="#409EFF" font-family="sans-serif">高 ⭐⭐⭐</text>
  <line x1="30" y1="362" x2="770" y2="362" stroke="#E8F4FD" stroke-width="0.5"/>

  <!-- 行3：可预测性 -->
  <text x="120" y="382" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">可预测性</text>
  <text x="350" y="382" text-anchor="middle" font-size="13" fill="#409EFF" font-family="sans-serif">高 ⭐⭐⭐</text>
  <text x="580" y="382" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">低 ⭐</text>
  <line x1="30" y1="392" x2="770" y2="392" stroke="#E8F4FD" stroke-width="0.5"/>

  <!-- 行4：调试难度 -->
  <text x="120" y="412" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">调试难度</text>
  <text x="350" y="412" text-anchor="middle" font-size="13" fill="#409EFF" font-family="sans-serif">简单 ⭐</text>
  <text x="580" y="412" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">困难 ⭐⭐⭐</text>
  <line x1="30" y1="422" x2="770" y2="422" stroke="#E8F4FD" stroke-width="0.5"/>

  <!-- 行5：资源效率 -->
  <text x="120" y="442" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">资源效率</text>
  <text x="350" y="442" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">中 ⭐⭐</text>
  <text x="580" y="442" text-anchor="middle" font-size="13" fill="#409EFF" font-family="sans-serif">高 ⭐⭐⭐</text>

  <!-- 底部装饰线 -->
  <line x1="30" y1="460" x2="770" y2="460" stroke="#409EFF" stroke-width="0.5" opacity="0.2"/>

  <!-- 图例 -->
  <rect x="30" y="470" width="12" height="12" rx="2" fill="#409EFF" opacity="0.7"/>
  <text x="48" y="480" font-size="10" fill="#1a1a2e" font-family="sans-serif">静态</text>
  <rect x="100" y="470" width="12" height="12" rx="2" fill="#6BB5FF" opacity="0.8"/>
  <text x="118" y="480" font-size="10" fill="#1a1a2e" font-family="sans-serif">动态</text>

  <!-- 标注：最多6个，每个3-6字 -->
  <!-- 标注1 -->
  <rect x="440" y="218" width="70" height="18" rx="9" fill="#409EFF" opacity="0.15"/>
  <text x="475" y="231" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">按需创建</text>

  <!-- 标注2 -->
  <rect x="520" y="218" width="70" height="18" rx="9" fill="#409EFF" opacity="0.15"/>
  <text x="555" y="231" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">灵活配置</text>

  <!-- 标注3 -->
  <rect x="600" y="218" width="70" height="18" rx="9" fill="#409EFF" opacity="0.15"/>
  <text x="635" y="231" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">任务驱动</text>

  <!-- 标注4 -->
  <rect x="55" y="240" width="70" height="18" rx="9" fill="#409EFF" opacity="0.1"/>
  <text x="90" y="253" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">角色固定</text>

  <!-- 标注5 -->
  <rect x="140" y="240" width="70" height="18" rx="9" fill="#409EFF" opacity="0.1"/>
  <text x="175" y="253" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">无需调度</text>

  <!-- 标注6 -->
  <rect x="225" y="240" width="70" height="18" rx="9" fill="#409EFF" opacity="0.1"/>
  <text x="260" y="253" text-anchor="middle" font-size="10" fill="#409EFF" font-weight="bold" font-family="sans-serif">简单直接</text>

</svg>