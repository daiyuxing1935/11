<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">两种实现方案对比</text>

  <!-- ==================== 上半部分：内存队列 ==================== -->
  <!-- 区域背景 -->
  <rect x="30" y="52" width="740" height="195" rx="10" fill="white" fill-opacity="0.7" stroke="#409EFF" stroke-opacity="0.2" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 区域标签 -->
  <text x="50" y="78" font-size="15" font-weight="bold" fill="#1a1a2e">方案一：内存队列（轻量）</text>
  <text x="50" y="98" font-size="13" fill="#666">适用于单进程多 Agent 系统</text>

  <!-- 进程框 -->
  <rect x="50" y="115" width="280" height="115" rx="10" fill="url(#boxGrad1)" filter="url(#shadow)"/>
  <text x="190" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="white">单进程</text>

  <!-- Agent 1 -->
  <rect x="70" y="155" width="70" height="35" rx="6" fill="white" fill-opacity="0.9"/>
  <text x="105" y="177" text-anchor="middle" font-size="13" fill="#1a1a2e">Agent 1</text>

  <!-- Agent 2 -->
  <rect x="155" y="155" width="70" height="35" rx="6" fill="white" fill-opacity="0.9"/>
  <text x="190" y="177" text-anchor="middle" font-size="13" fill="#1a1a2e">Agent 2</text>

  <!-- Agent 3 -->
  <rect x="240" y="155" width="70" height="35" rx="6" fill="white" fill-opacity="0.9"/>
  <text x="275" y="177" text-anchor="middle" font-size="13" fill="#1a1a2e">Agent 3</text>

  <!-- 队列框 -->
  <rect x="370" y="125" width="180" height="95" rx="10" fill="white" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="460" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#409EFF">queue.Queue</text>
  <text x="460" y="175" text-anchor="middle" font-size="12" fill="#409EFF">+ threading.Lock</text>
  <text x="460" y="198" text-anchor="middle" font-size="12" fill="#666">线程安全队列</text>

  <!-- 从进程到队列的箭头 -->
  <line x1="330" y1="155" x2="368" y2="155" stroke="#1a1a2e" stroke-width="1.8" marker-end="url(#arrowDark)"/>
  <line x1="330" y1="175" x2="368" y2="175" stroke="#1a1a2e" stroke-width="1.8" marker-end="url(#arrowDark)"/>
  <line x1="330" y1="195" x2="368" y2="195" stroke="#1a1a2e" stroke-width="1.8" marker-end="url(#arrowDark)"/>

  <!-- 标注 1 -->
  <rect x="365" y="222" width="80" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="405" y="236" text-anchor="middle" font-size="12" fill="#409EFF">线程安全</text>

  <!-- ==================== 分隔线 ==================== -->
  <line x1="60" y1="258" x2="740" y2="258" stroke="#409EFF" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- ==================== 下半部分：Redis 分布式 ==================== -->
  <!-- 区域背景 -->
  <rect x="30" y="270" width="740" height="215" rx="10" fill="white" fill-opacity="0.7" stroke="#409EFF" stroke-opacity="0.2" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 区域标签 -->
  <text x="50" y="296" font-size="15" font-weight="bold" fill="#1a1a2e">方案二：Redis（分布式）</text>
  <text x="50" y="316" font-size="13" fill="#666">适用于跨进程、跨服务器系统</text>

  <!-- 服务器 1 -->
  <rect x="50" y="335" width="200" height="130" rx="10" fill="url(#boxGrad2)" filter="url(#shadow)"/>
  <text x="150" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="white">服务器 1</text>

  <rect x="65" y="375" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="97" y="395" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent A</text>

  <rect x="140" y="375" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="172" y="395" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent B</text>

  <rect x="65" y="418" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="97" y="438" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent C</text>

  <!-- 服务器 2 -->
  <rect x="300" y="335" width="200" height="130" rx="10" fill="url(#boxGrad2)" filter="url(#shadow)"/>
  <text x="400" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="white">服务器 2</text>

  <rect x="315" y="375" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="347" y="395" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent D</text>

  <rect x="390" y="375" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="422" y="395" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent E</text>

  <rect x="315" y="418" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="347" y="438" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent F</text>

  <!-- 服务器 3 -->
  <rect x="550" y="335" width="200" height="130" rx="10" fill="url(#boxGrad2)" filter="url(#shadow)"/>
  <text x="650" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="white">服务器 3</text>

  <rect x="565" y="375" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="597" y="395" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent G</text>

  <rect x="640" y="375" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="672" y="395" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent H</text>

  <rect x="565" y="418" width="65" height="32" rx="5" fill="white" fill-opacity="0.85"/>
  <text x="597" y="438" text-anchor="middle" font-size="12" fill="#1a1a2e">Agent I</text>

  <!-- Redis 中心 -->
  <rect x="250" y="452" width="300" height="24" rx="12" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="469" text-anchor="middle" font-size="13" font-weight="bold" fill="#409EFF">Redis Pub/Sub 通道 + 持久化列表</text>

  <!-- 发布/订阅箭头 -->
  <!-- 服务器1 -> Redis -->
  <path d="M 150 465 L 248 465" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
  <!-- Redis -> 服务器2 -->
  <path d="M 400 450 L 400 337" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
  <!-- Redis -> 服务器3 -->
  <path d="M 552 465 L 650 465" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>

  <!-- 标注 2 -->
  <rect x="600" y="315" width="75" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="637" y="329" text-anchor="middle" font-size="12" fill="#409EFF">发布/订阅</text>

  <!-- 标注 3 -->
  <rect x="440" y="315" width="75" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="477" y="329" text-anchor="middle" font-size="12" fill="#409EFF">跨进程通信</text>

  <!-- 标注 4 -->
  <rect x="80" y="470" width="70" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="115" y="484" text-anchor="middle" font-size="12" fill="#409EFF">消息推送</text>

  <!-- 标注 5 -->
  <rect x="490" y="470" width="70" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="525" y="484" text-anchor="middle" font-size="12" fill="#409EFF">消息订阅</text>

  <!-- 标注 6 -->
  <rect x="330" y="222" width="70" height="20" rx="4" fill="#409EFF" fill-opacity="0.12"/>
  <text x="365" y="236" text-anchor="middle" font-size="12" fill="#409EFF">轻量级</text>
</svg>