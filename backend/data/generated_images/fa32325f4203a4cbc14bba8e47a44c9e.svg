<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 人物（左侧） -->
  <g transform="translate(130, 180)">
    <!-- 身体 -->
    <rect x="-18" y="30" width="36" height="55" rx="10" fill="#409EFF" opacity="0.85"/>
    <!-- 头部 -->
    <circle cx="0" cy="10" r="22" fill="#409EFF" opacity="0.85"/>
    <!-- 手臂（指向思维气泡） -->
    <line x1="18" y1="45" x2="55" y2="35" stroke="#409EFF" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <line x1="-18" y1="45" x2="-40" y2="55" stroke="#409EFF" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <!-- 腿部 -->
    <line x1="-10" y1="85" x2="-15" y2="115" stroke="#409EFF" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <line x1="10" y1="85" x2="15" y2="115" stroke="#409EFF" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- 大思维气泡 -->
  <g filter="url(#shadow)">
    <ellipse cx="370" cy="150" rx="155" ry="95" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2.5" opacity="0.95"/>
    <!-- 气泡连接点 -->
    <circle cx="230" cy="195" r="6" fill="#409EFF" opacity="0.6"/>
    <line x1="236" y1="195" x2="270" y2="195" stroke="#409EFF" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- 大问号（复杂） -->
  <g transform="translate(370, 140)">
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#409EFF" opacity="0.3">?</text>
    <!-- 装饰性问号细节 -->
    <circle cx="0" cy="-25" r="20" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.15"/>
    <circle cx="0" cy="-25" r="28" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.08"/>
  </g>

  <!-- 四个小气泡链 -->
  <!-- 气泡1 -->
  <g filter="url(#shadow)">
    <ellipse cx="370" cy="280" rx="52" ry="32" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2"/>
    <text x="370" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">分解</text>
  </g>

  <!-- 连接线 1-2 -->
  <line x1="422" y1="280" x2="478" y2="280" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="450" cy="280" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 气泡2 -->
  <g filter="url(#shadow)">
    <ellipse cx="530" cy="280" rx="52" ry="32" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2"/>
    <text x="530" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">简化</text>
  </g>

  <!-- 连接线 2-3 -->
  <line x1="582" y1="280" x2="582" y2="200" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="582" cy="240" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 气泡3 -->
  <g filter="url(#shadow)">
    <ellipse cx="582" cy="160" rx="52" ry="32" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2"/>
    <text x="582" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">分析</text>
  </g>

  <!-- 连接线 3-4 -->
  <line x1="634" y1="160" x2="634" y2="280" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="634" cy="220" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 气泡4 -->
  <g filter="url(#shadow)">
    <ellipse cx="634" cy="320" rx="52" ry="32" fill="url(#bubbleGrad)" stroke="#409EFF" stroke-width="2"/>
    <text x="634" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">解决</text>
  </g>

  <!-- 最终答案：灯泡 + 对勾 -->
  <g transform="translate(634, 380)" filter="url(#shadow)">
    <!-- 灯泡 -->
    <ellipse cx="0" cy="-8" rx="18" ry="22" fill="#FFF3CD" stroke="#FFC107" stroke-width="2"/>
    <rect x="-6" y="14" width="12" height="6" rx="2" fill="#FFC107" opacity="0.7"/>
    <line x1="-4" y1="20" x2="-4" y2="26" stroke="#FFC107" stroke-width="1.5"/>
    <line x1="4" y1="20" x2="4" y2="26" stroke="#FFC107" stroke-width="1.5"/>
    <!-- 灯泡内发光 -->
    <circle cx="0" cy="-8" r="10" fill="#FFE082" opacity="0.4"/>
    <!-- 对勾 -->
    <path d="M-8,-4 L-2,4 L10,-10" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 连接线 4 到灯泡 -->
  <line x1="634" y1="352" x2="634" y2="370" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="634" cy="361" r="4" fill="#409EFF" opacity="0.5"/>

  <!-- 拼图碎片装饰 -->
  <g transform="translate(370, 280)" opacity="0.15">
    <rect x="-15" y="-8" width="10" height="10" rx="2" fill="#409EFF"/>
    <rect x="-3" y="-8" width="10" height="10" rx="2" fill="#409EFF"/>
    <rect x="-15" y="4" width="10" height="10" rx="2" fill="#409EFF"/>
    <rect x="-3" y="4" width="10" height="10" rx="2" fill="#409EFF"/>
  </g>

  <!-- 标注 -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">
    <!-- 标注1 -->
    <text x="370" y="340" text-anchor="middle" font-weight="bold">步骤拆解</text>

    <!-- 标注2 -->
    <text x="530" y="340" text-anchor="middle" font-weight="bold">化繁为简</text>

    <!-- 标注3 -->
    <text x="582" y="120" text-anchor="middle" font-weight="bold">逻辑分析</text>

    <!-- 标注4 -->
    <text x="634" y="370" text-anchor="middle" font-size="12" fill="#666">得出答案</text>

    <!-- 标注5 -->
    <text x="130" y="330" text-anchor="middle" font-weight="bold">思考者</text>

    <!-- 标注6 -->
    <text x="370" y="100" text-anchor="middle" font-size="13" fill="#666" font-style="italic">复杂问题</text>
  </g>

  <!-- 标题 -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e" letter-spacing="2">分步思考 · 化繁为简</text>

  <!-- 装饰性小点 -->
  <circle cx="50" cy="50" r="3" fill="#409EFF" opacity="0.12"/>
  <circle cx="750" cy="60" r="4" fill="#409EFF" opacity="0.1"/>
  <circle cx="40" cy="440" r="3" fill="#409EFF" opacity="0.12"/>
  <circle cx="760" cy="430" r="3" fill="#409EFF" opacity="0.1"/>
</svg>