<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE3"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#6BCB77"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">共识构建算法</text>

  <!-- ========== 面板1：逐步趋同 ========== -->
  <rect x="20" y="55" width="240" height="200" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
  <text x="140" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">逐步趋同</text>

  <!-- 第1轮 -->
  <text x="40" y="105" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">第1轮</text>
  <circle cx="80" cy="120" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="100" cy="115" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="120" cy="130" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="140" cy="110" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="160" cy="125" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="180" cy="118" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="200" cy="132" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="220" cy="115" r="4" fill="#409EFF" opacity="0.7"/>
  <circle cx="240" cy="128" r="4" fill="#409EFF" opacity="0.7"/>

  <!-- 箭头1 -->
  <text x="140" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">↓</text>

  <!-- 第2轮 -->
  <text x="40" y="165" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">第2轮</text>
  <circle cx="90" cy="178" r="4" fill="#409EFF" opacity="0.85"/>
  <circle cx="110" cy="175" r="4" fill="#409EFF" opacity="0.85"/>
  <circle cx="130" cy="182" r="4" fill="#409EFF" opacity="0.85"/>
  <circle cx="150" cy="176" r="4" fill="#409EFF" opacity="0.85"/>
  <circle cx="170" cy="180" r="4" fill="#409EFF" opacity="0.85"/>
  <circle cx="190" cy="174" r="4" fill="#409EFF" opacity="0.85"/>
  <circle cx="210" cy="179" r="4" fill="#409EFF" opacity="0.85"/>

  <!-- 箭头2 -->
  <text x="140" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">↓</text>

  <!-- 第3轮 -->
  <text x="40" y="218" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">第3轮</text>
  <circle cx="110" cy="232" r="4" fill="#409EFF"/>
  <circle cx="130" cy="230" r="4" fill="#409EFF"/>
  <circle cx="150" cy="233" r="4" fill="#409EFF"/>
  <circle cx="170" cy="229" r="4" fill="#409EFF"/>
  <circle cx="190" cy="232" r="4" fill="#409EFF"/>

  <!-- 共识标记 -->
  <circle cx="150" cy="245" r="8" fill="none" stroke="#6BCB77" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ========== 面板2：德尔菲法 ========== -->
  <rect x="280" y="55" width="240" height="200" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">德尔菲法</text>

  <!-- 屏风1 -->
  <rect x="300" y="95" width="50" height="70" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="325" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">匿名</text>
  <text x="325" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">专家A</text>
  <!-- 意见卡 -->
  <rect x="310" y="145" width="30" height="15" rx="2" fill="#409EFF" opacity="0.6"/>
  <text x="325" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">意见</text>

  <!-- 屏风2 -->
  <rect x="375" y="95" width="50" height="70" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">匿名</text>
  <text x="400" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">专家B</text>
  <rect x="385" y="145" width="30" height="15" rx="2" fill="#409EFF" opacity="0.6"/>
  <text x="400" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">意见</text>

  <!-- 屏风3 -->
  <rect x="450" y="95" width="50" height="70" rx="4" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="475" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">匿名</text>
  <text x="475" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">专家C</text>
  <rect x="460" y="145" width="30" height="15" rx="2" fill="#409EFF" opacity="0.6"/>
  <text x="475" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">意见</text>

  <!-- 交换箭头 -->
  <path d="M340 130 Q355 115 370 130" fill="none" stroke="#1a1a2e" stroke-width="1" marker-end="url(#arrowSmall)"/>
  <path d="M420 130 Q435 115 450 130" fill="none" stroke="#1a1a2e" stroke-width="1"/>

  <!-- 多轮指示 -->
  <text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">多轮匿名反馈</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">无群体压力</text>

  <!-- 收敛箭头 -->
  <path d="M320 210 Q400 225 480 210" fill="none" stroke="#6BCB77" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6BCB77">意见收敛</text>

  <!-- ========== 面板3：共识度量 ========== -->
  <rect x="540" y="55" width="240" height="200" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5"/>
  <text x="660" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">共识度量</text>

  <!-- 仪表盘 -->
  <rect x="560" y="100" width="200" height="20" rx="10" fill="#E8F4FD" stroke="#1a1a2e" stroke-width="0.5"/>
  <!-- 三色区域 -->
  <rect x="560" y="100" width="66" height="20" rx="10" fill="#FF6B6B" opacity="0.7"/>
  <rect x="626" y="100" width="68" height="20" fill="#FFD93D" opacity="0.7"/>
  <rect x="694" y="100" width="66" height="20" rx="10" fill="#6BCB77" opacity="0.7"/>
  <!-- 指针 -->
  <polygon points="660,100 655,95 665,95" fill="#1a1a2e"/>
  <line x1="660" y1="100" x2="660" y2="85" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- 刻度标签 -->
  <text x="560" y="135" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">0</text>
  <text x="660" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">0.5</text>
  <text x="760" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">1.0</text>

  <!-- 区域标签 -->
  <text x="593" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">&lt;0.5</text>
  <text x="660" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">&gt;0.5</text>
  <text x="727" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">&gt;0.75</text>

  <!-- 决策结果 -->
  <rect x="560" y="170" width="200" height="70" rx="6" fill="#F5F9FF" stroke="#409EFF" stroke-width="0.8"/>

  <text x="580" y="188" font-family="Arial, sans-serif" font-size="11" fill="#FF6B6B">低共识 → 人工升级</text>
  <text x="580" y="205" font-family="Arial, sans-serif" font-size="11" fill="#FFD93D">中共识 → 仲裁者</text>
  <text x="580" y="222" font-family="Arial, sans-serif" font-size="11" fill="#6BCB77">高共识 → 多数投票</text>

  <!-- ========== 底部说明 ========== -->
  <rect x="20" y="275" width="760" height="210" rx="10" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>

  <!-- 说明1 -->
  <text x="50" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">算法对比</text>

  <line x1="50" y1="315" x2="750" y2="315" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- 行1 -->
  <rect x="50" y="330" width="12" height="12" rx="2" fill="#409EFF"/>
  <text x="70" y="341" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">逐步趋同：多轮迭代，意见逐渐向中心聚集</text>

  <!-- 行2 -->
  <rect x="50" y="360" width="12" height="12" rx="2" fill="#409EFF"/>
  <text x="70" y="371" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">德尔菲法：匿名交换意见，避免群体压力影响</text>

  <!-- 行3 -->
  <rect x="50" y="390" width="12" height="12" rx="2" fill="#409EFF"/>
  <text x="70" y="401" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">共识度量：量化共识程度，自动选择决策机制</text>

  <!-- 行4 -->
  <rect x="50" y="420" width="12" height="12" rx="2" fill="#409EFF"/>
  <text x="70" y="431" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">应用场景：分布式系统、群体决策、人工智能协作</text>

  <!-- 装饰线 -->
  <line x1="50" y1="455" x2="750" y2="455" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>

  <!-- 底部标签 -->
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.6">共识构建算法 · 教育插图</text>

</svg>