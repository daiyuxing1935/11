<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#D0ECFF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">通信协议的四大作用</text>

  <!-- ==================== 左上：标准化交换 ==================== -->
  <rect x="30" y="58" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <!-- 小标题 -->
  <rect x="30" y="58" width="360" height="34" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="210" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">标准化交换</text>

  <!-- 圆形代理 -->
  <circle cx="105" cy="145" r="28" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="2"/>
  <text x="105" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">A</text>

  <!-- 信封（JSON） -->
  <rect x="155" y="128" width="60" height="40" rx="4" fill="#409EFF" opacity="0.25" stroke="#409EFF" stroke-width="1.5"/>
  <text x="185" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">{…}</text>
  <text x="185" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">JSON</text>

  <!-- 箭头 -->
  <line x1="135" y1="145" x2="153" y2="145" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="217" y1="145" x2="235" y2="145" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 方形代理 -->
  <rect x="240" y="117" width="56" height="56" rx="6" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="2"/>
  <text x="268" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">B</text>

  <!-- 标注：共同语言 -->
  <rect x="140" y="185" width="120" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">共同语言桥梁</text>

  <!-- ==================== 右上：可靠性保证 ==================== -->
  <rect x="410" y="58" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="410" y="58" width="360" height="34" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="590" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">可靠性保证</text>

  <!-- 消息框 -->
  <rect x="445" y="110" width="90" height="36" rx="6" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
  <text x="490" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">消息</text>

  <!-- 箭头 -->
  <line x1="537" y1="128" x2="565" y2="128" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ACK 对勾 -->
  <rect x="568" y="110" width="70" height="36" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="603" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4CAF50" font-weight="bold">✓ ACK</text>

  <!-- 重试箭头（循环） -->
  <path d="M 475 160 Q 475 185 500 185 Q 525 185 525 170" fill="none" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="500" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FF9800" font-weight="bold">重试</text>

  <!-- 超时时钟 -->
  <circle cx="610" cy="175" r="18" fill="none" stroke="#FF5722" stroke-width="1.5"/>
  <line x1="610" y1="175" x2="610" y2="163" stroke="#FF5722" stroke-width="1.5"/>
  <line x1="610" y1="175" x2="620" y2="175" stroke="#FF5722" stroke-width="1.5"/>
  <text x="610" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FF5722" font-weight="bold">超时</text>

  <!-- 标注 -->
  <rect x="520" y="215" width="110" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="575" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">确保送达</text>

  <!-- ==================== 左下：可扩展性 ==================== -->
  <rect x="30" y="273" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="273" width="360" height="34" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="210" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">可扩展性</text>

  <!-- 现有节点网络 -->
  <circle cx="90" cy="360" r="18" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
  <text x="90" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">1</text>

  <circle cx="150" cy="340" r="18" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
  <text x="150" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">2</text>

  <circle cx="150" cy="390" r="18" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
  <text x="150" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">3</text>

  <circle cx="210" cy="360" r="18" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
  <text x="210" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">4</text>

  <!-- 连线 -->
  <line x1="108" y1="360" x2="132" y2="340" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
  <line x1="108" y1="360" x2="132" y2="390" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
  <line x1="168" y1="340" x2="192" y2="360" stroke="#409EFF" stroke-width="1" opacity="0.5"/>
  <line x1="168" y1="390" x2="192" y2="360" stroke="#409EFF" stroke-width="1" opacity="0.5"/>

  <!-- 新节点插入 -->
  <circle cx="270" cy="360" r="18" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="270" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">+</text>

  <!-- 插入箭头 -->
  <line x1="230" y1="360" x2="250" y2="360" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- 兼容接口图标 -->
  <rect x="290" y="348" width="28" height="24" rx="4" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
  <text x="304" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">🔌</text>

  <!-- 标注 -->
  <rect x="130" y="420" width="140" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="200" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">无缝接入新节点</text>

  <!-- ==================== 右下：调试与监控 ==================== -->
  <rect x="410" y="273" width="360" height="195" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="410" y="273" width="360" height="34" rx="12" fill="#409EFF" opacity="0.15"/>
  <text x="590" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">调试与监控</text>

  <!-- 仪表盘面板 -->
  <rect x="440" y="320" width="300" height="130" rx="6" fill="#F5F9FF" stroke="#409EFF" stroke-width="1" opacity="0.8"/>

  <!-- 表头 -->
  <rect x="440" y="320" width="300" height="24" rx="6" fill="#409EFF" opacity="0.2"/>
  <text x="455" y="336" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">时间</text>
  <text x="530" y="336" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">消息流</text>
  <text x="650" y="336" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">状态</text>

  <!-- 行1 -->
  <text x="455" y="358" font-family="monospace" font-size="11" fill="#1a1a2e">10:23:45</text>
  <text x="530" y="358" font-family="monospace" font-size="11" fill="#1a1a2e">A → B</text>
  <text x="650" y="358" font-family="monospace" font-size="11" fill="#4CAF50">✓</text>
  <line x1="440" y1="365" x2="740" y2="365" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>

  <!-- 行2 -->
  <text x="455" y="380" font-family="monospace" font-size="11" fill="#1a1a2e">10:23:47</text>
  <text x="530" y="380" font-family="monospace" font-size="11" fill="#1a1a2e">B → C</text>
  <text x="650" y="380" font-family="monospace" font-size="11" fill="#4CAF50">✓</text>
  <line x1="440" y1="387" x2="740" y2="387" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>

  <!-- 行3 -->
  <text x="455" y="402" font-family="monospace" font-size="11" fill="#1a1a2e">10:23:50</text>
  <text x="530" y="402" font-family="monospace" font-size="11" fill="#1a1a2e">A → C</text>
  <text x="650" y="402" font-family="monospace" font-size="11" fill="#FF9800">重试</text>
  <line x1="440" y1="409" x2="740" y2="409" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>

  <!-- 行4 -->
  <text x="455" y="424" font-family="monospace" font-size="11" fill="#1a1a2e">10:23:52</text>
  <text x="530" y="424" font-family="monospace" font-size="11" fill="#1a1a2e">A → C</text>
  <text x="650" y="424" font-family="monospace" font-size="11" fill="#4CAF50">✓</text>

  <!-- 标注 -->
  <rect x="520" y="440" width="120" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="580" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">追踪消息轨迹</text>

  <!-- ==================== 箭头标记 ==================== -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#409EFF"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF9800"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4CAF50"/>
    </marker>
  </defs>

</svg>