  <text x="490" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">领域经理 A</text>

  <rect x="557" y="383" width="80" height="28" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="597" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">领域经理 B</text>

  <rect x="665" y="383" width="80" height="28" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="705" y="401" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">领域经理 C</text>

  <!-- 向下连线 -->
  <line x1="470" y1="411" x2="440" y2="445" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="490" y1="411" x2="490" y2="445" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="510" y1="411" x2="540" y2="445" stroke="#409EFF" stroke-width="0.8"/>

  <line x1="577" y1="411" x2="557" y2="445" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="597" y1="411" x2="597" y2="445" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="617" y1="411" x2="637" y2="445" stroke="#409EFF" stroke-width="0.8"/>

  <line x1="685" y1="411" x2="665" y2="445" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="705" y1="411" x2="705" y2="445" stroke="#409EFF" stroke-width="0.8"/>
  <line x1="725" y1="411" x2="745" y2="445" stroke="#409EFF" stroke-width="0.8"/>

  <!-- 六个执行智能体 -->
  <rect x="420" y="448" width="40" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="440" y="462" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">执行</text>

  <rect x="470" y="448" width="40" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="490" y="462" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">执行</text>

  <rect x="520" y="448" width="40" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="540" y="462" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">执行</text>

  <rect x="577" y="448" width="40" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="597" y="462" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">执行</text>

  <rect x="685" y="448" width="40" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="705" y="462" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">执行</text>

  <rect x="745" y="448" width="40" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
