  <text x="315" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">综合决策</text>
  <text x="315" y="356" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e0f0ff">智能体</text>

  <!-- 箭头 → 输出 -->
  <line x1="358" y1="344" x2="383" y2="344" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 输出 -->
  <rect x="385" y="330" width="60" height="28" rx="14" fill="#1a1a2e"/>
  <text x="415" y="348" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">输出</text>

  <!-- ============================================ -->
  <!-- 右下：分层结构 -->
  <!-- ============================================ -->
  <rect x="410" y="275" width="375" height="215" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597" y="298" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">分层结构</text>

  <!-- 顶层控制器 -->
  <rect x="545" y="310" width="105" height="32" rx="8" fill="url(#darkGrad)" filter="url(#shadow)"/>
  <text x="597" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">顶层控制器</text>

  <!-- 向下连线 -->
  <line x1="560" y1="342" x2="490" y2="380" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="597" y1="342" x2="597" y2="380" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="635" y1="342" x2="705" y2="380" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 三个领域管理者 -->
