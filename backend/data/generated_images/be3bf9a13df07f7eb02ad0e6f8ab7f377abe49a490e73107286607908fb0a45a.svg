  <text x="180" y="313" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">角度 1</text>

  <rect x="158" y="330" width="75" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="195" y="348" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">角度 2</text>

  <rect x="143" y="365" width="75" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="180" y="383" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">角度 3</text>

  <!-- 交叉连接 -->
  <line x1="218" y1="309" x2="260" y2="340" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="233" y1="344" x2="260" y2="310" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="218" y1="379" x2="260" y2="348" stroke="#409EFF" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 箭头到综合决策 -->
  <line x1="233" y1="309" x2="270" y2="340" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="233" y1="344" x2="270" y2="344" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="233" y1="379" x2="270" y2="348" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 综合决策 -->
