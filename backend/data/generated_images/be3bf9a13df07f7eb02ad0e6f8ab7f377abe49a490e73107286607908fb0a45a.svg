<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ecff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#409EFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">四种常见多智能体架构模式</text>

  <!-- ============================================ -->
  <!-- 左上：路由器编排器 -->
  <!-- ============================================ -->
  <rect x="15" y="45" width="375" height="215" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="202" y="68" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">路由器编排器</text>

  <!-- 用户输入 -->
  <rect x="35" y="90" width="70" height="28" rx="14" fill="#409EFF" opacity="0.9"/>
  <text x="70" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">用户输入</text>

  <!-- 箭头：用户输入 → 路由器 -->
  <line x1="105" y1="104" x2="145" y2="104" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 路由器 -->
  <rect x="148" y="82" width="90" height="44" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="193" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">路由器</text>
  <text x="193" y="116" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e0f0ff">意图识别+调度</text>

  <!-- 箭头：路由器 → 三个专家 -->
  <line x1="180" y1="126" x2="100" y2="165" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="193" y1="126" x2="193" y2="165" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="206" y1="126" x2="286" y2="165" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 三个专家 -->
  <rect x="55" y="168" width="70" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="90" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">专家 A</text>

  <rect x="158" y="168" width="70" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="193" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">专家 B</text>

  <rect x="261" y="168" width="70" height="28" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="296" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">专家 C</text>

  <!-- 箭头：三个专家 → 聚合器 -->
  <line x1="110" y1="196" x2="160" y2="225" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="193" y1="196" x2="193" y2="225" stroke="#409EFF" stroke-width="1.2"/>
  <line x1="276" y1="196" x2="226" y2="225" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 结果聚合器 -->
  <rect x="148" y="225" width="90" height="28" rx="14" fill="#409EFF" opacity="0.85"/>
  <text x="193" y="243" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">结果聚合器</text>

  <!-- 箭头：聚合器 → 输出 -->
  <line x1="238" y1="239" x2="278" y2="239" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 输出 -->
  <rect x="280" y="225" width="70" height="28" rx="14" fill="#1a1a2e"/>
  <text x="315" y="243" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">输出</text>

  <!-- ============================================ -->
  <!-- 右上：管道 -->
  <!-- ============================================ -->
  <rect x="410" y="45" width="375" height="215" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597" y="68" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">管道</text>

  <!-- 输入 -->
  <rect x="430" y="100" width="60" height="28" rx="14" fill="#409EFF" opacity="0.9"/>
  <text x="460" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">输入</text>

  <!-- 箭头 -->
  <line x1="490" y1="114" x2="515" y2="114" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Agent 1 -->
  <rect x="518" y="85" width="70" height="28" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="553" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">智能体 1</text>
  <text x="553" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e0f0ff">数据收集</text>

  <!-- 箭头 -->
  <line x1="588" y1="99" x2="613" y2="99" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Agent 2 -->
  <rect x="616" y="85" width="70" height="28" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="651" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">智能体 2</text>
  <text x="651" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e0f0ff">数据清洗</text>

  <!-- 箭头 换行 -->
  <line x1="651" y1="113" x2="651" y2="145" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="651" y1="145" x2="553" y2="145" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="553" y1="145" x2="553" y2="170" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Agent 3 -->
  <rect x="518" y="173" width="70" height="28" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="553" y="191" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">智能体 3</text>
  <text x="553" y="208" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e0f0ff">数据分析</text>

  <!-- 箭头 -->
  <line x1="588" y1="187" x2="613" y2="187" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Agent 4 -->
  <rect x="616" y="173" width="70" height="28" rx="6" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="651" y="191" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">智能体 4</text>
  <text x="651" y="208" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e0f0ff">生成报告</text>

