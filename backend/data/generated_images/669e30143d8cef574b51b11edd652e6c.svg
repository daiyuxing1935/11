<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AB0FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60B8FF"/>
      <stop offset="100%" stop-color="#4AA0FF"/>
    </linearGradient>
    <linearGradient id="cardGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#70C0FF"/>
      <stop offset="100%" stop-color="#50A8FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="800" height="4" fill="#409EFF" opacity="0.3"/>

  <!-- 标题区域 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">智能客服团队架构</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" opacity="0.7">AI客服代理协作流程</text>

  <!-- 连接线 - 从意图路由到三个专家 -->
  <!-- 路由到订单 -->
  <line x1="260" y1="150" x2="260" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="260" y1="200" x2="160" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <polygon points="160,195 150,200 160,205" fill="#409EFF" opacity="0.5"/>
  
  <!-- 路由到技术 -->
  <line x1="260" y1="150" x2="260" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="260" y1="200" x2="400" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <polygon points="400,195 410,200 400,205" fill="#409EFF" opacity="0.5"/>
  
  <!-- 路由到满意度 -->
  <line x1="260" y1="150" x2="260" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="260" y1="200" x2="640" y2="200" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <polygon points="640,195 650,200 640,205" fill="#409EFF" opacity="0.5"/>

  <!-- 满意度监控器到路由的反馈线 -->
  <path d="M 640 310 Q 640 360 400 360 Q 160 360 160 310" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.3"/>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.5">反馈与升级</text>

  <!-- ============ 卡片1: 意图路由代理 ============ -->
  <g filter="url(#shadow)">
    <rect x="185" y="80" width="150" height="70" rx="12" fill="url(#cardGrad1)"/>
    <rect x="185" y="80" width="150" height="70" rx="12" fill="none" stroke="#fff" stroke-width="1" opacity="0.2"/>
    <!-- 图标 -->
    <circle cx="210" cy="105" r="12" fill="white" opacity="0.25"/>
    <text x="210" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">↗</text>
    <text x="235" y="102" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">意图路由代理</text>
    <text x="235" y="118" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.85">GPT-4 · 意图分类</text>
    <text x="235" y="133" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.7">一线分流 · 任务分发</text>
  </g>

  <!-- ============ 卡片2: 订单专家代理 ============ -->
  <g filter="url(#shadowLight)">
    <rect x="60" y="210" width="200" height="100" rx="12" fill="white"/>
    <rect x="60" y="210" width="200" height="100" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
    <!-- 顶部色条 -->
    <rect x="60" y="210" width="200" height="4" rx="2" fill="#409EFF"/>
    <!-- 图标 -->
    <circle cx="85" cy="240" r="10" fill="#409EFF" opacity="0.15"/>
    <text x="85" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">📦</text>
    <text x="105" y="237" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">订单专家代理</text>
    <text x="105" y="253" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.8">GPT-3.5</text>
    <text x="80" y="272" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">订单 · 物流 · 退换货</text>
    <text x="80" y="288" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" opacity="0.5">工具：订单系统 · 物流查询</text>
  </g>

  <!-- ============ 卡片3: 技术支持代理 ============ -->
  <g filter="url(#shadowLight)">
    <rect x="300" y="210" width="200" height="100" rx="12" fill="white"/>
    <rect x="300" y="210" width="200" height="100" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
    <rect x="300" y="210" width="200" height="4" rx="2" fill="#409EFF"/>
    <circle cx="325" cy="240" r="10" fill="#409EFF" opacity="0.15"/>
    <text x="325" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">🔧</text>
    <text x="345" y="237" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">技术支持代理</text>
    <text x="345" y="253" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.8">GPT-4</text>
    <text x="320" y="272" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">知识库 · 诊断工具</text>
    <text x="320" y="288" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" opacity="0.5">工具：知识库 · 诊断系统</text>
  </g>

  <!-- ============ 卡片4: 满意度监控代理 ============ -->
  <g filter="url(#shadowLight)">
    <rect x="540" y="210" width="200" height="100" rx="12" fill="white"/>
    <rect x="540" y="210" width="200" height="100" rx="12" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.3"/>
    <rect x="540" y="210" width="200" height="4" rx="2" fill="#409EFF"/>
    <circle cx="565" cy="240" r="10" fill="#409EFF" opacity="0.15"/>
    <text x="565" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">📊</text>
    <text x="585" y="237" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">满意度监控代理</text>
    <text x="585" y="253" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.8">GPT-3.5</text>
    <text x="560" y="272" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">情绪检测 · 升级处理</text>
    <text x="560" y="288" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" opacity="0.5">跨流程 · 质量监控</text>
  </g>

  <!-- ============ 标注区域 ============ -->
  
  <!-- 标注1: 模型按任务复杂度选择 -->
  <g>
    <rect x="400" y="130" width="180" height="28" rx="14" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <text x="490" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">模型按任务复杂度选择</text>
    <!-- 连接线 -->
    <line x1="490" y1="158" x2="490" y2="175" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <circle cx="490" cy="175" r="2" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 标注2: 明确职责边界 -->
  <g>
    <rect x="30" y="320" width="140" height="26" rx="13" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <text x="100" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">明确职责边界</text>
    <line x1="100" y1="320" x2="100" y2="310" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- 标注3: 委托控制设置 -->
  <g>
    <rect x="330" y="320" width="140" height="26" rx="13" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <text x="400" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">委托控制设置</text>
    <line x1="400" y1="320" x2="400" y2="310" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- 标注4: 情绪检测 -->
  <g>
    <rect x="570" y="320" width="120" height="26" rx="13" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <text x="630" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">情绪检测升级</text>
    <line x1="630" y1="320" x2="630" y2="310" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  </g>

  <!-- 标注5: 一线分流 -->
  <g>
    <rect x="30" y="130" width="100" height="26" rx="13" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <text x="80" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">一线分流</text>
    <line x1="80" y1="156" x2="80" y2="170" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="80" y1="170" x2="185" y2="170" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <circle cx="185" cy="170" r="2" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 标注6: 知识库工具 -->
  <g>
    <rect x="440" y="170" width="120" height="26" rx="13" fill="white" stroke="#409EFF" stroke-width="1" opacity="0.9"/>
    <text x="500" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF" font-weight="bold">知识库诊断</text>
    <line x1="500" y1="196" x2="500" y2="210" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <circle cx="500" cy="210" r="2" fill="#409EFF" opacity="0.5"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.4">基于GPT模型构建的智能客服代理协作体系</text>

  <!-- 底部装饰 -->
  <rect x="0" y="496" width="800" height="4" fill="#409EFF" opacity="0.15"/>

</svg>