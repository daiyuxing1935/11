<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">链式思维推理的三大局限</text>

  <!-- 三张卡片 -->
  <!-- 卡片1：无法回溯 -->
  <g transform="translate(40, 80)">
    <rect width="220" height="370" rx="16" fill="url(#cardGrad)" stroke="#D0E4F5" stroke-width="1.5"/>
    <!-- 红色X -->
    <circle cx="110" cy="40" r="18" fill="#FF4757" opacity="0.15"/>
    <line x1="98" y1="28" x2="122" y2="52" stroke="#FF4757" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="122" y1="28" x2="98" y2="52" stroke="#FF4757" stroke-width="3.5" stroke-linecap="round"/>
    <!-- 图形：单向箭头撞墙 -->
    <rect x="55" y="80" width="110" height="130" rx="10" fill="#EEF6FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 箭头 -->
    <line x1="60" y1="145" x2="145" y2="145" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <polygon points="140,138 150,145 140,152" fill="#409EFF"/>
    <!-- 墙 -->
    <rect x="148" y="100" width="12" height="90" rx="2" fill="#FF4757" opacity="0.6"/>
    <line x1="148" y1="100" x2="160" y2="100" stroke="#FF4757" stroke-width="2"/>
    <line x1="148" y1="120" x2="160" y2="120" stroke="#FF4757" stroke-width="2"/>
    <line x1="148" y1="140" x2="160" y2="140" stroke="#FF4757" stroke-width="2"/>
    <line x1="148" y1="160" x2="160" y2="160" stroke="#FF4757" stroke-width="2"/>
    <line x1="148" y1="180" x2="160" y2="180" stroke="#FF4757" stroke-width="2"/>
    <!-- 撞墙效果 -->
    <line x1="130" y1="125" x2="145" y2="140" stroke="#FF4757" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="135" y1="120" x2="148" y2="135" stroke="#FF4757" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="125" y1="130" x2="140" y2="145" stroke="#FF4757" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- 标注 -->
    <text x="110" y="240" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">无法回溯</text>
    <text x="110" y="262" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">单向推理</text>
    <text x="110" y="282" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">撞墙即止</text>
  </g>

  <!-- 卡片2：无法全局搜索 -->
  <g transform="translate(290, 80)">
    <rect width="220" height="370" rx="16" fill="url(#cardGrad)" stroke="#D0E4F5" stroke-width="1.5"/>
    <!-- 红色X -->
    <circle cx="110" cy="40" r="18" fill="#FF4757" opacity="0.15"/>
    <line x1="98" y1="28" x2="122" y2="52" stroke="#FF4757" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="122" y1="28" x2="98" y2="52" stroke="#FF4757" stroke-width="3.5" stroke-linecap="round"/>
    <!-- 图形：单路径 vs 多个问号 -->
    <rect x="55" y="80" width="110" height="130" rx="10" fill="#EEF6FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 单一路径 -->
    <line x1="70" y1="115" x2="150" y2="115" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="70" cy="115" r="5" fill="#409EFF"/>
    <circle cx="110" cy="115" r="5" fill="#409EFF"/>
    <circle cx="150" cy="115" r="5" fill="#409EFF"/>
    <!-- 问号 -->
    <text x="85" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFB800" opacity="0.7">?</text>
    <text x="110" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFB800" opacity="0.5">?</text>
    <text x="135" y="155" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FFB800" opacity="0.6">?</text>
    <text x="95" y="185" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFB800" opacity="0.4">?</text>
    <text x="125" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFB800" opacity="0.3">?</text>
    <!-- 标注 -->
    <text x="110" y="240" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">无法全局搜索</text>
    <text x="110" y="262" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">单一路径</text>
    <text x="110" y="282" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">忽略其他可能</text>
  </g>

  <!-- 卡片3：无探索广度 -->
  <g transform="translate(540, 80)">
    <rect width="220" height="370" rx="16" fill="url(#cardGrad)" stroke="#D0E4F5" stroke-width="1.5"/>
    <!-- 红色X -->
    <circle cx="110" cy="40" r="18" fill="#FF4757" opacity="0.15"/>
    <line x1="98" y1="28" x2="122" y2="52" stroke="#FF4757" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="122" y1="28" x2="98" y2="52" stroke="#FF4757" stroke-width="3.5" stroke-linecap="round"/>
    <!-- 图形：路径变窄变暗 -->
    <rect x="55" y="80" width="110" height="130" rx="10" fill="#EEF6FF" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 变窄路径 -->
    <polygon points="70,100 150,100 135,190 85,190" fill="#409EFF" opacity="0.3"/>
    <polygon points="80,110 140,110 130,180 90,180" fill="#409EFF" opacity="0.2"/>
    <polygon points="90,120 130,120 125,170 95,170" fill="#409EFF" opacity="0.1"/>
    <!-- 箭头 -->
    <polygon points="110,95 115,105 105,105" fill="#409EFF" opacity="0.5"/>
    <!-- 变暗效果 -->
    <rect x="95" y="185" width="30" height="8" rx="2" fill="#409EFF" opacity="0.08"/>
    <!-- 标注 -->
    <text x="110" y="240" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">无探索广度</text>
    <text x="110" y="262" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">视野狭窄</text>
    <text x="110" y="282" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">越走越暗</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888">链式思维推理的三大局限</text>
</svg>