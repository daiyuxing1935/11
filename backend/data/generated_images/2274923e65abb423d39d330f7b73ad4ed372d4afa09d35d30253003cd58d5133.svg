<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b7ed4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d5e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc3545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b02a37;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409EFF"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc3545"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">两种多智能体通信架构对比</text>

  <!-- ===== 上半部分：内存队列（轻量级） ===== -->
  <rect x="50" y="55" width="700" height="195" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="50" y="55" width="700" height="36" rx="12" fill="url(#boxGrad1)"/>
  <rect x="50" y="75" width="700" height="16" fill="url(#boxGrad1)"/>

  <text x="70" y="78" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">📦 内存队列（轻量级）</text>
  <text x="680" y="78" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e0f0ff" font-style="italic">单进程多智能体系统</text>

  <!-- 进程框 -->
  <rect x="100" y="105" width="600" height="130" rx="10" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="122" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">单进程</text>

  <!-- Agent 1 -->
  <rect x="130" y="140" width="100" height="50" rx="8" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="180" y="168" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">智能体 1</text>

  <!-- Agent 2 -->
  <rect x="350" y="140" width="100" height="50" rx="8" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="400" y="168" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">智能体 2</text>

  <!-- Agent 3 -->
  <rect x="570" y="140" width="100" height="50" rx="8" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1.2"/>
  <text x="620" y="168" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">智能体 3</text>

  <!-- 队列框 -->
  <rect x="250" y="145" width="80" height="40" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="290" y="168" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">队列</text>

  <!-- 锁标记 -->
  <rect x="265" y="190" width="50" height="18" rx="4" fill="#409EFF" opacity="0.2"/>
  <text x="290" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" font-weight="bold">🔒 线程锁</text>

  <!-- 连接线 -->
  <line x1="230" y1="165" x2="250" y2="165" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="330" y1="165" x2="350" y2="165" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="190" x2="400" y2="200" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="290" y1="185" x2="290" y2="190" stroke="#409EFF" stroke-width="1.2"/>

  <!-- 标签：Python queue.Queue -->
  <rect x="440" y="190" width="150" height="20" rx="4" fill="#e6f0ff"/>
  <text x="515" y="204" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1a2e">Python queue.Queue</text>

  <!-- 分隔线 -->
  <line x1="60" y1="260" x2="740" y2="260" stroke="#409EFF" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>

  <!-- ===== 下半部分：Redis（分布式） ===== -->
  <rect x="50" y="270" width="700" height="215" rx="12" fill="white" stroke="#1a1a2e" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="50" y="270" width="700" height="36" rx="12" fill="url(#boxGrad2)"/>
  <rect x="50" y="290" width="700" height="16" fill="url(#boxGrad2)"/>

  <text x="70" y="293" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">🔗 Redis（分布式）</text>
  <text x="680" y="293" text-anchor="end" font-family="sans-serif" font-size="12" fill="#b0b0d0" font-style="italic">跨进程 / 跨服务器系统</text>

  <!-- 服务器 1 -->
  <rect x="80" y="320" width="180" height="145" rx="8" fill="#f5f7fa" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="80" y="320" width="180" height="28" rx="8" fill="#1a1a2e"/>
  <rect x="80" y="340" width="180" height="8" fill="#1a1a2e"/>
  <text x="170" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">服务器 1</text>

  <!-- 服务器1 智能体 -->
  <rect x="95" y="358" width="72" height="36" rx="6" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1"/>
  <text x="131" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">智能体 A</text>

  <rect x="175" y="358" width="72" height="36" rx="6" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1"/>
  <text x="211" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">智能体 B</text>

  <!-- 服务器1 本地队列 -->
  <rect x="110" y="405" width="120" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="170" y="420" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">本地队列</text>

  <!-- 服务器 2 -->
  <rect x="310" y="320" width="180" height="145" rx="8" fill="#f5f7fa" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="310" y="320" width="180" height="28" rx="8" fill="#1a1a2e"/>
  <rect x="310" y="340" width="180" height="8" fill="#1a1a2e"/>
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">服务器 2</text>

  <rect x="325" y="358" width="72" height="36" rx="6" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1"/>
  <text x="361" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">智能体 C</text>

  <rect x="405" y="358" width="72" height="36" rx="6" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1"/>
  <text x="441" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">智能体 D</text>

  <rect x="340" y="405" width="120" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">本地队列</text>

  <!-- 服务器 3 -->
  <rect x="540" y="320" width="180" height="145" rx="8" fill="#f5f7fa" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="540" y="320" width="180" height="28" rx="8" fill="#1a1a2e"/>
  <rect x="540" y="340" width="180" height="8" fill="#1a1a2e"/>
  <text x="630" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">服务器 3</text>

  <rect x="555" y="358" width="72" height="36" rx="6" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1"/>
  <text x="591" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">智能体 E</text>

  <rect x="635" y="358" width="72" height="36" rx="6" fill="url(#agentGrad)" stroke="#409EFF" stroke-width="1"/>
  <text x="671" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">智能体 F</text>

  <rect x="570" y="405" width="120" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="630" y="420" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">本地队列</text>

  <!-- Redis 中心 -->
  <rect x="310" y="440" width="180" height="32" rx="16" fill="url(#redisGrad)" filter="url(#shadow)"/>
  <text x="400" y="461" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Redis 发布/订阅</text>

  <!-- 发布/订阅箭头 -->
  <path d="M170,427 L170,445 Q170,455 180,455 L300,455" stroke="#dc3545" stroke-width="1.8" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>
  <path d="M400,427 L400,440" stroke="#dc3545" stroke-width="1.8" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M630,427 L630,445 Q630,455 620,455 L500,455" stroke="#dc3545" stroke-width="1.8" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>

  <!-- 持久化列表标记 -->
  <rect x="540" y="445" width="95" height="20" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="587" y="459" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">+ 持久化列表</text>

  <!-- 通道标记 -->
  <rect x="80" y="445" width="80" height="20" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="120" y="459" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">📢 通道</text>

  <!-- 底部标注 -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">通过 Redis Pub/Sub 实现跨服务器消息发布与订阅</text>

</svg>