<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="barNominal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="barEffective" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FFB074"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="6" height="6">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">上下文窗口演进时间线</text>
  <text x="400" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">Context Window Evolution (2020–2025)</text>

  <!-- 时间线 -->
  <line x1="60" y1="110" x2="760" y2="110" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>

  <!-- 时间线节点：2K (GPT-3) 2020 -->
  <circle cx="100" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="100" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">2020</text>
  <text x="100" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">2K</text>
  <text x="100" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">GPT-3</text>

  <!-- 4K (GPT-3.5) 2022 -->
  <circle cx="220" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">2022</text>
  <text x="220" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">4K</text>
  <text x="220" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">GPT-3.5</text>

  <!-- 8K 2023 -->
  <circle cx="310" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="310" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">2023</text>
  <text x="310" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">8K</text>

  <!-- 32K (GPT-4) 2023 -->
  <circle cx="400" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="400" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">32K</text>
  <text x="400" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">GPT-4</text>

  <!-- 128K (Claude 2.1) 2023 -->
  <circle cx="490" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="490" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">128K</text>
  <text x="490" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Claude 2.1</text>

  <!-- 200K (Claude 3) 2024 -->
  <circle cx="580" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">2024</text>
  <text x="580" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">200K</text>
  <text x="580" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Claude 3</text>

  <!-- 1M-2M (Gemini 1.5 Pro) 2025 -->
  <circle cx="700" cy="110" r="6" fill="#409EFF" stroke="#fff" stroke-width="2"/>
  <text x="700" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">2025</text>
  <text x="700" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">1M-2M</text>
  <text x="700" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Gemini 1.5 Pro</text>

  <!-- 关键技术图标 -->
  <!-- RoPE - 旋转图标 -->
  <g transform="translate(160, 80)">
    <circle cx="0" cy="0" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M-4,-4 Q0,-8 4,-4 Q8,0 4,4 Q0,8 -4,4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">RoPE</text>
  </g>

  <!-- FlashAttention - 闪电 -->
  <g transform="translate(350, 80)">
    <circle cx="0" cy="0" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <polygon points="-2,-8 4,-2 -1,-1 3,6 -3,1 1,0 -3,-5" fill="#409EFF"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">FlashAttn</text>
  </g>

  <!-- KV-Cache压缩 -->
  <g transform="translate(540, 80)">
    <circle cx="0" cy="0" r="12" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="-5" y="-3" width="10" height="6" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <rect x="-3" y="-1" width="6" height="2" fill="#409EFF" opacity="0.5"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">KV压缩</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="175" x2="760" y2="175" stroke="#ddd" stroke-width="1"/>

  <!-- 图表标题 -->
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">标称窗口 vs 有效窗口对比</text>

  <!-- 图例 -->
  <rect x="220" y="212" width="14" height="14" rx="2" fill="url(#barNominal)"/>
  <text x="240" y="224" font-family="sans-serif" font-size="12" fill="#1a1a2e">标称窗口</text>
  <rect x="370" y="212" width="14" height="14" rx="2" fill="url(#barEffective)"/>
  <text x="390" y="224" font-family="sans-serif" font-size="12" fill="#1a1a2e">有效窗口</text>

  <!-- 图表区域 -->
  <!-- GPT-3: 2K -->
  <text x="100" y="260" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e">GPT-3</text>
  <rect x="110" y="248" width="60" height="18" rx="3" fill="url(#barNominal)"/>
  <rect x="110" y="248" width="55" height="18" rx="3" fill="url(#barEffective)" opacity="0.85"/>
  <text x="175" y="262" font-family="sans-serif" font-size="11" fill="#1a1a2e">2K / 1.8K</text>

  <!-- GPT-3.5: 4K -->
  <text x="100" y="295" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e">GPT-3.5</text>
  <rect x="110" y="283" width="80" height="18" rx="3" fill="url(#barNominal)"/>
  <rect x="110" y="283" width="70" height="18" rx="3" fill="url(#barEffective)" opacity="0.85"/>
  <text x="195" y="297" font-family="sans-serif" font-size="11" fill="#1a1a2e">4K / 3.5K</text>

  <!-- GPT-4: 32K -->
  <text x="100" y="330" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e">GPT-4</text>
  <rect x="110" y="318" width="120" height="18" rx="3" fill="url(#barNominal)"/>
  <rect x="110" y="318" width="95" height="18" rx="3" fill="url(#barEffective)" opacity="0.85"/>
  <text x="235" y="332" font-family="sans-serif" font-size="11" fill="#1a1a2e">32K / 25K</text>

  <!-- Claude 2.1: 128K -->
  <text x="100" y="365" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e">Claude 2.1</text>
  <rect x="110" y="353" width="160" height="18" rx="3" fill="url(#barNominal)"/>
  <rect x="110" y="353" width="110" height="18" rx="3" fill="url(#barEffective)" opacity="0.85"/>
  <text x="275" y="367" font-family="sans-serif" font-size="11" fill="#1a1a2e">128K / 64K</text>

  <!-- Claude 3: 200K -->
  <text x="100" y="400" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e">Claude 3</text>
  <rect x="110" y="388" width="200" height="18" rx="3" fill="url(#barNominal)"/>
  <rect x="110" y="388" width="160" height="18" rx="3" fill="url(#barEffective)" opacity="0.85"/>
  <text x="315" y="402" font-family="sans-serif" font-size="11" fill="#1a1a2e">200K / 150K</text>

  <!-- Gemini 1.5 Pro: 1M-2M -->
  <text x="100" y="435" text-anchor="end" font-family="sans-serif" font-size="12" fill="#1a1a2e">Gemini 1.5</text>
  <rect x="110" y="423" width="260" height="18" rx="3" fill="url(#barNominal)"/>
  <rect x="110" y="423" width="200" height="18" rx="3" fill="url(#barEffective)" opacity="0.85"/>
  <text x="375" y="437" font-family="sans-serif" font-size="11" fill="#1a1a2e">1M-2M / 500K</text>

  <!-- 底部标注 -->
  <text x="400" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">* 有效窗口指实际任务中可稳定利用的上下文长度</text>

  <!-- 装饰线 -->
  <line x1="60" y1="460" x2="760" y2="460" stroke="#eee" stroke-width="1"/>
</svg>