<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e">模型参数与能力 核心要点</text>

  <!-- 标题下装饰线 -->
  <rect x="300" y="60" width="200" height="3" rx="1.5" fill="#409EFF" opacity="0.5"/>

  <!-- 卡片1：参数是知识存储的脑连接 -->
  <rect x="30" y="90" width="350" height="110" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="90" width="350" height="110" rx="12" fill="#409EFF" opacity="0.06"/>
  <circle cx="75" cy="145" r="28" fill="url(#cardGrad)" opacity="0.15"/>
  <circle cx="75" cy="145" r="28" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 脑网络图标 -->
  <circle cx="65" cy="135" r="5" fill="#409EFF" opacity="0.7"/>
  <circle cx="85" cy="135" r="5" fill="#409EFF" opacity="0.7"/>
  <circle cx="75" cy="155" r="5" fill="#409EFF" opacity="0.7"/>
  <line x1="65" y1="135" x2="85" y2="135" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
  <line x1="65" y1="135" x2="75" y2="155" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
  <line x1="85" y1="135" x2="75" y2="155" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
  <text x="75" y="148" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#409EFF" font-weight="bold">脑</text>
  <text x="120" y="128" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">参数是知识存储的脑连接</text>
  <text x="120" y="155" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">模型参数如同大脑突触，</text>
  <text x="120" y="175" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">承载着训练中习得的知识。</text>

  <!-- 卡片2：规模定律可预测但收益递减 -->
  <rect x="420" y="90" width="350" height="110" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="420" y="90" width="350" height="110" rx="12" fill="#409EFF" opacity="0.06"/>
  <circle cx="465" cy="145" r="28" fill="url(#cardGrad)" opacity="0.15"/>
  <circle cx="465" cy="145" r="28" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 曲线图图标 -->
  <polyline points="445,155 455,148 465,140 475,138 485,137" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="445" y1="155" x2="485" y2="155" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>
  <text x="465" y="148" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#409EFF" font-weight="bold">↗</text>
  <text x="510" y="128" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">规模定律可预测但收益递减</text>
  <text x="510" y="155" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">模型越大效果越好，但提升</text>
  <text x="510" y="175" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">幅度逐渐变小，需权衡成本。</text>

  <!-- 卡片3：涌现能力在阈值处质变 -->
  <rect x="30" y="230" width="350" height="110" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="230" width="350" height="110" rx="12" fill="#409EFF" opacity="0.06"/>
  <circle cx="75" cy="285" r="28" fill="url(#cardGrad)" opacity="0.15"/>
  <circle cx="75" cy="285" r="28" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 阶梯图标 -->
  <rect x="60" y="270" width="10" height="6" rx="1" fill="#409EFF" opacity="0.6"/>
  <rect x="65" y="264" width="10" height="6" rx="1" fill="#409EFF" opacity="0.7"/>
  <rect x="70" y="258" width="10" height="6" rx="1" fill="#409EFF" opacity="0.8"/>
  <rect x="75" y="252" width="10" height="6" rx="1" fill="#409EFF"/>
  <text x="75" y="248" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#409EFF" font-weight="bold">▲</text>
  <text x="120" y="268" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">涌现能力在阈值处质变</text>
  <text x="120" y="295" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">当参数规模突破临界点，</text>
  <text x="120" y="315" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">模型会"涌现"出全新的能力。</text>

  <!-- 卡片4：大模型原型小模型生产策略 -->
  <rect x="420" y="230" width="350" height="110" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="420" y="230" width="350" height="110" rx="12" fill="#409EFF" opacity="0.06"/>
  <circle cx="465" cy="285" r="28" fill="url(#cardGrad)" opacity="0.15"/>
  <circle cx="465" cy="285" r="28" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 大→小转移图标 -->
  <rect x="450" y="272" width="12" height="14" rx="2" fill="#409EFF" opacity="0.4"/>
  <rect x="468" y="276" width="10" height="10" rx="2" fill="#409EFF" opacity="0.7"/>
  <line x1="462" y1="272" x2="473" y2="276" stroke="#409EFF" stroke-width="1.2" opacity="0.6"/>
  <text x="465" y="290" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#409EFF" font-weight="bold">→</text>
  <text x="510" y="268" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">大模型原型小模型生产策略</text>
  <text x="510" y="295" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">用大模型探索能力上限，</text>
  <text x="510" y="315" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">将知识蒸馏到小模型部署。</text>

  <!-- 卡片5：量化实现低成本部署 -->
  <rect x="200" y="370" width="400" height="100" rx="12" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="200" y="370" width="400" height="100" rx="12" fill="#409EFF" opacity="0.06"/>
  <circle cx="250" cy="420" r="28" fill="url(#cardGrad)" opacity="0.15"/>
  <circle cx="250" cy="420" r="28" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 压缩芯片图标 -->
  <rect x="237" y="407" width="14" height="14" rx="2" fill="#409EFF" opacity="0.5"/>
  <rect x="240" y="410" width="8" height="8" rx="1" fill="#409EFF" opacity="0.7"/>
  <line x1="244" y1="407" x2="244" y2="404" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <line x1="244" y1="421" x2="244" y2="424" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <text x="250" y="422" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="white" font-weight="bold">Q</text>
  <text x="295" y="405" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">量化实现低成本部署</text>
  <text x="295" y="430" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">通过量化技术压缩模型精度，在保持性能的同时</text>
  <text x="295" y="450" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#666" opacity="0.8">大幅降低推理成本和内存占用。</text>

  <!-- 底部装饰点 -->
  <circle cx="380" cy="485" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="400" cy="485" r="3" fill="#409EFF" opacity="0.5"/>
  <circle cx="420" cy="485" r="3" fill="#409EFF" opacity="0.3"/>

</svg>