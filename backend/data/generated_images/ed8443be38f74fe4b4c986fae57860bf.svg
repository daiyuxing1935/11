<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">推理优化技术</text>
  <line x1="300" y1="52" x2="500" y2="52" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- 卡片 1：量化 -->
  <rect x="30" y="75" width="170" height="185" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
  <rect x="30" y="75" width="170" height="38" rx="14" fill="url(#cardGrad)"/>
  <rect x="30" y="99" width="170" height="14" fill="url(#cardGrad)"/>
  <text x="115" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">量化</text>

  <!-- 量化数据块 -->
  <rect x="55" y="125" width="40" height="28" rx="4" fill="#409EFF" opacity="0.3"/>
  <text x="75" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">16位</text>
  <text x="95" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF">→</text>
  <rect x="105" y="125" width="30" height="28" rx="4" fill="#409EFF" opacity="0.6"/>
  <text x="120" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">8位</text>
  <text x="140" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#409EFF">→</text>
  <rect x="150" y="125" width="25" height="28" rx="4" fill="#409EFF" opacity="0.9"/>
  <text x="162" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">4位</text>

  <!-- 速度表 -->
  <circle cx="115" cy="195" r="28" fill="none" stroke="#E0E0E0" stroke-width="4"/>
  <path d="M 115 195 L 115 173" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M 115 195 L 130 185" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>
  <text x="115" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">2-4x 加速</text>

  <!-- 标注 1 -->
  <rect x="45" y="250" width="140" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="115" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">精度压缩提速</text>

  <!-- 卡片 2：批处理 -->
  <rect x="220" y="75" width="170" height="185" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
  <rect x="220" y="75" width="170" height="38" rx="14" fill="url(#cardGrad)"/>
  <rect x="220" y="99" width="170" height="14" fill="url(#cardGrad)"/>
  <text x="305" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">批处理</text>

  <!-- 并行请求箭头 -->
  <line x1="245" y1="125" x2="290" y2="125" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="245" y1="140" x2="290" y2="140" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="245" y1="155" x2="290" y2="155" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="245" y1="170" x2="290" y2="170" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- 模型方块 -->
  <rect x="295" y="118" width="60" height="60" rx="8" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
  <text x="325" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">模型</text>

  <!-- 吞吐量 -->
  <text x="305" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">吞吐量</text>
  <rect x="270" y="208" width="70" height="10" rx="5" fill="#E0E0E0"/>
  <rect x="270" y="208" width="60" height="10" rx="5" fill="#409EFF"/>
  <text x="345" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">4x</text>

  <!-- 标注 2 -->
  <rect x="235" y="250" width="140" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="305" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">并行请求处理</text>

  <!-- 卡片 3：FlashAttention -->
  <rect x="410" y="75" width="170" height="185" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
  <rect x="410" y="75" width="170" height="38" rx="14" fill="url(#cardGrad)"/>
  <rect x="410" y="99" width="170" height="14" fill="url(#cardGrad)"/>
  <text x="495" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">FlashAttention</text>

  <!-- 闪电图标 -->
  <polygon points="480,120 470,150 485,150 475,180 500,145 485,145 495,120" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>

  <!-- 注意力矩阵 -->
  <rect x="440" y="140" width="50" height="50" rx="3" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <rect x="440" y="140" width="25" height="25" rx="2" fill="#409EFF" opacity="0.3"/>
  <rect x="465" y="140" width="25" height="25" rx="2" fill="#409EFF" opacity="0.15"/>
  <rect x="440" y="165" width="25" height="25" rx="2" fill="#409EFF" opacity="0.15"/>
  <rect x="465" y="165" width="25" height="25" rx="2" fill="#409EFF" opacity="0.3"/>

  <!-- 内存读取指示 -->
  <text x="510" y="155" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">↓ 内存读取</text>
  <text x="510" y="175" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">分块优化</text>

  <!-- 标注 3 -->
  <rect x="425" y="250" width="140" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="495" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">注意力分块</text>

  <!-- 卡片 4：模型并行 -->
  <rect x="600" y="75" width="170" height="185" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
  <rect x="600" y="75" width="170" height="38" rx="14" fill="url(#cardGrad)"/>
  <rect x="600" y="99" width="170" height="14" fill="url(#cardGrad)"/>
  <text x="685" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">模型并行</text>

  <!-- 4个GPU -->
  <rect x="615" y="125" width="32" height="32" rx="4" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1"/>
  <text x="631" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">GPU1</text>
  <rect x="655" y="125" width="32" height="32" rx="4" fill="#409EFF" opacity="0.4" stroke="#409EFF" stroke-width="1"/>
  <text x="671" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">GPU2</text>
  <rect x="615" y="165" width="32" height="32" rx="4" fill="#409EFF" opacity="0.6" stroke="#409EFF" stroke-width="1"/>
  <text x="631" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">GPU3</text>
  <rect x="655" y="165" width="32" height="32" rx="4" fill="#409EFF" opacity="0.8" stroke="#409EFF" stroke-width="1"/>
  <text x="671" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">GPU4</text>

  <!-- 互连箭头 -->
  <line x1="647" y1="141" x2="655" y2="141" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="631" y1="157" x2="631" y2="165" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="671" y1="157" x2="671" y2="165" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>
  <line x1="647" y1="181" x2="655" y2="181" stroke="#1a1a2e" stroke-width="1" opacity="0.4"/>

  <!-- 线性扩展 -->
  <text x="685" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">线性</text>
  <text x="685" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">扩展</text>

  <!-- 标注 4 -->
  <rect x="615" y="250" width="140" height="22" rx="11" fill="#409EFF" opacity="0.12"/>
  <text x="685" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">多卡分布式</text>

  <!-- 底部总结栏 -->
  <rect x="100" y="295" width="600" height="36" rx="18" fill="#409EFF" opacity="0.08"/>
  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e">通过量化、批处理、FlashAttention 和模型并行技术提升推理效率</text>

  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

</svg>