<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE3"/>
    </linearGradient>
    <linearGradient id="vertexGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AA9FF"/>
    </linearGradient>
    <linearGradient id="vertexGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB3FF"/>
    </linearGradient>
    <linearGradient id="vertexGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7BBCFF"/>
    </linearGradient>
    <linearGradient id="vertexGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#8CC5FF"/>
    </linearGradient>
    <linearGradient id="vertexGrad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#9DCEFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.2"/>
    </filter>
    <filter id="shadowDeep" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a1a2e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">管理者五大核心职责</text>

  <!-- 五边形顶点坐标 (中心400, 250, 半径160) -->
  <!-- 顶点1: 顶部 (400, 90) -->
  <!-- 顶点2: 右上 (550.5, 158.8) -->
  <!-- 顶点3: 右下 (493, 298.8) -->
  <!-- 顶点4: 左下 (307, 298.8) -->
  <!-- 顶点5: 左上 (249.5, 158.8) -->

  <!-- 连接线 - 五边形边 -->
  <polygon points="400,90 550.5,158.8 493,298.8 307,298.8 249.5,158.8" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-opacity="0.3" stroke-dasharray="6,4"/>

  <!-- 中心到顶点的连接线 -->
  <line x1="400" y1="250" x2="400" y2="90" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="400" y1="250" x2="550.5" y2="158.8" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="400" y1="250" x2="493" y2="298.8" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="400" y1="250" x2="307" y2="298.8" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="400" y1="250" x2="249.5" y2="158.8" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4,3"/>

  <!-- 中心节点 -->
  <circle cx="400" cy="250" r="42" fill="url(#centerGrad)" filter="url(#shadowDeep)"/>
  <circle cx="400" cy="250" r="42" fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>
  <!-- 大脑图标 -->
  <g transform="translate(400, 250)">
    <path d="M-12,-8 C-16,-12 -18,-6 -16,-2 C-18,0 -18,6 -14,8 C-16,12 -12,16 -8,14 C-6,18 0,18 4,16 C8,18 12,16 14,12 C16,14 18,10 16,6 C18,2 16,-4 12,-6 C14,-10 10,-14 6,-12 C4,-16 -2,-16 -6,-14 C-8,-16 -10,-12 -12,-8Z" fill="#fff" fill-opacity="0.9"/>
    <path d="M-6,-4 C-4,-8 2,-8 4,-4 C6,-2 4,4 0,6 C-4,4 -6,-2 -6,-4Z" fill="#409EFF" fill-opacity="0.5"/>
    <path d="M-2,-2 C0,-4 2,-2 2,0 C2,2 0,4 -2,2 C-4,0 -4,-2 -2,-2Z" fill="#fff" fill-opacity="0.6"/>
    <line x1="-8" y1="-2" x2="-6" y2="-1" stroke="#fff" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="6" y1="-2" x2="8" y2="-1" stroke="#fff" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="-4" y1="4" x2="-3" y2="6" stroke="#fff" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="4" y1="4" x2="3" y2="6" stroke="#fff" stroke-width="1" stroke-opacity="0.5"/>
  </g>
  <text x="400" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#409EFF">管理智能体</text>

  <!-- 顶点1: 任务分解 (顶部) -->
  <g filter="url(#shadow)">
    <circle cx="400" cy="90" r="36" fill="url(#vertexGrad1)"/>
    <circle cx="400" cy="90" r="36" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 大任务分裂成小方块图标 -->
    <rect x="386" y="76" width="10" height="10" rx="1" fill="#fff" fill-opacity="0.9"/>
    <rect x="398" y="76" width="6" height="6" rx="1" fill="#fff" fill-opacity="0.7"/>
    <rect x="386" y="88" width="6" height="6" rx="1" fill="#fff" fill-opacity="0.7"/>
    <rect x="394" y="86" width="8" height="8" rx="1" fill="#fff" fill-opacity="0.5"/>
    <line x1="396" y1="76" x2="396" y2="74" stroke="#fff" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="386" y1="82" x2="384" y2="82" stroke="#fff" stroke-width="1" stroke-opacity="0.6"/>
  </g>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">任务分解</text>
  <text x="400" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">大任务拆分为小模块</text>

  <!-- 顶点2: 人员匹配 (右上) -->
  <g filter="url(#shadow)">
    <circle cx="550.5" cy="158.8" r="36" fill="url(#vertexGrad2)"/>
    <circle cx="550.5" cy="158.8" r="36" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 拼图块图标 -->
    <path d="M538,146 L548,146 C550,146 552,148 552,150 L552,156 C552,158 550,160 548,160 L538,160 C536,160 534,158 534,156 L534,150 C534,148 536,146 538,146Z" fill="none" stroke="#fff" stroke-width="1.8" fill-opacity="0.3"/>
    <path d="M543,146 L543,150 C543,152 541,152 541,150 L541,146" fill="#fff" fill-opacity="0.6"/>
    <circle cx="543" cy="153" r="2" fill="#fff" fill-opacity="0.8"/>
    <!-- 拼图凸起 -->
    <rect x="548" y="151" width="4" height="4" rx="1" fill="#fff" fill-opacity="0.7"/>
  </g>
  <text x="550.5" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">人员匹配</text>
  <text x="550.5" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">人岗精准对接</text>

  <!-- 顶点3: 进度跟踪 (右下) -->
  <g filter="url(#shadow)">
    <circle cx="493" cy="298.8" r="36" fill="url(#vertexGrad3)"/>
    <circle cx="493" cy="298.8" r="36" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 仪表盘图标 -->
    <rect x="478" y="286" width="22" height="16" rx="2" fill="#fff" fill-opacity="0.3"/>
    <rect x="480" y="288" width="4" height="8" rx="1" fill="#fff" fill-opacity="0.8"/>
    <rect x="486" y="288" width="4" height="12" rx="1" fill="#fff" fill-opacity="0.6"/>
    <rect x="492" y="288" width="4" height="6" rx="1" fill="#fff" fill-opacity="0.4"/>
    <circle cx="489" cy="300" r="2" fill="#fff" fill-opacity="0.5"/>
  </g>
  <text x="493" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">进度跟踪</text>
  <text x="493" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">可视化状态监控</text>

  <!-- 顶点4: 结果汇聚 (左下) -->
  <g filter="url(#shadow)">
    <circle cx="307" cy="298.8" r="36" fill="url(#vertexGrad4)"/>
    <circle cx="307" cy="298.8" r="36" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 多输入合并为一输出图标 -->
    <line x1="286" y1="290" x2="300" y2="298" stroke="#fff" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="286" y1="300" x2="300" y2="300" stroke="#fff" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="286" y1="310" x2="300" y2="302" stroke="#fff" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="284" cy="290" r="3" fill="#fff" fill-opacity="0.5"/>
    <circle cx="284" cy="300" r="3" fill="#fff" fill-opacity="0.5"/>
    <circle cx="284" cy="310" r="3" fill="#fff" fill-opacity="0.5"/>
    <rect x="300" y="296" width="12" height="8" rx="2" fill="#fff" fill-opacity="0.7"/>
    <line x1="312" y1="300" x2="318" y2="300" stroke="#fff" stroke-width="1.5" stroke-opacity="0.8"/>
  </g>
  <text x="307" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">结果汇聚</text>
  <text x="307" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">多路输出整合</text>

  <!-- 顶点5: 异常处理 (左上) -->
  <g filter="url(#shadow)">
    <circle cx="249.5" cy="158.8" r="36" fill="url(#vertexGrad5)"/>
    <circle cx="249.5" cy="158.8" r="36" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- 错误盾牌图标 -->
    <path d="M237,148 L249,142 L261,148 L261,162 C261,168 249,174 249,174 C249,174 237,168 237,162Z" fill="none" stroke="#fff" stroke-width="1.8" fill-opacity="0.4"/>
    <path d="M237,148 L249,142 L261,148 L261,162 C261,168 249,174 249,174 C249,174 237,168 237,162Z" fill="#fff" fill-opacity="0.3"/>
    <text x="249" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" fill-opacity="0.9">!</text>
    <!-- 回退路径箭头 -->
    <path d="M262,155 L268,155 L266,152" stroke="#fff" stroke-width="1.2" fill="none" stroke-opacity="0.6"/>
    <path d="M262,165 L268,165 L266,168" stroke="#fff" stroke-width="1.2" fill="none" stroke-opacity="0.6"/>
  </g>
  <text x="249.5" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">异常处理</text>
  <text x="249.5" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">错误防护与回退</text>

  <!-- 流程标注 - 沿连接线的小标签 -->
  <!-- 顶部到右上 -->
  <rect x="458" y="108" width="52" height="20" rx="10" fill="#409EFF" fill-opacity="0.1"/>
  <text x="484" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">分配</text>

  <!-- 右上到右下 -->
  <rect x="538" y="228" width="52" height="20" rx="10" fill="#409EFF" fill-opacity="0.1"/>
  <text x="564" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">监控</text>

  <!-- 右下到左下 -->
  <rect x="388" y="318" width="52" height="20" rx="10" fill="#409EFF" fill-opacity="0.1"/>
  <text x="414" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">汇总</text>

  <!-- 左下到左上 -->
  <rect x="258" y="258" width="52" height="20" rx="10" fill="#409EFF" fill-opacity="0.1"/>
  <text x="284" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">反馈</text>

  <!-- 左上到顶部 -->
  <rect x="308" y="108" width="52" height="20" rx="10" fill="#409EFF" fill-opacity="0.1"/>
  <text x="334" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">规划</text>

  <!-- 底部说明 -->
  <rect x="250" y="410" width="300" height="36" rx="18" fill="#409EFF" fill-opacity="0.08"/>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">五大职责闭环驱动高效管理</text>

  <!-- 装饰性小元素 -->
  <circle cx="50" cy="460" r="3" fill="#409EFF" fill-opacity="0.15"/>
  <circle cx="750" cy="460" r="3" fill="#409EFF" fill-opacity="0.15"/>
  <circle cx="50" cy="40" r="3" fill="#409EFF" fill-opacity="0.15"/>
  <circle cx="750" cy="40" r="3" fill="#409EFF" fill-opacity="0.15"/>
</svg>