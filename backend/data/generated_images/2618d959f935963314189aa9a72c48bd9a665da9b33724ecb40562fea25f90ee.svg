<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="era1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A9BB5"/>
      <stop offset="100%" stop-color="#5A7A95"/>
    </linearGradient>
    <linearGradient id="era2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="era3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#1A7BE5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">人工智能发展历程</text>

  <!-- 连接箭头 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e" opacity="0.4"/>
    </marker>
  </defs>

  <!-- 箭头 1→2 -->
  <line x1="270" y1="220" x2="340" y2="220" stroke="#1a1a2e" stroke-width="2" opacity="0.3" marker-end="url(#arrowhead)"/>
  <!-- 箭头 2→3 -->
  <line x1="470" y1="220" x2="540" y2="220" stroke="#1a1a2e" stroke-width="2" opacity="0.3" marker-end="url(#arrowhead)"/>

  <!-- ====== 时代 1：1980s-2000s ====== -->
  <g transform="translate(80, 140)">
    <!-- 圆角矩形背景 -->
    <rect x="0" y="0" width="190" height="160" rx="16" fill="white" filter="url(#shadow)"/>
    <!-- 图标区域 -->
    <rect x="20" y="15" width="150" height="95" rx="12" fill="url(#era1Grad)" opacity="0.15"/>
    <!-- 流程图图标 - IF/THEN -->
    <rect x="45" y="30" width="100" height="22" rx="4" fill="#5A7A95" opacity="0.8"/>
    <text x="95" y="46" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="white" font-weight="bold">IF</text>
    <rect x="45" y="58" width="100" height="22" rx="4" fill="#7A9BB5" opacity="0.8"/>
    <text x="95" y="74" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="white" font-weight="bold">THEN</text>
    <!-- 条件菱形 -->
    <polygon points="95,86 110,96 95,106 80,96" fill="#5A7A95" opacity="0.6"/>
    <!-- 箭头 -->
    <line x1="95" y1="52" x2="95" y2="58" stroke="#5A7A95" stroke-width="1.5"/>
    <line x1="95" y1="80" x2="95" y2="86" stroke="#5A7A95" stroke-width="1.5"/>
    <!-- 标签 -->
    <text x="95" y="138" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">专家系统</text>
    <text x="95" y="155" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#5A7A95">符号推理</text>
  </g>

  <!-- 年份标签 1 -->
  <rect x="110" y="320" width="130" height="28" rx="14" fill="#1a1a2e" opacity="0.85"/>
  <text x="175" y="339" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="white">1980s — 2000s</text>

  <!-- ====== 时代 2：2000s-2018 ====== -->
  <g transform="translate(310, 140)">
    <rect x="0" y="0" width="190" height="160" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="15" width="150" height="95" rx="12" fill="url(#era2Grad)" opacity="0.15"/>
    <!-- 大脑 + 神经网络 -->
    <!-- 大脑轮廓 -->
    <ellipse cx="95" cy="55" rx="35" ry="28" fill="none" stroke="#2B6CB0" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="95" cy="55" rx="25" ry="20" fill="none" stroke="#4A90D9" stroke-width="1.5" opacity="0.5"/>
    <!-- 神经元节点 -->
    <circle cx="75" cy="40" r="4" fill="#4A90D9"/>
    <circle cx="95" cy="35" r="4" fill="#4A90D9"/>
    <circle cx="115" cy="40" r="4" fill="#4A90D9"/>
    <circle cx="70" cy="60" r="4" fill="#4A90D9"/>
    <circle cx="95" cy="65" r="4" fill="#4A90D9"/>
    <circle cx="120" cy="60" r="4" fill="#4A90D9"/>
    <circle cx="85" cy="50" r="3" fill="#2B6CB0"/>
    <circle cx="105" cy="50" r="3" fill="#2B6CB0"/>
    <!-- 连接线 -->
    <line x1="75" y1="40" x2="95" y2="35" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="95" y1="35" x2="115" y2="40" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="75" y1="40" x2="70" y2="60" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="115" y1="40" x2="120" y2="60" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="60" x2="95" y2="65" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="60" x2="95" y2="65" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="95" y1="35" x2="105" y2="50" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="75" y1="40" x2="85" y2="50" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <!-- 强化学习循环箭头 -->
    <path d="M 130 70 A 20 20 0 0 1 130 40" fill="none" stroke="#2B6CB0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="142" y="58" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="9" fill="#2B6CB0" font-weight="bold">RL</text>
    <!-- 标签 -->
    <text x="95" y="138" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">深度学习</text>
    <text x="95" y="155" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#4A90D9">神经网络</text>
  </g>

  <!-- 年份标签 2 -->
  <rect x="340" y="320" width="130" height="28" rx="14" fill="#1a1a2e" opacity="0.85"/>
  <text x="405" y="339" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="white">2000s — 2018</text>

  <!-- ====== 时代 3：2023-present ====== -->
  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="190" height="160" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="15" width="150" height="95" rx="12" fill="url(#era3Grad)" opacity="0.12"/>
    <!-- LLM 核心发光 -->
    <circle cx="95" cy="55" r="30" fill="#409EFF" opacity="0.08"/>
    <circle cx="95" cy="55" r="22" fill="#409EFF" opacity="0.15"/>
    <circle cx="95" cy="55" r="14" fill="#409EFF" opacity="0.25"/>
    <circle cx="95" cy="55" r="8" fill="#409EFF" opacity="0.4"/>
    <!-- 核心文字 -->
    <text x="95" y="59" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#409EFF" font-weight="bold">LLM</text>
    <!-- 机器人剪影 -->
    <rect x="82" y="30" width="26" height="20" rx="4" fill="#409EFF" opacity="0.6"/>
    <circle cx="95" cy="26" r="7" fill="#409EFF" opacity="0.7"/>
    <rect x="86" y="50" width="8" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="96" y="50" width="8" height="12" rx="2" fill="#409EFF" opacity="0.5"/>
    <!-- 工具图标 -->
    <!-- 搜索 -->
    <circle cx="60" cy="72" r="6" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="64" y1="76" x2="68" y2="80" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 代码 -->
    <text x="95" cy="78" font-family="Consolas, monospace" font-size="10" fill="#409EFF" text-anchor="middle" y="79">&lt;/&gt;</text>
    <!-- 日历 -->
    <rect x="118" y="66" width="10" height="10" rx="1" fill="none" stroke="#409EFF" stroke-width="1.2"/>
    <line x1="118" y1="70" x2="128" y2="70" stroke="#409EFF" stroke-width="1"/>
    <text x="123" y="68" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#409EFF">📅</text>
    <!-- 标签 -->
    <text x="95" y="138" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">大语言模型</text>
    <text x="95" y="155" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#409EFF">多模态智能体</text>
  </g>

  <!-- 年份标签 3 -->
  <rect x="570" y="320" width="130" height="28" rx="14" fill="#1a1a2e" opacity="0.85"/>
  <text x="635" y="339" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" font-weight="bold" fill="white">2023 — 至今</text>

  <!-- 底部时间轴横线 -->
  <line x1="80" y1="348" x2="720" y2="348" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>

  <!-- 底部标注 -->
  <text x="400" y="390" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.5">从符号推理到生成式人工智能的演进</text>

  <!-- 装饰性圆点 -->
  <circle cx="80" cy="348" r="4" fill="#409EFF" opacity="0.3"/>
  <circle cx="400" cy="348" r="4" fill="#409EFF" opacity="0.3"/>
  <circle cx="720" cy="348" r="4" fill="#409EFF" opacity="0.3"/>

  <!-- 图例 - 左下角 -->
  <g transform="translate(30, 420)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="white" opacity="0.7" filter="url(#shadow)"/>
    <rect x="10" y="10" width="12" height="12" rx="3" fill="#5A7A95"/>
    <text x="28" y="21" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#1a1a2e">符号推理</text>
    <rect x="10" y="28" width="12" height="12" rx="3" fill="#4A90D9"/>
    <text x="28" y="39" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#1a1a2e">神经网络</text>
    <rect x="85" y="10" width="12" height="12" rx="3" fill="#409EFF"/>
    <text x="103" y="21" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#1a1a2e">大语言模型</text>
    <rect x="85" y="28" width="12" height="12" rx="3" fill="#1a1a2e" opacity="0.6"/>
    <text x="103" y="39" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#1a1a2e">时间节点</text>
  </g>

</svg>