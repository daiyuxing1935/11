<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f2fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fbff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 连接线 — 星形图案 -->
  <g stroke="#409EFF" stroke-width="2" fill="none" opacity="0.6">
    <!-- 五边形外圈 -->
    <line x1="400" y1="65" x2="595" y2="185"/>
    <line x1="595" y1="185" x2="530" y2="400"/>
    <line x1="530" y1="400" x2="270" y2="400"/>
    <line x1="270" y1="400" x2="205" y2="185"/>
    <line x1="205" y1="185" x2="400" y2="65"/>
    <!-- 内部星形 -->
    <line x1="400" y1="65" x2="530" y2="400"/>
    <line x1="595" y1="185" x2="270" y2="400"/>
    <line x1="205" y1="185" x2="530" y2="400"/>
    <line x1="270" y1="400" x2="595" y2="185"/>
    <line x1="400" y1="65" x2="205" y2="185"/>
    <!-- 中心到各顶点 -->
    <line x1="400" y1="240" x2="400" y2="65"/>
    <line x1="400" y1="240" x2="595" y2="185"/>
    <line x1="400" y1="240" x2="530" y2="400"/>
    <line x1="400" y1="240" x2="270" y2="400"/>
    <line x1="400" y1="240" x2="205" y2="185"/>
  </g>

  <!-- 中心圆点 -->
  <circle cx="400" cy="240" r="8" fill="#409EFF" opacity="0.8"/>
  <circle cx="400" cy="240" r="4" fill="#ffffff"/>

  <!-- 卡片 1：目标明确 — 顶部 -->
  <g>
    <rect x="320" y="60" width="160" height="100" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 靶心图标 -->
    <circle cx="370" cy="85" r="16" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="370" cy="85" r="10" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="370" cy="85" r="4" fill="#409EFF"/>
    <line x1="354" y1="85" x2="340" y2="85" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="386" y1="85" x2="400" y2="85" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="370" y1="69" x2="370" y2="55" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="370" y1="101" x2="370" y2="115" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="440" y="90" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">目标明确</text>
    <text x="440" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" opacity="0.8">清晰界定目标</text>
  </g>

  <!-- 卡片 2：工具简洁 — 右上 -->
  <g>
    <rect x="590" y="155" width="160" height="100" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 工具图标 -->
    <line x1="625" y1="180" x2="640" y2="195" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="640" y1="180" x2="625" y2="195" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="643" y="178" width="4" height="18" rx="1" fill="#1a1a2e" transform="rotate(20,645,187)"/>
    <rect x="650" y="182" width="4" height="16" rx="1" fill="#1a1a2e"/>
    <text x="690" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">工具简洁</text>
    <text x="690" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" opacity="0.8">少即是多</text>
  </g>

  <!-- 卡片 3：人机协同 — 右下 -->
  <g>
    <rect x="520" y="370" width="160" height="100" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 人手 + 机器手 + 对勾 -->
    <g transform="translate(555,400)">
      <!-- 人手 -->
      <rect x="0" y="8" width="18" height="6" rx="3" fill="#1a1a2e"/>
      <rect x="2" y="2" width="5" height="10" rx="2" fill="#1a1a2e"/>
      <rect x="10" y="0" width="5" height="12" rx="2" fill="#1a1a2e"/>
      <!-- 机器手 -->
      <rect x="32" y="8" width="18" height="6" rx="2" fill="#409EFF"/>
      <rect x="43" y="2" width="5" height="10" rx="1" fill="#409EFF"/>
      <rect x="35" y="0" width="5" height="12" rx="1" fill="#409EFF"/>
      <!-- 对勾 -->
      <polyline points="22,12 26,16 32,8" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="640" y="415" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">人机协同</text>
    <text x="640" y="455" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" opacity="0.8">人机协同验证</text>
  </g>

  <!-- 卡片 4：容错机制 — 左下 -->
  <g>
    <rect x="120" y="370" width="160" height="100" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 盾牌 + 循环箭头 -->
    <g transform="translate(155,395)">
      <path d="M20,0 L38,0 L38,20 Q38,35 20,42 Q2,35 2,20 L2,0 Z" fill="none" stroke="#1a1a2e" stroke-width="2"/>
      <circle cx="20" cy="18" r="6" fill="none" stroke="#409EFF" stroke-width="2"/>
      <path d="M17,15 L20,12 L23,15" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8,30 Q-2,30 -2,20 Q-2,10 8,10" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3,2"/>
      <polygon points="8,10 12,6 12,14" fill="#1a1a2e"/>
    </g>
    <text x="240" y="415" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">容错机制</text>
    <text x="240" y="455" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" opacity="0.8">故障自动恢复</text>
  </g>

  <!-- 卡片 5：可观测性 — 左上 -->
  <g>
    <rect x="50" y="155" width="160" height="100" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="drop-shadow(0 2px 6px rgba(64,158,255,0.15))"/>
    <!-- 放大镜 + 透明机器人 -->
    <g transform="translate(85,178)">
      <circle cx="16" cy="16" r="12" fill="none" stroke="#1a1a2e" stroke-width="2"/>
      <line x1="25" y1="25" x2="32" y2="32" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="34" y="10" width="16" height="22" rx="3" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
      <circle cx="42" cy="16" r="2" fill="#409EFF" opacity="0.8"/>
      <circle cx="42" cy="24" r="1.5" fill="#409EFF" opacity="0.5"/>
      <circle cx="38" cy="20" r="1" fill="#409EFF" opacity="0.4"/>
    </g>
    <text x="170" y="200" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">可观测性</text>
    <text x="170" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" opacity="0.8">内部状态透明</text>
  </g>

  <!-- 中央标题 -->
  <text x="400" y="275" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e" opacity="0.9">AI系统设计原则</text>
  <text x="400" y="298" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" opacity="0.7">五大核心原则 · 相互关联</text>

</svg>