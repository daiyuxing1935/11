<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8fe0"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66b3ff"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80bfff"/>
      <stop offset="100%" stop-color="#66b3ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">社会能力层次金字塔</text>

  <!-- 第四层（顶部）：谈判 -->
  <polygon points="400,68 540,68 520,128 280,128" fill="url(#layer1Grad)" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">谈判</text>

  <!-- 第三层：角色扮演 -->
  <polygon points="400,148 590,148 565,228 235,228" fill="url(#layer2Grad)" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">角色扮演</text>

  <!-- 第二层：智能体-智能体交互 -->
  <polygon points="400,248 660,248 630,348 170,348" fill="url(#layer3Grad)" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">智能体-智能体交互</text>

  <!-- 第一层（底部）：人机交互 -->
  <polygon points="400,368 730,368 695,488 105,488" fill="url(#layer4Grad)" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">人机交互</text>

  <!-- 第四层标注元素：谈判 -->
  <!-- 服务器图标 -->
  <rect x="340" y="78" width="20" height="16" rx="2" fill="#ffffff" opacity="0.9"/>
  <line x1="344" y1="82" x2="344" y2="90" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="350" y1="82" x2="350" y2="90" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="356" y1="82" x2="356" y2="90" stroke="#1a1a2e" stroke-width="1"/>

  <!-- 天平图标 -->
  <line x1="430" y1="82" x2="430" y2="96" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="418" y1="88" x2="442" y2="88" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="418" cy="92" r="3" fill="none" stroke="#ffffff" stroke-width="1"/>
  <circle cx="442" cy="92" r="3" fill="none" stroke="#ffffff" stroke-width="1"/>

  <!-- 时间线图标 -->
  <line x1="470" y1="82" x2="490" y2="82" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="480" y1="82" x2="480" y2="92" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="480" cy="96" r="2" fill="#ffffff"/>

  <!-- 第三层标注：角色扮演图标 -->
  <!-- 研究员（放大镜） -->
  <circle cx="330" cy="178" r="10" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="337" y1="185" x2="343" y2="191" stroke="#ffffff" stroke-width="1.5"/>

  <!-- 分析师（图表） -->
  <rect x="400" y="172" width="14" height="10" rx="1" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="404" y1="178" x2="404" y2="180" stroke="#ffffff" stroke-width="1"/>
  <line x1="408" y1="176" x2="408" y2="180" stroke="#ffffff" stroke-width="1"/>
  <line x1="412" y1="174" x2="412" y2="180" stroke="#ffffff" stroke-width="1"/>

  <!-- 作家（笔） -->
  <line x1="458" y1="178" x2="468" y2="188" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="468" y1="188" x2="472" y2="184" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="458,178 455,182 460,185" fill="#ffffff"/>

  <!-- 第二层标注：智能体交互 -->
  <!-- 消息箭头 -->
  <line x1="310" y1="288" x2="340" y2="288" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <polygon points="340,283 348,288 340,293" fill="#ffffff"/>

  <!-- 任务委托图标 -->
  <rect x="420" y="280" width="16" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="424" y1="284" x2="432" y2="284" stroke="#ffffff" stroke-width="1"/>
  <line x1="424" y1="288" x2="432" y2="288" stroke="#ffffff" stroke-width="1"/>

  <!-- 交换箭头 -->
  <line x1="490" y1="283" x2="510" y2="283" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="510" y1="283" x2="505" y2="278" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="510" y1="283" x2="505" y2="288" stroke="#ffffff" stroke-width="1.2"/>

  <!-- 第一层标注：人机交互 -->
  <!-- 人物 -->
  <circle cx="240" cy="420" r="8" fill="#ffffff" opacity="0.9"/>
  <line x1="240" y1="428" x2="240" y2="450" stroke="#ffffff" stroke-width="2"/>
  <line x1="230" y1="438" x2="250" y2="438" stroke="#ffffff" stroke-width="2"/>
  <line x1="240" y1="450" x2="232" y2="462" stroke="#ffffff" stroke-width="2"/>
  <line x1="240" y1="450" x2="248" y2="462" stroke="#ffffff" stroke-width="2"/>

  <!-- 机器人 -->
  <rect x="310" y="412" width="16" height="20" rx="3" fill="#ffffff" opacity="0.9"/>
  <rect x="314" y="408" width="8" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="316" cy="420" r="1.5" fill="#1a1a2e"/>
  <circle cx="322" cy="420" r="1.5" fill="#1a1a2e"/>

  <!-- 对话气泡 -->
  <path d="M270,405 Q270,395 282,395 L298,395 Q310,395 310,405 L310,415 Q310,425 298,425 L285,425 L280,432 L282,425 L282,425 Q270,425 270,415 Z" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- 情感图标（笑脸） -->
  <circle cx="370" cy="418" r="8" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="367" cy="416" r="1" fill="#ffffff"/>
  <circle cx="373" cy="416" r="1" fill="#ffffff"/>
  <path d="M367,421 Q370,425 373,421" fill="none" stroke="#ffffff" stroke-width="1"/>

  <!-- 层间垂直间距指示（装饰线） -->
  <line x1="400" y1="128" x2="400" y2="148" stroke="#1a1a2e" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3"/>
  <line x1="400" y1="228" x2="400" y2="248" stroke="#1a1a2e" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3"/>
  <line x1="400" y1="348" x2="400" y2="368" stroke="#1a1a2e" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3"/>

  <!-- 底部说明 -->
  <text x="400" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">社会智能层次结构</text>
</svg>