<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="libGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C4956A"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6B4A"/>
      <stop offset="100%" stop-color="#7A5D3F"/>
    </linearGradient>
    <linearGradient id="brainGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FD4"/>
    </linearGradient>
    <linearGradient id="toolboxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E55A2B"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">从知识到行动：LLM → AI 智能体</text>

  <!-- ========== 左侧：图书馆（LLM） ========== -->
  <g filter="url(#shadow)">
    <!-- 图书馆主体 -->
    <rect x="80" y="120" width="220" height="240" rx="6" fill="url(#libGrad)" stroke="#B8845A" stroke-width="2"/>
    <!-- 屋顶 -->
    <polygon points="60,120 190,70 320,120" fill="url(#roofGrad)" stroke="#7A5D3F" stroke-width="2"/>
    <!-- 屋顶装饰线 -->
    <line x1="190" y1="70" x2="190" y2="120" stroke="#7A5D3F" stroke-width="1.5" opacity="0.5"/>

    <!-- 窗户 -->
    <rect x="100" y="140" width="50" height="60" rx="4" fill="#FFF8E7" stroke="#B8845A" stroke-width="1.5"/>
    <rect x="170" y="140" width="50" height="60" rx="4" fill="#FFF8E7" stroke="#B8845A" stroke-width="1.5"/>
    <rect x="100" y="220" width="50" height="60" rx="4" fill="#FFF8E7" stroke="#B8845A" stroke-width="1.5"/>
    <rect x="170" y="220" width="50" height="60" rx="4" fill="#FFF8E7" stroke="#B8845A" stroke-width="1.5"/>

    <!-- 窗户里的书架 -->
    <line x1="110" y1="150" x2="140" y2="150" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="110" y1="160" x2="140" y2="160" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="110" y1="170" x2="140" y2="170" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="180" y1="150" x2="210" y2="150" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="210" y2="160" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="180" y1="170" x2="210" y2="170" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="110" y1="230" x2="140" y2="230" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="110" y1="240" x2="140" y2="240" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="110" y1="250" x2="140" y2="250" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="180" y1="230" x2="210" y2="230" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="180" y1="240" x2="210" y2="240" stroke="#C4956A" stroke-width="1.5"/>
    <line x1="180" y1="250" x2="210" y2="250" stroke="#C4956A" stroke-width="1.5"/>

    <!-- 门 -->
    <rect x="130" y="300" width="60" height="60" rx="4" fill="#8B6B4A" stroke="#7A5D3F" stroke-width="1.5"/>
    <circle cx="178" cy="332" r="3" fill="#FFD700"/>

    <!-- 书架细节 - 外部可见的书 -->
    <rect x="95" y="290" width="8" height="14" rx="1" fill="#E74C3C" transform="rotate(-10,99,297)"/>
    <rect x="105" y="292" width="8" height="14" rx="1" fill="#3498DB" transform="rotate(5,109,299)"/>
    <rect x="225" y="290" width="8" height="14" rx="1" fill="#2ECC71" transform="rotate(-5,229,297)"/>
    <rect x="235" y="292" width="8" height="14" rx="1" fill="#9B59B6" transform="rotate(8,239,299)"/>
  </g>

  <!-- 图书馆标签 -->
  <rect x="140" y="370" width="100" height="28" rx="14" fill="#1a1a2e"/>
  <text x="190" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">LLM</text>

  <!-- 发光大脑 -->
  <g filter="url(#glow)">
    <ellipse cx="190" cy="95" rx="30" ry="22" fill="url(#brainGlow)" opacity="0.9"/>
    <!-- 大脑褶皱 -->
    <path d="M170,90 Q180,80 190,88 Q200,80 210,90" fill="none" stroke="#E67E22" stroke-width="1.5"/>
    <path d="M172,98 Q182,92 190,98 Q198,92 208,98" fill="none" stroke="#E67E22" stroke-width="1.5"/>
    <path d="M175,106 Q185,100 190,106 Q195,100 205,106" fill="none" stroke="#E67E22" stroke-width="1.5"/>
    <!-- 大脑发光光晕 -->
    <ellipse cx="190" cy="95" rx="38" ry="30" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- 大脑标注 -->
  <line x1="190" y1="65" x2="190" y2="50" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="155" y="38" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="190" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">知识库</text>

  <!-- ========== 中间：连接线 ========== -->
  <path d="M310,200 Q380,180 430,200" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.7"/>
  <!-- 连接线上的箭头 -->
  <polygon points="430,195 440,200 430,205" fill="#409EFF" opacity="0.8"/>

  <!-- 连接标注 -->
  <rect x="345" y="170" width="80" height="22" rx="11" fill="#409EFF" opacity="0.85"/>
  <text x="385" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">知识调用</text>

  <!-- ========== 右侧：AI智能体 ========== -->
  <g filter="url(#shadow)">
    <!-- 机器人身体 -->
    <rect x="470" y="180" width="100" height="120" rx="12" fill="url(#robotGrad)" stroke="#2B7FD4" stroke-width="2"/>

    <!-- 机器人头部 -->
    <rect x="485" y="120" width="70" height="60" rx="12" fill="url(#robotGrad)" stroke="#2B7FD4" stroke-width="2"/>
    <!-- 天线 -->
    <line x1="520" y1="120" x2="520" y2="100" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="520" cy="96" r="5" fill="#FFD700" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="505" cy="145" r="7" fill="#FFFFFF"/>
    <circle cx="535" cy="145" r="7" fill="#FFFFFF"/>
    <circle cx="505" cy="145" r="3.5" fill="#1a1a2e"/>
    <circle cx="535" cy="145" r="3.5" fill="#1a1a2e"/>
    <!-- 嘴巴 -->
    <rect x="505" y="160" width="30" height="6" rx="3" fill="#FFFFFF" opacity="0.8"/>

    <!-- 手臂（工具） -->
    <!-- 左臂 - 拿着工具箱 -->
    <rect x="440" y="200" width="30" height="12" rx="4" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <rect x="435" y="195" width="10" height="22" rx="3" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <!-- 工具箱 -->
    <rect x="410" y="210" width="40" height="30" rx="4" fill="url(#toolboxGrad)" stroke="#D44A1A" stroke-width="1.5"/>
    <rect x="415" y="215" width="30" height="6" rx="2" fill="#FF8C5A"/>
    <rect x="415" y="226" width="30" height="6" rx="2" fill="#FF8C5A"/>
    <!-- 工具箱把手 -->
    <path d="M420,210 Q430,200 440,210" fill="none" stroke="#D44A1A" stroke-width="2"/>

    <!-- 右臂 - 拿着地图 -->
    <rect x="540" y="200" width="30" height="12" rx="4" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <rect x="565" y="195" width="10" height="22" rx="3" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <!-- 地图 -->
    <rect x="575" y="185" width="35" height="45" rx="3" fill="#FFF8E7" stroke="#E0C9A0" stroke-width="1.5" transform="rotate(8,592,207)"/>
    <path d="M580,195 L605,195" stroke="#E0C9A0" stroke-width="1" transform="rotate(8,592,207)"/>
    <path d="M580,202 L605,202" stroke="#E0C9A0" stroke-width="1" transform="rotate(8,592,207)"/>
    <path d="M580,209 L600,209" stroke="#E0C9A0" stroke-width="1" transform="rotate(8,592,207)"/>
    <circle cx="592" cy="190" r="3" fill="#E74C3C" opacity="0.7" transform="rotate(8,592,207)"/>

    <!-- 腿部（行动） -->
    <rect x="490" y="300" width="20" height="50" rx="6" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <rect x="530" y="300" width="20" height="50" rx="6" fill="#409EFF" stroke="#2B7FD4" stroke-width="1.5"/>
    <!-- 脚 -->
    <rect x="485" y="345" width="30" height="12" rx="5" fill="#2B7FD4"/>
    <rect x="525" y="345" width="30" height="12" rx="5" fill="#2B7FD4"/>

    <!-- 背包（记忆） -->
    <rect x="555" y="195" width="28" height="40" rx="6" fill="#2B7FD4" stroke="#1a5a9e" stroke-width="1.5"/>
    <rect x="560" y="200" width="18" height="10" rx="3" fill="#409EFF" opacity="0.6"/>
    <rect x="560" y="215" width="18" height="10" rx="3" fill="#409EFF" opacity="0.6"/>
    <!-- 背包带 -->
    <path d="M555,210 Q545,205 545,215" fill="none" stroke="#2B7FD4" stroke-width="2.5"/>

    <!-- 指南针（规划） -->
    <circle cx="520" cy="185" r="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="2"/>
    <circle cx="520" cy="185" r="7" fill="#E8F4FD"/>
    <line x1="520" y1="178" x2="520" y2="192" stroke="#E74C3C" stroke-width="1.5"/>
    <line x1="513" y1="185" x2="527" y2="185" stroke="#1a1a2e" stroke-width="1.5"/>
    <polygon points="520,178 517,184 523,184" fill="#E74C3C"/>

    <!-- 思考气泡 -->
    <path d="M470,130 Q460,110 470,100 Q480,90 500,95 Q510,85 520,95 Q530,90 530,105 Q530,115 520,120 Q510,125 500,120 Q490,125 480,120 Z" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>
    <circle cx="475" cy="135" r="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
    <circle cx="470" cy="142" r="2.5" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>

    <!-- 思考气泡中的文字 -->
    <text x="498" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">解决问题</text>

    <!-- 从大脑到机器人头部的虚线连接 -->
    <path d="M220,95 Q350,80 485,130" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  </g>

  <!-- 智能体标签 -->
  <rect x="475" y="370" width="90" height="28" rx="14" fill="#409EFF"/>
  <text x="520" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">AI 智能体</text>

  <!-- ========== 标注 ========== -->

  <!-- 标注1：工具 -->
  <line x1="425" y1="225" x2="400" y2="260" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="365" y="260" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">工具</text>

  <!-- 标注2：地图 -->
  <line x1="600" y1="195" x2="620" y2="260" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="590" y="260" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="625" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">规划</text>

  <!-- 标注3：背包 -->
  <line x1="570" y1="235" x2="570" y2="260" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="535" y="260" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="570" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">记忆</text>

  <!-- 标注4：行动 -->
  <line x1="500" y1="355" x2="500" y2="420" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="465" y="420" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="500" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">行动</text>

  <!-- 标注5：知识 -->
  <line x1="100" y1="160" x2="50" y2="130" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="20" y="115" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="55" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">知识</text>

  <!-- 标注6：智能 -->
  <line x1="230" y1="95" x2="260" y2="70" stroke="#1a1a2e" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="245" y="55" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="280" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">智能</text>

  <!-- 底部说明 -->
  <rect x="200" y="460" width="400" height="28" rx="14" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">LLM 提供知识储备，AI 智能体将知识转化为实际行动</text>

</svg>