<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0eaff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b7bd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#409EFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">专家评审流程</text>

  <!-- 连接线（水平管道） -->
  <line x1="85" y1="160" x2="740" y2="160" stroke="#409EFF" stroke-width="3" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="85" y1="340" x2="740" y2="340" stroke="#409EFF" stroke-width="3" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 步骤 1：发布问题 -->
  <g>
    <rect x="30" y="120" width="100" height="80" rx="12" fill="url(#stepGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="80" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">步骤 1</text>
    <text x="80" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">发布问题</text>
    <!-- 文档图标 -->
    <rect x="55" y="174" width="20" height="16" rx="2" fill="white" opacity="0.9"/>
    <line x1="59" y1="180" x2="71" y2="180" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="59" y1="184" x2="71" y2="184" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 广播图标 -->
    <path d="M78 178 Q82 174 82 182 Q82 190 78 186" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="82" y1="178" x2="85" y2="175" stroke="white" stroke-width="1.5"/>
    <line x1="82" y1="186" x2="85" y2="189" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- 箭头 1→2 -->
  <polygon points="135,160 145,155 145,165" fill="#409EFF"/>

  <!-- 步骤 2：独立评审 -->
  <g>
    <rect x="150" y="120" width="110" height="80" rx="12" fill="url(#stepGradLight)" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="205" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">步骤 2</text>
    <text x="205" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">独立评审</text>
    <!-- 三个专家（带隔板） -->
    <rect x="158" y="174" width="12" height="16" rx="2" fill="white" opacity="0.7"/>
    <rect x="175" y="174" width="12" height="16" rx="2" fill="white" opacity="0.7"/>
    <rect x="192" y="174" width="12" height="16" rx="2" fill="white" opacity="0.7"/>
    <!-- 隔板 -->
    <line x1="171" y1="174" x2="171" y2="190" stroke="#1a1a2e" stroke-width="1.5"/>
    <line x1="188" y1="174" x2="188" y2="190" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- 专家头像 -->
    <circle cx="164" cy="180" r="4" fill="#1a1a2e"/>
    <circle cx="181" cy="180" r="4" fill="#1a1a2e"/>
    <circle cx="198" cy="180" r="4" fill="#1a1a2e"/>
  </g>

  <!-- 箭头 2→3 -->
  <polygon points="265,160 275,155 275,165" fill="#409EFF"/>

  <!-- 步骤 3：收集意见 -->
  <g>
    <rect x="280" y="120" width="100" height="80" rx="12" fill="url(#stepGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="330" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">步骤 3</text>
    <text x="330" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">收集意见</text>
    <!-- 意见卡片汇聚 -->
    <rect x="288" y="174" width="14" height="10" rx="1" fill="white" opacity="0.8"/>
    <rect x="306" y="174" width="14" height="10" rx="1" fill="white" opacity="0.8"/>
    <rect x="324" y="174" width="14" height="10" rx="1" fill="white" opacity="0.8"/>
    <line x1="302" y1="179" x2="306" y2="179" stroke="#409EFF" stroke-width="1"/>
    <line x1="320" y1="179" x2="324" y2="179" stroke="#409EFF" stroke-width="1"/>
    <!-- 汇聚点 -->
    <circle cx="338" cy="179" r="3" fill="white"/>
  </g>

  <!-- 箭头 3→4 -->
  <polygon points="385,160 395,155 395,165" fill="#409EFF"/>

  <!-- 步骤 4：交叉讨论 -->
  <g>
    <rect x="400" y="120" width="100" height="80" rx="12" fill="url(#stepGradLight)" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="450" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">步骤 4</text>
    <text x="450" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">交叉讨论</text>
    <!-- 圆桌 -->
    <ellipse cx="450" cy="183" rx="20" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <!-- 对话气泡 -->
    <path d="M428 172 Q425 165 432 165 L442 165 Q448 165 448 170 L448 172 Q448 176 442 176 L435 176 L428 180 L430 176 Q428 176 428 172Z" fill="white" opacity="0.7"/>
    <path d="M458 172 Q455 165 462 165 L472 165 Q478 165 478 170 L478 172 Q478 176 472 176 L465 176 L458 180 L460 176 Q458 176 458 172Z" fill="white" opacity="0.7"/>
  </g>

  <!-- 箭头 4→5 -->
  <polygon points="505,160 515,155 515,165" fill="#409EFF"/>

  <!-- 步骤 5：投票决策 -->
  <g>
    <rect x="520" y="120" width="100" height="80" rx="12" fill="url(#stepGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="570" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">步骤 5</text>
    <text x="570" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">投票决策</text>
    <!-- 投票箱 -->
    <rect x="555" y="174" width="18" height="16" rx="2" fill="white" opacity="0.8"/>
    <rect x="553" y="172" width="22" height="4" rx="1" fill="white" opacity="0.9"/>
    <!-- 选票 -->
    <rect x="578" y="176" width="8" height="6" rx="1" fill="white" opacity="0.7"/>
    <rect x="580" y="180" width="6" height="4" rx="1" fill="white" opacity="0.5"/>
  </g>

  <!-- 箭头 5→6 -->
  <polygon points="625,160 635,155 635,165" fill="#409EFF"/>

  <!-- 步骤 6：结果输出 -->
  <g>
    <rect x="640" y="120" width="100" height="80" rx="12" fill="url(#stepGradLight)" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="690" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">步骤 6</text>
    <text x="690" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">结果输出</text>
    <!-- 最终文档 -->
    <rect x="665" y="174" width="22" height="16" rx="2" fill="white" opacity="0.9"/>
    <line x1="669" y1="180" x2="683" y2="180" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="669" y1="184" x2="683" y2="184" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="669" y1="188" x2="678" y2="188" stroke="#409EFF" stroke-width="1.5"/>
  </g>

  <!-- 底部说明区域 -->
  <g>
    <rect x="30" y="260" width="740" height="2" rx="1" fill="#409EFF" opacity="0.3"/>
    <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">流程说明</text>
    <text x="400" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">发布问题 → 独立评审 → 收集意见 → 交叉讨论 → 投票决策 → 结果输出</text>
    <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">独立评审阶段设置隔板防止锚定效应，确保评审公正性</text>
  </g>

  <!-- 标注 1 -->
  <g>
    <line x1="80" y1="205" x2="80" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="50" y="240" width="60" height="22" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="80" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">发布问题</text>
  </g>

  <!-- 标注 2 -->
  <g>
    <line x1="205" y1="205" x2="205" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="170" y="240" width="70" height="22" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="205" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">独立评审</text>
  </g>

  <!-- 标注 3 -->
  <g>
    <line x1="330" y1="205" x2="330" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="295" y="240" width="70" height="22" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="330" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">收集意见</text>
  </g>

  <!-- 标注 4 -->
  <g>
    <line x1="450" y1="205" x2="450" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="415" y="240" width="70" height="22" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="450" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">交叉讨论</text>
  </g>

  <!-- 标注 5 -->
  <g>
    <line x1="570" y1="205" x2="570" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="535" y="240" width="70" height="22" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="570" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">投票决策</text>
  </g>

  <!-- 标注 6 -->
  <g>
    <line x1="690" y1="205" x2="690" y2="240" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="655" y="240" width="70" height="22" rx="4" fill="white" stroke="#409EFF" stroke-width="1"/>
    <text x="690" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">结果输出</text>
  </g>

  <!-- 底部装饰元素 -->
  <g opacity="0.15">
    <circle cx="50" cy="470" r="30" fill="#409EFF"/>
    <circle cx="750" cy="470" r="25" fill="#409EFF"/>
    <circle cx="400" cy="480" r="20" fill="#409EFF"/>
  </g>
</svg>