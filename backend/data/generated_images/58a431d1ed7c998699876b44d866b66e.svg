<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6ab7ff"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#7ec4ff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#409EFF" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e" letter-spacing="2">思维链对比：直接推理 vs 分步推理</text>
  <line x1="180" y1="48" x2="620" y2="48" stroke="#409EFF" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- ===== 左侧面板：无 CoT ===== -->
  <g transform="translate(40, 65)">
    <!-- 面板背景 -->
    <rect x="0" y="0" width="340" height="400" rx="14" fill="white" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.25" filter="url(#shadowLight)"/>

    <!-- 面板标题 -->
    <rect x="0" y="0" width="340" height="42" rx="14" fill="#409EFF" fill-opacity="0.08"/>
    <text x="170" y="27" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">无 CoT · 直接推理</text>

    <!-- 问题框 -->
    <rect x="70" y="80" width="200" height="48" rx="24" fill="#409EFF" fill-opacity="0.12" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="0"/>
    <text x="170" y="109" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">问题</text>

    <!-- 箭头（直接跳跃） -->
    <defs>
      <marker id="arrowLeft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF" fill-opacity="0.5"/>
      </marker>
    </defs>
    <line x1="170" y1="130" x2="170" y2="195" stroke="#409EFF" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arrowLeft)"/>

    <!-- 箭头上的问号 -->
    <circle cx="170" cy="162" r="14" fill="white" stroke="#f0ad4e" stroke-width="2"/>
    <text x="170" y="168" text-anchor="middle" font-size="16" font-weight="700" fill="#f0ad4e">?</text>

    <!-- 答案框 -->
    <rect x="70" y="205" width="200" height="48" rx="24" fill="#409EFF" fill-opacity="0.12" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="170" y="234" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">答案</text>

    <!-- 不确定性符号 -->
    <g transform="translate(170, 295)">
      <circle cx="0" cy="0" r="22" fill="#fdf6ec" stroke="#f0ad4e" stroke-width="2"/>
      <text x="0" y="8" text-anchor="middle" font-size="20" font-weight="700" fill="#f0ad4e">⚠</text>
    </g>

    <!-- 标注文字 -->
    <text x="170" y="345" text-anchor="middle" font-size="13" fill="#f0ad4e" font-weight="500">结果不透明</text>
    <text x="170" y="365" text-anchor="middle" font-size="13" fill="#f0ad4e" font-weight="500">无法验证推理</text>

    <!-- 底部标签 -->
    <rect x="100" y="385" width="140" height="0" rx="0" fill="none"/>
  </g>

  <!-- ===== 右侧面板：有 CoT ===== -->
  <g transform="translate(420, 65)">
    <!-- 面板背景 -->
    <rect x="0" y="0" width="340" height="400" rx="14" fill="white" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.25" filter="url(#shadowLight)"/>

    <!-- 面板标题 -->
    <rect x="0" y="0" width="340" height="42" rx="14" fill="#409EFF" fill-opacity="0.08"/>
    <text x="170" y="27" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">有 CoT · 分步推理</text>

    <!-- 问题框（底部） -->
    <rect x="70" y="310" width="200" height="48" rx="24" fill="#409EFF" fill-opacity="0.12" stroke="#409EFF" stroke-width="1.5"/>
    <text x="170" y="339" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">问题</text>

    <!-- 台阶 1 -->
    <rect x="95" y="258" width="150" height="38" rx="10" fill="url(#stepGrad)" fill-opacity="0.2" stroke="#409EFF" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="170" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">步骤 1</text>

    <!-- 台阶 2 -->
    <rect x="95" y="206" width="150" height="38" rx="10" fill="url(#stepGrad)" fill-opacity="0.35" stroke="#409EFF" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="170" y="230" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">步骤 2</text>

    <!-- 台阶 3 -->
    <rect x="95" y="154" width="150" height="38" rx="10" fill="url(#stepGrad)" fill-opacity="0.5" stroke="#409EFF" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="170" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">步骤 3</text>

    <!-- 台阶 4 -->
    <rect x="95" y="102" width="150" height="38" rx="10" fill="url(#stepGrad)" fill-opacity="0.65" stroke="#409EFF" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="170" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">步骤 4</text>

    <!-- 台阶之间的连接箭头 -->
    <line x1="170" y1="296" x2="170" y2="268" stroke="#409EFF" stroke-width="1.8" stroke-opacity="0.4" marker-end="url(#arrowLeft)"/>
    <line x1="170" y1="244" x2="170" y2="216" stroke="#409EFF" stroke-width="1.8" stroke-opacity="0.4" marker-end="url(#arrowLeft)"/>
    <line x1="170" y1="192" x2="170" y2="164" stroke="#409EFF" stroke-width="1.8" stroke-opacity="0.4" marker-end="url(#arrowLeft)"/>

    <!-- 答案框（顶部） -->
    <rect x="70" y="55" width="200" height="38" rx="19" fill="#409EFF" fill-opacity="0.2" stroke="#409EFF" stroke-width="2"/>
    <text x="170" y="79" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">答案</text>

    <!-- 从台阶 4 到答案的箭头 -->
    <line x1="170" y1="102" x2="170" y2="95" stroke="#409EFF" stroke-width="2.5" stroke-opacity="0.6" marker-end="url(#arrowLeft)"/>

    <!-- 绿色对号 -->
    <g transform="translate(170, 370)">
      <circle cx="0" cy="0" r="22" fill="#e8f8e8" stroke="#67c23a" stroke-width="2"/>
      <path d="M-10,0 L-4,6 L10,-8" stroke="#67c23a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 标注文字 -->
    <text x="170" y="418" text-anchor="middle" font-size="13" fill="#67c23a" font-weight="500">推理可追溯</text>
    <text x="170" y="438" text-anchor="middle" font-size="13" fill="#67c23a" font-weight="500">结果可验证</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="488" text-anchor="middle" font-size="12" fill="#409EFF" fill-opacity="0.5" letter-spacing="1">教育插画 · 思维链对比 · 扁平化设计</text>
</svg>