  <!-- 轴2: (484.85, 175.15) -->
  <!-- 轴3: (520, 260) -->
  <!-- 轴4: (484.85, 344.85) -->
  <!-- 轴5: (400, 380) -->
  <!-- 轴6: (315.15, 344.85) -->
  <!-- 轴7: (280, 260) -->
  <!-- 轴8: (315.15, 175.15) -->

