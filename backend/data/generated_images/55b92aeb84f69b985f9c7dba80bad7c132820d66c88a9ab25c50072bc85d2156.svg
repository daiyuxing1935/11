  <!-- 轴1: 90° (顶部)  OS -->
  <!-- 轴2: 45° (右上)  DB -->
  <!-- 轴3: 0° (右侧)   KG -->
  <!-- 轴4: 315° (右下) Web -->
  <!-- 轴5: 270° (底部) DCG -->
  <!-- 轴6: 225° (左下) LTP -->
  <!-- 轴7: 180° (左侧) Code -->
  <!-- 轴8: 135° (左上) NLP -->

