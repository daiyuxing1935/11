<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0EBF9"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">松耦合四大优势</text>

  <!-- 2x2 网格布局 -->
  <!-- 左上：即插即用 -->
  <rect x="30" y="60" width="355" height="195" rx="10" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="60" width="355" height="32" rx="10" fill="#409EFF"/>
  <rect x="30" y="82" width="355" height="10" fill="#409EFF"/>
  <text x="207" y="82" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">即插即用</text>

  <!-- 现有代理 -->
  <rect x="55" y="108" width="80" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="95" y="131" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">代理A</text>
  <rect x="55" y="152" width="80" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="95" y="175" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">代理B</text>
  <rect x="55" y="196" width="80" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="95" y="219" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">代理C</text>

  <!-- 插入箭头 -->
  <text x="155" y="175" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#409EFF">→</text>

  <!-- 新插入的代理 -->
  <rect x="185" y="108" width="85" height="36" rx="6" fill="#409EFF" opacity="0.85"/>
  <text x="227" y="131" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FFFFFF">日志代理</text>
  <rect x="185" y="152" width="85" height="36" rx="6" fill="#409EFF" opacity="0.85"/>
  <text x="227" y="175" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FFFFFF">监控代理</text>

  <!-- 零侵入图标 -->
  <circle cx="300" cy="175" r="22" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <text x="300" y="172" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">零侵入</text>
  <text x="300" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF">✓</text>

  <!-- 右上：动态重配 -->
  <rect x="415" y="60" width="355" height="195" rx="10" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="60" width="355" height="32" rx="10" fill="#409EFF"/>
  <rect x="415" y="82" width="355" height="10" fill="#409EFF"/>
  <text x="592" y="82" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">动态重配</text>

  <!-- 运行时订阅变更 -->
  <text x="440" y="120" font-family="sans-serif" font-size="12" fill="#1a1a2e">运行时订阅变更：</text>

  <!-- 退订 -->
  <rect x="440" y="132" width="140" height="40" rx="6" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="1.2"/>
  <text x="510" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#CC3333">退订</text>
  <text x="510" y="164" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#CC3333">task.*.low_priority</text>
  <text x="590" y="155" font-family="sans-serif" font-size="18" fill="#FF6B6B">✕</text>

  <!-- 订阅 -->
  <rect x="440" y="180" width="140" height="40" rx="6" fill="#F0FFF0" stroke="#67C23A" stroke-width="1.2"/>
  <text x="510" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2D8B1E">订阅</text>
  <text x="510" y="212" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2D8B1E">error.#</text>
  <text x="590" y="203" font-family="sans-serif" font-size="18" fill="#67C23A">✓</text>

  <!-- 开关图标 -->
  <rect x="630" y="138" width="40" height="20" rx="10" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="640" cy="148" r="7" fill="#409EFF"/>
  <rect x="630" y="186" width="40" height="20" rx="10" fill="#409EFF" stroke="#409EFF" stroke-width="1.2"/>
  <circle cx="660" cy="196" r="7" fill="#FFFFFF"/>

  <!-- 左下：自然广播 -->
  <rect x="30" y="280" width="355" height="195" rx="10" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="30" y="280" width="355" height="32" rx="10" fill="#409EFF"/>
  <rect x="30" y="302" width="355" height="10" fill="#409EFF"/>
  <text x="207" y="302" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">自然广播</text>

  <!-- 发布者 -->
  <circle cx="120" cy="380" r="30" fill="#409EFF" opacity="0.9"/>
  <text x="120" y="377" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFFFFF">发布者</text>
  <text x="120" y="392" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFFFFF">事件</text>

  <!-- 扇出箭头 -->
  <line x1="150" y1="360" x2="210" y2="330" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="380" x2="210" y2="380" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="400" x2="210" y2="430" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="380" x2="210" y2="380" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)" transform="translate(0,20)"/>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 四个订阅者 -->
  <rect x="215" y="312" width="70" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="250" y="334" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">分析</text>
  <rect x="215" y="362" width="70" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="250" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">日志</text>
  <rect x="215" y="412" width="70" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="250" y="434" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">写入</text>
  <rect x="300" y="362" width="70" height="36" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="335" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">通知</text>

  <text x="250" y="470" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">发布者无需感知订阅者</text>

  <!-- 右下：弹性容错 -->
  <rect x="415" y="280" width="355" height="195" rx="10" fill="url(#boxGrad)" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="415" y="280" width="355" height="32" rx="10" fill="#409EFF"/>
  <rect x="415" y="302" width="355" height="10" fill="#409EFF"/>
  <text x="592" y="302" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">弹性容错</text>

  <!-- 发布者 -->
  <rect x="440" y="340" width="80" height="40" rx="6" fill="#409EFF" opacity="0.9"/>
  <text x="480" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FFFFFF">发布者</text>

  <!-- 箭头 -->
  <line x1="520" y1="360" x2="560" y2="360" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 订阅者（离线） -->
  <rect x="565" y="340" width="80" height="40" rx="6" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="605" y="365" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#999">订阅者</text>
  <!-- 红色 X -->
  <text x="655" y="358" font-family="sans-serif" font-size="22" fill="#FF6B6B" font-weight="bold">✕</text>

  <!-- 恢复箭头 -->
  <path d="M570,400 Q570,430 605,430 Q640,430 640,400" fill="none" stroke="#67C23A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="605" y="448" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#67C23A">恢复后重放历史事件</text>

  <!-- 回放图标 -->
  <circle cx="660" cy="420" r="14" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.2"/>
  <text x="660" y="425" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#409EFF">↺</text>

  <!-- 底部标注 -->
  <text x="400" y="495" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">松耦合架构 · 各组件独立演进</text>
</svg>