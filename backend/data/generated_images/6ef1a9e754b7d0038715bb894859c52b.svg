<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="white"/>
  <rect x="30" y="20" width="740" height="460" rx="16" fill="url(#bgGrad)"/>

  <!-- 主文档框 -->
  <rect x="60" y="40" width="680" height="420" rx="12" fill="white" stroke="#409EFF" stroke-width="2"/>
  <rect x="60" y="40" width="680" height="36" rx="12" fill="url(#headerGrad)"/>
  <rect x="60" y="64" width="680" height="12" fill="url(#headerGrad)"/>
  <text x="400" y="64" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">系统提示词结构解剖图 / System Prompt Anatomy</text>

  <!-- 第1节：角色设定 -->
  <rect x="90" y="92" width="620" height="72" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="90" y="92" width="4" height="72" rx="2" fill="#409EFF"/>

  <!-- 人物剪影 -->
  <circle cx="130" cy="128" r="16" fill="#409EFF" opacity="0.3"/>
  <circle cx="130" cy="120" r="6" fill="#409EFF"/>
  <path d="M118 140 Q130 130 142 140 L142 148 L118 148 Z" fill="#409EFF"/>

  <!-- 徽章 -->
  <rect x="148" y="114" width="20" height="14" rx="3" fill="#409EFF"/>
  <text x="158" y="124" text-anchor="middle" fill="white" font-size="8" font-weight="bold">角色</text>

  <text x="178" y="122" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">角色设定 / Persona</text>
  <text x="178" y="144" fill="#666" font-size="13" font-family="sans-serif">身份 + 专业领域 + 沟通风格</text>

  <!-- 第1节标注 -->
  <line x1="560" y1="128" x2="620" y2="128" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="622" y="118" width="72" height="20" rx="4" fill="#409EFF"/>
  <text x="658" y="132" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">定义角色身份</text>

  <!-- 第2节：行为约束 -->
  <rect x="90" y="180" width="620" height="72" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="90" y="180" width="4" height="72" rx="2" fill="#409EFF"/>

  <!-- 规则书图标 -->
  <rect x="118" y="198" width="22" height="28" rx="3" fill="#409EFF" opacity="0.2"/>
  <rect x="120" y="200" width="18" height="24" rx="2" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="129" y="210" text-anchor="middle" fill="#409EFF" font-size="8">✓</text>
  <text x="129" y="220" text-anchor="middle" fill="#409EFF" font-size="8">✗</text>

  <text x="150" y="210" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">行为约束 / Behavioral Constraints</text>
  <text x="150" y="232" fill="#666" font-size="13" font-family="sans-serif">应该做的 ✓ vs 不应该做的 ✗</text>

  <!-- 对勾和叉号 -->
  <text x="480" y="210" fill="#67C23A" font-size="16">✓ 遵守规则</text>
  <text x="480" y="232" fill="#F56C6C" font-size="16">✗ 越界行为</text>

  <!-- 第2节标注 -->
  <line x1="560" y1="216" x2="620" y2="216" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="622" y="206" width="72" height="20" rx="4" fill="#409EFF"/>
  <text x="658" y="220" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">明确行为边界</text>

  <!-- 第3节：能力边界 -->
  <rect x="90" y="268" width="620" height="72" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="90" y="268" width="4" height="72" rx="2" fill="#409EFF"/>

  <!-- 边界圆 -->
  <circle cx="130" cy="304" r="22" fill="none" stroke="#409EFF" stroke-width="2"/>
  <circle cx="130" cy="304" r="22" fill="#409EFF" opacity="0.1"/>
  <text x="130" y="300" text-anchor="middle" fill="#409EFF" font-size="9">能力</text>
  <text x="130" y="312" text-anchor="middle" fill="#409EFF" font-size="9">边界</text>

  <!-- 圈内项目 -->
  <text x="165" y="296" fill="#1a1a2e" font-size="11" font-family="sans-serif">✅ 回答问题</text>
  <text x="165" y="312" fill="#1a1a2e" font-size="11" font-family="sans-serif">✅ 提供建议</text>

  <!-- 圈外项目 -->
  <text x="330" y="296" fill="#F56C6C" font-size="11" font-family="sans-serif">❌ 执行代码</text>
  <text x="330" y="312" fill="#F56C6C" font-size="11" font-family="sans-serif">❌ 访问外部</text>

  <text x="150" y="296" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">能力边界 / Capability Boundaries</text>

  <!-- 第3节标注 -->
  <line x1="560" y1="304" x2="620" y2="304" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="622" y="294" width="72" height="20" rx="4" fill="#409EFF"/>
  <text x="658" y="308" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">界定能力范围</text>

  <!-- 第4节：背景知识注入 -->
  <rect x="90" y="356" width="620" height="72" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="90" y="356" width="4" height="72" rx="2" fill="#409EFF"/>

  <!-- 书本图标 -->
  <rect x="114" y="374" width="24" height="20" rx="2" fill="#409EFF" opacity="0.2"/>
  <rect x="116" y="376" width="20" height="16" rx="1" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <line x1="116" y1="382" x2="136" y2="382" stroke="#409EFF" stroke-width="1"/>
  <line x1="116" y1="386" x2="136" y2="386" stroke="#409EFF" stroke-width="1"/>

  <!-- 注入图标 -->
  <path d="M145 384 L152 376 L152 380 L159 372 L152 380 L152 384 Z" fill="#409EFF" opacity="0.6"/>

  <text x="168" y="382" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">背景知识注入 / Knowledge Injection</text>
  <text x="168" y="404" fill="#666" font-size="13" font-family="sans-serif">术语 · 业务规则 · 文档</text>

  <!-- 知识标签 -->
  <rect x="400" y="374" width="50" height="18" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="425" y="387" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">术语</text>
  <rect x="458" y="374" width="50" height="18" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="483" y="387" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">规则</text>
  <rect x="516" y="374" width="50" height="18" rx="4" fill="#409EFF" opacity="0.15"/>
  <text x="541" y="387" text-anchor="middle" fill="#409EFF" font-size="11" font-family="sans-serif">文档</text>

  <!-- 第4节标注 -->
  <line x1="560" y1="392" x2="620" y2="392" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="622" y="382" width="72" height="20" rx="4" fill="#409EFF"/>
  <text x="658" y="396" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">注入领域知识</text>

  <!-- Lost-in-the-Middle 警告 -->
  <rect x="200" y="442" width="400" height="28" rx="14" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="400" y="460" text-anchor="middle" fill="#E65100" font-size="13" font-weight="bold" font-family="sans-serif">⚠ Lost-in-the-Middle：重要约束放在顶部和底部</text>

  <!-- 顶部和底部指示箭头 -->
  <path d="M400 88 L390 78 L410 78 Z" fill="#409EFF" opacity="0.5"/>
  <path d="M400 436 L390 446 L410 446 Z" fill="#409EFF" opacity="0.5"/>
  <text x="420" y="82" fill="#409EFF" font-size="11" opacity="0.7" font-family="sans-serif">重要</text>
  <text x="420" y="448" fill="#409EFF" font-size="11" opacity="0.7" font-family="sans-serif">重要</text>
</svg>