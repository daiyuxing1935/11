<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2ff"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">大语言模型评估五大要点</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>

  <!-- === 卡片 1 === -->
  <rect x="30" y="65" width="340" height="62" rx="10" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2" opacity="0.95"/>
  <rect x="30" y="65" width="36" height="62" rx="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="48" cy="96" r="14" fill="#409EFF"/>
  <text x="48" y="101" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">1</text>
  <text x="76" y="90" font-size="15" font-weight="bold" fill="#1a1a2e">评估具有情境依赖性</text>
  <text x="76" y="112" font-size="13" fill="#555">评估需结合具体任务场景</text>
  <!-- 箭头图标 -->
  <line x1="280" y1="96" x2="340" y2="96" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <polygon points="340,90 352,96 340,102" fill="#409EFF"/>

  <!-- === 卡片 2 === -->
  <rect x="30" y="142" width="340" height="62" rx="10" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2" opacity="0.95"/>
  <rect x="30" y="142" width="36" height="62" rx="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="48" cy="173" r="14" fill="#409EFF"/>
  <text x="48" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">2</text>
  <text x="76" y="167" font-size="15" font-weight="bold" fill="#1a1a2e">基准是地图，而非实景</text>
  <text x="76" y="189" font-size="13" fill="#555">基准反映部分性能</text>
  <!-- 地图 vs 实景图标 -->
  <rect x="280" y="155" width="28" height="20" rx="3" fill="#409EFF" opacity="0.3" stroke="#409EFF" stroke-width="0.8"/>
  <rect x="280" y="155" width="14" height="10" rx="2" fill="#409EFF" opacity="0.5"/>
  <text x="294" y="168" text-anchor="middle" font-size="8" fill="#1a1a2e">🗺</text>
  <text x="318" y="168" text-anchor="middle" font-size="10" fill="#409EFF">≠</text>
  <rect x="332" y="155" width="28" height="20" rx="3" fill="#e8f4e8" stroke="#67c23a" stroke-width="0.8"/>
  <text x="346" y="168" text-anchor="middle" font-size="8" fill="#1a1a2e">🏔</text>

  <!-- === 卡片 3 === -->
  <rect x="30" y="219" width="340" height="62" rx="10" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2" opacity="0.95"/>
  <rect x="30" y="219" width="36" height="62" rx="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="48" cy="250" r="14" fill="#409EFF"/>
  <text x="48" y="255" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">3</text>
  <text x="76" y="244" font-size="15" font-weight="bold" fill="#1a1a2e">LLM作为评判者已成主流</text>
  <text x="76" y="266" font-size="13" fill="#555">GPT-4 评判相关性 0.8-0.9</text>
  <!-- 法槌图标 -->
  <rect x="280" y="232" width="22" height="22" rx="4" fill="#f0f0f0" stroke="#409EFF" stroke-width="0.8"/>
  <text x="291" y="248" text-anchor="middle" font-size="14" fill="#409EFF">⚖</text>
  <text x="308" y="248" font-size="11" fill="#1a1a2e" font-weight="bold">0.8-0.9</text>

  <!-- === 卡片 4 === -->
  <rect x="30" y="296" width="340" height="62" rx="10" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2" opacity="0.95"/>
  <rect x="30" y="296" width="36" height="62" rx="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="48" cy="327" r="14" fill="#409EFF"/>
  <text x="48" y="332" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">4</text>
  <text x="76" y="321" font-size="15" font-weight="bold" fill="#1a1a2e">关注全貌</text>
  <text x="76" y="343" font-size="13" fill="#555">多维度评估，避免单一指标</text>
  <!-- 雷达图图标 -->
  <polygon points="290,320 300,310 310,320 306,332 294,332" fill="none" stroke="#409EFF" stroke-width="1.2"/>
  <polygon points="293,322 300,315 307,322 304,330 296,330" fill="#409EFF" opacity="0.2"/>
  <circle cx="300" cy="321" r="2" fill="#409EFF"/>
  <line x1="300" y1="310" x2="300" y2="332" stroke="#409EFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="290" y1="321" x2="310" y2="321" stroke="#409EFF" stroke-width="0.5" opacity="0.4"/>
  <text x="330" y="325" font-size="10" fill="#666">多维度</text>

  <!-- === 卡片 5 === -->
  <rect x="30" y="373" width="340" height="62" rx="10" fill="url(#cardGrad1)" stroke="#409EFF" stroke-width="1.2" opacity="0.95"/>
  <rect x="30" y="373" width="36" height="62" rx="10" fill="#409EFF" opacity="0.15"/>
  <circle cx="48" cy="404" r="14" fill="#409EFF"/>
  <text x="48" y="409" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">5</text>
  <text x="76" y="398" font-size="15" font-weight="bold" fill="#1a1a2e">评估是持续的过程</text>
  <text x="76" y="420" font-size="13" fill="#555">持续迭代，闭环反馈</text>
  <!-- 循环箭头 -->
  <circle cx="300" cy="404" r="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <polygon points="300,388 304,394 296,394" fill="#409EFF"/>
  <polygon points="300,420 296,414 304,414" fill="#409EFF"/>
  <text x="322" y="408" font-size="10" fill="#409EFF">⟳</text>

  <!-- === 右侧中央格言 === -->
  <rect x="410" y="130" width="360" height="240" rx="16" fill="#ffffff" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="410" y="130" width="360" height="48" rx="16" fill="#409EFF" opacity="0.1"/>
  <text x="590" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">核心理念</text>

  <!-- 格言 -->
  <text x="590" y="210" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">“如果你无法衡量它，</text>
  <text x="590" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">就无法改进它。”</text>

  <!-- 装饰线 -->
  <line x1="470" y1="258" x2="710" y2="258" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 补充说明 -->
  <text x="590" y="285" text-anchor="middle" font-size="13" fill="#555">系统化评估驱动持续优化</text>

  <!-- 三个小圆点装饰 -->
  <circle cx="560" cy="310" r="4" fill="#409EFF" opacity="0.6"/>
  <circle cx="590" cy="310" r="4" fill="#409EFF" opacity="0.9"/>
  <circle cx="620" cy="310" r="4" fill="#409EFF" opacity="0.6"/>

  <!-- 底部小字 -->
  <text x="590" y="340" text-anchor="middle" font-size="12" fill="#999">评估 → 分析 → 改进 → 再评估</text>

  <!-- 底部装饰条 -->
  <rect x="410" y="355" width="360" height="3" rx="1.5" fill="#409EFF" opacity="0.3"/>

  <!-- 底部信息 -->
  <text x="400" y="480" text-anchor="middle" font-size="12" fill="#aaa">教育配图 · LLM 评估五大要点</text>
</svg>