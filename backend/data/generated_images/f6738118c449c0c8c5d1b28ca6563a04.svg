<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">三种推理模式对比</text>

  <!-- 左侧面板：CoT Only -->
  <rect x="30" y="65" width="220" height="400" rx="14" fill="#ffffff" stroke="#E0E6ED" stroke-width="1.5"/>
  <rect x="30" y="65" width="220" height="42" rx="14" fill="#F5F7FA"/>
  <text x="140" y="92" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">CoT Only</text>

  <!-- 思维气泡链 -->
  <ellipse cx="140" cy="145" rx="60" ry="22" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="140" y="149" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">思考步骤1</text>

  <!-- 箭头1 -->
  <line x1="140" y1="167" x2="140" y2="195" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <ellipse cx="140" cy="220" rx="60" ry="22" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="140" y="224" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">思考步骤2</text>

  <line x1="140" y1="242" x2="140" y2="270" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <ellipse cx="140" cy="295" rx="60" ry="22" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="140" y="299" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">思考步骤3</text>

  <line x1="140" y1="317" x2="140" y2="345" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <ellipse cx="140" cy="370" rx="60" ry="22" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="140" y="374" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">最终答案</text>

  <!-- 标注 -->
  <rect x="55" y="415" width="170" height="30" rx="6" fill="#F5F7FA" stroke="#D0D7E2" stroke-width="1"/>
  <text x="140" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">线性推理，无工具调用</text>

  <!-- 中间面板：Action Only -->
  <rect x="290" y="65" width="220" height="400" rx="14" fill="#ffffff" stroke="#E0E6ED" stroke-width="1.5"/>
  <rect x="290" y="65" width="220" height="42" rx="14" fill="#F5F7FA"/>
  <text x="400" y="92" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">Action Only</text>

  <!-- 工具图标（分散无连接） -->
  <!-- 工具1：搜索 -->
  <rect x="320" y="130" width="60" height="50" rx="10" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="350" y="153" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🔍 搜索</text>

  <!-- 工具2：计算 -->
  <rect x="410" y="130" width="60" height="50" rx="10" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="440" y="153" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🧮 计算</text>

  <!-- 工具3：代码 -->
  <rect x="320" y="210" width="60" height="50" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="350" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">💻 代码</text>

  <!-- 工具4：数据库 -->
  <rect x="410" y="210" width="60" height="50" rx="10" fill="#E0F7FA" stroke="#26C6DA" stroke-width="1.5"/>
  <text x="440" y="233" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🗄️ 数据库</text>

  <!-- 工具5：API -->
  <rect x="320" y="290" width="60" height="50" rx="10" fill="#FFF8E1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="350" y="313" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🔗 API</text>

  <!-- 工具6：文件 -->
  <rect x="410" y="290" width="60" height="50" rx="10" fill="#FBE9E7" stroke="#FF7043" stroke-width="1.5"/>
  <text x="440" y="313" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">📄 文件</text>

  <!-- 标注 -->
  <rect x="315" y="415" width="170" height="30" rx="6" fill="#F5F7FA" stroke="#D0D7E2" stroke-width="1"/>
  <text x="400" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">工具调用，无推理连接</text>

  <!-- 右侧面板：ReAct（高亮） -->
  <rect x="550" y="65" width="220" height="400" rx="14" fill="#ffffff" stroke="#409EFF" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="550" y="65" width="220" height="42" rx="14" fill="#409EFF" opacity="0.1"/>
  <rect x="550" y="65" width="220" height="42" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <text x="660" y="92" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#409EFF">ReAct（推荐）</text>

  <!-- 循环：思考-行动-思考-行动 -->

  <!-- 思考1 -->
  <ellipse cx="660" cy="135" rx="55" ry="20" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="660" y="139" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🤔 分析问题</text>

  <!-- 箭头向下 -->
  <line x1="660" y1="155" x2="660" y2="180" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 行动1 -->
  <rect x="620" y="185" width="80" height="36" rx="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="660" y="208" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🔍 搜索</text>

  <!-- 箭头向右再向下 -->
  <line x1="700" y1="203" x2="730" y2="203" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="730" y1="203" x2="730" y2="240" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="730" y1="240" x2="710" y2="240" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 思考2 -->
  <ellipse cx="660" cy="265" rx="55" ry="20" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="660" y="269" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🤔 整合信息</text>

  <!-- 箭头向下 -->
  <line x1="660" y1="285" x2="660" y2="310" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 行动2 -->
  <rect x="620" y="315" width="80" height="36" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="660" y="338" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">🧮 计算</text>

  <!-- 箭头向右再向下 -->
  <line x1="700" y1="333" x2="730" y2="333" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="730" y1="333" x2="730" y2="370" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="730" y1="370" x2="710" y2="370" stroke="#409EFF" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 思考3（最终） -->
  <ellipse cx="660" cy="395" rx="55" ry="20" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.8"/>
  <text x="660" y="399" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">✅ 得出结论</text>

  <!-- 标注 -->
  <rect x="575" y="415" width="170" height="30" rx="6" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <text x="660" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">推理与工具循环协作</text>

</svg>