<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#B0C4DE" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">评估原则概览</text>
  <line x1="320" y1="60" x2="480" y2="60" stroke="#409EFF" stroke-width="3" stroke-linecap="round"/>

  <!-- 5个卡片支柱 -->
  <!-- 卡片1 -->
  <g filter="url(#shadow)">
    <rect x="30" y="90" width="128" height="340" rx="14" fill="white" stroke="#D0E4F5" stroke-width="1"/>
    <!-- 图标：多指标组合 - 使用三个重叠圆环 -->
    <circle cx="94" cy="140" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="82" cy="152" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="106" cy="152" r="16" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <text x="94" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">多指标</text>
    <text x="94" y="210" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">组合</text>
    <!-- 装饰线 -->
    <line x1="50" y1="230" x2="138" y2="230" stroke="#E8F4FD" stroke-width="1.5"/>
    <!-- 补充说明标签 -->
    <text x="94" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">综合评估</text>
    <text x="94" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">多维度</text>
  </g>

  <!-- 卡片2 -->
  <g filter="url(#shadow)">
    <rect x="178" y="90" width="128" height="340" rx="14" fill="white" stroke="#D0E4F5" stroke-width="1"/>
    <!-- 图标：分解大于聚合 - 向下箭头 + 分割线 -->
    <rect x="78" y="128" width="32" height="24" rx="3" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="94" y1="128" x2="94" y2="104" stroke="#409EFF" stroke-width="2.5"/>
    <polygon points="94,98 88,110 100,110" fill="#409EFF"/>
    <text x="94" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">分解</text>
    <text x="94" y="210" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">大于聚合</text>
    <line x1="198" y1="230" x2="286" y2="230" stroke="#E8F4FD" stroke-width="1.5"/>
    <text x="94" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">逐层拆解</text>
    <text x="94" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">精细分析</text>
  </g>

  <!-- 卡片3 -->
  <g filter="url(#shadow)">
    <rect x="326" y="90" width="128" height="340" rx="14" fill="white" stroke="#D0E4F5" stroke-width="1"/>
    <!-- 图标：自动化+人工混合 - 齿轮 + 人形 -->
    <circle cx="94" cy="138" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <circle cx="94" cy="138" r="8" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="94" y1="120" x2="94" y2="114" stroke="#409EFF" stroke-width="2"/>
    <line x1="94" y1="156" x2="94" y2="162" stroke="#409EFF" stroke-width="2"/>
    <line x1="76" y1="138" x2="70" y2="138" stroke="#409EFF" stroke-width="2"/>
    <line x1="112" y1="138" x2="118" y2="138" stroke="#409EFF" stroke-width="2"/>
    <!-- 小人人形 -->
    <circle cx="94" cy="168" r="6" fill="#409EFF"/>
    <line x1="94" y1="174" x2="94" y2="186" stroke="#409EFF" stroke-width="2.5"/>
    <line x1="84" y1="180" x2="104" y2="180" stroke="#409EFF" stroke-width="2.5"/>
    <text x="94" y="210" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">自动化</text>
    <text x="94" y="228" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">+ 人工混合</text>
    <line x1="346" y1="248" x2="434" y2="248" stroke="#E8F4FD" stroke-width="1.5"/>
    <text x="94" y="276" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">人机协同</text>
    <text x="94" y="294" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">高效准确</text>
  </g>

  <!-- 卡片4 -->
  <g filter="url(#shadow)">
    <rect x="474" y="90" width="128" height="340" rx="14" fill="white" stroke="#D0E4F5" stroke-width="1"/>
    <!-- 图标：生命周期持续 - 循环箭头 -->
    <circle cx="94" cy="138" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
    <path d="M94,120 L94,130 L104,130" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M94,156 L94,146 L84,146" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 时间轴小点 -->
    <circle cx="76" cy="138" r="3" fill="#409EFF"/>
    <circle cx="112" cy="138" r="3" fill="#409EFF"/>
    <text x="94" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">生命周期</text>
    <text x="94" y="210" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">持续</text>
    <line x1="494" y1="230" x2="582" y2="230" stroke="#E8F4FD" stroke-width="1.5"/>
    <text x="94" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">全流程</text>
    <text x="94" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">持续追踪</text>
  </g>

  <!-- 卡片5 -->
  <g filter="url(#shadow)">
    <rect x="622" y="90" width="128" height="340" rx="14" fill="white" stroke="#D0E4F5" stroke-width="1"/>
    <!-- 图标：改进导向 - 上升箭头 + 目标 -->
    <line x1="94" y1="156" x2="94" y2="120" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="94,114 86,126 102,126" fill="#409EFF"/>
    <circle cx="94" cy="138" r="6" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="94" y1="138" x2="100" y2="132" stroke="#409EFF" stroke-width="2"/>
    <text x="94" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">改进</text>
    <text x="94" y="210" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">导向</text>
    <line x1="642" y1="230" x2="730" y2="230" stroke="#E8F4FD" stroke-width="1.5"/>
    <text x="94" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">持续优化</text>
    <text x="94" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7A8BA0">迭代提升</text>
  </g>

  <!-- 底部总结栏 -->
  <g filter="url(#shadow)">
    <rect x="100" y="450" width="600" height="36" rx="18" fill="#409EFF" opacity="0.9"/>
    <text x="400" y="473" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">五大原则协同作用，构建科学评估体系</text>
  </g>
</svg>