<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BD4"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F4FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">博弈论核心概念 · 多智能体系统思维导图</text>

  <!-- 中心枢纽：多智能体系统 -->
  <circle cx="400" cy="250" r="52" fill="url(#hubGrad)" filter="url(#shadow)"/>
  <circle cx="400" cy="250" r="52" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <text x="400" y="242" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">多智能体</text>
  <text x="400" y="262" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">系统</text>

  <!-- 连接线 -->
  <g stroke="#409EFF" stroke-width="1.8" fill="none" opacity="0.6">
    <!-- 上左：纳什均衡 -->
    <path d="M358,215 Q290,130 230,105"/>
    <!-- 上中：囚徒困境 -->
    <path d="M400,198 L400,110"/>
    <!-- 上右：合作博弈 -->
    <path d="M442,215 Q510,130 570,105"/>
    <!-- 下左：重复博弈 -->
    <path d="M358,285 Q290,370 230,395"/>
    <!-- 下右：机制设计 -->
    <path d="M442,285 Q510,370 570,395"/>
  </g>

  <!-- 节点1：纳什均衡（左上） -->
  <g filter="url(#shadow)">
    <rect x="140" y="72" width="180" height="66" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="230" y="96" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">纳什均衡</text>
    <text x="230" y="116" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">平衡天平</text>
    <!-- 天平图标 -->
    <g transform="translate(230,130)">
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="-8" stroke="#409EFF" stroke-width="1.5"/>
      <circle cx="0" cy="-9" r="2" fill="#409EFF"/>
      <line x1="-12" y1="-3" x2="-12" y2="0" stroke="#409EFF" stroke-width="1.5"/>
      <line x1="12" y1="-3" x2="12" y2="0" stroke="#409EFF" stroke-width="1.5"/>
      <circle cx="-12" cy="-5" r="3" fill="#409EFF" opacity="0.6"/>
      <circle cx="12" cy="-5" r="3" fill="#409EFF" opacity="0.6"/>
    </g>
  </g>

  <!-- 节点2：囚徒困境（上中） -->
  <g filter="url(#shadow)">
    <rect x="310" y="72" width="180" height="66" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="400" y="96" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">囚徒困境</text>
    <text x="400" y="116" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">2×2 矩阵</text>
    <!-- 2x2矩阵图标 -->
    <g transform="translate(400,132)">
      <rect x="-14" y="-8" width="28" height="16" rx="2" fill="none" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="-14" y1="0" x2="14" y2="0" stroke="#409EFF" stroke-width="0.8"/>
      <text x="-7" y="-2" text-anchor="middle" font-size="6" fill="#409EFF">-1</text>
      <text x="7" y="-2" text-anchor="middle" font-size="6" fill="#409EFF">-5</text>
      <text x="-7" y="5" text-anchor="middle" font-size="6" fill="#409EFF">-5</text>
      <text x="7" y="5" text-anchor="middle" font-size="6" fill="#409EFF">-2</text>
    </g>
  </g>

  <!-- 节点3：合作博弈（右上） -->
  <g filter="url(#shadow)">
    <rect x="480" y="72" width="180" height="66" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="570" y="96" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">合作博弈</text>
    <text x="570" y="116" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">互锁齿轮</text>
    <!-- 齿轮图标 -->
    <g transform="translate(570,132)">
      <circle cx="-6" cy="0" r="6" fill="none" stroke="#409EFF" stroke-width="1.2"/>
      <circle cx="6" cy="0" r="6" fill="none" stroke="#409EFF" stroke-width="1.2"/>
      <circle cx="-6" cy="0" r="2" fill="#409EFF" opacity="0.5"/>
      <circle cx="6" cy="0" r="2" fill="#409EFF" opacity="0.5"/>
      <line x1="-6" y1="-6" x2="-6" y2="-8" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="-6" y1="6" x2="-6" y2="8" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="6" y1="-6" x2="6" y2="-8" stroke="#409EFF" stroke-width="0.8"/>
      <line x1="6" y1="6" x2="6" y2="8" stroke="#409EFF" stroke-width="0.8"/>
    </g>
  </g>

  <!-- 节点4：重复博弈（左下） -->
  <g filter="url(#shadow)">
    <rect x="140" y="362" width="180" height="66" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="230" y="386" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">重复博弈</text>
    <text x="230" y="406" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">循环回路</text>
    <!-- 循环箭头图标 -->
    <g transform="translate(230,420)">
      <path d="M-8,0 A8,8 0 1,1 8,0" fill="none" stroke="#409EFF" stroke-width="1.5"/>
      <path d="M8,0 A8,8 0 1,1 -8,0" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>
      <polygon points="8,-3 12,0 8,3" fill="#409EFF"/>
      <polygon points="-8,-3 -12,0 -8,3" fill="#409EFF" opacity="0.4"/>
    </g>
  </g>

  <!-- 节点5：机制设计（右下） -->
  <g filter="url(#shadow)">
    <rect x="480" y="362" width="180" height="66" rx="12" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <text x="570" y="386" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">机制设计</text>
    <text x="570" y="406" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">蓝图设计</text>
    <!-- 蓝图图标 -->
    <g transform="translate(570,420)">
      <rect x="-10" y="-7" width="20" height="14" rx="1" fill="none" stroke="#409EFF" stroke-width="1.2"/>
      <line x1="-6" y1="-3" x2="6" y2="-3" stroke="#409EFF" stroke-width="0.6"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#409EFF" stroke-width="0.6"/>
      <line x1="-6" y1="3" x2="6" y2="3" stroke="#409EFF" stroke-width="0.6"/>
      <circle cx="8" cy="-5" r="2" fill="none" stroke="#409EFF" stroke-width="0.6"/>
    </g>
  </g>

  <!-- 底部标注 -->
  <text x="400" y="485" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999" opacity="0.7">多智能体系统 · 博弈论核心概念导图</text>
</svg>