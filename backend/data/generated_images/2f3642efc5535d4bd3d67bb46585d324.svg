<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#D0ECFF"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FD4"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 径向布局：中心（250,240），半径160 -->
  <!-- 中心节点 -->
  <circle cx="250" cy="240" r="48" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <text x="250" y="232" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif">智能体</text>
  <text x="250" y="252" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif">分歧</text>

  <!-- 分裂图标：中心下方用两个小弧线表示冲突 -->
  <path d="M235 258 Q240 268 245 258" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M255 258 Q260 268 265 258" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.8"/>
  <line x1="242" y1="262" x2="258" y2="262" stroke="#fff" stroke-width="1" opacity="0.6"/>

  <!-- 5个原因节点，围绕中心均匀分布 -->
  <!-- 1. 视角差异 - 右上 (角度 -36°) -->
  <g transform="translate(370, 130)">
    <rect x="-58" y="-38" width="116" height="76" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-20" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">视角差异</text>
    <!-- 两个人从不同角度看同一物体 -->
    <circle cx="-22" cy="6" r="8" fill="#409EFF" opacity="0.3"/>
    <circle cx="-22" cy="6" r="4" fill="#409EFF"/>
    <circle cx="22" cy="6" r="8" fill="#409EFF" opacity="0.3"/>
    <circle cx="22" cy="6" r="4" fill="#409EFF"/>
    <!-- 中间物体 -->
    <rect x="-6" y="2" width="12" height="12" rx="2" fill="#FFB347" opacity="0.7"/>
    <!-- 视线 -->
    <line x1="-18" y1="6" x2="-7" y2="8" stroke="#1a1a2e" stroke-width="0.8" opacity="0.4"/>
    <line x1="18" y1="6" x2="8" y2="8" stroke="#1a1a2e" stroke-width="0.8" opacity="0.4"/>
    <text x="0" y="28" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">分析师 vs 技术员</text>
  </g>

  <!-- 2. 信息不对称 - 右下 (角度 36°) -->
  <g transform="translate(370, 350)">
    <rect x="-58" y="-38" width="116" height="76" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-20" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">信息不对称</text>
    <!-- 两个数据库图标 -->
    <rect x="-30" y="0" width="16" height="14" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="-28" y="2" width="12" height="10" rx="1" fill="#409EFF" opacity="0.3"/>
    <rect x="14" y="0" width="16" height="14" rx="2" fill="#409EFF" opacity="0.9"/>
    <rect x="16" y="2" width="12" height="10" rx="1" fill="#409EFF" opacity="0.6"/>
    <text x="0" y="28" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">完整 vs 部分</text>
  </g>

  <!-- 3. 模型能力差距 - 左侧 (角度 180°) -->
  <g transform="translate(90, 240)">
    <rect x="-58" y="-38" width="116" height="76" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-20" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">能力差距</text>
    <!-- 两个大脑大小不同 -->
    <ellipse cx="-18" cy="6" rx="10" ry="8" fill="#409EFF" opacity="0.4"/>
    <ellipse cx="-18" cy="6" rx="6" ry="5" fill="#409EFF" opacity="0.6"/>
    <ellipse cx="18" cy="6" rx="14" ry="10" fill="#409EFF" opacity="0.5"/>
    <ellipse cx="18" cy="6" rx="9" ry="7" fill="#409EFF" opacity="0.7"/>
    <text x="0" y="28" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">GPT-4 vs GPT-3.5</text>
  </g>

  <!-- 4. 任务理解偏差 - 左上 (角度 144°) -->
  <g transform="translate(130, 130)">
    <rect x="-58" y="-38" width="116" height="76" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-20" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">理解偏差</text>
    <!-- 同一任务描述，两个不同解读 -->
    <rect x="-30" y="-2" width="12" height="8" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="-28" y="0" width="8" height="4" rx="1" fill="#409EFF" opacity="0.6"/>
    <rect x="18" y="-2" width="12" height="8" rx="1" fill="#409EFF" opacity="0.4"/>
    <rect x="20" y="0" width="8" height="4" rx="1" fill="#409EFF" opacity="0.6"/>
    <text x="-18" y="22" text-anchor="middle" fill="#666" font-size="10" font-family="sans-serif">A解读</text>
    <text x="18" y="22" text-anchor="middle" fill="#666" font-size="10" font-family="sans-serif">B解读</text>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#1a1a2e" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- 5. 随机性 - 右上偏右 (角度 -108°) -->
  <g transform="translate(130, 350)">
    <rect x="-58" y="-38" width="116" height="76" rx="12" fill="#fff" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="-20" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold" font-family="sans-serif">随机性</text>
    <!-- 骰子图标 -->
    <rect x="-12" y="-2" width="24" height="24" rx="4" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1"/>
    <circle cx="-4" cy="4" r="2" fill="#409EFF"/>
    <circle cx="4" cy="4" r="2" fill="#409EFF"/>
    <circle cx="-4" cy="12" r="2" fill="#409EFF"/>
    <circle cx="4" cy="12" r="2" fill="#409EFF"/>
    <circle cx="0" cy="8" r="2" fill="#409EFF"/>
    <text x="0" y="28" text-anchor="middle" fill="#666" font-size="11" font-family="sans-serif">LLM 固有变异</text>
  </g>

  <!-- 连接线：中心到各节点 -->
  <line x1="298" y1="220" x2="312" y2="168" stroke="#409EFF" stroke-width="1.2" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="298" y1="260" x2="312" y2="312" stroke="#409EFF" stroke-width="1.2" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="202" y1="240" x2="148" y2="240" stroke="#409EFF" stroke-width="1.2" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="202" y1="220" x2="188" y2="168" stroke="#409EFF" stroke-width="1.2" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="202" y1="260" x2="188" y2="312" stroke="#409EFF" stroke-width="1.2" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- 标注（最多6个，每个3-6个字） -->
  <!-- 标注1 -->
  <g transform="translate(480, 100)">
    <rect x="0" y="0" width="90" height="24" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="45" y="16" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">观察角度不同</text>
  </g>

  <!-- 标注2 -->
  <g transform="translate(480, 340)">
    <rect x="0" y="0" width="90" height="24" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="45" y="16" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">数据获取差异</text>
  </g>

  <!-- 标注3 -->
  <g transform="translate(20, 210)">
    <rect x="0" y="0" width="90" height="24" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="45" y="16" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">模型版本差异</text>
  </g>

  <!-- 标注4 -->
  <g transform="translate(20, 100)">
    <rect x="0" y="0" width="90" height="24" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="45" y="16" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">任务解读偏差</text>
  </g>

  <!-- 标注5 -->
  <g transform="translate(20, 340)">
    <rect x="0" y="0" width="90" height="24" rx="6" fill="#409EFF" opacity="0.1"/>
    <text x="45" y="16" text-anchor="middle" fill="#409EFF" font-size="13" font-weight="bold" font-family="sans-serif">输出随机波动</text>
  </g>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold" font-family="sans-serif">智能体分歧的五大根源</text>
  <text x="400" y="62" text-anchor="middle" fill="#666" font-size="13" font-family="sans-serif">理解协作中的不一致来源</text>

  <!-- 底部装饰线 -->
  <line x1="250" y1="470" x2="550" y2="470" stroke="#409EFF" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <circle cx="400" cy="470" r="3" fill="#409EFF" opacity="0.5"/>
</svg>