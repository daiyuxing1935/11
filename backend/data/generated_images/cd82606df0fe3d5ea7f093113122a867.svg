<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3078cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e">Robot System Diagram</text>

  <!-- Robot Head -->
  <rect x="300" y="70" width="200" height="140" rx="30" fill="url(#robotBody)" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Robot Antenna -->
  <rect x="385" y="40" width="30" height="35" rx="6" fill="#409EFF" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="400" cy="32" r="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Robot Eyes -->
  <circle cx="350" cy="125" r="20" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="450" cy="125" r="20" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="350" cy="125" r="8" fill="#1a1a2e"/>
  <circle cx="450" cy="125" r="8" fill="#1a1a2e"/>

  <!-- Robot Mouth -->
  <rect x="355" y="160" width="90" height="14" rx="7" fill="white" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Robot Body -->
  <rect x="310" y="230" width="180" height="150" rx="20" fill="url(#robotBody)" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Body details - chest panel -->
  <rect x="355" y="260" width="90" height="50" rx="10" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="380" cy="285" r="8" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <circle cx="420" cy="285" r="8" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Body button -->
  <circle cx="400" cy="330" r="10" fill="#ff6b6b" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Left Arm -->
  <rect x="250" y="240" width="50" height="120" rx="15" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>
  <circle cx="275" cy="365" r="18" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Right Arm -->
  <rect x="500" y="240" width="50" height="120" rx="15" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>
  <circle cx="525" cy="365" r="18" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Left Leg -->
  <rect x="335" y="395" width="40" height="70" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>
  <rect x="325" y="455" width="60" height="20" rx="10" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Right Leg -->
  <rect x="425" y="395" width="40" height="70" rx="12" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>
  <rect x="415" y="455" width="60" height="20" rx="10" fill="#409EFF" stroke="#1a1a2e" stroke-width="2.5"/>

  <!-- Gear 1 - Left side -->
  <circle cx="120" cy="200" r="45" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
  <circle cx="120" cy="200" r="18" fill="#409EFF" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Gear 1 teeth -->
  <rect x="115" y="148" width="10" height="18" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="115" y="234" width="10" height="18" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="68" y="195" width="18" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="154" y="195" width="18" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="82" y="162" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(-45 89 167)"/>
  <rect x="144" y="228" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(-45 151 233)"/>
  <rect x="144" y="162" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(45 151 167)"/>
  <rect x="82" y="228" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(45 89 233)"/>

  <!-- Gear 2 - Right side -->
  <circle cx="680" cy="200" r="45" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
  <circle cx="680" cy="200" r="18" fill="#409EFF" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Gear 2 teeth -->
  <rect x="675" y="148" width="10" height="18" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="675" y="234" width="10" height="18" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="628" y="195" width="18" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="714" y="195" width="18" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="642" y="162" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(-45 649 167)"/>
  <rect x="704" y="228" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(-45 711 233)"/>
  <rect x="704" y="162" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(45 711 167)"/>
  <rect x="642" y="228" width="14" height="10" rx="3" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" transform="rotate(45 649 233)"/>

  <!-- Labels -->
  <text x="120" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Gear</text>
  <text x="120" y="302" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1a1a2e">System</text>

  <text x="680" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Gear</text>
  <text x="680" y="302" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1a1a2e">System</text>

  <text x="400" y="495" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1a1a2e">Figure 1: Robot with integrated gear mechanisms</text>
</svg>