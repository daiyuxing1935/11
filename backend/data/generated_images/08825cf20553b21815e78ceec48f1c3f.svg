<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="30%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="checkGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">从被动工具到主动伙伴的进化</text>

  <!-- 主箭头 - 从左到右 -->
  <line x1="120" y1="260" x2="680" y2="260" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round"/>

  <!-- 箭头头部 -->
  <polygon points="680,250 700,260 680,270" fill="#409EFF"/>

  <!-- 左侧：被动工具图标（锤子） -->
  <g transform="translate(80, 200)">
    <!-- 锤柄 -->
    <rect x="18" y="40" width="8" height="50" rx="3" fill="#90A4AE"/>
    <!-- 锤头 -->
    <rect x="8" y="20" width="28" height="24" rx="4" fill="#B0BEC5"/>
    <rect x="12" y="24" width="20" height="16" rx="2" fill="#CFD8DC"/>
    <!-- 标签 -->
    <text x="22" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">被动工具</text>
    <text x="22" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78909C">Passive Tool</text>
  </g>

  <!-- 右侧：主动伙伴机器人图标 -->
  <g transform="translate(650, 185)">
    <!-- 身体 -->
    <rect x="5" y="35" width="40" height="45" rx="8" fill="#409EFF"/>
    <!-- 头部 -->
    <rect x="10" y="8" width="30" height="30" rx="6" fill="#409EFF"/>
    <!-- 眼睛 -->
    <circle cx="20" cy="22" r="4" fill="#FFFFFF"/>
    <circle cx="30" cy="22" r="4" fill="#FFFFFF"/>
    <!-- 瞳孔 -->
    <circle cx="21" cy="22" r="2" fill="#1a1a2e"/>
    <circle cx="31" cy="22" r="2" fill="#1a1a2e"/>
    <!-- 微笑 -->
    <path d="M18,30 Q25,36 32,30" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 天线 -->
    <line x1="25" y1="8" x2="25" y2="2" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="25" cy="2" r="3" fill="#64B5F6"/>
    <!-- 手臂 -->
    <rect x="-2" y="40" width="8" height="6" rx="3" fill="#64B5F6"/>
    <rect x="44" y="40" width="8" height="6" rx="3" fill="#64B5F6"/>
    <!-- 标签 -->
    <text x="25" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">主动伙伴</text>
    <text x="25" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">Active Partner</text>
  </g>

  <!-- 四个里程碑节点 -->
  <!-- 节点1：自主性 A -->
  <g transform="translate(210, 260)">
    <circle cx="0" cy="0" r="14" fill="#B0BEC5" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="url(#checkGlow)" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">A</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">自主性</text>
    <text x="0" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909C">Autonomy</text>
  </g>

  <!-- 节点2：反应性 R -->
  <g transform="translate(340, 260)">
    <circle cx="0" cy="0" r="14" fill="#B0BEC5" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="url(#checkGlow)" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">R</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">反应性</text>
    <text x="0" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909C">Reactivity</text>
  </g>

  <!-- 节点3：主动性 P -->
  <g transform="translate(470, 260)">
    <circle cx="0" cy="0" r="14" fill="#B0BEC5" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="url(#checkGlow)" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">P</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">主动性</text>
    <text x="0" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909C">Pro-activeness</text>
  </g>

  <!-- 节点4：社交能力 S -->
  <g transform="translate(590, 260)">
    <circle cx="0" cy="0" r="14" fill="#B0BEC5" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="url(#checkGlow)" stroke="#FFFFFF" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">S</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">社交能力</text>
    <text x="0" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909C">Social Ability</text>
  </g>

  <!-- 底部说明文字 -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#546E7A">人工智能体（Agent）的四大核心特征：自主性 · 反应性 · 主动性 · 社交能力</text>

  <!-- 装饰性小点 -->
  <circle cx="50" cy="480" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="750" cy="480" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="400" cy="475" r="2" fill="#64B5F6" opacity="0.2"/>
</svg>