<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="layerGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A9EFF"/>
      <stop offset="100%" stop-color="#7FC1FF"/>
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#79BBFF"/>
    </linearGradient>
    <linearGradient id="layerGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#6BA8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">容错机制防御层</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- ========== 第1层：重试机制 ========== -->
  <rect x="30" y="65" width="350" height="90" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="65" width="350" height="28" rx="10" fill="url(#layerGrad1)" opacity="0.85"/>
  <rect x="30" y="83" width="350" height="10" fill="url(#layerGrad1)" opacity="0.85"/>
  <text x="205" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">重试机制</text>

  <!-- 重试箭头 -->
  <path d="M70,120 Q70,95 95,95 L120,95" stroke="#409EFF" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M120,95 Q145,95 145,120 L145,130" stroke="#409EFF" stroke-width="2.5" fill="none"/>
  <path d="M145,130 Q145,145 120,145 L95,145" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <path d="M95,145 Q70,145 70,130 Z" stroke="#409EFF" stroke-width="2.5" fill="none"/>

  <!-- 指数退避时间 -->
  <text x="155" y="105" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">1s</text>
  <text x="175" y="120" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">2s</text>
  <text x="175" y="138" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">4s</text>
  <text x="155" y="152" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">8s</text>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 重试图标 -->
  <circle cx="290" cy="115" r="18" fill="#E8F4FD" stroke="#409EFF" stroke-width="1.5"/>
  <path d="M282,115 Q282,105 292,105 L298,105" stroke="#409EFF" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M298,125 Q298,130 290,130" stroke="#409EFF" stroke-width="2" fill="none"/>
  <text x="290" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">↻</text>

  <!-- 标注1 -->
  <rect x="310" y="100" width="58" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="339" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">指数退避</text>

  <!-- ========== 第2层：断路器 ========== -->
  <rect x="420" y="65" width="350" height="90" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="420" y="65" width="350" height="28" rx="10" fill="url(#layerGrad2)" opacity="0.85"/>
  <rect x="420" y="83" width="350" height="10" fill="url(#layerGrad2)" opacity="0.85"/>
  <text x="595" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">断路器</text>

  <!-- 三种状态 -->
  <!-- CLOSED 绿色 -->
  <rect x="440" y="95" width="90" height="40" rx="6" fill="#E8F8E8" stroke="#67C23A" stroke-width="1.5"/>
  <text x="485" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#67C23A">CLOSED</text>
  <text x="485" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#67C23A">正常</text>

  <!-- OPEN 红色 -->
  <rect x="545" y="95" width="90" height="40" rx="6" fill="#FDE8E8" stroke="#F56C6C" stroke-width="1.5"/>
  <text x="590" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F56C6C">OPEN</text>
  <text x="590" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F56C6C">断开</text>

  <!-- HALF_OPEN 黄色 -->
  <rect x="650" y="95" width="100" height="40" rx="6" fill="#FDF6E8" stroke="#E6A23C" stroke-width="1.5"/>
  <text x="700" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E6A23C">HALF_OPEN</text>
  <text x="700" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E6A23C">恢复超时</text>

  <!-- 标注2 -->
  <rect x="440" y="140" width="70" height="18" rx="9" fill="#F56C6C" opacity="0.12"/>
  <text x="475" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F56C6C">熔断保护</text>

  <!-- ========== 第3层：优雅降级 ========== -->
  <rect x="30" y="180" width="350" height="130" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="180" width="350" height="28" rx="10" fill="url(#layerGrad3)" opacity="0.85"/>
  <rect x="30" y="198" width="350" height="10" fill="url(#layerGrad3)" opacity="0.85"/>
  <text x="205" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">优雅降级</text>

  <!-- 三层降级 -->
  <!-- 最佳 Agent -->
  <rect x="50" y="218" width="310" height="26" rx="5" fill="#E8F4FD" stroke="#409EFF" stroke-width="1"/>
  <circle cx="65" cy="231" r="7" fill="#409EFF" opacity="0.7"/>
  <text x="65" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">✓</text>
  <text x="80" y="235" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">最佳 Agent</text>
  <text x="280" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#909399">高质量</text>

  <!-- 降级箭头 -->
  <path d="M205,244 L205,252" stroke="#409EFF" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- 回退 Agent -->
  <rect x="50" y="255" width="310" height="26" rx="5" fill="#F0F8FF" stroke="#79BBFF" stroke-width="1"/>
  <circle cx="65" cy="268" r="7" fill="#79BBFF" opacity="0.7"/>
  <text x="65" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">→</text>
  <text x="80" y="268" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">回退 Agent</text>
  <text x="280" y="268" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#909399">中等</text>

  <!-- 降级箭头 -->
  <path d="M205,281 L205,289" stroke="#409EFF" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- 简单响应 -->
  <rect x="50" y="292" width="310" height="26" rx="5" fill="#F5F7FA" stroke="#C0C4CC" stroke-width="1"/>
  <circle cx="65" cy="305" r="7" fill="#C0C4CC" opacity="0.7"/>
  <text x="65" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">●</text>
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">简单响应</text>
  <text x="280" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#909399">基础功能</text>

  <!-- 标注3 -->
  <rect x="50" y="325" width="72" height="18" rx="9" fill="#409EFF" opacity="0.12"/>
  <text x="86" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">功能降级</text>

  <!-- ========== 第4层：故障类型 ========== -->
  <rect x="420" y="180" width="350" height="130" rx="10" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <rect x="420" y="180" width="350" height="28" rx="10" fill="url(#layerGrad4)" opacity="0.85"/>
  <rect x="420" y="198" width="350" height="10" fill="url(#layerGrad4)" opacity="0.85"/>
  <text x="595" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">故障类型</text>

  <!-- 故障图标网格 -->
  <!-- Agent 崩溃 -->
  <rect x="440" y="218" width="72" height="50" rx="6" fill="#FDE8E8" stroke="#F56C6C" stroke-width="1"/>
  <rect x="452" y="226" width="48" height="4" rx="2" fill="#F56C6C" opacity="0.6"/>
  <rect x="452" y="234" width="48" height="4" rx="2" fill="#F56C6C" opacity="0.4"/>
  <rect x="452" y="242" width="48" height="4" rx="2" fill="#F56C6C" opacity="0.3"/>
  <text x="476" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F56C6C">Agent 崩溃</text>

  <!-- API 超时 -->
  <rect x="525" y="218" width="72" height="50" rx="6" fill="#FDF6E8" stroke="#E6A23C" stroke-width="1"/>
  <circle cx="561" cy="238" r="10" fill="none" stroke="#E6A23C" stroke-width="1.5"/>
  <line x1="561" y1="238" x2="561" y2="230" stroke="#E6A23C" stroke-width="1.5"/>
  <line x1="561" y1="238" x2="568" y2="238" stroke="#E6A23C" stroke-width="1.5"/>
  <text x="561" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E6A23C">API 超时</text>

  <!-- 工具故障 -->
  <rect x="610" y="218" width="72" height="50" rx="6" fill="#FDE8E8" stroke="#F56C6C" stroke-width="1"/>
  <rect x="632" y="228" width="28" height="20" rx="3" fill="none" stroke="#F56C6C" stroke-width="1.5"/>
  <line x1="635" y1="231" x2="657" y2="245" stroke="#F56C6C" stroke-width="1.5"/>
  <line x1="657" y1="231" x2="635" y2="245" stroke="#F56C6C" stroke-width="1.5"/>
  <text x="646" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F56C6C">工具故障</text>

  <!-- 网络分区 -->
  <rect x="695" y="218" width="60" height="50" rx="6" fill="#F0F8FF" stroke="#409EFF" stroke-width="1"/>
  <line x1="705" y1="228" x2="705" y2="258" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="725" y1="228" x2="725" y2="258" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="710" y1="243" x2="720" y2="243" stroke="#F56C6C" stroke-width="1.5"/>
  <text x="725" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">网络分区</text>

  <!-- 标注4 -->
  <rect x="440" y="275" width="70" height="18" rx="9" fill="#F56C6C" opacity="0.12"/>
  <text x="475" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F56C6C">异常检测</text>

  <!-- ========== 底部防御层示意 ========== -->
  <rect x="30" y="335" width="740" height="40" rx="8" fill="#409EFF" opacity="0.08" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" opacity="0.8">多层防御 · 系统韧性 · 持续可用</text>

  <!-- 底部标注 -->
  <rect x="30" y="390" width="740" height="55" rx="8" fill="white" stroke="#E4E7ED" stroke-width="1" opacity="0.9"/>
  <text x="50" y="412" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">设计原则：</text>
  <text x="50" y="432" font-family="Arial, sans-serif" font-size="11" fill="#606266">• 快速失败 → 自动恢复 → 优雅降级 → 故障隔离</text>
  <text x="50" y="445" font-family="Arial, sans-serif" font-size="11" fill="#606266">• 每个层级独立工作，互不干扰</text>

  <!-- 标注5 - 右侧 -->
  <rect x="610" y="390" width="80" height="20" rx="10" fill="#409EFF" opacity="0.12"/>
  <text x="650" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">系统韧性</text>

  <!-- 标注6 -->
  <rect x="700" y="390" width="60" height="20" rx="10" fill="#67C23A" opacity="0.12"/>
  <text x="730" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#67C23A">高可用</text>

  <!-- 层间连接线 -->
  <line x1="205" y1="155" x2="205" y2="180" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="595" y1="155" x2="595" y2="180" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 层标签 -->
  <text x="18" y="160" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">L1</text>
  <text x="408" y="160" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">L2</text>
  <text x="18" y="310" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">L3</text>
  <text x="408" y="310" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" opacity="0.6">L4</text>

</svg>