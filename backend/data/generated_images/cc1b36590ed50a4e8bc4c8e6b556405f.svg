<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="blockGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA8FF"/>
      <stop offset="100%" stop-color="#409EFF"/>
    </linearGradient>
    <linearGradient id="blockGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BBCFF"/>
      <stop offset="100%" stop-color="#5BA8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">角色提示核心框架</text>
  <text x="400" y="62" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5A6A7E">Role Prompting Key Takeaways</text>

  <!-- ========== 三层金字塔结构 ========== -->

  <!-- 底层：How 块（最宽） -->
  <rect x="200" y="340" width="400" height="80" rx="14" fill="url(#blockGrad)" opacity="0.95"/>
  <rect x="200" y="340" width="400" height="80" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <!-- 图标：蓝图/设计工具 -->
  <g transform="translate(230, 370)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="4" y1="8" x2="20" y2="8" stroke="#fff" stroke-width="1.5"/>
    <line x1="4" y1="14" x2="16" y2="14" stroke="#fff" stroke-width="1.5"/>
    <line x1="4" y1="20" x2="12" y2="20" stroke="#fff" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="3" fill="none" stroke="#fff" stroke-width="1.5"/>
  </g>
  <text x="270" y="376" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">How? — 如何设计有效角色</text>
  <text x="270" y="398" font-family="sans-serif" font-size="12" fill="#D6E8FF">How to Design Effectively</text>

  <!-- 中层：When 块 -->
  <rect x="230" y="240" width="340" height="75" rx="14" fill="url(#blockGrad2)" opacity="0.95"/>
  <rect x="230" y="240" width="340" height="75" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <!-- 图标：时钟 -->
  <g transform="translate(258, 267)">
    <circle cx="12" cy="12" r="11" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="12" y1="12" x2="12" y2="6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="17" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="290" y="276" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">When? — 何时需要角色</text>
  <text x="290" y="298" font-family="sans-serif" font-size="12" fill="#D6E8FF">When to Use Roles</text>

  <!-- 顶层：Why 块 -->
  <rect x="265" y="145" width="270" height="70" rx="14" fill="url(#blockGrad3)" opacity="0.95"/>
  <rect x="265" y="145" width="270" height="70" rx="14" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.6"/>
  <!-- 图标：人物剪影+问号 -->
  <g transform="translate(290, 167)">
    <ellipse cx="10" cy="7" rx="6" ry="6" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M3,22 Q3,14 10,14 Q17,14 17,22" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="10" y="8" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fff">?</text>
  </g>
  <text x="322" y="181" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">Why? — 为什么设定角色</text>
  <text x="322" y="201" font-family="sans-serif" font-size="12" fill="#D6E8FF">Why Set a Role</text>

  <!-- 金字塔连接线 -->
  <line x1="400" y1="215" x2="400" y2="240" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="315" x2="400" y2="340" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ========== 底部：AI 角色展示 ========== -->

  <!-- 底部中心 AI 形象 -->
  <g transform="translate(400, 435)">
    <!-- AI 主体 -->
    <rect x="-28" y="-15" width="56" height="30" rx="15" fill="#1a1a2e" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-3" r="3" fill="#409EFF"/>
    <circle cx="8" cy="-3" r="3" fill="#409EFF"/>
    <!-- 微笑 -->
    <path d="M-5,4 Q0,9 5,4" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 标签 -->
    <text x="0" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">AI 模型</text>
  </g>

  <!-- 三个角色帽子漂浮在上方 -->
  <!-- 教授帽 -->
  <g transform="translate(340, 410)">
    <rect x="-20" y="-10" width="40" height="20" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">教授</text>
    <!-- 连接虚线 -->
    <line x1="0" y1="10" x2="40" y2="20" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- 助手徽章 -->
  <g transform="translate(400, 405)">
    <rect x="-22" y="-10" width="44" height="20" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">助手</text>
    <line x1="0" y1="10" x2="0" y2="25" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- 评论家眼镜 -->
  <g transform="translate(460, 410)">
    <rect x="-20" y="-10" width="40" height="20" rx="6" fill="#409EFF" opacity="0.85"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">评论家</text>
    <line x1="0" y1="10" x2="-40" y2="20" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- 底部说明文字 -->
  <text x="400" y="478" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A6A7E">一个模型通过角色提示展现不同能力</text>

  <!-- 标注：最多6个，每个3-6字 -->
  <!-- 标注1 -->
  <rect x="540" y="155" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="575" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">明确目标</text>

  <!-- 标注2 -->
  <rect x="540" y="185" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="575" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">聚焦输出</text>

  <!-- 标注3 -->
  <rect x="120" y="250" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="155" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">复杂任务</text>

  <!-- 标注4 -->
  <rect x="120" y="280" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="155" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">专业领域</text>

  <!-- 标注5 -->
  <rect x="120" y="350" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="155" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">角色定义</text>

  <!-- 标注6 -->
  <rect x="120" y="380" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.8"/>
  <text x="155" y="395" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">场景约束</text>

</svg>