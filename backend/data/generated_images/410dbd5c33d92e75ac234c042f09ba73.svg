<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FE"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 中心：基础模型 -->
  <rect x="290" y="170" width="220" height="160" rx="24" fill="url(#baseGrad)" stroke="#409EFF" stroke-width="2.5"/>
  <text x="400" y="238" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="bold">基础模型</text>
  <text x="400" y="268" text-anchor="middle" fill="#A0C4E8" font-family="Arial, sans-serif" font-size="15">7B 参数</text>

  <!-- 适配器图标（环绕布局） -->
  <!-- 上方：中文专家 -->
  <rect x="340" y="60" width="120" height="50" rx="25" fill="#409EFF" stroke="#2E7FD9" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="bold">中文专家</text>
  <!-- 插头装饰 -->
  <rect x="395" y="110" width="10" height="12" rx="2" fill="#409EFF"/>
  <polygon points="398,122 402,122 404,130 396,130" fill="#409EFF"/>

  <!-- 右上方：代码专家 -->
  <rect x="560" y="100" width="120" height="50" rx="25" fill="#5AB0FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="620" y="130" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="bold">代码专家</text>
  <rect x="615" y="150" width="10" height="12" rx="2" fill="#5AB0FF"/>
  <polygon points="618,162 622,162 624,170 616,170" fill="#5AB0FF"/>

  <!-- 右侧：法律专家 -->
  <rect x="570" y="260" width="120" height="50" rx="25" fill="#6BB8FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="630" y="290" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="bold">法律专家</text>
  <rect x="625" y="310" width="10" height="12" rx="2" fill="#6BB8FF"/>
  <polygon points="628,322 632,322 634,330 626,330" fill="#6BB8FF"/>

  <!-- 下方：医疗专家 -->
  <rect x="340" y="390" width="120" height="50" rx="25" fill="#409EFF" stroke="#2E7FD9" stroke-width="1.5"/>
  <text x="400" y="420" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="bold">医疗专家</text>
  <rect x="395" y="370" width="10" height="12" rx="2" fill="#409EFF"/>
  <polygon points="398,370 402,370 404,362 396,362" fill="#409EFF"/>

  <!-- 左下方：代码专家2 -->
  <rect x="120" y="260" width="120" height="50" rx="25" fill="#5AB0FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="180" y="290" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="bold">代码专家</text>
  <rect x="175" y="310" width="10" height="12" rx="2" fill="#5AB0FF"/>
  <polygon points="178,322 182,322 184,330 176,330" fill="#5AB0FF"/>

  <!-- 左上方：中文专家2 -->
  <rect x="120" y="100" width="120" height="50" rx="25" fill="#6BB8FF" stroke="#409EFF" stroke-width="1.5"/>
  <text x="180" y="130" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="bold">中文专家</text>
  <rect x="175" y="150" width="10" height="12" rx="2" fill="#6BB8FF"/>
  <polygon points="178,162 182,162 184,170 176,170" fill="#6BB8FF"/>

  <!-- 虚线连接（从适配器到底座） -->
  <!-- 上方连接 -->
  <line x1="400" y1="110" x2="400" y2="170" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 右上方连接 -->
  <line x1="620" y1="150" x2="510" y2="195" stroke="#5AB0FF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 右侧连接 -->
  <line x1="570" y1="285" x2="510" y2="285" stroke="#6BB8FF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 下方连接 -->
  <line x1="400" y1="390" x2="400" y2="330" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 左下方连接 -->
  <line x1="240" y1="285" x2="290" y2="285" stroke="#5AB0FF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 左上方连接 -->
  <line x1="240" y1="150" x2="290" y2="195" stroke="#6BB8FF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- 标注：每个约16MB -->
  <rect x="462" y="72" width="110" height="28" rx="14" fill="#E8F4FE" stroke="#409EFF" stroke-width="1"/>
  <text x="517" y="91" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" font-weight="bold">~16MB / 个</text>

  <!-- 标注：零切换成本 -->
  <rect x="462" y="310" width="130" height="28" rx="14" fill="#E8F4FE" stroke="#409EFF" stroke-width="1"/>
  <text x="527" y="329" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" font-weight="bold">✓ 零切换成本</text>

  <!-- 标注：即插即用 -->
  <rect x="60" y="200" width="100" height="28" rx="14" fill="#E8F4FE" stroke="#409EFF" stroke-width="1"/>
  <text x="110" y="219" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" font-weight="bold">✓ 即插即用</text>

  <!-- 标注：多任务 -->
  <rect x="630" y="200" width="100" height="28" rx="14" fill="#E8F4FE" stroke="#409EFF" stroke-width="1"/>
  <text x="680" y="219" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" font-weight="bold">✓ 多任务</text>

  <!-- 标注：轻量 -->
  <rect x="60" y="350" width="80" height="28" rx="14" fill="#E8F4FE" stroke="#409EFF" stroke-width="1"/>
  <text x="100" y="369" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" font-weight="bold">✓ 轻量</text>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="20" font-weight="bold">多 LoRA 适配器架构</text>

</svg>