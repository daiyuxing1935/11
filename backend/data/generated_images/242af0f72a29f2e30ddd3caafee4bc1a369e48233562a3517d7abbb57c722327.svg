  <text x="333" y="172" font-family="monospace" font-size="8" fill="#FFFFFF" opacity="0.7">  return data</text>
  <text x="333" y="184" font-family="monospace" font-size="8" fill="#FFD700" opacity="0.7">  for i in range:</text>
