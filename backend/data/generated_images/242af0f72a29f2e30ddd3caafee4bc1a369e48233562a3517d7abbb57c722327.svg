<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#409EFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">智能机器人应用场景</text>

  <!-- 连接虚线 -->
  <line x1="240" y1="260" x2="290" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="510" y1="260" x2="560" y2="260" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ========== 卡片1：客服机器人 ========== -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="220" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  </g>

  <!-- 卡片1标题 -->
  <rect x="45" y="82" width="190" height="32" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="140" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">💬 客服机器人</text>

  <!-- 服务台 -->
  <rect x="55" y="130" width="170" height="70" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
  <rect x="65" y="140" width="60" height="40" rx="6" fill="#409EFF" opacity="0.15"/>
  <rect x="135" y="140" width="60" height="40" rx="6" fill="#409EFF" opacity="0.15"/>
  <text x="95" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">订单</text>
  <text x="165" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#409EFF">数据库</text>

  <!-- 机器人 -->
  <rect x="80" y="215" width="40" height="45" rx="8" fill="#409EFF" opacity="0.85"/>
  <rect x="88" y="208" width="24" height="12" rx="6" fill="#409EFF" opacity="0.7"/>
  <circle cx="93" cy="233" r="4" fill="white"/>
  <circle cx="107" cy="233" r="4" fill="white"/>
  <rect x="88" y="245" width="24" height="3" rx="1.5" fill="white" opacity="0.6"/>

  <!-- 对话气泡 -->
  <path d="M130 220 Q145 210 155 220 L155 240 Q145 250 130 240 Z" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="0.8"/>
  <text x="142" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#409EFF">您好</text>

  <!-- 满意客户 -->
  <circle cx="100" cy="280" r="14" fill="#409EFF" opacity="0.12"/>
  <circle cx="100" cy="277" r="5" fill="#409EFF" opacity="0.4"/>
  <path d="M94 283 Q100 290 106 283" stroke="#409EFF" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- 服务铃铛 -->
  <rect x="155" y="270" width="16" height="18" rx="4" fill="#409EFF" opacity="0.2"/>
  <circle cx="163" cy="290" r="3" fill="#409EFF" opacity="0.4"/>
  <text x="163" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF">🔔</text>

  <!-- 卡片1标注 -->
  <rect x="55" y="320" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.06"/>
  <text x="140" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">自动应答与订单查询</text>

  <rect x="55" y="358" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.04"/>
  <text x="140" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">7×24小时在线服务</text>

  <!-- ========== 卡片2：编程助手 ========== -->
  <g filter="url(#shadow)">
    <rect x="290" y="70" width="220" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  </g>

  <!-- 卡片2标题 -->
  <rect x="305" y="82" width="190" height="32" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="400" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">💻 编程助手</text>

  <!-- 电脑屏幕 -->
  <rect x="310" y="130" width="180" height="100" rx="8" fill="#1a1a2e" opacity="0.85"/>
  <rect x="318" y="138" width="164" height="72" rx="4" fill="#1E2A3A"/>
  <!-- 代码行 -->
  <text x="325" y="156" font-family="monospace" font-size="9" fill="#409EFF">def hello():</text>
  <text x="333" y="170" font-family="monospace" font-size="9" fill="#A0C4FF">print("Hello")</text>
  <text x="325" y="184" font-family="monospace" font-size="9" fill="#409EFF">for i in range(5):</text>
  <text x="333" y="198" font-family="monospace" font-size="9" fill="#A0C4FF">result += i</text>

  <!-- 浏览器预览 -->
  <rect x="330" y="218" width="140" height="50" rx="6" fill="white" stroke="#409EFF" stroke-width="0.8" opacity="0.9"/>
  <rect x="335" y="222" width="130" height="8" rx="2" fill="#F0F0F0"/>
  <circle cx="340" cy="226" r="2" fill="#FF5F56"/>
  <circle cx="348" cy="226" r="2" fill="#FFBD2E"/>
  <circle cx="356" cy="226" r="2" fill="#27C93F"/>
  <rect x="365" y="224" width="40" height="4" rx="2" fill="#409EFF" opacity="0.3"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a2e">仪表盘预览</text>
  <rect x="350" y="252" width="20" height="10" rx="2" fill="#409EFF" opacity="0.2"/>
  <rect x="375" y="252" width="20" height="10" rx="2" fill="#409EFF" opacity="0.2"/>

  <!-- 齿轮图标 -->
  <circle cx="340" cy="290" r="10" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="340" cy="290" r="4" fill="#409EFF" opacity="0.3"/>
  <text x="340" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#409EFF">⚙</text>

  <!-- 代码括号 -->
  <text x="400" y="296" text-anchor="middle" font-family="monospace" font-size="18" fill="#409EFF" opacity="0.4">&lt;/&gt;</text>

  <!-- 卡片2标注 -->
  <rect x="315" y="320" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.06"/>
  <text x="400" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">代码生成与调试</text>

  <rect x="315" y="358" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.04"/>
  <text x="400" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">支持多种编程语言</text>

  <!-- ========== 卡片3：个人助手 ========== -->
  <g filter="url(#shadow)">
    <rect x="550" y="70" width="220" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
  </g>

  <!-- 卡片3标题 -->
  <rect x="565" y="82" width="190" height="32" rx="6" fill="#409EFF" opacity="0.12"/>
  <text x="660" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">📋 个人助手</text>

  <!-- 机器人手持行程单 -->
  <rect x="590" y="130" width="140" height="90" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" opacity="0.6"/>

  <!-- 机器人 -->
  <rect x="620" y="135" width="35" height="40" rx="7" fill="#409EFF" opacity="0.8"/>
  <rect x="627" y="129" width="21" height="10" rx="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="631" cy="150" r="3.5" fill="white"/>
  <circle cx="644" cy="150" r="3.5" fill="white"/>
  <rect x="627" y="160" width="21" height="3" rx="1.5" fill="white" opacity="0.5"/>

  <!-- 行程单内容 -->
  <rect x="640" y="140" width="80" height="70" rx="4" fill="white" stroke="#409EFF" stroke-width="0.6" opacity="0.8"/>
  <text x="650" y="155" font-family="Arial, sans-serif" font-size="7" fill="#1a1a2e">📅 03.15</text>
  <text x="650" y="167" font-family="Arial, sans-serif" font-size="7" fill="#1a1a2e">✈️ 北京→上海</text>
  <text x="650" y="179" font-family="Arial, sans-serif" font-size="7" fill="#1a1a2e">🏨 希尔顿酒店</text>
  <text x="650" y="191" font-family="Arial, sans-serif" font-size="7" fill="#1a1a2e">☀️ 22°C 晴</text>

  <!-- 图标行 -->
  <rect x="590" y="235" width="140" height="40" rx="6" fill="#409EFF" opacity="0.06"/>
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="16">📅</text>
  <text x="630" y="260" font-family="Arial, sans-serif" font-size="16">✈️</text>
  <text x="660" y="260" font-family="Arial, sans-serif" font-size="16">🏨</text>
  <text x="690" y="260" font-family="Arial, sans-serif" font-size="16">☀️</text>

  <!-- 卡片3标注 -->
  <rect x="575" y="290" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.06"/>
  <text x="660" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">行程规划与管理</text>

  <rect x="575" y="328" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.04"/>
  <text x="660" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">天气提醒与预订</text>

  <rect x="575" y="366" width="170" height="28" rx="6" fill="#1a1a2e" opacity="0.04"/>
  <text x="660" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">智能日程同步</text>

  <!-- 底部装饰线 -->
  <rect x="200" y="460" width="400" height="2" rx="1" fill="#409EFF" opacity="0.15"/>

  <!-- 底部小字 -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF" opacity="0.4">AI 智能机器人 · 多场景应用</text>
</svg>