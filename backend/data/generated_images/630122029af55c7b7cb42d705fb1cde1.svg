<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7FE0"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FADB14"/>
      <stop offset="100%" stop-color="#F5C400"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67C23A"/>
      <stop offset="100%" stop-color="#52A52E"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="bold">管理者-工作者模式 · 消息流程</text>

  <!-- ===== 步骤 1：用户请求 → 管理者 ===== -->
  <rect x="60" y="65" width="120" height="48" rx="24" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="120" y="95" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">用户</text>

  <!-- 箭头 1→2 -->
  <line x1="180" y1="89" x2="250" y2="89" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#409EFF"/>
    </marker>
  </defs>
  <text x="215" y="80" text-anchor="middle" fill="#1a1a2e" font-size="13">① 请求</text>

  <!-- ===== 步骤 2：管理者 ===== -->
  <rect x="260" y="60" width="130" height="58" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="325" y="86" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">管理者</text>
  <text x="325" y="105" text-anchor="middle" fill="#A0C4FF" font-size="12">分解·分配</text>

  <!-- 步骤标注 2 -->
  <circle cx="270" cy="65" r="12" fill="#409EFF"/>
  <text x="270" y="70" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>

  <!-- ===== 步骤 3：分配任务 → 工作者 A/B/C ===== -->
  <!-- 从管理者发出的三条箭头 -->
  <line x1="325" y1="118" x2="160" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="325" y1="118" x2="325" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="325" y1="118" x2="490" y2="175" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 工作者 A -->
  <rect x="100" y="180" width="120" height="50" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="206" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">工作者 A</text>
  <text x="160" y="222" text-anchor="middle" fill="#409EFF" font-size="11">任务分配</text>

  <!-- 工作者 B -->
  <rect x="265" y="180" width="120" height="50" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="325" y="206" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">工作者 B</text>
  <text x="325" y="222" text-anchor="middle" fill="#409EFF" font-size="11">任务分配</text>

  <!-- 工作者 C -->
  <rect x="430" y="180" width="120" height="50" rx="10" fill="#fff" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="206" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">工作者 C</text>
  <text x="490" y="222" text-anchor="middle" fill="#409EFF" font-size="11">任务分配</text>

  <!-- 步骤标注 3 -->
  <circle cx="325" cy="140" r="12" fill="#409EFF"/>
  <text x="325" y="145" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">3</text>

  <!-- JSON 信封图标 -->
  <rect x="145" y="165" width="18" height="14" rx="2" fill="#409EFF" opacity="0.3"/>
  <text x="154" y="175" text-anchor="middle" fill="#1a1a2e" font-size="8">📋</text>
  <rect x="310" y="165" width="18" height="14" rx="2" fill="#409EFF" opacity="0.3"/>
  <rect x="475" y="165" width="18" height="14" rx="2" fill="#409EFF" opacity="0.3"/>

  <!-- ===== 步骤 4：状态更新 ← 工作者 ===== -->
  <!-- 从工作者返回的黄色箭头 -->
  <line x1="160" y1="230" x2="160" y2="280" stroke="#FADB14" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <line x1="325" y1="230" x2="325" y2="280" stroke="#FADB14" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <line x1="490" y1="230" x2="490" y2="280" stroke="#FADB14" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <defs>
    <marker id="arrowYellow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FADB14"/>
    </marker>
  </defs>

  <!-- 进度指示器 -->
  <rect x="140" y="285" width="40" height="16" rx="8" fill="#FFF7D6" stroke="#FADB14" stroke-width="1.5"/>
  <text x="160" y="297" text-anchor="middle" fill="#B8860B" font-size="10">75%</text>
  <rect x="305" y="285" width="40" height="16" rx="8" fill="#FFF7D6" stroke="#FADB14" stroke-width="1.5"/>
  <text x="325" y="297" text-anchor="middle" fill="#B8860B" font-size="10">50%</text>
  <rect x="470" y="285" width="40" height="16" rx="8" fill="#FFF7D6" stroke="#FADB14" stroke-width="1.5"/>
  <text x="490" y="297" text-anchor="middle" fill="#B8860B" font-size="10">90%</text>

  <!-- 步骤标注 4 -->
  <circle cx="325" cy="268" r="12" fill="#FADB14"/>
  <text x="325" y="273" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">4</text>

  <!-- ===== 步骤 5：结果报告 → 管理者 ===== -->
  <line x1="160" y1="310" x2="280" y2="370" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="325" y1="310" x2="325" y2="370" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="490" y1="310" x2="370" y2="370" stroke="#67C23A" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#67C23A"/>
    </marker>
  </defs>

  <!-- 文档图标 -->
  <rect x="145" y="318" width="16" height="20" rx="2" fill="#E8F5E0" stroke="#67C23A" stroke-width="1.2"/>
  <text x="153" y="333" text-anchor="middle" fill="#52A52E" font-size="9">📄</text>
  <rect x="310" y="318" width="16" height="20" rx="2" fill="#E8F5E0" stroke="#67C23A" stroke-width="1.2"/>
  <text x="318" y="333" text-anchor="middle" fill="#52A52E" font-size="9">📄</text>
  <rect x="475" y="318" width="16" height="20" rx="2" fill="#E8F5E0" stroke="#67C23A" stroke-width="1.2"/>
  <text x="483" y="333" text-anchor="middle" fill="#52A52E" font-size="9">📄</text>

  <!-- 步骤标注 5 -->
  <circle cx="325" cy="342" r="12" fill="#67C23A"/>
  <text x="325" y="347" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>

  <!-- ===== 步骤 6：管理者汇总 ===== -->
  <rect x="260" y="375" width="130" height="50" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="325" y="400" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">管理者</text>
  <text x="325" y="416" text-anchor="middle" fill="#A0C4FF" font-size="12">汇总结果</text>

  <!-- 步骤标注 6 -->
  <circle cx="270" cy="380" r="12" fill="#409EFF"/>
  <text x="270" y="385" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">6</text>

  <!-- ===== 步骤 7：最终输出 → 用户 ===== -->
  <line x1="260" y1="400" x2="180" y2="400" stroke="#409EFF" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="60" y="380" width="120" height="48" rx="24" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="120" y="410" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">用户</text>

  <!-- 步骤标注 7 -->
  <circle cx="190" cy="385" r="12" fill="#409EFF"/>
  <text x="190" y="390" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">7</text>

  <text x="140" y="438" text-anchor="middle" fill="#1a1a2e" font-size="13">⑦ 最终输出</text>

  <!-- ===== 图例 ===== -->
  <rect x="560" y="65" width="210" height="130" rx="10" fill="#fff" stroke="#E0E6ED" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="665" y="88" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold">消息类型图例</text>

  <!-- 任务分配 -->
  <rect x="575" y="100" width="16" height="16" rx="3" fill="#409EFF"/>
  <text x="600" y="114" fill="#1a1a2e" font-size="13">task_assignment</text>

  <!-- 状态更新 -->
  <rect x="575" y="128" width="16" height="16" rx="3" fill="#FADB14"/>
  <text x="600" y="142" fill="#1a1a2e" font-size="13">status_update</text>

  <!-- 任务结果 -->
  <rect x="575" y="156" width="16" height="16" rx="3" fill="#67C23A"/>
  <text x="600" y="170" fill="#1a1a2e" font-size="13">task_result</text>

  <!-- 流程标注说明 -->
  <text x="665" y="220" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">流程步骤</text>
  <text x="665" y="240" text-anchor="middle" fill="#5A6872" font-size="12">① 请求 → ② 分解分配</text>
  <text x="665" y="258" text-anchor="middle" fill="#5A6872" font-size="12">③ 分配任务 → ④ 状态更新</text>
  <text x="665" y="276" text-anchor="middle" fill="#5A6872" font-size="12">⑤ 结果报告 → ⑥ 汇总</text>
  <text x="665" y="294" text-anchor="middle" fill="#5A6872" font-size="12">⑦ 最终输出</text>

  <!-- 装饰性网格点 -->
  <circle cx="30" cy="30" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="770" cy="30" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="30" cy="470" r="2" fill="#409EFF" opacity="0.15"/>
  <circle cx="770" cy="470" r="2" fill="#409EFF" opacity="0.15"/>
</svg>