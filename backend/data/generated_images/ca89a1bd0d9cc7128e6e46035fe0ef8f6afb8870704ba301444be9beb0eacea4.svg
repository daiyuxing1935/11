<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#D0EAFF"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFF5F5"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">协作模式 vs 竞争模式</text>

  <!-- ===== 左侧：协作模式 ===== -->
  <rect x="25" y="50" width="355" height="430" rx="12" fill="url(#leftCard)" stroke="#409EFF" stroke-width="1.5"/>
  <text x="202" y="80" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#409EFF">🤝 协作模式</text>

  <!-- 三个代理人（圆形） -->
  <circle cx="100" cy="145" r="22" fill="#409EFF" opacity="0.15"/>
  <circle cx="100" cy="145" r="22" fill="none" stroke="#409EFF" stroke-width="2"/>
  <text x="100" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">A</text>
  <text x="100" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#409EFF">代理</text>

  <circle cx="202" cy="130" r="22" fill="#409EFF" opacity="0.15"/>
  <circle cx="202" cy="130" r="22" fill="none" stroke="#409EFF" stroke-width="2"/>
  <text x="202" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">B</text>
  <text x="202" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#409EFF">代理</text>

  <circle cx="300" cy="145" r="22" fill="#409EFF" opacity="0.15"/>
  <circle cx="300" cy="145" r="22" fill="none" stroke="#409EFF" stroke-width="2"/>
  <text x="300" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">C</text>
  <text x="300" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#409EFF">代理</text>

  <!-- 握手图标（A-B） -->
  <g transform="translate(140, 125)">
    <path d="M0,10 Q8,0 16,10" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8,5 Q12,2 16,8" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 握手图标（B-C） -->
  <g transform="translate(240, 125)">
    <path d="M0,10 Q8,0 16,10" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8,5 Q12,2 16,8" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 信息自由流动 - 箭头 -->
  <path d="M110,170 Q150,190 190,170" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M290,170 Q250,190 210,170" fill="none" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#409EFF"/>
    </marker>
  </defs>

  <!-- 汇聚箭头指向共同目标 -->
  <path d="M100,180 L100,220 Q100,240 120,250 L180,270" fill="none" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M202,165 L202,220 Q202,240 190,250 L180,270" fill="none" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M300,180 L300,220 Q300,240 280,250 L220,270" fill="none" stroke="#409EFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 共同目标旗帜 -->
  <g transform="translate(175, 270)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M2,2 L30,8 L2,14 Z" fill="#409EFF"/>
    <text x="16" y="12" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">目标</text>
  </g>
  <text x="202" y="325" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e">共同目标</text>

  <!-- 信息流标注 -->
  <text x="202" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" opacity="0.8">信息自由流动</text>

  <!-- 协作示例 -->
  <text x="202" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">协作示例</text>

  <!-- 示例1：团队编程 -->
  <g transform="translate(60, 385)">
    <rect x="0" y="0" width="80" height="55" rx="6" fill="#E8F4FF" stroke="#409EFF" stroke-width="1"/>
    <text x="40" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">👥 团队编程</text>
    <text x="40" y="35" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">结对编程</text>
    <text x="40" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">代码审查</text>
  </g>

  <!-- 示例2：共享资源 -->
  <g transform="translate(155, 385)">
    <rect x="0" y="0" width="80" height="55" rx="6" fill="#E8F4FF" stroke="#409EFF" stroke-width="1"/>
    <text x="40" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">📊 共享资源</text>
    <text x="40" y="35" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">知识库</text>
    <text x="40" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">经验分享</text>
  </g>

  <!-- 示例3：联合攻关 -->
  <g transform="translate(250, 385)">
    <rect x="0" y="0" width="80" height="55" rx="6" fill="#E8F4FF" stroke="#409EFF" stroke-width="1"/>
    <text x="40" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">🎯 联合攻关</text>
    <text x="40" y="35" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">分工协作</text>
    <text x="40" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF">成果共享</text>
  </g>

  <!-- ===== 右侧：竞争模式 ===== -->
  <rect x="420" y="50" width="355" height="430" rx="12" fill="url(#rightCard)" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="597" y="80" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#FF6B6B">⚔️ 竞争模式</text>

  <!-- 两个对峙的代理人 -->
  <circle cx="510" cy="145" r="22" fill="#FF6B6B" opacity="0.15"/>
  <circle cx="510" cy="145" r="22" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="510" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">甲</text>
  <text x="510" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FF6B6B">选手</text>

  <circle cx="685" cy="145" r="22" fill="#FF6B6B" opacity="0.15"/>
  <circle cx="685" cy="145" r="22" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="685" y="143" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">乙</text>
  <text x="685" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FF6B6B">选手</text>

  <!-- VS 符号 -->
  <g transform="translate(585, 130)">
    <circle cx="15" cy="15" r="18" fill="#FF6B6B" opacity="0.2"/>
    <text x="15" y="20" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FF6B6B">VS</text>
  </g>

  <!-- 辩论气泡 -->
  <g transform="translate(460, 90)">
    <rect x="0" y="0" width="65" height="28" rx="10" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="1"/>
    <text x="32" y="18" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">我的方案好！</text>
  </g>

  <g transform="translate(660, 90)">
    <rect x="0" y="0" width="65" height="28" rx="10" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="1"/>
    <text x="32" y="18" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1a1a2e">我的更优！</text>
  </g>

  <!-- 裁判/评审 -->
  <g transform="translate(597, 190)">
    <rect x="-20" y="0" width="40" height="30" rx="6" fill="#1a1a2e"/>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">裁判</text>
  </g>

  <!-- 竞争示例标题 -->
  <text x="597" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">竞争示例</text>

  <!-- 示例1：对抗辩论 -->
  <g transform="translate(440, 280)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="1"/>
    <text x="75" y="18" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1a1a2e">🎤 对抗辩论</text>
    <text x="75" y="33" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FF6B6B">正方 vs 反方</text>
    <text x="75" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FF6B6B">裁判评分</text>
  </g>

  <!-- 示例2：代码攻防 -->
  <g transform="translate(440, 355)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="1"/>
    <text x="75" y="18" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1a1a2e">💻 代码攻防</text>
    <text x="75" y="33" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FF6B6B">攻击方 vs 防御方</text>
    <text x="75" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FF6B6B">漏洞挖掘竞赛</text>
  </g>

  <!-- 示例3：创意PK -->
  <g transform="translate(440, 430)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="1"/>
    <text x="75" y="18" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1a1a2e">💡 创意PK</text>
    <text x="75" y="33" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FF6B6B">多个创意方案</text>
    <text x="75" y="48" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FF6B6B">最优方案胜出</text>
  </g>

  <!-- 装饰性分隔线 -->
  <line x1="400" y1="55" x2="400" y2="475" stroke="#409EFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 底部标注 -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">协作与竞争是推动进步的双引擎</text>

</svg>