<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#409EFF" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">🤖 智能体角色定义要素</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#6B7B8D">Agent Role Definition Components</text>

  <!-- ==================== 左侧：角色卡片模板 ==================== -->
  <g transform="translate(30, 75)">
    <rect x="0" y="0" width="340" height="390" rx="12" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="36" rx="12" fill="#409EFF"/>
    <rect x="0" y="18" width="340" height="18" fill="#409EFF"/>
    <text x="170" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">📋 角色卡片模板</text>

    <!-- 角色名称 -->
    <rect x="16" y="50" width="308" height="44" rx="8" fill="#F0F7FF" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="28" y="68" font-size="11" fill="#409EFF" font-weight="700">🏷️ 角色名称</text>
    <rect x="110" y="56" width="100" height="22" rx="11" fill="#409EFF" opacity="0.9"/>
    <text x="160" y="71" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="600">数据分析师</text>

    <!-- 核心目标 -->
    <rect x="16" y="104" width="308" height="44" rx="8" fill="#F5F9FF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="28" y="122" font-size="11" fill="#409EFF" font-weight="700">🎯 核心目标</text>
    <text x="110" y="122" font-size="11" fill="#1a1a2e">从数据中提取可执行的商业洞察</text>

    <!-- 专长领域 -->
    <rect x="16" y="158" width="308" height="44" rx="8" fill="#F5F9FF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="28" y="176" font-size="11" fill="#409EFF" font-weight="700">🧠 专长领域</text>
    <text x="110" y="176" font-size="11" fill="#1a1a2e">统计分析 · 数据可视化 · SQL</text>

    <!-- 背景故事 -->
    <rect x="16" y="212" width="308" height="54" rx="8" fill="#F5F9FF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="28" y="230" font-size="11" fill="#409EFF" font-weight="700">📖 背景故事</text>
    <text x="28" y="246" font-size="10" fill="#1a1a2e">5年电商数据分析经验，擅长用户行为</text>
    <text x="28" y="260" font-size="10" fill="#1a1a2e">分析与销售预测模型构建。</text>

    <!-- 能力边界 -->
    <rect x="16" y="276" width="308" height="54" rx="8" fill="#FFF5F5" stroke="#FFB8B8" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="28" y="294" font-size="11" fill="#E06060" font-weight="700">🔒 能力边界</text>
    <text x="28" y="310" font-size="10" fill="#1a1a2e">✅ 结构化数据分析 · 报表生成</text>
    <text x="28" y="324" font-size="10" fill="#1a1a2e">❌ 非结构化文本 · 实时数据采集</text>

    <!-- 输出格式 -->
    <rect x="16" y="340" width="308" height="38" rx="8" fill="#F5F9FF" stroke="#B8D6FF" stroke-width="1"/>
    <text x="28" y="358" font-size="11" fill="#409EFF" font-weight="700">📄 输出格式</text>
    <text x="110" y="358" font-size="11" fill="#1a1a2e">PDF报告 · 数据看板 · Excel</text>
  </g>

  <!-- ==================== 右侧：对比 ==================== -->
  <g transform="translate(420, 75)">
    <!-- 良好定义 -->
    <rect x="0" y="0" width="350" height="185" rx="12" fill="url(#cardGrad)" stroke="#67C23A" stroke-width="1.5" filter="url(#shadowLight)"/>
    <rect x="0" y="0" width="350" height="30" rx="12" fill="#67C23A"/>
    <rect x="0" y="15" width="350" height="15" fill="#67C23A"/>
    <text x="175" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">✅ 良好角色定义</text>

    <text x="16" y="50" font-size="11" fill="#67C23A" font-weight="700">🏷️ 角色</text>
    <rect x="70" y="38" width="80" height="20" rx="10" fill="#67C23A" opacity="0.85"/>
    <text x="110" y="52" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">数据分析师</text>

    <text x="16" y="78" font-size="11" fill="#67C23A" font-weight="700">🎯 目标</text>
    <text x="70" y="78" font-size="11" fill="#1a1a2e">提升销售预测准确率至95%</text>

    <text x="16" y="104" font-size="11" fill="#67C23A" font-weight="700">🧠 专长</text>
    <text x="70" y="104" font-size="11" fill="#1a1a2e">时间序列分析 · 回归建模</text>

    <text x="16" y="130" font-size="11" fill="#67C23A" font-weight="700">📖 背景</text>
    <text x="70" y="130" font-size="10" fill="#1a1a2e">3年零售行业数据分析经验</text>

    <text x="16" y="156" font-size="11" fill="#67C23A" font-weight="700">🔒 边界</text>
    <text x="70" y="156" font-size="10" fill="#1a1a2e">✅ 结构化数据  ❌ 实时流处理</text>

    <text x="16" y="178" font-size="11" fill="#67C23A" font-weight="700">📄 输出</text>
    <text x="70" y="178" font-size="10" fill="#1a1a2e">周报PDF · 趋势图表</text>

    <!-- 不良定义 -->
    <rect x="0" y="205" width="350" height="165" rx="12" fill="url(#cardGrad)" stroke="#F56C6C" stroke-width="1.5" filter="url(#shadowLight)"/>
    <rect x="0" y="205" width="350" height="30" rx="12" fill="#F56C6C"/>
    <rect x="0" y="220" width="350" height="15" fill="#F56C6C"/>
    <text x="175" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">❌ 不良角色定义</text>

    <text x="16" y="255" font-size="11" fill="#F56C6C" font-weight="700">🏷️ 角色</text>
    <rect x="70" y="243" width="100" height="20" rx="10" fill="#F56C6C" opacity="0.75"/>
    <text x="120" y="257" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">万能助手</text>

    <text x="16" y="283" font-size="11" fill="#F56C6C" font-weight="700">🎯 目标</text>
    <text x="70" y="283" font-size="11" fill="#888">帮助用户解决各种问题</text>

    <text x="16" y="309" font-size="11" fill="#F56C6C" font-weight="700">🧠 专长</text>
    <text x="70" y="309" font-size="11" fill="#888">什么都懂一点</text>

    <text x="16" y="335" font-size="11" fill="#F56C6C" font-weight="700">📖 背景</text>
    <text x="70" y="335" font-size="10" fill="#888">通用AI助手</text>

    <text x="16" y="361" font-size="11" fill="#F56C6C" font-weight="700">🔒 边界</text>
    <text x="70" y="361" font-size="10" fill="#888">未定义</text>
  </g>

  <!-- ==================== 标注 ==================== -->
  <!-- 标注1：角色名称 -->
  <g transform="translate(30, 75)">
    <line x1="340" y1="72" x2="390" y2="72" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <rect x="375" y="64" width="52" height="18" rx="9" fill="#409EFF"/>
  <text x="401" y="76" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">角色名称</text>

  <!-- 标注2：核心目标 -->
  <g transform="translate(30, 75)">
    <line x1="340" y1="126" x2="390" y2="126" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <rect x="375" y="118" width="52" height="18" rx="9" fill="#409EFF"/>
  <text x="401" y="130" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">核心目标</text>

  <!-- 标注3：专长领域 -->
  <g transform="translate(30, 75)">
    <line x1="340" y1="180" x2="390" y2="180" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <rect x="375" y="172" width="52" height="18" rx="9" fill="#409EFF"/>
  <text x="401" y="184" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">专长领域</text>

  <!-- 标注4：背景故事 -->
  <g transform="translate(30, 75)">
    <line x1="340" y1="239" x2="390" y2="239" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <rect x="375" y="231" width="52" height="18" rx="9" fill="#409EFF"/>
  <text x="401" y="243" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">背景故事</text>

  <!-- 标注5：能力边界 -->
  <g transform="translate(30, 75)">
    <line x1="340" y1="303" x2="390" y2="303" stroke="#E06060" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <rect x="375" y="295" width="52" height="18" rx="9" fill="#E06060"/>
  <text x="401" y="307" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">能力边界</text>

  <!-- 标注6：输出格式 -->
  <g transform="translate(30, 75)">
    <line x1="340" y1="359" x2="390" y2="359" stroke="#409EFF" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <rect x="375" y="351" width="52" height="18" rx="9" fill="#409EFF"/>
  <text x="401" y="363" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">输出格式</text>

  <!-- 底部说明 -->
  <text x="400" y="485" text-anchor="middle" font-size="10" fill="#A0B4C8">明确的角色定义 = 更精准的智能体行为 · 避免“万能助手”陷阱</text>
</svg>