<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fa"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7fd4"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">分层状态管理架构</text>

  <!-- ==================== 顶部面板：对话状态 ==================== -->
  <rect x="80" y="60" width="640" height="90" rx="16" ry="16" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="2"/>
  <!-- 图标：对话气泡 -->
  <g transform="translate(110, 85)">
    <rect x="0" y="5" width="32" height="24" rx="12" ry="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <path d="M8 29 L12 22 L20 22" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="11" cy="17" r="1.5" fill="#409EFF"/>
    <circle cx="19" cy="17" r="1.5" fill="#409EFF"/>
    <circle cx="27" cy="17" r="1.5" fill="#409EFF"/>
  </g>
  <text x="160" y="100" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">对话状态</text>
  <text x="160" y="125" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#5a5a7a">对话历史记录 · 上下文管理</text>
  <!-- 历史记录指示器 -->
  <g transform="translate(620, 85)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#e6f0ff"/>
    <text x="40" y="16" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#409EFF">12条记录</text>
  </g>

  <!-- ==================== 中间面板：任务状态 ==================== -->
  <rect x="80" y="175" width="640" height="100" rx="16" ry="16" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="2"/>
  <!-- 图标：清单 -->
  <g transform="translate(110, 200)">
    <rect x="0" y="0" width="28" height="28" rx="4" fill="none" stroke="#409EFF" stroke-width="2"/>
    <line x1="8" y1="10" x2="20" y2="10" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="20" y2="16" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="16" y2="22" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="160" y="210" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">任务状态</text>
  <text x="160" y="235" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#5a5a7a">子任务完成进度追踪</text>

  <!-- 进度条 -->
  <g transform="translate(480, 205)">
    <rect x="0" y="0" width="220" height="8" rx="4" fill="#e8e8f0"/>
    <rect x="0" y="0" width="154" height="8" rx="4" fill="#409EFF"/>
    <text x="0" y="24" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#5a5a7a">完成进度 70%</text>
  </g>
  <!-- 子任务项 -->
  <g transform="translate(480, 240)">
    <circle cx="6" cy="6" r="5" fill="#409EFF"/>
    <text x="16" y="10" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#5a5a7a">步骤 1/3</text>
  </g>

  <!-- ==================== 底部面板：工具状态 ==================== -->
  <rect x="80" y="300" width="640" height="90" rx="16" ry="16" fill="url(#panelGrad)" stroke="#409EFF" stroke-width="2"/>
  <!-- 图标：扳手 -->
  <g transform="translate(110, 325)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#409EFF" stroke-width="2"/>
    <path d="M20 20 L28 28" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8 8 L6 6" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="160" y="335" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">工具状态</text>
  <text x="160" y="360" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#5a5a7a">连接状态 · 可用工具集</text>

  <!-- 连接状态指示器 -->
  <g transform="translate(620, 330)">
    <circle cx="12" cy="12" r="10" fill="#52c41a"/>
    <circle cx="12" cy="12" r="6" fill="#73d13d"/>
    <circle cx="12" cy="12" r="3" fill="#ffffff"/>
    <text x="30" y="16" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#52c41a" font-weight="bold">已连接</text>
  </g>

  <!-- ==================== 中央六边形核心 ==================== -->
  <g transform="translate(400, 430)">
    <!-- 六边形 -->
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19" fill="url(#hexGrad)" stroke="#2b7fd4" stroke-width="2"/>
    <!-- 六边形内文字 -->
    <text x="0" y="-5" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">智能体</text>
    <text x="0" y="14" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#d4e8ff">核心</text>
  </g>

  <!-- ==================== 连接线 ==================== -->
  <!-- 顶部面板 → 核心 -->
  <line x1="400" y1="150" x2="400" y2="392" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- 中间面板 → 核心 -->
  <line x1="400" y1="275" x2="400" y2="392" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- 底部面板 → 核心 -->
  <line x1="400" y1="390" x2="400" y2="392" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- 箭头指示 -->
  <polygon points="393,395 400,410 407,395" fill="#409EFF" opacity="0.6"/>

  <!-- ==================== 标注 ==================== -->
  <!-- 标注 1 -->
  <g transform="translate(30, 95)">
    <rect x="0" y="0" width="36" height="20" rx="10" fill="#409EFF"/>
    <text x="18" y="14" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">①</text>
  </g>

  <!-- 标注 2 -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="36" height="20" rx="10" fill="#409EFF"/>
    <text x="18" y="14" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">②</text>
  </g>

  <!-- 标注 3 -->
  <g transform="translate(30, 335)">
    <rect x="0" y="0" width="36" height="20" rx="10" fill="#409EFF"/>
    <text x="18" y="14" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">③</text>
  </g>

  <!-- 标注 4 -->
  <g transform="translate(370, 470)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#1a1a2e"/>
    <text x="30" y="15" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">状态聚合</text>
  </g>

  <!-- 标注 5 -->
  <g transform="translate(680, 95)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#1a1a2e"/>
    <text x="30" y="15" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">持久化</text>
  </g>

  <!-- 标注 6 -->
  <g transform="translate(680, 335)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#1a1a2e"/>
    <text x="30" y="15" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#ffffff" font-weight="bold">实时监控</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="495" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#a0a0b8">三态分层汇聚至智能体核心，实现统一状态管理</text>
</svg>