<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#6BB5FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#D0E8F8" stroke-width="1.5" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">多数投票机制</text>

  <!-- 左侧：输入框 -->
  <rect x="55" y="80" width="100" height="48" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="105" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#fff" font-weight="bold">输入</text>

  <!-- 从输入框到5条路径的连线 -->
  <line x1="155" y1="104" x2="200" y2="104" stroke="#409EFF" stroke-width="2"/>
  <line x1="155" y1="104" x2="200" y2="104" stroke="#409EFF" stroke-width="2"/>

  <!-- 5条推理路径（水平链条） -->
  <!-- 路径1 -->
  <line x1="200" y1="60" x2="340" y2="60" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="230" cy="60" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="260" cy="60" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="290" cy="60" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="320" cy="60" r="5" fill="#409EFF" opacity="0.6"/>

  <!-- 路径2 -->
  <line x1="200" y1="82" x2="340" y2="82" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="230" cy="82" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="260" cy="82" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="290" cy="82" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="320" cy="82" r="5" fill="#409EFF" opacity="0.6"/>

  <!-- 路径3 -->
  <line x1="200" y1="104" x2="340" y2="104" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="230" cy="104" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="260" cy="104" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="290" cy="104" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="320" cy="104" r="5" fill="#409EFF" opacity="0.6"/>

  <!-- 路径4 -->
  <line x1="200" y1="126" x2="340" y2="126" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="230" cy="126" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="260" cy="126" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="290" cy="126" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="320" cy="126" r="5" fill="#409EFF" opacity="0.6"/>

  <!-- 路径5 -->
  <line x1="200" y1="148" x2="340" y2="148" stroke="#409EFF" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="230" cy="148" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="260" cy="148" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="290" cy="148" r="5" fill="#409EFF" opacity="0.6"/>
  <circle cx="320" cy="148" r="5" fill="#409EFF" opacity="0.6"/>

  <!-- 5个答案标记 -->
  <rect x="345" y="48" width="44" height="24" rx="12" fill="#E0E0E0"/>
  <text x="367" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">A</text>

  <rect x="345" y="70" width="44" height="24" rx="12" fill="#E0E0E0"/>
  <text x="367" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">B</text>

  <rect x="345" y="92" width="44" height="24" rx="12" fill="#E0E0E0"/>
  <text x="367" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">C</text>

  <rect x="345" y="114" width="44" height="24" rx="12" fill="#E0E0E0"/>
  <text x="367" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">D</text>

  <rect x="345" y="136" width="44" height="24" rx="12" fill="#E0E0E0"/>
  <text x="367" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">E</text>

  <!-- 从答案到投票箱的连线 -->
  <line x1="389" y1="60" x2="440" y2="104" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <line x1="389" y1="82" x2="440" y2="104" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <line x1="389" y1="104" x2="440" y2="104" stroke="#409EFF" stroke-width="1.8"/>
  <line x1="389" y1="126" x2="440" y2="104" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>
  <line x1="389" y1="148" x2="440" y2="104" stroke="#409EFF" stroke-width="1.8" opacity="0.5"/>

  <!-- 投票箱 -->
  <rect x="440" y="80" width="60" height="48" rx="6" fill="#409EFF" opacity="0.85"/>
  <rect x="440" y="80" width="60" height="12" rx="4" fill="#1a1a2e" opacity="0.3"/>
  <rect x="453" y="92" width="34" height="8" rx="3" fill="#fff" opacity="0.4"/>
  <text x="470" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">投票箱</text>

  <!-- 从投票箱到结果的连线 -->
  <line x1="500" y1="104" x2="540" y2="104" stroke="#409EFF" stroke-width="2.5"/>

  <!-- 结果区域 -->
  <!-- 3个绿色答案（多数） -->
  <rect x="545" y="80" width="40" height="24" rx="12" fill="#67C23A"/>
  <text x="565" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">A</text>

  <rect x="545" y="110" width="40" height="24" rx="12" fill="#67C23A"/>
  <text x="565" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">A</text>

  <rect x="545" y="140" width="40" height="24" rx="12" fill="#67C23A"/>
  <text x="565" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">A</text>

  <!-- 2个灰色答案 -->
  <rect x="600" y="80" width="40" height="24" rx="12" fill="#C0C4CC"/>
  <text x="620" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">B</text>

  <rect x="600" y="140" width="40" height="24" rx="12" fill="#C0C4CC"/>
  <text x="620" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">C</text>

  <!-- 最终输出：高亮的A + 星星 -->
  <rect x="660" y="95" width="60" height="38" rx="14" fill="#67C23A" stroke="#45A61D" stroke-width="2"/>
  <text x="690" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">A</text>

  <!-- 星星皇冠 -->
  <polygon points="690,78 694,90 707,90 697,98 700,110 690,102 680,110 683,98 673,90 686,90" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>

  <!-- 标注 -->
  <!-- 标注1：输入 -->
  <text x="105" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">输入提示</text>

  <!-- 标注2：推理路径 -->
  <text x="270" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">并行推理</text>

  <!-- 标注3：答案 -->
  <text x="367" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">候选答案</text>

  <!-- 标注4：投票 -->
  <text x="470" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">投票聚合</text>

  <!-- 标注5：多数 -->
  <text x="575" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#67C23A" font-weight="bold">多数(3票)</text>

  <!-- 标注6：最终输出 -->
  <text x="690" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">最终输出</text>

  <!-- 装饰性虚线框 -->
  <rect x="195" y="38" width="155" height="130" rx="10" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <rect x="435" y="68" width="70" height="70" rx="8" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <rect x="540" y="65" width="110" height="110" rx="10" fill="none" stroke="#67C23A" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>

  <!-- 底部说明 -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.6">多数投票：从多个推理路径中选择出现次数最多的答案</text>
</svg>