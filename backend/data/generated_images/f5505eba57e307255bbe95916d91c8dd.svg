<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Transformer 核心架构</text>

  <!-- 连接线 - 五边形布局 -->
  <!-- 中心到各卡片 -->
  <line x1="400" y1="250" x2="230" y2="130" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="400" y1="250" x2="570" y2="130" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="400" y1="250" x2="160" y2="320" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="400" y1="250" x2="640" y2="320" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="400" y1="250" x2="400" y2="420" stroke="#1a1a2e" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- 卡片间连接线 -->
  <line x1="230" y1="130" x2="570" y2="130" stroke="#1a1a2e" stroke-width="1.2" opacity="0.25"/>
  <line x1="570" y1="130" x2="640" y2="320" stroke="#1a1a2e" stroke-width="1.2" opacity="0.25"/>
  <line x1="640" y1="320" x2="400" y2="420" stroke="#1a1a2e" stroke-width="1.2" opacity="0.25"/>
  <line x1="400" y1="420" x2="160" y2="320" stroke="#1a1a2e" stroke-width="1.2" opacity="0.25"/>
  <line x1="160" y1="320" x2="230" y2="130" stroke="#1a1a2e" stroke-width="1.2" opacity="0.25"/>

  <!-- 中心圆 -->
  <circle cx="400" cy="250" r="52" fill="#409EFF" filter="url(#cardShadow)"/>
  <circle cx="400" cy="250" r="52" fill="none" stroke="#1a1a2e" stroke-width="1.5" opacity="0.15"/>
  <text x="400" y="240" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">Transformer</text>
  <text x="400" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" opacity="0.9">核心</text>

  <!-- 卡片 1: Token Embedding - 左上 -->
  <g filter="url(#cardShadow)">
    <rect x="155" y="85" width="150" height="90" rx="16" fill="#409EFF"/>
    <rect x="155" y="85" width="150" height="90" rx="16" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.1"/>
    <!-- 图标：文本到向量 -->
    <text x="230" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" opacity="0.9">文本→向量</text>
    <rect x="195" y="124" width="70" height="4" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="200" y="132" width="60" height="4" rx="2" fill="#fff" opacity="0.35"/>
    <rect x="205" y="140" width="50" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <!-- 箭头 -->
    <polygon points="265,130 275,130 270,138" fill="#fff" opacity="0.7"/>
    <text x="230" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Token Embedding</text>
  </g>

  <!-- 卡片 2: Positional Encoding - 右上 -->
  <g filter="url(#cardShadow)">
    <rect x="495" y="85" width="150" height="90" rx="16" fill="#409EFF"/>
    <rect x="495" y="85" width="150" height="90" rx="16" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.1"/>
    <!-- 图标：正弦波 -->
    <path d="M510,120 Q520,105 530,120 Q540,135 550,120 Q560,105 570,120 Q580,135 590,120" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>
    <text x="530" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" opacity="0.6">sin/cos</text>
    <text x="570" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" opacity="0.6">位置</text>
    <text x="570" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Positional Encoding</text>
  </g>

  <!-- 卡片 3: Self-Attention - 左中 -->
  <g filter="url(#cardShadow)">
    <rect x="85" y="275" width="150" height="90" rx="16" fill="#409EFF"/>
    <rect x="85" y="275" width="150" height="90" rx="16" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.1"/>
    <!-- 图标：QKV节点 -->
    <circle cx="120" cy="305" r="10" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <text x="120" y="309" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">Q</text>
    <circle cx="160" cy="305" r="10" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <text x="160" y="309" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">K</text>
    <circle cx="200" cy="305" r="10" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <text x="200" y="309" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">V</text>
    <!-- 双向箭头 -->
    <line x1="130" y1="305" x2="150" y2="305" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="305" x2="190" y2="305" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <text x="160" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Self-Attention</text>
  </g>

  <!-- 卡片 4: Multi-Head Attention - 右中 -->
  <g filter="url(#cardShadow)">
    <rect x="565" y="275" width="150" height="90" rx="16" fill="#409EFF"/>
    <rect x="565" y="275" width="150" height="90" rx="16" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.1"/>
    <!-- 图标：多头 -->
    <rect x="585" y="295" width="12" height="20" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="602" y="295" width="12" height="20" rx="3" fill="#fff" opacity="0.65"/>
    <rect x="619" y="295" width="12" height="20" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="636" y="295" width="12" height="20" rx="3" fill="#fff" opacity="0.35"/>
    <rect x="653" y="295" width="12" height="20" rx="3" fill="#fff" opacity="0.2"/>
    <!-- 汇聚箭头 -->
    <path d="M640,295 L640,285 L660,285" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
    <text x="640" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Multi-Head Attn</text>
  </g>

  <!-- 卡片 5: Feed-Forward Network - 下方 -->
  <g filter="url(#cardShadow)">
    <rect x="325" y="400" width="150" height="85" rx="16" fill="#409EFF"/>
    <rect x="325" y="400" width="150" height="85" rx="16" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.1"/>
    <!-- 图标：神经网络节点 -->
    <circle cx="360" cy="425" r="7" fill="#fff" opacity="0.3"/>
    <circle cx="400" cy="425" r="7" fill="#fff" opacity="0.5"/>
    <circle cx="440" cy="425" r="7" fill="#fff" opacity="0.3"/>
    <circle cx="380" cy="442" r="7" fill="#fff" opacity="0.4"/>
    <circle cx="420" cy="442" r="7" fill="#fff" opacity="0.4"/>
    <!-- 连接线 -->
    <line x1="360" y1="425" x2="380" y2="442" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <line x1="400" y1="425" x2="380" y2="442" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <line x1="400" y1="425" x2="420" y2="442" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <line x1="440" y1="425" x2="420" y2="442" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <text x="400" y="472" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Feed-Forward Net</text>
  </g>

  <!-- 标注 1 -->
  <text x="230" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">输入嵌入</text>

  <!-- 标注 2 -->
  <text x="570" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">位置编码</text>

  <!-- 标注 3 -->
  <text x="75" y="320" text-anchor="end" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">自注意力</text>

  <!-- 标注 4 -->
  <text x="725" y="320" text-anchor="start" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">多头注意力</text>

  <!-- 标注 5 -->
  <text x="400" y="495" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">前馈网络</text>

  <!-- 标注 6 -->
  <text x="400" y="240" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" opacity="0.5">编码器</text>

  <!-- 底部说明 -->
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.35">Transformer 编码器核心组件</text>
</svg>