<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D3D9E0"/>
      <stop offset="100%" stop-color="#C5CDD6"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7ED6"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3578C7"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 顶部标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">传统程序 vs AI 智能体</text>

  <!-- 分隔线 -->
  <line x1="400" y1="52" x2="400" y2="480" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- ====== 左侧：传统程序 ====== -->
  <rect x="30" y="60" width="340" height="420" fill="url(#leftGrad)" rx="12" opacity="0.35"/>

  <!-- 左侧标题 -->
  <rect x="80" y="72" width="240" height="32" rx="6" fill="#B0B8C4" opacity="0.6"/>
  <text x="200" y="93" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">传统程序</text>

  <!-- 流程图 - 机械排序机 -->
  <!-- 输入 -->
  <rect x="100" y="120" width="200" height="36" rx="6" fill="#A0AAB6" stroke="#8A94A0" stroke-width="1.5"/>
  <text x="200" y="143" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">输入：批量邮件</text>

  <!-- 箭头 -->
  <line x1="200" y1="156" x2="200" y2="178" stroke="#8A94A0" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#8A94A0"/>
    </marker>
  </defs>

  <!-- 判断菱形 -->
  <polygon points="200,180 280,216 200,252 120,216" fill="#B5BFC9" stroke="#8A94A0" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">固定规则</text>

  <!-- 左分支 -->
  <line x1="120" y1="216" x2="80" y2="216" stroke="#8A94A0" stroke-width="1.5"/>
  <line x1="80" y1="216" x2="80" y2="280" stroke="#8A94A0" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="140" y2="280" stroke="#8A94A0" stroke-width="1.5"/>
  <rect x="140" y="264" width="100" height="32" rx="6" fill="#A0AAB6" stroke="#8A94A0" stroke-width="1.5"/>
  <text x="190" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">模板 A</text>

  <!-- 右分支 -->
  <line x1="280" y1="216" x2="320" y2="216" stroke="#8A94A0" stroke-width="1.5"/>
  <line x1="320" y1="216" x2="320" y2="280" stroke="#8A94A0" stroke-width="1.5"/>
  <line x1="320" y1="280" x2="260" y2="280" stroke="#8A94A0" stroke-width="1.5"/>
  <rect x="160" y="264" width="100" height="32" rx="6" fill="#A0AAB6" stroke="#8A94A0" stroke-width="1.5"/>
  <text x="210" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e">模板 B</text>

  <!-- 合并箭头 -->
  <line x1="190" y1="296" x2="190" y2="330" stroke="#8A94A0" stroke-width="1.5"/>
  <line x1="210" y1="296" x2="210" y2="330" stroke="#8A94A0" stroke-width="1.5"/>

  <!-- 输出 -->
  <rect x="100" y="332" width="200" height="36" rx="6" fill="#A0AAB6" stroke="#8A94A0" stroke-width="1.5"/>
  <text x="200" y="355" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">1000 封相同邮件</text>

  <!-- 信封堆 -->
  <rect x="130" y="382" width="28" height="20" rx="2" fill="#D0D6DE" stroke="#8A94A0" stroke-width="1"/>
  <rect x="145" y="378" width="28" height="20" rx="2" fill="#D0D6DE" stroke="#8A94A0" stroke-width="1"/>
  <rect x="160" y="374" width="28" height="20" rx="2" fill="#D0D6DE" stroke="#8A94A0" stroke-width="1"/>
  <rect x="175" y="370" width="28" height="20" rx="2" fill="#D0D6DE" stroke="#8A94A0" stroke-width="1"/>
  <rect x="190" y="366" width="28" height="20" rx="2" fill="#D0D6DE" stroke="#8A94A0" stroke-width="1"/>
  <text x="240" y="383" font-family="sans-serif" font-size="12" fill="#8A94A0">×1000</text>

  <!-- 左侧标注 -->
  <rect x="50" y="430" width="140" height="26" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="120" y="448" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FFFFFF">固定流程处理</text>

  <!-- ====== 右侧：AI 智能体 ====== -->
  <rect x="430" y="60" width="340" height="420" fill="url(#rightGrad)" rx="12" opacity="0.12"/>

  <!-- 右侧标题 -->
  <rect x="480" y="72" width="240" height="32" rx="6" fill="#409EFF" opacity="0.2"/>
  <text x="600" y="93" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">AI 智能体</text>

  <!-- 桌子 -->
  <rect x="470" y="380" width="260" height="12" rx="3" fill="#C0D8F0" stroke="#409EFF" stroke-width="1"/>
  <rect x="490" y="392" width="10" height="40" fill="#B0C8E0"/>
  <rect x="700" y="392" width="10" height="40" fill="#B0C8E0"/>

  <!-- 机器人身体 -->
  <rect x="555" y="310" width="90" height="70" rx="10" fill="url(#robotBody)" stroke="#2B7ED6" stroke-width="1.5"/>

  <!-- 机器人头部 -->
  <rect x="560" y="260" width="80" height="55" rx="12" fill="#409EFF" stroke="#2B7ED6" stroke-width="1.5"/>

  <!-- 机器人眼睛 -->
  <circle cx="585" cy="283" r="8" fill="#FFFFFF"/>
  <circle cx="615" cy="283" r="8" fill="#FFFFFF"/>
  <circle cx="587" cy="283" r="4" fill="#1a1a2e"/>
  <circle cx="617" cy="283" r="4" fill="#1a1a2e"/>

  <!-- 机器人嘴巴（微笑） -->
  <path d="M585 300 Q600 312 615 300" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 机器人天线 -->
  <line x1="600" y1="260" x2="600" y2="240" stroke="#409EFF" stroke-width="2"/>
  <circle cx="600" cy="236" r="5" fill="#409EFF"/>

  <!-- 机器人手臂（左 - 拿信） -->
  <line x1="555" y1="335" x2="520" y2="350" stroke="#409EFF" stroke-width="4" stroke-linecap="round"/>
  <rect x="505" y="342" width="22" height="16" rx="2" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>

  <!-- 机器人手臂（右 - 打字） -->
  <line x1="645" y1="335" x2="680" y2="350" stroke="#409EFF" stroke-width="4" stroke-linecap="round"/>

  <!-- 屏幕 -->
  <rect x="470" y="140" width="200" height="130" rx="6" fill="#1a1a2e" stroke="#409EFF" stroke-width="2"/>
  <rect x="478" y="148" width="184" height="114" rx="3" fill="#0D1B2A"/>

  <!-- 屏幕内容 - 客户资料 -->
  <text x="490" y="170" font-family="sans-serif" font-size="11" fill="#409EFF">客户资料</text>
  <line x1="490" y1="176" x2="650" y2="176" stroke="#409EFF" stroke-width="0.5" opacity="0.5"/>

  <text x="490" y="195" font-family="sans-serif" font-size="10" fill="#FFFFFF">姓名：张三</text>
  <text x="490" y="212" font-family="sans-serif" font-size="10" fill="#FFFFFF">年龄：35岁</text>
  <text x="490" y="229" font-family="sans-serif" font-size="10" fill="#FFFFFF">兴趣：科技、阅读</text>
  <text x="490" y="246" font-family="sans-serif" font-size="10" fill="#FFFFFF">最近购买：笔记本电脑</text>

  <!-- 思考气泡 -->
  <ellipse cx="720" cy="200" rx="65" ry="45" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <circle cx="680" cy="240" r="6" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="665" cy="255" r="4" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.5"/>

  <!-- 气泡内容 -->
  <text x="720" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">分析客户</text>
  <text x="720" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">个性化推荐</text>
  <text x="720" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e">定制内容</text>

  <!-- 个性化信件 -->
  <rect x="470" y="410" width="55" height="38" rx="2" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="497" y="428" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">亲爱的</text>
  <text x="497" y="440" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">张先生...</text>

  <rect x="535" y="412" width="50" height="36" rx="2" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="560" y="430" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">李女士</text>
  <text x="560" y="442" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">专属优惠</text>

  <rect x="595" y="414" width="50" height="34" rx="2" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="620" y="432" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">王经理</text>
  <text x="620" y="443" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">方案</text>

  <rect x="655" y="416" width="45" height="32" rx="2" fill="#FFFFFF" stroke="#409EFF" stroke-width="1"/>
  <text x="677" y="434" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a1a2e">更多...</text>

  <!-- 右侧标注 -->
  <rect x="560" y="455" width="140" height="26" rx="4" fill="#409EFF" opacity="0.85"/>
  <text x="630" y="473" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#FFFFFF">个性化生成</text>

  <!-- 底部说明 -->
  <rect x="280" y="485" width="240" height="20" rx="4" fill="#1a1a2e" opacity="0.06"/>
  <text x="400" y="499" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">批量模板 vs 千人千面</text>

</svg>