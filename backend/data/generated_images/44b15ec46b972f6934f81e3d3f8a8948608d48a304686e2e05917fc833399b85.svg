<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#D0E4F7"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#8FA8C8"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2B7BE8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">传统程序 vs AI 智能体</text>

  <!-- 分割线 -->
  <line x1="400" y1="48" x2="400" y2="480" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- ==================== 左侧：传统程序 ==================== -->
  <rect x="30" y="55" width="340" height="420" rx="10" fill="url(#leftGrad)" opacity="0.25"/>

  <!-- 左侧标题 -->
  <rect x="100" y="62" width="200" height="32" rx="16" fill="#6B8299" opacity="0.6"/>
  <text x="200" y="83" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">传统程序</text>

  <!-- 流程图 - 机械分拣 -->
  <!-- 输入：1000 封模板邮件 -->
  <rect x="110" y="110" width="180" height="40" rx="6" fill="#6B8299" stroke="#4A6076" stroke-width="1.5"/>
  <text x="200" y="135" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">1000 封模板邮件</text>

  <!-- 箭头 -->
  <polygon points="200,150 195,160 205,160" fill="#4A6076"/>
  <line x1="200" y1="150" x2="200" y2="160" stroke="#4A6076" stroke-width="2"/>

  <!-- 判断菱形：if/else -->
  <polygon points="200,165 260,200 200,235 140,200" fill="#7A94AD" stroke="#4A6076" stroke-width="1.5"/>
  <text x="200" y="204" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">if/else</text>

  <!-- 左侧分支 -->
  <line x1="140" y1="200" x2="80" y2="200" stroke="#4A6076" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="80" y2="280" stroke="#4A6076" stroke-width="1.5"/>
  <polygon points="80,280 75,270 85,270" fill="#4A6076"/>
  <rect x="50" y="282" width="60" height="36" rx="4" fill="#8AA4BC" stroke="#4A6076" stroke-width="1"/>
  <text x="80" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">分支 A</text>

  <!-- 右侧分支 -->
  <line x1="260" y1="200" x2="320" y2="200" stroke="#4A6076" stroke-width="1.5"/>
  <line x1="320" y1="200" x2="320" y2="280" stroke="#4A6076" stroke-width="1.5"/>
  <polygon points="320,280 315,270 325,270" fill="#4A6076"/>
  <rect x="290" y="282" width="60" height="36" rx="4" fill="#8AA4BC" stroke="#4A6076" stroke-width="1"/>
  <text x="320" y="305" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">分支 B</text>

  <!-- 合并 -->
  <line x1="80" y1="318" x2="80" y2="350" stroke="#4A6076" stroke-width="1.5"/>
  <line x1="320" y1="318" x2="320" y2="350" stroke="#4A6076" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="320" y2="350" stroke="#4A6076" stroke-width="1.5"/>
  <line x1="200" y1="350" x2="200" y2="370" stroke="#4A6076" stroke-width="1.5"/>
  <polygon points="200,370 195,360 205,360" fill="#4A6076"/>

  <!-- 输出 -->
  <rect x="110" y="372" width="180" height="40" rx="6" fill="#6B8299" stroke="#4A6076" stroke-width="1.5"/>
  <text x="200" y="397" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">批量发送</text>

  <!-- 信封图标 -->
  <g transform="translate(200, 430)">
    <rect x="-20" y="-12" width="40" height="28" rx="3" fill="#6B8299" stroke="#4A6076" stroke-width="1.2"/>
    <polyline points="-18,-10 0,4 18,-10" fill="none" stroke="#4A6076" stroke-width="1.2"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#fff">✉</text>
  </g>
  <text x="200" y="462" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4A6076">× 1000</text>

  <!-- 左侧标注 -->
  <rect x="35" y="100" width="65" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="67" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">固定流程</text>

  <rect x="35" y="240" width="65" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="67" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">机械判断</text>

  <!-- ==================== 右侧：AI 智能体 ==================== -->
  <rect x="430" y="55" width="340" height="420" rx="10" fill="url(#rightGrad)" opacity="0.12"/>

  <!-- 右侧标题 -->
  <rect x="500" y="62" width="200" height="32" rx="16" fill="#409EFF" opacity="0.7"/>
  <text x="600" y="83" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">AI 智能体</text>

  <!-- 桌面 -->
  <rect x="480" y="370" width="240" height="8" rx="2" fill="#B0C4DE" opacity="0.5"/>

  <!-- AI 机器人坐姿 -->
  <g transform="translate(600, 300)">
    <!-- 身体 -->
    <rect x="-25" y="10" width="50" height="55" rx="8" fill="#409EFF" stroke="#2B7BE8" stroke-width="1.5"/>
    <!-- 头部 -->
    <circle cx="0" cy="-8" r="22" fill="#409EFF" stroke="#2B7BE8" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-12" r="4" fill="#fff"/>
    <circle cx="8" cy="-12" r="4" fill="#fff"/>
    <circle cx="-7" cy="-12" r="2" fill="#1a1a2e"/>
    <circle cx="9" cy="-12" r="2" fill="#1a1a2e"/>
    <!-- 微笑 -->
    <path d="M-6,-3 Q0,4 6,-3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 天线 -->
    <line x1="0" y1="-30" x2="0" y2="-38" stroke="#2B7BE8" stroke-width="2"/>
    <circle cx="0" cy="-40" r="4" fill="#FFD700"/>
    <!-- 手臂 -->
    <rect x="-38" y="18" width="14" height="6" rx="3" fill="#2B7BE8"/>
    <rect x="24" y="18" width="14" height="6" rx="3" fill="#2B7BE8"/>
  </g>

  <!-- 屏幕 -->
  <rect x="490" y="200" width="100" height="70" rx="5" fill="#E8F0FE" stroke="#409EFF" stroke-width="1.5"/>
  <rect x="495" y="205" width="90" height="55" rx="3" fill="#fff"/>
  <!-- 屏幕上的客户资料 -->
  <text x="500" y="218" font-family="sans-serif" font-size="7" fill="#1a1a2e">姓名: 张三</text>
  <text x="500" y="230" font-family="sans-serif" font-size="7" fill="#1a1a2e">年龄: 28</text>
  <text x="500" y="242" font-family="sans-serif" font-size="7" fill="#1a1a2e">兴趣: 科技</text>
  <text x="500" y="254" font-family="sans-serif" font-size="7" fill="#1a1a2e">最近浏览: AI</text>
  <!-- 屏幕支架 -->
  <rect x="535" y="270" width="10" height="20" fill="#B0C4DE"/>

  <!-- 个性化信件 -->
  <g transform="translate(630, 210)">
    <rect x="0" y="0" width="85" height="65" rx="3" fill="#fff" stroke="#409EFF" stroke-width="1" transform="rotate(-5)"/>
    <text x="10" y="16" font-family="sans-serif" font-size="6" fill="#1a1a2e" transform="rotate(-5)">亲爱的张三：</text>
    <text x="10" y="28" font-family="sans-serif" font-size="6" fill="#1a1a2e" transform="rotate(-5)">推荐您最新 AI</text>
    <text x="10" y="40" font-family="sans-serif" font-size="6" fill="#1a1a2e" transform="rotate(-5)">课程，限时优惠</text>
    <text x="10" y="52" font-family="sans-serif" font-size="6" fill="#1a1a2e" transform="rotate(-5)">30%...</text>
  </g>

  <!-- 更多信件 -->
  <g transform="translate(660, 280)">
    <rect x="0" y="0" width="60" height="40" rx="2" fill="#fff" stroke="#B0C4DE" stroke-width="0.8" transform="rotate(8)"/>
    <text x="8" y="14" font-family="sans-serif" font-size="5" fill="#1a1a2e" transform="rotate(8)">李四 收</text>
  </g>
  <g transform="translate(640, 320)">
    <rect x="0" y="0" width="60" height="40" rx="2" fill="#fff" stroke="#B0C4DE" stroke-width="0.8" transform="rotate(-3)"/>
    <text x="8" y="14" font-family="sans-serif" font-size="5" fill="#1a1a2e" transform="rotate(-3)">王五 收</text>
  </g>

  <!-- 思考气泡 -->
  <g transform="translate(540, 120)">
    <ellipse cx="0" cy="0" rx="65" ry="28" fill="#fff" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
    <circle cx="-40" cy="25" r="6" fill="#fff" stroke="#409EFF" stroke-width="1"/>
    <circle cx="-48" cy="35" r="4" fill="#fff" stroke="#409EFF" stroke-width="0.8"/>
    <text x="-45" y="-5" font-family="sans-serif" font-size="9" fill="#1a1a2e">分析客户画像</text>
    <text x="-40" y="8" font-family="sans-serif" font-size="9" fill="#1a1a2e">定制推荐内容</text>
  </g>

  <!-- 第二个思考气泡 -->
  <g transform="translate(680, 100)">
    <ellipse cx="0" cy="0" rx="50" ry="20" fill="#fff" stroke="#409EFF" stroke-width="1.2" opacity="0.8"/>
    <circle cx="-30" cy="18" r="5" fill="#fff" stroke="#409EFF" stroke-width="0.8"/>
    <text x="-35" y="-3" font-family="sans-serif" font-size="8" fill="#1a1a2e">千人千面</text>
    <text x="-30" y="8" font-family="sans-serif" font-size="8" fill="#1a1a2e">个性化</text>
  </g>

  <!-- 右侧标注 -->
  <rect x="435" y="100" width="70" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="470" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">动态推理</text>

  <rect x="435" y="240" width="70" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="470" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">理解意图</text>

  <rect x="435" y="370" width="70" height="22" rx="4" fill="#1a1a2e" opacity="0.7"/>
  <text x="470" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">个性生成</text>

  <!-- 底部对比标注 -->
  <rect x="130" y="478" width="140" height="18" rx="9" fill="#6B8299" opacity="0.5"/>
  <text x="200" y="491" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">批量 · 无差异</text>

  <rect x="530" y="478" width="140" height="18" rx="9" fill="#409EFF" opacity="0.5"/>
  <text x="600" y="491" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e">智能 · 个性化</text>

</svg>