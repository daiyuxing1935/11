<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3578CC"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLight" x="-2" y="-2" width="104%" height="108%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e" letter-spacing="1">自回归文本生成 · 逐步演示</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#409EFF" stroke-width="1.5" opacity="0.4"/>

  <!-- ============================================ -->
  <!-- 步骤 1：输入 4 个 token -->
  <!-- ============================================ -->

  <!-- 步骤标签 -->
  <rect x="30" y="65" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="65" y="80" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">步骤 1</text>

  <!-- 模型图标 -->
  <rect x="30" y="100" width="44" height="44" rx="10" fill="url(#modelGrad)" filter="url(#shadowLight)"/>
  <text x="52" y="127" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">M</text>

  <!-- 输入 token 块 -->
  <rect x="90" y="103" width="70" height="38" rx="6" fill="url(#tokenGrad)" filter="url(#shadow)"/>
  <text x="125" y="128" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">法国</text>

  <rect x="168" y="103" width="70" height="38" rx="6" fill="url(#tokenGrad)" filter="url(#shadow)"/>
  <text x="203" y="128" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">的</text>

  <rect x="246" y="103" width="70" height="38" rx="6" fill="url(#tokenGrad)" filter="url(#shadow)"/>
  <text x="281" y="128" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">首都</text>

  <rect x="324" y="103" width="70" height="38" rx="6" fill="url(#tokenGrad)" filter="url(#shadow)"/>
  <text x="359" y="128" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">是</text>

  <!-- 标注 -->
  <text x="220" y="162" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.65">4 个输入 token</text>

  <!-- 循环箭头 1 -->
  <g transform="translate(420, 122)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
    <path d="M-6,-6 L0,-12 L6,-6" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <path d="M-8,4 A16,16 0 0,1 -6,-6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ============================================ -->
  <!-- 步骤 2：预测 "巴黎"（第 5 个 token） -->
  <!-- ============================================ -->

  <rect x="30" y="195" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="65" y="210" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">步骤 2</text>

  <!-- 模型图标 -->
  <rect x="30" y="230" width="44" height="44" rx="10" fill="url(#modelGrad)" filter="url(#shadowLight)"/>
  <text x="52" y="257" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">M</text>

  <!-- 之前的 token（半透明） -->
  <rect x="90" y="233" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="125" y="258" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">法国</text>

  <rect x="168" y="233" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="203" y="258" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">的</text>

  <rect x="246" y="233" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="281" y="258" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">首都</text>

  <rect x="324" y="233" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="359" y="258" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">是</text>

  <!-- 新预测的 token（高亮） -->
  <rect x="410" y="230" width="70" height="44" rx="8" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="445" y="258" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">巴黎</text>

  <!-- 预测指示 -->
  <path d="M445,274 L445,284" stroke="#1a1a2e" stroke-width="1.2" opacity="0.5"/>
  <polygon points="440,282 445,290 450,282" fill="#1a1a2e" opacity="0.5"/>

  <!-- 标注 -->
  <text x="445" y="300" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.65">预测第 5 个 token</text>

  <!-- 循环箭头 2 -->
  <g transform="translate(510, 252)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
    <path d="M-6,-6 L0,-12 L6,-6" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <path d="M-8,4 A16,16 0 0,1 -6,-6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ============================================ -->
  <!-- 步骤 3：添加标点 token -->
  <!-- ============================================ -->

  <rect x="30" y="325" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="65" y="340" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">步骤 3</text>

  <!-- 模型图标 -->
  <rect x="30" y="360" width="44" height="44" rx="10" fill="url(#modelGrad)" filter="url(#shadowLight)"/>
  <text x="52" y="387" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">M</text>

  <!-- 之前的 token（半透明） -->
  <rect x="90" y="363" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="125" y="388" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">法国</text>

  <rect x="168" y="363" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="203" y="388" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">的</text>

  <rect x="246" y="363" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="281" y="388" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">首都</text>

  <rect x="324" y="363" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="359" y="388" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">是</text>

  <rect x="410" y="363" width="70" height="38" rx="6" fill="#409EFF" opacity="0.35"/>
  <text x="445" y="388" text-anchor="middle" font-size="15" fill="#1a1a2e" opacity="0.5">巴黎</text>

  <!-- 新预测的 token -->
  <rect x="496" y="360" width="50" height="44" rx="8" fill="#409EFF" stroke="#1a1a2e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="521" y="388" text-anchor="middle" font-size="18" fill="#fff" font-weight="bold">。</text>

  <!-- 标注 -->
  <text x="521" y="425" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.65">添加标点 token</text>

  <!-- 循环箭头 3 -->
  <g transform="translate(570, 382)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#409EFF" stroke-width="1.8" opacity="0.6"/>
    <path d="M-6,-6 L0,-12 L6,-6" fill="none" stroke="#409EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <path d="M-8,4 A16,16 0 0,1 -6,-6" fill="none" stroke="#409EFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ============================================ -->
  <!-- 步骤 4：EOS token 结束 -->
  <!-- ============================================ -->

  <rect x="610" y="65" width="70" height="22" rx="11" fill="#1a1a2e" opacity="0.85"/>
  <text x="645" y="80" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">步骤 4</text>

  <!-- 模型图标 -->
  <rect x="610" y="100" width="44" height="44" rx="10" fill="url(#modelGrad)" filter="url(#shadowLight)"/>
  <text x="632" y="127" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">M</text>

  <!-- 之前的 token（小号） -->
  <rect x="668" y="105" width="48" height="34" rx="5" fill="#409EFF" opacity="0.25"/>
  <text x="692" y="127" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.4">法国</text>

  <rect x="720" y="105" width="48" height="34" rx="5" fill="#409EFF" opacity="0.25"/>
  <text x="744" y="127" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.4">的</text>

  <!-- EOS token -->
  <rect x="668" y="150" width="100" height="44" rx="8" fill="#1a1a2e" stroke="#409EFF" stroke-width="2" filter="url(#shadow)"/>
  <text x="718" y="178" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">[EOS]</text>

  <!-- 标注 -->
  <text x="718" y="215" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.65">结束 token</text>

  <!-- ============================================ -->
  <!-- 底部说明 -->
  <!-- ============================================ -->

  <rect x="120" y="450" width="560" height="36" rx="18" fill="#1a1a2e" opacity="0.06"/>
  <text x="400" y="473" text-anchor="middle" font-size="13" fill="#1a1a2e" opacity="0.7">自回归生成：每一步将新预测的 token 追加到输入序列，作为下一步的输入</text>

</svg>