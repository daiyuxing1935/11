<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="era1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c6d4"/>
      <stop offset="100%" stop-color="#8fa3b8"/>
    </linearGradient>
    <linearGradient id="era2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6fa3d9"/>
      <stop offset="100%" stop-color="#4a8bc2"/>
    </linearGradient>
    <linearGradient id="era3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#2b7ad9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">人工智能演进历程</text>

  <!-- 时间线横线 -->
  <line x1="80" y1="220" x2="740" y2="220" stroke="#c0d4e5" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== 时代 1：1980s-2000s ===== -->
  <g filter="url(#shadow)">
    <rect x="70" y="130" width="180" height="90" rx="12" fill="url(#era1Grad)"/>
    <!-- IF/THEN 规则图标 -->
    <rect x="100" y="148" width="50" height="24" rx="4" fill="#e8eef5" opacity="0.85"/>
    <text x="125" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a6a8a" font-weight="bold">IF</text>
    <polygon points="155,160 165,160 165,172 155,172" fill="#7a9ab5"/>
    <rect x="170" y="148" width="50" height="24" rx="4" fill="#e8eef5" opacity="0.85"/>
    <text x="195" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a6a8a" font-weight="bold">THEN</text>
    <!-- 规则文字 -->
    <text x="160" y="195" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">专家系统规则</text>
  </g>
  <!-- 标签 -->
  <rect x="85" y="235" width="150" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="160" y="258" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">1980s — 2000s</text>

  <!-- 箭头 1→2 -->
  <polygon points="268,215 288,210 288,220 288,220" fill="#b0c8dd"/>
  <polygon points="268,225 288,220 288,230 288,220" fill="#b0c8dd"/>
  <polygon points="268,210 288,210 288,220 268,215" fill="#b0c8dd"/>
  <polygon points="268,230 288,220 288,230 268,225" fill="#b0c8dd"/>
  <rect x="268" y="213" width="22" height="14" rx="2" fill="#b0c8dd"/>

  <!-- ===== 时代 2：2000s-2018 ===== -->
  <g filter="url(#shadow)">
    <rect x="310" y="120" width="200" height="110" rx="12" fill="url(#era2Grad)"/>
    <!-- 大脑 + 神经网络节点 -->
    <ellipse cx="370" cy="160" rx="28" ry="22" fill="#dce8f5" opacity="0.5"/>
    <ellipse cx="370" cy="160" rx="18" ry="14" fill="#eef4fa" opacity="0.6"/>
    <!-- 神经网络节点 -->
    <circle cx="345" cy="148" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="370" cy="140" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="395" cy="148" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="355" cy="172" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="385" cy="172" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="370" cy="180" r="4" fill="#ffffff" opacity="0.8"/>
    <!-- 连接线 -->
    <line x1="345" y1="148" x2="370" y2="140" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="370" y1="140" x2="395" y2="148" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="345" y1="148" x2="355" y2="172" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="395" y1="148" x2="385" y2="172" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="355" y1="172" x2="370" y2="180" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="385" y1="172" x2="370" y2="180" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="370" y1="140" x2="370" y2="180" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
    <!-- 强化学习循环箭头 -->
    <path d="M435,148 A18,18 0,1,1 435,172" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8"/>
    <polygon points="435,148 440,144 440,152" fill="#ffffff" opacity="0.8"/>
    <path d="M435,148 A18,18 0,1,1 435,172" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8"/>
    <text x="460" y="162" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#ffffff" opacity="0.9">RL</text>
    <!-- 标注文字 -->
    <text x="370" y="205" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">神经网络 + 强化学习</text>
  </g>
  <!-- 标签 -->
  <rect x="335" y="245" width="150" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="410" y="268" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">2000s — 2018</text>

  <!-- 箭头 2→3 -->
  <polygon points="528,215 548,210 548,220 548,220" fill="#7ab0e0"/>
  <polygon points="528,225 548,220 548,230 548,220" fill="#7ab0e0"/>
  <polygon points="528,210 548,210 548,220 528,215" fill="#7ab0e0"/>
  <polygon points="528,230 548,220 548,230 528,225" fill="#7ab0e0"/>
  <rect x="528" y="213" width="22" height="14" rx="2" fill="#7ab0e0"/>

  <!-- ===== 时代 3：2023-present ===== -->
  <g filter="url(#shadow)">
    <rect x="570" y="110" width="200" height="130" rx="12" fill="url(#era3Grad)"/>
    <!-- 发光 LLM 核心 -->
    <circle cx="650" cy="150" r="20" fill="#ffffff" opacity="0.2" filter="url(#glow)"/>
    <circle cx="650" cy="150" r="14" fill="#ffffff" opacity="0.4"/>
    <circle cx="650" cy="150" r="8" fill="#409EFF" opacity="0.6"/>
    <text x="650" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffff" font-weight="bold">AI</text>
    <!-- 机器人形象 -->
    <rect x="668" y="138" width="22" height="26" rx="3" fill="#ffffff" opacity="0.85"/>
    <circle cx="679" cy="144" r="6" fill="#409EFF" opacity="0.6"/>
    <rect x="672" y="150" width="14" height="2" rx="1" fill="#409EFF" opacity="0.5"/>
    <!-- 工具图标：搜索 -->
    <circle cx="695" cy="155" r="5" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
    <line x1="699" y1="159" x2="703" y2="163" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <!-- 工具图标：代码 -->
    <text x="693" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.8">&lt;/&gt;</text>
    <!-- 工具图标：日历 -->
    <rect x="698" y="168" width="8" height="8" rx="1" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
    <line x1="698" y1="171" x2="706" y2="171" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <!-- 标注文字 -->
    <text x="650" y="210" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">大模型 + 智能体</text>
    <text x="650" y="228" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="10" fill="#ffffff" opacity="0.8">搜索 · 编程 · 规划</text>
  </g>
  <!-- 标签 -->
  <rect x="595" y="255" width="150" height="36" rx="6" fill="#1a1a2e" opacity="0.85"/>
  <text x="670" y="278" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">2023 — 至今</text>

  <!-- 底部说明 -->
  <rect x="200" y="430" width="400" height="44" rx="8" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="450" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#4a6a8a">从规则驱动到数据驱动，再到通用人工智能的探索</text>
  <text x="400" y="466" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#7a9ab5">人工智能技术演进路线图</text>

</svg>