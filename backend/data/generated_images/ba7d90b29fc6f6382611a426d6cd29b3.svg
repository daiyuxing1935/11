<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f2fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="era1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ea8c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b96b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="era2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8db8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7ca8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="era3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3380cc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">人工智能发展历程</text>

  <!-- 连接箭头 - 从左到右 -->
  <!-- 箭头 1: 时代1 -> 时代2 -->
  <line x1="295" y1="200" x2="365" y2="200" stroke="#1a1a2e" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="365,194 378,200 365,206" fill="#1a1a2e"/>

  <!-- 箭头 2: 时代2 -> 时代3 -->
  <line x1="535" y1="200" x2="605" y2="200" stroke="#1a1a2e" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="605,194 618,200 605,206" fill="#1a1a2e"/>

  <!-- ==================== 时代 1 ==================== -->
  <!-- 主方框 -->
  <rect x="60" y="145" width="230" height="110" rx="14" fill="url(#era1Grad)" filter="url(#shadow)"/>
  <!-- 内部图标 - 流程图/IF THEN -->
  <rect x="110" y="160" width="130" height="40" rx="6" fill="white" fill-opacity="0.9"/>
  <text x="175" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="bold" fill="#4a7ca8">IF / THEN</text>
  <!-- 条件箭头 -->
  <line x1="130" y1="200" x2="130" y2="220" stroke="white" stroke-width="1.8" stroke-opacity="0.8"/>
  <line x1="220" y1="200" x2="220" y2="220" stroke="white" stroke-width="1.8" stroke-opacity="0.8"/>
  <line x1="130" y1="220" x2="220" y2="220" stroke="white" stroke-width="1.8" stroke-opacity="0.8"/>
  <polygon points="175,224 168,218 182,218" fill="white" fill-opacity="0.8"/>

  <!-- 标注 1 -->
  <rect x="80" y="270" width="190" height="36" rx="8" fill="white" stroke="#7ea8c4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="175" y="293" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e">专家系统 · 规则驱动</text>

  <!-- 年份标签 -->
  <rect x="100" y="320" width="150" height="32" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="175" y="341" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">1980s – 2000s</text>

  <!-- ==================== 时代 2 ==================== -->
  <!-- 主方框 -->
  <rect x="380" y="145" width="150" height="110" rx="14" fill="url(#era2Grad)" filter="url(#shadow)"/>
  <!-- 大脑 + 神经网络节点 -->
  <circle cx="455" cy="178" r="22" fill="white" fill-opacity="0.9"/>
  <!-- 大脑轮廓 -->
  <path d="M445,170 Q455,160 465,170 Q470,175 465,182 Q458,188 455,185 Q452,188 445,182 Q440,175 445,170Z" fill="#4a7ca8" stroke="#4a7ca8" stroke-width="0.5"/>
  <!-- 网络节点 -->
  <circle cx="435" cy="168" r="3" fill="#4a7ca8"/>
  <circle cx="475" cy="168" r="3" fill="#4a7ca8"/>
  <circle cx="440" cy="190" r="3" fill="#4a7ca8"/>
  <circle cx="470" cy="190" r="3" fill="#4a7ca8"/>
  <!-- 连线 -->
  <line x1="435" y1="168" x2="455" y2="175" stroke="#4a7ca8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="475" y1="168" x2="455" y2="175" stroke="#4a7ca8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="440" y1="190" x2="455" y2="185" stroke="#4a7ca8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="470" y1="190" x2="455" y2="185" stroke="#4a7ca8" stroke-width="1" stroke-opacity="0.6"/>

  <!-- 强化学习循环箭头 -->
  <path d="M430,210 Q455,225 480,210" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.9"/>
  <polygon points="480,210 473,205 476,215" fill="white" fill-opacity="0.9"/>

  <!-- 标注 2 -->
  <rect x="385" y="270" width="140" height="36" rx="8" fill="white" stroke="#5b8db8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="455" y="293" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e">神经网络 · 强化学习</text>

  <!-- 年份标签 -->
  <rect x="400" y="320" width="110" height="32" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="455" y="341" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">2000s – 2018</text>

  <!-- ==================== 时代 3 ==================== -->
  <!-- 主方框 -->
  <rect x="620" y="145" width="150" height="110" rx="14" fill="url(#era3Grad)" filter="url(#shadow)"/>
  <!-- 发光核心 -->
  <circle cx="695" cy="178" r="18" fill="white" fill-opacity="0.95"/>
  <circle cx="695" cy="178" r="10" fill="#409EFF" fill-opacity="0.3"/>
  <text x="695" y="183" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#409EFF">LLM</text>

  <!-- 机器人从核心中浮现 -->
  <rect x="685" y="192" width="20" height="18" rx="4" fill="white" fill-opacity="0.85"/>
  <!-- 机器人头部 -->
  <rect x="688" y="194" width="14" height="10" rx="2" fill="#409EFF"/>
  <circle cx="692" cy="198" r="1.5" fill="white"/>
  <circle cx="698" cy="198" r="1.5" fill="white"/>
  <!-- 工具图标 -->
  <!-- 搜索图标 -->
  <circle cx="668" cy="210" r="5" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="672" y1="214" x2="676" y2="218" stroke="white" stroke-width="1.8"/>
  <!-- 代码图标 -->
  <text x="710" y="215" font-family="Consolas, monospace" font-size="10" fill="white" font-weight="bold">&lt;/&gt;</text>
  <!-- 日历图标 -->
  <rect x="686" y="214" width="8" height="8" rx="1" fill="none" stroke="white" stroke-width="1.2"/>
  <line x1="686" y1="217" x2="694" y2="217" stroke="white" stroke-width="1"/>

  <!-- 标注 3 -->
  <rect x="625" y="270" width="140" height="36" rx="8" fill="white" stroke="#409EFF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="695" y="293" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#1a1a2e" font-weight="bold">大语言模型 · 智能体</text>

  <!-- 年份标签 -->
  <rect x="650" y="320" width="90" height="32" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="695" y="341" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="15" font-weight="bold" fill="white">2023 – 至今</text>

  <!-- 底部说明文字 -->
  <text x="400" y="420" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="13" fill="#5a6a7a" opacity="0.7">从规则驱动到数据驱动，再到通用人工智能的探索之路</text>

  <!-- 装饰线条 -->
  <line x1="200" y1="460" x2="600" y2="460" stroke="#409EFF" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="400" cy="460" r="3" fill="#409EFF" fill-opacity="0.2"/>
</svg>