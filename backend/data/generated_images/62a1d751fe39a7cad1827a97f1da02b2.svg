<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">为什么上下文学习有效？</text>

  <!-- ========== 第1层（最底层）：分布匹配 ========== -->
  <rect x="120" y="420" width="560" height="52" rx="12" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="442" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">分布匹配</text>
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">Distribution Matching</text>

  <!-- 分布曲线 -->
  <g transform="translate(320, 428)">
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="10" ry="4" fill="none" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
    <ellipse cx="35" cy="-2" rx="25" ry="10" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
    <ellipse cx="-30" cy="2" rx="22" ry="9" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- 标注1 -->
  <rect x="550" y="428" width="80" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="590" y="443" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">数据对齐</text>

  <!-- ========== 第2层：任务定位 ========== -->
  <rect x="160" y="340" width="480" height="50" rx="12" fill="#409EFF" opacity="0.2" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="362" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">任务定位</text>
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">Task Localization</text>

  <!-- 雷达信号图标 -->
  <g transform="translate(250, 355)">
    <!-- 多个信号 -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
    <!-- 信号线 -->
    <line x1="0" y1="0" x2="8" y2="-8" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="0" x2="-6" y2="-10" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="0" x2="-4" y2="10" stroke="#409EFF" stroke-width="0.8" opacity="0.4"/>
    <!-- 选中信号 -->
    <line x1="0" y1="0" x2="12" y2="4" stroke="#409EFF" stroke-width="2"/>
    <circle cx="12" cy="4" r="3" fill="#409EFF"/>
  </g>

  <!-- 任务图标 -->
  <g transform="translate(430, 350)">
    <!-- 翻译图标 -->
    <rect x="-30" y="-5" width="18" height="14" rx="2" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
    <text x="-21" y="5" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#409EFF" opacity="0.8">A→B</text>
    <!-- 分类图标 -->
    <rect x="-5" y="-5" width="18" height="14" rx="2" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
    <circle cx="4" cy="2" r="3" fill="#409EFF" opacity="0.5"/>
    <!-- 摘要图标 -->
    <rect x="20" y="-5" width="18" height="14" rx="2" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.6"/>
    <line x1="25" y1="0" x2="33" y2="0" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
    <line x1="25" y1="4" x2="30" y2="4" stroke="#409EFF" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- 标注2 -->
  <rect x="530" y="348" width="80" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="570" y="363" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">信号提取</text>

  <!-- ========== 第3层：格式锚定 ========== -->
  <rect x="200" y="265" width="400" height="48" rx="12" fill="#409EFF" opacity="0.25" stroke="#409EFF" stroke-width="1.5"/>
  <text x="400" y="287" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">格式锚定</text>
  <text x="400" y="305" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">Format Anchoring</text>

  <!-- 模板印章图标 -->
  <g transform="translate(310, 278)">
    <rect x="-18" y="-12" width="36" height="24" rx="4" fill="none" stroke="#409EFF" stroke-width="1.5"/>
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#409EFF" opacity="0.1"/>
    <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#409EFF">模板</text>
  </g>

  <!-- 输出图案 -->
  <g transform="translate(430, 278)">
    <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#409EFF" opacity="0.08" stroke="#409EFF" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#409EFF" opacity="0.7">输出</text>
  </g>

  <!-- 箭头 -->
  <line x1="355" y1="278" x2="410" y2="278" stroke="#409EFF" stroke-width="1.2" opacity="0.5"/>
  <polygon points="410,274 418,278 410,282" fill="#409EFF" opacity="0.5"/>

  <!-- 标注3 -->
  <rect x="530" y="273" width="80" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="570" y="288" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">结构约束</text>

  <!-- ========== 第4层（最顶层）：隐式梯度下降 ========== -->
  <g filter="url(#softGlow)">
    <rect x="250" y="185" width="300" height="55" rx="14" fill="#409EFF" opacity="0.12" stroke="#409EFF" stroke-width="2"/>
    <rect x="252" y="187" width="296" height="51" rx="13" fill="none" stroke="#409EFF" stroke-width="0.5" opacity="0.3"/>
  </g>
  <text x="400" y="210" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">隐式梯度下降</text>
  <text x="400" y="228" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a2e" opacity="0.8">Implicit Gradient Descent</text>

  <!-- 微型神经网络 -->
  <g transform="translate(360, 200)">
    <!-- 输入层 -->
    <circle cx="-20" cy="-8" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="-20" cy="0" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="-20" cy="8" r="4" fill="#409EFF" opacity="0.5"/>
    <!-- 隐藏层 -->
    <circle cx="0" cy="-5" r="4" fill="#409EFF" opacity="0.7"/>
    <circle cx="0" cy="5" r="4" fill="#409EFF" opacity="0.7"/>
    <!-- 输出层 -->
    <circle cx="20" cy="0" r="4" fill="#409EFF" opacity="0.9"/>
    <!-- 连接线（前向传播） -->
    <line x1="-16" y1="-8" x2="-4" y2="-5" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="-16" y1="-8" x2="-4" y2="5" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="-16" y1="0" x2="-4" y2="-5" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="-16" y1="0" x2="-4" y2="5" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="-16" y1="8" x2="-4" y2="-5" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="-16" y1="8" x2="-4" y2="5" stroke="#409EFF" stroke-width="0.6" opacity="0.4"/>
    <line x1="4" y1="-5" x2="16" y2="0" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="4" y1="5" x2="16" y2="0" stroke="#409EFF" stroke-width="0.8" opacity="0.6"/>
    <!-- 激活模式 -->
    <circle cx="0" cy="-5" r="5" fill="#409EFF" opacity="0.15"/>
    <circle cx="20" cy="0" r="5" fill="#409EFF" opacity="0.2"/>
  </g>

  <!-- 标注4 -->
  <rect x="470" y="195" width="80" height="22" rx="11" fill="#409EFF" opacity="0.2"/>
  <text x="510" y="210" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">前向传播</text>

  <!-- ========== 诱导头假说 插入框 ========== -->
  <rect x="30" y="60" width="220" height="100" rx="10" fill="#FFFFFF" stroke="#409EFF" stroke-width="1.2" opacity="0.9"/>
  <rect x="30" y="60" width="220" height="24" rx="10" fill="#409EFF" opacity="0.1"/>
  <text x="140" y="76" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">诱导头假说</text>
  <text x="140" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.7">Induction Head Hypothesis</text>

  <!-- 注意力模式 [A][B]...[A] → [B] -->
  <g transform="translate(60, 105)">
    <rect x="0" y="0" width="20" height="18" rx="3" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="10" y="13" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" font-weight="bold">A</text>
    <rect x="25" y="0" width="20" height="18" rx="3" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1"/>
    <text x="35" y="13" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" font-weight="bold">B</text>
    <text x="55" y="13" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.5">···</text>
    <rect x="70" y="0" width="20" height="18" rx="3" fill="#409EFF" opacity="0.3" stroke="#409EFF" stroke-width="1.5"/>
    <text x="80" y="13" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" font-weight="bold">A</text>
    <text x="100" y="13" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a1a2e" opacity="0.4">→</text>
    <rect x="115" y="0" width="20" height="18" rx="3" fill="#409EFF" opacity="0.4" stroke="#409EFF" stroke-width="1.5"/>
    <text x="125" y="13" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF" font-weight="bold">B</text>
  </g>

  <!-- 注意力连接线 -->
  <g transform="translate(60, 105)">
    <path d="M80,18 Q80,28 125,18" fill="none" stroke="#409EFF" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
    <path d="M10,18 Q10,28 80,18" fill="none" stroke="#409EFF" stroke-width="0.8" opacity="0.25" stroke-dasharray="2,2"/>
  </g>

  <!-- 标注5 -->
  <rect x="30" y="145" width="80" height="20" rx="10" fill="#409EFF" opacity="0.15"/>
  <text x="70" y="159" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#409EFF" font-weight="bold">模式复制</text>

  <!-- ========== 右侧标注6 ========== -->
  <rect x="620" y="380" width="100" height="22" rx="11" fill="#409EFF" opacity="0.15"/>
  <text x="670" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#409EFF" font-weight="bold">层级递进</text>

  <!-- 连接各层的垂直虚线 -->
  <line x1="400" y1="420" x2="400" y2="393" stroke="#409EFF" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="400" y1="340" x2="400" y2="318" stroke="#409EFF" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="400" y1="265" x2="400" y2="245" stroke="#409EFF" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

</svg>