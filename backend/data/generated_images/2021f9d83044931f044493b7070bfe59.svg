<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="500" fill="none" stroke="#409EFF" stroke-width="1.5" rx="12" stroke-opacity="0.2"/>

  <!-- ============ 上半部分：格式一致性 ============ -->
  <g transform="translate(0, 10)">
    <!-- 标题 -->
    <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">格式一致性 / Format Consistency</text>

    <!-- 三个示例卡片 -->
    <!-- 卡片1 -->
    <rect x="95" y="55" width="180" height="80" rx="10" fill="white" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="95" y="55" width="180" height="26" rx="10" fill="#409EFF" fill-opacity="0.12"/>
    <text x="185" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">标题 / Title</text>
    <text x="185" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">内容 / Content</text>
    <text x="185" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">标签 / Label</text>
    <!-- 箭头 -->
    <line x1="275" y1="95" x2="305" y2="95" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <defs>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#409EFF"/>
      </marker>
    </defs>

    <!-- 卡片2 -->
    <rect x="310" y="55" width="180" height="80" rx="10" fill="white" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="310" y="55" width="180" height="26" rx="10" fill="#409EFF" fill-opacity="0.12"/>
    <text x="400" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">标题 / Title</text>
    <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">内容 / Content</text>
    <text x="400" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">标签 / Label</text>
    <line x1="490" y1="95" x2="520" y2="95" stroke="#409EFF" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <!-- 卡片3 -->
    <rect x="525" y="55" width="180" height="80" rx="10" fill="white" stroke="#409EFF" stroke-width="1.8"/>
    <rect x="525" y="55" width="180" height="26" rx="10" fill="#409EFF" fill-opacity="0.12"/>
    <text x="615" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" font-weight="bold">标题 / Title</text>
    <text x="615" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">内容 / Content</text>
    <text x="615" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" fill-opacity="0.7">标签 / Label</text>

    <!-- 格式一致徽章 -->
    <rect x="290" y="145" width="220" height="28" rx="14" fill="#409EFF" fill-opacity="0.15" stroke="#409EFF" stroke-width="1.2"/>
    <text x="400" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#409EFF" font-weight="bold">✓ 格式一致 / Format Consistent</text>
  </g>

  <!-- ============ 分割线 ============ -->
  <line x1="80" y1="190" x2="720" y2="190" stroke="#409EFF" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="6,4"/>

  <!-- ============ 下半部分：顺序效应 ============ -->
  <g transform="translate(0, 195)">
    <!-- 标题 -->
    <text x="400" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">顺序效应 / Order Effects</text>

    <!-- 注意力曲线（背景区域） -->
    <rect x="60" y="32" width="680" height="120" rx="8" fill="#409EFF" fill-opacity="0.04"/>

    <!-- 曲线 - 使用贝塞尔曲线绘制注意力峰值 -->
    <!-- 位置1: 高 (首因效应) -->
    <!-- 位置2-4: 低 (中间衰减) -->
    <!-- 位置5: 最高 (近因效应) -->

    <!-- 曲线填充区域 -->
    <path d="M80,145 
             C120,145 140,60 160,55 
             C180,50 200,110 240,115 
             C280,120 300,110 340,115 
             C380,120 400,110 440,115 
             C480,120 500,110 540,115 
             C580,120 600,50 620,40 
             C640,30 660,100 680,145 
             L680,145 L80,145 Z" 
          fill="url(#curveGrad)" opacity="0.5"/>

    <!-- 曲线线条 -->
    <path d="M80,145 
             C120,145 140,60 160,55 
             C180,50 200,110 240,115 
             C280,120 300,110 340,115 
             C380,120 400,110 440,115 
             C480,120 500,110 540,115 
             C580,120 600,50 620,40 
             C640,30 660,100 680,145" 
          fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 位置标记点 -->
    <!-- 位置1 -->
    <circle cx="160" cy="55" r="6" fill="#409EFF" stroke="white" stroke-width="2"/>
    <text x="160" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">首因效应</text>
    <text x="160" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">Primacy</text>

    <!-- 位置2 -->
    <circle cx="300" cy="115" r="5" fill="#409EFF" fill-opacity="0.5" stroke="white" stroke-width="1.5"/>
    <text x="300" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" fill-opacity="0.7">中间衰减</text>
    <text x="300" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" fill-opacity="0.6">Middle Decay</text>

    <!-- 位置3 -->
    <circle cx="400" cy="115" r="5" fill="#409EFF" fill-opacity="0.5" stroke="white" stroke-width="1.5"/>
    <text x="400" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" fill-opacity="0.7">中间衰减</text>
    <text x="400" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" fill-opacity="0.6">Middle Decay</text>

    <!-- 位置4 -->
    <circle cx="500" cy="115" r="5" fill="#409EFF" fill-opacity="0.5" stroke="white" stroke-width="1.5"/>
    <text x="500" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e" fill-opacity="0.7">中间衰减</text>
    <text x="500" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#409EFF" fill-opacity="0.6">Middle Decay</text>

    <!-- 位置5 -->
    <circle cx="620" cy="40" r="7" fill="#409EFF" stroke="white" stroke-width="2.5"/>
    <text x="620" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">近因效应</text>
    <text x="620" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#409EFF">Recency</text>

    <!-- 底部标签 -->
    <g transform="translate(0, 185)">
      <!-- 位置1标签 -->
      <rect x="115" y="0" width="90" height="26" rx="13" fill="#409EFF" fill-opacity="0.12"/>
      <text x="160" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">简单清晰</text>

      <!-- 位置2-4标签 -->
      <rect x="275" y="0" width="110" height="26" rx="13" fill="#409EFF" fill-opacity="0.08"/>
      <text x="330" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">多样性示例</text>

      <rect x="395" y="0" width="110" height="26" rx="13" fill="#409EFF" fill-opacity="0.08"/>
      <text x="450" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">多样性示例</text>

      <rect x="515" y="0" width="110" height="26" rx="13" fill="#409EFF" fill-opacity="0.08"/>
      <text x="570" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">多样性示例</text>

      <!-- 位置5标签 -->
      <rect x="575" y="0" width="90" height="26" rx="13" fill="#409EFF" fill-opacity="0.15"/>
      <text x="620" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e" font-weight="bold">最相关锚定</text>
    </g>
  </g>

  <!-- ============ 底部标注 ============ -->
  <g transform="translate(0, 460)">
    <!-- 标注1 -->
    <rect x="60" y="0" width="130" height="24" rx="12" fill="#1a1a2e" fill-opacity="0.06"/>
    <text x="125" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">格式一致结构</text>

    <!-- 标注2 -->
    <rect x="220" y="0" width="130" height="24" rx="12" fill="#1a1a2e" fill-opacity="0.06"/>
    <text x="285" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">注意力权重曲线</text>

    <!-- 标注3 -->
    <rect x="380" y="0" width="130" height="24" rx="12" fill="#1a1a2e" fill-opacity="0.06"/>
    <text x="445" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">首因近因效应</text>

    <!-- 标注4 -->
    <rect x="540" y="0" width="130" height="24" rx="12" fill="#1a1a2e" fill-opacity="0.06"/>
    <text x="605" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">中间信息衰减</text>
  </g>
</svg>