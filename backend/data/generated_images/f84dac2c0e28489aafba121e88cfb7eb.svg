<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6EAF8"/>
      <stop offset="100%" stop-color="#B8DCF0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 连接线：中心到四个节点 -->
  <!-- 中心到左上 -->
  <line x1="400" y1="240" x2="160" y2="120" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 中心到右上 -->
  <line x1="400" y1="240" x2="640" y2="120" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 中心到左下 -->
  <line x1="400" y1="260" x2="160" y2="380" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- 中心到右下 -->
  <line x1="400" y1="260" x2="640" y2="380" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- 中心节点 -->
  <rect x="295" y="195" width="210" height="110" rx="20" ry="20" fill="url(#centerGrad)" stroke="#2E8BDF" stroke-width="2"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" letter-spacing="2">思维之树</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E0F0FF" opacity="0.9">Tree of Thoughts</text>

  <!-- 左上节点：Thought Generator -->
  <rect x="55" y="60" width="180" height="120" rx="16" ry="16" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <!-- 分支树图标 -->
  <g transform="translate(95, 85)" fill="#409EFF">
    <line x1="30" y1="0" x2="30" y2="40" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="15" x2="15" y2="28" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="15" x2="45" y2="28" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="25" x2="18" y2="38" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="25" x2="42" y2="38" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="30" cy="8" r="6" fill="#409EFF" opacity="0.6"/>
    <circle cx="15" cy="28" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="45" cy="28" r="4" fill="#409EFF" opacity="0.5"/>
    <circle cx="18" cy="38" r="3" fill="#409EFF" opacity="0.4"/>
    <circle cx="42" cy="38" r="3" fill="#409EFF" opacity="0.4"/>
  </g>
  <text x="145" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">想法生成器</text>
  <text x="145" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">Thought Generator</text>

  <!-- 右上节点：Thought Evaluator -->
  <rect x="565" y="60" width="180" height="120" rx="16" ry="16" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <!-- 星级评分图标 -->
  <g transform="translate(605, 85)" fill="#FFB800">
    <polygon points="30,0 37,22 60,22 41,36 47,58 30,44 13,58 19,36 0,22 23,22" fill="#FFB800" stroke="#E6A800" stroke-width="0.5"/>
    <polygon points="30,5 35,20 50,20 38,30 42,46 30,36 18,46 22,30 10,20 25,20" fill="#FFD700" opacity="0.7"/>
  </g>
  <text x="655" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">想法评估器</text>
  <text x="655" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">Thought Evaluator</text>

  <!-- 左下节点：Search Strategy -->
  <rect x="55" y="320" width="180" height="120" rx="16" ry="16" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <!-- BFS/DFS 路径图标 -->
  <g transform="translate(85, 345)" fill="#409EFF">
    <!-- BFS 水平路径 -->
    <circle cx="10" cy="15" r="6" fill="#409EFF" opacity="0.5"/>
    <circle cx="35" cy="15" r="6" fill="#409EFF" opacity="0.5"/>
    <circle cx="60" cy="15" r="6" fill="#409EFF" opacity="0.5"/>
    <line x1="16" y1="15" x2="29" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="41" y1="15" x2="54" y2="15" stroke="#409EFF" stroke-width="1.5"/>
    <!-- DFS 垂直路径 -->
    <circle cx="85" cy="5" r="6" fill="#409EFF" opacity="0.5"/>
    <circle cx="85" cy="25" r="6" fill="#409EFF" opacity="0.5"/>
    <circle cx="85" cy="45" r="6" fill="#409EFF" opacity="0.5"/>
    <line x1="85" y1="11" x2="85" y2="19" stroke="#409EFF" stroke-width="1.5"/>
    <line x1="85" y1="31" x2="85" y2="39" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 标签 -->
    <text x="35" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e" opacity="0.6">BFS</text>
    <text x="85" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e" opacity="0.6">DFS</text>
  </g>
  <text x="145" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">搜索策略</text>
  <text x="145" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">Search Strategy</text>

  <!-- 右下节点：State Manager -->
  <rect x="565" y="320" width="180" height="120" rx="16" ry="16" fill="url(#nodeGrad)" stroke="#409EFF" stroke-width="1.5" opacity="0.95"/>
  <!-- 数据树图标 -->
  <g transform="translate(605, 345)" fill="#409EFF">
    <rect x="25" y="0" width="10" height="10" rx="2" fill="#409EFF" opacity="0.7"/>
    <line x1="30" y1="10" x2="30" y2="20" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="10" y2="30" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="50" y2="30" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="30" y2="35" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <rect x="5" y="28" width="10" height="10" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="45" y="28" width="10" height="10" rx="2" fill="#409EFF" opacity="0.5"/>
    <rect x="25" y="33" width="10" height="10" rx="2" fill="#409EFF" opacity="0.5"/>
    <line x1="10" y1="38" x2="10" y2="45" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="38" x2="50" y2="45" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="43" x2="30" y2="48" stroke="#409EFF" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="10" cy="48" r="4" fill="#409EFF" opacity="0.3"/>
    <circle cx="50" cy="48" r="4" fill="#409EFF" opacity="0.3"/>
    <circle cx="30" cy="50" r="4" fill="#409EFF" opacity="0.3"/>
  </g>
  <text x="655" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">状态管理器</text>
  <text x="655" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" opacity="0.7">State Manager</text>

  <!-- 标注 -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" opacity="0.85">
    <!-- 标注1：左上 -->
    <rect x="50" y="50" width="8" height="8" rx="2" fill="#409EFF" opacity="0.8"/>
    <text x="65" y="58" font-size="14">发散分支</text>

    <!-- 标注2：右上 -->
    <rect x="560" y="50" width="8" height="8" rx="2" fill="#FFB800" opacity="0.8"/>
    <text x="575" y="58" font-size="14">评分反馈</text>

    <!-- 标注3：左下 -->
    <rect x="50" y="310" width="8" height="8" rx="2" fill="#409EFF" opacity="0.8"/>
    <text x="65" y="318" font-size="14">遍历路径</text>

    <!-- 标注4：右下 -->
    <rect x="560" y="310" width="8" height="8" rx="2" fill="#409EFF" opacity="0.8"/>
    <text x="575" y="318" font-size="14">状态快照</text>

    <!-- 标注5：中心上 -->
    <rect x="390" y="185" width="8" height="8" rx="2" fill="#2E8BDF" opacity="0.8"/>
    <text x="405" y="193" font-size="14">核心调度</text>

    <!-- 标注6：中心下 -->
    <rect x="390" y="310" width="8" height="8" rx="2" fill="#5AB0FF" opacity="0.8"/>
    <text x="405" y="318" font-size="14">统一框架</text>
  </g>
</svg>