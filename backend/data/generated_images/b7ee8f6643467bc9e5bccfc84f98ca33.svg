<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="cardGray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3a8de0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 左侧标题：误区 -->
  <rect x="40" y="20" width="340" height="36" rx="6" fill="#d9d9d9"/>
  <text x="210" y="44" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#666">常见的误区</text>

  <!-- 右侧标题：事实 -->
  <rect x="420" y="20" width="340" height="36" rx="6" fill="#409EFF"/>
  <text x="590" y="44" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#fff">正确的事实</text>

  <!-- ===== 左侧 误区卡片 ===== -->

  <!-- 误区 1 -->
  <rect x="40" y="72" width="340" height="58" rx="8" fill="url(#cardGray)" stroke="#ccc" stroke-width="1.5"/>
  <rect x="40" y="72" width="340" height="58" rx="8" fill="none" stroke="#bbb" stroke-width="1"/>
  <!-- X 标记 -->
  <circle cx="62" cy="101" r="12" fill="#ff6b6b" opacity="0.8"/>
  <line x1="56" y1="95" x2="68" y2="107" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="95" x2="56" y2="107" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 图标：带插头的聊天机器人 -->
  <rect x="82" y="84" width="24" height="24" rx="12" fill="#999"/>
  <circle cx="94" cy="96" r="6" fill="#fff"/>
  <line x1="94" y1="102" x2="94" y2="108" stroke="#999" stroke-width="2"/>
  <rect x="90" y="108" width="8" height="4" rx="1" fill="#999"/>
  <!-- 文字 -->
  <text x="120" y="98" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555" font-weight="bold">误区1：聊天机器人 = 智能体</text>
  <text x="120" y="116" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#999">仅有对话功能，缺乏规划与工具</text>

  <!-- 误区 2 -->
  <rect x="40" y="142" width="340" height="58" rx="8" fill="url(#cardGray)" stroke="#ccc" stroke-width="1.5"/>
  <circle cx="62" cy="171" r="12" fill="#ff6b6b" opacity="0.8"/>
  <line x1="56" y1="165" x2="68" y2="177" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="165" x2="56" y2="177" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 图标：巨大的机器人 -->
  <rect x="82" y="156" width="28" height="28" rx="6" fill="#999"/>
  <rect x="88" y="160" width="16" height="8" rx="3" fill="#ccc"/>
  <circle cx="96" cy="170" r="4" fill="#fff"/>
  <text x="120" y="168" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555" font-weight="bold">误区2：越大越智能</text>
  <text x="120" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#999">模型臃肿，效率低下</text>

  <!-- 误区 3 -->
  <rect x="40" y="212" width="340" height="58" rx="8" fill="url(#cardGray)" stroke="#ccc" stroke-width="1.5"/>
  <circle cx="62" cy="241" r="12" fill="#ff6b6b" opacity="0.8"/>
  <line x1="56" y1="235" x2="68" y2="247" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="235" x2="56" y2="247" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 图标：独自奔跑的机器人 -->
  <rect x="82" y="226" width="24" height="24" rx="4" fill="#999"/>
  <circle cx="94" cy="230" r="4" fill="#fff"/>
  <line x1="88" y1="244" x2="82" y2="250" stroke="#999" stroke-width="2"/>
  <line x1="100" y1="244" x2="106" y2="250" stroke="#999" stroke-width="2"/>
  <text x="120" y="238" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555" font-weight="bold">误区3：完全自主运行</text>
  <text x="120" y="256" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#999">无需人类监督与干预</text>

  <!-- 误区 4 -->
  <rect x="40" y="282" width="340" height="58" rx="8" fill="url(#cardGray)" stroke="#ccc" stroke-width="1.5"/>
  <circle cx="62" cy="311" r="12" fill="#ff6b6b" opacity="0.8"/>
  <line x1="56" y1="305" x2="68" y2="317" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="305" x2="56" y2="317" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 图标：大脑大身体小 -->
  <circle cx="94" cy="300" r="10" fill="#999" opacity="0.6"/>
  <rect x="86" y="312" width="16" height="12" rx="3" fill="#999"/>
  <text x="120" y="308" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555" font-weight="bold">误区4：大脑越大越好</text>
  <text x="120" y="326" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#999">忽略身体与环境的平衡</text>

  <!-- 误区 5 -->
  <rect x="40" y="352" width="340" height="58" rx="8" fill="url(#cardGray)" stroke="#ccc" stroke-width="1.5"/>
  <circle cx="62" cy="381" r="12" fill="#ff6b6b" opacity="0.8"/>
  <line x1="56" y1="375" x2="68" y2="387" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="375" x2="56" y2="387" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 图标：机器人压碎软件 -->
  <rect x="82" y="366" width="20" height="20" rx="4" fill="#999"/>
  <rect x="104" y="370" width="14" height="14" rx="2" fill="#bbb" stroke="#999" stroke-width="1"/>
  <text x="120" y="378" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555" font-weight="bold">误区5：AI 取代传统软件</text>
  <text x="120" y="396" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#999">非此即彼的二元对立</text>

  <!-- ===== 右侧 事实卡片 ===== -->

  <!-- 事实 1 -->
  <rect x="420" y="72" width="340" height="58" rx="8" fill="#409EFF" opacity="0.12"/>
  <rect x="420" y="72" width="340" height="58" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <!-- 对勾 -->
  <circle cx="442" cy="101" r="12" fill="#67c23a" opacity="0.9"/>
  <polyline points="436,101 440,106 449,96" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 图标：完整智能体 -->
  <rect x="462" y="84" width="24" height="24" rx="6" fill="#409EFF" opacity="0.7"/>
  <circle cx="474" cy="94" r="5" fill="#fff"/>
  <rect x="468" y="100" width="12" height="3" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="468" y="104" width="8" height="3" rx="1" fill="#fff" opacity="0.6"/>
  <text x="500" y="98" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">事实1：智能体 = 规划+记忆+工具</text>
  <text x="500" y="116" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">完整的认知架构</text>

  <!-- 事实 2 -->
  <rect x="420" y="142" width="340" height="58" rx="8" fill="#409EFF" opacity="0.12"/>
  <rect x="420" y="142" width="340" height="58" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="442" cy="171" r="12" fill="#67c23a" opacity="0.9"/>
  <polyline points="436,171 440,176 449,166" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 图标：比例合适的机器人 -->
  <rect x="462" y="156" width="24" height="24" rx="6" fill="#409EFF" opacity="0.7"/>
  <rect x="468" y="158" width="12" height="6" rx="2" fill="#fff" opacity="0.8"/>
  <circle cx="474" cy="168" r="4" fill="#fff"/>
  <text x="500" y="168" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">事实2：适度规模，高效运行</text>
  <text x="500" y="186" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">根据任务选择合适模型</text>

  <!-- 事实 3 -->
  <rect x="420" y="212" width="340" height="58" rx="8" fill="#409EFF" opacity="0.12"/>
  <rect x="420" y="212" width="340" height="58" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="442" cy="241" r="12" fill="#67c23a" opacity="0.9"/>
  <polyline points="436,241 440,246 449,236" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 图标：人类监督机器人 -->
  <circle cx="472" cy="234" r="6" fill="#409EFF" opacity="0.7"/>
  <circle cx="472" cy="232" r="3" fill="#fff"/>
  <rect x="462" y="244" width="20" height="14" rx="3" fill="#409EFF" opacity="0.5"/>
  <rect x="466" y="248" width="12" height="6" rx="2" fill="#fff" opacity="0.6"/>
  <text x="500" y="238" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">事实3：人机协作，监督闭环</text>
  <text x="500" y="256" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">人类在关键环节进行决策</text>

  <!-- 事实 4 -->
  <rect x="420" y="282" width="340" height="58" rx="8" fill="#409EFF" opacity="0.12"/>
  <rect x="420" y="282" width="340" height="58" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="442" cy="311" r="12" fill="#67c23a" opacity="0.9"/>
  <polyline points="436,311 440,316 449,306" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 图标：平衡的大脑和身体 -->
  <circle cx="472" cy="300" r="8" fill="#409EFF" opacity="0.6"/>
  <rect x="466" y="310" width="12" height="10" rx="3" fill="#409EFF" opacity="0.7"/>
  <text x="500" y="308" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">事实4：脑体平衡，协同发展</text>
  <text x="500" y="326" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">感知、认知与行动一体化</text>

  <!-- 事实 5 -->
  <rect x="420" y="352" width="340" height="58" rx="8" fill="#409EFF" opacity="0.12"/>
  <rect x="420" y="352" width="340" height="58" rx="8" fill="none" stroke="#409EFF" stroke-width="1.5"/>
  <circle cx="442" cy="381" r="12" fill="#67c23a" opacity="0.9"/>
  <polyline points="436,381 440,386 449,376" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 图标：AI 与传统软件共存 -->
  <rect x="462" y="366" width="16" height="16" rx="3" fill="#409EFF" opacity="0.6"/>
  <rect x="484" y="368" width="14" height="14" rx="2" fill="#409EFF" opacity="0.4"/>
  <text x="500" y="378" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1a1a2e" font-weight="bold">事实5：AI 增强，而非取代</text>
  <text x="500" y="396" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">与传统软件互补共生</text>

  <!-- 底部说明 -->
  <text x="400" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#888">智能体概念辨析 · 正确理解 AI 能力边界</text>

  <!-- 中间分隔线 -->
  <line x1="400" y1="65" x2="400" y2="425" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>

</svg>