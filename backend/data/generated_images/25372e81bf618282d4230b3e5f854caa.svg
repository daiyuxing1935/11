<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f3ff"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#409EFF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 左侧用户剪影 -->
  <g transform="translate(60, 250)">
    <!-- 头部 -->
    <ellipse cx="0" cy="-35" rx="22" ry="24" fill="#1a1a2e" opacity="0.15"/>
    <!-- 身体 -->
    <path d="M-28,0 C-28,30 -20,55 0,55 C20,55 28,30 28,0 Z" fill="#1a1a2e" opacity="0.15"/>
    <!-- 任务气泡 -->
    <g transform="translate(35, -30)">
      <rect x="0" y="-18" width="70" height="36" rx="18" fill="#409EFF" opacity="0.2"/>
      <text x="35" y="5" text-anchor="middle" font-size="13" fill="#1a1a2e" font-family="sans-serif">任务</text>
      <!-- 箭头 -->
      <path d="M70,0 L85,0" stroke="#409EFF" stroke-width="2" fill="none"/>
      <polygon points="85,-5 95,0 85,5" fill="#409EFF"/>
    </g>
  </g>

  <!-- 中央AI机器人图标 -->
  <g transform="translate(350, 250)">
    <!-- 头部 -->
    <rect x="-35" y="-50" width="70" height="55" rx="14" fill="#409EFF" opacity="0.15"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-28" r="6" fill="#409EFF"/>
    <circle cx="12" cy="-28" r="6" fill="#409EFF"/>
    <!-- 眼睛高光 -->
    <circle cx="-10" cy="-30" r="2" fill="white" opacity="0.6"/>
    <circle cx="14" cy="-30" r="2" fill="white" opacity="0.6"/>
    <!-- 微笑 -->
    <path d="M-10,-14 Q0,-6 10,-14" stroke="#409EFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- 天线 -->
    <line x1="0" y1="-50" x2="0" y2="-65" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-68" r="4" fill="#409EFF"/>
    <!-- 身体 -->
    <rect x="-28" y="5" width="56" height="45" rx="10" fill="#409EFF" opacity="0.1"/>
    <!-- 身体细节 -->
    <rect x="-18" y="15" width="36" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
    <rect x="-18" y="27" width="36" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
    <rect x="-12" y="39" width="24" height="6" rx="3" fill="#409EFF" opacity="0.3"/>
  </g>

  <!-- 轨道环 - 感知 -->
  <g transform="translate(350, 250)">
    <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.5" transform="rotate(-15)"/>
    <g transform="translate(105, -55)">
      <rect x="-48" y="-18" width="96" height="36" rx="18" fill="white" stroke="#409EFF" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="15" fill="#1a1a2e" font-family="sans-serif" font-weight="500">感知</text>
    </g>
  </g>

  <!-- 轨道环 - 规划 -->
  <g transform="translate(350, 250)">
    <ellipse cx="0" cy="0" rx="145" ry="48" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.35" transform="rotate(5)"/>
    <g transform="translate(140, 30)">
      <rect x="-48" y="-18" width="96" height="36" rx="18" fill="white" stroke="#409EFF" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="15" fill="#1a1a2e" font-family="sans-serif" font-weight="500">规划</text>
    </g>
  </g>

  <!-- 轨道环 - 行动 -->
  <g transform="translate(350, 250)">
    <ellipse cx="0" cy="0" rx="170" ry="56" fill="none" stroke="#409EFF" stroke-width="2" stroke-dasharray="6,4" opacity="0.25" transform="rotate(25)"/>
    <g transform="translate(-155, 60)">
      <rect x="-48" y="-18" width="96" height="36" rx="18" fill="white" stroke="#409EFF" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="15" fill="#1a1a2e" font-family="sans-serif" font-weight="500">行动</text>
    </g>
  </g>

  <!-- 右侧API齿轮/工具图标 -->
  <g transform="translate(680, 200)">
    <!-- 齿轮1 -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#409EFF" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="8" fill="#409EFF" opacity="0.2"/>
      <line x1="0" y1="-22" x2="0" y2="-14" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="14" x2="0" y2="22" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-22" y1="0" x2="-14" y2="0" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="0" x2="22" y2="0" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-16" y1="-16" x2="-10" y2="-10" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="10" x2="16" y2="16" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="16" y1="-16" x2="10" y2="-10" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="10" x2="-16" y2="16" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- 齿轮2 -->
    <g transform="translate(55, 30)">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#409EFF" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#409EFF" opacity="0.2"/>
      <line x1="0" y1="-18" x2="0" y2="-11" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="11" x2="0" y2="18" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="-18" y1="0" x2="-11" y2="0" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="0" x2="18" y2="0" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="-13" y1="-13" x2="-8" y2="-8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="8" x2="13" y2="13" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- 工具图标 -->
    <g transform="translate(30, -35)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="none" stroke="#409EFF" stroke-width="2"/>
      <path d="M-6,-4 L0,4 L6,-4" stroke="#409EFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="0" y1="4" x2="0" y2="8" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- 连接线 -->
    <g transform="translate(-20, 0)">
      <path d="M-10,0 C-5,-15 5,-15 10,0" stroke="#409EFF" stroke-width="1.5" fill="none" opacity="0.4"/>
    </g>
  </g>

  <!-- API标签 -->
  <g transform="translate(680, 280)">
    <rect x="-35" y="-14" width="70" height="28" rx="14" fill="white" stroke="#409EFF" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="#1a1a2e" font-family="sans-serif" font-weight="500">API</text>
  </g>

  <!-- 底部标题 -->
  <g transform="translate(400, 440)">
    <text x="0" y="0" text-anchor="middle" font-size="18" fill="#1a1a2e" font-family="sans-serif" font-weight="600" letter-spacing="2">AI 认知循环系统</text>
    <text x="0" y="24" text-anchor="middle" font-size="13" fill="#409EFF" opacity="0.7" font-family="sans-serif">感知 → 规划 → 行动</text>
  </g>

  <!-- 装饰性小点 -->
  <circle cx="120" cy="100" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="200" cy="80" r="2" fill="#409EFF" opacity="0.2"/>
  <circle cx="600" cy="90" r="3" fill="#409EFF" opacity="0.3"/>
  <circle cx="700" cy="120" r="2" fill="#409EFF" opacity="0.2"/>
  <circle cx="150" cy="420" r="2.5" fill="#409EFF" opacity="0.25"/>
  <circle cx="650" cy="410" r="2" fill="#409EFF" opacity="0.2"/>
</svg>