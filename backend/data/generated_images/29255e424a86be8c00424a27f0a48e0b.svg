<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8FE0"/>
    </linearGradient>
    <linearGradient id="plantGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#5AB0FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">学习成长公式</text>
  <line x1="300" y1="58" x2="500" y2="58" stroke="#409EFF" stroke-width="2" opacity="0.4"/>

  <!-- 左侧块：记忆 -->
  <rect x="60" y="90" width="260" height="170" rx="16" fill="url(#blockGrad)" opacity="0.95"/>
  <rect x="60" y="90" width="260" height="170" rx="16" fill="none" stroke="#2E7BCF" stroke-width="1.5"/>

  <text x="190" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">记忆</text>
  <text x="190" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D6E9FF">要记住的内容</text>

  <!-- 大脑图标 -->
  <g transform="translate(190, 195)">
    <ellipse cx="0" cy="-8" rx="28" ry="22" fill="#FFFFFF" opacity="0.9"/>
    <path d="M-18,-8 Q-22,-20 -14,-24 Q-6,-28 0,-22 Q6,-28 14,-24 Q22,-20 18,-8" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-12,-4 Q-10,-14 0,-16 Q10,-14 12,-4" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round"/>
    <!-- 书签 -->
    <rect x="-4" y="-20" width="3" height="10" rx="1" fill="#FFD700"/>
    <rect x="2" y="-18" width="3" height="8" rx="1" fill="#FF6B6B"/>
    <rect x="-8" y="-16" width="3" height="7" rx="1" fill="#4CAF50"/>
  </g>

  <!-- 乘号 -->
  <text x="370" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a2e">×</text>

  <!-- 右侧块：学习 -->
  <rect x="480" y="90" width="260" height="170" rx="16" fill="url(#blockGrad)" opacity="0.95"/>
  <rect x="480" y="90" width="260" height="170" rx="16" fill="none" stroke="#2E7BCF" stroke-width="1.5"/>

  <text x="610" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">学习</text>
  <text x="610" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D6E9FF">如何变得更聪明</text>

  <!-- 楼梯+灯泡图标 -->
  <g transform="translate(610, 195)">
    <!-- 楼梯 -->
    <rect x="-22" y="4" width="12" height="6" rx="1" fill="#FFFFFF" opacity="0.8"/>
    <rect x="-14" y="-2" width="12" height="6" rx="1" fill="#FFFFFF" opacity="0.85"/>
    <rect x="-6" y="-8" width="12" height="6" rx="1" fill="#FFFFFF" opacity="0.9"/>
    <rect x="2" y="-14" width="12" height="6" rx="1" fill="#FFFFFF"/>
    <!-- 灯泡 -->
    <circle cx="14" cy="-14" r="8" fill="#FFD700" opacity="0.95"/>
    <path d="M11,-8 Q11,-4 14,-2 Q17,-4 17,-8" fill="#FFD700" opacity="0.7"/>
    <line x1="14" y1="-2" x2="14" y2="2" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- 等号 -->
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a1a2e">=</text>

  <!-- 底部结果区域 -->
  <rect x="200" y="340" width="400" height="120" rx="18" fill="#FFFFFF" stroke="#409EFF" stroke-width="2" opacity="0.92"/>

  <!-- 植物/树图标 -->
  <g transform="translate(340, 380)">
    <!-- 花盆 -->
    <path d="M-14,16 L-10,30 L10,30 L14,16 Z" fill="#409EFF" opacity="0.3" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 茎 -->
    <line x1="0" y1="16" x2="0" y2="-4" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 叶子 -->
    <ellipse cx="-8" cy="2" rx="7" ry="4" fill="#4CAF50" opacity="0.7" transform="rotate(-30 -8 2)"/>
    <ellipse cx="8" cy="6" rx="6" ry="3.5" fill="#4CAF50" opacity="0.6" transform="rotate(25 8 6)"/>
    <!-- 顶部嫩芽 -->
    <path d="M-5,-4 Q0,-14 5,-4" fill="#66BB6A" opacity="0.8"/>
    <circle cx="0" cy="-8" r="2" fill="#FFD700" opacity="0.7"/>
  </g>

  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">智能体成长</text>

  <!-- 盾牌 -->
  <g transform="translate(400, 448)">
    <path d="M-12,-8 L-12,2 Q-12,10 0,16 Q12,10 12,2 L12,-8 Z" fill="#409EFF" opacity="0.15" stroke="#409EFF" stroke-width="1.5"/>
    <path d="M-6,-4 L-2,2 L6,-6" fill="none" stroke="#409EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" opacity="0.75">从工具到伙伴</text>

  <!-- 标注1 -->
  <rect x="55" y="270" width="90" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
  <text x="100" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">知识储存</text>

  <!-- 标注2 -->
  <rect x="475" y="270" width="90" height="24" rx="12" fill="#1a1a2e" opacity="0.85"/>
  <text x="520" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">能力提升</text>

  <!-- 标注3 -->
  <rect x="145" y="270" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.7"/>
  <text x="185" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">基础</text>

  <!-- 标注4 -->
  <rect x="565" y="270" width="80" height="24" rx="12" fill="#1a1a2e" opacity="0.7"/>
  <text x="605" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">方法</text>

  <!-- 标注5 -->
  <rect x="280" y="310" width="70" height="22" rx="11" fill="#409EFF" opacity="0.8"/>
  <text x="315" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">结果</text>

  <!-- 标注6 -->
  <rect x="440" y="310" width="80" height="22" rx="11" fill="#409EFF" opacity="0.8"/>
  <text x="480" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">持续发展</text>

  <!-- 连接线 -->
  <line x1="320" y1="175" x2="345" y2="185" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
  <line x1="420" y1="175" x2="455" y2="185" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>

  <line x1="400" y1="300" x2="400" y2="340" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>

</svg>