<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="humanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7b731;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ab0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12" ry="12"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#409EFF" stroke-width="1.5" rx="12" ry="12" opacity="0.3"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">人机协作最优模型</text>
  <line x1="300" y1="52" x2="500" y2="52" stroke="#409EFF" stroke-width="2" opacity="0.5"/>

  <!-- 左侧：人类区域 -->
  <rect x="50" y="75" width="280" height="310" rx="16" ry="16" fill="white" stroke="#f5a623" stroke-width="2" opacity="0.9"/>
  <rect x="50" y="75" width="280" height="40" rx="16" ry="16" fill="url(#humanGrad)" opacity="0.8"/>
  <rect x="50" y="99" width="280" height="16" fill="url(#humanGrad)" opacity="0.8"/>
  <text x="190" y="100" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">人类</text>

  <!-- 人类图标：头部轮廓 -->
  <circle cx="190" cy="150" r="22" fill="none" stroke="#f5a623" stroke-width="2.5"/>
  <path d="M168 190 Q168 218 190 218 Q212 218 212 190" fill="none" stroke="#f5a623" stroke-width="2.5"/>

  <!-- 人类能力图标 -->
  <!-- 智慧 -->
  <circle cx="120" cy="200" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="120" y="205" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">🧠</text>
  <text x="145" y="205" font-family="sans-serif" font-size="13" fill="#1a1a2e">智慧</text>

  <!-- 判断力 -->
  <circle cx="120" cy="240" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="120" y="245" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">⚖️</text>
  <text x="145" y="245" font-family="sans-serif" font-size="13" fill="#1a1a2e">判断力</text>

  <!-- 同理心 -->
  <circle cx="120" cy="280" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="120" y="285" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">❤️</text>
  <text x="145" y="285" font-family="sans-serif" font-size="13" fill="#1a1a2e">同理心</text>

  <!-- 战略决策 -->
  <circle cx="120" cy="320" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="120" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">🎯</text>
  <text x="145" y="325" font-family="sans-serif" font-size="13" fill="#1a1a2e">战略决策</text>

  <!-- 右侧：AI区域 -->
  <rect x="470" y="75" width="280" height="310" rx="16" ry="16" fill="white" stroke="#409EFF" stroke-width="2" opacity="0.9"/>
  <rect x="470" y="75" width="280" height="40" rx="16" ry="16" fill="url(#aiGrad)" opacity="0.8"/>
  <rect x="470" y="99" width="280" height="16" fill="url(#aiGrad)" opacity="0.8"/>
  <text x="610" y="100" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">AI 智能体</text>

  <!-- AI图标：机器人头部 -->
  <rect x="178" y="130" width="44" height="36" rx="8" ry="8" fill="none" stroke="#409EFF" stroke-width="2.5" transform="translate(400,0)"/>
  <rect x="182" y="126" width="8" height="10" rx="2" ry="2" fill="#409EFF" opacity="0.5" transform="translate(400,0)"/>
  <rect x="210" y="126" width="8" height="10" rx="2" ry="2" fill="#409EFF" opacity="0.5" transform="translate(400,0)"/>
  <circle cx="196" cy="146" r="3" fill="#409EFF" transform="translate(400,0)"/>
  <circle cx="208" cy="146" r="3" fill="#409EFF" transform="translate(400,0)"/>

  <!-- AI能力图标 -->
  <!-- 速度 -->
  <circle cx="540" cy="200" r="18" fill="#409EFF" opacity="0.12"/>
  <text x="540" y="205" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">⚡</text>
  <text x="565" y="205" font-family="sans-serif" font-size="13" fill="#1a1a2e">速度</text>

  <!-- 一致性 -->
  <circle cx="540" cy="240" r="18" fill="#409EFF" opacity="0.12"/>
  <text x="540" y="245" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">📊</text>
  <text x="565" y="245" font-family="sans-serif" font-size="13" fill="#1a1a2e">一致性</text>

  <!-- 数据处理 -->
  <circle cx="540" cy="280" r="18" fill="#409EFF" opacity="0.12"/>
  <text x="540" y="285" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">💾</text>
  <text x="565" y="285" font-family="sans-serif" font-size="13" fill="#1a1a2e">数据处理</text>

  <!-- 重复任务 -->
  <circle cx="540" cy="320" r="18" fill="#409EFF" opacity="0.12"/>
  <text x="540" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1a1a2e">🔄</text>
  <text x="565" y="325" font-family="sans-serif" font-size="13" fill="#1a1a2e">重复任务</text>

  <!-- 中间：协作区域 -->
  <rect x="340" y="130" width="120" height="200" rx="60" ry="60" fill="url(#centerGrad)" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- 握手图标 -->
  <circle cx="400" cy="200" r="32" fill="white" stroke="#409EFF" stroke-width="2"/>
  <!-- 人类手 -->
  <path d="M382 208 Q378 195 385 190 Q390 186 394 192 Q398 196 396 202" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
  <!-- AI手 -->
  <path d="M418 208 Q422 195 415 190 Q410 186 406 192 Q402 196 404 202" fill="none" stroke="#409EFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 握手中间 -->
  <path d="M392 198 Q400 194 408 198" fill="none" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="355" y="240" width="90" height="24" rx="12" ry="12" fill="#1a1a2e" opacity="0.85"/>
  <text x="400" y="256" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">最优协作区</text>

  <!-- 底部：任务分配光谱 -->
  <rect x="100" y="410" width="600" height="50" rx="25" ry="25" fill="white" stroke="#409EFF" stroke-width="1.5" opacity="0.9"/>

  <!-- 光谱条 -->
  <rect x="120" y="420" width="560" height="30" rx="15" ry="15" fill="#e8f4ff"/>
  <rect x="120" y="420" width="186" height="30" rx="15" ry="15" fill="#409EFF" opacity="0.7"/>
  <rect x="306" y="420" width="188" height="30" fill="#409EFF" opacity="0.3"/>
  <rect x="494" y="420" width="186" height="30" rx="15" ry="15" fill="#f5a623" opacity="0.5"/>

  <!-- 光谱标签 -->
  <text x="213" y="440" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">AI主导</text>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">人机协同</text>
  <text x="587" y="440" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">人类主导</text>

  <!-- 光谱小标签 -->
  <text x="213" y="458" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.7">自动化</text>
  <text x="400" y="458" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.7">增强</text>
  <text x="587" y="458" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a2e" opacity="0.7">监督</text>

  <!-- 连接线：人类到中心 -->
  <line x1="330" y1="200" x2="368" y2="200" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="330" y1="240" x2="368" y2="220" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 连接线：AI到中心 -->
  <line x1="470" y1="200" x2="432" y2="200" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="470" y1="240" x2="432" y2="220" stroke="#409EFF" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- 底部标注 -->
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a2e" opacity="0.5">人机协作 · 优势互补</text>
</svg>