<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f2fb"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fcff"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#409EFF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">AI 智能助手应用场景</text>

  <!-- 连接虚线 -->
  <line x1="195" y1="260" x2="350" y2="260" stroke="#409EFF" stroke-dasharray="6,4" stroke-width="1.8" opacity="0.5"/>
  <line x1="450" y1="260" x2="605" y2="260" stroke="#409EFF" stroke-dasharray="6,4" stroke-width="1.8" opacity="0.5"/>

  <!-- ===== 卡片1：客户服务 ===== -->
  <g filter="url(#shadow)">
    <rect x="25" y="80" width="235" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 卡片标题栏 -->
    <rect x="25" y="80" width="235" height="44" rx="14" fill="#409EFF" opacity="0.12"/>
    <text x="142" y="108" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">客户服务</text>

    <!-- 服务台 -->
    <rect x="65" y="145" width="155" height="90" rx="8" fill="#eef6ff" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.4"/>
    <!-- 机器人客服 -->
    <circle cx="130" cy="170" r="18" fill="#409EFF" opacity="0.2"/>
    <circle cx="130" cy="170" r="12" fill="#409EFF" opacity="0.5"/>
    <circle cx="130" cy="170" r="6" fill="#409EFF"/>
    <!-- 对话框 -->
    <rect x="152" y="158" width="40" height="18" rx="9" fill="#409EFF" opacity="0.15"/>
    <text x="172" y="171" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#409EFF">你好</text>
    <!-- 订单数据库 -->
    <rect x="80" y="200" width="50" height="22" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="105" y="215" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#409EFF">订单</text>
    <rect x="140" y="200" width="50" height="22" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="165" y="215" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#409EFF">数据库</text>

    <!-- 服务铃铛 -->
    <circle cx="90" cy="250" r="10" fill="#409EFF" opacity="0.15"/>
    <text x="90" y="254" text-anchor="middle" font-size="12" fill="#409EFF">🔔</text>

    <!-- 开心客户图标 -->
    <circle cx="195" cy="250" r="10" fill="#409EFF" opacity="0.15"/>
    <text x="195" y="254" text-anchor="middle" font-size="12" fill="#409EFF">😊</text>

    <!-- 标注文字 -->
    <rect x="55" y="280" width="175" height="38" rx="8" fill="#409EFF" opacity="0.08"/>
    <text x="142" y="304" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">智能应答 · 订单查询</text>

    <!-- 底部标签 -->
    <rect x="65" y="340" width="155" height="40" rx="8" fill="#409EFF" opacity="0.06"/>
    <text x="142" y="365" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#409EFF" font-weight="bold">7×24 小时在线</text>
  </g>

  <!-- ===== 卡片2：编程助手 ===== -->
  <g filter="url(#shadow)">
    <rect x="282" y="80" width="235" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 卡片标题栏 -->
    <rect x="282" y="80" width="235" height="44" rx="14" fill="#409EFF" opacity="0.12"/>
    <text x="400" y="108" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">编程助手</text>

    <!-- 电脑屏幕 -->
    <rect x="310" y="142" width="180" height="100" rx="6" fill="#1a1a2e" stroke="#409EFF" stroke-width="1.2"/>
    <!-- 代码编辑器 -->
    <rect x="316" y="148" width="168" height="88" rx="4" fill="#252540"/>
    <!-- 代码行 -->
    <text x="322" y="165" font-family="'Courier New',monospace" font-size="9" fill="#409EFF">def hello():</text>
    <text x="328" y="180" font-family="'Courier New',monospace" font-size="9" fill="#7ec8e3">  print("AI")</text>
    <text x="322" y="195" font-family="'Courier New',monospace" font-size="9" fill="#409EFF">for i in range(5):</text>
    <text x="328" y="210" font-family="'Courier New',monospace" font-size="9" fill="#7ec8e3">  data += i</text>
    <text x="322" y="225" font-family="'Courier New',monospace" font-size="9" fill="#409EFF">return result</text>

    <!-- 浏览器预览 -->
    <rect x="310" y="255" width="180" height="40" rx="6" fill="#eef6ff" stroke="#409EFF" stroke-width="0.8" stroke-opacity="0.3"/>
    <rect x="316" y="259" width="168" height="32" rx="4" fill="white"/>
    <rect x="320" y="264" width="30" height="4" rx="2" fill="#409EFF" opacity="0.3"/>
    <rect x="355" y="264" width="60" height="4" rx="2" fill="#409EFF" opacity="0.2"/>
    <text x="400" y="282" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#409EFF" opacity="0.7">仪表盘预览</text>

    <!-- 齿轮图标 -->
    <circle cx="330" cy="310" r="10" fill="#409EFF" opacity="0.12"/>
    <text x="330" y="314" text-anchor="middle" font-size="11" fill="#409EFF">⚙</text>

    <!-- 代码括号图标 -->
    <circle cx="470" cy="310" r="10" fill="#409EFF" opacity="0.12"/>
    <text x="470" y="314" text-anchor="middle" font-size="12" fill="#409EFF">{ }</text>

    <!-- 标注文字 -->
    <rect x="310" y="335" width="180" height="38" rx="8" fill="#409EFF" opacity="0.08"/>
    <text x="400" y="359" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">代码生成 · 调试</text>

    <!-- 底部标签 -->
    <rect x="320" y="385" width="160" height="30" rx="8" fill="#409EFF" opacity="0.06"/>
    <text x="400" y="405" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="#409EFF" font-weight="bold">Python · 全栈</text>
  </g>

  <!-- ===== 卡片3：个人助手 ===== -->
  <g filter="url(#shadow)">
    <rect x="540" y="80" width="235" height="340" rx="14" fill="url(#cardGrad)" stroke="#409EFF" stroke-width="1.5"/>
    <!-- 卡片标题栏 -->
    <rect x="540" y="80" width="235" height="44" rx="14" fill="#409EFF" opacity="0.12"/>
    <text x="657" y="108" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">个人助手</text>

    <!-- 旅行行程单 -->
    <rect x="565" y="142" width="185" height="95" rx="8" fill="#eef6ff" stroke="#409EFF" stroke-width="1.2" stroke-opacity="0.4"/>
    <rect x="575" y="150" width="165" height="30" rx="4" fill="#409EFF" opacity="0.1"/>
    <text x="657" y="170" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">旅行行程</text>
    <text x="585" y="195" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#1a1a2e">📍 北京 → 上海</text>
    <text x="585" y="213" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#1a1a2e">📅 2025年3月20-25日</text>
    <text x="585" y="231" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" fill="#1a1a2e">👤 商务出差</text>

    <!-- 图标行 -->
    <!-- 日历 -->
    <circle cx="590" cy="265" r="14" fill="#409EFF" opacity="0.1"/>
    <text x="590" y="270" text-anchor="middle" font-size="13" fill="#409EFF">📅</text>
    <text x="590" y="290" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#1a1a2e">日历</text>

    <!-- 飞机 -->
    <circle cx="630" cy="265" r="14" fill="#409EFF" opacity="0.1"/>
    <text x="630" y="270" text-anchor="middle" font-size="13" fill="#409EFF">✈️</text>
    <text x="630" y="290" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#1a1a2e">航班</text>

    <!-- 酒店 -->
    <circle cx="670" cy="265" r="14" fill="#409EFF" opacity="0.1"/>
    <text x="670" y="270" text-anchor="middle" font-size="13" fill="#409EFF">🏨</text>
    <text x="670" y="290" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#1a1a2e">酒店</text>

    <!-- 天气 -->
    <circle cx="710" cy="265" r="14" fill="#409EFF" opacity="0.1"/>
    <text x="710" y="270" text-anchor="middle" font-size="13" fill="#409EFF">☀️</text>
    <text x="710" y="290" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#1a1a2e">天气</text>

    <!-- 标注文字 -->
    <rect x="565" y="310" width="185" height="38" rx="8" fill="#409EFF" opacity="0.08"/>
    <text x="657" y="334" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#1a1a2e">行程管理 · 提醒</text>

    <!-- 底部标签 -->
    <rect x="575" y="365" width="165" height="30" rx="8" fill="#409EFF" opacity="0.06"/>
    <text x="657" y="385" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="#409EFF" font-weight="bold">智能规划</text>
  </g>

  <!-- 底部说明文字 -->
  <text x="400" y="465" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#409EFF" opacity="0.6">AI 智能助手 · 多场景应用</text>
</svg>