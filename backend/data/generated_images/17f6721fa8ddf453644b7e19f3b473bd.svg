<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#3A8EE6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题区域 -->
  <rect x="200" y="22" width="400" height="48" rx="24" fill="#1a1a2e" opacity="0.95"/>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" letter-spacing="2">LLM推理机制 核心要点</text>

  <!-- 卡片1：自回归生成 -->
  <g>
    <rect x="30" y="95" width="340" height="72" rx="12" fill="url(#cardGrad)" opacity="0.92"/>
    <text x="50" y="122" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">自回归生成</text>
    <text x="50" y="148" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#E0F0FF">逐Token反馈循环生成文本</text>
    <!-- Token链图标 -->
    <circle cx="310" cy="118" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="325" cy="118" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="340" cy="118" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M316 118 L319 118 M331 118 L334 118" stroke="#FFFFFF" stroke-width="1.5"/>
    <!-- 循环箭头 -->
    <path d="M340 126 Q345 136 335 138 Q325 140 320 132" fill="none" stroke="#FFFFFF" stroke-width="1.2" marker-end="url(#arrowWhite)"/>
    <defs><marker id="arrowWhite" markerWidth="4" markerHeight="4" refX="4" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4" fill="#FFFFFF"/></marker></defs>
  </g>

  <!-- 卡片2：KV缓存 -->
  <g>
    <rect x="30" y="187" width="340" height="72" rx="12" fill="url(#cardGrad)" opacity="0.92"/>
    <text x="50" y="214" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">KV缓存</text>
    <text x="50" y="240" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#E0F0FF">存储Key/Value，加速推理</text>
    <!-- 存储图标 -->
    <rect x="295" y="200" width="55" height="40" rx="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="302" y1="210" x2="343" y2="210" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="302" y1="220" x2="343" y2="220" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="302" y1="230" x2="343" y2="230" stroke="#FFFFFF" stroke-width="1"/>
    <!-- 速度线 -->
    <line x1="290" y1="208" x2="280" y2="208" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
    <line x1="290" y1="220" x2="275" y2="220" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
    <line x1="290" y1="232" x2="280" y2="232" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- 卡片3：采样策略 -->
  <g>
    <rect x="30" y="279" width="340" height="72" rx="12" fill="url(#cardGrad)" opacity="0.92"/>
    <text x="50" y="306" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">采样策略</text>
    <text x="50" y="332" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#E0F0FF">Temperature / Top-K / Top-P</text>
    <!-- 旋钮图标 -->
    <circle cx="320" cy="310" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="320" y1="310" x2="320" y2="296" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="320" cy="310" r="3" fill="#FFFFFF"/>
    <line x1="302" y1="310" x2="290" y2="310" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <line x1="338" y1="310" x2="350" y2="310" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- 卡片4：推测解码 -->
  <g>
    <rect x="430" y="95" width="340" height="72" rx="12" fill="url(#cardGrad)" opacity="0.92"/>
    <text x="450" y="122" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">推测解码</text>
    <text x="450" y="148" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#E0F0FF">小模型猜测→大模型验证，2-3倍加速</text>
    <!-- 双模型协作图标 -->
    <rect x="690" y="105" width="22" height="18" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
    <rect x="690" y="128" width="22" height="18" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
    <path d="M702 123 L702 128" stroke="#FFFFFF" stroke-width="1.2"/>
    <path d="M698 123 L698 126" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5"/>
    <path d="M706 123 L706 126" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- 卡片5：量化与FlashAttention -->
  <g>
    <rect x="430" y="187" width="340" height="72" rx="12" fill="url(#cardGrad)" opacity="0.92"/>
    <text x="450" y="214" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">量化 &amp; FlashAttention</text>
    <text x="450" y="240" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#E0F0FF">压缩芯片，优化推理性能</text>
    <!-- 压缩芯片+闪电图标 -->
    <rect x="695" y="200" width="28" height="28" rx="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M708 206 L703 216 L708 216 L705 224" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 底部总结栏 -->
  <g>
    <rect x="130" y="390" width="540" height="42" rx="21" fill="#1a1a2e" opacity="0.08"/>
    <rect x="130" y="390" width="540" height="42" rx="21" fill="none" stroke="#409EFF" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="400" y="418" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#1a1a2e" opacity="0.7">核心目标：降低延迟 · 提升吞吐 · 平衡质量与效率</text>
  </g>

  <!-- 装饰性连接线 -->
  <line x1="370" y1="131" x2="430" y2="131" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>
  <line x1="370" y1="223" x2="430" y2="223" stroke="#409EFF" stroke-width="0.8" opacity="0.3"/>

  <!-- 标注1 -->
  <rect x="375" y="100" width="48" height="20" rx="10" fill="#1a1a2e" opacity="0.8"/>
  <text x="399" y="114" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF">核心</text>

  <!-- 标注2 -->
  <rect x="375" y="192" width="48" height="20" rx="10" fill="#1a1a2e" opacity="0.8"/>
  <text x="399" y="206" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF">关键</text>

  <!-- 标注3 -->
  <rect x="375" y="284" width="48" height="20" rx="10" fill="#1a1a2e" opacity="0.8"/>
  <text x="399" y="298" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF">控制</text>

  <!-- 标注4 -->
  <rect x="775" y="100" width="20" height="20" rx="10" fill="#1a1a2e" opacity="0.8"/>
  <text x="785" y="114" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" fill="#FFFFFF">2x</text>

  <!-- 标注5 -->
  <rect x="775" y="192" width="20" height="20" rx="10" fill="#1a1a2e" opacity="0.8"/>
  <text x="785" y="206" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" fill="#FFFFFF">⚡</text>

  <!-- 标注6 -->
  <rect x="375" y="376" width="48" height="20" rx="10" fill="#409EFF" opacity="0.9"/>
  <text x="399" y="390" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF">目标</text>
</svg>