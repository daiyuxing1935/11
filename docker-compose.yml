services:
  backend:
    build: ./backend
    container_name: ai-learning-backend
    ports:
      - 127.0.0.1:8001:8000
    volumes:
      - backend_data:/app/data
      # Keep the persistent volume, but seed it from the checked-out revision
      # before each backend start so newly committed resources are not hidden.
      - ./backend/data:/app/seed-data:ro
      - ./learning_materials:/learning_materials:ro
    environment:
      # PostgreSQL 连接（通过 SSH 隧道 host.docker.internal:5433 → 服务器）
      # 使用前需先建立 SSH 隧道: ssh -f -N -L 5433:127.0.0.1:5433 root@113.45.66.152
      # 安全组开放后可改回直连: postgresql://app_user:tiaozhanbei2026!@113.45.66.152:5433/tiaozhanbei
      - DATABASE_URL=postgresql://app_user:tiaozhanbei2026!@host.docker.internal:5433/tiaozhanbei
    command: ["sh", "/app/docker-entrypoint.sh"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-learning-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
